<script>
const sections = [
  {
    "title": "第一大題：字彙選擇",
    "pts": "15 題 × 2 分 = 30 分",
    "questions": [
      {
        "q": "TED talks are short online videos that help people learn new ideas in just eighteen _______.",
        "opts": [
          "minutes",
          "celebrities",
          "conferences",
          "audiences"
        ],
        "ans": "A",
        "note": "分鐘。",
        "exp": "<span class=\"exp-key\">minutes（minutes）</span>──分鐘。<br>❌ 其餘選項語意不符。"
      },
      {
        "q": "Some people like to _______ themselves by reading books and newspapers in their free time.",
        "opts": [
          "monitor",
          "educate",
          "weaken",
          "ignore"
        ],
        "ans": "B",
        "note": "教育（自己）。",
        "exp": "<span class=\"exp-key\">educate（教育）</span>──教育（自己）。<br>❌ monitor = 監控；weaken = 削弱；ignore = 忽視；其餘選項語意不符。"
      },
      {
        "q": "Still others _______ both fun and knowledge when they choose how to spend their free time.",
        "opts": [
          "destroy",
          "waste",
          "seek",
          "reduce"
        ],
        "ans": "C",
        "note": "尋求。",
        "exp": "<span class=\"exp-key\">seek（尋求）</span>──尋求。<br>❌ destroy = 摧毀；waste = 浪費；reduce = 減少；其餘選項語意不符。"
      },
      {
        "q": "The letters TED _______ Technology, Entertainment, and Design.",
        "opts": [
          "control",
          "fiction",
          "suggestion",
          "technology"
        ],
        "ans": "D",
        "note": "科技；TED 的 T 代表 Technology。",
        "exp": "<span class=\"exp-key\">technology（科技）</span>──科技；TED 的 T 代表 Technology。<br>❌ control = 控制；fiction = 小說；虛構；suggestion = 建議；其餘選項語意不符。"
      },
      {
        "q": "With the slogan \"ideas _______ spreading,\" TED held its first conference in 1984.",
        "opts": [
          "worth",
          "broad",
          "deadly",
          "numerous"
        ],
        "ans": "A",
        "note": "值得（被散播的）。",
        "exp": "<span class=\"exp-key\">worth（值得的）</span>──值得（被散播的）。<br>❌ broad = 寬廣的；deadly = 致命的；numerous = 許多的；其餘選項語意不符。"
      },
      {
        "q": "Each speaker was given eighteen minutes to _______ his or her ideas at the conference.",
        "opts": [
          "increase",
          "present",
          "ignore",
          "avoid"
        ],
        "ans": "B",
        "note": "呈現；提出。",
        "exp": "<span class=\"exp-key\">present（呈現；提出）</span>──呈現；提出。<br>❌ increase = 增加；ignore = 忽視；avoid = 避免；其餘選項語意不符。"
      },
      {
        "q": "As TED became _______ popular, the organizers invited thinkers from many more fields.",
        "opts": [
          "narrowly",
          "rarely",
          "increasingly",
          "hardly"
        ],
        "ans": "C",
        "note": "越來越地。",
        "exp": "<span class=\"exp-key\">increasingly（越來越；日益）</span>──越來越地。<br>❌ 其餘選項語意不符。"
      },
      {
        "q": "The organizers decided to invite thinkers from a _______ range of fields, including medicine.",
        "opts": [
          "deadly",
          "narrow",
          "private",
          "broad"
        ],
        "ans": "D",
        "note": "寬廣的。",
        "exp": "<span class=\"exp-key\">broad（寬廣的）</span>──寬廣的。<br>❌ deadly = 致命的；narrow = 狹窄的；private = 私人的；其餘選項語意不符。"
      },
      {
        "q": "Over the years, _______ celebrities have given TED Talks and shared their ideas.",
        "opts": [
          "numerous",
          "few",
          "rare",
          "private"
        ],
        "ans": "A",
        "note": "許多的。",
        "exp": "<span class=\"exp-key\">numerous（許多的）</span>──許多的。<br>❌ few = 很少的；rare = 稀有的；private = 私人的；其餘選項語意不符。"
      },
      {
        "q": "Many famous _______ , such as Bill Gates and Jamie Oliver, have spoken at TED.",
        "opts": [
          "minutes",
          "celebrities",
          "fictions",
          "shoulders"
        ],
        "ans": "B",
        "note": "名人。",
        "exp": "<span class=\"exp-key\">celebrities（celebrities）</span>──名人。<br>❌ 其餘選項語意不符。"
      },
      {
        "q": "A good speaker knows how to keep the _______ interested from start to finish.",
        "opts": [
          "control",
          "fiction",
          "audience",
          "slogan"
        ],
        "ans": "C",
        "note": "觀眾；聽眾。",
        "exp": "<span class=\"exp-key\">audience（觀眾；聽眾）</span>──觀眾；聽眾。<br>❌ control = 控制；fiction = 小說；虛構；slogan = 標語；其餘選項語意不符。"
      },
      {
        "q": "James Cameron talked about his childhood _______ with science fiction.",
        "opts": [
          "presentation",
          "education",
          "government",
          "fascination"
        ],
        "ans": "D",
        "note": "著迷。",
        "exp": "<span class=\"exp-key\">fascination（著迷）</span>──著迷。<br>❌ presentation = 簡報；education = 教育；government = 政府；其餘選項語意不符。"
      },
      {
        "q": "Cameron's love of space and aliens led him to make science _______ movies.",
        "opts": [
          "fiction",
          "conference",
          "audience",
          "control"
        ],
        "ans": "A",
        "note": "小說；虛構（科幻片）。",
        "exp": "<span class=\"exp-key\">fiction（小說；虛構）</span>──小說；虛構（科幻片）。<br>❌ conference = 會議；audience = 觀眾；聽眾；control = 控制；其餘選項語意不符。"
      },
      {
        "q": "Bill Gates _______ that the government do more to fight deadly diseases.",
        "opts": [
          "wasted",
          "suggested",
          "ignored",
          "reduced"
        ],
        "ans": "B",
        "note": "建議。",
        "exp": "<span class=\"exp-key\">suggested（suggested）</span>──建議。<br>❌ 其餘選項語意不符。"
      },
      {
        "q": "Gates hoped the _______ would help monitor and control the spread of diseases.",
        "opts": [
          "audience",
          "celebrity",
          "government",
          "fiction"
        ],
        "ans": "C",
        "note": "政府。",
        "exp": "<span class=\"exp-key\">government（政府）</span>──政府。<br>❌ audience = 觀眾；聽眾；celebrity = 名人；fiction = 小說；虛構；其餘選項語意不符。"
      }
    ]
  },
  {
    "title": "第二大題：文法選擇",
    "pts": "15 題 × 2 分 = 30 分",
    "questions": [
      {
        "q": "TED, _______ stands for Technology, Entertainment, Design, is a nonprofit foundation.",
        "opts": [
          "what",
          "who",
          "whose",
          "which"
        ],
        "ans": "D",
        "exp": "<span class=\"exp-key\">which</span>──先行詞 TED 為「事物」，非限定子句用 which。<br>❌ who 用於人；whose 為所有格；what 不可引導關係子句。"
      },
      {
        "q": "Jamie Oliver, _______ presented his idea of a food revolution, is a famous chef.",
        "opts": [
          "who",
          "which",
          "whom",
          "what"
        ],
        "ans": "A",
        "exp": "<span class=\"exp-key\">who</span>──先行詞為「人」且在子句中作主詞，用 who。<br>❌ which 用於物；whom 作受詞；what 不可引導關係子句。"
      },
      {
        "q": "The TED foundation _______ established in 1984 by a group of thinkers.",
        "opts": [
          "were",
          "was",
          "is",
          "are"
        ],
        "ans": "B",
        "exp": "<span class=\"exp-key\">was</span>──主詞 foundation 為單數且為過去被動，用 was + p.p.。<br>❌ were 用於複數；is/are 為現在式，與 1984 不符。"
      },
      {
        "q": "Watching TED Talks makes _______ easy to learn new ideas in a short time.",
        "opts": [
          "this",
          "that",
          "it",
          "what"
        ],
        "ans": "C",
        "exp": "<span class=\"exp-key\">it</span>──虛受詞 it 代替後面的不定詞 to learn...。<br>❌ that/this/what 不可作虛受詞。"
      },
      {
        "q": "_______ its huge popularity, TED still keeps each talk short and simple.",
        "opts": [
          "However",
          "Although",
          "Because",
          "Despite"
        ],
        "ans": "D",
        "exp": "<span class=\"exp-key\">Despite</span>──後接名詞片語 its popularity，表讓步用 Despite。<br>❌ Although 後須接子句；Because 表原因；However 為副詞。"
      },
      {
        "q": "_______ TED started small, it has now spread ideas around the whole world.",
        "opts": [
          "Although",
          "Despite",
          "Because of",
          "In spite of"
        ],
        "ans": "A",
        "exp": "<span class=\"exp-key\">Although</span>──後接完整子句，表讓步用 Although。<br>❌ Despite/In spite of/Because of 後須接名詞。"
      },
      {
        "q": "If TED _______ never been created, millions would not have heard these great ideas.",
        "opts": [
          "has",
          "had",
          "have",
          "would"
        ],
        "ans": "B",
        "exp": "<span class=\"exp-key\">had</span>──與過去事實相反，if 子句用 had + p.p.。<br>❌ has/have 為現在完成；would 不用於 if 子句。"
      },
      {
        "q": "Bill Gates suggested that the government _______ more to fight diseases.",
        "opts": [
          "did",
          "does",
          "do",
          "done"
        ],
        "ans": "C",
        "exp": "<span class=\"exp-key\">do</span>──suggest that S (should) + 原形動詞，should 可省略。<br>❌ does/did 為變化形；done 為過去分詞。"
      },
      {
        "q": "_______ of the talks were uploaded so that the public could watch them for free.",
        "opts": [
          "Each",
          "Much",
          "Every",
          "Many"
        ],
        "ans": "D",
        "exp": "<span class=\"exp-key\">Many</span>──修飾可數複數 talks 用 Many，且配 were。<br>❌ Much 修飾不可數；Every/Each 後接單數名詞與單數動詞。"
      },
      {
        "q": "The _______ a speaker prepares, the more confident he or she becomes.",
        "opts": [
          "more",
          "most",
          "much",
          "many"
        ],
        "ans": "A",
        "exp": "<span class=\"exp-key\">more</span>──「the + 比較級..., the + 比較級...」句型，前句用 the more。<br>❌ most 為最高級；much/many 非比較級。"
      },
      {
        "q": "Speakers are required _______ their talks within eighteen minutes.",
        "opts": [
          "finishing",
          "to finish",
          "finish",
          "finished"
        ],
        "ans": "B",
        "exp": "<span class=\"exp-key\">to finish</span>──be required + to V。<br>❌ finishing/finish/finished 不符此結構。"
      },
      {
        "q": "People _______ watch TED Talks on TV, but now they watch them online.",
        "opts": [
          "are used to",
          "use to",
          "used to",
          "using"
        ],
        "ans": "C",
        "exp": "<span class=\"exp-key\">used to</span>──表過去習慣「過去常常」，used to + 原形。<br>❌ use to 形式錯誤；be used to + Ving 為「習慣於」；using 不合。"
      },
      {
        "q": "By _______ to one TED Talk, you can learn a lot in just eighteen minutes.",
        "opts": [
          "to listen",
          "listen",
          "listened",
          "listening"
        ],
        "ans": "D",
        "exp": "<span class=\"exp-key\">listening</span>──介系詞 by + V-ing。<br>❌ listen/listened/to listen 不符介系詞後接動名詞。"
      },
      {
        "q": "Jamie Oliver's talk was _______ inspiring that many people changed their eating habits.",
        "opts": [
          "so",
          "such",
          "very",
          "too"
        ],
        "ans": "A",
        "exp": "<span class=\"exp-key\">so</span>──so + 形容詞 + that 子句。<br>❌ such 後接名詞片語；very/too 不接 that 結果子句。"
      },
      {
        "q": "Never before _______ so many people learned new ideas through online videos.",
        "opts": [
          "has",
          "have",
          "had",
          "having"
        ],
        "ans": "B",
        "exp": "<span class=\"exp-key\">have</span>──否定副詞 Never 置句首，須倒裝；主詞 people 為複數，用 have + p.p.。<br>❌ has 用於單數；had 時態不符；having 為分詞。"
      }
    ]
  },
  {
    "title": "第三大題：克漏字填充",
    "pts": "10 題 × 2 分 = 20 分",
    "questions": [
      {
        "q": "(31)",
        "opts": [
          "stand for",
          "as well as",
          "a series of",
          "at present"
        ],
        "ans": "C",
        "note": "一系列的。",
        "exp": "<span class=\"exp-key\">a series of（一系列的）</span>──一系列的。<br>❌ stand for = 代表；as well as = 以及；at present = 目前；其餘選項語意不符。"
      },
      {
        "q": "(32)",
        "opts": [
          "looks up",
          "seeks for",
          "gives up",
          "stands for"
        ],
        "ans": "D",
        "note": "代表。",
        "exp": "<span class=\"exp-key\">stands for（stands for）</span>──代表。<br>❌ 其餘選項語意不符。"
      },
      {
        "q": "(33)",
        "opts": [
          "foundation",
          "celebrity",
          "audience",
          "fiction"
        ],
        "ans": "A",
        "note": "基金會。",
        "exp": "<span class=\"exp-key\">foundation（基金會）</span>──基金會。<br>❌ celebrity = 名人；audience = 觀眾；聽眾；fiction = 小說；虛構；其餘選項語意不符。"
      },
      {
        "q": "(34)",
        "opts": [
          "broad",
          "worth",
          "numerous",
          "deadly"
        ],
        "ans": "B",
        "note": "值得的。",
        "exp": "<span class=\"exp-key\">worth（值得的）</span>──值得的。<br>❌ broad = 寬廣的；numerous = 許多的；deadly = 致命的；其餘選項語意不符。"
      },
      {
        "q": "(35)",
        "opts": [
          "weaken",
          "increase",
          "present",
          "avoid"

let globalQNum = 0;
const qMap = {};
const userAnswers = {};
let submitted = false;
const container = document.getElementById('quiz-container');
sections.forEach((sec, si) => {
  const secDiv = document.createElement('div');
  secDiv.className = 'section';
  let html = `<div class="section-header">${sec.title} <span class="pts">（${sec.pts}）</span></div>`;
  if (sec.passage) { html += `<div class="passage"><div class="passage-label">📖 閱讀文章</div>${sec.passage}</div>`; }
  sec.questions.forEach((q) => {
    globalQNum++; const n = globalQNum;
    qMap[n] = { ans: q.ans, exp: q.exp };
    const labels = ['A','B','C','D'];
    let optHtml = '';
    q.opts.forEach((o, i) => { optHtml += `<div class="option" id="opt-${n}-${labels[i]}" onclick="choose(${n},'${labels[i]}')"><span class="option-label">(${labels[i]})</span>${o}</div>`; });
    let qLabel = (si === 2 || si === 3) ? `(${n})` : `${n}`;
    html += `<div class="question" id="q${n}"><div class="q-text"><span class="q-num">${qLabel}.</span> ${q.q}</div><div class="options">${optHtml}</div><div class="explanation" id="exp${n}"><div class="exp-header">💡 解析</div><div class="exp-body">${q.exp}</div></div></div>`;
  });
  secDiv.innerHTML = html;
  container.appendChild(secDiv);
});
function choose(n, chosen) {
  if (submitted) return;
  userAnswers[n] = chosen;
  const ans = qMap[n].ans;
  ['A','B','C','D'].forEach(l => {
    const el = document.getElementById(`opt-${n}-${l}`);
    el.classList.remove('selected','correct','wrong','reveal-correct');
    if (l === chosen) { el.classList.add(chosen === ans ? 'correct' : 'wrong'); }
    else if (l === ans && chosen !== ans) { el.classList.add('reveal-correct'); }
  });
  document.getElementById(`exp${n}`).classList.add('show');
  updateTopBar();
}
function updateTopBar() {
  const count = Object.keys(userAnswers).length;
  document.getElementById('answered-count').textContent = count;
  document.getElementById('progress-fill').style.width = (count / 50 * 100) + '%';
  let score = 0;
  for (let q in userAnswers) { if (userAnswers[q] === qMap[q].ans) score += 2; }
  document.getElementById('live-score').textContent = score;
}
function revealAll() {
  for (let n = 1; n <= 50; n++) {
    const ans = qMap[n].ans;
    ['A','B','C','D'].forEach(l => {
      const el = document.getElementById(`opt-${n}-${l}`);
      el.classList.remove('selected','correct','wrong','reveal-correct');
      if (l === ans) el.classList.add('reveal-correct');
      else if (userAnswers[n] === l && l !== ans) el.classList.add('wrong');
    });
    document.getElementById(`exp${n}`).classList.add('show');
  }
  updateTopBar();
}
function submitAll() {
  submitted = true; revealAll();
  let score = 0;
  for (let n = 1; n <= 50; n++) { if (userAnswers[n] === qMap[n].ans) score += 2; }
  const rb = document.getElementById('result-box'); rb.classList.add('show');
  document.getElementById('result-score').textContent = score;
  const gr = document.getElementById('result-grade'); const det = document.getElementById('result-detail');
  if (score >= 90) { gr.textContent = '🏆 優秀！'; gr.className = 'result-grade grade-a'; det.textContent = '表現卓越，繼續保持！'; }
  else if (score >= 70) { gr.textContent = '👍 良好'; gr.className = 'result-grade grade-b'; det.textContent = '表現不錯，再複習錯誤的題目吧！'; }
  else { gr.textContent = '📚 需加強'; gr.className = 'result-grade grade-c'; det.textContent = '多複習解析說明，你可以做到的！'; }
  document.getElementById('answered-count').textContent = 50;
  document.getElementById('live-score').textContent = score;
  document.getElementById('progress-fill').style.width = '100%';
  rb.scrollIntoView({ behavior: 'smooth' });
}
function resetAll() {
  submitted = false;
  for (let key in userAnswers) delete userAnswers[key];
  for (let n = 1; n <= 50; n++) {
    ['A','B','C','D'].forEach(l => { document.getElementById(`opt-${n}-${l}`).classList.remove('selected','correct','wrong','reveal-correct'); });
    document.getElementById(`exp${n}`).classList.remove('show');
  }
  document.getElementById('result-box').classList.remove('show');
  document.getElementById('answered-count').textContent = '0';
  document.getElementById('live-score').textContent = '0';
  document.getElementById('progress-fill').style.width = '0%';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
