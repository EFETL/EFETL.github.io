<script>
const sections = [
  {
    title: '第一大題：字彙選擇',
    pts: '15 題 × 2 分 = 30 分',
    questions: [
      { q: 'The company _______ over 500 workers in its main factory.',
        opts: ['frightened','confined','employs','hesitates'], ans: 'C',
        exp: '<span class="exp-key">employs（雇用）</span>──主詞 The company 為第三人稱單數，現在式加 s。employ = 雇用，符合「工廠雇用500名工人」語境。<br>❌ frightened = 驚嚇；confined = 限制；hesitates = 猶豫，均不符。' },
      { q: 'The sick child\'s voice was so _______ that we could barely hear him.',
        opts: ['tremendous','frail','drowsy','corporate'], ans: 'B',
        exp: '<span class="exp-key">frail（虛弱的；細弱的）</span>──病童的聲音微弱到幾乎聽不見，frail 完全符合。<br>❌ tremendous = 巨大的（洪亮，相反）；drowsy = 昏昏欲睡；corporate = 企業的，均不符。' },
      { q: 'She had to _______ the dinner invitation because she had other plans.',
        opts: ['turn down','pass away','cheer up','make a difference'], ans: 'A',
        exp: '<span class="exp-key">turn down（拒絕）</span>──turn down an invitation = 婉拒邀請。<br>❌ pass away = 去世；cheer up = 振作；make a difference = 有影響，均不符語境。' },
      { q: 'Wash your hands regularly to avoid spreading _______.',
        opts: ['warmth','laughter','germs','fright'], ans: 'C',
        exp: '<span class="exp-key">germs（細菌；病菌）</span>──勤洗手避免傳播細菌，與課文 pass on germs 呼應。<br>❌ warmth = 溫暖；laughter = 笑聲；fright = 驚恐，均不符「傳播」語境。' },
      { q: 'The kind teacher always tried to _______ her students when they were sad.',
        opts: ['confine','cheer up','pass on','hesitate'], ans: 'B',
        exp: '<span class="exp-key">cheer up（使振作）</span>──cheer sb. up = 讓某人振作起來，老師讓傷心的學生振奮。<br>❌ confine = 限制；pass on = 傳遞；hesitate = 猶豫，均不符。' },
      { q: 'The surprise party gave the little girl quite a _______.',
        opts: ['sparkle','refusal','fright','employment'], ans: 'C',
        exp: '<span class="exp-key">fright（驚恐；嚇一跳）</span>──give sb. a fright = 嚇了某人一跳，驚喜派對讓小女孩嚇了一跳。<br>❌ sparkle = 閃光；refusal = 拒絕；employment = 就業，均不符。' },
      { q: 'The movie was so boring that most of the audience became _______.',
        opts: ['frail','terminal','drowsy','tremendous'], ans: 'C',
        exp: '<span class="exp-key">drowsy（昏昏欲睡的）</span>──無聊的電影使大多數觀眾昏昏欲睡。<br>❌ frail = 虛弱的；terminal = 末期的；tremendous = 巨大的，均不符。' },
      { q: 'The company\'s _______ headquarters is located in New York City.',
        opts: ['frail','corporate','terminal','drowsy'], ans: 'B',
        exp: '<span class="exp-key">corporate（企業的；公司的）</span>──corporate headquarters = 企業總部，形容詞修飾名詞。<br>❌ frail = 虛弱的；terminal = 末期的；drowsy = 昏昏欲睡的，均不修飾 headquarters。' },
      { q: 'His grandfather _______ away quietly after a long illness last winter.',
        opts: ['made','passed','cheered','turned'], ans: 'B',
        exp: '<span class="exp-key">passed（pass away = 去世）</span>──pass away 是去世的委婉說法，課文結尾原片語。<br>❌ made/cheered/turned 分別組成 made a difference / cheered up / turned down，均含義不同。' },
      { q: 'The yoga instructor asked us to _______ our arms wide and breathe deeply.',
        opts: ['frighten','prompt','confine','stretch'], ans: 'D',
        exp: '<span class="exp-key">stretch（伸展）</span>──stretch one\'s arms wide = 把手臂伸展開，瑜珈動作描述。<br>❌ frighten = 驚嚇；prompt = 促使；confine = 限制，均不符肢體動作語境。' },
      { q: 'The _______ of the children playing in the park was music to her ears.',
        opts: ['fright','laughter','refusal','contact'], ans: 'B',
        exp: '<span class="exp-key">laughter（笑聲）</span>──孩子們玩耍的笑聲聽起來像音樂，令人愉悅。<br>❌ fright = 驚恐；refusal = 拒絕；contact = 接觸，均不符「愉悅聲音」語境。' },
      { q: 'After years of hard work, she found _______ at a well-known law firm.',
        opts: ['employment','warmth','hesitation','sparkle'], ans: 'A',
        exp: '<span class="exp-key">employment（就業；受雇）</span>──find employment = 找到工作，多年努力後在知名律師事務所就業。<br>❌ warmth = 溫暖；hesitation = 猶豫；sparkle = 閃光，均不符「就業」語境。' },
      { q: 'His _______ to apologize only made the situation worse.',
        opts: ['warmth','sparkle','refusal','fright'], ans: 'C',
        exp: '<span class="exp-key">refusal（拒絕；名詞）</span>──refusal to do = 拒絕做某事（名詞），他拒絕道歉使情況更糟。<br>❌ warmth = 溫暖；sparkle = 閃光；fright = 驚恐，均不符語境。' },
      { q: 'The patient was diagnosed with a _______ disease and had only months to live.',
        opts: ['drowsy','frail','tremendous','terminal'], ans: 'D',
        exp: '<span class="exp-key">terminal（末期的；致命的）</span>──terminal disease = 末期疾病，只剩幾個月可活，直接呼應課文語境。<br>❌ drowsy = 昏昏欲睡；frail = 虛弱；tremendous = 巨大，均不修飾「致命疾病」。' },
      { q: 'There was a _______ of excitement in her eyes when she heard the good news.',

        exp: '<span class="exp-key">sparkle（閃光；光芒）</span>──a sparkle of excitement in one\'s eyes = 眼中興奮的光芒，課文原句：A sparkle soon came to his eyes。<br>❌ germ = 細菌；hug = 擁抱；warmth = 溫暖（抽象），均不符「眼中的閃光」語境。' },
    ]
  },
  {
    title: '第二大題：文法選擇',
    pts: '15 題 × 2 分 = 30 分',
    questions: [
      { q: 'The narrator found it _______ rewarding to bring laughter to the sick children.',

        exp: '<span class="exp-key">tremendously（極大地；非常地）</span>──副詞修飾形容詞 rewarding。tremendous 是形容詞，不能直接修飾另一個形容詞；more/most tremendous 為比較/最高級，語境不需比較。' },
      { q: 'I wasn\'t permitted _______ the children alone when dressed as Ronald.',

        exp: '<span class="exp-key">to visit</span>──be permitted to do = 被允許做某事，permit 後固定接不定詞 to V。visiting（動名詞）、visit（原形，缺 to）、visited（過去式）均不符此搭配。' },
      { q: '_______ I understood the rules, I felt that warmth sometimes mattered more.',

      { q: 'His frail voice prompted me _______ the door and enter the room.',

        exp: '<span class="exp-key">to push</span>──prompt sb. to do = 促使某人做某事，固定接不定詞 to V。push（原形，缺 to）、pushing（動名詞）、pushed（過去式）均不符此句型。' },
      { q: 'Billy was _______ to a hospital bed and looked pale and weak.',
        opts: ['confined','confining','confine','to confine'], ans: 'A',
        exp: '<span class="exp-key">confined（被動語態）</span>──be confined to = 被限制/侷限在，用過去分詞構成被動。confining = 主動進行；confine = 原形；to confine = 不定詞，均不符。' },
      { q: 'She thanked him _______ making a difference in her son\'s life.',
        opts: ['about','with','for','of'], ans: 'C',
        exp: '<span class="exp-key">for</span>──thank sb. for doing = 感謝某人做了某事，固定介係詞搭配。<br>❌ about/with/of 均不與 thank 正確搭配。' },
      { q: 'He told his mom that he _______ hugged Ronald.',
        opts: ['has','have','is','had'], ans: 'D',
        exp: '<span class="exp-key">had（過去完成式）</span>──間接引語（Reported Speech）中，主句 told 為過去式，子句動詞退一個時態：has → had。<br>❌ has/have/is 均為現在式，不符時態一致原則。' },
      { q: 'I _______ leave when he suddenly stretched out his tiny arms.',
        opts: ['was about to','am about to','used to','would'], ans: 'A',
        exp: '<span class="exp-key">was about to（過去的「即將」）</span>──be about to + V = 即將，was about to 表示「過去那一刻正要但尚未行動」，完美呈現課文轉折。<br>❌ am about to = 現在式；used to = 過去習慣；would = 假設或習慣，均不符。' },
      { q: 'After _______ magic tricks for Billy, I asked what else I could do.',

        exp: '<span class="exp-key">doing</span>──介係詞 after 後接動名詞（V-ing），after doing = 做完⋯之後。<br>❌ do（原形）、done（過去分詞）、did（過去式）均不符介係詞後接 V-ing 的規則。' },
      { q: 'Two days _______, Billy\'s mom called to tell me her son had passed away.',
        opts: ['before','ago','earlier','later'], ans: 'D',
        exp: '<span class="exp-key">later（之後）</span>──two days later = 兩天後（從過去某一時間點算起）。<br>❌ ago = 從現在算起的「以前」；before 需有明確參照時間點；earlier 非固定搭配，均不符。' },
      { q: 'He was afraid _______ his little brother would have no one to play with.',
        opts: ['which','what','that','whether'], ans: 'C',
        exp: '<span class="exp-key">that</span>──be afraid that + 子句 = 害怕⋯（某事），that 引導名詞子句。<br>❌ which = 哪一個（需先行詞）；what 的子句需有不完整結構；whether = 是否（含疑問），均不符。' },
      { q: 'The narrator _______ Billy\'s parents his phone number before leaving.',
        opts: ['gave','gives','give','is giving'], ans: 'A',
        exp: '<span class="exp-key">gave（過去式）</span>──整篇故事用過去式敘述，give → gave。<br>❌ gives = 現在式第三人稱單數；give = 原形；is giving = 現在進行式，均時態不符。' },
      { q: 'I no longer _______ if I was caught breaking the rules.',

        exp: '<span class="exp-key">cared（過去式）</span>──整篇故事用過去式，care → cared。課文原句：I no longer cared if I was caught breaking the rules。<br>❌ care（現在式）；caring（缺助動詞）；to care（不定詞，不作謂語），均不符。' },
      { q: 'Some things in life _______ more important than any rule.',

    questions: [
      { q: 'I was _______ by the McDonald\'s Corporation.',

      { q: 'I found it _______ rewarding to bring laughter to them.',

// ── RENDER ────────────────────────────────────────────────
let globalQNum = 0;
const qMap = {};
const userAnswers = {};
let submitted = false;

const container = document.getElementById('quiz-container');

sections.forEach(sec => {
  const secDiv = document.createElement('div');
  secDiv.className = 'section';
  let html = `<div class="section-header">${sec.title} <span class="pts">（${sec.pts}）</span></div>`;
  if (sec.passage) {
    html += `<div class="passage"><div class="passage-label">📖 閱讀文章</div>${sec.passage}</div>`;
  }
  sec.questions.forEach(q => {
    globalQNum++;
    const n = globalQNum;
    qMap[n] = { ans: q.ans, exp: q.exp };
    const labels = ['A','B','C','D'];
    let optHtml = '';
    q.opts.forEach((o, i) => {
      optHtml += `<div class="option" id="opt-${n}-${labels[i]}" onclick="choose(${n},'${labels[i]}')">`
        + `<span class="option-label">(${labels[i]})</span>${o}</div>`;
    });
    html += `<div class="question" id="q${n}">
      <div class="q-text"><span class="q-num">${n}.</span> ${q.q}</div>
      <div class="options">${optHtml}</div>
      <div class="explanation" id="exp${n}">
        <div class="exp-header">💡 解析</div>
        <div class="exp-body">${q.exp}</div>
      </div>
    </div>`;
  });
  secDiv.innerHTML = html;
  container.appendChild(secDiv);
});

// ── LOGIC ─────────────────────────────────────────────────
function choose(n, chosen) {
  if (submitted) return;
  userAnswers[n] = chosen;
  const ans = qMap[n].ans;
  const labels = ['A','B','C','D'];
  labels.forEach(l => {
    const el = document.getElementById(`opt-${n}-${l}`);
    el.classList.remove('selected','correct','wrong','reveal-correct');
    if (l === chosen) {
      el.classList.add(chosen === ans ? 'correct' : 'wrong');
    } else if (l === ans && chosen !== ans) {
      el.classList.add('reveal-correct');
    }
  });
  document.getElementById(`exp${n}`).classList.add('show');
  updateTopBar();
}

function updateTopBar() {
  const count = Object.keys(userAnswers).length;
  document.getElementById('answered-count').textContent = count;
  document.getElementById('progress-fill').style.width = (count / 50 * 100) + '%';
  let score = 0;
  for (let q in userAnswers) { if (userAnswers[q] === qMap[q].ans) score += 2; }
  document.getElementById('live-score').textContent = score;
}

function revealAll() {
  for (let n = 1; n <= 50; n++) {
    const ans = qMap[n].ans;
    const labels = ['A','B','C','D'];
    labels.forEach(l => {
      const el = document.getElementById(`opt-${n}-${l}`);
      el.classList.remove('selected','correct','wrong','reveal-correct');
      if (l === ans) el.classList.add('reveal-correct');
      else if (userAnswers[n] === l && l !== ans) el.classList.add('wrong');
    });
    document.getElementById(`exp${n}`).classList.add('show');
  }
  updateTopBar();
}

function submitAll() {
  submitted = true;
  revealAll();
  let score = 0;
  for (let n = 1; n <= 50; n++) {
    if (userAnswers[n] === qMap[n].ans) score += 2;
  }
  const rb = document.getElementById('result-box');
  rb.classList.add('show');
  document.getElementById('result-score').textContent = score;
  const gr = document.getElementById('result-grade');
  const det = document.getElementById('result-detail');
  if (score >= 90) { gr.textContent = '🏆 優秀！'; gr.className = 'result-grade grade-a'; det.textContent = '表現卓越，繼續保持！'; }
  else if (score >= 70) { gr.textContent = '👍 良好'; gr.className = 'result-grade grade-b'; det.textContent = '表現不錯，再複習錯誤的題目吧！'; }
  else { gr.textContent = '📚 需加強'; gr.className = 'result-grade grade-c'; det.textContent = '多複習解析說明，你可以做到的！'; }
  document.getElementById('answered-count').textContent = 50;
  document.getElementById('live-score').textContent = score;
  document.getElementById('progress-fill').style.width = '100%';
  rb.scrollIntoView({ behavior: 'smooth' });
}

function resetAll() {
  submitted = false;
  for (let key in userAnswers) delete userAnswers[key];
  for (let n = 1; n <= 50; n++) {
    ['A','B','C','D'].forEach(l => {
      document.getElementById(`opt-${n}-${l}`).classList.remove('selected','correct','wrong','reveal-correct');
    });
    document.getElementById(`exp${n}`).classList.remove('show');
  }
  document.getElementById('result-box').classList.remove('show');
  document.getElementById('answered-count').textContent = '0';
  document.getElementById('live-score').textContent = '0';
  document.getElementById('progress-fill').style.width = '0%';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
