<script>
const sections = [
  {
    title: '第一大題：字彙選擇', pts: '15 題 × 2 分 = 30 分',
    questions: [
      { q: 'The festival featured several _______ inventions created by local high school students.', opts: ['elementary','slight','innovative','reliable'], ans: 'C', exp: '<span class="exp-key">innovative（創新的）</span>──學生發明的「創新」作品在園遊會展出，課文核心詞彙。<br>❌ elementary = 基本的；slight = 輕微的；reliable = 可靠的，均不符「創新發明」語境。' },
      { q: 'The mayor _______ that the new park would open before summer.', opts: ['promised','ranked','adjusted','explored'], ans: 'A', exp: '<span class="exp-key">promised（承諾）</span>──市長「承諾」新公園將在夏天前開放，promise 課文詞彙（v. 有希望；保證）。<br>❌ ranked = 排名；adjusted = 調整；explored = 探索，均不符「承諾」語境。' },
      { q: 'The workers gathered all the _______ they needed before starting construction.', opts: ['routes','materials','elements','feedbacks'], ans: 'B', exp: '<span class="exp-key">materials（材料；物資）</span>──工人在開始施工前收集所有所需的「材料」，課文原詞。<br>❌ routes = 路線；elements = 元素；feedbacks（不可數）= 回饋，均不符。' },
      { q: 'The two schools agreed to _______ on a charity event for the local community.', opts: ['graduate','rank','collaborate','mention'], ans: 'C', exp: '<span class="exp-key">collaborate（合作）</span>──兩所學校同意「合作」舉辦社區慈善活動，課文核心詞彙。<br>❌ graduate = 畢業；rank = 排名；mention = 提及，均不符「合作舉辦」語境。' },
      { q: 'The old wooden _______ had survived three major typhoons.', opts: ['graduation','exploration','structure','capability'], ans: 'C', exp: '<span class="exp-key">structure（結構；建築物）</span>──這座老舊木造「建築物」撐過了三次大颱風，課文關鍵詞。<br>❌ graduation = 畢業；exploration = 探索；capability = 能力，均不指「建築物」。' },
      { q: 'His new score was only _______ higher than his previous one.', opts: ['uniquely','slightly','reliably','elementarily'], ans: 'B', exp: '<span class="exp-key">slightly（稍微；略微）</span>──他的新成績只「稍微」比之前高，slightly 修飾比較級 higher，課文原詞。<br>❌ uniquely = 獨特地；reliably = 可靠地；elementarily（罕用），均不符「些微差距」語境。' },
      { q: 'In an emergency, you can _______ on your neighbors for help.', opts: ['mention','adjust','rank','rely'], ans: 'D', exp: '<span class="exp-key">rely（依靠；依賴）</span>──緊急情況下可以「依靠」鄰居幫忙，rely on 課文原片語。<br>❌ mention = 提及；adjust = 調整；rank = 排名，均不構成「依靠⋯」語境。' },
      { q: 'The manager asked her assistant for honest _______ on the proposal.', opts: ['material','route','feedback','element'], ans: 'C', exp: '<span class="exp-key">feedback（回饋；反饋）</span>──經理向助理徵求對提案的誠實「回饋」，與課文 gives them immediate feedback 呼應。<br>❌ material = 材料；route = 路線；element = 元素，均不指「評語」。' },
      { q: "The artist's painting style is so _______ that people can recognize her work instantly.", opts: ['stable','capable','unique','slight'], ans: 'C', exp: '<span class="exp-key">unique（獨特的；唯一的）</span>──這位藝術家的畫風如此「獨特」，人們一眼就能認出她的作品，與課文 unique way of working 同義。<br>❌ stable = 穩定的；capable = 有能力的；slight = 輕微的，均不符「獨一無二」語境。' },
      { q: 'It can take months to fully _______ to living in a different country.', opts: ['explore','construct','promise','adjust'], ans: 'D', exp: '<span class="exp-key">adjust（調整；適應）</span>──需要數個月才能完全「適應」在另一個國家生活，adjust to 課文詞彙。<br>❌ explore = 探索；construct = 建造；promise = 承諾，均不表示「適應」。' },
      { q: 'The bridge was designed with extra supports to increase its _______.', opts: ['stability','architecture','collaboration','graduation'], ans: 'A', exp: '<span class="exp-key">stability（穩定性）</span>──橋樑設計加裝額外支撐以增加其「穩定性」，課文用此詞描述結構穩定。<br>❌ architecture = 建築學；collaboration = 合作；graduation = 畢業，均不符「結構穩定」語境。' },
      { q: 'The hikers wanted to _______ the hidden trails behind the mountain.', opts: ['mention','rank','explore','graduate'], ans: 'C', exp: '<span class="exp-key">explore（探索；探查）</span>──登山客想要「探索」山後隱藏的小徑，課文尾段詞彙。<br>❌ mention = 提及；rank = 排名；graduate = 畢業，均不符「主動探索」語境。' },
      { q: 'Drivers were advised to take an alternative _______ because of the accident.', opts: ['element','feedback','adjustment','route'], ans: 'D', exp: '<span class="exp-key">route（路線；途徑）</span>──因為事故，駕駛被建議走替代「路線」，課文 routes to success 同詞。<br>❌ element = 元素；feedback = 回饋；adjustment = 調整，均不指「行駛路線」。' },
      { q: 'After comparing several options, the committee finally managed to _______ which plan to choose.', opts: ['figure out','get down to','roll up their sleeves','rely on'], ans: 'A', exp: '<span class="exp-key">figure out（弄清楚；想出）</span>──比較數個選項後，委員會終於「想清楚」該選哪個方案，課文片語。<br>❌ get down to = 開始認真做；roll up sleeves = 捲起袖子；rely on = 依靠，均不表示「理解/解決問題」。' },
      { q: 'Mastering a musical instrument involves a great deal of _______ over many years.', opts: ['in charge','trial and error','figure out','get down to'], ans: 'B', exp: '<span class="exp-key">trial and error（試錯）</span>──精通一項樂器需要多年的「試錯」過程，課文核心概念。<br>❌ in charge = 負責；figure out = 弄清楚；get down to = 開始做，均不符此語境。' },
    ]
  },
  {
    title: '第二大題：文法選擇', pts: '15 題 × 2 分 = 30 分',
    questions: [
      { q: 'A famous online encyclopedia _______ Wikipedia is edited by volunteers worldwide.', opts: ['known as','knowing as','known for','knowing for'], ans: 'A', exp: '<span class="exp-key">known as（被稱為）</span>──過去分詞片語修飾 encyclopedia，課文原句結構：an exercise known as the Marshmallow Challenge。<br>❌ knowing（現在分詞，主動）不用於此；known for = 以⋯聞名，語義不符。' },
      { q: 'The new software is _______ thousands of requests at the same time.', opts: ['capable to handle','capable of handling','capable for handling','capable to handling'], ans: 'B', exp: '<span class="exp-key">capable of handling</span>──be capable of + V-ing = 有能力做某事，固定介係詞 of，後接動名詞，課文原句：structure capable of supporting the weight。<br>❌ capable to/for 均非正確介係詞用法。' },
      { q: 'The festival _______ in this town every autumn for the past two decades.', opts: ['has organized','has been organized','organized','is organizing'], ans: 'B', exp: '<span class="exp-key">has been organized（現在完成式被動）</span>──這個慶典「被」舉辦了二十年，被動語態，課文原句用法（has been conducted）。<br>❌ has organized = 主動（主語需為人）；organized = 過去式；is organizing = 現在進行式。' },
      { q: 'The author, _______ novels have sold millions of copies, rarely gives interviews.', opts: ['that','which','whose','whom'], ans: 'C', exp: '<span class="exp-key">whose（其的）</span>──whose 作所有格關係代名詞，修飾 author，課文原句結構：The kindergarten group, whose structures were taller。<br>❌ that/which 不能作所有格；whom 修飾人（作受詞）。' },
      { q: 'Some people enjoy working under pressure, _______ others prefer a relaxed pace.', opts: ['because','although','whereas','unless'], ans: 'C', exp: '<span class="exp-key">whereas（然而；反之）</span>──whereas 引導對比子句，課文原詞：kids get started right away, whereas adults...。<br>❌ because = 因果；although = 讓步；unless = 條件，均改變邏輯關係。' },
      { q: 'The committee did not announce the winner _______ all the votes had been counted.', opts: ['because','until','while','before'], ans: 'B', exp: '<span class="exp-key">until（直到⋯才）</span>──not...until = 直到⋯才，委員會直到「所有票數被算完」才宣布得獎人，課文語義。<br>❌ because = 因為；while = 當⋯時；before = 在⋯之前，均改變時序邏輯。' },
      { q: '_______ his classmates, Tom finishes his homework right after school every day.', opts: ['Despite','Unlike','Although','Instead of'], ans: 'B', exp: '<span class="exp-key">Unlike（與⋯不同）</span>──unlike + 名詞片語，引出對比，課文原句：unlike adults, kindergarteners are quicker to change。<br>❌ Despite + 動名詞；Although + 子句；Instead of + 動名詞，結構均不符。' },
      { q: '_______ losing the first match, the team went on to win the championship.', opts: ['Despite','Although','However','Instead'], ans: 'A', exp: '<span class="exp-key">Despite（儘管）</span>──despite + V-ing（動名詞），儘管輸了第一場比賽仍贏得冠軍。課文原句：despite working to create the best plan。<br>❌ Although 後接子句（需有主語）；However/Instead 為副詞，不引導片語。' },
      { q: 'The siblings worked _______ to plan a surprise party for their parents.', opts: ['each other','one another','together','alone'], ans: 'C', exp: '<span class="exp-key">together（一起）</span>──work together = 共同合作，課文原句：more focused on working together to figure out。<br>❌ each other/one another 作受詞，不接在 worked 後；alone = 單獨（相反）。' },
      { q: "The teacher's comments gave the students valuable _______ on how to improve their essays.", opts: ['feedback','adjustment','capability','mention'], ans: 'A', exp: '<span class="exp-key">feedback（回饋）</span>──課文原句：gives them immediate feedback about what design elements work。<br>❌ adjustment = 調整（動作非資訊）；capability = 能力；mention = 提及，均不符。' },
      { q: '_______ save energy, the school turns off unused lights every evening.', opts: ['In order that','So that','In order to','So as that'], ans: 'C', exp: '<span class="exp-key">In order to（為了）</span>──in order to + V = 為了做某事，課文原句：In order to solve problems, we must...。<br>❌ In order that/So that 後接子句（需主語+動詞）；So as that 不是正確片語。' },
      { q: "The data _______ during the experiment supported the team's hypothesis.", opts: ['collecting','to collect','collected','collect'], ans: 'C', exp: '<span class="exp-key">collected（過去分詞片語）</span>──collected during the experiment 修飾 data，表示「在實驗中被蒐集的數據」，被動含義，呼應課文 constructed in the study。<br>❌ collecting = 現在分詞（主動）；to collect = 目的；collect = 原形，均不符。' },
      { q: 'She was quick _______ her schedule when the meeting time changed suddenly.', opts: ['adjust','adjusting','adjusted','to adjust'], ans: 'D', exp: '<span class="exp-key">to adjust</span>──be quick to do = 快速地做某事，形容詞後接不定詞 to V，課文原句：quicker to change their methods。<br>❌ adjust（原形，缺 to）；adjusting（動名詞，不接形容詞）；adjusted（過去式）均不符。' },
      { q: 'People often _______ trust recommendations from their friends more than advertisements.', opts: ['tend that','tend to','are tending','tend for'], ans: 'B', exp: '<span class="exp-key">tend to（傾向於）</span>──tend to + V = 傾向於做某事，課文原句：children tend to collaborate freely and naturally。<br>❌ tend that 後接子句；are tending 不必要的進行式；tend for 非正確搭配。' },
      { q: 'Many companies _______ a large amount of money training new employees.', opts: ['spend','take','cost','use'], ans: 'A', exp: '<span class="exp-key">spend</span>──spend money/time + V-ing = 花錢/花時間做某事，固定句型，呼應課文 spend most of the time planning。<br>❌ take time + to V；cost = 花費金錢（主語通常為事物）；use 不用於此句型。' },
    ]
  },
  {
    title: '第三大題：克漏字填充', pts: '10 題 × 2 分 = 20 分',
    passage: 'A teacher once gave her students an <strong>(31)</strong> _______ assignment: build the tallest paper tower possible in just fifteen minutes. Each group had to <strong>(32)</strong> _______ a tower using only newspaper and tape.<br><br>The results were <strong>(33)</strong> _______ . The youngest group, <strong>(34)</strong> _______ having the least experience, built one of the tallest towers. The oldest group, <strong>(35)</strong> _______, spent so much time discussing the design that they barely had time to build anything.<br><br>The teacher explained that the younger students <strong>(36)</strong> _______ very little time talking about who would be <strong>(37)</strong> _______ . They simply started building right away. Whenever a tower fell over, they quickly <strong>(38)</strong> _______ building it again, using <strong>(39)</strong> _______ to find what worked. Each failed attempt gave them useful <strong>(40)</strong> _______ for the next try.',
    questions: [
      { q: 'A teacher once gave her students an _______ assignment: build the tallest paper tower possible.', opts: ['stable','slight','innovative','elementary'], ans: 'C', exp: '<span class="exp-key">innovative（創新的）</span>──呼應課文第二句：An innovative team-building exercise known as the Marshmallow Challenge。<br>❌ stable = 穩定的；slight = 輕微的；elementary = 初級的，均不符「創新性的任務」語境。' },
      { q: 'Each group had to _______ a tower using only newspaper and tape.', opts: ['mention','explore','construct','rank'], ans: 'C', exp: '<span class="exp-key">construct（建造）</span>──呼應課文主題：建造最高的自立結構，construct 最直接。<br>❌ mention = 提及；explore = 探索；rank = 排名，均不符「建造」動作。' },
      { q: 'The results were _______.', opts: ['surprising','explored','adjusted','mentioned'], ans: 'A', exp: '<span class="exp-key">surprising（令人驚訝的）</span>──呼應課文 the challenge has produced some surprising results 的語氣，年幼學生的表現出乎意料地好。<br>❌ explored/adjusted/mentioned 為過去分詞，文法與語意皆不符 be 動詞後的形容詞補語位置。' },
      { q: 'The youngest group, _______ having the least experience, built one of the tallest towers.', opts: ['unlike','despite','although','whereas'], ans: 'B', exp: '<span class="exp-key">despite（儘管）</span>──despite + V-ing，儘管經驗最少，最年幼的組別卻蓋出最高的塔之一，課文原句結構：despite working to create the best plan。<br>❌ unlike 後接名詞（指對比的人/物）；although/whereas 後接子句，結構不符。' },

      { q: 'Whenever a tower fell over, they quickly _______ building it again.', opts: ['got down to','figured out','relied on','ranked up'], ans: 'A', exp: '<span class="exp-key">got down to（開始認真做）</span>──get down to + V-ing = 開始認真做某事，塔倒了之後立刻「重新動手」蓋，課文片語 get down to work。<br>❌ figured out（後接疑問詞或名詞，非 V-ing）；relied on = 依靠；ranked up 非正確片語。' },
      { q: '...using _______ to find what worked.', opts: ['stability','trial and error','route','element'], ans: 'B', exp: '<span class="exp-key">trial and error（試錯）</span>──用「試錯法」找出有效的方法，課文核心概念：They rely on trial and error。<br>❌ stability = 穩定性；route = 路線；element = 元素，均不符。' },
      { q: 'Each failed attempt gave them useful _______ for the next try.', opts: ['stability','feedback','route','element'], ans: 'B', exp: '<span class="exp-key">feedback（回饋）</span>──每次失敗的嘗試都提供有用的「回饋」，課文原句：gives them immediate feedback about what design elements work。<br>❌ stability = 穩定性；route = 路線；element = 元素，均不指「資訊回饋」。' },
    ]
  },
  {
    title: '第四大題：閱讀測驗', pts: '10 題 × 2 分 = 20 分',

let globalQNum = 0;
const qMap = {};
const userAnswers = {};
let submitted = false;

const container = document.getElementById('quiz-container');
sections.forEach(sec => {
  const secDiv = document.createElement('div');
  secDiv.className = 'section';
  let html = `<div class="section-header">${sec.title} <span class="pts">（${sec.pts}）</span></div>`;
  if (sec.passage) html += `<div class="passage"><div class="passage-label">📖 閱讀文章</div>${sec.passage}</div>`;
  sec.questions.forEach(q => {
    globalQNum++;
    const n = globalQNum;
    qMap[n] = { ans: q.ans, exp: q.exp };
    const labels = ['A','B','C','D'];
    let optHtml = q.opts.map((o,i) => `<div class="option" id="opt-${n}-${labels[i]}" onclick="choose(${n},'${labels[i]}')">`+`<span class="option-label">(${labels[i]})</span>${o}</div>`).join('');
    html += `<div class="question" id="q${n}"><div class="q-text"><span class="q-num">${n}.</span> ${q.q}</div><div class="options">${optHtml}</div><div class="explanation" id="exp${n}"><div class="exp-header">💡 解析</div><div class="exp-body">${q.exp}</div></div></div>`;
  });
  secDiv.innerHTML = html;
  container.appendChild(secDiv);
});

function choose(n, chosen) {
  if (submitted) return;
  userAnswers[n] = chosen;
  const ans = qMap[n].ans;
  ['A','B','C','D'].forEach(l => {
    const el = document.getElementById(`opt-${n}-${l}`);
    el.classList.remove('correct','wrong','reveal-correct');
    if (l === chosen) el.classList.add(chosen === ans ? 'correct' : 'wrong');
    else if (l === ans && chosen !== ans) el.classList.add('reveal-correct');
  });
  document.getElementById(`exp${n}`).classList.add('show');
  updateTopBar();
}

function updateTopBar() {
  const count = Object.keys(userAnswers).length;
  document.getElementById('answered-count').textContent = count;
  document.getElementById('progress-fill').style.width = (count / 50 * 100) + '%';
  let score = 0;
  for (let q in userAnswers) { if (userAnswers[q] === qMap[q].ans) score += 2; }
  document.getElementById('live-score').textContent = score;
}

function revealAll() {
  for (let n = 1; n <= 50; n++) {
    const ans = qMap[n].ans;
    ['A','B','C','D'].forEach(l => {
      const el = document.getElementById(`opt-${n}-${l}`);
      el.classList.remove('correct','wrong','reveal-correct');
      if (l === ans) el.classList.add('reveal-correct');
      else if (userAnswers[n] === l) el.classList.add('wrong');
    });
    document.getElementById(`exp${n}`).classList.add('show');
  }
  updateTopBar();
}

function submitAll() {
  submitted = true;
  revealAll();
  let score = 0;
  for (let n = 1; n <= 50; n++) { if (userAnswers[n] === qMap[n].ans) score += 2; }
  const rb = document.getElementById('result-box');
  rb.classList.add('show');
  document.getElementById('result-score').textContent = score;
  const gr = document.getElementById('result-grade');
  const det = document.getElementById('result-detail');
  if (score >= 90) { gr.textContent = '🏆 優秀！'; gr.className = 'result-grade grade-a'; det.textContent = '表現卓越，繼續保持！'; }
  else if (score >= 70) { gr.textContent = '👍 良好'; gr.className = 'result-grade grade-b'; det.textContent = '表現不錯，再複習錯誤的題目吧！'; }
  else { gr.textContent = '📚 需加強'; gr.className = 'result-grade grade-c'; det.textContent = '多複習解析說明，你可以做到的！'; }
  document.getElementById('answered-count').textContent = 50;
  document.getElementById('live-score').textContent = score;
  document.getElementById('progress-fill').style.width = '100%';
  rb.scrollIntoView({ behavior: 'smooth' });
}

function resetAll() {
  submitted = false;
  for (let key in userAnswers) delete userAnswers[key];
  for (let n = 1; n <= 50; n++) {
    ['A','B','C','D'].forEach(l => document.getElementById(`opt-${n}-${l}`).classList.remove('correct','wrong','reveal-correct'));
    document.getElementById(`exp${n}`).classList.remove('show');
  }
  document.getElementById('result-box').classList.remove('show');
  document.getElementById('answered-count').textContent = '0';
  document.getElementById('live-score').textContent = '0';
  document.getElementById('progress-fill').style.width = '0%';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
