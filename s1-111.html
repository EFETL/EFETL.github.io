    vocab: [
      `With + O + V-ing/p.p./adj/盲禄聥莽鲁禄猫漏聻莽聣聡猫陋聻 茅聶聞氓赂露莽聥聙忙鲁聛莽職聞盲禄聥莽鲁禄猫漏聻莽聣聡猫陋聻茂录聢With pink cherry blossoms blooming 盲录麓茅職篓猫聭聴莽虏聣莽麓聟忙芦禄猫聤卤莽聸聸茅聳聥...茂录聣`,

let answered = 0;
let correct  = 0;
const total  = questions.length;

function buildQuiz() {
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';

  questions.forEach((q, idx) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.id = `card-${idx}`;

    const optionsHTML = q.options.map(opt => `
      <li>
        <button class="option-btn" id="btn-${idx}-${opt.label}"
          onclick="selectAnswer(${idx}, '${opt.label}')">
          <span class="option-tag">(${opt.label})</span>
          <span><strong>${opt.text}</strong>茫聙聙${opt.hint}</span>
        </button>
      </li>
    `).join('');

    card.innerHTML = `
      <div class="q-header">
        <div class="q-num">${q.id}</div>
        <div class="q-text">
          ${q.stem}<br>
          <em>${q.stem_zh}</em>
        </div>
      </div>
      <ul class="options">${optionsHTML}</ul>
      <div class="analysis-box" id="analysis-${idx}">
        <div class="analysis-label">冒聼聯聳 猫搂拢忙聻聬</div>
        <div class="analysis-text">${q.analysis}</div>
        <button class="more-btn" id="morebtn-${idx}" onclick="toggleSupp(${idx})">
          忙聼楼莽聹聥忙聸麓氓陇職猫拢聹氓聟聟 <span class="arrow">芒聳录</span>
        </button>
        <div class="supplement-box" id="supp-${idx}">
          <div class="supplement-label">冒聼聯職 氓聳庐氓颅聴猫拢聹氓聟聟</div>
          <ul class="vocab-list">
            ${q.vocab.map(v => `<li>${v}</li>`).join('')}
          </ul>
        </div>
      </div>
    `;

    container.appendChild(card);
  });

  updateProgress();
}

function selectAnswer(idx, chosen) {
  const q = questions[idx];
  const card = document.getElementById(`card-${idx}`);
  const analysis = document.getElementById(`analysis-${idx}`);

  q.options.forEach(opt => {
    document.getElementById(`btn-${idx}-${opt.label}`).disabled = true;
  });

  const chosenBtn = document.getElementById(`btn-${idx}-${chosen}`);
  const isCorrect = chosen === q.answer;

  if (isCorrect) {
    chosenBtn.classList.add('selected-correct');
    chosenBtn.innerHTML += `<span class="result-icon">芒聹聟</span>`;
    card.classList.add('correct');
    correct++;
  } else {
    chosenBtn.classList.add('selected-wrong');
    chosenBtn.innerHTML += `<span class="result-icon">芒聺聦</span>`;
    card.classList.add('wrong');
    const correctBtn = document.getElementById(`btn-${idx}-${q.answer}`);
    correctBtn.classList.add('reveal-correct');
    correctBtn.innerHTML += `<span class="result-icon">芒聹聟</span>`;
  }

  analysis.classList.add('visible');
  answered++;
  updateProgress();

  if (answered === total) setTimeout(showSummary, 600);
}

function toggleSupp(idx) {
  const supp = document.getElementById(`supp-${idx}`);
  const btn  = document.getElementById(`morebtn-${idx}`);
  const isOpen = supp.classList.contains('visible');
  supp.classList.toggle('visible', !isOpen);
  btn.innerHTML = isOpen
    ? `忙聼楼莽聹聥忙聸麓氓陇職猫拢聹氓聟聟 <span class="arrow">芒聳录</span>`
    : `忙聰露猫碌路猫拢聹氓聟聟 <span class="arrow">芒聳虏</span>`;
  btn.setAttribute('onclick', `toggleSupp(${idx})`);
}

function updateProgress() {
  document.getElementById('progressBar').style.width = (answered / total * 100) + '%';
  document.getElementById('progressText').textContent = `氓路虏盲陆聹莽颅聰 ${answered} / ${total} 茅隆聦`;
}

function showSummary() {
  document.getElementById('summary').style.display = 'block';
  document.getElementById('scoreDisplay').textContent = `${correct} / ${total}`;
  const pct = Math.round(correct / total * 100);
  document.getElementById('scoreMsg').textContent =
    pct === 100 ? `忙颅拢莽垄潞莽聨聡 ${pct}%茫聙聙氓陇陋氓聨虏氓庐鲁盲潞聠茂录聛氓聟篓茅聝篓莽颅聰氓掳聧茂录聛冒聼聫聠`
    : pct >= 70  ? `忙颅拢莽垄潞莽聨聡 ${pct}%茫聙聙猫隆篓莽聫戮盲赂聧茅聦炉茂录聛莽鹿录莽潞聦盲驴聺忙聦聛茂录聛冒聼聮陋`
    :              `忙颅拢莽垄潞莽聨聡 ${pct}%茫聙聙氓陇職猫陇聡莽驴聮猫搂拢忙聻聬氓聮聦猫拢聹氓聟聟茂录聦盲赂聥忙卢隆盲赂聙氓庐職忙聸麓氓楼陆茂录聛冒聼聯聳`;
  document.getElementById('summary').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
  answered = 0;
  correct  = 0;
  document.getElementById('summary').style.display = 'none';
  buildQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
