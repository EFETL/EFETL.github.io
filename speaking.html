<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEPT 初級口說測驗</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f9fafb;min-height:100vh}
header{background:#fff;border-bottom:1px solid #e5e7eb;padding:13px 18px;display:flex;align-items:center;gap:10px}
.logo{font-weight:700;font-size:15px;color:#2563eb}
.wrap{max-width:860px;margin:0 auto;padding:28px 16px 60px}
.hero{background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;border-radius:16px;padding:28px 24px;margin-bottom:28px}
.hero h1{font-size:1.5rem;font-weight:800;margin-bottom:6px}
.hero p{font-size:.88rem;opacity:.9}
a{color:inherit}
.back{display:inline-block;margin-bottom:16px;font-size:13px;color:#6b7280;text-decoration:none}
.back:hover{color:#2563eb}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:580px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:380px){.grid{grid-template-columns:1fr}}
.card{background:#fff;border-radius:16px;padding:22px 18px 18px;box-shadow:0 4px 16px rgba(0,0,0,.07);border:2px solid transparent;transition:all .2s}
.card:hover{border-color:#2563eb;transform:translateY(-3px);box-shadow:0 8px 24px rgba(37,99,235,.15)}
.card-head{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.num{width:38px;height:38px;border-radius:50%;background:#2563eb;color:#fff;font-size:15px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-title{font-size:1.1rem;font-weight:800;color:#1f2937;letter-spacing:2px}
.btn{display:inline-flex;align-items:center;gap:7px;background:#2563eb;color:#fff;border:none;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;text-decoration:none;transition:background .2s}
.btn:hover{background:#1d4ed8}
</style>
</head>
<body>
<header><div class="logo">🎙️ GEPT 初級口說</div></header>
<div class="wrap">
  <a class="back" href="gept-hub.html">← 返回英檢初級</a>
  <div class="hero">
    <h1>口說測驗</h1>
    <p>Speaking Test — 共六回練習，每回包含複誦、朗讀、回答問題三大題。</p>
  </div>
  <div class="grid">
    <div class="card">
      <div class="card-head">
        <div class="num">1</div>
        <div class="card-title">第 01 回</div>
      </div>
      <a class="btn" href="speaking1.html">▶ 互動練習</a>
    </div>
    <div class="card">
      <div class="card-head">
        <div class="num">2</div>
        <div class="card-title">第 02 回</div>
      </div>
      <a class="btn" href="speaking2.html">▶ 互動練習</a>
    </div>
    <div class="card">
      <div class="card-head">
        <div class="num">3</div>
        <div class="card-title">第 03 回</div>
      </div>
      <a class="btn" href="speaking3.html">▶ 互動練習</a>
    </div>
    <div class="card">
      <div class="card-head">
        <div class="num">4</div>
        <div class="card-title">第 04 回</div>
      </div>
      <a class="btn" href="speaking4.html">▶ 互動練習</a>
    </div>
    <div class="card">
      <div class="card-head">
        <div class="num">5</div>
        <div class="card-title">第 05 回</div>
      </div>
      <a class="btn" href="speaking5.html">▶ 互動練習</a>
    </div>
    <div class="card">
      <div class="card-head">
        <div class="num">6</div>
        <div class="card-title">第 06 回</div>
      </div>
      <a class="btn" href="speaking6.html">▶ 互動練習</a>
    </div>
  </div>
</div>
</body>
</html>
