// ── grading helpers ──
function norm(s){
  return (s||"").toLowerCase().trim()
    .replace(/[.,!?]/g,"")
    .replace(/can't/g,"can not")
    .replace(/won't/g,"will not")
    .replace(/'ve/g," have")
    .replace(/'re/g," are")
    .replace(/'ll/g," will")
    .replace(/n't/g," not")
    .replace(/\s+/g," ").trim();
}
function accepts(ans, val){
  const targets = ans.split("|").map(norm);
  return targets.includes(norm(val));
}
function firstAns(ans){ return ans.split("|")[0]; }

          '<div class="fact"><span class="lab">'+factLab+'</span>'+it.fact+'</div></div>'+
        '<div class="rewrite">'+it.pre+
          '<input data-b="1" size="10" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="?"> '+
          '<span class="hint">('+it.h1+')</span>'+it.mid+
          '<input data-b="2" size="12" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="?"> '+
          '<span class="hint">('+it.h2+')</span>'+it.post+
        '</div>'+
        '<div class="exp"><div class="ans">✔ '+it.pre.trim()+' <u>'+firstAns(it.a1)+'</u> '+it.mid.trim()+' <u>'+firstAns(it.a2)+'</u> '+it.post.trim()+'</div>'+
          '<div class="zh">💬 '+it.zh+'</div></div>'+
      '</div>';
  });
  p.innerHTML = html;
  app.appendChild(p);
});

// ── tabs ──
document.querySelectorAll(".tab").forEach(t=>{
  t.addEventListener("click",()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    document.querySelectorAll(".panel").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    document.querySelector('.panel[data-k="'+t.dataset.k+'"]').classList.add("active");
    document.getElementById("score").textContent="";
    window.scrollTo({top:0,behavior:"smooth"});
  });
});

function activeSec(){
  const k = document.querySelector(".panel.active").dataset.k;
  return DATA.find(s=>s.key===k);
}

document.getElementById("submit").addEventListener("click",()=>{
  const panel = document.querySelector(".panel.active");
  const sec = activeSec();
  let correct=0;
  panel.querySelectorAll(".q").forEach(q=>{
    const it = sec.items[+q.dataset.i];
    const ins = q.querySelectorAll("input");
    let ok=true;
    [it.a1,it.a2].forEach((ans,idx)=>{
      const el=ins[idx];
      if(accepts(ans, el.value)){ el.classList.add("ok"); el.classList.remove("no"); }
      else { el.classList.add("no"); el.classList.remove("ok"); ok=false; }
    });
    q.querySelector(".exp").classList.add("show");
    if(ok) correct++;
  });
  const total = sec.items.length;
  document.getElementById("score").textContent =
    "「"+sec.title+"」答對 "+correct+" / "+total+" 題";
  window.scrollTo({top:document.body.scrollHeight,behavior:"smooth"});
});

document.getElementById("reset").addEventListener("click",()=>{
  const panel = document.querySelector(".panel.active");
  panel.querySelectorAll("input").forEach(i=>{i.value="";i.classList.remove("ok","no");});
  panel.querySelectorAll(".exp").forEach(e=>e.classList.remove("show"));
  document.getElementById("score").textContent="";
  window.scrollTo({top:0,behavior:"smooth"});
});
</script>
