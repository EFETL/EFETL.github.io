<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/favicon.svg">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEPT 初級 閱讀測驗　第16回</title>
<style>
  :root{
    --blue:#2b8cff; --blue-dark:#1f6fe0;
    --coral:#ff7a59; --amber:#ffb02e; --pink:#ff5d8f;
    --bg:#f3f9ff; --card:#ffffff; --line:#e3edf9;
    --green:#22b573; --green-bg:#e4f8ef;
    --red:#ff5a5a; --red-bg:#ffecec;
    --gray:#6b7785;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Helvetica Neue","PingFang TC","Microsoft JhengHei",sans-serif;
    background:linear-gradient(180deg,#f0f7ff,#fff7f2 70%);color:#22303f;line-height:1.6;
    -webkit-text-size-adjust:100%;}
  .wrap{max-width:760px;margin:0 auto;padding:16px;}
  header.top{background:linear-gradient(135deg,#5ec6ff,#7d8bff 55%,#b88bff);color:#fff;
    border-radius:18px;padding:24px 22px;margin-bottom:16px;box-shadow:0 8px 22px rgba(93,141,255,.3);}
  header.top h1{margin:0 0 6px;font-size:1.5rem;text-shadow:0 1px 2px rgba(0,0,0,.12);}
  header.top p{margin:0;font-size:.92rem;opacity:.95;}
  .meta{margin-top:14px;font-size:.86rem;background:rgba(255,255,255,.22);
    padding:9px 13px;border-radius:10px;}
  .sticky{position:sticky;top:0;z-index:20;padding:10px 0;
    background:linear-gradient(180deg,#f0f7ff 70%,rgba(240,247,255,0));}
  .bar{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:11px 16px;display:flex;align-items:center;gap:12px;font-size:.9rem;
    box-shadow:0 4px 12px rgba(43,140,255,.1);}
  .bar .track{flex:1;height:9px;background:#e9f1fb;border-radius:6px;overflow:hidden;}
  .bar .fill{height:100%;width:0;border-radius:6px;
    background:linear-gradient(90deg,#3ad1c6,#2b8cff);transition:width .35s;}
  .bar #count{font-weight:700;color:var(--blue-dark);}
  .section-title{color:#fff;font-weight:800;border-radius:12px;
    padding:10px 16px;margin:24px 0 6px;font-size:1.05rem;
    box-shadow:0 4px 12px rgba(0,0,0,.08);}
  .section-title.s0{background:linear-gradient(135deg,#ff9a6c,#ff6f91);}
  .section-title.s1{background:linear-gradient(135deg,#4dd0e1,#2b8cff);}
  .section-title.s2{background:linear-gradient(135deg,#9b8bff,#b06bff);}
  .section-desc{font-size:.86rem;color:var(--gray);margin:0 4px 10px;}
  .passage{background:#fffdf4;border:1px solid #ffe9c9;border-left:5px solid var(--amber);
    border-radius:12px;padding:15px 17px;margin:14px 0;font-size:.95rem;
    box-shadow:0 3px 10px rgba(255,176,46,.08);}
  .passage h3{margin:0 0 8px;color:#e0820a;font-size:1rem;}
  .passage table{border-collapse:collapse;width:100%;margin:8px 0;font-size:.88rem;}
  .passage th,.passage td{border:1px solid #ffe0b0;padding:5px 8px;text-align:left;}
  .passage th{background:#fff2dc;}
  .email-h{font-size:.85rem;color:var(--gray);border-bottom:1px dashed #ffd9a8;
    padding-bottom:6px;margin-bottom:8px;}
  .q{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:15px 17px;margin:12px 0;box-shadow:0 3px 10px rgba(43,140,255,.07);}
  .q .stem{font-weight:600;margin-bottom:10px;}
  .q .stem .num{display:inline-block;color:#fff;background:var(--blue);font-weight:700;
    border-radius:8px;padding:1px 9px;margin-right:8px;font-size:.92rem;}
  .opt{display:flex;align-items:flex-start;gap:10px;border:2px solid var(--line);
    border-radius:11px;padding:10px 13px;margin:8px 0;cursor:pointer;transition:.15s;
    font-size:.95rem;background:#fbfdff;}
  .opt:hover{border-color:var(--blue);background:#eef6ff;}
  .opt input{margin-top:3px;accent-color:var(--blue);}
  .opt .lab{font-weight:800;color:var(--blue);min-width:18px;}
  .opt.sel{border-color:var(--blue);background:#e7f2ff;}
  .opt.correct{border-color:var(--green);background:var(--green-bg);}
  .opt.wrong{border-color:var(--red);background:var(--red-bg);}
  .opt.lock{cursor:default;}
  .exp{display:none;margin-top:11px;border-top:2px dashed #ffe1c2;padding-top:11px;font-size:.9rem;}
  .exp.show{display:block;}
  .exp .tag{display:inline-block;font-weight:800;color:#fff;background:var(--green);
    border-radius:7px;padding:2px 10px;font-size:.8rem;margin-bottom:7px;}
  .exp .tag.miss{background:var(--red);}
  .exp .en{color:#1c4f7a;background:#eef7ff;border-radius:8px;padding:6px 10px;margin:5px 0;}
  .exp .zh{color:#7a4a12;background:#fff7ea;border-radius:8px;padding:6px 10px;margin:5px 0;}
  .actions{position:sticky;bottom:0;padding:14px 0 6px;margin-top:18px;
    background:linear-gradient(transparent,#fff7f2 35%);}
  button.submit{width:100%;color:#fff;border:0;border-radius:14px;padding:16px;
    font-size:1.08rem;font-weight:800;cursor:pointer;
    background:linear-gradient(135deg,#ff8a5b,#ff5d8f);
    box-shadow:0 6px 16px rgba(255,93,143,.35);}
  button.submit:active{transform:translateY(1px);}
  button.reset{width:100%;background:#fff;color:var(--blue);border:2px solid var(--blue);
    border-radius:14px;padding:14px;font-size:1rem;font-weight:800;cursor:pointer;margin-top:10px;display:none;}
  .result{display:none;background:var(--card);border:3px solid transparent;border-radius:16px;
    padding:22px;margin:16px 0;text-align:center;
    background-image:linear-gradient(#fff,#fff),linear-gradient(135deg,#3ad1c6,#2b8cff,#b06bff);
    background-origin:border-box;background-clip:padding-box,border-box;
    box-shadow:0 8px 22px rgba(43,140,255,.15);}
  .result.show{display:block;}
  .result .score{font-size:2.8rem;font-weight:900;
    background:linear-gradient(135deg,#2b8cff,#b06bff);-webkit-background-clip:text;
    background-clip:text;-webkit-text-fill-color:transparent;}
  .result .sub{color:var(--gray);font-size:.95rem;}
  .result .bd{display:flex;justify-content:center;gap:18px;margin-top:12px;flex-wrap:wrap;font-size:.95rem;}
  .result .bd span{font-weight:800;}
  .hint{text-align:center;font-size:.85rem;color:var(--gray);margin-top:9px;min-height:1.2em;}
  footer{text-align:center;color:var(--gray);font-size:.8rem;margin:24px 0;}
</style>
</head>
<body>
<a href="gept.html" style="position:fixed;top:12px;left:12px;background:rgba(255,255,255,.92);color:#2b8cff;padding:7px 15px;border-radius:20px;text-decoration:none;font-size:.85rem;font-weight:800;z-index:999;box-shadow:0 3px 10px rgba(0,0,0,.15);">&#8592; 回題庫</a>
<div class="wrap">
  <header class="top">
    <h1>GEPT 初級　閱讀測驗　<span style="opacity:.9">第16回</span></h1>
    <p>仿真練習卷　&middot;　依官方題型與難度命題</p>
    <div class="meta">共 3 部分、30 題　|　建議作答時間 35 分鐘　|　送出後顯示完整中英文解析與分數</div>
  </header>

  <div class="sticky">
    <div class="bar">
      <span>作答進度</span>
      <div class="track"><div class="fill" id="fill"></div></div>
      <span id="count">0 / 30</span>
    </div>
  </div>

  <form id="quiz"></form>

  <div class="result" id="result">
    <div class="score" id="scoreNum">0</div>
    <div class="sub" id="scoreTxt">分</div>
    <div class="bd">
      <span style="color:var(--green)">答對 <b id="rOk">0</b></span>
      <span style="color:var(--red)">答錯 <b id="rNo">0</b></span>
      <span style="color:var(--gray)">未作答 <b id="rBlank">0</b></span>
    </div>
  </div>

  <div class="actions">
    <button type="button" class="submit" id="submitBtn">送出並查看解析</button>
    <div class="hint" id="hint">尚未作答任何題目</div>
    <button type="button" class="reset" id="resetBtn">重新作答</button>
  </div>

  <footer>GEPT 初級閱讀　仿真練習　&middot;　第二顆腦 / GEPT初級</footer>
</div>

<script>
/* ====== 題庫資料 ====== */
const PARTS = [{"title": "第一部分　詞彙", "desc": "共 10 題，每題有一個空格，請從四個選項中選出最適合題意的字或詞。"}, {"title": "第二部分　段落填空", "desc": "共 8 題，包含二個段落，每格四個選項，請依文意選出最適合的答案。"}, {"title": "第三部分　閱讀理解", "desc": "共 12 題，包含 4 個題組，請依短文內容選出最適合的答案。"}];

const PASSAGES = {"11": "<div class=\"passage\"><h3>Questions 11-14</h3>Friends are one of the most important parts of our lives. A good friend is someone you can trust and __(11)__ on when you need help. Friends make happy times more fun and difficult times easier to bear. However, friendship is not only about taking; it is also about giving. To keep a good friend, you must be a good friend __(12)__. Sometimes friends argue, __(13)__ true friends always find a way to make up. Making friends can be hard for shy people, but it is worth the effort. After all, life is much __(14)__ with friends to share it.</div>", "15": "<div class=\"passage\"><h3>Questions 15-18</h3>Albert Einstein is known as one of the smartest people who ever lived. __(15)__, he was not always seen as clever. As a child, he started speaking late, and some teachers thought he would never do well. Einstein loved to ask questions that others never thought of. He did not always follow the usual way of thinking, __(16)__ this is what helped him make his great discoveries. His ideas changed the way scientists understand time, space, and light. Einstein once said that imagination is __(17)__ important than knowledge. He believed that asking questions and never giving up are the keys __(18)__ success.</div>", "19": "<div class=\"passage\"><h3>Questions 19-21</h3><b>Natural History Museum &mdash; Special Dinosaur Exhibition</b><br>Dates: August 1 &ndash; 31 | 9 AM &ndash; 5 PM<br>Special ticket: Adult NT$350 | Child NT$200<br>&bull; See real dinosaur bones and a moving model!<br>&bull; Free guided tour at 10:30 AM and 2:30 PM.<br>&bull; The last tour starts 30 minutes before closing.<br>&bull; Tickets can be bought online or at the door.</div>", "22": "<div class=\"passage\"><h3>Questions 22-24</h3><b>FreshBite &mdash; Food Delivery Made Easy</b><br>&bull; Order meals from over 300 restaurants in your area.<br>&bull; Track your order on the map in real time.<br>&bull; Free delivery on your first three orders!<br>&bull; Pay with your phone &mdash; no cash needed.<br>&bull; Rate your meal and help others choose.<br>&bull; Download FreshBite today and get NT$50 off.</div>", "25": "<div class=\"passage\"><h3>Questions 25-27</h3><div class=\"email-h\">From: nina@mail.com　|　To: manager@greenpark.tw　|　Subject: A great visit and a small suggestion</div>Dear Manager,<br><br>Last weekend my family visited Green Park, and we had a wonderful time. The gardens were beautiful and the staff were very friendly. I am writing to share one small suggestion. We noticed that there were not enough trash cans, so some areas had litter on the ground. If you could add more trash cans along the walking paths, the park would be even cleaner. We will definitely visit again.<br><br>Nina Huang</div>", "28": "<div class=\"passage\"><h3>Questions 28-30</h3>Elephants are the largest animals that live on land, but they are also gentle and very intelligent. They live in family groups led by the oldest female, who uses her long memory to guide the others to food and water. Elephants use their long trunks for many things, such as drinking, picking up food, and even greeting their friends. They are also known to feel strong emotions and seem to feel sad when a member of their group dies. Sadly, elephants are in danger because some people hunt them. Protecting these amazing animals is very important.</div>"};

const Q = [{"n": 1, "p": 0, "stem": "Don't put off your homework; do it __________ away.", "o": ["on", "right", "far", "by"], "a": 1, "en": "\"right away\" = immediately.", "zh": "right away（立刻）。別拖延作業，馬上做。"}, {"n": 2, "p": 0, "stem": "We need to __________ a solution to this problem quickly.", "o": ["drop", "throw", "find", "lose"], "a": 2, "en": "\"find a solution\" = come up with an answer.", "zh": "find a solution（找出解決辦法）。lose/drop/throw 不合。"}, {"n": 3, "p": 0, "stem": "She broke the rules, so she had to __________ the price.", "o": ["buy", "pay", "take", "give"], "a": 1, "en": "\"pay the price\" = face the result.", "zh": "pay the price（付出代價）。違規就得承擔後果。"}, {"n": 4, "p": 0, "stem": "After the accident, traffic came to a __________.", "o": ["stop", "start", "run", "jump"], "a": 0, "en": "\"come to a stop\" = stop completely.", "zh": "come to a stop（停下來）。事故後交通完全停滯。"}, {"n": 5, "p": 0, "stem": "I can't __________ up with his rude behavior any longer.", "o": ["put", "take", "give", "keep"], "a": 0, "en": "\"put up with\" = tolerate.", "zh": "put up with（忍受）。我再也受不了他無禮的行為。"}, {"n": 6, "p": 0, "stem": "He spoke slowly __________ everyone could understand.", "o": ["although", "but", "so that", "because"], "a": 2, "en": "\"so that everyone could understand\" = in order to.", "zh": "so that（以便）。他說得慢，好讓大家都聽懂。"}, {"n": 7, "p": 0, "stem": "__________ his young age, he plays the piano very well.", "o": ["Instead", "Thanks", "Despite", "Because"], "a": 2, "en": "\"Despite + noun\" = even with.", "zh": "Despite（儘管）後接名詞。儘管年紀小，他鋼琴彈得很好。"}, {"n": 8, "p": 0, "stem": "The story had a happy __________, and everyone smiled.", "o": ["ending", "beginning", "cover", "title"], "a": 0, "en": "\"a happy ending\" = a good finish.", "zh": "a happy ending（快樂結局）。故事結局圓滿。beginning 開頭、cover 封面、title 標題，不合。"}, {"n": 9, "p": 0, "stem": "Please __________ down your name and phone number here.", "o": ["take", "look", "turn", "write"], "a": 3, "en": "\"write down\" = put on paper.", "zh": "write down（寫下）。請在這裡寫下姓名和電話。"}, {"n": 10, "p": 0, "stem": "The teacher told us to __________ attention to the safety rules.", "o": ["take", "pay", "give", "make"], "a": 1, "en": "\"pay attention to\" = focus on.", "zh": "pay attention to（注意）。老師要我們注意安全規則。"}, {"n": 11, "p": 1, "stem": "(11)", "o": ["wait", "look", "listen", "count"], "a": 3, "en": "\"count on someone\" = depend on them.", "zh": "count on（依靠、信賴）。好朋友是你需要時可以信賴的人。"}, {"n": 12, "p": 1, "stem": "(12)", "o": ["too", "either", "instead", "only"], "a": 0, "en": "\"be a good friend too\" = also.", "zh": "too（也）放句尾。想留住好友，你也要當個好友。either 用於否定句。"}, {"n": 13, "p": 1, "stem": "(13)", "o": ["so", "but", "because", "or"], "a": 1, "en": "Argue, BUT true friends make up. Contrast.", "zh": "朋友有時吵架，「但」真朋友總會和好，前後對比用 but。"}, {"n": 14, "p": 1, "stem": "(14)", "o": ["best", "well", "good", "better"], "a": 3, "en": "\"much better with friends\" — comparative.", "zh": "much better（好得多），比較級。有朋友分享，人生美好得多。"}, {"n": 15, "p": 1, "stem": "(15)", "o": ["Because", "So", "However", "Therefore"], "a": 2, "en": "Contrast: smart now, HOWEVER not always seen as clever.", "zh": "如今被視為最聰明的人之一，「然而」他並非一直被看好，用 However。"}, {"n": 16, "p": 1, "stem": "(16)", "o": ["because", "or", "so", "but"], "a": 3, "en": "Didn't follow usual thinking, BUT that helped him. Contrast.", "zh": "他不照常規思考，「但」這正是他能有大發現的原因，用 but。"}, {"n": 17, "p": 1, "stem": "(17)", "o": ["most", "much", "very", "more"], "a": 3, "en": "\"more important than knowledge\" — comparative with than.", "zh": "more important than（比…更重要），有 than 用比較級 more。"}, {"n": 18, "p": 1, "stem": "(18)", "o": ["to", "for", "of", "with"], "a": 0, "en": "\"the keys to success\" = leading to success.", "zh": "the keys to success（成功的關鍵）。介系詞用 to。"}, {"n": 19, "p": 2, "stem": "How much is a child's ticket for the special exhibition?", "o": ["Free", "NT$350", "NT$200", "NT$150"], "a": 2, "en": "\"Child NT$200.\"", "zh": "特展兒童票 NT$200。"}, {"n": 20, "p": 2, "stem": "When does the last guided tour of the day start?", "o": ["4:30 PM", "5:00 PM", "9:00 AM", "2:30 PM"], "a": 0, "en": "Closes 5 PM; last tour 30 minutes before = 4:30 PM.", "zh": "閉館 5 PM，最後一場導覽在「閉館前 30 分鐘」即 4:30 PM。"}, {"n": 21, "p": 2, "stem": "Where can you buy tickets?", "o": ["By phone", "Only online", "Only at the door", "Online or at the door"], "a": 3, "en": "\"Tickets can be bought online or at the door.\"", "zh": "門票可「線上或現場」購買。"}, {"n": 22, "p": 2, "stem": "What is special about your first three orders?", "o": ["They are half price", "Free delivery", "You get free food", "They come faster"], "a": 1, "en": "\"Free delivery on your first three orders!\"", "zh": "前三筆訂單「免運費」。"}, {"n": 23, "p": 2, "stem": "How can you pay for your food?", "o": ["Only with cash", "With your phone", "At the restaurant", "By check"], "a": 1, "en": "\"Pay with your phone — no cash needed.\"", "zh": "用「手機付款」，不需現金。"}, {"n": 24, "p": 2, "stem": "What do you get for downloading the app?", "o": ["A free phone", "NT$50 off", "Three free meals", "A map"], "a": 1, "en": "\"Download FreshBite today and get NT$50 off.\"", "zh": "下載 App 可得「NT$50 折扣」。"}, {"n": 25, "p": 2, "stem": "What is the main purpose of this email?", "o": ["To ask for a refund", "To cancel a visit", "To complain about the staff", "To praise the park and make a suggestion"], "a": 3, "en": "She praises the park and suggests more trash cans.", "zh": "主要是「稱讚公園並提出建議」（多放垃圾桶）。"}, {"n": 26, "p": 2, "stem": "What problem did Nina notice?", "o": ["The gardens were ugly", "There were not enough trash cans", "The staff were rude", "It was too expensive"], "a": 1, "en": "\"there were not enough trash cans, so some areas had litter.\"", "zh": "她注意到「垃圾桶不夠」，導致有些地方有垃圾。"}, {"n": 27, "p": 2, "stem": "What is Nina's suggestion?", "o": ["Lower the price", "Plant more flowers", "Add more trash cans", "Hire more staff"], "a": 2, "en": "\"add more trash cans along the walking paths.\"", "zh": "她建議「沿步道多設垃圾桶」。"}, {"n": 28, "p": 2, "stem": "Who leads an elephant family group?", "o": ["The oldest female", "The youngest", "All of them", "The biggest male"], "a": 0, "en": "\"led by the oldest female.\"", "zh": "象群由「年紀最大的母象」帶領，她靠長記憶帶大家找水和食物。"}, {"n": 29, "p": 2, "stem": "What do elephants use their trunks for?", "o": ["For hearing", "Only for drinking", "Drinking, eating, and greeting", "For running"], "a": 2, "en": "\"drinking, picking up food, and even greeting their friends.\"", "zh": "大象用長鼻子「喝水、取食、甚至打招呼」。"}, {"n": 30, "p": 2, "stem": "Why are elephants in danger?", "o": ["Some people hunt them", "They are too gentle", "The weather is cold", "They have no food"], "a": 0, "en": "\"elephants are in danger because some people hunt them.\"", "zh": "大象瀕危是因為「有些人獵殺牠們」。"}];
/* ====== 產生畫面 ====== */
const form = document.getElementById('quiz');
let lastPart = -1;
Q.forEach(q=>{
  if(q.p!==lastPart){
    const st=document.createElement('div'); st.className='section-title s'+q.p; st.textContent=PARTS[q.p].title;
    const sd=document.createElement('div'); sd.className='section-desc'; sd.textContent=PARTS[q.p].desc;
    form.appendChild(st); form.appendChild(sd); lastPart=q.p;
  }
  if(PASSAGES[q.n]){ const d=document.createElement('div'); d.innerHTML=PASSAGES[q.n]; form.appendChild(d.firstChild); }
  const card=document.createElement('div'); card.className='q'; card.id='q'+q.n;
  const isBlank=/^\(\d+\)$/.test(q.stem);
  const stemHtml = isBlank ? `第 ${q.n} 格` : q.stem;
  card.innerHTML=`<div class="stem"><span class="num">${q.n}</span>${stemHtml}</div>`;
  q.o.forEach((opt,i)=>{
    const lab=document.createElement('label'); lab.className='opt'; lab.dataset.i=i;
    lab.innerHTML=`<input type="radio" name="q${q.n}" value="${i}"><span class="lab">${'ABCD'[i]}</span><span>${opt}</span>`;
    lab.querySelector('input').addEventListener('change',()=>{
      card.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
      lab.classList.add('sel'); updateProgress();
    });
    card.appendChild(lab);
  });
  const exp=document.createElement('div'); exp.className='exp'; exp.id='exp'+q.n;
  card.appendChild(exp);
  form.appendChild(card);
});

const submitBtn=document.getElementById('submitBtn');
const resetBtn=document.getElementById('resetBtn');
const hint=document.getElementById('hint');

function answeredCount(){ let c=0; Q.forEach(q=>{ if(form.querySelector(`input[name="q${q.n}"]:checked`)) c++; }); return c; }
function updateProgress(){
  const c=answeredCount();
  document.getElementById('count').textContent=`${c} / 30`;
  document.getElementById('fill').style.width=(c/30*100)+'%';
  hint.textContent = c===30 ? '已完成全部 30 題' : (c===0 ? '尚未作答任何題目（仍可送出查看解析）' : `已作答 ${c} 題，未作答 ${30-c} 題（仍可送出）`);
}

submitBtn.addEventListener('click',()=>{
  let ok=0, blank=0;
  Q.forEach(q=>{
    const sel=form.querySelector(`input[name="q${q.n}"]:checked`);
    const pick = sel ? parseInt(sel.value) : null;
    if(pick===null) blank++;
    const card=document.getElementById('q'+q.n);
    card.querySelectorAll('.opt').forEach(o=>{
      o.classList.add('lock');
      o.querySelector('input').disabled=true;
      const i=parseInt(o.dataset.i);
      if(i===q.a) o.classList.add('correct');
      if(pick!==null && i===pick && pick!==q.a) o.classList.add('wrong');
    });
    const correct = pick===q.a; if(correct) ok++;
    const exp=document.getElementById('exp'+q.n);
    const tag = correct ? '答對' : (pick===null ? '未作答' : '答錯');
    exp.innerHTML=`<span class="tag ${correct?'':'miss'}">${tag}　正解：${'ABCD'[q.a]}</span>
      <div class="en"><b>EN</b>&nbsp;${q.en}</div><div class="zh"><b>中</b>&nbsp;${q.zh}</div>`;
    exp.classList.add('show');
  });
  const res=document.getElementById('result');
  document.getElementById('scoreNum').textContent=Math.round(ok/30*100);
  document.getElementById('scoreTxt').textContent=`分（答對 ${ok} / 30 題）`;
  document.getElementById('rOk').textContent=ok;
  document.getElementById('rNo').textContent=30-ok-blank;
  document.getElementById('rBlank').textContent=blank;
  res.classList.add('show');
  submitBtn.style.display='none'; hint.style.display='none'; resetBtn.style.display='block';
  res.scrollIntoView({behavior:'smooth'});
});

resetBtn.addEventListener('click',()=>{
  form.reset();
  Q.forEach(q=>{
    const card=document.getElementById('q'+q.n);
    card.querySelectorAll('.opt').forEach(o=>{o.classList.remove('sel','correct','wrong','lock');o.querySelector('input').disabled=false;});
    document.getElementById('exp'+q.n).classList.remove('show');
  });
  document.getElementById('result').classList.remove('show');
  submitBtn.style.display='block'; hint.style.display='block'; resetBtn.style.display='none';
  updateProgress();
  window.scrollTo({top:0,behavior:'smooth'});
});

updateProgress();
</script>
</body>
</html>
