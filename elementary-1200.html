<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>國小 1200 單字 · 記憶樂園</title>
<style>
:root{
  --pink:#ff8fb1; --peach:#ffb26b; --yellow:#ffd93d; --mint:#7ce0c3; --sky:#7cc4ff;
  --purple:#b69cff; --grape:#8f7bff; --ink:#4a4a68; --cream:#fff7ea; --card:#ffffff;
  --shadow:rgba(120,110,160,.25);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:'Baloo 2','Chalkboard SE','Comic Sans MS','PingFang TC','Microsoft JhengHei',sans-serif;
  color:var(--ink);
  background:linear-gradient(160deg,#c8ecff 0%,#e9f9f1 40%,#fff5e6 100%);
  min-height:100vh;overflow-x:hidden;
}
/* floating background blobs */
.blobs{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.blob{position:absolute;font-size:44px;opacity:.5;animation:float 9s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0) rotate(-6deg)}50%{transform:translateY(-22px) rotate(6deg)}}
.wrap{position:relative;z-index:1;max-width:920px;margin:0 auto;padding:16px 14px 60px}

/* header */
header{text-align:center;padding:14px 0 6px}
header h1{margin:.1em 0;font-size:30px;color:#ff5e93;text-shadow:2px 2px 0 #fff, 4px 4px 0 rgba(255,94,147,.18)}
header .sub{font-size:14px;color:#7a7a95;margin-bottom:4px}
.mascot{font-size:52px;line-height:1;display:inline-block;animation:bob 2.4s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.vhint{max-width:520px;margin:10px auto 0;background:#fff6d6;border:3px solid #ffe08a;border-radius:20px;
  padding:10px 16px;font-size:14px;line-height:1.55;color:#8a6d2f;box-shadow:0 4px 12px rgba(200,170,80,.25);
  animation:bob 3.2s ease-in-out infinite}
.vhint b{color:#e8830a}

/* home round grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px;margin-top:14px}
.rcard{position:relative;border:none;cursor:pointer;border-radius:22px;padding:16px 12px 14px;color:#fff;
  box-shadow:0 8px 0 var(--rc-dark),0 12px 20px var(--shadow);text-align:center;transition:transform .12s,box-shadow .12s;
  overflow:hidden}
.rcard:active{transform:translateY(4px);box-shadow:0 4px 0 var(--rc-dark),0 8px 14px var(--shadow)}
.rcard .rno{font-size:15px;font-weight:700;opacity:.95}
.rcard .remoji{font-size:40px;margin:6px 0 2px;line-height:1}
.rcard .rrange{font-size:12px;opacity:.95;background:rgba(255,255,255,.28);border-radius:20px;padding:2px 8px;display:inline-block}
.rcard .rstar{position:absolute;top:8px;right:10px;font-size:18px;filter:drop-shadow(0 1px 1px rgba(0,0,0,.2))}
.rcard .rbest{font-size:11px;margin-top:6px;opacity:.95}

/* round view */
.topbar{display:flex;align-items:center;gap:10px;margin:6px 0 12px}
.back{background:#fff;border:3px solid #ffd93d;color:#ff8a3d;font-weight:800;border-radius:30px;
  padding:8px 16px;font-size:16px;cursor:pointer;box-shadow:0 4px 0 #f2c200}
.back:active{transform:translateY(3px);box-shadow:0 1px 0 #f2c200}
.rtitle{font-size:22px;font-weight:800;color:#ff5e93}
.tabs{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:14px}
.tab{border:none;border-radius:30px;padding:9px 16px;font-size:15px;font-weight:800;cursor:pointer;
  background:#fff;color:#8a8aa5;box-shadow:0 4px 0 #e3e0ef}
.tab.on{background:linear-gradient(135deg,#ff9ec7,#ff7aa8);color:#fff;box-shadow:0 4px 0 #e85a92}
.tab:active{transform:translateY(3px)}

/* flashcards */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
.fc{perspective:1000px;height:180px;cursor:pointer}
.fc-in{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d}
.fc.flip .fc-in{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:22px;padding:10px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
  box-shadow:0 6px 0 var(--fc-dark),0 10px 16px var(--shadow)}
.fc-front{background:#fff;border:4px solid var(--fc-col)}
.fc-emoji{font-size:56px;line-height:1;margin-bottom:4px;cursor:pointer;transition:transform .1s}
.fc-emoji:active{transform:scale(.82)}
.prompt-emoji{cursor:pointer;transition:transform .1s}
.prompt-emoji:active{transform:scale(.86)}
.fc-en{font-size:20px;font-weight:800;color:var(--ink);word-break:break-word}
.fc-hint{font-size:11px;color:#b3b0c6;margin-top:4px}
.fc-back{background:var(--fc-col);color:#fff;transform:rotateY(180deg);border:4px solid var(--fc-col)}
.fc-zh{font-size:22px;font-weight:800;margin-bottom:6px}
.fc-tip{font-size:14px;line-height:1.5;background:rgba(255,255,255,.28);border-radius:14px;padding:7px 9px}
.spk{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.9);border:none;border-radius:50%;
  width:34px;height:34px;font-size:17px;cursor:pointer;box-shadow:0 2px 5px rgba(0,0,0,.15);z-index:2}
.spk:active{transform:scale(.9)}

/* quiz + picture */
.q{background:#fff;border-radius:24px;padding:20px 16px;box-shadow:0 8px 0 #e9e5f5,0 12px 22px var(--shadow);text-align:center}
.q .prompt-emoji{font-size:72px;line-height:1;margin:4px 0}
.q .prompt-txt{font-size:26px;font-weight:800;color:#ff5e93;margin:6px 0 4px}
.q .prompt-sub{font-size:14px;color:#9a97b3;margin-bottom:14px}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px}
.opt{border:none;border-radius:18px;padding:16px 10px;font-size:18px;font-weight:800;cursor:pointer;
  background:#fff;border:3px solid #ffd0e2;color:var(--ink);box-shadow:0 4px 0 #f3c9dd}
.opt:active{transform:translateY(3px)}
.opt.right{background:#7ce0c3;border-color:#4cc9a3;color:#fff;box-shadow:0 4px 0 #3fb894}
.opt.wrong{background:#ffb3b3;border-color:#ff8a8a;color:#fff;box-shadow:0 4px 0 #ef7676}
.qbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-weight:800;color:#8a8aa5}
.progress{height:12px;background:#eee6f7;border-radius:20px;overflow:hidden;margin-bottom:14px}
.progress > i{display:block;height:100%;background:linear-gradient(90deg,#ffd93d,#ff9ec7);width:0;transition:width .3s}
.next{margin-top:16px;background:linear-gradient(135deg,#7cc4ff,#5aa9ff);color:#fff;border:none;border-radius:30px;
  padding:12px 28px;font-size:17px;font-weight:800;cursor:pointer;box-shadow:0 5px 0 #3f8fe0}
.next:active{transform:translateY(3px);box-shadow:0 2px 0 #3f8fe0}
.done{text-align:center;padding:16px}
.done .big{font-size:80px}
.done h2{color:#ff5e93;font-size:26px;margin:6px 0}
.done .sc{font-size:20px;font-weight:800;color:#ff9838}
.pill{display:inline-block;background:#fff;border-radius:30px;padding:8px 16px;margin:6px 4px;font-weight:800;
  box-shadow:0 3px 8px var(--shadow);cursor:pointer;color:#7aa8ff}
.tip-inline{font-size:14px;color:#8a8aa5;margin-top:10px}

/* 配對遊戲 (memory pairs) */
.pgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:12px 0}
.pcard{perspective:700px;height:92px;cursor:pointer}
.pc-in{position:relative;width:100%;height:100%;transition:transform .4s;transform-style:preserve-3d}
.pcard.flip .pc-in{transform:rotateY(180deg)}
.pc-back,.pc-front{position:absolute;inset:0;backface-visibility:hidden;border-radius:16px;display:flex;
  flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:4px;overflow:hidden}
.pc-back{background:linear-gradient(135deg,#b9a7ff,#8f7bff);color:#fff;font-size:32px;font-weight:800;box-shadow:0 4px 0 rgba(120,100,200,.35)}
.pc-front{background:#fff;border:3px solid var(--pc);transform:rotateY(180deg)}
.pc-emoji{font-size:30px;line-height:1}
.pc-en{font-size:13px;font-weight:800;color:var(--ink);word-break:break-word;line-height:1.1;margin-top:2px}
.pc-zh{font-size:16px;font-weight:800;color:var(--ink);padding:0 2px}
.pcard.done .pc-front{background:#d6f7ec;border-color:#4cc9a3}
.pcard.done{cursor:default}

/* 連連看 (connect) */
.ll{position:relative;display:flex;justify-content:space-between;gap:34px}
.lllines{position:absolute;inset:0;pointer-events:none;z-index:0}
.llcol{display:flex;flex-direction:column;gap:12px;flex:1;position:relative;z-index:1}
.llbtn{border:none;border-radius:16px;padding:13px 8px;font-size:16px;font-weight:800;cursor:pointer;
  background:#fff;border:3px solid #ffd0e2;color:var(--ink);box-shadow:0 3px 0 #f3c9dd;transition:transform .1s}
.llbtn:active{transform:scale(.96)}
.llbtn.sel{border-color:#7cc4ff;background:#eaf5ff;box-shadow:0 3px 0 #a9d4ff}
.llbtn.mm{border-color:#4cc9a3;background:#d6f7ec;color:#2f9c7d;box-shadow:0 3px 0 #9be3cd;cursor:default}
.llbtn.bad{border-color:#ff8a8a;background:#ffe3e3;animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.lle{font-size:20px}
footer{text-align:center;color:#a7a4bd;font-size:12px;margin-top:30px}
</style>
</head>
<body>
<div class="blobs" id="blobs"></div>
<div class="wrap">
  <header>
    <div class="mascot" id="mascot">🦉</div>
    <h1>國小 1200 單字 · 記憶樂園</h1>
    <div class="sub">教育部國中小基本英語字彙 · 20 字一回 · 記憶法闖關</div>
    <div class="vhint" id="voicehint">📢 <b>小提醒</b>：手機（尤其 iPhone）第一次請先<b>點畫面任何一處</b>解鎖發音，之後點卡通圖或 🔊 就會唸出來囉！</div>
  </header>
  <div id="view"></div>
  <footer>用「圖像＋諧音＋反覆回想」記單字最有效 🌈 進度會自動存在這台裝置</footer>
</div>

<script>
const DATA = [{"n": 1, "en": "a (an)", "zh": "一(個)", "emoji": "1️⃣", "tip": "a 唸「欸」，就像看到一個東西時輕輕說『欸，一個耶！』，a 就是『一個』。"}, {"n": 2, "en": "a few", "zh": "一些", "emoji": "🫐", "tip": "few 唸起來像『飛啊』，想像盤子裡『一些』藍莓，幾顆快飛走，只剩一點點。"}, {"n": 3, "en": "a little", "zh": "一些", "emoji": "🥄", "tip": "little 唸『里頭』，想像瓶子里頭只剩一點點糖，用小湯匙舀『一些些』。"}, {"n": 4, "en": "a lot", "zh": "許多", "emoji": "🎈", "tip": "lot 唸『辣』，想像一大堆辣椒『許多許多』，多到數不完，這就是 a lot！"}, {"n": 5, "en": "able", "zh": "能夠…的", "emoji": "💪", "tip": "able 唸『欸剝』，想像你有力氣把橘子皮欸～一下剝開，代表你『能夠做到』。"}, {"n": 6, "en": "about", "zh": "關於", "emoji": "💬", "tip": "about 唸『餓爆』，想像肚子餓爆時一直講『關於』食物的事，about 就是關於。"}, {"n": 7, "en": "above", "zh": "在…上方", "emoji": "⬆️", "tip": "above 唸『餓不』，太陽高高掛在『上方』，肚子餓不餓它都在頭頂喔。"}, {"n": 8, "en": "abroad", "zh": "在國外", "emoji": "✈️", "tip": "abroad 唸『餓不肉的』，想像去『國外』玩，餓了卻吃不到肉，好想念台灣。"}, {"n": 9, "en": "across", "zh": "在…對面", "emoji": "🚶", "tip": "across 唸『恶克肉思』，想像走到馬路『對面』去吃那塊肉，穿越斑馬線過去。"}, {"n": 10, "en": "actress", "zh": "女演員", "emoji": "🎭", "tip": "actress 唸『愛葵絲』，想像愛漂亮的葵絲姐姐站上舞台，她是『女演員』。"}, {"n": 11, "en": "afraid", "zh": "害怕的", "emoji": "😨", "tip": "afraid 唸『餓福瑞』，想像小狗福瑞肚子餓又打雷，牠好『害怕』縮在角落。"}, {"n": 12, "en": "after", "zh": "在…之後", "emoji": "⏰", "tip": "after 唸『欸副特』，想像做完功課『之後』，欸～副班長特別放你去玩。"}, {"n": 13, "en": "afternoon", "zh": "下午", "emoji": "🌇", "tip": "afternoon 拆成 after(之後)+noon(中午)，中午『之後』就是『下午』啦！"}, {"n": 14, "en": "again", "zh": "再一次", "emoji": "🔁", "tip": "again 唸『餓跟』，想像肚子餓跟著你，吃完還想『再一次』，again 就是再來一遍。"}, {"n": 15, "en": "age", "zh": "年齡", "emoji": "🎂", "tip": "age 唸『欸居』，想像過生日時大家問你『欸，你幾歲居？』age 就是年齡。"}, {"n": 16, "en": "ago", "zh": "以前", "emoji": "⌛", "tip": "ago 唸『餓夠』，想像『以前』肚子餓夠了才吃飯，ago 是指過去的時候。"}, {"n": 17, "en": "agree", "zh": "同意", "emoji": "🤝", "tip": "agree 唸『餓鬼』，想像餓鬼說『分你一半好嗎？』你點頭『同意』說好！"}, {"n": 18, "en": "ahead", "zh": "在前方", "emoji": "➡️", "tip": "ahead 唸『餓黑的』，想像天餓黑了還往『前方』走，ahead 就是在前面。"}, {"n": 19, "en": "air", "zh": "空氣", "emoji": "💨", "tip": "air 唸『欸兒』，想像吹氣球時『欸～』一口氣灌進去，那就是『空氣』。"}, {"n": 20, "en": "airplane", "zh": "飛機", "emoji": "🛩️", "tip": "airplane 拆成 air(空氣)+plane，在『空氣』中飛的大東西，就是『飛機』！"}, {"n": 21, "en": "airport", "zh": "機場", "emoji": "🛬", "tip": "airport 拆成 air(空氣、飛機)+port(港口)，飛機停靠的港口就是『機場』。"}, {"n": 22, "en": "all", "zh": "全部的", "emoji": "🌍", "tip": "all 唸『歐』，想像張大嘴巴『歐～』把『全部』糖果都收下，all 就是全部。"}, {"n": 23, "en": "almost", "zh": "幾乎", "emoji": "🤏", "tip": "almost 唸『歐摸斯特』，想像手快摸到餅乾，『幾乎』就要碰到了，差一點點！"}, {"n": 24, "en": "along", "zh": "沿著", "emoji": "🛤️", "tip": "along 唸『餓弄』，想像肚子餓沿著小路弄零食吃，along 就是『沿著』路走。"}, {"n": 25, "en": "already", "zh": "已經", "emoji": "✅", "tip": "already 唸『歐瑞底』，想像功課歐～瑞底寫到底完成了，already 就是『已經』好了。"}, {"n": 26, "en": "also", "zh": "也", "emoji": "➕", "tip": "also 唸『歐搜』，想像歐～搜到寶，我有你『也』有，also 就是『也』一起。"}, {"n": 27, "en": "always", "zh": "總是", "emoji": "♾️", "tip": "always 唸『歐維斯』，想像維斯這個好朋友『總是』在你身邊，永遠都在。"}, {"n": 28, "en": "a.m.", "zh": "上午", "emoji": "🌅", "tip": "a.m. 是早上的縮寫，想像太陽 A（第一個字母）最早出來，就是『上午』。"}, {"n": 29, "en": "America", "zh": "美國", "emoji": "🗽", "tip": "America 唸『喔妹瑞卡』，想像妹妹拿著瑞卡（卡片）飛去『美國』看自由女神。"}, {"n": 30, "en": "American", "zh": "美國人；美國的", "emoji": "🇺🇸", "tip": "American 是 America 加 n，America(美國)的人，就是『美國人』。"}, {"n": 31, "en": "and", "zh": "和", "emoji": "🔗", "tip": "and 唸『安的』，想像牽手安安穩穩的，把你『和』我連在一起，and 就是和。"}, {"n": 32, "en": "angry", "zh": "生氣的", "emoji": "😠", "tip": "angry 唸『骯鬼』，想像小鬼鬧脾氣鼓臉頰，氣呼呼的樣子就是『生氣的』。"}, {"n": 33, "en": "animal", "zh": "動物", "emoji": "🐾", "tip": "animal 唸『愛你摸』，想像小動物毛茸茸，愛你去摸摸牠，animal 就是『動物』。"}, {"n": 34, "en": "another", "zh": "另一個的", "emoji": "🔄", "tip": "another 唸『餓那得』，想像餓了那就再得『另一個』麵包，another 是別的一個。"}, {"n": 35, "en": "answer", "zh": "回答", "emoji": "🙋", "tip": "answer 唸『安色』，想像舉手安安穩穩地『回答』問題，answer 就是回答。"}, {"n": 36, "en": "ant", "zh": "螞蟻", "emoji": "🐜", "tip": "ant 唸起來像『阿姨』，想像阿姨蹲下來看一排小小的『螞蟻』搬東西。"}, {"n": 37, "en": "any", "zh": "任何的", "emoji": "❓", "tip": "any 唸『欸你』，想像問『欸，你有任何餅乾嗎？』any 就是『任何的』。"}, {"n": 38, "en": "anyone", "zh": "任何人", "emoji": "🙆", "tip": "anyone 是 any(任何)+one(一個人)，任何一個人，就是『任何人』都可以。"}, {"n": 39, "en": "anything", "zh": "任何事物", "emoji" tip": "east 唸「以斯特」，太陽從東方升起，「一」大早往東邊看就看到啦！"}, {"n": 290, "en": "Easter", "zh": "復活節", "emoji": "🐰", "tip": "Easter 是 east 加 er，復活節的兔子藏彩蛋，記得「east（東）」再加 er！"}, {"n": 291, "en": "easy", "zh": "容易的", "emoji": "😌", "tip": "easy 唸「以日」，這題好簡單，「以」前就會了，容易到笑咪咪！"}, {"n": 292, "en": "eat", "zh": "吃", "emoji": "😋", "tip": "eat 唸「一特」，張開嘴巴「一」口吃下飯，吃得飽飽長高高！"}, {"n": 293, "en": "egg", "zh": "蛋", "emoji": "🥚", "tip": "egg 唸「欸格」，母雞「咯咯」生下一顆蛋，圓圓的蛋殼白白的！"}, {"n": 294, "en": "eight", "zh": "八", "emoji": "8️⃣", "tip": "eight 唸「欸特」，數字八像雪人疊起來，gh 不發音躲起來囉！"}, {"n": 295, "en": "eighteen", "zh": "十八", "emoji": "🔢", "tip": "eighteen 是 eight（八）加 teen，八加上 teen 就是十八，數數看有十八個！"}, {"n": 296, "en": "eighth", "zh": "第八", "emoji": "🥇", "tip": "eighth 是 eight 加 th，排隊排到第八個，八（eight）加 th 就是第八！"}, {"n": 297, "en": "eighty", "zh": "八十", "emoji": "🔟", "tip": "eighty 是 eight 加 ty，八（eight）加 ty，一下子變好多，就是八十！"}, {"n": 298, "en": "either", "zh": "也不", "emoji": "🙅", "tip": "either 唸「衣惹」，你不去我「也不」去，兩個人都搖搖頭說不要！"}, {"n": 299, "en": "elementary school", "zh": "小學", "emoji": "🏫", "tip": "elementary school 是「基礎（elementary）＋學校（school）」，我們念書的地方就是小學！"}, {"n": 300, "en": "elephant", "zh": "大象", "emoji": "🐘", "tip": "elephant 唸「欸勒方」，大象鼻子「勒」很長，噴水玩耍像大水管！"}, {"n": 301, "en": "eleven", "zh": "十一", "emoji": "1️⃣1️⃣", "tip": "eleven（一了問）：數到10之後「一了問」，接著就是11！十一根手指頭數不完，多一根冒出來。"}, {"n": 302, "en": "eleventh", "zh": "第十一(的)", "emoji": "🥇", "tip": "eleventh 就是 eleven 加上 th（第）。排隊排到「第十一」個，尾巴多黏一個 th 就變序數囉。"}, {"n": 303, "en": "else", "zh": "其他的", "emoji": "🤷", "tip": "else（愛耳司）：「還要別的嗎？」用耳朵聽聽看，還有沒有「其他的」東西？"}, {"n": 304, "en": "e-mail", "zh": "電子郵件", "emoji": "📧", "tip": "e-mail 就是「電子(e)＋信(mail)」。e 是電子小尾巴，貼在信前面，秒速飛到對方信箱！"}, {"n": 305, "en": "end", "zh": "結束", "emoji": "🔚", "tip": "end（安的）：故事說到最後，大家「安」心地說「這樣就結束了」，蓋上棉被睡覺。"}, {"n": 306, "en": "engineer", "zh": "工程師", "emoji": "👷", "tip": "engineer（引擎尼耳）：會修「引擎(engine)」的人就是工程師，戴安全帽，把機器修得嚕嚕叫。"}, {"n": 307, "en": "English", "zh": "英語", "emoji": "🔤", "tip": "English（英國利許）：從「英」國來的語言，就叫英語！開頭 E 記得要戴大寫帽子。"}, {"n": 308, "en": "enjoy", "zh": "喜愛", "emoji": "😄", "tip": "enjoy（引揪矣）：好玩到把朋友都「引」來一起「揪」團，大家開心地喜愛這件事！"}, {"n": 309, "en": "enough", "zh": "足夠的", "emoji": "🙆", "tip": "enough（伊那夫）：媽媽夾菜夾到「伊那麼多」，你趕快說「夠了夠了」，肚子已經足夠飽啦。"}, {"n": 310, "en": "enter", "zh": "進入", "emoji": "🚪", "tip": "enter（安特）：按下鍵盤 Enter 鍵，門一開你就「安」穩地走進去，這就是進入。"}, {"n": 311, "en": "envelope", "zh": "信", "emoji": "✉️", "tip": "envelope（安服樓普）：把信紙折好塞進去、封起來的紙套，就是信封，像信的小睡袋。"}, {"n": 312, "en": "eraser", "zh": "橡皮擦", "emoji": "🧽", "tip": "eraser（伊瑞ㄙㄜˋ）：寫錯字時，橡皮擦「一擦」就乾淨。字尾 er 是它工作的小工人。"}, {"n": 313, "en": "eve", "zh": "前夕", "emoji": "🌙", "tip": "eve（伊夫）：過節「一」前的那個晚上就是前夕，像聖誕夜，大家興奮等著明天到來。"}, {"n": 314, "en": "even", "zh": "甚至", "emoji": "😲", "tip": "even（伊墳）：連平常最安靜的他「甚至」都笑了！even 就是「連…都」讓你驚訝。"}, {"n": 315, "en": "evening", "zh": "傍晚", "emoji": "🌆", "tip": "evening（伊夫寧）：eve（前夕）＋ning，太陽下山、天色變暗的傍晚，最適合寧靜散步。"}, {"n": 316, "en": "ever", "zh": "曾經", "emoji": "⏳", "tip": "ever（愛福）：「你曾經去過嗎？」ever 在問過去，把時間往回倒帶找找看。"}, {"n": 317, "en": "every", "zh": "每一個(的)", "emoji": "💯", "tip": "every（愛福瑞）：ever 加個 y，「每一個」都愛，全部一個不漏都圈起來！"}, {"n": 318, "en": "everyone", "zh": "每一個人", "emoji": "🙋", "tip": "everyone 就是 every（每一）＋one（人），「每一個人」通通舉手，一個都不能少。"}, {"n": 319, "en": "everything", "zh": "每件事", "emoji": "🌍", "tip": "everything 就是 every（每一）＋thing（東西），「每件事」全包了，整個世界都算進來！"}, {"n": 320, "en": "example", "zh": "例子", "emoji": "📝", "tip": "example（伊怎剖）：老師舉個「例子」給你看，「一怎麼做」你就懂啦，照著學最快。"}, {"n": 321, "en": "excellent", "zh": "極好的", "emoji": "🌟", "tip": "excellent（誒克séllen特）：考一百分「誒！這學生」超棒！excellent 就是極好、閃亮亮。"}, {"n": 322, "en": "except", "zh": "除了…之外", "emoji": "➖", "tip": "except（伊克塞普特）：全班都到，「除了…之外」少一個。except 像減號，挖掉一個。"}, {"n": 323, "en": "excited", "zh": "感到興奮的", "emoji": "🤩", "tip": "excited（伊克賽踢的）：明天去遊樂園，心跳「一刻賽跑」得好快，這就是我感到興奮！"}, {"n": 324, "en": "exciting", "zh": "令人興奮的", "emoji": "🎢", "tip": "exciting：excite 加 ing，是「令人」興奮的那件事，像坐雲霄飛車讓大家尖叫。"}, {"n": 325, "en": "excuse", "zh": "原諒", "emoji": "🙏", "tip": "excuse（伊克斯Q斯）：不小心撞到人，說「Excuse me（一顆Q）」請對方原諒你。"}, {"n": 326, "en": "exercise", "zh": "運動", "emoji": "🏃", "tip": "exercise（誒克色賽斯）：「誒！快去曬」太陽做運動！跑跑跳跳，身體才會壯壯。"}, {"n": 327, "en": "expensive", "zh": "昂貴的", "emoji": "💰", "tip": "expensive（伊克斯半司）：這玩具貴到「一顆斯半」個月零用錢，好昂貴，買不下手！"}, {"n": 328, "en": "experience", "zh": "經驗", "emoji": "🎒", "tip": "experience（伊克斯匹瑞恩斯）：親自去試過、玩過、學過留下的，就是寶貴的經驗。"}, {"n": 329, "en": "eye", "zh": "眼睛", "emoji": "👁️", "tip": "eye（唉）：中間的 y 像鼻子，兩邊的 e 是左右兩隻眼睛，看起來就是一張臉的眼睛！"}, {"n": 330, "en": "face", "zh": "臉孔,面對", "emoji": "😊", "tip": "face（費斯）：早上洗「臉」要「費」點時間，把小臉搓得香噴噴，才能出門面對世界。"}, {"n": 331, "en": "fact", "zh": "事實", "emoji": "✅", "tip": "fact（fact）：這是「真的」不是騙人的！fact 就是千真萬確的事實，蓋章認證。"}, {"n": 332, "en": "factory", "zh": "工廠", "emoji": "🏭", "tip": "factory（fact瑞）：工廠裡做出來的東西都是「事實(fact)」存在的產品，機器轟隆隆運轉。"}, {"n": 333, "en": "fail", "zh": "失敗", "emoji": "❌", "tip": "fail（費爾）：考試沒過好「費」力好累，這次失敗了；別怕，下次再站起來！"}, {"n": 334, "en": "fall", "zh": "秋天", "emoji": "🍂", "tip": "fall（否ㄦ）：秋天樹葉一片片「fall（掉落）」下來，鋪滿地，這個季節就叫 fall。"}, {"n": 335, "en": "family", "zh": "家庭", "emoji": "👨‍👩‍👧‍👦", "tip": "family（發摸利）：爸媽兄弟姊妹住一起，「發摸」抱抱最溫暖，這就是我的家庭。"}, {"n": 336, "en": "famous", "zh": "有名的", "emoji": "🌟", "tip": "famous（費摸斯）：明星紅到大家都想「摸」他一下拍照，好有名，走到哪都被認出來。"}, {"n": 337, "en": "fan", "zh": "扇子,擁護者", "emoji": "🪭", "tip": "fan（fan）：天氣熱搧「扇子」，「翻翻翻」風就來；為偶像瘋狂的擁護者也叫 fan。"}, {"n": 338, "en": "far", "zh": "遠的", "emoji": "🔭", "tip": "far（法）：距離好「遠」，得用望遠鏡才看得到，「發」現遠方有座小山丘。"}, {"n": 339, "en": "farm", "zh": "農田", "emoji": "🚜", "tip": "farm（發姆）：農田裡種菜養牛，農夫在這「發」力耕種，「姆」哞～乳牛陪你一起工作。"}, {"n": 340, "en": "farmer", "zh": "農夫", "emoji": "👨‍🌾", "tip": "farmer 就是 farm（農田）＋er（人），在農田工作的人就是農夫，戴斗笠彎腰種田。"}, {"n": 341, "en": "fast", "zh": "快的", "emoji": "🏃💨", "tip": "fast（法斯特）：跑得「發」瘋一樣快！fast 就是速度快到留下一陣風。"}, {"n": 342, "en": "fat", "zh": "胖的", "emoji": "🐷", "tip": "fat（fat）：吃太多「發」福了，肚子圓滾滾胖嘟嘟，像可愛的小豬豬。"}, {"n": 343, "en": "father", "zh": "父親", "emoji": "👨", "tip": "father（發ㄉㄜˋ）：爸爸最會「發」號施令又疼你，是家裡的父親大人，肩膀最寬。"}, {"n": 344, "en": "favorite", "zh": "最喜愛的", "emoji": "⭐", "tip": "favorite（fever瑞特）：這是我「最喜愛」的東西，愛到像「發燒(fever)」一樣熱情！"}, {"n": 345, "en": "February", "zh": "二月", "emoji": "📅", "tip": "February（fib魯瑞）：二月冷冷的，還有情人節。開頭 Feb 要戴大寫帽，別忘中間藏個 r。"}, {"n": 346, "en": "feed", "zh": "餵", "emoji": "🍼", "tip": "feed（飛的）：「肥的」小雞餓了，趕快餵牠吃飼料，吃飽才會長大長胖。"}, {"n": 347, "en": "feel", "zh": "覺得", "emoji": "🫶", "tip": "feel（飛爾）：手輕輕碰一下，「飛」快就「覺得」暖暖的，用心去感受這份心情。"}, {"n": 348, "en": "festival", "zh": "節慶", "emoji": "🎉", "tip": "festival（fes踢佛）：節慶到了大家「發時」間出來玩，放煙火、逛市集，超熱鬧！"}, {"n": 349, "en": "fever", "zh": "發燒", "emoji": "🤒", "tip": "fever（費佛）：額頭燙燙，感覺「廢」了沒力氣，這就是發燒，要多喝水快休息。"}, {"n": 350, "en": "few", "zh": "少數的", "emoji": "🤏", "tip": "few（fju）：只剩「一撇撇」幾個，few 就是少少的、數得出來的少數。"}, {"n": 351, "en": "fifteen", "zh": "十五", "emoji": "1️⃣5️⃣", "tip": "fifteen 就是 five（五）＋teen（十幾），5 藏在裡面，合起來就是十五。"}, {"n": 352, "en": "fifteenth", "zh": "第十五(的)", "emoji": "🏅", "tip": "fifteenth 就是 fifteen 加 th（第），排到「第十五」名，尾巴黏個 th。"}, {"n": 353, "en": "fifth", "zh": "第五(的)", "emoji": "5️⃣", "tip": "fifth 就是 five 去尾巴加 th，「第五」個。記得中間變成 fi-f-th，唸起來要咬舌頭。"}, {"n": 354, "en": "fifty", "zh": "五十", "emoji": "5️⃣0️⃣", "tip": "fifty 就是 five（五）＋ty（十的倍數），五個十合起來，就是五十！"}, {"n": 355, "en": "fight", "zh": "打架", "emoji": "🥊", "tip": "fight（fㄞ特）：兩人「壞踢」互相推來推去在打架。小朋友要用嘴巴溝通，不要動手喔。"}, {"n": 356, "en": "fill", "zh": "裝滿", "emoji": "🫗", "tip": "fill（fill）：倒水把杯子「fill」滿，水位一直升，直到裝滿滿快溢出來。"}, {"n": 357, "en": "finally", "zh": "最後", "emoji": "🏁", "tip": "finally（fㄞ呢利）：等好久好久，「最後」終於等到了！finally 就是熬到最後那一刻。"}, {"n": 358, "en": "find", "zh": "找到", "emoji": "🔍", "tip": "find（fㄞ的）：拿放大鏡到處「翻的」，翻箱倒櫃終於「找到」不見的東西！"}, {"n": 359, "en": "fine", "zh": "很好的", "emoji": "👌", "tip": "fine（fㄞㄣ）：有人問你好嗎？回「I'm fine（很好）」，一切「翻恩」都很順、很棒！"}, {"n": 360, "en": "finger", "zh": "手指", "emoji": "☝️", "tip": "finger（fing哥）：手指頭一根根，「瘋哥」愛比讚。十根手指可以數數又可以彈琴。"}, {"n": 361, "en": "finish", "zh": "完成", "emoji": "🏁", "tip": "finish（fi膩許）：把功課寫到「膩」了終於「完成」，收筆蓋本，任務達成！"}, {"n": 362, "en": "fire", "zh": "火焰,開火", "emoji": "🔥", "tip": "fire（fㄞㄦ）：「發」出紅紅的「火焰」，好燙好亮。小朋友別玩火，遠遠看就好。"}, {"n": 363, "en": "first", "zh": "第一(的)", "emoji": "🥇", "tip": "first（fㄦ斯特）：賽跑衝「第一」，「發衝特」別快第一個到終點，掛上金牌！"}, {"n": 364, "en": "fish", "zh": "魚", "emoji": "🐟", "tip": "fish（fㄧ許）：小「魚」在水裡游來游去，「非需」要水才能活，吐著泡泡好可愛。"}, {"n": 365, "en": "fisherman", "zh": "漁夫", "emoji": "🎣", "tip": "fisherman 就是 fish（魚）＋er＋man，抓魚的人就是漁夫，撐著小船出海捕魚。"}, {"n": 366, "en": "five", "zh": "五", "emoji": "5️⃣", "tip": "five（fㄞ夫）：一隻手張開剛好「五」根手指，「拍」一下手掌，五個指頭全到齊！"}, {"n": 367, "en": "fix", "zh": "修理", "emoji": "🔧", "tip": "fix（fㄧ克斯）：玩具壞了，爸爸拿工具「修理」，喀喀兩下就「非可惜」地修好了。"}, {"n": 368, "en": "floor", "zh": "地板", "emoji": "🪵", "tip": "floor（f囉ㄦ）：站在「地板」上，「否囉」腳踩得穩穩，走路才不會滑倒。"}, {"n": 369, "en": "flower", "zh": "花朵", "emoji": "🌸", "tip": "flower（f勞兒）：「花朵」開了好香，「發樓」到花園裡採花，蝴蝶蜜蜂都來玩。"}, {"n": 370, "en": "flute", "zh": "笛", "emoji": "🪈", "tip": "flute（f路特）：橫著吹的「笛」子，「弗路」～吹出好聽的音樂，手指按孔變旋律。"}, {"n": 371, "en": "fly", "zh": "飛", "emoji": "🕊️", "tip": "fly（f賴）：小鳥「發賴」拍拍翅膀往上「飛」，飛得又高又遠上藍天。"}, {"n": 372, "en": "follow", "zh": "遵循,跟隨", "emoji": "👣", "tip": "follow（發囉）：「發囉」～你走前面，我在後面「跟隨」你的腳印一步步走。"}, {"n": 373, "en": "food", "zh": "食物", "emoji": "🍚", "tip": "food（fㄨ的）：肚子餓要吃「食物」，「福的」小孩吃得飽飽，才有力氣長大。"}, {"n": 374, "en": "foot", "zh": "腳", "emoji": "🦶", "tip": "foot（f屋特）：一隻「腳」踩進「屋」裡，foot 是單隻腳，兩隻就要變 feet 喔。"}, {"n": 375, "en": "for", "zh": "為了", "emoji": "🎁", "tip": "for（佛）：這份禮物是「為了」你準備的，「佛」心來著，special for you！"}, {"n": 376, "en": "foreign", "zh": "外國的", "emoji": "🌏", "tip": "foreign（佛rㄣ）：「外國的」東西來自遠方，「佛人」講不同語言，長相風景都新奇。"}, {"n": 377, "en": "foreigner", "zh": "外國人", "emoji": "🧳", "tip": "foreigner 就是 foreign（外國的）＋er（人），從外國來的人就是外國人，拉著行李旅行。"}, {"n": 378, "en": "forget", "zh": "忘記", "emoji": "🙈", "tip": "forget（佛給特）：「佛給」你的東西你卻「忘記」了，腦袋一片空白，想不起來啦。"}, {"n": 379, "en": "fork", "zh": "叉子", "emoji": "🍴", "tip": "fork（佛克）：吃飯用的「叉子」，「佛克」叉起義大利麵，四根尖尖的小齒。"}, {"n": 380, "en": "forty", "zh": "四十", "emoji": "4️⃣0️⃣", "tip": "forty 就是 four（四）少一個 u，加 ty，四個十合起來就是四十。注意沒有 u 喔！"}, {"n": 381, "en": "four", "zh": "四", "emoji": "4️⃣", "tip": "four（佛ㄦ）：「四」個角的方形，「否」則就數手指，一二三四剛剛好。"}, {"n": 382, "en": "fourteen", "zh": "十四", "emoji": "1️⃣4️⃣", "tip": "fourteen 就是 four（四）＋teen（十幾），4 藏在裡面，合起來就是十四。"}, {"n": 383, "en": "fourteenth", "zh": "第十四(的)", "emoji": "🏅", "tip": "fourteenth 就是 fourteen 加 th（第），排到「第十四」名，尾巴黏個 th。"}, {"n": 384, "en": "fourth", "zh": "第四(的)", "emoji": "4️⃣", "tip": "fourth 就是 four 加 th（第），「第四」個。跟 forty 不同，這個 u 有乖乖留著！"}, {"n": 385, "en": "fox", "zh": "狐狸", "emoji": "🦊", "tip": "fox（fㄚ克斯）：「狐狸」尾巴毛茸茸，「發可惜」牠很聰明又狡猾，森林裡溜來溜去。"}, {"n": 386, "en": "free", "zh": "空閒的,免費", "emoji": "🕊️", "tip": "free（f瑞）：作業寫完好「free」，空閒地飛出去玩；不用付錢的免費也是 free！"}, {"n": 387, "en": "French fries", "zh": "炸薯條", "emoji": "🍟", "tip": "French fries：法國(French)的炸(fry)薯條，金黃酥脆一根根，沾番茄醬最好吃！"}, {"n": 388, "en": "fresh", "zh": "新鮮的", "emoji": "🥬", "tip": "fresh（f瑞許）：剛摘的青菜「非需」冰就好「新鮮」，脆脆綠綠水噹噹。"}, {"n": 389, "en": "Friday", "zh": "星期五", "emoji": "🎏", "tip": "Friday（f賴day）：星期五快放假，好想「賴」在家！Fri 開頭要戴大寫帽子。"}, {"n": 390, "en": "friend", "zh": "朋友", "emoji": "🧑‍🤝‍🧑", "tip": "friend（f潤的）：「朋友」對你「肥潤的」好，有福同享，一起玩一起笑最開心。"}, {"n": 391, "en": "friendly", "zh": "友善的", "emoji": "😊", "tip": "friendly 就是 friend（朋友）＋ly，像朋友一樣「友善的」，笑咪咪對人超親切。"}, {"n": 392, "en": "frisbee", "zh": "飛盤", "emoji": "🥏", "tip": "frisbee（f瑞斯比）：圓圓的「飛盤」，「飛斯比」～往前一甩，狗狗最愛追著接。"}, {"n": 393, "en": "frog", "zh": "青蛙", "emoji": "🐸", "tip": "frog（f辣哥）：「青蛙」呱呱叫，「福辣哥」蹦蹦跳，一跳就抓到蟲蟲當點心。"}, {"n": 394, "en": "from", "zh": "從", "emoji": "📍", "tip": "from（f弄）：「我來自台灣」，from 標出你「從」哪裡出發，指著出發點。"}, {"n": 395, "en": "front", "zh": "前面", "emoji": "🔜", "tip": "front（f弄特）：站在隊伍「前面」，「風」吹到你臉上，因為你在最前線帶頭。"}, {"n": 396, "en": "fruit", "zh": "水果", "emoji": "🍎", "tip": "fruit（f路特）：「水果」甜甜的，「福路特」別多汁，蘋果香蕉維他命滿滿。"}, {"n": 397, "en": "fry", "zh": "油炸", "emoji": "🍳", "tip": "fry（f賴）：熱油「油炸」滋滋響，「發賴」下鍋煎一煎，香酥金黃真好吃。"}, {"n": 398, "en": "full", "zh": "滿的", "emoji": "🈵", "tip": "full（f兀ㄦ）：肚子吃到「滿的」再也塞不下，「福」氣滿滿，圓鼓鼓像小皮球。"}, {"n": 399, "en": "fun", "zh": "樂趣", "emoji": "🎈", "tip": "fun（fㄢ）：玩得好開心，「飯」都忘了吃！fun 就是滿滿的樂趣與歡笑。"}, {"n": 400, "en": "funny", "zh": "好笑的", "emoji": "😂", "tip": "funny 就是 fun（樂趣）＋ny，「好笑的 nce 唸「萬斯」，「玩死」一次就好啦，once 就是只做一次、僅此一回。"}, {"n": 714, "en": "one", "zh": "一", "emoji": "1️⃣", "tip": "one 唸「萬」，一萬雖然大，但 one 只是「一」，記住萬字開頭就是一。"}, {"n": 715, "en": "only", "zh": "只有", "emoji": "🎯", "tip": "only 唸「歐力」，只有一個大力士「歐力」，別人都沒有，only 就是唯一、只有。"}, {"n": 716, "en": "open", "zh": "打開,開放", "emoji": "🚪", "tip": "open 唸「歐盆」，「喔，盆子打開了」，open 就是把蓋子或門打開來。"}, {"n": 717, "en": "or", "zh": "或", "emoji": "🔀", "tip": "or 唸「歐兒」，「要蘋果歐（or）香蕉？」二選一的時候就說 or，是「或」。"}, {"n": 718, "en": "orange", "zh": "柳橙", "emoji": "🍊", "tip": "orange 唸「歐潤吉」，「喔，潤潔」的柳橙圓滾滾，橙色又多汁，吃了嘴巴甜甜。"}, {"n": 719, "en": "order", "zh": "點餐,秩序", "emoji": "🍽️", "tip": "order 唸「歐兒得」，「喔，兒得排隊點餐」，服務生按秩序幫你 order 點餐。"}, {"n": 720, "en": "other", "zh": "其他的", "emoji": "🫱", "tip": "other 唸「阿惹」，「阿，惹到另一個」，other 是其他的、別的那一個。"}, {"n": 721, "en": "out", "zh": "在外", "emoji": "🚶", "tip": "out 唸「凹特」，「凹」進去再「特」地跑出來，out 就是往外、在外面。"}, {"n": 722, "en": "outside", "zh": "在…外部", "emoji": "🌳", "tip": "outside 是 out 加 side（邊），外面那一邊就是 outside，跑到門外邊玩耍。"}, {"n": 723, "en": "over", "zh": "結束", "emoji": "🏁", "tip": "over 唸「歐佛」，「喔，佛祖說結束了」，遊戲 over 就是結束、玩完囉。"}, {"n": 724, "en": "own", "zh": "自己的", "emoji": "🙋", "tip": "own 唸「翁」，跟 on 很像但多個 w，「這是我翁（own）自己的」，own 是自己的。"}, {"n": 725, "en": "ox", "zh": "公牛", "emoji": "🐂", "tip": "ox 只有兩個字母 o 和 x，圓圓的 o 是牛身、x 是牛角交叉，公牛壯壯的。"}, {"n": 726, "en": "pack", "zh": "包", "emoji": "🎒", "tip": "pack 唸「怕克」，「趴」下來把東西「克」進袋子，pack 就是打包、一包東西。"}, {"n": 727, "en": "package", "zh": "包裹", "emoji": "📦", "tip": "package 是 pack 加 age，包一包再加個盒子就是包裹，郵差送來 package 好開心。"}, {"n": 728, "en": "page", "zh": "頁", "emoji": "📄", "tip": "page 唸「配吉」，翻到「配吉」利的那一頁，page 就是書本的一頁一頁。"}, {"n": 729, "en": "paint", "zh": "繪畫", "emoji": "🎨", "tip": "paint 唸「盆特」，拿「盆」子裝顏料「特」地畫畫，paint 就是繪畫、塗顏色。"}, {"n": 730, "en": "pair", "zh": "一雙", "emoji": "👟", "tip": "pair 唸「陪兒」，兩隻鞋「陪」在一起才成一雙，pair 就是一對、一雙。"}, {"n": 731, "en": "pants", "zh": "長褲", "emoji": "👖", "tip": "pants 唸「盤斯」，「胖子」穿長褲，兩條褲管遮住兩條腿，pants 是長褲。"}, {"n": 732, "en": "papaya", "zh": "木瓜", "emoji": "🫒", "tip": "papaya 唸「怕怕呀」，「爸爸呀」買了大木瓜，橘紅色的果肉甜又軟。"}, {"n": 733, "en": "paper", "zh": "紙", "emoji": "📃", "tip": "paper 唸「配伯」，「陪伯伯」寫字要用紙，paper 就是白白的一張紙。"}, {"n": 734, "en": "parent", "zh": "父(母)親", "emoji": "👪", "tip": "parent 唸「配潤特」，「陪」你長大又「潤」你心的特別的人，就是爸爸媽媽 parent。"}, {"n": 735, "en": "park", "zh": "公園", "emoji": "🏞️", "tip": "park 唸「怕克」，「爬」上溜滑梯「克」服害怕，park 是好玩的公園。"}, {"n": 736, "en": "part", "zh": "部分", "emoji": "🧩", "tip": "part 唸「怕特」，「趴」在桌上「特」別找一小塊，part 就是一部分、一小片。"}, {"n": 737, "en": "party", "zh": "派對", "emoji": "🎉", "tip": "party 唸「怕踢」，「趴」在地上一起「踢」氣球，開開心心的派對 party。"}, {"n": 738, "en": "pass", "zh": "通過", "emoji": "✅", "tip": "pass 唸「怕斯」，「怕死」也要跑過去，pass 就是通過、傳過去、及格啦。"}, {"n": 739, "en": "past", "zh": "經過", "emoji": "⏭️", "tip": "past 是 pass 換 t，「怕死特」地跑過去，past 是經過、過去的時間。"}, {"n": 740, "en": "paste", "zh": "黏貼,漿糊", "emoji": "🧴", "tip": "paste 唸「配斯特」，「配」上黏黏的漿糊「斯特」貼起來，paste 是黏貼、漿糊。"}, {"n": 741, "en": "pay", "zh": "付錢", "emoji": "💰", "tip": "pay 唸「配」，「陪」錢給老闆，pay 就是付錢，付完錢東西才是你的。"}, {"n": 742, "en": "PE", "zh": "體育", "emoji": "⚽", "tip": "PE 兩個字母，體育課「屁ー」地流汗，PE 就是跑跑跳跳的體育課。"}, {"n": 743, "en": "peach", "zh": "桃子", "emoji": "🍑", "tip": "peach 唸「批取」，「劈」開毛毛的桃子「吃」下去，peach 是甜甜的桃子。"}, {"n": 744, "en": "pear", "zh": "梨子", "emoji": "🍐", "tip": "pear 跟 pair 同音「陪兒」，但這是「梨」，脆脆多汁的梨子 pear。"}, {"n": 745, "en": "pen", "zh": "筆", "emoji": "🖊️", "tip": "pen 唸「盆」，小水「盆」裝墨水，pen 就是寫字的筆，一筆一劃。"}, {"n": 746, "en": "pencil", "zh": "鉛筆", "emoji": "✏️", "tip": "pencil 是 pen 加 cil，「盆手兒」握著鉛筆寫，pencil 是可以擦掉的鉛筆。"}, {"n": 747, "en": "people", "zh": "人們,人民", "emoji": "👥", "tip": "people 唸「批剖」，一群人「批」批「剖」出來，people 是好多好多的人們。"}, {"n": 748, "en": "perhaps", "zh": "或許", "emoji": "🤔", "tip": "perhaps 唸「破哈普斯」，「破」了帽子「哈普」一下，perhaps 或許可以修好吧。"}, {"n": 749, "en": "person", "zh": "人", "emoji": "🧍", "tip": "person 唸「破森」，一個「破森林」裡站著一個人，person 是單獨一個人。"}, {"n": 750, "en": "pet", "zh": "寵物", "emoji": "🐶", "tip": "pet 唸「胚特」，「配」你玩的「特」別動物就是寵物 pet，抱抱好療癒。"}, {"n": 751, "en": "photo", "zh": "相片", "emoji": "📷", "tip": "photo 唸「佛頭」，拍下「佛頭」的相片，喀嚓一聲，photo 就是照片。"}, {"n": 752, "en": "piano", "zh": "鋼琴", "emoji": "🎹", "tip": "piano 唸「批阿弄」，手指「批阿弄」按黑白鍵，piano 是叮叮咚咚的鋼琴。"}, {"n": 753, "en": "pick", "zh": "撿拾", "emoji": "🤏", "tip": "pick 唸「批克」，「劈」下去「克」地撿起來，pick 就是撿拾、挑選。"}, {"n": 754, "en": "picnic", "zh": "野餐", "emoji": "🧺", "tip": "picnic 唸「批克匿克」，帶著 pick 的野餐籃出去玩，picnic 是草地上的野餐。"}, {"n": 755, "en": "picture", "zh": "圖片,照片", "emoji": "🖼️", "tip": "picture 唸「批取兒」，「劈取」一幅畫掛牆上，picture 是漂亮的圖片、照片。"}, {"n": 756, "en": "pie", "zh": "派", "emoji": "🥧", "tip": "pie 唸「派」，直接就是中文「派」，圓圓的派切一塊，pie 香甜好吃。"}, {"n": 757, "en": "piece", "zh": "片", "emoji": "🍰", "tip": "piece 唸「批斯」，「劈死」蛋糕分一片，piece 就是一片、一塊。"}, {"n": 758, "en": "pig", "zh": "豬", "emoji": "🐷", "tip": "pig 唸「批格」，「劈格」一聲小豬叫，pig 是圓滾滾愛睡覺的豬。"}, {"n": 759, "en": "pin", "zh": "大頭針", "emoji": "📌", "tip": "pin 唸「拼」，小小「拼」在布上的大頭針，pin 尖尖的別小心手。"}, {"n": 760, "en": "pink", "zh": "粉紅色(的)", "emoji": "🩷", "tip": "pink 是 pin 加 k，「拼克」出粉紅色，pink 是甜甜的粉紅色。"}, {"n": 761, "en": "pipe", "zh": "管", "emoji": "🪈", "tip": "pipe 唸「拍普」，長長的水管「拍」一下「普」通通，pipe 就是管子。"}, {"n": 762, "en": "pizza", "zh": "披薩", "emoji": "🍕", "tip": "pizza 唸「披薩」，就是中文的披薩，圓圓一大片，切開牽絲好好吃。"}, {"n": 763, "en": "place", "zh": "地方", "emoji": "📍", "tip": "place 唸「普類斯」，「不累死」也要走到那個地方，place 就是地點、地方。"}, {"n": 764, "en": "plan", "zh": "計畫", "emoji": "📝", "tip": "plan 唸「普籃」，把想做的事放進「籃」子排好，plan 就是計畫。"}, {"n": 765, "en": "planet", "zh": "行星", "emoji": "🪐", "tip": "planet 是 plan 加 et，「普籃內特」，太空中的行星繞太陽轉，planet 圓又亮。"}, {"n": 766, "en": "plant", "zh": "植物", "emoji": "🌱", "tip": "plant 是 plan 加 t，種子「普籃特」種下去，plant 就是綠綠的植物。"}, {"n": 767, "en": "plate", "zh": "盤子", "emoji": "🍽️", "tip": "plate 唸「普類特」，圓圓「不累」的盤子裝飯菜，plate 就是盤子。"}, {"n": 768, "en": "play", "zh": "玩", "emoji": "🤸", "tip": "play 唸「普類」，「不累」也要一直玩，play 就是玩耍、遊戲。"}, {"n": 769, "en": "player", "zh": "球員,玩家", "emoji": "🏃", "tip": "player 是 play 加 er，會玩的人就是球員、玩家 player，場上跑跑跳跳。"}, {"n": 770, "en": "playground", "zh": "操場", "emoji": "🛝", "tip": "playground 是 play 加 ground（地），玩耍的地面就是操場 playground。"}, {"n": 771, "en": "pleasure", "zh": "樂趣,使高興", "emoji": "😊", "tip": "pleasure 唸「普類揪」，玩得「不累就」開心，pleasure 是滿滿的樂趣。"}, {"n": 772, "en": "please", "zh": "請", "emoji": "🙏", "tip": "please 唸「普類斯」，禮貌地說「不累死」也幫我，please 就是「請」。"}, {"n": 773, "en": "p.m.", "zh": "下午", "emoji": "🌇", "tip": "p.m. 兩個字母，太陽下山「怕沒」光了，p.m. 就是下午到晚上的時間。"}, {"n": 774, "en": "pocket", "zh": "口袋", "emoji": "👖", "tip": "pocket 唸「怕克特」，「趴」下把糖果「克」進去藏，pocket 是衣服的口袋。"}, {"n": 775, "en": "point", "zh": "指著,得分", "emoji": "👉", "tip": "point 唸「盆特」，手指「盆特」地指過去，point 是指著、也是比賽的得分。"}, {"n": 776, "en": "police", "zh": "警察", "emoji": "👮", "tip": "police 唸「破粒斯」，「破粒」壞事的斯文人就是警察 police，保護大家安全。"}, {"n": 777, "en": "polite", "zh": "有禮貌的", "emoji": "🙇", "tip": "polite 唸「破賴特」，一點都「不賴」又有禮貌，polite 是有禮貌的好孩子。"}, {"n": 778, "en": "pond", "zh": "池塘", "emoji": "🦆", "tip": "pond 唸「胖的」，「胖的」青蛙住在小池塘，pond 是有荷葉的小水池。"}, {"n": 779, "en": "pool", "zh": "游泳池", "emoji": "🏊", "tip": "pool 唸「撲」，「撲」通跳進去游泳，pool 是清涼的游泳池。"}, {"n": 780, "en": "poor", "zh": "貧困的,可憐的", "emoji": "🥺", "tip": "poor 唸「撲兒」，「普」通的兒沒有錢，poor 是貧困的、可憐的，要多關心。"}, {"n": 781, "en": "popcorn", "zh": "爆米花", "emoji": "🍿", "tip": "popcorn 是 pop（爆）加 corn（玉米），玉米「啵啵」爆開就是爆米花 popcorn。"}, {"n": 782, "en": "popular", "zh": "受歡迎的", "emoji": "🌟", "tip": "popular 唸「怕撲樂」，「爬」上台「撲樂」大家都愛，popular 就是受歡迎的。"}, {"n": 783, "en": "pork", "zh": "豬肉", "emoji": "🍖", "tip": "pork 是 pig 換身，唸「破克」，豬（pig）的肉就是 pork 豬肉，香噴噴。"}, {"n": 784, "en": "possible", "zh": "可能的", "emoji": "🤞", "tip": "possible 唸「怕色伯」，「怕」什麼？「色伯」說一切都做得到，possible 是可能的。"}, {"n": 785, "en": "post office", "zh": "郵局", "emoji": "📮", "tip": "post office 是 post（寄）加 office，寄信的辦公室就是郵局 post office。"}, {"n": 786, "en": "postcard", "zh": "明信片", "emoji": "💌", "tip": "postcard 是 post 加 card，寄出去的卡片就是明信片 postcard，貼張郵票寄給你。"}, {"n": 787, "en": "pot", "zh": "罐,壺,鍋子", "emoji": "🍲", "tip": "pot 唸「怕特」，「趴」在爐上熱呼呼的「特」大鍋，pot 是罐、壺、鍋子。"}, {"n": 788, "en": "pound", "zh": "磅", "emoji": "⚖️", "tip": "pound 唸「胖的」，跟 pond 像但這是重量，秤秤看有幾磅，pound 越多越「胖」。"}, {"n": 789, "en": "practice", "zh": "練習", "emoji": "🎯", "tip": "practi // ---- helpers ----
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const view=document.getElementById('view');

// ---- HOME ----
function home(){
  document.getElementById('mascot').textContent=MASCOTS[0];
  let h='<div class="grid">';
  ROUNDS.forEach((r,i)=>{
    const col=PALETTE[i%PALETTE.length], dk=DARK[i%DARK.length];
    const first=r[0].en, last=r[r.length-1].en;
    const st=ST['r'+i]||{};
    const star=st.studied?'<div class="rstar">⭐</div>':'';
    const best=st.best!=null?('<div class="rbest">最佳 '+st.best+'/'+r.length+' ✨</div>'):'';
    h+='<button class="rcard" style="background:linear-gradient(150deg,'+col+','+dk+');--rc-dark:'+dk+'" onclick="openRound('+i+')">'
      + star

      + '<div class="remoji">'+(r[0].emoji||'📘')+'</div>'
      + '<div class="rrange">'+first+' … '+last+'</div>'
      + best
      + '</button>';
  });
  h+='</div>';
  view.innerHTML=h; window.scrollTo(0,0);
}
window.openRound=function(i){ roundView(i,'study'); }

// ---- ROUND ----
let CUR=0;
function roundView(i,mode){
  CUR=i;
  document.getElementById('mascot').textContent=MASCOTS[i%MASCOTS.length];
  const r=ROUNDS[i];
  let h='<div class="topbar"><button class="back" onclick="home()">← 回選單</button>'
      +'<div class="rtitle">第 '+(i+1)+' 回</div></div>';
  h+='<div class="tabs">'
    +tab('study','📖 翻卡學習',mode)
    +tab('pic','🖼️ 看圖選字',mode)
    +tab('quiz','🎯 中英測驗',mode)
    +tab('pair','🃏 配對遊戲',mode)
    +tab('match','🔗 連連看',mode)
    +'</div><div id="mbody"></div>';
  view.innerHTML=h; window.scrollTo(0,0);
  if(mode==='study')studyMode(r,i);
  else if(mode==='pic')quizMode(r,i,'pic');
  else if(mode==='quiz')quizMode(r,i,'quiz');
  else if(mode==='pair')pairMode(r,i);
  else matchMode(r,i);
}
function tab(m,label,cur){return '<button class="tab '+(m===cur?'on':'')+'" onclick="roundView(CUR,\''+m+'\')">'+label+'</button>';}

// ---- STUDY (flip cards) ----
function studyMode(r,i){
  const mb=document.getElementById('mbody');

      +'<div class="fc-emoji" onclick="event.stopPropagation();speak(\''+w.en.replace(/'/g,"\\'")+'\')" title="點我聽發音">'+(w.emoji||'📘')+'</div>'
      +'<div class="fc-en">'+w.en+'</div>'
      +'<div class="fc-hint">🔊 點圖聽發音 · 點卡翻牌 👆</div>'
      +'</div>'

  const st=ST['r'+i]||{}; st.studied=true; ST['r'+i]=st; save(ST);
}

// ---- QUIZ / PICTURE ----
function quizMode(r,i,kind){
  const mb=document.getElementById('mbody');
  const order=shuffle(r.map((_,k)=>k));
  let idx=0, score=0;
  function render(){
    if(idx>=order.length){ finish(); return; }
    const w=r[order[idx]];
    // build 3 distractors from whole DATA
    const pool=shuffle(DATA.filter(x=>x.en!==w.en));
    let opts;
    if(kind==='pic'){ // show emoji + zh, choose English
      opts=shuffle([w.en].concat(pool.slice(0,3).map(x=>x.en)));
    }else{ // mixed: show English (+emoji), choose Chinese  OR show Chinese choose English
      opts=shuffle([w].concat(pool.slice(0,3)));
    }
    const spk = 'onclick="speak(\''+w.en.replace(/'/g,"\\'")+'\')" title="點我聽發音"';
    const ask = (kind==='pic')
      ? '<div class="prompt-emoji" '+spk+'>'+(w.emoji||'📘')+'</div><div class="prompt-txt">'+w.zh+'</div><div class="prompt-sub">🔊 點圖聽發音，選出正確的英文單字</div>'
      : '<div class="prompt-emoji" '+spk+'>'+(w.emoji||'📘')+'</div><div class="prompt-txt">'+w.en+'</div><div class="prompt-sub">這個字是什麼意思呢？ <button class="spk" style="position:static;display:inline-flex;align-items:center;justify-content:center" onclick="speak(\''+w.en.replace(/'/g,"\\'")+'\')">🔊</button></div>';
    let h='<div class="q">'
      +'<div class="qbar"><span>🎯 '+(idx+1)+' / '+order.length+'</span><span id="scv">⭐ '+score+'</span></div>'
      +'<div class="progress"><i style="width:'+(idx/order.length*100)+'%"></i></div>'
      +ask+'<div class="opts" id="opts"></div>'
      +'<div id="fb"></div></div>';
    mb.innerHTML=h;
    const ob=document.getElementById('opts');
    (kind==='pic'?opts:opts.map(o=>o.zh)).forEach((label,n)=>{
      const b=document.createElement('button'); b.className='opt'; b.textContent=label;
      b.onclick=()=>{
        const correct = (kind==='pic') ? (label===w.en) : (label===w.zh);
        if(correct){ b.classList.add('right'); score++; var sv=document.getElementById('scv'); if(sv)sv.textContent='⭐ '+score; }
        else{ b.classList.add('wrong');
          [...ob.children].forEach(c=>{ if((kind==='pic' && c.textContent===w.en)||(kind!=='pic'&&c.textContent===w.zh))c.classList.add('right'); });
        }
        [...ob.children].forEach(c=>c.disabled=true);
        const fb=document.getElementById('fb');
        fb.innerHTML='<div class="tip-inline">💡 '+w.en+' = '+w.zh+'：'+w.tip+'</div>'
          +'<button class="next" id="nx">'+(idx+1>=order.length?'看成績 🏆':'下一題 →')+'</button>';
        document.getElementById('nx').onclick=()=>{ idx++; render(); };
        if(!correct){}
      };
      ob.appendChild(b);
    });
  }
  function finish(){
    const st=ST['r'+i]||{}; st.best=Math.max(st.best||0,score); st.studied=true; ST['r'+i]=st; save(ST);
    const perfect=score===order.length;
    let stars = score/order.length>=0.9?'⭐⭐⭐':score/order.length>=0.6?'⭐⭐':'⭐';
    mb.innerHTML='<div class="q done"><div class="big">'+(perfect?'🏆':'🎉')+'</div>'
      +'<h2>'+(perfect?'全對！你是單字小達人！':'完成囉！')+'</h2>'
      +'<div class="sc">得分 '+score+' / '+order.length+'　'+stars+'</div>'
      +'<div style="margin-top:14px">'
      +'<span class="pill" onclick="roundView(CUR,\''+kind+'\')">🔄 再玩一次</span>'
      +'<span class="pill" onclick="roundView(CUR,\'study\')">📖 回去複習</span>'
      +(CUR+1<ROUNDS.length?'<span class="pill" onclick="openRound('+(CUR+1)+')">➡️ 下一回</span>':'')
      +'</div></div>';
  }
  render();
}

    +'<div class="pgrid" id="pgrid"></div><div id="pfb"></div></div>';

    el.innerHTML='<div class="pc-in"><div class="pc-back">?</div><div class="pc-front" style="--pc:'+col+'">'+face+'</div></div>';
    el.onclick=()=>{
      if(lock||el.classList.contains('flip')||el.classList.contains('done'))return;
      el.classList.add('flip'); flipped.push({el,c});
      if(c.side==='en')speak(c.w.en);
      if(flipped.length===2){
        moves++; document.getElementById('pmoves').textContent='步數 '+moves;
        const a=flipped[0], b=flipped[1];
        if(a.c.wi===b.c.wi){ lock=true;
          setTimeout(()=>{ a.el.classList.add('done'); b.el.classList.add('done'); flipped=[]; lock=false; matched++;
            if(matched===N)finishPair(moves); },420);
        }else{ lock=true;
          setTimeout(()=>{ a.el.classList.remove('flip'); b.el.classList.remove('flip'); flipped=[]; lock=false; },820);
        }
      }
    };
    grid.appendChild(el);
  });
  function finishPair(mv){
    const st=ST['r'+i]||{}; st.studied=true; ST['r'+i]=st; save(ST);
    document.getElementById('pfb').innerHTML='<div style="text-align:center;margin-top:14px">'
      +'<div style="font-size:60px">🎉</div><div class="sc">全部配對成功！只用了 '+mv+' 步</div>'
      +'<div style="margin-top:10px"><span class="pill" onclick="roundView(CUR,\'pair\')">🔄 再玩一次</span>'
      +'<span class="pill" onclick="roundView(CUR,\'study\')">📖 回去複習</span>'
      +(CUR+1<ROUNDS.length?'<span class="pill" onclick="openRound('+(CUR+1)+')">➡️ 下一回</span>':'')+'</div></div>';
  }
}

// ---- 連連看 (connect) ----
function matchMode(r,i){
  const mb=document.getElementById('mbody');
  const N=Math.min(6,r.length);
  const pick=shuffle(r).slice(0,N);
  const left=pick.map((w,k)=>({w,k}));
  const right=shuffle(pick.map((w,k)=>({w,k})));
  let selL=null, selR=null, done=0;
  mb.innerHTML='<div class="q">'
    +'<div class="qbar"><span>🔗 連連看</span><span id="lldone">0 / '+N+'</span></div>'
    +'<div class="tip-inline" style="margin:0 0 10px">左邊點「英文」，右邊點「中文」，把配對連成一條線！</div>'
    +'<div class="ll" id="llwrap"><svg class="lllines" id="lllines"></svg>'
    +'<div class="llcol" id="llL"></div><div class="llcol" id="llR"></div></div>'
    +'<div id="llfb"></div></div>';
  const L=document.getElementById('llL'), R=document.getElementById('llR');
  left.forEach(it=>{ const b=document.createElement('button'); b.className='llbtn'; b.dataset.k=it.k;
    b.innerHTML='<span class="lle">'+(it.w.emoji||'📘')+'</span> '+it.w.en;
    b.onclick=()=>{ if(b.classList.contains('mm'))return; speak(it.w.en);
      L.querySelectorAll('.sel').forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); selL=b; tryMatch(); };
    L.appendChild(b); });
  right.forEach(it=>{ const b=document.createElement('button'); b.className='llbtn'; b.dataset.k=it.k; b.textContent=it.w.zh;
    b.onclick=()=>{ if(b.classList.contains('mm'))return;
      R.querySelectorAll('.sel').forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); selR=b; tryMatch(); };
    R.appendChild(b); });
  function tryMatch(){
    if(!selL||!selR)return;
    const a=selL, b=selR;
    if(a.dataset.k===b.dataset.k){
      a.classList.add('mm'); b.classList.add('mm'); a.classList.remove('sel'); b.classList.remove('sel');
      drawLine(a,b); selL=selR=null; done++; document.getElementById('lldone').textContent=done+' / '+N;
      if(done===N)finishMatch();
    }else{
      a.classList.add('bad'); b.classList.add('bad'); const x=a,y=b; selL=selR=null;
      setTimeout(()=>{ x.classList.remove('bad','sel'); y.classList.remove('bad','sel'); },560);
    }
  }
  function drawLine(a,b){
    const wrap=document.getElementById('llwrap'), svg=document.getElementById('lllines');
    const wr=wrap.getBoundingClientRect(), ar=a.getBoundingClientRect(), br=b.getBoundingClientRect();
    svg.setAttribute('width',wr.width); svg.setAttribute('height',wr.height);
    svg.setAttribute('viewBox','0 0 '+wr.width+' '+wr.height);
    const x1=ar.right-wr.left, y1=ar.top+ar.height/2-wr.top;
    const x2=br.left-wr.left, y2=br.top+br.height/2-wr.top;
    const col=PALETTE[(+a.dataset.k)%PALETTE.length];
    const ns='http://www.w3.org/2000/svg';
    const ln=document.createElementNS(ns,'line');
    ln.setAttribute('x1',x1);ln.setAttribute('y1',y1);ln.setAttribute('x2',x2);ln.setAttribute('y2',y2);
    ln.setAttribute('stroke',col);ln.setAttribute('stroke-width','4');ln.setAttribute('stroke-linecap','round');
    svg.appendChild(ln);
    [[x1,y1],[x2,y2]].forEach(p=>{const c=document.createElementNS(ns,'circle');
      c.setAttribute('cx',p[0]);c.setAttribute('cy',p[1]);c.setAttribute('r','5');c.setAttribute('fill',col);svg.appendChild(c);});
  }
  function finishMatch(){
    const st=ST['r'+i]||{}; st.studied=true; ST['r'+i]=st; save(ST);
    document.getElementById('llfb').innerHTML='<div style="text-align:center;margin-top:16px">'
      +'<div style="font-size:60px">🎊</div><div class="sc">全部連對，太厲害了！</div>'
      +'<div style="margin-top:10px"><span class="pill" onclick="roundView(CUR,\'match\')">🔄 再玩一次</span>'
      +'<span class="pill" onclick="roundView(CUR,\'study\')">📖 回去複習</span>'
      +(CUR+1<ROUNDS.length?'<span class="pill" onclick="openRound('+(CUR+1)+')">➡️ 下一回</span>':'')+'</div></div>';
  }
}

home();
