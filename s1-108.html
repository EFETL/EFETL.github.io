<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>108 學測第一大題練習（第 1–15 題）</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      padding: 24px 16px 60px;
    }

    h1 {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      color: #4338ca;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      font-size: 0.9rem;
      color: #718096;
      margin-bottom: 32px;
    }

    .progress-bar-wrap {
      max-width: 720px;
      margin: 0 auto 8px;
      background: #cbd5e0;
      border-radius: 999px;
      height: 10px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #6366f1, #4338ca);
      border-radius: 999px;
      transition: width 0.4s ease;
    }

    .progress-text {
      text-align: center;
      font-size: 0.82rem;
      color: #718096;
      margin-top: 6px;
      margin-bottom: 28px;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      max-width: 720px;
      margin: 0 auto 28px;
      padding: 28px 28px 24px;
      border-left: 5px solid #6366f1;
      transition: border-color 0.3s;
    }

    .card.correct { border-left-color: #22c55e; }
    .card.wrong   { border-left-color: #ef4444; }

    .q-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 14px;
    }

    .q-num {
      background: #6366f1;
      color: #fff;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      min-width: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.95rem;
    }

    .q-text {
      font-size: 1rem;
      line-height: 1.75;
      color: #2d3748;
    }

    .q-text em {
      font-style: normal;
      color: #718096;
      font-size: 0.9rem;
    }

    .options {
      list-style: none;
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .option-btn {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      cursor: pointer;
      background: #f7fafc;
      text-align: left;
      font-size: 0.95rem;
      line-height: 1.6;
      color: #2d3748;
      transition: background 0.18s, border-color 0.18s;
      width: 100%;
    }

    .option-btn:hover:not(:disabled) {
      background: #eef2ff;
      border-color: #a5b4fc;
    }

    .option-btn:disabled { cursor: default; }

    .option-btn.selected-correct {
      background: #dcfce7;
      border-color: #22c55e;
      color: #166534;
      font-weight: 600;
    }

    .option-btn.selected-wrong {
      background: #fee2e2;
      border-color: #ef4444;
      color: #991b1b;
    }

    .option-btn.reveal-correct {
      background: #dcfce7;
      border-color: #22c55e;
      color: #166534;
    }

    .option-tag { font-weight: 700; min-width: 22px; }
    .result-icon { display: inline-block; margin-left: 8px; font-size: 1.1rem; }

    .analysis-box {
      margin-top: 18px;
      background: #eef2ff;
      border: 1px solid #c7d2fe;
      border-radius: 10px;
      padding: 16px 18px;
      display: none;
    }

    .analysis-box.visible { display: block; }

    .analysis-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: #4338ca;
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }

    .analysis-text {
      font-size: 0.95rem;
      line-height: 1.8;
      color: #312e81;
    }

    .more-btn {
      margin-top: 14px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      background: #e0e7ff;
      color: #4338ca;
      border: none;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.18s;
    }

    .more-btn:hover { background: #c7d2fe; }

    .supplement-box {
      margin-top: 12px;
      background: #faf5ff;
      border: 1px solid #ddd6fe;
      border-radius: 10px;
      padding: 16px 18px;
      display: none;
    }

    .supplement-box.visible { display: block; }

    .supplement-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: #7c3aed;
      letter-spacing: 0.04em;
      margin-bottom: 10px;
    }

    .vocab-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .vocab-list li {
      font-size: 0.88rem;
      line-height: 1.7;
      color: #3b2f6e;
      padding-left: 16px;
      position: relative;
    }

    .vocab-list li::before {
      content: "●";
      position: absolute;
      left: 0;
      color: #7c3aed;
      font-size: 0.65rem;
      top: 5px;
    }

    #summary {
      display: none;
      max-width: 720px;
      margin: 0 auto;
      text-align: center;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.1);
      padding: 40px 32px;
    }

    #summary h2 { font-size: 1.6rem; color: #4338ca; margin-bottom: 12px; }
    #summary .score-big { font-size: 3rem; font-weight: 800; color: #6366f1; margin-bottom: 8px; }
    #summary p { color: #4a5568; font-size: 1rem; margin-bottom: 24px; }

    .reset-btn {
      padding: 12px 32px;
      background: linear-gradient(135deg, #6366f1, #4338ca);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .reset-btn:hover { opacity: 0.88; }

    @media (max-width: 600px) {
      .card { padding: 20px 16px 18px; }
    }
  </style>
</head>

<script>
const questions = [
  {

    vocab: [

      "【近義詞】confidentiality（機密性）、seclusion（隔絕、隱居）",
      "【延伸搭配】right to privacy（隱私權）、invasion of privacy（侵犯隱私）、privacy policy（隱私政策）"

  {
    id: 2,

      { label: "A", text: "eager", hint: "（渴望的；熱切的）" },

      { label: "C", text: "mean", hint: "（刻薄的；吝嗇的）✓" },

    vocab: [
      "mean (adj.) 刻薄的、卑鄙的、吝嗇的；mean (n./v.) 平均/意思/意味",
      "【近義詞】unkind（不親切的）、cruel（殘忍的）、nasty（討厭的）",
      "【延伸搭配】mean-spirited（小氣的）、a mean trick（惡意的把戲）"

  },
  {

      { label: "B", text: "associated", hint: "（聯繫；關聯）" },

  {

      { label: "A", text: "advised", hint: "（建議；忠告）" },

let answered = 0;
let score = 0;
const total = questions.length;

function selectAnswer(idx, chosen) {
  const q = questions[idx];
  const card = document.getElementById(`card-${idx}`);
  const btns = card.querySelectorAll('.option-btn');
  const analysisBox = document.getElementById(`analysis-${idx}`);
  const moreBtn = document.getElementById(`more-btn-${idx}`);

  btns.forEach(btn => { btn.disabled = true; });

  const isCorrect = chosen === q.answer;
  if (isCorrect) {
    score++;
    card.classList.add('correct');
  } else {
    card.classList.add('wrong');
  }

  btns.forEach(btn => {
    const label = btn.getAttribute('data-label');
    if (label === chosen) {
      btn.classList.add(isCorrect ? 'selected-correct' : 'selected-wrong');
      const icon = btn.querySelector('.result-icon');
      if (icon) icon.textContent = isCorrect ? ' ✓' : ' ✗';
    }
    if (!isCorrect && label === q.answer) {
      btn.classList.add('reveal-correct');
    }
  });

  analysisBox.classList.add('visible');
  if (moreBtn) moreBtn.style.display = 'inline-flex';

  answered++;
  const pct = Math.round((answered / total) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = `已作答 ${answered} / ${total} 題`;

  if (answered === total) {
    setTimeout(showSummary, 600);
  }
}

function toggleSupp(idx) {
  const box = document.getElementById(`supp-${idx}`);
  const btn = document.getElementById(`more-btn-${idx}`);
  const visible = box.classList.toggle('visible');
  btn.textContent = visible ? '▲ 收起補充' : '▼ 查看更多補充';
}

function buildQuiz() {
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';
  questions.forEach((q, idx) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.id = `card-${idx}`;

    const analysisLines = q.analysis.split('\n\n').map(s => `<p style="margin-bottom:8px">${s.replace(/\n/g,'<br>')}</p>`).join('');
    const vocabItems = q.vocab.map(v => `<li>${v}</li>`).join('');
    const optionsHTML = q.options.map(opt => `
      <button class="option-btn" data-label="${opt.label}" onclick="selectAnswer(${idx},'${opt.label}')">
        <span class="option-tag">${opt.label}</span>
        <span>${opt.text} <em>${opt.hint}</em></span>
        <span class="result-icon"></span>
      </button>`).join('');

    card.innerHTML = `
      <div class="q-header">
        <div class="q-num">${q.id}</div>
        <div class="q-text">
          ${q.stem}<br>
          <em>${q.stem_zh}</em>
        </div>
      </div>
      <ul class="options">${optionsHTML}</ul>
      <div class="analysis-box" id="analysis-${idx}">
        <div class="analysis-label">📖 解析</div>
        <div class="analysis-text">${analysisLines}</div>
        <button class="more-btn" id="more-btn-${idx}" style="display:none" onclick="toggleSupp(${idx})">▼ 查看更多補充</button>
        <div class="supplement-box" id="supp-${idx}">
          <div class="supplement-label">📚 補充說明</div>
          <ul class="vocab-list">${vocabItems}</ul>
        </div>
      </div>`;
    container.appendChild(card);
  });
}

function showSummary() {
  document.getElementById('quiz-container').style.display = 'none';
  document.getElementById('progressBar').parentElement.style.display = 'none';
  document.getElementById('progressText').style.display = 'none';
  const summary = document.getElementById('summary');
  summary.style.display = 'block';
  document.getElementById('scoreDisplay').textContent = `${score} / ${total}`;
  const pct = Math.round((score / total) * 100);
  let msg = '';
  if (pct === 100) msg = '完美！全部答對，實力超強！🏆';
  else if (pct >= 80) msg = '表現優異！再努力一點就完美了！💪';
  else if (pct >= 60) msg = '還不錯！繼續加油，多複習幾次！📖';
  else msg = '別灰心，再練習一次，你一定能進步！🌟';
  document.getElementById('scoreMsg').textContent = msg;
}

function resetQuiz() {
  answered = 0; score = 0;
  document.getElementById('progressBar').style.width = '0%';
  document.getElementById('progressText').textContent = `已作答 0 / ${total} 題`;
  document.getElementById('progressBar').parentElement.style.display = '';
  document.getElementById('progressText').style.display = '';
  document.getElementById('summary').style.display = 'none';
  document.getElementById('quiz-container').style.display = '';
  buildQuiz();
}

buildQuiz();
</script>
