y year, leaders from many countries meet at a large climate summit to talk about our warming planet. Scientists caution that the Earth has already warmed by roughly one degree since the age of coal and steam. Although that figure may sound trivial, it is enough to melt ancient glaciers and unsettle familiar weather patterns. At these meetings, they [[21]] to cut the gases that trap heat in the air. Rising seas now threaten low-lying cities, whereas farther inland droughts scorch once-fertile farmland. Given these mounting dangers, delegates argue late into the night over who should pay for the necessary changes. One important goal is to reach \"net zero,\" [[22]] means adding no extra carbon to the sky. Wealthier nations, which burned fossil fuels first, are often urged to assist poorer ones still struggling to develop. Moreover, promises made on paper mean little unless they are backed by firm laws and honest reporting. Reaching this goal will not be easy, [[23]] it needs teamwork from every nation. Some critics dismiss the summits as mere talk, yet each agreement gradually raises global expectations. Renewable energy, once dismissed as hopelessly costly, has already grown cheaper than coal in many regions. As a result, cautious investors are steadily shifting their money toward cleaner and more sustainable industries. If we truly act together starting now, our children may still enjoy [[24]]. The task remains daunting, but abandoning it altogether would leave future generations a far harsher world.","blanks":[{"n":21,"type":"詞彙","options":{"A":"hesitate","B":"promise","C":"threaten","D":"pretend"},"answer":"B","explain_zh":"(B) promise：各國「承諾」減少氣體，考動詞詞彙。","note":"【正解】各國在峰會上「承諾」減少溫室氣體，promise to cut the gases 語意最合，故選 promise。\n【誘答】(A) hesitate to cut「猶豫是否減碳」與峰會積極推動減碳的目的相反；(C) threaten to cut「威脅要減少」語氣不合，減碳是正面目標，不會用「威脅」；(D) pretend to cut「假裝減少」語帶虛偽，文中並無此意。\n【重點】promise to V「承諾做…」；由峰會共同面對暖化的情境判斷動詞語氣為正面。\n【句意】在這些會議上，他們承諾減少那些把熱能困在空氣中的氣體。"},{"n":22,"type":"語法","options":{"A":"that","B":"what","C":"it","D":"which"},"answer":"D","explain_zh":"(D) which：非限定關係子句補充說明 net zero，考關係詞。","note":"【正解】逗號後補充說明前面整個概念「net zero」，用非限定關係代名詞 which 引導，並當子句主詞，故選 which。\n【誘答】(A) that 不能引導非限定關係子句（逗號後不可用 that）；(B) what 不接先行詞、也不引導關係子句；(C) it 為代名詞，會造成兩句以逗號黏接的連寫句，無法連接子句。\n【重點】逗號後補充說明前面名詞或整句用 which（非限定用法）；此處 which 當 means 的主詞。\n【句意】一個重要目標是達到「淨零」，也就是不再往天空排放額外的碳。"},{"n":23,"type":"連接詞","options":{"A":"because","B":"yet","C":"although","D":"unless"},"answer":"A","explain_zh":"(A) because：後句說明目標不易達成的原因，考連接詞。","note":"【正解】「需要每個國家合作」是「不會容易」的原因，用 because 引導原因子句，故選 because。\n【誘答】(B) yet「然而」表轉折對比，但前後為因果而非對比關係；(C) although「雖然」表讓步，語意不合；(D) unless「除非」會使句意變成條件，與因果不符。\n【重點】結果在前、原因在後用 because；由邏輯關係判斷連接詞。\n【句意】達成這個目標並不容易，因為它需要每個國家的團隊合作。"},{"n":24,"type":"整句語意","options":{"A":"the last clean air on Earth","B":"a world we can no longer save","C":"a cleaner and healthier world","D":"little more than empty promises"},"answer":"C","explain_zh":"(C) 呼應「共同減碳留給下一代好環境」的主旨，考整句語意。","note":"【正解】前文說若現在一起行動，孩子仍能享有 a cleaner and healthier world「更乾淨、更健康的世界」，正面結果呼應主旨，故選 (C)。\n【誘答】(A) 「地球上最後的乾淨空氣」雖有「乾淨」字眼看似正面，但「最後」暗示資源將盡，與現在行動可換來美好未來的希望矛盾；(B) 「一個我們再也無法拯救的世界」與「若現在行動、孩子仍有希望」的前提相矛盾；(D) 「只不過是空頭承諾」無法作為「享有」的對象，語意與邏輯皆不合。\n【重點】結尾名詞片語須呼應主旨（合作減碳→更好的未來）。\n【句意】如果我們現在就真正一起行動，我們的孩子仍能享有一個更乾淨、更健康的世界。"}]},{"label":"B","title_zh":"台灣 2050 淨零與再生能源","text":"Taiwan has promised to reach net zero by the year 2050, and clean energy is the key to this plan. For decades, the island relied almost entirely on imported oil, gas, and coal shipped across distant oceans. Such heavy dependence left the economy dangerously vulnerable whenever global fuel prices suddenly surged. Along the western coast, rows of tall wind machines now stand in the sea, turning the strong ocean wind [[25]] electricity. The Taiwan Strait, fortunately, is blessed with some of the fiercest and steadiest winds on Earth. Engineers soon realized that harnessing this natural force could turn a longstanding weakness into a remarkable advantage. On many rooftops and fish farms, solar panels quietly [[26]] sunlight into power during the day. Offshore turbines, though expensive to install, generate power for decades once they are firmly anchored to the seabed. Meanwhile, subtropical sunshine bathes the island for much of the year, making countless rooftops ideal for panels. These green sources are far cleaner [[27]] the coal we burned in the past. Storing this energy remains tricky, since the wind sometimes falls still and thick clouds often dim the sun. To solve the problem, engineers are building giant batteries that release electricity precisely when demand peaks. If the country keeps building them, Taiwan could one day [[28]]. Whereas fossil fuels release carbon that lingers for centuries, these renewable sources leave the atmosphere almost untouched. Given the government's firm timetable, the coming decades will surely test the nation's resolve as never before.","blanks":[{"n":25,"type":"介系詞","options":{"A":"to","B":"up","C":"into","D":"over"},"answer":"C","explain_zh":"(C) turn...into：把風「轉變成」電力，考動詞片語介系詞。","note":"【正解】turn A into B 意為「把 A 變成 B」，此處把海風轉變成電力，故選 into。\n【誘答】(A) turn...to 表「轉向」而非「轉換成」，此處需要 A→B 的轉換用 into，to 與 into 易混但語意不同；(B) turn up「調高／出現」語意不合；(D) turn over「翻轉／移交」與「把風轉成電」不符。\n【重點】turn/change A into B「把 A 轉變成 B」為固定片語；由「風→電」的轉換關係選 into。\n【句意】沿著西部海岸，一排排高大的風力機器如今矗立海中，把強勁的海風轉變成電力。"},{"n":26,"type":"詞彙","options":{"A":"change","B":"absorb","C":"reflect","D":"store"},"answer":"A","explain_zh":"(A) change...into：太陽能板把陽光「轉換成」電力，考動詞詞彙。","note":"【正解】後面有 into power，change sunlight into power「把陽光轉換成電力」語意最合，故選 change。\n【誘答】(B) absorb「吸收」陽光雖與太陽能板相關，但不接 into power，無法表「轉換成電」；(C) reflect「反射」陽光與「轉換成電」相反，也不與 into power 搭配；(D) store「儲存」雖與能源有關，但 store...into power 不成立，語意也非「轉換」。\n【重點】change A into B 與 turn A into B 同義；由受詞 sunlight 與 into power 判斷動詞。\n【句意】在許多屋頂和魚塭上，太陽能板在白天靜靜地把陽光轉換成電力。"},{"n":27,"type":"語法","options":{"A":"as","B":"than","C":"then","D":"compared"},"answer":"B","explain_zh":"(B) than：與比較級 cleaner 連用，考比較級。","note":"【正解】前面有比較級 far cleaner，須用 than 帶出比較對象 the coal，故選 than。\n【誘答】(A) as 用於 as…as 同級比較，不與比較級 cleaner 搭配；(C) then 是表「然後」的副詞，與 than 同音易混，但非比較連接詞；(D) compared 須接 to/with（compared to the coal），不能直接接受詞，且比較級已用 than。\n【重點】比較級＋than＋比較對象；cleaner…than 為固定結構。\n【句意】這些綠色能源遠比我們過去燃燒的煤炭乾淨得多。"},{"n":28,"type":"整句語意","options":{"A":"free itself from every power cut","B":"run entirely on imported oil again","C":"export its dirty coal abroad","D":"depend far less on dirty fuels"},"answer":"D","explain_zh":"(D) 呼應「發展綠能、減少化石燃料」的主旨，考整句語意。","note":"【正解】前文鼓勵持續興建再生能源，結果應是 depend far less on dirty fuels「大幅減少對髒燃料的依賴」，呼應淨零主旨，故選 (D)。\n【誘答】(A) 「擺脫每一次停電」利用電池看似合理，但「每一次」為過度絕對的宣稱，且本段重點是減少化石燃料依賴，而非消除所有停電；(B) 「再次完全仰賴進口石油」與擺脫進口能源的方向矛盾；(C) 「把髒煤出口到國外」與發展綠能、減碳的主旨相反。\n【重點】結尾片語須呼應主旨（發展綠能→減少化石燃料）。\n【句意】如果國家持續興建這些設施，台灣有朝一日就能大幅減少對髒燃料的依賴。"}]}],"vocab":["climate","summit","warming","promise","carbon","teamwork","energy","coast","solar","panel","coal","clean","fuel","depend","glacier","trivial","drought","delegate","sustainable","renewable","vulnerable","surge","harness","turbine","resolve","atmosphere"]},{"id":19,"passages":[{"label":"A","title_zh":"疫情後的通貨膨脹與物價上漲","text":"After the pandemic, many families noticed that the prices of daily goods kept going [[21]]. Around the globe, the cost of living climbed at a pace not witnessed in decades. Several forces combined to drive this surge: tangled supply chains, soaring energy bills, and a sudden rebound in demand. A simple lunch box, a cup of coffee, and even a bus ticket suddenly cost more than before. When factories finally reopened, they struggled to produce goods quickly enough to satisfy eager customers. Economists call this steady rise in prices \"inflation,\" and it can [[22]] how much our money is really worth. Whereas a mild rise in prices can signal a healthy economy, runaway inflation quietly erodes people's savings. Retirees on fixed incomes suffered most, for their pensions bought noticeably less with each passing month. When wages do not grow as fast as prices, people must spend [[23]] carefully than they used to. Given the pressure, central banks raised interest rates in an effort to cool the overheating market. Higher rates, however, made loans costlier, discouraging families from buying homes or cars. Moreover, once shoppers expect prices to keep climbing, they rush to buy, which pushes prices even higher. To make every dollar count, some shoppers now compare prices online [[24]]. Breaking this vicious cycle demands both patience and steady, carefully measured policy. Economists agree that restoring stable prices, though painful, ultimately protects everyone's hard-earned money.","blanks":[{"n":21,"type":"詞彙","options":{"A":"down","B":"off","C":"on","D":"up"},"answer":"D","explain_zh":"(D) go up：物價「上漲」，考片語動詞詞彙。","note":"【正解】go up 意為「上升、上漲」，後句說午餐、咖啡、車票都變貴，故物價是「往上漲」，選 up。\n【誘答】(A) go down「下降」與後文物價變貴矛盾，是最強的相反陷阱；(B) go off「（食物）壞掉／（警報）響起」語意不合；(C) go on「繼續（發生）」，kept going on 語意贅餘，也未表達「上漲」的方向。\n【重點】prices go up「物價上漲」為常見片語；由後文「cost more」判斷方向。\n【句意】疫情之後，許多家庭注意到日常用品的價格持續上漲。"},{"n":22,"type":"詞彙","options":{"A":"effect","B":"affect","C":"reflect","D":"infect"},"answer":"B","explain_zh":"(B) affect：通膨「影響」金錢的價值，考動詞詞彙。","note":"【正解】通膨會「影響」金錢真正的價值，affect how much our money is worth 語意最合，故選 affect。\n【誘答】(A) effect 常與 affect 混淆，但 effect 作動詞意為「促成、實現」，此處需要「影響」用 affect；(C) reflect「反映」是被動呈現，而通膨是「改變」金錢價值，非僅反映；(D) infect「感染」與 affect 發音相近，但意為傳染疾病，語意不合。\n【重點】affect「影響」為及物動詞，後接受詞；注意與名詞 effect 區分。\n【句意】經濟學家把這種價格的持續上升稱為「通貨膨脹」，它會影響我們的錢究竟值多少。"},{"n":23,"type":"語法","options":{"A":"more","B":"most","C":"as","D":"so"},"answer":"A","explain_zh":"(A) more carefully than：比較級副詞，考比較級。","note":"【正解】句尾有 than，且 carefully 為雙音節以上的副詞，比較級用 more carefully，故選 more。\n【誘答】(B) most 為最高級，須配 the 且不與 than 連用；(C) as 用於 as…as 同級比較，不接 than；(D) so 用於 so…that 結構，也不與 than 搭配。\n【重點】長副詞比較級用 more＋副詞＋than；由 than 判斷須用比較級。\n【句意】當薪水的成長趕不上物價時，人們必須花錢花得比以前更謹慎。"},{"n":24,"type":"整句語意","options":{"A":"even after they have paid","B":"to help stores raise their prices","C":"before they buy anything at all","D":"whenever they feel like overspending"},"answer":"C","explain_zh":"(C) 呼應「精打細算、上網比價」的主旨，考整句語意。","note":"【正解】前文說要讓每塊錢都花在刀口上，故上網比價是 before they buy anything at all「在買任何東西之前」，呼應省錢主旨，故選 (C)。\n【誘答】(A) 「甚至在付完錢之後」才比價無法省錢，與「讓每一塊錢都花得值得」矛盾；(B) 「為了幫商店抬高價格」與消費者省錢的目的相反；(D) 「每當想要多花錢時」才比價，與謹慎消費的主旨矛盾。\n【重點】結尾子句須呼應主旨（通膨→謹慎消費、比價）。\n【句意】為了讓每一塊錢都花得值得，有些消費者現在會在買任何東西之前先上網比價。"}]},{"label":"B","title_zh":"遠距與混合辦公的新常態","text":"During the pandemic, millions of workers had to stay home, and many of them worked online for the very first time. Before the crisis, working from home was regarded as a rare privilege granted to only a fortunate few. Almost overnight, kitchen tables became desks and video calls replaced crowded meeting rooms. Now that offices have reopened, a lot of companies still let their staff choose [[25]] to work from home or come in. To everyone's surprise, productivity in many firms held steady, and in some cases even rose. This mix of home and office is often [[26]] \"hybrid work.\" Freed from long commutes, employees reported sleeping better and spending more meaningful hours with their families. Yet remote work brought fresh challenges, for the line between office and home grew dangerously blurred. Employees enjoy it because it saves the long time they once spent [[27]] to work every morning. Some workers, isolated from their colleagues, quietly struggled with loneliness and a creeping sense of burnout. Whereas a quick chat by the coffee machine once solved problems, scattered teams now scheduled endless online meetings. Recognizing these drawbacks, managers began redesigning offices as places for collaboration rather than routine tasks. As long as the job gets done well, more bosses today believe that their teams can be trusted [[28]]. Given the clear benefits on both sides, the hybrid model soon emerged as a sensible compromise. As a result, flexibility, once a rare perk, has become something that today's job seekers openly demand.","blanks":[{"n":25,"type":"語法","options":{"A":"whether","B":"if","C":"how","D":"whichever"},"answer":"A","explain_zh":"(A) whether...or：選擇在家或進辦公室，考 whether…or 句型。","note":"【正解】後面有 or come in，whether…or…「是…還是…」表兩者擇一，故選 whether，choose whether to work from home or come in。\n【誘答】(B) if 雖與 whether 意義相近，但 if 不能直接接「to＋原形」（只能說 whether to，不能 if to）；(C) how「如何」問方式，how to work from home or come in 無法表達「二選一」；(D) whichever 須接名詞，不能直接接不定詞，結構不合。\n【重點】whether to V…or…「要…還是…」表選擇；由後面的 or 判斷。\n【句意】如今辦公室重新開放，許多公司仍讓員工自行選擇要在家工作還是進辦公室。"},{"n":26,"type":"語法","options":{"A":"calling","B":"call","C":"called","D":"been called"},"answer":"C","explain_zh":"(C) is called：被動語態「被稱為」，考被動與詞形。","note":"【正解】主詞 mix 與 call 為被動關係（這種混合「被稱為」混合辦公），is often called「常被稱為」用過去分詞構成被動，故選 called。\n【誘答】(A) calling 為現在分詞，is calling 表主動進行，語意不合（這種方式並非主動「稱呼」）；(B) call 為原形，is 後不可直接接原形；(D) been called 需與 have/has 連用（has been called），不能說 is been called，形式錯誤。\n【重點】be＋過去分詞＝被動語態；A is called B「A 被稱為 B」。\n【句意】這種在家與辦公室並行的方式，常被稱為「混合辦公」。"},{"n":27,"type":"詞彙","options":{"A":"parking","B":"arriving","C":"waiting","D":"traveling"},"answer":"D","explain_zh":"(D) traveling to work：省下「通勤」時間，考動詞詞彙。","note":"【正解】spend time traveling to work「花時間往返上班（通勤）」，與「省下時間」的語意一致，故選 traveling。\n【誘答】(A) park 應搭配 at work，且停車並非通勤所花的漫長時間，spent parking to work 不合；(B) arrive 為瞬間動作且接 at（arrive at work），不會「花很長時間 arriving」；(C) waiting to work 意為「等著去工作」，並非往返通勤，語意不符。\n【重點】spend time (in) V-ing「花時間做…」；由 to work 判斷是「通勤往返」。\n【句意】員工喜歡它，因為它省下了他們過去每天早上往返上班所花的漫長時間。"},{"n":28,"type":"整句語意","options":{"A":"only when they sit in the main office","B":"wherever they choose to work","C":"as long as someone monitors their screens","D":"even if they ignore every deadline"},"answer":"B","explain_zh":"(B) 呼應「重成果、給員工彈性與信任」的主旨，考整句語意。","note":"【正解】前文說「只要工作做好」，老闆相信團隊 wherever they choose to work「無論在哪裡工作」都能被信任，呼應彈性與信任主旨，故選 (B)。\n【誘答】(A) 「只有當他們坐在總部辦公室時」把信任限縮在辦公室，與混合辦公、彈性的主旨矛盾；(C) 「只要有人盯著他們的螢幕」需要監控，與「被信任」相矛盾；(D) 「即使他們忽略每個截止期限」與「只要工作做得好」的前提矛盾。\n【重點】結尾子句須呼應主旨（混合辦公→信任與彈性）。\n【句意】只要工作做得好，如今更多老闆相信，無論團隊選擇在哪裡工作都能被信任。"}]}],"vocab":["pandemic","goods","inflation","economist","affect","worth","wage","carefully","compare","hybrid","employee","trust","surge","rebound","erode","pension","interest rate","vicious cycle","productivity","commute","blurred","burnout","collaboration","flexibility"]},{"id":20,"passages":[{"label":"A","title_zh":"2024 巴黎奧運","text":"In the summer of 2024, the world turned its eyes to Paris, where the Olympic Games were [[21]] once again. Held every four years, the Olympics trace their roots to ancient Greece, where rival cities once laid down their weapons to compete. The modern revival, launched in 1896, has since grown into the largest sporting festival on the planet. Thousands of athletes from around the globe came together to compete [[22]] gold medals in many different sports. Preparing to host such an event takes a city many years and demands staggering sums of money. Brand-new stadiums must rise, while airports, hotels, and railways are stretched to their very limits. The opening show was held along a famous river, [[23]] made it very different from past games. Given the sheer scale, organizers rehearse for months so that millions of spectators can be welcomed smoothly. Behind every medal lies a story of relentless discipline, painful injuries, and countless quiet sacrifices. For two weeks, fans cheered for their heroes and shared the pure joy of sport. Many athletes train for a decade merely to earn a single fleeting chance at glory. Whereas a lucky few return home as celebrated champions, most simply take pride in having represented their nation. Watching the Games reminds us that hard work and fair play [[24]]. Moreover, the Games showcase not only speed and strength but also the quiet dignity of a graceful defeat. As the closing ceremony fades, the host city passes a symbolic torch to the next, and the dream begins anew.","blanks":[{"n":21,"type":"詞彙","options":{"A":"set","B":"held","C":"gathered","D":"joined"},"answer":"B","explain_zh":"(B) be held：賽會「被舉辦」，考動詞詞彙與被動。","note":"【正解】hold the Games「舉辦賽會」，主詞為 the Games，用被動 were held「被舉辦」，故選 held。\n【誘答】(A) set 意為「設定、安排」，the Games were set 無法表達「舉辦賽會」，主辦賽會用 hold；(C) gathered「聚集」用於人（運動員齊聚），賽會本身不會被「聚集」；(D) joined「加入」是參與者加入賽會，賽會本身不會「被加入」，語意不合。\n【重點】hold a game/meeting「舉辦…」，被動為 be held；由主詞 Games 判斷用被動。\n【句意】2024 年夏天，全世界的目光轉向巴黎，奧運再次在那裡舉辦。"},{"n":22,"type":"介系詞","options":{"A":"in","B":"with","C":"at","D":"for"},"answer":"D","explain_zh":"(D) compete for：「競逐」金牌，考動詞介系詞搭配。","note":"【正解】compete for something 意為「為爭取…而競爭」，此處競逐金牌，故選 for。\n【誘答】(A) compete in 接項目或領域（compete in a sport），不接獎項，compete in gold medals 不合；(B) compete with 接對手（人），非獎項；(C) compete at 接場合或層級（compete at the Olympics），非獎項；競逐獎項須用 compete for。\n【重點】compete for＋獎項/目標「競逐…」；記 compete with sb for sth。\n【句意】來自世界各地的數千名運動員齊聚一堂，在許多不同項目中競逐金牌。"},{"n":23,"type":"語法","options":{"A":"which","B":"that","C":"what","D":"it"},"answer":"A","explain_zh":"(A) which：非限定關係子句，指前面整件事，考關係詞。","note":"【正解】逗號後補充說明前面整件事（開幕在河畔舉行），用非限定關係代名詞 which 當子句主詞，故選 which。\n【誘答】(B) that 不能引導非限定關係子句（逗號後不可用 that）；(C) what 不接先行詞、不引導關係子句；(D) it 為代名詞，會造成逗號黏接的連寫句，無法連接子句。\n【重點】which 可指前面整個句子（非限定用法），並在子句中當主詞。\n【句意】開幕表演沿著一條著名的河舉行，這使它與過去的賽會非常不同。"},{"n":24,"type":"整句語意","options":{"A":"always guarantee an easy victory","B":"matter far less than raw talent","C":"can truly bring people together","D":"cannot be taught to young athletes"},"answer":"C","explain_zh":"(C) 呼應奧運「團結、正向」的主旨，考整句語意。","note":"【正解】全文描寫各國同歡、共享運動喜悅，結尾說努力與公平競爭 can truly bring people together「能真正把人們凝聚在一起」，呼應主旨，故選 (C)。\n【誘答】(A) 「總能保證輕鬆獲勝」與全文（多數選手練十年僅得一次機會、且推崇雖敗猶榮）矛盾，努力並不保證輕鬆勝利；(B) 「遠不如天賦重要」貶低努力與公平競爭，與全文推崇的價值相反；(D) 「無法教給年輕運動員」既無依據，也與勵志、傳承的語氣不符。\n【重點】結尾子句須呼應主旨（奧運→團結、友誼）。\n【句意】觀看奧運提醒我們，努力與公平競爭能真正把人們凝聚在一起。"}]},{"label":"B","title_zh":"台灣選手在國際賽事奪牌","text":"Taiwan is a small island, but its athletes have won honor on the world stage many times. With a population smaller than many single cities abroad, the island competes against nations many times its size. Such success rarely happens by chance; it is built upon years of grueling practice and unshakable determination. In badminton, our players have beaten some of the best teams and [[25]] home shining gold medals. Long before dawn, young hopefuls report to their training halls, repeating the same movements until they become instinct. Coaches, many of them former champions themselves, patiently pass down hard-won wisdom to the next generation. In weightlifting, a strong local hero lifted far more than her rivals and set a brand-new [[26]]. Financial support, though slowly improving, still lags behind that of far wealthier sporting powers. Whereas rival athletes enjoy lavish facilities, ours often triumph through sheer grit and clever strategy. Each time the national flag rises high, fans across the island feel very [[27]]. Given these obstacles, every medal carries a weight far heavier than the metal from which it is forged. Moreover, each victory inspires countless children to believe that their own dreams truly lie within reach. These victories show that with enough training and courage, even small countries can [[28]]. Television screens across the island glow late into the night whenever a local star advances toward the final. As a result, sport has quietly become a powerful source of shared pride and national identity.","blanks":[{"n":25,"type":"詞彙","options":{"A":"fought","B":"sought","C":"brought","D":"taught"},"answer":"C","explain_zh":"(C) bring home：「帶回」獎牌，考動詞片語詞彙。","note":"【正解】bring home medals「把獎牌帶回國」為常見說法，過去式 brought 與前面 have beaten 的完成式一致，故選 brought。\n【誘答】(A) fought 與 brought 押韻且有「奮戰」聯想，但 fought home 不成詞，無法表「把獎牌帶回」；(B) sought「尋找」的過去式，sought home medals 語意不合，獎牌是「帶回」而非「尋找」回家；(D) taught「教導」的過去式，與 home gold medals 完全不搭。\n【重點】bring home＋獎項「贏得並帶回…」；四個選項拼字相近，須看語意。\n【句意】在羽球項目，我們的選手擊敗了一些最強的隊伍，把閃亮的金牌帶回家。"},{"n":26,"type":"詞彙","options":{"A":"record","B":"goal","C":"trend","D":"rule"},"answer":"A","explain_zh":"(A) set a record：舉重「創新紀錄」，考名詞詞彙與搭配。","note":"【正解】set a record「創下紀錄」為固定搭配，與「舉起比對手更重」的情境一致，故選 record。\n【誘答】(B) set a goal「設定目標」是訂立未來的目標，但她已「舉起更重」是既成成就，語意錯置；(C) set a trend「開創潮流」與舉重成績無關；(D) set a rule「制定規則」是訂規範，並非靠舉重締造的成績。\n【重點】set a (new) record「創（新）紀錄」為常見搭配。\n【句意】在舉重項目，一位強壯的本地英雄舉起遠比對手更重的重量，創下全新紀錄。"},{"n":27,"type":"詞彙","options":{"A":"nervous","B":"jealous","C":"curious","D":"proud"},"answer":"D","explain_zh":"(D) proud：國旗升起時球迷「感到驕傲」，考形容詞詞彙。","note":"【正解】國旗升起、選手奪牌，球迷應「感到驕傲」，feel very proud 語意最合，故選 proud。\n【誘答】(A) nervous「緊張」屬於比賽前或進行中，此時國旗已升起（已奪牌），與慶祝時刻不符；(B) jealous「嫉妒」為負面情緒，與球迷為自家選手同感光榮相矛盾；(C) curious「好奇」與奪牌升旗的激動情緒無關。\n【重點】feel proud「感到驕傲」；由奪牌、升旗的情境判斷情緒為正面。\n【句意】每當國旗高高升起，全島的球迷都感到非常驕傲。"},{"n":28,"type":"整句語意","options":{"A":"outspend the wealthiest sporting powers","B":"also shine on the world stage","C":"buy their way to every medal","D":"host the Olympic Games someday"},"answer":"B","explain_zh":"(B) 呼應「小國也能揚名國際」的主旨，考整句語意。","note":"【正解】前文舉台灣奪牌為例，說明只要努力與勇氣，小國也能 also shine on the world stage「在世界舞台上發光」，呼應主旨，故選 (B)。\n【誘答】(A) 「在支出上超越最富有的體育強權」與前文「經費仍落後、靠拚勁與策略取勝」矛盾；(C) 「花錢買下每一面獎牌」與「憑毅力與聰明策略致勝」相反；(D) 「有朝一日主辦奧運」雖是願景，但偏離「靠努力在世界舞台發光」的主旨。\n【重點】結尾子句須呼應主旨（努力＋勇氣→小國也能揚名）。\n【句意】這些勝利顯示，只要有足夠的訓練與勇氣，即使是小國也能在世界舞台上發光。"}]}],"vocab":["Olympic","athlete","compete","medal","cheer","badminton","weightlifting","rival","record","flag","proud","victory","courage","revival","staggering","spectator","discipline","sacrifice","graceful","determination","grit","strategy","identity","instinct"]},{"id":21,"passages":[{"label":"A","title_zh":"永續時尚與二手衣循環","text":"In recent years, many young people have started to think about the clothes they buy. The clothing industry, which ranks among the most polluting businesses on earth, has expanded at a staggering speed over the past decade. Manufacturers deliberately release new collections almost weekly, encouraging consumers to treat garments as disposable. Fast fashion makes cheap clothes quickly, but it also [[21]] a lot of waste and pollution. Every year, tons of used clothes are thrown away and end up in landfills. Moreover, many of these garments are made from plastic fibers, so they may take centuries to break down completely. Making all this new clothing also uses a great deal of water and energy. Given that clean water is becoming increasingly scarce, such enormous consumption is hard to justify. Whereas previous generations mended and reused their clothing, today's shoppers tend to discard items after only a few wears. Fortunately, a growing movement known as sustainable fashion is beginning to challenge this wasteful habit. [[22]] buying something new every week, more shoppers now choose second-hand clothes. Thrift stores and online resale platforms have therefore attracted a loyal following among environmentally conscious teenagers. These clothes are often much [[23]] than new ones, and they still look great. Having been carefully washed and repaired, such second-hand garments can look almost indistinguishable from brand-new ones. In addition, buying pre-owned pieces allows people to express a unique personal style that mass production rarely offers. As a result, a single choice that once seemed trivial can, when multiplied across millions of shoppers, help reshape an entire industry. By giving old clothes a second life, we can [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"collects","B":"creates","C":"removes","D":"solves"},"answer":"B","explain_zh":"(B) creates：快時尚也「製造」大量廢棄與汙染，考動詞詞彙。","note":"【正解】create「製造、造成」，指快時尚在快速生產便宜衣服的同時，也製造大量垃圾與汙染；主詞 it 為單數，用 creates。\n【誘答】(A) collects 收集：廢棄與汙染是被「製造」出來的，而非把既有垃圾「收集」起來，搭配語意不合；(C) removes 移除、(D) solves 解決：都像在「處理」汙染，方向與「製造汙染」正好相反。\n【重點】動詞 create 表「造成、產生」；第三人稱單數現在式加 s。\n【句意】快時尚快速製造便宜的衣服，但也製造了大量的廢棄物與汙染。"},{"n":22,"type":"介系詞","options":{"A":"Aside from","B":"As well as","C":"Regardless of","D":"Instead of"},"answer":"D","explain_zh":"(D) Instead of：「不再…而是」改買二手衣，考介系詞片語。","note":"【正解】instead of「而不是、取代」後接動名詞 buying，表示人們「不再每週買新衣，而是」選擇二手衣，符合前後對比。\n【誘答】(A) Aside from 除了…之外（還）、(B) As well as 以及：都表「附加、並列」，語意是「兩者都做」，與本句「不買新衣、改買二手」的取代關係不符；(C) Regardless of 不管、無論：後雖可接動名詞，但語意與前後對比脫節。三者皆可接 V-ing，卻都無法表達「以…取代…」。\n【重點】instead of + N/V-ing「代替、而不是」。\n【句意】人們現在不再每週都買新東西，而是選擇二手衣。"},{"n":23,"type":"語法","options":{"A":"cheaper","B":"cheaply","C":"cheapest","D":"less cheap"},"answer":"A","explain_zh":"(A) cheaper：much 修飾比較級，與 than 連用，考比較級。","note":"【正解】句中有 much 與 than，需用比較級 cheaper「更便宜」；much 用來加強比較級語氣。\n【誘答】(B) cheaply 是副詞，不能當 be 動詞的主詞補語，也不受 much 修飾；(C) cheapest 為最高級，須配 the 且不與 than 連用；(D) less cheap 雖是比較級結構，但語意變成「比較不便宜」，與「比新衣便宜許多」的語境矛盾。\n【重點】much/far/a lot + 比較級 + than；單音節形容詞比較級直接加 -er。\n【句意】這些衣服通常比新衣便宜許多，而且看起來依然很好看。"},{"n":24,"type":"整句語意","options":{"A":"afford to buy brand-new clothes far more often","B":"make the fashion industry produce clothes even faster","C":"reduce waste and protect our planet at the same time","D":"save money without ever caring about the environment"},"answer":"C","explain_zh":"(C) 呼應「讓舊衣重生、愛地球」的主旨，考整句語意。","note":"【正解】前句說「給舊衣第二次生命」，故結論應是「同時減少廢棄並保護地球」，與永續時尚主旨一致。\n【誘答】(A) 能更常買全新衣服：語氣正面且與衣物有關，但重點放在「買更多新衣」，與全文重複利用、減量的主旨相反；(B) 讓時尚業生產得更快：加速生產正是文章批評的問題，與結論矛盾；(D) 省錢卻完全不在乎環境：提到省錢貌似合理，但「不在乎環境」與全文的環保立場衝突。\n【重點】整句語意須與全文「永續、減量」的正向主旨呼應。\n【句意】藉由讓舊衣重獲新生，我們可以同時減少廢棄物並保護我們的地球。"}]},{"label":"B","title_zh":"台灣文創與本土設計品牌","text":"Taiwan is not only famous for its night markets and food but also for its creative local brands. Cultural creativity has quietly become one of the island's most vibrant economic forces. In old streets and design markets, young artists sell products that [[25]] Taiwanese culture. Rather than copying foreign trends, these makers draw inspiration from temples, tea houses, and childhood memories. Some turn traditional patterns into modern bags, while others print island scenes on cups and cards. Each handmade item, therefore, tells a story that a factory product could never capture. These products are popular [[26]] both locals and tourists want something special to take home. Whereas large corporations chase mass production, small studios value careful craftsmanship above quantity. Many of these designers started small, working from home before opening their own little shops. Many founders, having studied design abroad, returned home eager to reinterpret their own heritage. Given how competitive the market has become, standing out requires both originality and courage. Social media has moreover allowed them to reach customers far beyond their own neighborhood. Buying from a local brand is a way to support young designers [[27]] are full of new ideas. As a result, a tiny stall discovered on a weekend can grow into a beloved national label. Supporting such brands also keeps traditional crafts, which might otherwise disappear, alive for future generations. In this sense, every purchase becomes a small vote for the kind of future we wish to see. When you choose these creative goods, you [[28]].","blanks":[{"n":25,"type":"詞彙","options":{"A":"copy","B":"hide","C":"show","D":"replace"},"answer":"C","explain_zh":"(C) show：產品「展現」台灣文化，考動詞詞彙。","note":"【正解】show「展現、呈現」，指年輕藝術家的產品「展現」台灣文化；關係代名詞 that 代替複數 products，動詞用原形 show。\n【誘答】(A) copy 抄襲：與下文 Rather than copying foreign trends（而非抄襲外國潮流）自相矛盾，且「抄襲文化」搭配不通；(B) hide 隱藏：與「展現文化」方向相反；(D) replace 取代：「取代台灣文化」與支持、呈現本土文化的立場衝突。\n【重點】動詞 show 表「顯示、展現」；關係子句動詞須與先行詞（複數 products）一致。\n【句意】年輕藝術家販售展現台灣文化的產品。"},{"n":26,"type":"連接詞","options":{"A":"because","B":"even if","C":"so that","D":"as if"},"answer":"A","explain_zh":"(A) because：後句說明受歡迎的原因，考連接詞。","note":"【正解】because「因為」引導原因子句，說明產品受歡迎是「因為」在地人與遊客都想帶特別的東西回家。\n【誘答】(B) even if 即使：表讓步，與「說明受歡迎的原因」不符；(C) so that 以便：表目的，語意變成「受歡迎是為了讓人想買」，因果不通；(D) as if 彷彿：表樣態，無法引導原因子句。三者形式上都能接子句，卻都不表原因。\n【重點】because 引導表原因的副詞子句。\n【句意】這些產品很受歡迎，因為在地人和遊客都想帶點特別的東西回家。"},{"n":27,"type":"語法","options":{"A":"whom","B":"whose","C":"which","D":"who"},"answer":"D","explain_zh":"(D) who：關係代名詞代替人 designers 當主詞，考關係詞。","note":"【正解】先行詞 young designers 為「人」，關係代名詞在子句中作主詞，故用 who。\n【誘答】(A) whom 雖指人，但為受格；此處關代在子句中作主詞（are 的主詞），須用主格 who，不可用 whom；(B) whose 為所有格，後須接名詞（如 whose ideas），不能直接接動詞 are；(C) which 只指物，不指人。\n【重點】關係代名詞指人且作主詞時用 who。\n【句意】向本土品牌購買，是一種支持這些充滿新點子的年輕設計師的方式。"},{"n":28,"type":"整句語意","options":{"A":"help big factories mass-produce cheaper goods","B":"help keep local culture and creativity alive","C":"encourage designers to copy foreign trends instead","D":"let traditional crafts slowly fade away over time"},"answer":"B","explain_zh":"(B) 呼應「支持本土文創」的正向結論，考整句語意。","note":"【正解】全文鼓勵支持本土設計，故結論應為「幫助讓在地文化與創意延續下去」，語意一致。\n【誘答】(A) 幫助大工廠大量生產更便宜的商品：提到「幫助」貌似正面，但大量生產與全文推崇手工、少量精緻的精神矛盾；(C) 鼓勵設計師改抄襲外國潮流：與文中 Rather than copying foreign trends 相反；(D) 讓傳統工藝隨時間慢慢消失：與文中「讓傳統工藝延續下去」直接矛盾。\n【重點】整句語意須呼應全文「支持本土、延續文化」的正向立場。\n【句意】當你選擇這些文創商品時，你就幫助讓在地文化與創意得以延續。"}]}],"vocab":["fashion","waste","pollution","landfill","second-hand","reduce","protect","creative","brand","pattern","designer","culture","sustainable","disposable","manufacturer","resale","craftsmanship","heritage","inspiration","originality","reinterpret","wasteful"]},{"id":22,"passages":[{"label":"A","title_zh":"電動車熱潮：Tesla 與台灣電動機車","text":"Electric vehicles, or EVs, are becoming more and more common around the world. Around the globe, governments are offering generous subsidies to speed up the shift toward electric transport. Brands like Tesla have made many people [[21]] in cars that run on batteries instead of gas. As battery technology advances, the distance a single charge can cover keeps growing year by year. Whereas early models were expensive and slow, modern EVs now rival gas cars in both price and performance. In Taiwan, electric scooters are popular too. In crowded Taiwanese cities, swappable batteries have proved especially practical for daily commuters. [[22]] their batteries run low, riders can change them at stations in just a few seconds. Given that these stations are scattered across nearly every district, running out of power is rarely a worry. This makes riding an electric scooter both easy and quick for busy city workers. Because electric motors produce almost no noise, streets also become noticeably quieter. Charging networks, moreover, are expanding rapidly along highways and in city parking lots. EVs are also cleaner [[23]] gas cars because they give off no dirty smoke. Traditional engines, which burn fuel and release carbon, have long been a major source of urban smog. As a result, cutting tailpipe emissions could greatly improve public health in densely populated areas. Experts even predict that, within a decade, electric models may outnumber gasoline cars on many of our roads. As more people go electric, the air in our cities [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"involved","B":"confident","C":"skilled","D":"interested"},"answer":"D","explain_zh":"(D) interested：make sb interested in「使人對…感興趣」，考形容詞詞彙。","note":"【正解】be interested in「對…感興趣」，Tesla 讓許多人「對」電池車「感興趣」，符合電動車熱潮的語意；make sb + 形容詞。\n【誘答】三者雖都能搭配介系詞 in，語意卻不對：(A) involved 參與其中——強調投入參與，而非被電動車「吸引、感興趣」；(B) confident 有信心——be confident in 指「對…有信心」，與掀起熱潮讓人「感興趣」的意思不同；(C) skilled 擅長——be skilled in 指「精通」，說品牌讓大眾「擅長」電池車並不合理。\n【重點】be/get interested in + N；make sb + adj.「使某人…」。\n【句意】像 Tesla 這樣的品牌，讓許多人對用電池而非汽油行駛的車子產生興趣。"},{"n":22,"type":"連接詞","options":{"A":"Before","B":"When","C":"Until","D":"Unless"},"answer":"B","explain_zh":"(B) When：當電池快沒電「時」可換電池，考連接詞。","note":"【正解】when「當…時」引導時間子句，說明「當電池快沒電時」騎士可以換電池，語意最順。\n【誘答】(A) Before 在…之前：雖是時間連接詞，卻把語意變成「電池沒電『之前』就換」，與「沒電時才換」的情境不符；(C) Until 直到：「直到電池沒電才能換」邏輯不通；(D) Unless 除非：表條件否定，與「沒電就換」的時間關係不合。\n【重點】when 引導時間副詞子句。\n【句意】當電池快沒電時，騎士可以在充換電站幾秒內就換好電池。"},{"n":23,"type":"語法","options":{"A":"as","B":"then","C":"than","D":"to"},"answer":"C","explain_zh":"(C) than：cleaner…than 比較級，考語法。","note":"【正解】前面 cleaner 為比較級，須與 than 連用，比較電動車與汽油車的乾淨程度。\n【誘答】(A) as 用於 as…as 的同級比較，不能接在比較級 cleaner 之後；(B) then「然後」與 than 同音，是最常見的拼字混淆，但它是副詞，不引導比較對象；(D) to 雖然 superior to、prior to 等會用 to，但一般形容詞比較級 cleaner 只能配 than，不用 to。\n【重點】比較級 + than；cleaner than「比…更乾淨」。\n【句意】電動車也比汽油車更乾淨，因為它們不排放髒污的廢氣。"},{"n":24,"type":"整句語意","options":{"A":"will slowly become fresher and healthier","B":"will change in ways no one can predict","C":"will improve only if factories keep burning fuel","D":"will depend on building many more gas stations"},"answer":"A","explain_zh":"(A) 呼應「電動車讓空氣變好」的結果，考整句語意。","note":"【正解】前文說電動車不排廢氣，故越多人用電動車，城市空氣「會慢慢變得更清新更健康」，結論一致。\n【誘答】(B) 會以無人能預測的方式改變：語氣中性看似合理，但全文已明確推論空氣「變好」，並非不可預測；(C) 只有在工廠持續燒燃料下才會改善：提到 improve 貌似正面，但附帶條件「持續燒燃料」與減排矛盾；(D) 得靠興建更多加油站：加油站服務燃油車，與電動車減汙的因果相反。\n【重點】整句語意須與「電動車環保」的因果邏輯呼應。\n【句意】隨著越來越多人改用電動車，我們城市裡的空氣會慢慢變得更清新、更健康。"}]},{"label":"B","title_zh":"5G 與物聯網智慧生活","text":"Thanks to 5G, the Internet today is much faster than before. Compared with earlier networks, 5G transmits data with remarkably low delay. This new technology allows more devices to be [[25]] to the network at the same time. This near-instant response is precisely what self-driving cars and remote surgery demand. The term 'Internet of Things' refers to the vast web of everyday objects that can now talk to one another. In a smart home, lights, fans, and even the refrigerator can be controlled by a phone. Sensors hidden inside these gadgets quietly collect information and adjust settings automatically. Whereas a household once relied on separate remote controls, a single app can now manage everything. People can turn on the air conditioner [[26]] they are still on the way home. Moreover, factories are using connected machines to spot problems before they cause costly breakdowns. Doctors can also use 5G to check patients who live far away, which saves them a long and tiring trip to the hospital. In rural areas, where hospitals are scarce, such remote care can genuinely save lives. Given how much personal data these systems gather, however, protecting privacy has become a serious concern. With so many smart tools around us, daily life is becoming [[27]] than ever. Engineers are therefore working hard to make these networks both faster and more secure. As a result, the boundary between the digital and physical worlds continues to blur. In the future, 5G may [[28]].","blanks":[{"n":25,"type":"詞彙","options":{"A":"connected","B":"added","C":"exposed","D":"limited"},"answer":"A","explain_zh":"(A) connected：裝置「連上」網路，考動詞詞彙。","note":"【正解】connect…to「把…連接到」，被動 be connected to the network 指更多裝置能同時「連上」網路，符合物聯網情境。\n【誘答】三者都能搭配 to，卻語意不對：(B) added——be added to 指「被加入（數量）」，強調增添而非建立連線；(C) exposed——be exposed to 指「暴露於（風險）」，方向偏向資安而非「連上」網路；(D) limited——be limited to 指「僅限於」，與「更多裝置能同時連網」矛盾。\n【重點】connect A to B；被動語態 be connected to。\n【句意】這項新技術讓更多裝置能同時連上網路。"},{"n":26,"type":"連接詞","options":{"A":"whereas","B":"until","C":"while","D":"so that"},"answer":"C","explain_zh":"(C) while：「在…的同時」還在回家路上就開冷氣，考連接詞。","note":"【正解】while「當…的時候、在…期間」，表示人「還在回家的路上時」就能開冷氣，兩動作同時發生。\n【誘答】(A) whereas 然而：表對比，但「開冷氣」與「還在回家路上」是同時發生而非對比；(B) until 直到：「直到還在回家路上」語意邏輯不通；(D) so that 以便：表目的，無法表達兩動作同時進行。\n【重點】while 引導表「同時」的時間子句。\n【句意】人們還在回家的路上時，就可以先把冷氣打開。"},{"n":27,"type":"語法","options":{"A":"easily","B":"easier","C":"easiest","D":"less easy"},"answer":"B","explain_zh":"(B) easier：與 than 連用的比較級，考比較級。","note":"【正解】句尾有 than ever，須用比較級 easier「更輕鬆」；easy 結尾為子音+y，比較級去 y 加 ier。\n【誘答】(A) easily 是副詞，不能當 becoming 的主詞補語，也不受 than 直接修飾；(C) easiest 最高級須配 the，且不與 than 連用；(D) less easy 雖是比較級結構，但語意變成「更不輕鬆」，與「生活變得更輕鬆」矛盾。\n【重點】以 -y 結尾的形容詞比較級改 y 為 ier；比較級 + than。\n【句意】身邊有這麼多智慧工具，日常生活正變得比以往更輕鬆。"},{"n":28,"type":"整句語意","options":{"A":"replace every doctor and engineer with machines","B":"connect our devices only inside big factories","C":"finally solve all the privacy problems that worry us","D":"make our lives even more convenient and connected"},"answer":"D","explain_zh":"(D) 呼應「5G 讓生活更方便」的展望，考整句語意。","note":"【正解】全文描述 5G 帶來的智慧便利，故對未來的展望應是「讓生活更方便、更緊密相連」，語意一致。\n【誘答】(A) 用機器取代每位醫生和工程師：文中說 5G「協助」遠距醫療，而非「取代」醫護，語意過度誇張；(B) 只在大工廠內連結我們的裝置：與全文智慧家庭、遠距醫療等「無所不在」的普及願景矛盾（only 範圍過窄）；(C) 徹底解決所有令人憂心的隱私問題：文中把隱私列為待解疑慮、工程師仍在努力，不能斷言 5G「將解決」，與謹慎語氣不符。\n【重點】整句語意須與全文「科技帶來便利」的展望呼應。\n【句意】未來，5G 可能讓我們的生活變得更加方便且緊密相連。"}]}],"vocab":["electric","vehicle","battery","scooter","pollution","smoke","technology","device","network","control","convenient","connect","subsidy","emission","commuter","performance","sensor","privacy","secure","transmit","automatically","boundary"]},{"id":23,"passages":[{"label":"A","title_zh":"COVID-19 疫情與口罩、疫苗","text":"A few years ago, a new disease called COVID-19 spread quickly around the world. The illness, which was caused by a previously unknown virus, quickly overwhelmed hospitals in many countries. To stay safe, people were asked to wear [[21]] over their nose and mouth in public places. At first this new habit felt strange, but soon it became a normal part of daily life. Because no cure existed at first, prevention became humanity's only reliable defense. Washing hands often and keeping a distance from others also protected people [[22]] the virus. Whereas some people accepted these rules calmly, others found the sudden restrictions difficult to bear. Governments urged citizens to avoid crowds, and countless events were canceled overnight. Later, scientists worked very hard and made vaccines. Meanwhile, researchers around the globe had raced to understand how the virus spread from person to person. Developing a safe vaccine, a process that normally takes years, was compressed into a matter of months. These vaccines [[23]] many lives since they first came out. Given the scale of the crisis, this scientific achievement was nothing short of remarkable. Doctors gave these shots to millions of people around the country. Health workers, many of whom risked their own safety, delivered these injections tirelessly. As immunity spread through the population, infection rates gradually began to fall. Moreover, the whole experience taught societies valuable lessons about cooperation and preparedness. Because of all these efforts, life [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"masks","B":"scarves","C":"glasses","D":"veils"},"answer":"A","explain_zh":"(A) masks：戴「口罩」遮住口鼻，考名詞詞彙。","note":"【正解】mask「口罩」，戴在鼻子與嘴巴上（over their nose and mouth）以防病毒，符合疫情情境。\n【誘答】三者都在臉部或頭部附近，較具混淆性，但都不符「遮住口鼻防疫」：(B) scarves 圍巾——可圍在臉部，卻非防疫標準、也不專為遮口鼻；(C) glasses 眼鏡——戴在眼睛上，不遮口鼻；(D) veils 面紗——遮臉但屬服飾或宗教用途，非防疫用。\n【重點】名詞 mask「口罩」；wear masks over one's nose and mouth。\n【句意】為了安全，人們被要求在公共場所戴口罩遮住口鼻。"},{"n":22,"type":"介系詞","options":{"A":"of","B":"for","C":"from","D":"by"},"answer":"C","explain_zh":"(C) from：protect sb from「保護某人免於」，考介系詞。","note":"【正解】protect…from「保護…免於、不受…傷害」，指勤洗手與保持距離也能「保護人免於」病毒。\n【誘答】(A) of：protect 不與 of 搭配（易與 rid of、free of 混淆）；(B) for：protect…for 表「為了」，語意不通；(D) by：protect…by 表「藉由」，且 by the virus 會被讀成「被病毒」，語意正好相反。（正解搭配為 protect…from；protect…against 亦可，但選項未列。）\n【重點】固定用法 protect sb/sth from + N。\n【句意】勤洗手並與他人保持距離，也保護了人們不受病毒侵害。"},{"n":23,"type":"語法","options":{"A":"saved","B":"have saved","C":"had saved","D":"will save"},"answer":"B","explain_zh":"(B) have saved：與 since 連用的現在完成式，考時態。","note":"【正解】句中有 since they first came out（自從問世以來），主句須用現在完成式 have saved，表示到現在為止已拯救許多生命。\n【誘答】(A) saved 過去式：是 since 句最常見的誤選，但過去式無法表達「延續至今」的累積結果；(C) had saved 過去完成式：since 到「現在」為止應用現在完成，非過去完成；(D) will save 未來式：與「自問世以來（已發生）」的時間矛盾。\n【重點】since + 過去時間點 → 主句用現在完成式 have/has + p.p.。\n【句意】自從這些疫苗問世以來，已經拯救了許多人的生命。"},{"n":24,"type":"整句語意","options":{"A":"became busier and more stressful than ever","B":"would never feel normal again for anyone","C":"changed into something completely new","D":"slowly went back to the way it was before"},"answer":"D","explain_zh":"(D) 呼應「防疫努力使生活恢復正常」，考整句語意。","note":"【正解】前文說口罩、洗手、疫苗等努力，故結論應為生活「慢慢恢復成從前的樣子」，語意一致。\n【誘答】(A) 變得比以往更忙碌、更有壓力：看似談生活變化，但「更忙更有壓力」超出「恢復正常」的意涵，與原意不符；(B) 對任何人而言再也回不到正常：提到 normal 貌似切題，卻與防疫成功、逐步恢復的正向結論相反；(C) 變成全新的樣貌：與「恢復成從前的樣子」直接矛盾。\n【重點】整句語意須與全文「防疫努力→恢復正常」的因果呼應。\n【句意】因為這些努力，生活慢慢恢復成從前的樣子。"}]},{"label":"B","title_zh":"疫情後的觀光與旅遊復甦","text":"After the pandemic, people were finally free to travel again. For nearly two years, strict border controls had brought global travel almost to a standstill. Airports that had been quiet for years became [[25]] with excited travelers. Pent-up demand, therefore, exploded the moment restrictions were finally lifted. Airlines added more flights, and travel websites were busier than they had been in years. Airlines that had grounded their fleets scrambled to hire staff and reopen routes. Many families booked trips as soon as the borders opened, [[26]] they had missed going abroad for so long. Whereas online meetings had replaced holidays for a while, nothing could truly match the joy of exploring a new place. In Taiwan, night markets, hot springs, and old streets welcomed visitors [[27]] came from many countries. Popular destinations soon faced the opposite problem, struggling to handle the sudden flood of arrivals. Local hotels and restaurants slowly got busy again. Given how heavily many towns rely on visitors, this revival brought enormous relief to local businesses. Souvenir shops, tour guides, and street vendors all felt the welcome return of customers. Streets that had once felt empty were full of life once more. Moreover, the tourism industry supports countless jobs that might otherwise vanish. Governments, aware of its value, began promoting their landmarks more energetically than before. As a result, a thriving travel sector has become a key pillar of many local economies. Tourism is important because it [[28]].","blanks":[{"n":25,"type":"詞彙","options":{"A":"closed","B":"delayed","C":"expensive","D":"crowded"},"answer":"D","explain_zh":"(D) crowded：機場變得「擠滿」旅客，考形容詞詞彙。","note":"【正解】crowded「擁擠的、擠滿人的」，指原本安靜多年的機場變得「擠滿」興奮的旅客，與旅遊復甦呼應。\n【誘答】三者都與航空／旅遊情境沾邊、較易誤選，但都不符「擠滿興奮旅客」：(A) closed 關閉的——疫情期間機場曾關閉，卻與旅客湧入的復甦景象矛盾；(B) delayed 誤點的——形容的是航班而非機場「擠滿人」，且不與 with 旅客搭配；(C) expensive 昂貴的——與人潮無關，語意離題。\n【重點】形容詞 crowded；be crowded with「擠滿了…」。\n【句意】安靜了好幾年的機場，變得擠滿了興奮的旅客。"},{"n":26,"type":"連接詞","options":{"A":"whereas","B":"because","C":"so","D":"even though"},"answer":"B","explain_zh":"(B) because：說明急著訂票出遊的原因，考連接詞。","note":"【正解】because「因為」引導原因，說明families 一開放邊境就訂票，是「因為」他們太久沒能出國了。\n【誘答】(A) whereas 然而：表對比，非原因；(C) so 所以：會使因果顛倒，變成「訂票所以太久沒出國」，邏輯錯亂；(D) even though 即使：表讓步，「即使太久沒出國」與「因為太久沒出國」語意相反。\n【重點】because 引導表原因的副詞子句。\n【句意】許多家庭一開放邊境就訂票，因為他們已經太久沒能出國了。"},{"n":27,"type":"語法","options":{"A":"whom","B":"whose","C":"who","D":"which"},"answer":"C","explain_zh":"(C) who：關係代名詞代替人 visitors 當主詞，考關係詞。","note":"【正解】先行詞 visitors 為人，關係代名詞在子句中作主詞，故用 who「來自許多國家的訪客」。\n【誘答】(A) whom 雖指人，卻是受格；此處關代作 came 的主詞，須用主格 who，不可用 whom；(B) whose 為所有格，後須接名詞，不能直接接動詞 came；(D) which 只指物，不指人。\n【重點】關係代名詞指人且作主詞用 who。\n【句意】在台灣，夜市、溫泉與老街迎接來自許多國家的訪客。"},{"n":28,"type":"整句語意","options":{"A":"brings jobs and money to many local people","B":"draws more visitors than local hotels can ever hold","C":"keeps local shops busy only on weekends","D":"helps big foreign companies earn the most profit"},"answer":"A","explain_zh":"(A) 呼應「觀光帶來工作與收入」的重要性，考整句語意。","note":"【正解】全文講旅遊復甦帶動旅館餐廳，故「觀光很重要」的原因應是「為許多在地人帶來工作與收入」，語意一致。\n【誘答】(B) 吸引超過在地旅館所能容納的遊客：呼應文中「遊客暴增」的細節，但那談的是 overtourism 的「問題」，不是觀光為何「重要」，答非所問；(C) 只在週末讓在地商店忙碌：範圍過窄，與全文旅遊全面復甦、支撐大量工作機會不符；(D) 幫助大型外國公司賺最多利潤：受益者說錯，與全文「為在地商家、在地人帶來收入」矛盾。\n【重點】整句語意須與全文「觀光復甦、帶動經濟」的立場呼應。\n【句意】觀光很重要，因為它為許多在地人帶來工作機會與收入。"}]}],"vocab":["disease","spread","virus","mask","vaccine","protect","distance","travel","border","crowded","tourism","visitor","pandemic","prevention","immunity","infection","restriction","remarkable","revival","demand","landmark","standstill"]},{"id":24,"passages":[{"label":"A","title_zh":"海洋塑膠垃圾與減塑吸管政策","text":"Every year, a huge amount of plastic waste flows into the ocean. Scientists estimate that plastic now reaches even the deepest and most remote corners of the sea. Plastic straws, bags, and bottles float on the water and [[21]] sea animals in great danger. Over time, sunlight and waves break these items into tiny fragments known as microplastics. Once swallowed by fish, such particles can travel up the food chain and eventually reach our own plates. Some turtles even eat plastic [[22]] they think it is food. Whereas paper decays within weeks, a single plastic bottle may linger for hundreds of years. To fix this problem, Taiwan has [[23]] the use of plastic straws in many stores, so people now use paper straws or bring their own. Faced with this alarming trend, many governments have started to ban single-use items. Taiwan, in particular, has become a regional leader in reducing plastic consumption. Many restaurants and drink shops have also joined in to cut down on plastic. Given that old habits are hard to change, such policies were not welcomed by everyone at first. Businesses, however, soon discovered that customers appreciated greener alternatives. Small actions like these can make a big difference. Moreover, carrying a reusable cup has gradually become a symbol of a responsible lifestyle. As a result, what began as a small inconvenience is slowly reshaping the way people shop. If everyone does a little, we [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"cause","B":"bring","C":"put","D":"hold"},"answer":"C","explain_zh":"(C) put：put sb/sth in danger「使…陷入危險」，考片語動詞詞彙。","note":"【正解】put…in danger「使…陷入危險」，指海中的塑膠垃圾「使」海洋動物陷入極大危險；主詞為複數 straws, bags, bottles，動詞原形 put。\n【誘答】(A) cause 造成：語意雖近「造成危險」，但搭配錯誤——不說 cause sth in danger，須用 cause danger to sb；(B) bring 帶來：須用 bring…into danger 或 bring sb danger，直接接 in danger 搭配不完整；(D) hold 握住／保持：不與 in danger 搭配表「使陷入危險」。（正解為 put…in danger。）\n【重點】片語 put sb/sth in danger「置…於險境」。\n【句意】塑膠吸管、袋子和瓶子漂在水面上，使海洋動物陷入極大的危險。"},{"n":22,"type":"連接詞","options":{"A":"because","B":"even though","C":"so","D":"as if"},"answer":"A","explain_zh":"(A) because：說明海龜誤食塑膠的原因，考連接詞。","note":"【正解】because「因為」引導原因子句，說明海龜吃塑膠是「因為」牠們誤以為那是食物。\n【誘答】(B) even though 即使：表讓步，與「因為誤以為是食物」的因果相反；(C) so 所以：會使因果顛倒，變成「吃塑膠所以以為是食物」；(D) as if 彷彿：表樣態，且後應接假設語氣，無法引導原因。\n【重點】because 引導表原因的副詞子句。\n【句意】有些海龜甚至會吃塑膠，因為牠們以為那是食物。"},{"n":23,"type":"語法","options":{"A":"limiting","B":"been limited","C":"to limit","D":"limited"},"answer":"D","explain_zh":"(D) limited：has + 過去分詞的現在完成式，考時態詞形。","note":"【正解】主詞 Taiwan 後有 has，須用過去分詞 limited 構成現在完成式 has limited「已限制」，表示至今已採取的政策。\n【誘答】(A) limiting：has 後若要用進行完成須是 has been limiting，單獨 has limiting 不成立；(B) been limited：構成被動完成 has been limited「被限制」，但主詞台灣是「施行限制」的一方，須用主動 has limited；(C) to limit：has to limit 會變成「不得不限制」的義務語氣，與文中政策已實施（人們現在改用紙吸管）的事實不符。\n【重點】現在完成式 has/have + 過去分詞 p.p.。\n【句意】為了解決這個問題，台灣已在許多店家限制塑膠吸管的使用。"},{"n":24,"type":"整句語意","options":{"A":"can enjoy cheaper plastic straws every day","B":"can keep our oceans clean and safe for life","C":"will have to clean the beaches all by ourselves","D":"can leave the whole problem for future generations"},"answer":"B","explain_zh":"(B) 呼應「人人減塑守護海洋」的主旨，考整句語意。","note":"【正解】前句說每人做一點就能帶來改變，故結論應為「能讓海洋保持乾淨、對生命安全」，與減塑主旨一致。\n【誘答】(A) 每天享用更便宜的塑膠吸管：提到塑膠吸管貌似相關，但「更便宜的塑膠」不是減塑的目標，與主旨矛盾；(C) 得靠自己清理所有海灘：把集體減塑的正面結論窄化成「自己清海灘」，與「保持海洋乾淨」的宏觀結論不符；(D) 可以把整個問題留給後代：與「人人出力守護海洋」的立場相反。\n【重點】整句語意須與全文「減塑、保護海洋」的正向主旨呼應。\n【句意】只要人人都出一點力，我們就能讓海洋保持乾淨，對生命也更安全。"}]},{"label":"B","title_zh":"台灣淨灘行動與循環經濟","text":"On weekends, many volunteers in Taiwan join beach cleanups. Some of these groups are organized by schools, while others are led by companies eager to give back. They walk along the coast and pick [[25]] bottles, cans, and other trash left on the sand. Armed with gloves and large sacks, participants often gather astonishing amounts of rubbish in a single morning. Much of what they find, sadly, has drifted ashore from faraway coasts on ocean currents. This kind of activity is not only good for the sea [[26]] also fun to do with friends. Beyond cleaning the shore, such events raise awareness about where our everyday waste truly ends up. Some of the trash they collect can be recycled and [[27]] into new products, such as bags or chairs. Whereas the old economy simply threw things away, a circular model treats waste as a valuable resource. Discarded fishing nets, for instance, can be spun into thread and woven into fashionable clothing. This idea is called a circular economy, in which things are used again and again. Given that natural resources are limited, reusing materials makes both environmental and economic sense. Manufacturers, moreover, are increasingly designing products that can be taken apart and recycled easily. In this way, less waste is buried in the ground, and useful things get a new life. Every bottle rescued from the beach, therefore, represents one less burden on our shrinking landfills. As a result, a simple weekend habit can quietly contribute to a far larger movement. By joining these actions, we [[28]].","blanks":[{"n":25,"type":"介系詞","options":{"A":"out","B":"up","C":"on","D":"over"},"answer":"B","explain_zh":"(B) up：pick up「撿起、拾起」，考片語動詞。","note":"【正解】pick up「撿起、拾起」，指志工沿著海岸「撿起」瓶子、罐子與垃圾，符合淨灘情境。\n【誘答】三者都能與 pick 組成真正的片語動詞，較易誤選，但意思都不對：(A) pick out 是「挑出、選出」，非撿拾地上的垃圾；(C) pick on 是「找碴、欺負」，語意不合；(D) pick over 是「翻揀、挑選」，與沿岸「撿起」垃圾不同。（正解 pick up「撿起」。）\n【重點】片語動詞 pick up「撿起」；受詞為名詞時可放中間或後面。\n【句意】他們沿著海岸行走，撿起留在沙灘上的瓶子、罐子和其他垃圾。"},{"n":26,"type":"連接詞","options":{"A":"also","B":"yet","C":"nor","D":"but"},"answer":"D","explain_zh":"(D) but：not only…but also「不僅…而且」，考關聯連接詞。","note":"【正解】固定句型 not only…but also「不僅…而且…」，前有 not only，空格須填 but 才完整。\n【誘答】(A) also：not only…but also 的 but 不可省，只填 also 無法成句，是常見誤解；(B) yet 雖有轉折義，卻不與 not only…also 搭配；(C) nor 用於 neither…nor，不與 not only 連用。正確關聯詞為 not only…but also。\n【重點】關聯連接詞 not only A but also B「不僅 A 而且 B」。\n【句意】這類活動不僅對海洋有益，和朋友一起做也很有趣。"},{"n":27,"type":"語法","options":{"A":"turned","B":"be turned","C":"to turn","D":"turning"},"answer":"A","explain_zh":"(A) turned：與 recycled 並列的被動過去分詞，考被動與並列。","note":"【正解】can be recycled and ___，空格與 recycled 用 and 並列、共用 be，須用過去分詞 turned，構成被動 be turned into「被製成」。\n【誘答】(B) be turned：and 後與 recycled 共用前面的 be，再加一個 be 會造成 be…be 重複贅字；(C) to turn：不定詞與被動的過去分詞 recycled 不對稱；(D) turning：現在分詞無法與 recycled 並列構成被動語態。\n【重點】被動語態 be + p.p.；對等連接的動詞形式須一致；turn A into B「把 A 變成 B」。\n【句意】他們蒐集到的部分垃圾可以被回收，並製成新產品，例如袋子或椅子。"},{"n":28,"type":"整句語意","options":{"A":"can recycle every single piece of plastic ourselves","B":"help factories produce more single-use goods","C":"help build a cleaner and greener future","D":"turn all our old clothes into fishing nets"},"answer":"C","explain_zh":"(C) 呼應「淨灘與循環經濟打造更好未來」，考整句語意。","note":"【正解】全文講淨灘與循環經濟，故參與這些行動的結論應是「幫助打造更乾淨、更環保的未來」，語意一致。\n【誘答】(A) 能靠自己回收每一片塑膠：語氣正面且提到回收，但「靠自己回收每一片」過度絕對，與「參與集體行動」的結論不符；(B) 幫助工廠生產更多一次性用品：與循環經濟、減廢的主旨矛盾；(D) 把我們所有舊衣變成漁網：方向與文中「廢棄漁網→做成衣服」正好顛倒，且以偏概全，不能作全文結論。\n【重點】整句語意須與全文「淨灘、循環、永續」的正向立場呼應。\n【句意】藉由參與這些行動，我們能幫助打造一個更乾淨、更環保的未來。"}]}],"vocab":["plastic","waste","ocean","straw","danger","limit","volunteer","coast","trash","recycle","product","circular economy","microplastic","fragment","food chain","single-use","consumption","alternative","reusable","current","awareness","resource"]},{"id":25,"passages":[{"label":"A","title_zh":"疫情帶動電商與網路購物成長","text":"During the pandemic, many shops had to close their doors. Given that public gatherings were discouraged, e-commerce quickly emerged as the safest way to obtain daily necessities. To stay safe, people began to [[21]] more of their goods on the Internet instead of going outside. Retailers who had once relied solely on physical stores were forced to build online platforms almost overnight. Online shopping was convenient because customers could order almost anything [[22]] leaving home. Moreover, digital payment tools made transactions smoother, whereas traditional cash handling gradually declined. As a result, sales on shopping websites grew even [[23]] than before, and delivery workers were kept very busy. Warehouses, which used to operate at a modest pace, suddenly had to process an overwhelming volume of parcels. Consumers increasingly valued speed, so companies competed fiercely to shorten their delivery times. Even older people slowly learned to click and pay on their phones. Online stores also hired many more delivery workers to pack and send all the orders on time. Small businesses, encouraged by rising demand, began advertising their products through social media. Reviews written by other shoppers became a crucial factor influencing what people finally decided to purchase. Entire supply chains were gradually reshaped to keep pace with the surge in online orders. Although some customers still missed browsing in person, the sheer convenience proved difficult to resist. Given these lasting changes, analysts believe the line between physical and digital shopping will keep blurring. This new habit has stayed with us because [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"sell","B":"buy","C":"spend","D":"pay"},"answer":"B","explain_zh":"(B) buy：人們改在網路上「購買」商品，考動詞詞彙。","note":"【正解】buy「購買」，疫情期間人們改在網路上購買商品，符合電商成長的情境。\n【誘答】(A) sell 賣出（與「購買必需品、不出門」的情境相反）、(C) spend 花費（搭配金錢，spend goods 搭配錯）、(D) pay 付款（須用 pay for，pay goods 搭配錯），皆非正確。\n【重點】buy sth on the Internet「在網路上買某物」；on the Internet 為固定用法。\n【句意】為了安全，人們開始改在網路上購買更多商品，而不出門。"},{"n":22,"type":"介系詞","options":{"A":"besides","B":"before","C":"after","D":"without"},"answer":"D","explain_zh":"(D) without：不用「離開」家就能下單，考介系詞＋動名詞。","note":"【正解】without「沒有、不用」，without leaving home 指不用離開家就能下單，最合文意。\n【誘答】(A) besides 除了…還（besides leaving home 語意不合）、(B) before 在…之前（不是離家前才下單）、(C) after 在…之後（不是離家後才下單），三者皆可接動名詞但語意不合。\n【重點】介系詞 without 後接動名詞（V-ing），without leaving home「不必離家」。\n【句意】網購很方便，因為顧客不用離開家就能訂購幾乎任何東西。"},{"n":23,"type":"語法","options":{"A":"faster","B":"more faster","C":"fastest","D":"so fast"},"answer":"A","explain_zh":"(A) faster：與 than 連用的比較級，考語法。","note":"【正解】faster 為 fast 的比較級，與後面的 than 連用，表「比以前成長得更快」。\n【誘答】(B) more faster 重複比較級（faster 已是比較級，不可再加 more）、(C) fastest 最高級不接 than、(D) so fast 為原級且 so 不與 than 連用，皆錯誤。\n【重點】單音節形容詞／副詞的比較級加 -er；「比較級 + than」表兩者相比。\n【句意】結果，購物網站的銷售額成長得比以前更快，外送員也忙得不可開交。"},{"n":24,"type":"整句語意","options":{"A":"stores everywhere have finally reopened their doors","B":"delivery now takes much longer than before","C":"it saves them both time and effort","D":"it always costs far more than shopping in person"},"answer":"C","explain_zh":"(C) 呼應網購方便省時，考整句語意。","note":"【正解】呼應前文網購「方便」，故「省下時間與力氣」最能說明習慣延續的原因。\n【誘答】(A) 各地商店都重新開門了（反而是回到實體購物的理由，與習慣延續矛盾）、(B) 配送現在比以前久很多（與前文業者競相縮短配送時間矛盾）、(D) 網購總是比實體貴很多（負面且無法解釋習慣為何留下），皆不合。\n【重點】because 引導原因子句；整句語意須與前文「方便」呼應。\n【句意】這個新習慣之所以留了下來，是因為它替人們省下時間與力氣。"}]},{"label":"B","title_zh":"行動支付與無現金社會","text":"Not long ago, most people in Taiwan paid for things with cash. Whereas cash once dominated every market and night stall, digital wallets have rapidly gained ground. These days, however, more shoppers simply [[25]] their phones over a small machine to pay. Given how smartphones have become essential, paying by app now feels perfectly natural to most consumers. This kind of mobile payment is popular [[26]] people no longer have to carry coins or paper money. Banks and technology firms, eager to attract users, constantly launch rewards to encourage cashless spending. Each transaction is recorded instantly, which allows people to track their expenses with remarkable ease. In a cashless society, almost every payment is done by phone or card, [[27]] makes shopping quick and easy. Moreover, merchants benefit as well, since they no longer need to count and store large amounts of cash. Contactless payment also proved valuable during the pandemic, when reducing physical contact mattered greatly. Of course, some people still worry about safety, since they fear that a stranger might steal their money online. Elderly citizens, however, sometimes struggle to adapt, given that unfamiliar apps can seem confusing. To address such concerns, developers have designed clearer interfaces and stronger security features. As a result, digital fraud, though still a genuine threat, can often be prevented through careful habits. Analysts predict that, before long, a fully cashless lifestyle may become the norm rather than the exception. Experts say that as long as users stay careful, going cashless can [[28]].","blanks":[{"n":25,"type":"詞彙","options":{"A":"swipe","B":"press","C":"wave","D":"shake"},"answer":"C","explain_zh":"(C) wave：把手機在感應機上「揮一下」付款，考動詞詞彙。","note":"【正解】wave「揮動」，wave their phones over a machine 指把手機在感應機上揮一下感應付款。\n【誘答】(A) swipe 滑動／刷（是刷卡動作，感應付款為揮動靠近，swipe over 搭配不合）、(B) press 按壓（感應付款不需按壓手機）、(D) shake 搖動（搖手機非付款動作），皆與感應付款動作不符。\n【重點】wave sth over「在…上方揮動」；此處描述行動支付的感應動作。\n【句意】然而近來更多消費者只要把手機在小機器上揮一下就能付款。"},{"n":26,"type":"連接詞","options":{"A":"because","B":"so","C":"unless","D":"while"},"answer":"A","explain_zh":"(A) because：後句說明受歡迎的原因，考連接詞。","note":"【正解】because「因為」，後句說明行動支付受歡迎的原因（不必再帶零錢紙鈔）。\n【誘答】(B) so 表結果（popular 後接 so 結構、語意皆不合）、(C) unless 除非（條件否定，語意不合）、(D) while 雖然／當…時（與「說明原因」不符），皆非正確連接詞。\n【重點】because 引導表原因的副詞子句。\n【句意】這種行動支付很受歡迎，因為人們不必再帶零錢或紙鈔。"},{"n":27,"type":"語法","options":{"A":"that","B":"what","C":"it","D":"which"},"answer":"D","explain_zh":"(D) which：關代補述整個前句，考關係詞。","note":"【正解】which 引導非限定關係子句，補述整個前面的句子，並在子句中作主詞。\n【誘答】(A) that 不可用於逗號後的補述子句、(B) what 不能有先行詞（此處補述前面整句）、(C) it 為代名詞會造成兩獨立句相連（逗號連句），皆非正確關係詞。\n【重點】逗號 + which 可補述前面整個子句，其後動詞用單數 makes。\n【句意】在無現金社會裡，幾乎每筆付款都用手機或卡片完成，這讓購物又快又方便。"},{"n":28,"type":"整句語意","options":{"A":"eliminate every risk of online fraud","B":"make daily life more convenient","C":"replace the need for banks entirely","D":"guarantee that no money is ever lost"},"answer":"B","explain_zh":"(B) 呼應無現金社會的便利，考整句語意。","note":"【正解】呼應全文無現金支付的便利，故「讓日常生活更方便」語意最連貫。\n【誘答】(A) 消除所有網路詐騙風險（與前文「詐騙仍是真實威脅、只能常被預防」矛盾）、(C) 完全取代銀行的存在（文中銀行仍推廣無現金消費，與此矛盾）、(D) 保證絕不損失任何錢（過於絕對，與仍有風險矛盾），皆不合。\n【重點】助動詞 can 後接原形動詞 make；整句語意須正向呼應主旨。\n【句意】專家說只要使用者小心，走向無現金能讓日常生活更方便。"}]}],"vocab":["pandemic","goods","convenient","customer","order","delivery","cash","mobile","payment","coin","cashless","society","e-commerce","necessity","platform","transaction","warehouse","surge","merchant","fraud","interface","contactless"]},{"id":26,"passages":[{"label":"A","title_zh":"串流影音追劇熱潮","text":"A few years ago, most people watched shows on television at a fixed time. Whereas traditional broadcasters set rigid schedules, streaming platforms hand control entirely to the audience. Today, streaming services such as Netflix and Disney+ have [[21]] the way we enjoy movies and dramas. Given the vast libraries available, subscribers can explore films from countless countries and cultures. With these apps, viewers can watch whatever they want, [[22]] they have an Internet connection. Recommendation systems, which quietly analyze viewing habits, suggest titles tailored to each person's taste. Many people love to binge-watch, which means [[23]] many episodes of a show one after another. Moreover, many services now produce original dramas that rival, and sometimes surpass, big-budget cinema. Because there is so much to choose from, some users even spend hours just deciding what to watch. Because episodes are released all at once, fans often finish an entire season within a single weekend. Portable devices allow viewers to continue a show on a train, in a cafe, or even while traveling abroad. Some families now share one account and enjoy watching their favorite shows together on a big screen at night. As competition intensifies, companies invest heavily in exclusive content to retain their loyal subscribers. Some critics argue, however, that endless choices can leave viewers feeling strangely overwhelmed. Others worry that binge-watching late into the night may gradually harm people's sleep and health. Nevertheless, the freedom to pause, rewind, and resume at will keeps audiences firmly attached to these platforms. Still, streaming stays popular because [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"charged","B":"chased","C":"chosen","D":"changed"},"answer":"D","explain_zh":"(D) changed：串流「改變」了看戲方式，考動詞詞彙。","note":"【正解】changed「改變」，串流服務改變了我們看電影和影集的方式，符合科技新趨勢的主旨。\n【誘答】(A) charged 收費／充電（與 the way 搭配不合，語意不符）、(B) chased 追逐（語意不合）、(C) chosen 選擇（have chosen the way 意為「選了方法」，與「改變觀看方式」語意不同），三者拼寫近似 changed 但語意皆錯。\n【重點】change the way + 子句「改變…的方式」。\n【句意】如今，Netflix 和 Disney+ 等串流服務改變了我們欣賞電影和影集的方式。"},{"n":22,"type":"連接詞","options":{"A":"as far as","B":"as long as","C":"even if","D":"whenever"},"answer":"B","explain_zh":"(B) as long as：只要有網路就能看，考條件連接詞。","note":"【正解】as long as「只要」，引導條件子句，表只要有網路連線就能觀看。\n【誘答】(A) as far as 就…而言／距離（常與 as long as 混淆，但非表條件）、(C) even if 即使（讓步語意不合）、(D) whenever 每當（表時間頻率，與單純條件「只要」不同），皆非正確。\n【重點】as long as 引導條件副詞子句「只要…」。\n【句意】有了這些應用程式，觀眾只要有網路連線，想看什麼就看什麼。"},{"n":23,"type":"語法","options":{"A":"to watch","B":"watched","C":"watching","D":"having watched"},"answer":"C","explain_zh":"(C) watching：mean + V-ing「意味著」，考動名詞。","note":"【正解】watching：mean + V-ing 表「意味著」，此處指「一次連看好幾集」的意思。\n【誘答】(A) to watch 為 mean to V「打算」，語意不合、(B) watched 過去式／過去分詞不能作 means 的受詞、(D) having watched 完成動名詞表「已看完」，時序語意不合，皆錯誤。\n【重點】mean + V-ing「意味著」；mean + to V「打算」，兩者不同。\n【句意】許多人愛「追劇」，也就是把一部劇的很多集一集接一集地連看。"},{"n":24,"type":"整句語意","options":{"A":"it lets people watch shows at their own pace","B":"every show must still be watched live","C":"it is completely free with no subscription","D":"it limits how many episodes people may watch"},"answer":"A","explain_zh":"(A) 呼應串流自由觀看的特點，考整句語意。","note":"【正解】呼應全文串流「想看就看」的自由，故「讓人們照自己的步調看戲」最連貫。\n【誘答】(B) 每部劇仍必須即時收看（與可暫停、倒轉、隨時續看及一次全上架矛盾）、(C) 完全免費、不需訂閱（文中有訂閱者與留住訂戶，並非免費）、(D) 限制人們能看的集數（與一口氣追完整季矛盾），皆不合。\n【重點】because 引導原因；let sb V「讓某人做…」；整句語意須呼應主旨。\n【句意】串流之所以持續受歡迎，是因為它讓人們照自己的步調追劇。"}]},{"label":"B","title_zh":"短影音的崛起","text":"In recent years, short videos have become one of the most popular kinds of entertainment. Whereas producing a film once required expensive equipment, a single smartphone now suffices. On apps like TikTok and Reels, each clip usually lasts [[25]] a minute, so viewers can watch dozens of them in a short time. Given their addictive design, these platforms are engineered to keep users scrolling for hours. Young people especially enjoy making funny clips to share with their close friends. Clever editing tools, which add music and effects instantly, let ordinary users appear surprisingly professional. These videos are easy to make, and anyone with a phone can [[26]] their own ideas with the world. Moreover, a clip posted by an unknown teenager can suddenly reach millions of viewers overnight. Trends spread with astonishing speed, as users eagerly imitate whatever dance or joke is currently popular. Because the clips are so short, they hold people's attention [[27]] than long programs. Some creators, having gained huge followings, now earn a living entirely through short-video content. Businesses, too, have embraced the format, promoting their products through brief and memorable advertisements. Yet the constant flood of rapid images may gradually shorten viewers' patience for slower activities. Educators worry that students, accustomed to instant entertainment, find reading lengthy texts increasingly tiresome. As a result, many people are now trying to limit their screen time and use these apps more mindfully. However, some experts warn that watching too many short videos may [[28]].","blanks":[{"n":25,"type":"介系詞","options":{"A":"under","B":"over","C":"within","D":"past"},"answer":"A","explain_zh":"(A) under：每支影片長度「不到」一分鐘，考介系詞。","note":"【正解】under「不到、少於」，under a minute 指每支短片長度不到一分鐘，符合短影音的特點。\n【誘答】(B) over a minute 超過一分鐘（太長，與「短時間看幾十支」矛盾）、(C) within 在…之內（last within 不idiomatic，且無「短於」的持續義，為混淆選項）、(D) past a minute 超過一分鐘（語意同 over，且 last past 搭配不合），皆非正確。\n【重點】under 可表「少於（時間、數量）」，如 under a minute「不到一分鐘」。\n【句意】在 TikTok 和 Reels 等應用程式上，每段短片通常不到一分鐘，所以觀眾能在短時間內看好幾十支。"},{"n":26,"type":"詞彙","options":{"A":"spread","B":"compare","C":"share","D":"mix"},"answer":"C","explain_zh":"(C) share：把自己的想法「分享」給世界，考動詞詞彙。","note":"【正解】share「分享」，share ideas with the world 指把自己的想法分享給全世界。\n【誘答】(A) spread 散播（語意近，但慣用 spread to/around，與 with 搭配不合）、(B) compare 比較（compare ideas with 雖搭 with，但語意為「與世界比較想法」，不合）、(D) mix 混合（mix ideas with 表「把想法混在一起」，語意不合），皆非正確。\n【重點】share sth with sb「與某人分享某物」。\n【句意】這些影片很容易製作，任何人只要有手機就能把自己的想法分享給全世界。"},{"n":27,"type":"語法","options":{"A":"best","B":"better","C":"well","D":"more better"},"answer":"B","explain_zh":"(B) better：與 than 連用的比較級，考語法。","note":"【正解】better 為 well 的比較級，與後面的 than 連用，表短片「比」長節目更能抓住注意力。\n【誘答】(A) best 最高級不接 than、(C) well 原級不接 than、(D) more better 重複比較級（better 已是比較級，不可再加 more），皆錯誤。\n【重點】well 的比較級為 better，最高級為 best；「比較級 + than」表相比。\n【句意】因為短片很短，它們比長節目更能抓住人們的注意力。"},{"n":28,"type":"整句語意","options":{"A":"improve their patience for slower activities","B":"make long books much easier to read","C":"instantly cure their short attention span","D":"make it harder to focus for long"},"answer":"D","explain_zh":"(D) 呼應專家對短影音的擔憂，考整句語意。","note":"【正解】專家「警告」屬負面提醒，故「讓人更難長時間專注」最符合語氣。\n【誘答】(A) 增進對慢步調活動的耐性（與前文「縮短觀眾耐性」矛盾）、(B) 讓長篇書籍更容易閱讀（與「讀長篇文章越來越吃力」矛盾）、(C) 立刻治好注意力不集中（短影音使注意力更難集中，與此矛盾），皆與 warn 的擔憂不符。\n【重點】warn that + 子句「警告…」；make it + 形容詞 + to V「使做…變得…」。\n【句意】然而，有些專家警告，看太多短影音可能讓人更難長時間專注。"}]}],"vocab":["streaming","service","viewer","connection","episode","entertainment","clip","dozen","share","attention","focus","warn","subscriber","recommendation","exclusive","overwhelmed","addictive","imitate","promote","mindful"]},{"id":27,"passages":[{"label":"A","title_zh":"K-pop 韓流全球熱潮","text":"Over the past ten years, K-pop has grown into a global trend. Whereas Western pop long dominated the charts, Korean music has steadily carved out a global following. Korean groups such as BTS and BLACKPINK have [[21]] millions of fans around the world. Behind every polished performance lies years of demanding training in singing, dancing, and languages. Their songs are easy to sing, and their dance moves are fun to copy. Given their careful preparation, idols are expected to master complex routines with remarkable precision. What makes K-pop special is not only the music [[22]] also the colorful fashion and lovely music videos. Moreover, entertainment companies invest enormous sums in producing visually stunning music videos. Fans often spend hours learning the dances and [[23]] the lyrics, even when the words are in Korean. Devoted fans, who organize themselves into massive online communities, promote their idols tirelessly. These communities frequently launch campaigns to help their favorite songs top international charts. Thanks to social media, a new song can spread across the world within days. Concerts, which sell out within minutes, attract audiences from dozens of different countries. As a result, cities across the world now host events celebrating Korean music and culture. Interestingly, many foreign fans become so fascinated that they begin studying the Korean language itself. Given this cultural influence, K-pop has evolved from mere entertainment into a powerful global phenomenon. K-pop keeps growing because [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"attracted","B":"followed","C":"greeted","D":"warned"},"answer":"A","explain_zh":"(A) attracted：韓團「吸引」了全球粉絲，考動詞詞彙。","note":"【正解】attracted「吸引」，韓國團體吸引了全球數百萬粉絲，符合韓流熱潮的主旨。\n【誘答】(B) followed 追隨（方向相反，是粉絲追隨偶像）、(C) greeted 問候（僅指打招呼，非累積粉絲）、(D) warned 警告（語意不合），皆非正確。\n【重點】attract 為及物動詞，attract fans「吸引粉絲」。\n【句意】BTS 和 BLACKPINK 等韓國團體在世界各地吸引了數百萬名粉絲。"},{"n":22,"type":"連接詞","options":{"A":"and","B":"yet","C":"but","D":"nor"},"answer":"C","explain_zh":"(C) but：not only... but also 的固定用法，考連接詞。","note":"【正解】but：not only A but also B「不僅 A 而且 B」為固定相關連接詞，故用 but。\n【誘答】(A) and（not only…and also 非固定搭配）、(B) yet（not only…yet also 不成立）、(D) nor（用於否定並列，not only…nor 不合），皆不能與 not only 構成「不僅…而且…」的固定句型。\n【重點】相關連接詞 not only... but (also)...「不僅…而且…」。\n【句意】K-pop 特別之處不只在於音樂，還有繽紛的時尚與精美的音樂錄影帶。"},{"n":23,"type":"語法","options":{"A":"memorize","B":"memorizing","C":"to memorize","D":"having memorized"},"answer":"B","explain_zh":"(B) memorizing：與 learning 平行的動名詞，考詞形一致。","note":"【正解】memorizing：spend + 時間 + V-ing，且須與前面的 learning 平行對稱，故用 memorizing。\n【誘答】(A) memorize 原形動詞不能與 learning 平行、(C) to memorize 不定詞破壞與 learning 的平行對稱、(D) having memorized 完成動名詞表「已背完」，與並列的 learning 時態語意不一致，皆錯誤。\n【重點】spend time (in) V-ing「花時間做…」；對等連接詞 and 連接的兩動詞須詞形一致。\n【句意】粉絲常花好幾個小時學舞步、背歌詞，即使歌詞是韓文也一樣。"},{"n":24,"type":"整句語意","options":{"A":"its songs are popular only within Korea","B":"fans seldom use social media to promote it","C":"the strict training keeps most people away","D":"it brings fans from different countries together"},"answer":"D","explain_zh":"(D) 呼應韓流連結全球粉絲，考整句語意。","note":"【正解】呼應全文韓流風靡全球，故「把不同國家的粉絲聚在一起」最能說明它持續壯大的原因。\n【誘答】(A) 它的歌只在韓國受歡迎（與全文「全球風靡」矛盾）、(B) 粉絲很少用社群媒體推廣（與「靠社群媒體迅速傳遍全球」矛盾）、(C) 嚴格訓練使多數人卻步（嚴格訓練是幕後付出，非壯大原因，邏輯不合），皆不合。\n【重點】because 引導原因；bring... together「使…聚在一起」。\n【句意】K-pop 之所以持續壯大，是因為它把來自不同國家的粉絲聚在一起。"}]},{"label":"B","title_zh":"台灣偶像團體與粉絲文化","text":"Taiwan has its own idol groups, and their fans are known for being warm and loyal. Whereas fandom was once dismissed as childish, it is now recognized as a genuine cultural force. When a group holds a concert, thousands of fans [[25]] tickets within minutes. Given the loyalty involved, supporters often follow their idols' careers for many devoted years. Many fans join clubs, where they share news and photos [[26]] their favorite stars. Online communities, which operate around the clock, coordinate everything from voting to charity drives. To show support, they prepare lovely gifts and bright light sticks for every show. Moreover, fans design elaborate banners and rehearse cheers so that every concert feels unforgettable. Some clubs even raise money to help their favorite idols do charity work. When an idol faces criticism, loyal followers rush to defend their reputation with striking determination. Such devotion, however, occasionally sparks debate about how far admiration should reasonably go. This kind of fan culture, [[27]] once seemed strange to outsiders, has now become a normal part of pop life. Companies, aware of this passion, carefully nurture the relationship between performers and their audiences. Charity projects organized by fan clubs have raised impressive sums for those in genuine need. As a result, being a fan increasingly means belonging to a caring and purposeful community. Given these positive contributions, fan culture in Taiwan has earned growing respect from wider society. The close bond between stars and fans is special [[28]].","blanks":[{"n":25,"type":"詞彙","options":{"A":"catch","B":"hold","C":"spend","D":"grab"},"answer":"D","explain_zh":"(D) grab：粉絲幾分鐘內「搶購」門票，考動詞詞彙。","note":"【正解】grab「抓、搶」，grab tickets 指粉絲在幾分鐘內就把門票搶購一空。\n【誘答】(A) catch 抓住（不與 tickets 搭配，catch 用於車、球、機會）、(B) hold 持有／保留（指握著或保留票，非迅速搶購）、(C) spend 花費（接金錢或時間，不接 tickets），皆與「搶票」不合。\n【重點】grab 有「迅速抓取、搶購」之意，如 grab tickets「搶票」。\n【句意】當團體舉辦演唱會時，成千上萬的粉絲在幾分鐘內就把票搶光。"},{"n":26,"type":"介系詞","options":{"A":"for","B":"about","C":"from","D":"toward"},"answer":"B","explain_zh":"(B) about：分享「關於」偶像的消息與照片，考介系詞。","note":"【正解】about「關於」，news and photos about their stars 指關於偶像的消息與照片。\n【誘答】(A) for 為了（分享「為了明星」的消息語意不合）、(C) from 來自（news from stars 表消息來自明星本人，與「關於明星」不同）、(D) toward 朝向（語意不合），皆非正確介系詞。\n【重點】介系詞 about「關於」，news about sb「關於某人的消息」。\n【句意】許多粉絲加入社團，在那裡分享關於他們最愛偶像的消息與照片。"},{"n":27,"type":"語法","options":{"A":"that","B":"it","C":"which","D":"what"},"answer":"C","explain_zh":"(C) which：關代指 fan culture（物），考關係詞。","note":"【正解】which 引導非限定關係子句，先行詞為 this kind of fan culture（物），在子句中作主詞。\n【誘答】(A) that 不可用於逗號後的補述子句、(B) it 為代名詞會造成兩獨立句相連（逗號連句）、(D) what 不能有先行詞，皆非正確關係詞。\n【重點】關係代名詞 which 指物，逗號後作補述用法。\n【句意】這種曾讓外人覺得奇怪的粉絲文化，如今已成為流行生活中很平常的一部分。"},{"n":28,"type":"整句語意","options":{"A":"because it is built on trust and love","B":"since it often ends in bitter disappointment","C":"as it keeps fans and stars far apart","D":"because it forces fans to spend everything"},"answer":"A","explain_zh":"(A) 呼應星迷之間的信任情感，考整句語意。","note":"【正解】呼應全文粉絲的「溫暖忠誠」，故「因為建立在信任與愛之上」最能說明這份情感為何特別。\n【誘答】(B) since 表原因合乎結構，但「常以痛苦失望收場」與溫暖信任矛盾、(C) as 表原因，但「使粉絲與明星疏遠」與親密情感矛盾、(D) because 表原因，但「逼粉絲散盡錢財」屬負面，與關懷、公益的敘述不符，皆不合。\n【重點】because 引導原因；be built on「建立在…之上」。\n【句意】明星與粉絲之間這份親密的情感很特別，因為它建立在信任與愛之上。"}]}],"vocab":["global","trend","fan","fashion","lyric","spread","idol","loyal","concert","support","culture","bond","following","precision","community","campaign","devotion","reputation","nurture","phenomenon"]},{"id":28,"passages":[{"label":"A","title_zh":"極端氣候、熱浪與野火","text":"In recent years, the weather around the world has become more and more [[21]]. The year 2023 was reported to be one of the hottest years ever recorded. Whereas seasons once followed familiar patterns, they now shift in unpredictable and alarming ways. Many scientists have warned that the earth is getting warmer year by year. Given the rising temperatures, glaciers are melting faster, causing sea levels to creep steadily upward. During long heat waves, temperatures rose so high [[22]] many people found it hard to work or sleep. Coastal cities, which house millions of residents, face a growing threat from flooding and fierce storms. In several countries, dry forests caught fire easily, and the wildfires burned homes and forced families to leave. Moreover, prolonged droughts have damaged crops, driving up food prices in many vulnerable regions. Scientists, drawing on decades of data, insist that human activity lies at the heart of the problem. Scientists say these changes are closely related [[23]] global warming. Burning fossil fuels releases gases that trap heat, gradually warming the planet's fragile atmosphere. As a result, governments are being urged to reduce emissions before the damage becomes irreversible. Many nations, recognizing the danger, have pledged to invest in cleaner and more sustainable energy. Ordinary citizens, too, can help by saving electricity, wasting less, and choosing greener habits. Given how interconnected the world has become, tackling this crisis will demand cooperation across every border. If we do not act soon, such extreme weather may [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"mild","B":"stable","C":"extreme","D":"pleasant"},"answer":"C","explain_zh":"(C) extreme：天氣變得越來越「極端」，考形容詞詞彙。","note":"【正解】extreme「極端的」，指全球天氣變得越來越極端，符合極端氣候的主題。\n【誘答】(A) mild 溫和的（與熱浪、野火等極端現象矛盾）、(B) stable 穩定的（與「季節以難以預測的方式改變」矛盾）、(D) pleasant 宜人的（與極端氣候相反），皆非正確。\n【重點】more and more + 形容詞「越來越…」；extreme weather「極端氣候」。\n【句意】近年來，世界各地的天氣變得越來越極端。"},{"n":22,"type":"語法","options":{"A":"that","B":"as","C":"than","D":"such"},"answer":"A","explain_zh":"(A) that：so... that「如此…以致於」句型，考語法。","note":"【正解】that：so + 形容詞 + that 子句「如此…以致於…」，此處指氣溫高到讓人難以工作或入睡。\n【誘答】(B) as（用於 as…as 或表「當／因為」，接子句不合 so…that）、(C) than（用於比較級，此處非比較）、(D) such（須接名詞 such + N + that，此處為 so + 形容詞 + that，不可用），皆錯誤。\n【重點】so + adj./adv. + that 子句「如此…以致於…」。\n【句意】在漫長的熱浪期間，氣溫高到許多人難以工作或入睡。"},{"n":23,"type":"介系詞","options":{"A":"with","B":"by","C":"in","D":"to"},"answer":"D","explain_zh":"(D) to：be related to「與…有關」，考介系詞。","note":"【正解】to：be related to「與…有關」為固定用法，指這些變化與全球暖化密切相關。\n【誘答】(A) with 常見誤用（related with），正確固定為 related to、(B) by（related by 僅用於「有血緣關係」，此處語意不合）、(C) in（related in 搭配錯誤），皆非正確。\n【重點】固定用法 be related to sth「與某事有關」。\n【句意】科學家說這些變化與全球暖化密切相關。"},{"n":24,"type":"整句語意","options":{"A":"gradually return to normal by itself","B":"become even more common in the future","C":"affect only a few distant countries","D":"slow down the melting of glaciers"},"answer":"B","explain_zh":"(B) 呼應不作為則極端氣候更頻繁的警告，考整句語意。","note":"【正解】呼應「若不及早行動」的警告，故「未來會變得更常見」語意最連貫。\n【誘答】(A) 自行漸漸恢復正常（與「若不行動」的邏輯矛盾）、(C) 只影響少數遙遠國家（與「世界高度相連、需跨國合作」矛盾）、(D) 減緩冰川融化（暖化使冰川加速融化，與此矛盾），皆不合。\n【重點】助動詞 may 後接原形；if 條件句提醒不作為的後果，整句語意須負面。\n【句意】如果我們不儘快行動，這樣的極端天氣未來可能變得更常見。"}]},{"label":"B","title_zh":"台灣颱風與防災","text":"Living on an island, people in Taiwan are quite [[25]] with typhoons. Every summer and fall, several strong storms hit the island with heavy rain and powerful winds. Whereas earlier generations relied on guesswork, modern forecasting can now predict a storm's path days ahead. Before a typhoon comes, families store food and water, [[26]] the power goes out during the storm. Given this advance warning, communities have valuable time to secure their homes and gather supplies. Weather stations, which monitor the ocean constantly, track each approaching typhoon with impressive accuracy. The government also sends warning messages, [[27]] help people get ready in time. Moreover, emergency teams rehearse rescue operations so that they can respond swiftly when disaster strikes. Residents living near rivers are urged to evacuate early, since sudden floods can prove deadly. Schools and offices may also close so that families can stay home together during the worst hours. Volunteers, working alongside officials, help clear fallen trees and restore power after the winds die down. Farmers, whose crops are especially vulnerable, often suffer heavy losses when a powerful storm passes through. Although typhoons can be dangerous, careful planning keeps most people safe. As a result, the authorities continue to strengthen drainage systems and reinforce older buildings. Public education campaigns, meanwhile, remind citizens how to behave calmly during an emergency. Given the island's exposed location, preparing thoroughly remains the wisest and most reliable defense. The best way to face a storm is [[28]].","blanks":[{"n":25,"type":"詞彙","options":{"A":"bored","B":"familiar","C":"busy","D":"popular"},"answer":"B","explain_zh":"(B) familiar：台灣人對颱風很「熟悉」，考形容詞詞彙。","note":"【正解】familiar：be familiar with「對…熟悉」，指住在島上的台灣人對颱風很熟悉。\n【誘答】(A) bored（be bored with「對…厭煩」，語意不合）、(C) busy（be busy with「忙於」，語意不合）、(D) popular（be popular with「受…喜愛」，「颱風受台灣人喜愛」語意不合），三者皆搭 with 但語意不符。\n【重點】固定用法 be familiar with sth「熟悉某事物」。\n【句意】住在島上，台灣人對颱風相當熟悉。"},{"n":26,"type":"連接詞","options":{"A":"if","B":"when","C":"before","D":"in case"},"answer":"D","explain_zh":"(D) in case：「以防」停電而先儲糧，考連接詞。","note":"【正解】in case「以防、萬一」，引導子句表事先儲備食物和水以防停電。\n【誘答】(A) if 若停電（變成停電才儲糧，與事先預防的時序不合）、(B) when 當停電時（指停電當下，與事先儲備矛盾）、(C) before 在停電之前（僅表時間，不如 in case 表「以防萬一」的預防目的），皆非最佳。\n【重點】in case + 子句「以防萬一…」，表預先防備。\n【句意】颱風來臨前，家家戶戶會儲備食物和水，以防暴風雨期間停電。"},{"n":27,"type":"語法","options":{"A":"which","B":"that","C":"they","D":"what"},"answer":"A","explain_zh":"(A) which：關代指 messages（物），考關係詞。","note":"【正解】which 引導非限定關係子句，先行詞為 warning messages（物），在子句中作主詞。\n【誘答】(B) that 不可用於逗號後的補述子句、(C) they 為代名詞會造成兩獨立句相連（逗號連句）、(D) what 不能有先行詞，皆非正確關係詞。\n【重點】關係代名詞 which 指物；先行詞為複數，其後動詞用 help。\n【句意】政府也會發送警報訊息，這些訊息幫助人們及時做好準備。"},{"n":28,"type":"整句語意","options":{"A":"to trust luck instead of planning","B":"to evacuate only after the flood arrives","C":"to prepare early and stay calm","D":"to keep all the windows wide open"},"answer":"C","explain_zh":"(C) 呼應防災須及早準備，考整句語意。","note":"【正解】呼應全文「事先準備」的防災主旨，故「及早準備並保持冷靜」最合文意。\n【誘答】(A) 靠運氣而不做規劃（與全文強調「事先仔細規劃」矛盾）、(B) 等洪水來了才撤離（與「靠近河流的居民應及早撤離」矛盾）、(D) 把所有窗戶都大開（颱風時並不安全，與防災正確做法不符），皆不合。\n【重點】be 動詞後接不定詞 to V 作補語；整句語意須符合防災的正確做法。\n【句意】面對暴風雨最好的方法就是及早準備並保持冷靜。"}]}],"vocab":["extreme","weather","temperature","wildfire","warming","typhoon","storm","powerful","store","warning","prepare","disaster","glacier","emission","drought","sustainable","irreversible","evacuate","forecast","vulnerable","drainage"]},{"id":29,"passages":[{"label":"A","title_zh":"2022 卡達世界盃足球賽","text":"Hosting a tournament of this scale demanded years of meticulous preparation, and the host nation poured vast resources into stadiums, transport, and hospitality. In 2022, the World Cup was held in Qatar, and millions of soccer fans around the world [[21]] the exciting games on TV. Soccer is the most popular sport on Earth, so this event drew huge [[22]] from almost every country. Broadcasters competed fiercely for the rights to air the matches, given that audiences on every continent were eager to follow their national teams. Moreover, the competition generated remarkable economic activity, ranging from tourism to global advertising. Some matches were so close [[23]] fans could hardly sit still until the final whistle. Whenever an underdog defeated a stronger side, social media erupted with astonishment and delight. In the stadiums, the atmosphere was electric, with waves of colour and song rising from every stand. Argentina finally won the title, and their supporters cheered with great joy. Lionel Messi, whose brilliant performances had inspired his teammates, was widely praised as the very heart of the squad. The victory was celebrated not only in Buenos Aires but also in countless cities where Argentine communities had gathered. Commentators observed that such moments of collective emotion are surprisingly rare in ordinary life. Even people who seldom watched sports found themselves drawn into the drama night after night. As a result, the final came to be remembered as one of the most dramatic in the history of the sp
