ort. For many people, the World Cup is more than a simple game; it [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"attended","B":"watched","C":"cheered","D":"recorded"},"answer":"B","explain_zh":"(B) watched：全球球迷在電視上「觀看」精彩賽事，考動詞詞彙。","note":"【正解】watched「觀看」，數百萬球迷在電視上觀看比賽。\n【誘答】(A) attended「親臨觀賽」與 on TV（透過電視收看）矛盾、(C) cheered 需搭配 for/at 才表「為…加油」，直接接 the games 搭配不當、(D) recorded「錄下」比賽並非「觀看」的動作，語意不合。\n【重點】動詞詞彙 watch，指在電視上收看比賽。\n【句意】2022 年世界盃在卡達舉行，全球數百萬球迷在電視上觀看這些精彩的賽事。"},{"n":22,"type":"詞彙","options":{"A":"criticism","B":"profit","C":"pressure","D":"attention"},"answer":"D","explain_zh":"(D) attention：這項賽事吸引各國極大「關注」，考名詞詞彙。","note":"【正解】attention「關注、注意」，賽事吸引各國極大關注。\n【誘答】(A) criticism 雖能與 draw 搭配，但「批評」與足球廣受歡迎的正面語氣矛盾、(B) profit「利潤」多用 generate/make 而非 draw，搭配不當、(C) pressure「壓力」與 draw 搭配不自然，也不符「受矚目」之意。\n【重點】名詞詞彙 attention，常用 draw/attract attention「吸引注意」。\n【句意】足球是地表最受歡迎的運動，所以這項賽事吸引了幾乎每個國家的高度關注。"},{"n":23,"type":"語法","options":{"A":"that","B":"as","C":"for","D":"which"},"answer":"A","explain_zh":"(A) that：so...that「如此…以致於」的結果子句，考語法。","note":"【正解】that，構成 so + 形容詞 + that 的結果句型。\n【誘答】(B) as 無法構成結果句型、(C) for 作「因為」解時邏輯倒置且不搭 so、(D) which 引導形容詞子句，此處非修飾名詞，皆不合 so...that 的結果句型。\n【重點】語法句型 so close that...「如此接近，以致於…」。\n【句意】有些比賽是如此接近，球迷幾乎坐不住，直到終場哨聲響起。"},{"n":24,"type":"整句語意","options":{"A":"decides which country is the richest one","B":"matters only to professional players","C":"brings people from many places together","D":"reminds them to exercise every single day"},"answer":"C","explain_zh":"(C) 呼應世界盃「不只是比賽」，能把各地的人團結起來，考整句語意。","note":"【正解】呼應「不只是一場比賽」，世界盃把來自各地的人「凝聚在一起」。\n【誘答】(A) 決定哪國最富，與世界盃「決定最強球隊、凝聚情感」的主旨不符、(B) 只對職業球員重要，與文中「連平時不看球的人也著迷」矛盾、(D) 提醒每天運動，偏離世界盃象徵「情感凝聚」的重點，語意離題。\n【重點】整句語意，須扣住 more than a simple game 的正面延伸；bring...together「凝聚」。\n【句意】對許多人而言，世界盃不只是一場單純的比賽，它把來自各地的人凝聚在一起。"}]},{"label":"B","title_zh":"台灣運動風氣與全民運動","text":"Regular physical activity has increasingly been recognized as one of the most effective ways to prevent chronic illness. In recent years, more and more people in Taiwan have started to care [[25]] their health through exercise. Whereas earlier generations often viewed exercise as a luxury, many citizens today treat it as an essential part of their daily routine. Every morning, parks are full of people who jog, dance, or practice tai chi together. Given that urban life can be stressful, such open-air gatherings offer both physical and emotional relief. The government also builds sports centers [[26]] everyone can join different activities at a low price. These modern facilities, which are often equipped with swimming pools and fitness rooms, have made exercise accessible to almost everyone. Moreover, community coaches encourage beginners to set realistic goals and to progress at a comfortable pace. Doing sports not only keeps our bodies strong [[27]] also helps us make new friends. Studies conducted by local universities suggest that people who train together tend to stay motivated far longer than those who exercise alone. As a result, sports have gradually become a social activity as much as a personal one. Doctors frequently remind us that even a brisk daily walk can significantly improve heart health. In addition, maintaining an active lifestyle is believed to sharpen the mind and boost overall confidence. Given these benefits, promoting nationwide fitness has become an important goal for both schools and local governments. Health experts say that if we exercise on a regular basis, we [[28]].","blanks":[{"n":25,"type":"介系詞","options":{"A":"of","B":"on","C":"about","D":"to"},"answer":"C","explain_zh":"(C) care about：「在乎、重視」健康，考介系詞搭配。","note":"【正解】care about「在乎、重視」，人們開始重視自己的健康。\n【誘答】(A) of 需與 take 連用（take care of）才成立，單獨 care of 不成句、(B) care on 並非慣用搭配、(D) care to 意為「願意（做某事）」須接原形動詞，接名詞 health 不合，皆不能表「重視健康」。\n【重點】動詞片語 care about「在乎、關心」。\n【句意】近年來，越來越多台灣人開始透過運動來重視自己的健康。"},{"n":26,"type":"連接詞","options":{"A":"so that","B":"in case","C":"as long as","D":"even if"},"answer":"A","explain_zh":"(A) so that：政府蓋運動中心「以便」大家參加活動，表目的，考連接詞。","note":"【正解】so that「以便、為了讓」，引導表目的的子句。\n【誘答】(B) in case「以防萬一」、(C) as long as「只要（條件）」、(D) even if「即使（讓步）」，三者語意雖通順卻不表「目的」，與蓋運動中心是「為了讓大家參與」的目的不符。\n【重點】連接詞 so that 表目的，後接可能發生的結果。\n【句意】政府也興建運動中心，好讓每個人都能以低廉的價格參加各種活動。"},{"n":27,"type":"連接詞","options":{"A":"and","B":"yet","C":"also","D":"but"},"answer":"D","explain_zh":"(D) but：not only...but also「不但…而且」的固定搭配，考連接詞。","note":"【正解】but，構成 not only...but also「不但…而且」的關聯連接詞。\n【誘答】(A) and、(B) yet、(C) also 看似能承接，但 not only 的固定關聯詞是 but（also），三者都無法與 not only 構成正確的 not only...but also 句型。\n【重點】關聯連接詞 not only A but also B。\n【句意】做運動不但能保持身體強健，也幫助我們結交新朋友。"},{"n":28,"type":"整句語意","options":{"A":"can eat anything without gaining weight","B":"will feel healthier and happier every day","C":"will never need to see a doctor again","D":"may become too tired to work each day"},"answer":"B","explain_zh":"(B) 呼應「規律運動」帶來的好處，會更健康快樂，考整句語意。","note":"【正解】呼應「規律運動」的正面結果，我們會「更健康、更快樂」。\n【誘答】(A) 怎麼吃都不會胖屬誇大不實、非文中所述益處、(C) 再也不必看醫生與文中醫生仍提醒注意心臟健康的敘述矛盾、(D) 累到無法工作與運動能「使頭腦清晰、增添自信」的正面結論相反。\n【重點】整句語意，須扣住 if we exercise on a regular basis 的正向條件結果。\n【句意】健康專家表示，只要我們規律運動，每天都會覺得更健康、更快樂。"}]}],"vocab":["World Cup","fan","match","whistle","supporter","attention","exercise","jog","regular","health","activity","together","preparation","resources","hospitality","broadcaster","audience","economic","underdog","astonishment","atmosphere","collective","dramatic","chronic","facility","accessible","motivated","lifestyle","confidence","routine"]},{"id":30,"passages":[{"label":"A","title_zh":"太空探索與星鏈衛星","text":"For much of the twentieth century, only powerful governments could afford the staggering cost of reaching orbit. Space travel used to be a distant dream, but today companies like SpaceX have made it much more [[21]]. SpaceX builds rockets that can land back on the ground and be used again, which saves a lot of money. This concept of reusability, which was once dismissed as impractical, has fundamentally transformed the economics of the industry. The company also sends thousands of small satellites into space to build a network called Starlink. Engineers designed these compact devices to orbit the planet in coordinated groups, forming a vast web overhead. This network [[22]] fast Internet to people who live in faraway areas. Such coverage is especially valuable in remote regions where traditional cables have never been laid. [[23]] the technology is still quite new, many users are already happy with the service. Whereas earlier satellite services were slow and expensive, the new system promises speeds comparable to those in major cities. Critics, however, warn that the growing number of objects in orbit could increase the risk of collisions. Astronomers have also expressed concern that bright satellites may interfere with observations of the night sky. Given these challenges, regulators are working to establish clearer rules for the crowded space above us. Even so, supporters argue that the potential benefits far outweigh the drawbacks. As private firms and public agencies continue to cooperate, ambitious missions to the Moon and beyond appear increasingly realistic. Thanks to these efforts, the future of space seems [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"distant","B":"expensive","C":"difficult","D":"possible"},"answer":"D","explain_zh":"(D) possible：太空旅行變得更「可能、可行」，考形容詞詞彙。","note":"【正解】possible「可能的」，這些公司讓太空旅行變得更可行。\n【誘答】(A) distant「遙遠的」重複前文的 distant dream，卻與「如今變得更可行」的轉折相反、(B) expensive「昂貴的」與後文「省下大筆金錢」矛盾、(C) difficult「困難的」與科技讓太空旅行更容易的語意相反。\n【重點】形容詞 possible；make it more possible「讓它更有可能」。\n【句意】太空旅行過去是遙遠的夢想，但如今像 SpaceX 這樣的公司讓它變得更加可行。"},{"n":22,"type":"詞彙","options":{"A":"receives","B":"provides","C":"connects","D":"limits"},"answer":"B","explain_zh":"(B) provides：這個網路「提供」偏遠地區快速網路，主詞單數用 provides，考詞彙與主謂一致。","note":"【正解】provides「提供」，此網路提供偏遠地區快速網路；主詞 network 為單數，動詞加 s。\n【誘答】(A) receives「接收」方向相反，網路是「提供」而非接收網路、(C) connects「連接」須接 sb to sth，直接接 fast Internet 搭配不當、(D) limits「限制」與提供快速網路的正面語意相反（三者主詞單數雖同樣加 s，語意皆不合）。\n【重點】動詞詞彙 provide + 主謂一致（單數主詞配 provides）。\n【句意】這個網路為住在偏遠地區的人們提供快速的網際網路。"},{"n":23,"type":"連接詞","options":{"A":"Since","B":"Once","C":"Although","D":"Whether"},"answer":"C","explain_zh":"(C) Although：技術「雖然」還新，使用者卻已滿意，表讓步轉折，考連接詞。","note":"【正解】Although「雖然」，引導讓步子句，與後句的滿意形成轉折。\n【誘答】(A) Since「因為/自從」、(B) Once「一旦」、(D) Whether「是否」，語意分別為原因、時間條件、名詞子句引導，都無法表達「雖然技術還新，使用者卻已滿意」的讓步轉折。\n【重點】從屬連接詞 Although 表讓步。\n【句意】雖然這項技術還相當新，許多使用者卻已對這項服務感到滿意。"},{"n":24,"type":"整句語意","options":{"A":"brighter than ever before","B":"reserved only for wealthy nations","C":"impossible to predict at all","D":"less exciting than in the past"},"answer":"A","explain_zh":"(A) 呼應前文的種種進展，太空的未來「比以往更光明」，考整句語意。","note":"【正解】呼應前文成就，太空的未來「比以往更加光明」。\n【誘答】(B) 只保留給富裕國家，與私人公司讓太空更普及、可行的內容相反、(C) 完全無法預測，與全文樂觀光明的語氣不符、(D) 不如以往精彩，與「登月等雄心任務越來越可行」的正向發展矛盾。\n【重點】整句語意，須扣住 Thanks to these efforts 的正面結果；比較級 brighter than ever。\n【句意】多虧這些努力，太空的未來看起來比以往任何時候都更加光明。"}]},{"label":"B","title_zh":"台灣太空計畫與福爾摩沙衛星","text":"Taiwan has also joined the race to explore space with its own program. Although the island is relatively small, its ambition in aerospace research has grown steadily over the past two decades. For years, scientists here have been [[25]] satellites known as Formosat. These sophisticated instruments, developed through years of patient study, represent a major achievement for local science. These satellites take clear pictures of the Earth and warn us [[26]] coming typhoons and other disasters. By monitoring the atmosphere from above, they provide data that would be impossible to gather from the ground alone. When a big storm is near, the images they send back are very [[27]] for keeping people safe. Emergency teams rely on these detailed images to plan evacuations and to allocate resources wisely. Moreover, the same technology can track pollution, measure crop growth, and assist in mapping remote terrain. Building satellites is not easy, but Taiwan's engineers keep learning and improving. Each successful launch, which is the result of countless hours of testing, strengthens the confidence of the whole team. Given that space technology is highly competitive, international partnerships have proved essential to progress. Young researchers are encouraged to study abroad and then bring their expertise back home. As a result, a new generation of talented engineers is gradually taking shape. Should these efforts continue, Taiwan may well become a respected contributor to global space exploration. If the program keeps growing, our country [[28]].","blanks":[{"n":25,"type":"語法","options":{"A":"building","B":"built","C":"builds","D":"to build"},"answer":"A","explain_zh":"(A) building：have been building 現在完成進行式，考動詞詞形。","note":"【正解】building，have been + V-ing 構成現在完成進行式，表持續多年。\n【誘答】(B) built 為過去分詞，have been 後不接過去分詞表主動持續、(C) builds 為限定動詞、(D) to build 為不定詞，皆無法接在 have been 之後，唯有 V-ing 才構成現在完成進行式。\n【重點】語法：現在完成進行式 have/has been + V-ing。\n【句意】多年來，這裡的科學家一直在打造名為「福爾摩沙衛星」的衛星。"},{"n":26,"type":"介系詞","options":{"A":"against","B":"for","C":"of","D":"from"},"answer":"C","explain_zh":"(C) warn of：「警告、預警」即將來臨的颱風，考介系詞搭配。","note":"【正解】warn us of「向我們預警…」，warn sb of sth 為固定搭配。\n【誘答】(A) against 雖可搭 warn（warn sb against 勸阻某人別做某事），但颱風無法被「勸阻」，語意不合、(B) for、(D) from 都不能與 warn 組成「預警某事」的搭配。\n【重點】動詞搭配 warn sb of sth「警告某人某事」。\n【句意】這些衛星拍下清晰的地球照片，並向我們預警即將到來的颱風和其他災害。"},{"n":27,"type":"詞彙","options":{"A":"harmful","B":"useful","C":"clear","D":"confusing"},"answer":"B","explain_zh":"(B) useful：影像對保護人民安全非常「有用」，考形容詞詞彙。","note":"【正解】useful「有用的」，衛星影像對確保民眾安全非常有幫助。\n【誘答】(A) harmful「有害的」與確保安全的正面語意相反、(C) clear「清晰的」雖呼應前文 clear pictures，但 be...for keeping people safe 需要的是「有用」而非「清晰」、(D) confusing「令人困惑的」與影像有助防災的功用矛盾。\n【重點】形容詞 useful，常搭配 be useful for「對…有用」。\n【句意】當強烈風暴逼近時，衛星傳回的影像對保護人民安全非常有用。"},{"n":28,"type":"整句語意","options":{"A":"may forget its earlier achievements","B":"will depend only on foreign satellites","C":"should focus on farming instead","D":"will go further in space in the years ahead"},"answer":"D","explain_zh":"(D) 呼應計畫持續成長，國家「未來能在太空走得更遠」，考整句語意。","note":"【正解】呼應「計畫持續成長」的條件，國家「未來能在太空走得更遠」。\n【誘答】(A) 可能忘記先前成就，與逐步累積、精進的敘述不符、(B) 只依賴外國衛星，與台灣工程師自主研發、精進的內容矛盾、(C) 應改專注於農業，偏離發展太空的主旨，屬離題。\n【重點】整句語意，須扣住 If the program keeps growing 的正向條件結果。\n【句意】如果這項計畫持續成長，我們的國家未來將能在太空領域走得更遠。"}]}],"vocab":["space","rocket","satellite","network","provide","technology","typhoon","disaster","engineer","improve","program","explore","orbit","reusability","economics","coordinated","coverage","remote","collision","astronomer","regulator","cooperate","aerospace","ambition","sophisticated","evacuation","expertise","partnership","contributor"]},{"id":31,"passages":[{"label":"A","title_zh":"高鐵、國旅補助與觀光復甦","text":"The long months of closed borders and cancelled bookings had left the travel industry in serious difficulty. After the pandemic slowed down, tourism in Taiwan began to [[21]] again. This subsidy program, which was designed to revive local spending, quickly attracted enthusiastic participation. To help hotels and shops, the government offered money to people who traveled inside the country. Whereas overseas trips remained complicated, domestic destinations suddenly seemed far more appealing. Many families took the high speed rail to the south [[22]] they could enjoy a short holiday. Along the route, passengers admired green rice fields and distant mountains sliding past their windows. The fast trains made long trips feel quick and [[23]]. Given that time is precious for busy workers, such efficient transport made weekend getaways genuinely practical. Hotels responded by offering creative packages, and restaurants extended their hours to welcome the returning crowds. Because of these travel plans, more visitors returned to night markets and old streets. Vendors who had struggled during the downturn were relieved to see their stalls bustling once more. Moreover, cultural festivals and local performances drew even larger audiences than before. Economists noted that this rebound helped countless small enterprises survive a difficult period. As a result, communities that depend on visitors gradually regained their earlier energy and optimism. Local business owners were happy [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"recover","B":"struggle","C":"decline","D":"collapse"},"answer":"A","explain_zh":"(A) recover：疫情趨緩後觀光業開始「復甦」，考動詞詞彙。","note":"【正解】recover「復甦、恢復」，疫情趨緩後觀光業開始回溫。\n【誘答】(B) struggle「陷入困境」與疫情趨緩後觀光「回升」的走向相反（產業原本才在掙扎）、(C) decline「衰退」、(D) collapse「崩潰、瓦解」皆為負面下滑之意，與 recover again 的復甦矛盾。\n【重點】動詞詞彙 recover「恢復、復原」。\n【句意】疫情趨緩後，台灣的觀光業開始再度復甦。"},{"n":22,"type":"連接詞","options":{"A":"in case","B":"as long as","C":"so that","D":"even though"},"answer":"C","explain_zh":"(C) so that：搭高鐵南下「以便」享受短假期，表目的，考連接詞。","note":"【正解】so that「以便」，引導表目的的子句。\n【誘答】(A) in case「以防萬一」、(B) as long as「只要」、(D) even though「即使」，分別表防範、條件與讓步，都無法表達搭高鐵南下是「為了」享受假期的目的。\n【重點】連接詞 so that 表目的。\n【句意】許多家庭搭高鐵南下，好讓自己享受一個短暫的假期。"},{"n":23,"type":"詞彙","options":{"A":"short","B":"easy","C":"costly","D":"tiring"},"answer":"B","explain_zh":"(B) easy：快速列車讓長途旅程變得又快又「輕鬆」，考形容詞詞彙。","note":"【正解】easy「輕鬆的」，高鐵讓長途旅程變得又快又輕鬆。\n【誘答】(A) short 與主詞 long trips 語意矛盾，且與 quick 重複、(C) costly「昂貴的」與描述便利舒適的正面語氣不合、(D) tiring「累人的」與旅程「輕鬆」的優點相反。\n【重點】形容詞 easy，與 quick 並列描述旅程的方便。\n【句意】快速列車讓長途旅程感覺既迅速又輕鬆。"},{"n":24,"type":"整句語意","options":{"A":"that fewer tourists chose to travel south","B":"because the subsidy program had ended early","C":"although their sales kept dropping every month","D":"to see so many customers come back"},"answer":"D","explain_zh":"(D) 呼應觀光復甦，店家高興「看到許多顧客回流」，考整句語意。","note":"【正解】呼應觀光回溫，當地店家很開心「看到許多顧客回流」。\n【誘答】(A) 說更少遊客南下，與「更多遊客回流」矛盾、(B) 說補助方案提早結束，與補助帶動消費的正面敘述不符、(C) 說生意持續下滑，與生意回溫的結果相反。\n【重點】整句語意，須扣住 more visitors returned 的正面結果；be happy to V。\n【句意】當地商家很高興看到這麼多顧客回流。"}]},{"label":"B","title_zh":"缺工與缺蛋等民生物價議題","text":"In the past year, many people in Taiwan worried [[25]] rising prices. The steady climb in the cost of living affected nearly every household, from students to retirees. Eggs, for example, were once hard to find, and their price went up quickly. This unexpected scarcity, which puzzled many shoppers, was blamed on disease outbreaks and rising feed costs. At the same time, many restaurants and factories could not hire enough workers to do the job. Whereas some industries had too few applicants, others simply could not offer competitive wages. This labor shortage made it [[26]] for some shops to stay open every day. Owners were forced to shorten their business hours or to turn away customers during busy periods. When goods are few but buyers are many, prices usually [[27]]. This basic principle of supply and demand, familiar to any economist, explains much of the recent inflation. Moreover, global factors such as fuel prices and shipping delays made the situation even more complicated. Given these pressures, families learned to compare prices carefully and to avoid unnecessary spending. Analysts warned that recovery would take time and demand patience from the public. Meanwhile, community groups organized help for those who were struggling the most. As a result, discussions about wages, prices, and fairness became a regular part of daily conversation. The government promised to bring in more eggs and support small businesses, [[28]].","blanks":[{"n":25,"type":"介系詞","options":{"A":"for","B":"of","C":"on","D":"about"},"answer":"D","explain_zh":"(D) worry about：「擔心」物價上漲，考介系詞搭配。","note":"【正解】worry about「擔心」，許多人擔心物價上漲。\n【誘答】(A) for（worry for 多用於「為某人擔憂」，接 rising prices 不合）、(B) of（worry of 非慣用，易與 afraid of 混淆）、(C) on 皆不能與 worry 組成「擔心某事」，唯有 worry about 正確。\n【重點】動詞片語 worry about「擔心、憂慮」。\n【句意】過去一年，許多台灣人都在擔心不斷上漲的物價。"},{"n":26,"type":"詞彙","options":{"A":"impossible","B":"hard","C":"costly","D":"convenient"},"answer":"B","explain_zh":"(B) hard：缺工使某些店家「難以」每天營業，考形容詞詞彙。","note":"【正解】hard「困難的」，勞動力短缺使某些店家難以天天營業。\n【誘答】(A) impossible「不可能」過於絕對，文中店家仍營業只是縮短時間、(C) costly「昂貴的」偏向成本，與「缺工造成人力不足」的重點不符、(D) convenient「方便的」與缺工帶來的困難相反。\n【重點】形容詞 hard；make it hard for sb to V「使某人難以…」。\n【句意】這種勞動力短缺使得一些店家難以每天正常營業。"},{"n":27,"type":"詞彙","options":{"A":"fall","B":"freeze","C":"rise","D":"vary"},"answer":"C","explain_zh":"(C) rise：貨少人多時價格通常「上漲」，考動詞詞彙。","note":"【正解】rise「上漲」，商品少而買家多時，價格通常會上升。\n【誘答】(A) fall「下跌」與「供不應求則漲價」的常理相反、(B) freeze「凍結不動」不符供需失衡導致上升的邏輯、(D) vary「變動」語意過於籠統，未能表達價格「上漲」的必然方向。\n【重點】動詞詞彙 rise「上升、上漲」，主詞 prices 為複數用原形。\n【句意】當商品稀少而買家眾多時，價格通常會上漲。"},{"n":28,"type":"整句語意","options":{"A":"hoping to make daily life easier for everyone","B":"though it wanted prices to keep rising","C":"so that fewer people could buy food","D":"because workers were no longer needed"},"answer":"A","explain_zh":"(A) 呼應政府的補救措施，「盼讓大家生活更輕鬆」，考整句語意。","note":"【正解】呼應政府增蛋、扶助小店的作為，目的是「讓大家的日常生活更輕鬆」。\n【誘答】(B) 卻希望物價繼續上漲，與政府主動採取措施的用意相反、(C) 好讓更少人買得到食物，與「引進更多雞蛋」增加供給的目的相牴觸、(D) 因為不再需要工人，與扶助小型企業的善意不符。\n【重點】整句語意，須扣住 promised to...support small businesses 的善意目的。\n【句意】政府承諾引進更多雞蛋並扶持小型企業，希望讓每個人的日常生活更輕鬆。"}]}],"vocab":["pandemic","tourism","recover","high speed rail","holiday","worry","price","shortage","hire","rise","business","support","subsidy","revive","domestic","efficient","downturn","bustling","rebound","enterprise","optimism","scarcity","competitive","inflation","fuel","patience","household","retiree"]},{"id":32,"passages":[{"label":"A","title_zh":"露營與戶外活動風潮","text":"During the pandemic, many people could not travel abroad, so they looked for fun activities closer to home. With overseas travel suspended, people rediscovered the quiet beauty of their own countryside. Camping soon became very [[21]] among families and young people. This surge of interest, which surprised many outdoor shops, quickly emptied shelves of tents and stoves. Instead of staying in crowded places, they drove to the mountains [[22]] they could breathe fresh air. Far from the noise of the city, they found a stillness that felt increasingly rare in modern life. Sitting around a fire at night and looking up at the stars helped them [[23]] the stress of daily life. Psychologists suggest that spending time in nature can lower anxiety and restore a sense of balance. Whereas urban entertainment often demands money and effort, a night under the stars asks for very little. Some campers even bought nice tents and lights to make their trips more comfortable. Beginners gradually learned practical skills, such as pitching a tent and building a safe fire. Moreover, families discovered that sharing chores in the wild brought them closer together. Children who had rarely left the city were fascinated by insects, streams, and the sound of the wind. Given how demanding daily routines had become, these simple escapes felt genuinely healing. As a result, camping evolved from a passing trend into a lasting habit for many households. For them, a quiet weekend in nature [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"expensive","B":"rare","C":"popular","D":"crowded"},"answer":"C","explain_zh":"(C) popular：露營在家庭與年輕人間變得很「受歡迎」，考形容詞詞彙。","note":"【正解】popular「受歡迎的」，露營在家庭和年輕人之間很快流行起來。\n【誘答】(A) expensive「昂貴的」不符「became very ___ among families」需填「受歡迎」的語境，且與後文露營花費不多矛盾、(B) rare「稀少的」與露營蔚為風潮（surge of interest）相反、(D) crowded「擁擠的」雖呼應前文 crowded places，卻與人們露營是為「遠離人群」矛盾。\n【重點】形容詞 popular；popular among「在…之間受歡迎」。\n【句意】露營很快在家庭和年輕人之間變得非常受歡迎。"},{"n":22,"type":"語法","options":{"A":"where","B":"which","C":"that","D":"when"},"answer":"A","explain_zh":"(A) where：關係副詞引導地方子句，修飾 the mountains，考關係詞。","note":"【正解】where，關係副詞引導地方子句，說明在山裡能呼吸新鮮空氣。\n【誘答】(B) which、(C) that 皆為關係代名詞，須在子句中作主詞或受詞，但子句 they could breathe fresh air 已完整、缺的是表地點的關係副詞、(D) when 表時間，不能修飾地點 the mountains；唯有關係副詞 where 正確。\n【重點】語法：關係副詞 where 引導修飾地方的子句。\n【句意】他們開車前往山區，在那裡可以呼吸新鮮空氣。"},{"n":23,"type":"詞彙","options":{"A":"remember","B":"face","C":"increase","D":"forget"},"answer":"D","explain_zh":"(D) forget：圍著火看星星幫他們「忘掉」日常壓力，考動詞詞彙。","note":"【正解】forget「忘記」，夜裡圍著火看星星幫他們忘掉日常壓力。\n【誘答】(A) remember「記住」與 forget 相反、(B) face「面對」雖語氣正面，卻與圍火看星「放下、紓解」壓力的意境不符、(C) increase「增加」與紓壓的正向語意相反。\n【重點】動詞詞彙 forget；help sb (to) V 句型。\n【句意】夜裡圍著營火、抬頭看星星，幫助他們忘掉日常生活的壓力。"},{"n":24,"type":"整句語意","options":{"A":"is mainly a way to show off new gear","B":"is the perfect way to rest and relax","C":"has become an expensive daily duty","D":"feels lonelier than city life"},"answer":"B","explain_zh":"(B) 呼應露營紓壓的好處，「是休息放鬆的最佳方式」，考整句語意。","note":"【正解】呼應前文紓壓、舒適的鋪陳，大自然中的週末「是休息放鬆的最佳方式」。\n【誘答】(A) 說主要是炫耀新裝備，雖呼應買帳篷燈具卻把露營貶低，與紓壓療癒的主旨不符、(C) 說成了昂貴的每日義務，與文中「花費不多」且是「週末」而非每日矛盾、(D) 說比城市生活更孤單，與露營「讓家人更親近」的敘述相反。\n【重點】整句語意，須扣住 helped them forget the stress 的正面延伸。\n【句意】對他們而言，在大自然中度過安靜的週末，是休息與放鬆的最佳方式。"}]},{"label":"B","title_zh":"韓系與日系穿搭潮流","text":"Clothing has always served as a silent language, revealing personality and mood without a single word. Fashion in Taiwan is often [[25]] by styles from Korea and Japan. Thanks to social media, styles that appear on a Seoul runway can reach Taipei streets within days. Many young people enjoy watching Korean shows, so they like to copy the cool clothes that the stars wear. These trends spread rapidly because fans admire the confidence and polish of their favorite performers. Japanese style, [[26]], is often simple and clean, using soft colors and neat lines. Such minimalist designs, which emphasize quality over decoration, appeal to those who prefer understated elegance. Some shoppers mix the two styles together [[27]] create a look that is truly their own. Whereas one culture favors bold statements, the other celebrates quiet refinement, and blending them can be surprisingly creative. Boutiques throughout the city now stock imported pieces alongside the work of local designers. Moreover, thrift shopping has grown popular among youths who wish to be both stylish and environmentally responsible. Given the endless flow of new trends, some shoppers admit that keeping up can be exhausting and costly. Stylists therefore advise choosing a few versatile items rather than chasing every passing fashion. In the end, true style is said to come not from imitation but from a confident sense of self. Following trends can be fun, but experts remind us that the best outfit is one [[28]].","blanks":[{"n":25,"type":"語法","options":{"A":"influence","B":"influenced","C":"influencing","D":"to influence"},"answer":"B","explain_zh":"(B) influenced：is influenced by 被動語態「受…影響」，考語法。","note":"【正解】influenced，be + 過去分詞 + by 構成被動語態「被…影響」。\n【誘答】(A) influence 原形、(C) influencing 現在分詞、(D) to influence 不定詞，三者都無法接在 be 動詞後構成被動語態，唯有過去分詞 influenced 才能組成 be influenced by「受…影響」。\n【重點】語法：被動語態 be influenced by「受…影響」。\n【句意】台灣的時尚常受到來自韓國和日本風格的影響。"},{"n":26,"type":"轉折語","options":{"A":"similarly","B":"meanwhile","C":"besides","D":"on the other hand"},"answer":"D","explain_zh":"(D) on the other hand：把日系與韓系「對比」，考轉折語。","note":"【正解】on the other hand「另一方面」，用來對比日系與前述韓系風格。\n【誘答】(A) similarly「同樣地」表相似，但此處是把日系與韓系「對比」，方向相反、(B) meanwhile「同時」偏表時間並列，非對比、(C) besides「此外」表補充增添，皆不合兩種風格相互對照的語氣。\n【重點】轉折語 on the other hand 表對比。\n【句意】另一方面，日系風格通常簡約乾淨，運用柔和的色彩和俐落的線條。"},{"n":27,"type":"語法","options":{"A":"to","B":"for","C":"so","D":"by"},"answer":"A","explain_zh":"(A) to：不定詞 to create 表目的「以創造出」，考語法。","note":"【正解】to，不定詞 to create 表目的，說明混搭是為了創造自己的風格。\n【誘答】(B) for、(D) by 為介系詞（by 須接動名詞 by creating），不能直接接原形動詞 create、(C) so 無法單獨接原形表目的（須 so as to 或 so that），唯有不定詞 to create 表「以創造出」的目的。\n【重點】語法：不定詞 to + 原形動詞 表目的。\n【句意】有些購物者把兩種風格混搭在一起，以創造出真正屬於自己的造型。"},{"n":28,"type":"整句語意","options":{"A":"that follows every new trend closely","B":"that matches what celebrities wear","C":"that makes you feel confident and comfortable","D":"that impresses strangers on the street"},"answer":"C","explain_zh":"(C) 呼應專家提醒，最好的穿搭是「讓你自信又自在」的那套，考整句語意。","note":"【正解】呼應專家的提醒，最好的穿搭是「讓你感到自信又自在」的那一套。\n【誘答】(A) 緊追每個新潮流，與「真正的風格不來自模仿」相反、(B) 與名人穿得一樣，與「發自自信的自我」矛盾、(D) 讓路人驚豔，把重點放在取悅他人，與做自己、穿得自在的建議不符。\n【重點】整句語意搭配關係子句，須扣住 experts remind us 的正向建議。\n【句意】追隨潮流可以很有趣，但專家提醒我們，最好的穿搭是那套讓你感到自信又自在的衣服。"}]}],"vocab":["fashion","style","camping","tent","stress","influence","trend","outfit","confident","comfortable","copy","mix","suspended","countryside","surge","stillness","psychologist","anxiety","refinement","minimalist","understated","elegance","versatile","imitation","boutique","thrift","escape","healing"]},{"id":33,"passages":[{"label":"A","title_zh":"禁用一次性塑膠餐具與吸管","text":"In recent years, Taiwan has taken strong action to reduce plastic waste. Environmental groups had long warned that the island was producing far more rubbish than it could safely handle. The government now [[21]] shops and restaurants from giving out single-use plastic straws and tableware for free. At many stores, customers who still want a plastic bag must pay a small fee for it. This modest charge, though it sounds trivial, has encouraged countless shoppers to rethink their daily habits. Many people were not used to this change [[22]] first, but they have slowly learned to carry their own cups, bags, and chopsticks. Businesses, meanwhile, have begun offering paper packaging and reusable containers that customers can borrow and return. Plastic is cheap and handy, [[23]] it can stay in the ocean for hundreds of years and harm sea animals. Scientists point out that tiny fragments, known as microplastics, eventually enter the food chain and end up on our own plates. Given how serious the threat has become, schools now teach children why cutting waste matters. Whereas some critics argue that the rules are inconvenient, most residents accept them as a reasonable trade-off. Moreover, several night markets have started rewarding visitors who bring their own tableware. Officials emphasize that the policy is not meant to punish anyone, but to protect a shared coastline. Volunteers who clean the beaches every weekend report finding fewer straws than before. As a result, the amount of plastic sent to landfills has gradually begun to fall. Supporters say the new rule is a small but important step that [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"warns","B":"bans","C":"requires","D":"forces"},"answer":"B","explain_zh":"(B) bans：政府「禁止」商店免費提供塑膠吸管，ban sb from Ving，考動詞詞彙。","note":"【正解】ban sb from Ving 意為「禁止某人做某事」；政府禁止店家免費發放一次性塑膠餐具，故選 bans，且主詞 The government 為單數用 bans。\n【誘答】(A) warns「警告」須用 warn sb against/about Ving，不接 from Ving，語意也非「禁止」。(C) requires「要求」為 require sb to V，方向與禁止相反。(D) forces「強迫」是 force sb to V，不接 from Ving，語意也不符「禁止」。\n【重點】ban / stop / prevent / keep sb from Ving 是常見「阻止」句型；forbid 則常用 forbid sb to V。\n【句意】政府現在禁止商店和餐廳免費提供一次性塑膠吸管與餐具。"},{"n":22,"type":"介系詞","options":{"A":"on","B":"for","C":"from","D":"at"},"answer":"D","explain_zh":"(D) at first：「起初」的固定用法，考介系詞片語。","note":"【正解】at first 是固定片語，意為「起初、一開始」，表示後來情況改變，正好呼應下句 but。\n【誘答】(A) on first、(B) for first 都不是固定時間片語，沒有這些說法。(C) from first 若要表「從一開始」須用 from the first（需加 the），單獨 from first 不成立。\n【重點】at first（起初）常與後面的 but / later 對比；勿與 first of all（首先）混淆。\n【句意】許多人起初不習慣這個改變，但漸漸學會自己攜帶杯子、袋子和筷子。"},{"n":23,"type":"連接詞","options":{"A":"but","B":"for","C":"so","D":"or"},"answer":"A","explain_zh":"(A) but：塑膠便宜方便「卻」會污染海洋，前後語意轉折，考對等連接詞。","note":"【正解】前句說塑膠便宜好用，後句說它會污染海洋、傷害海洋生物，語意相反，需用表轉折的 but。\n【誘答】(B) for 為對等連接詞表原因（相當於 because），會使語意變成「便宜好用是因為會留存海中」，邏輯不通。(C) so 表結果、(D) or 表選擇，都無法呈現前後正反對比。\n【重點】but 連接兩個語意相反的子句；判斷轉折關係是綜合測驗常見考點。\n【句意】塑膠便宜又方便，卻會在海裡留存好幾百年並傷害海洋動物。"},{"n":24,"type":"整句語意","options":{"A":"keeps restaurants handing out free plastic","B":"may slow down the island's recycling efforts","C":"can lead to a cleaner and greener island","D":"could bring back more straws to our beaches"},"answer":"C","explain_zh":"(C)：呼應全篇「減塑護環境」的正面結果，考整句語意。","note":"【正解】全篇強調減少塑膠、保護環境，支持者認為這是邁向「更乾淨、更綠色家園」的一小步，(C) 最合文意。\n【誘答】(A) 讓餐廳繼續免費發放塑膠，與前文的禁令矛盾。(B) 拖慢島上的回收努力，與全篇環保成效相反。(D) 讓更多吸管回到海灘，與「志工發現吸管變少」的細節不符。\n【重點】末格長句語意題要選與全篇立場一致、邏輯合理者。\n【句意】支持者說這項新規定是通往更乾淨、更綠意家園的一小但重要的步伐。"}]},{"label":"B","title_zh":"電動公車與綠色大眾運輸","text":"More and more cities in Taiwan are now replacing their old diesel buses with electric ones. This shift, which once seemed too costly, has become realistic as battery prices keep falling. Unlike gas buses, electric buses run quietly and [[25]] no smoke into the air, so the streets around us feel much fresher. Passengers often remark that the smoother, vibration-free ride makes their morning commute far more pleasant. Because they cause less pollution, they are much [[26]] for the environment and for our health. Doctors have long linked exhaust fumes to breathing problems, whereas cleaner air helps everyone, especially children and the elderly. Given that transport accounts for a large share of a city's carbon emissions, switching fuels can make a real difference. The government hopes that clean, cheap, and safe public transport will encourage more people to leave their cars at home. To support this goal, several cities have installed charging stations and redesigned bus routes around busy neighborhoods. Moreover, digital apps now let riders track the next bus in real time, so waiting feels less frustrating. If buses, trains, and the MRT [[27]] well together, city traffic will slowly become smoother. A well-connected network, in which one ticket covers every journey, would tempt even loyal drivers to switch. Critics warn that building such a system takes years and considerable funding, yet the long-term rewards are hard to ignore. As a result, fewer traffic jams and lower fuel bills could benefit the whole community. Every small choice, experts insist, adds up to a cleaner future for the next generation. Taking green transport every day is one of the easiest ways [[28]].","blanks":[{"n":25,"type":"詞彙","options":{"A":"absorb","B":"store","C":"release","D":"carry"},"answer":"C","explain_zh":"(C) release：電動公車「不排放」廢煙，考動詞詞彙。","note":"【正解】release 意為「排放、放出」；電動公車安靜且不排放廢煙到空氣中，故選 release。\n【誘答】(A) absorb「吸收」與「排放到空氣中」方向相反，電動公車並非吸收煙霧。(B) store「儲存」煙霧不合理，也不與 into the air 連用。(D) carry「運送」煙霧語意不通。\n【重點】release / give off / produce 都可表「排放」廢氣；此處考排放廢煙的正確動詞。\n【句意】和汽油公車不同，電動公車運行安靜，且不會把廢煙排放到空氣中。"},{"n":26,"type":"詞彙/比較","options":{"A":"better","B":"cheaper","C":"kinder","D":"lighter"},"answer":"A","explain_zh":"(A) better：污染較少，對環境「更好」，考形容詞比較級語意。","note":"【正解】前句說電動公車污染較少，故對環境「更好」，用 much better；much 修飾比較級表「好得多」。\n【誘答】(B) cheaper「更便宜」談的是價格而非對環境的好壞，與「污染較少」的因果不符。(C) kinder「更友善」須用 kind to the environment，不用 for，搭配錯誤。(D) lighter「更輕」對環境而言並無此語意。\n【重點】much / far / a lot 可加強比較級；判斷正反語意選對比較級形容詞。\n【句意】因為造成的污染較少，它們對環境和我們的健康都好得多。"},{"n":27,"type":"語法","options":{"A":"works","B":"will work","C":"working","D":"work"},"answer":"D","explain_zh":"(D) work：主詞為複數 buses, trains, and the MRT，if 條件句用現在式 work，考主謂一致。","note":"【正解】主詞 buses, trains, and the MRT 為複數，且此為表未來的條件句（if + 現在式），故用原形複數 work。\n【誘答】(A) works 為單數動詞，與複數主詞 buses, trains, and the MRT 不一致。(B) will work 在表未來的條件句 if 子句中不可用 will，應改用現在式。(C) working 缺助動詞，不能單獨作動詞。\n【重點】表未來的 if 條件句，if 子句用現在式、主句用 will；並注意主詞複數動詞不加 s。\n【句意】如果公車、火車和捷運能好好搭配運作，城市交通就會慢慢變得更順暢。"},{"n":28,"type":"整句語意","options":{"A":"to keep bus tickets cheap forever","B":"to protect our air and slow down climate change","C":"to make every driver sell their car","D":"to build more roads across the city"},"answer":"B","explain_zh":"(B)：呼應綠色運輸「護空氣、減緩氣候變遷」，且 ways to V 結構正確，考整句語意。","note":"【正解】前面 one of the easiest ways 後接不定詞說明「做什麼的方法」，(B) to protect our air... 語意與文法都正確，呼應環保主題。\n【誘答】(A) 說讓公車票「永遠便宜」語氣過度誇大，也非全篇強調的環保重點。(C) 逼「每位」駕駛賣車，與文中「吸引駕駛改用大眾運輸」的溫和說法不符。(D) 興建更多道路，與減少車輛、紓解交通的目標矛盾。\n【重點】ways / way 後常接 to V 表「做…的方法」；末格長句要選文法與語意皆通者。\n【句意】每天搭乘綠色運輸是保護空氣、減緩氣候變遷最簡單的方法之一。"}]}],"vocab":["reduce","plastic","waste","ban","single-use","tableware","chopsticks","harm","release","pollution","public transport","electric","environment","climate change","microplastics","landfill","coastline","emissions","commute","charging station","reusable","exhaust","carbon","network"]},{"id":34,"passages":[{"label":"A","title_zh":"智慧手錶與穿戴裝置健康監測","text":"Smart watches have become popular gifts among young people in Taiwan. What began as a simple fashion accessory has quietly turned into a personal health assistant. These small devices can do much more than tell the time. Packed with tiny sensors, a modern watch can measure how well you sleep and how quickly your body recovers. While you exercise, a smart watch [[21]] your heart rate and counts the steps you take each day. Over several weeks, these figures reveal patterns that a person might otherwise overlook. Some models even remind you to stand up [[22]] you have been sitting for too long. Such gentle alerts, researchers suggest, can slowly build healthier daily routines. Doctors say such information is useful [[23]] it helps people notice health problems early. Detecting an unusual heartbeat, for instance, may encourage someone to seek advice before a condition worsens. Nevertheless, the readings are not always accurate, and a nervous user might worry over a harmless number. Still, users should remember that a watch cannot replace a real doctor. Whereas a device can collect data, only a trained professional can interpret what those numbers truly mean. Moreover, staring at a screen too often may add stress rather than remove it. Given these limits, experts advise treating the watch as a helpful guide rather than a final judge. Used wisely, however, wearable technology can motivate people to move more and rest better. It is best [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"guesses","B":"raises","C":"controls","D":"tracks"},"answer":"D","explain_zh":"(D) tracks：智慧手錶「追蹤記錄」心跳，考動詞詞彙。","note":"【正解】track 意為「追蹤、記錄」；智慧手錶會追蹤心跳並計算步數，故選 tracks，主詞 a smart watch 單數用 tracks。\n【誘答】(A) guesses「猜測」與智慧手錶精準感測不符。(B) raises「使上升」是運動使心跳上升，手錶只是記錄而非使其上升。(C) controls「控制」心跳並非手錶的功能，它只監測不控制。\n【重點】track / measure / count 常用於裝置記錄數據；注意單數主詞動詞加 s。\n【句意】當你運動時，智慧手錶會追蹤你的心跳，並計算你每天走的步數。"},{"n":22,"type":"連接詞","options":{"A":"until","B":"when","C":"before","D":"unless"},"answer":"B","explain_zh":"(B) when：當你坐太久「時」提醒你站起來，考時間連接詞。","note":"【正解】when 引導時間副詞子句，表「當…時」；久坐時手錶提醒你站起來，語意最順。\n【誘答】(A) until「直到」語意不合，提醒站起來並非持續到久坐。(C) before「在…之前」時間關係顛倒，提醒是在久坐「之後」才發生。(D) unless「除非」使條件相反，變成「除非久坐才站起來」，邏輯不通。\n【重點】when 表「在…的時候」；判斷子句與主句的時間或因果關係來選連接詞。\n【句意】有些款式甚至會在你坐太久時，提醒你站起來。"},{"n":23,"type":"連接詞","options":{"A":"so","B":"though","C":"because","D":"unless"},"answer":"C","explain_zh":"(C) because：資訊有用「因為」能及早發現健康問題，考表原因連接詞。","note":"【正解】前句說這些資訊有用，後句說明「因為」它幫助人及早察覺健康問題，用表原因的 because。\n【誘答】(A) so「所以」表結果，會使因果顛倒（有用是原因，不是結果）。(B) though「雖然」表讓步，語意相反。(D) unless「除非」邏輯不通。\n【重點】because 引導原因子句，回答「為什麼有用」。\n【句意】醫生說這類資訊很有用，因為它能幫助人們及早發現健康問題。"},{"n":24,"type":"整句語意","options":{"A":"to see a doctor when you really feel sick","B":"to believe every reading your watch gives","C":"to let the watch decide your treatment","D":"to stop exercising to lower your stress"},"answer":"A","explain_zh":"(A)：呼應「手錶不能取代醫生」，真的不舒服要看醫生，考整句語意。","note":"【正解】前句提醒手錶不能取代真正的醫生，故 It is best 後接「真的不舒服時要去看醫生」最合文意，(A) 正確。\n【誘答】(B) 完全相信手錶每個讀數，與「讀數不一定準確」的提醒矛盾。(C) 讓手錶決定治療方式，與「只有受過訓練的專業人員才能判讀、手錶不是最終裁判」相反。(D) 為降低壓力而停止運動，與「激勵人們多動」的結論不符。\n【重點】It is best to V 表「最好做…」；末格長句選與前文邏輯一致者。\n【句意】最好在你真的覺得生病時去看醫生。"}]},{"label":"B","title_zh":"遠距醫療與健康管理 App","text":"Thanks to the internet, seeing a doctor no longer always [[25]] a trip to the hospital. During the recent years of health scares, many clinics rushed to offer appointments through a screen. Through telemedicine, patients can talk to doctors online by video, which is helpful for people who live [[26]] from big cities. For an elderly farmer in the mountains, a short video call can replace an exhausting journey that once took half a day. Doctors, meanwhile, can review symptoms, adjust prescriptions, and answer questions without a crowded waiting room. Many families also use health apps to record their blood pressure and remind older members to take their pills on time. Some applications even send a gentle warning to relatives whenever a reading looks unusual. These tools save time and [[27]] worry, especially during a busy week. Because the data is stored safely online, a specialist in another city can study it within minutes. Whereas rural residents once felt cut off from good care, they now enjoy far easier access to advice. Critics, however, remind us that a screen cannot fully replace a doctor's careful hands-on examination. Poor internet connections and unfamiliar technology may also leave some older patients feeling confused. Given these concerns, experts recommend combining online visits with occasional face-to-face checkups. As a result, telemedicine works best as a convenient partner to traditional care, not a complete substitute. Of course, for serious illnesses, going to the hospital in person is still [[28]].","blanks":[{"n":25,"type":"詞彙","options":{"A":"means","B":"makes","C":"saves","D":"books"},"answer":"A","explain_zh":"(A) means：看醫生不再總是「意味著」得跑一趟醫院，考動詞詞彙＋主謂一致。","note":"【正解】mean 在此意為「意味著、需要」；看醫生不再總是需要跑醫院。主詞 seeing a doctor 為動名詞當單數，用 means。\n【誘答】(B) makes「make a trip」須以「人」為主詞表「進行一趟旅程」，此處主詞為動名詞，語意不合。(C) saves「省去一趟」會使語意相反，遠距醫療正是省去跑醫院。(D) books「預訂」一趟旅程語意不通。\n【重點】動名詞當主詞視為單數，動詞加 s；mean + N 表「意味著」。\n【句意】多虧網路，看醫生不再總是需要跑一趟醫院。"},{"n":26,"type":"詞彙","options":{"A":"distant","B":"remote","C":"far","D":"apart"},"answer":"C","explain_zh":"(C) far：遠距醫療對「住得遠」離大城市的人有幫助，far from 固定搭配，考詞彙。","note":"【正解】far from 意為「離…很遠」；遠距醫療對住得遠離大城市的人特別有幫助，故選 far。\n【誘答】(A) distant「遙遠的」為形容詞，不能說 live distant from，且應用副詞修飾動詞 live。(B) remote「偏遠的」同為形容詞，live remote from 用法錯誤。(D) apart 常見片語 apart from 意為「除了」，語意不合。\n【重點】far from + 地點＝「遠離某地」；near to / close to 才是表「靠近」。\n【句意】病人可透過視訊在線上和醫生交談，這對住得離大城市很遠的人很有幫助。"},{"n":27,"type":"詞彙","options":{"A":"cause","B":"reduce","C":"increase","D":"gather"},"answer":"B","explain_zh":"(B) reduce：這些工具省時又「減少」煩惱，考動詞詞彙。","note":"【正解】reduce 意為「減少」；健康 App 省下時間也減少擔憂，與 save time 並列，故選 reduce。\n【誘答】(A) cause「造成」擔憂，與 save time 的正面並列方向相反。(C) increase「增加」擔憂，同樣與正向語氣矛盾。(D) gather「聚集」擔憂搭配不當，語意不通。\n【重點】reduce / lower / cut down 表「減少」；由 save time and ... 判斷需正面且同向的動詞。\n【句意】這些工具能節省時間並減少煩惱，尤其在忙碌的一週裡。"},{"n":28,"type":"整句語意","options":{"A":"worth avoiding whenever possible","B":"no better than a phone app","C":"something only the rich can afford","D":"the safest choice for our health"},"answer":"D","explain_zh":"(D)：重病時親自就醫仍是「最安全的選擇」，考整句語意。","note":"【正解】前面 for serious illnesses 表示重病情況，親自到醫院仍是「最安全的選擇」，(D) 語意最合理。\n【誘答】(A) 說應盡量避免就醫，與「重病仍該親自就醫」矛盾。(B) 說親診不比手機 App 好，與重病需親診相反。(C) 說只有有錢人負擔得起，文中並無此依據，屬離題臆測。\n【重點】末格長句要選符合前文 for serious illnesses 語境者。\n【句意】當然，對於嚴重的疾病，親自去醫院仍是對健康最安全的選擇。"}]}],"vocab":["device","exercise","heart rate","remind","notice","replace","internet","telemedicine","patient","blood pressure","pill","reduce","serious","illness","sensor","wearable","accurate","prescription","symptom","specialist","examination","motivate","routine","recover"]},{"id":35,"passages":[{"label":"A","title_zh":"台灣同婚合法與多元共融","text":"In 2019, Taiwan became the first place in Asia to make same-sex marriage legal. The decision followed years of public discussion, court rulings, and careful debate among lawmakers. The new law allows two people of the same sex to marry and build a family, [[21]] everyone the same right to love. Under the law, married partners gain legal duties and protections that other married couples already hold. For many couples who had waited for years, this was a day [[22]] they would never forget. Outside government offices, some quietly registered their unions, whereas others celebrated with friends and relatives. News of the vote traveled quickly abroad, drawing attention from reporters across the region. The change also showed the world that Taiwan [[23]] different groups of people. Supporters argued that equal treatment under the law reflects the island's democratic values. At the same time, some citizens held different views, and their concerns were also part of the conversation. Given such a range of opinions, officials stressed that mutual respect matters in any healthy democracy. Schools and workplaces, moreover, began discussing how to treat all colleagues and students fairly. Researchers who study social change noted that attitudes often shift gradually over a generation. As a result, later surveys suggested that acceptance had grown compared with earlier years. Not everyone agreed at first, but more and more citizens now believe that a society is stronger [[24]].","blanks":[{"n":21,"type":"語法","options":{"A":"giving","B":"gives","C":"having given","D":"given"},"answer":"A","explain_zh":"(A) giving：分詞構句表結果「給予每個人相同的權利」，考現在分詞。","note":"【正解】此處用現在分詞 giving 引導分詞構句，表附帶結果「給予每個人相同的愛的權利」；主動語意故用現在分詞。\n【誘答】(B) gives 為限定動詞，主要子句已有動詞 allows，不能無連接詞再接一個限定動詞。(C) having given 為完成式分詞，暗示「給予」發生在成家之前，但此處是同時發生的附帶結果，時間關係不合。(D) given 為過去分詞表被動，但法律是主動「給予」權利，語態不符。\n【重點】分詞構句：與主詞主動關係用 Ving，被動關係用 Vpp；此句法律主動給予權利。\n【句意】新法允許同性的兩人結婚成家，給予每個人相同去愛的權利。"},{"n":22,"type":"關係詞","options":{"A":"when","B":"where","C":"that","D":"on which"},"answer":"C","explain_zh":"(C) that：a day that they would never forget，關係代名詞當 forget 的受詞，考關係詞。","note":"【正解】關係子句 they would never forget 缺少 forget 的受詞，需用關係代名詞 that（或 which）代替先行詞 a day，故選 that。\n【誘答】(A) when 為關係副詞，但其後子句 forget 缺少受詞，需用關係代名詞。(B) where 為表地點的關係副詞，結構與語意皆不合。(D) on which 為「介系詞＋關係代名詞」作副詞用，但 forget 仍缺直接受詞，故不可用。\n【重點】判斷用關係代名詞或關係副詞：看關係子句內是否缺主詞／受詞（缺→代名詞）。\n【句意】對許多等了多年的伴侶來說，這是他們永遠不會忘記的一天。"},{"n":23,"type":"詞彙","options":{"A":"divides","B":"accepts","C":"compares","D":"counts"},"answer":"B","explain_zh":"(B) accepts：台灣「接納」不同族群的人，考動詞詞彙。","note":"【正解】accept 意為「接納、接受」；此改變讓世界看見台灣接納不同群體的人，故選 accepts，主詞 Taiwan 單數用 accepts。\n【誘答】(A) divides「使分開」與「接納、共融」的語意相反。(C) compares「比較」不同群體，並非本文「接納」之意。(D) counts「計算」人數，語意不合。\n【重點】accept / respect / welcome 表包容接納；由多元共融主題判斷正面詞。\n【句意】這項改變也向世界展現台灣接納不同群體的人。"},{"n":24,"type":"整句語意","options":{"A":"when everyone shares the very same views","B":"only after every disagreement disappears","C":"if it stops changing over time","D":"when it accepts people who are different"},"answer":"D","explain_zh":"(D)：呼應多元共融，社會「接納不同的人」時更強大，考整句語意。","note":"【正解】全篇談多元共融，故「當社會接納不同的人時會更強大」最合文意，(D) 正確。\n【誘答】(A) 認為社會要「所有人想法一致」才更強，與文中重視多元觀點的立場不符。(B) 說要「所有分歧都消失後」才更強，與健康民主容納不同意見、互相尊重的精神相反。(C) 說社會「停止改變」才更強，與文中態度會逐漸轉變、社會因此進步的觀點矛盾。\n【重點】末格長句選與全篇包容立場一致者。\n【句意】越來越多公民相信，當社會接納不同的人時會更強大。"}]},{"label":"B","title_zh":"高齡社會與長期照顧","text":"Like many countries, Taiwan is becoming an aging society. Demographers warn that within a few decades, one in every four residents could be over sixty-five. As people live longer and fewer babies [[25]] born, the number of older adults keeps rising. A shrinking workforce, moreover, means fewer young people are left to support each retiree. This means more families need help [[26]] caring for their elderly parents at home. Many adult children, caught between raising kids and holding down jobs, struggle to manage on their own. Hiring a full-time caregiver can be expensive, whereas leaving a frail parent alone feels unsafe. To deal with this, the government has set up long-term care services, [[27]] nurses and helpers visit old people and take care of them every day. These trained staff help with bathing, meals, and medicine, tasks that once fell entirely on relatives. Community centers, in addition, offer daytime activities where seniors can exercise and make new friends. Given the rising demand, the authorities are also training more workers and expanding funding each year. Critics argue, however, that services in remote villages remain thin and hard to reach. As a result, some experts urge closer cooperation between hospitals, local governments, and volunteers. Beyond practical help, regular visits also ease the loneliness that many housebound elders quietly feel. Such support is important [[28]].","blanks":[{"n":25,"type":"語法","options":{"A":"is","B":"were","C":"being","D":"are"},"answer":"D","explain_zh":"(D) are：fewer babies are born 被動語態，複數主詞用 are，考語法。","note":"【正解】be born 是「出生」的被動固定用法；主詞 fewer babies 為複數且描述現況，用 are born。\n【誘答】(A) is 為單數，與複數主詞 fewer babies 不一致。(B) were 雖為複數，但為過去式，與描述現況趨勢的現在式語境不合。(C) being 為非限定形式，前面缺助動詞，不能單獨當子句的動詞。\n【重點】be born 表「出生」；注意主詞單複數與時態（現況用現在式）。\n【句意】隨著人們更長壽、出生的嬰兒更少，年長者的人數不斷上升。"},{"n":26,"type":"介系詞","options":{"A":"on","B":"with","C":"to","D":"about"},"answer":"B","explain_zh":"(B) with：need help with Ving「需要幫忙做某事」，考介系詞搭配。","note":"【正解】help with something / with Ving 表「在某事上需要幫忙」；家庭需要幫忙照顧年邁父母，故用 with。\n【誘答】(A) on 沒有 help on Ving 的用法。(C) to 雖有 help to V，但須接原形（help to care），不接動名詞 caring。(D) about 不與 help + Ving 搭配。\n【重點】need help with + N / Ving＝「需要…方面的協助」。\n【句意】這表示更多家庭在家照顧年邁父母時需要協助。"},{"n":27,"type":"關係詞","options":{"A":"which","B":"when","C":"where","D":"whom"},"answer":"C","explain_zh":"(C) where：關係副詞代替 in the services，後接完整子句，考關係詞。","note":"【正解】先行詞為 long-term care services（一種情境／範圍），關係子句 nurses and helpers visit... 結構完整，故用關係副詞 where（＝in which）。\n【誘答】(A) which 為關係代名詞，但其後子句 nurses and helpers visit old people 結構已完整，無代名詞的空缺。(B) when 為表時間的關係副詞，但先行詞 services 並非時間。(D) whom 為指人的受格關係代名詞，此處既無空缺、先行詞也非人。\n【重點】關係子句完整無缺→用關係副詞 where / when；有缺→用關係代名詞。\n【句意】為因應此問題，政府設立了長照服務，護理師與幫手每天前往探視並照顧老人。"},{"n":28,"type":"整句語意","options":{"A":"because it lets old people live with dignity","B":"because it completely removes the need for hospitals","C":"so that families never have to care for elders again","D":"although it makes older people feel lonelier"},"answer":"A","explain_zh":"(A)：長照支持重要「因為」能讓老人有尊嚴地生活，考整句語意。","note":"【正解】長照支持之所以重要，是因為能讓老人有尊嚴地生活，(A) 以 because 說明原因，最合文意。\n【誘答】(B) 說長照能「完全取代醫院」與文中專家呼籲醫院、地方政府、志工合作的說法矛盾。(C) 說家人「再也不用照顧長輩」與長照是家庭照顧的輔助、而非完全取代不符。(D) 說長照讓老人「更孤單」與文中定期探視能緩解孤獨相反。\n【重點】末格長句選能正確說明「為何重要」且語意正向者。\n【句意】這樣的支持很重要，因為它能讓老年人有尊嚴地生活。"}]}],"vocab":["same-sex marriage","legal","law","allow","couple","accept","society","aging","born","elderly","long-term care","nurse","support","dignity","demographer","workforce","caregiver","retiree","mutual respect","democratic","acceptance","loneliness","frail","funding"]},{"id":36,"passages":[{"label":"A","title_zh":"手搖飲、珍珠奶茶外銷全球","text":"Bubble tea, also known as pearl milk tea, was invented in Taiwan in the 1980s. According to popular accounts, a creative tea shop simply dropped chewy tapioca balls into iced milk tea. Today it has become one of the country's most successful [[21]]. What started as a local treat now appears on menus from London to Sydney. From Japan to the United States, new bubble tea shops keep [[22]] up in busy cities around the world. In many neighborhoods, long queues form outside these colorful stores, especially after school lets out. The chewy pearls and the wide choice of flavors make the drink [[23]] to young customers everywhere. Whereas older generations preferred plain tea, teenagers happily experiment with fruit, cheese foam, and countless toppings. Clever branding and eye-catching social-media posts have, moreover, turned each new flavor into an online sensation. Some shops even adjust their recipes to match local tastes, offering less sugar or dairy-free options. Because the drink is so popular abroad, it also brings a lot of money [[24]]. Farmers who grow tea leaves and tapioca, along with cup makers and delivery firms, all share in the profits. Given this success, the government now promotes bubble tea as a cheerful symbol of Taiwanese culture. Critics point out, however, that the sugary drink should be enjoyed in moderation. As a result, several brands have begun offering healthier versions without losing their signature taste.","blanks":[{"n":21,"type":"詞彙","options":{"A":"recipes","B":"brands","C":"exports","D":"customs"},"answer":"C","explain_zh":"(C) exports：珍奶是台灣最成功的「外銷品」之一，考名詞詞彙。","note":"【正解】export 當名詞意為「外銷品、出口商品」；珍珠奶茶是台灣最成功的外銷品之一，故選 exports。\n【誘答】(A) recipes「食譜」指做法，而非行銷全球的商品本身。(B) brands「品牌」指公司或商標，但珍奶是一種飲品類別，非單一品牌。(D) customs「習俗」指傳統，飲品並非習俗，也不符「外銷賺錢」的語意。\n【重點】export 可當動詞（出口）或名詞（外銷品）；由 successful 與 abroad 判斷語意。\n【句意】今日它已成為台灣最成功的外銷商品之一。"},{"n":22,"type":"語法","options":{"A":"opening","B":"open","C":"opened","D":"opens"},"answer":"A","explain_zh":"(A) opening：keep + Ving「不斷地」，考動名詞。","note":"【正解】keep + Ving 表「持續、不斷地做某事」；新店不斷開張，故用 opening。\n【誘答】(B) open 為原形，keep 後須接動名詞，不能直接接原形。(C) opened 為過去分詞／過去式，keep 後不接。(D) opens 為第三人稱單數限定動詞，keep 後同樣只能接 Ving，不能接限定動詞。\n【重點】keep / keep on / go on + Ving＝「持續做…」；為 keep 後動名詞的固定用法。\n【句意】從日本到美國，新的珍奶店不斷在世界各大忙碌城市開張。"},{"n":23,"type":"詞彙","options":{"A":"popular","B":"familiar","C":"available","D":"attractive"},"answer":"D","explain_zh":"(D) attractive：Q 彈珍珠與多樣口味讓飲料「有吸引力」，考形容詞詞彙。","note":"【正解】attractive 意為「有吸引力的」；Q 彈珍珠與多種口味讓這飲料對年輕顧客很有吸引力，故選 attractive。\n【誘答】(A) popular「受歡迎」語意雖正向，但搭配為 popular with sb，不用 to，介系詞錯誤。(B) familiar「熟悉的」雖可接 to sb，但意為「為某人所熟知」，Q 彈珍珠與口味是使飲料「有吸引力」而非「熟悉」。(C) available「可取得的」接 to 表「可供某人使用」，但口味多樣不會使飲料變得「可取得」，語意不合。\n【重點】make + 受詞 + 形容詞（受詞補語）；由正面語境選 attractive。\n【句意】Q 彈的珍珠和多樣的口味，讓這飲料對各地年輕顧客都很有吸引力。"},{"n":24,"type":"整句語意","options":{"A":"to shopkeepers in other countries","B":"back to the shops and farmers in Taiwan","C":"only to a few large tea companies","D":"away from the workers who make it"},"answer":"B","explain_zh":"(B)：外銷熱賣把錢「帶回台灣的店家與農民」，呼應經濟主題，考整句語意。","note":"【正解】前句說珍奶在國外很受歡迎，故它把錢帶「回台灣的店家與農民」，(B) 呼應外銷賺錢的經濟主題。\n【誘答】(A) 說錢流向「其他國家的店家」，與下句「台灣的農民、杯子製造商、外送業者共享利潤」矛盾。(C) 說只有「少數大茶飲公司」獲利，與各行各業共享利潤不符。(D) 說錢流「離開製作者」，與工作者分享利潤相反。\n【重點】末格長句選與 brings money 及全篇經濟正向語意一致者。\n【句意】因為這飲料在國外非常受歡迎，也為台灣的店家和農民帶回大量收入。"}]},{"label":"B","title_zh":"台灣夜市與觀光行銷","text":"Night markets are one of the biggest [[25]] for tourists who visit Taiwan. From steaming bowls of noodles to sizzling grilled squid, the choices seem almost endless. Every evening, crowds of visitors walk through the narrow lanes to enjoy cheap snacks and fun games. The mingled smells of fried chicken and stinky tofu, though surprising at first, soon become part of the fun. Visitors who once felt shy about bargaining quickly learn that friendly chatter is half the experience. To attract even more foreign guests, cities have started [[26]] their night markets on social media with bright photos and short videos. Short clips filmed by travelers themselves, moreover, spread across the internet faster than any official advertisement. Some famous stalls have become so well known online that tourists arrive with a checklist of dishes to try. Some markets now put up English signs [[27]] travelers can order food easily. A few vendors have even learned basic greetings in several languages to make guests feel welcome. Whereas older markets relied only on word of mouth, today's owners understand the power of a good photograph. Given how much visitors spend on food, souvenirs, and games, local shopkeepers clearly benefit. Critics warn, however, that crowded lanes and litter could harm the very charm that draws people in. As a result, some cities now invest in cleaner streets and better lighting to keep the markets pleasant. Thanks to these efforts, tourism is growing, and the whole country [[28]].","blanks":[{"n":25,"type":"詞彙","options":{"A":"sights","B":"attractions","C":"surprises","D":"crowds"},"answer":"B","explain_zh":"(B) attractions：夜市是遊客最大的「觀光景點」之一，考名詞詞彙。","note":"【正解】attraction 意為「吸引人的景點」；夜市是來台遊客最大的觀光景點之一，故選 attractions。\n【誘答】(A) sights「景象」搭配不自然，指「觀光景點」慣用 attraction，不說 biggest sights。(C) surprises「驚喜、意外」指出乎意料的事物，並非吸引遊客造訪的景點。(D) crowds「人群」指聚集的人，而非遊客特地造訪的地點，語意不合。\n【重點】tourist attraction＝觀光景點；由 tourists 與後文享受美食判斷正向名詞。\n【句意】夜市是造訪台灣的遊客最大的觀光景點之一。"},{"n":26,"type":"語法","options":{"A":"advertise","B":"to advertising","C":"advertised","D":"advertising"},"answer":"D","explain_zh":"(D) advertising：start + Ving「開始宣傳」，考動名詞。","note":"【正解】此處 start 後接動名詞 advertising 表「開始在社群媒體上宣傳夜市」；start Ving 為常見用法。\n【誘答】(A) advertise 原形不能直接接在 started 後，須用 to advertise 或 advertising。(B) to advertising 把 to 與動名詞混用，to 之後應接原形（to advertise），故錯誤。(C) advertised 為過去分詞／過去式，不能作 have started 的受詞。\n【重點】start / begin 後可接 to V 或 Ving；本題四選項中僅動名詞 advertising 正確。\n【句意】為了吸引更多外國旅客，各城市開始用亮眼照片和短影片在社群媒體上宣傳夜市。"},{"n":27,"type":"連接詞","options":{"A":"so that","B":"in case","C":"as long as","D":"even if"},"answer":"A","explain_zh":"(A) so that：設英文標示「以便」旅客方便點餐，考表目的連接詞。","note":"【正解】so that 引導目的副詞子句，表「以便、為了讓」；設英文標示是為了讓旅客能輕鬆點餐，故選 so that。\n【誘答】(B) in case「以防」語意不合，設標示是為了「讓」旅客好點餐，而非「以防」某事。(C) as long as「只要」表條件，並非目的關係。(D) even if「即使」表讓步，邏輯不通。\n【重點】so that + 子句表目的；判斷前後為「手段—目的」關係時用 so that。\n【句意】有些市場現在張貼英文標示，以便旅客能輕鬆點餐。"},{"n":28,"type":"整句語意","options":{"A":"worries about scaring away its tourists","B":"sees its night markets slowly disappear","C":"benefits from the money that tourists spend","D":"earns less from foreign travelers now"},"answer":"C","explain_zh":"(C)：觀光成長讓全國「從遊客的消費中獲益」，呼應經濟主題，考整句語意。","note":"【正解】前句說觀光正在成長，故整個國家「從遊客花的錢中獲益」，(C) 呼應觀光行銷帶動經濟的主題。\n【誘答】(A) 說整個國家「擔心嚇跑遊客」，與結尾「觀光正在成長」的正面語氣不符。(B) 說夜市「慢慢消失」，與市場興盛、城市投資維護的內容矛盾。(D) 說「賺得更少」，與遊客大量消費、觀光成長相反。\n【重點】末格長句需與主詞搭配成完整句，且語意與全篇經濟正向一致。\n【句意】多虧這些努力，觀光正在成長，整個國家也從遊客的消費中獲益。"}]}],"vocab":["bubble tea","invent","export","flavor","attractive","customer","popular","abroad","attraction","tourist","advertise","social media","tourism","benefit","tapioca","branding","moderation","signature","vendor","bargain","souvenir","promote","queue","profit"]},{"id":37,"passages":[{"label":"A","title_zh":"AI 繪圖與 AI 助理走入生活","text":"These days, artificial intelligence is quickly becoming a part of our daily lives. In the past, drawing a nice picture could take an artist many hours. Now, with just a few words, AI drawing tools can [[21]] colorful pictures in seconds, so even people who cannot draw may create their own art. Trained on millions of images gathered from the Internet, these systems can imitate almost any artistic style within moments. What once demanded years of practice can now be produced by anyone who owns a smartphone. Moreover, such tools are increasingly used in advertising, education, and game design, where visual ideas must be delivered quickly. AI assistants can also answer our questions much faster [[22]] a human friend can. Whether we are planning a trip, writing an essay, or solving a maths problem, a digital helper is always ready to respond. Given that these programs learn from enormous amounts of data, however, they occasionally generate answers that sound convincing yet prove to be false. [[23]] these tools are helpful, we should still think for ourselves and check the answers. Blindly trusting a machine, some experts warn, may gradually weaken our own ability to reason. As a result, schools now encourage students to treat AI as a partner rather than a replacement for genuine thinking. It is equally important to remember that a computer, however clever, cannot fully understand human emotions or values. Whereas machines excel at speed and memory, humans still hold the advantage in creativity and moral judgement. Used wisely, these smart tools can save time and [[24]]. In the end, the future will likely belong to those who know how to cooperate with technology instead of fearing it.","blanks":[{"n":21,"type":"詞彙","options":{"A":"collect","B":"produce","C":"print","D":"copy"},"answer":"B","explain_zh":"(B) produce：AI 工具「產生」彩色圖片，考動詞詞彙。","note":"【正解】produce「產生、製造」，AI 工具幾秒內產出彩色圖片，語意最合。\n【誘答】(A) collect「收集」是 AI 訓練時的動作而非此處產出圖片；(C) print「列印」指印出實體，與數位生成不符；(D) copy「複製」強調照抄，但此處是生成全新圖片，語意不合。\n【重點】動詞語意辨析；produce a picture/report「產出圖片、報告」。\n【句意】現在只要幾個字，AI 繪圖工具就能在幾秒內產生彩色圖片。"},{"n":22,"type":"語法","options":{"A":"then","B":"as","C":"that","D":"than"},"answer":"D","explain_zh":"(D) than：faster…than 比較級，考語法。","note":"【正解】前面有比較級 faster，須搭配 than 才成立。\n【誘答】(A) then「然後」為時間副詞，拼字近似易誤選，但不用於比較；(B) as 須搭配 as…as，此處為比較級 faster 不合；(C) that 不能接在比較級 faster 之後引導比較。\n【重點】比較級 + than 句型；than 與 then 拼字易混淆。\n【句意】AI 助理回答問題也比真人朋友快得多。"},{"n":23,"type":"連接詞","options":{"A":"Although","B":"Because","C":"Since","D":"If"},"answer":"A","explain_zh":"(A) Although：後句有 still，前後語意轉折，考連接詞。","note":"【正解】後半句有 still「仍然」，表示讓步轉折，用 Although「雖然」。\n【誘答】(B) Because「因為」、(C) Since「既然、因為」皆表原因；(D) If「如果」表條件；三者文法上都能接子句，但都無法呼應主句 still 所要求的讓步轉折語氣。\n【重點】Although 引導讓步子句，常與主句的 still/yet 呼應。\n【句意】雖然這些工具很有幫助，我們仍應該自己思考、檢查答案。"},{"n":24,"type":"整句語意","options":{"A":"replace human creativity in almost every field","B":"free us from ever having to think on our own","C":"make our daily lives easier and more creative","D":"cost us far more money than they did before"},"answer":"C","explain_zh":"(C) 呼應「善用 AI 能省時」的正向結論，考整句語意。","note":"【正解】呼應前文「善用可省時」的正向語氣，讓生活更輕鬆、更有創意最合宜。\n【誘答】(A) 取代人類「幾乎所有領域」的創造力，與前文「人類仍在創造力上占優勢」矛盾；(B) 讓我們完全不必自己思考，與全文「仍應自己思考」的呼籲相反；(D) 花費比以前更多錢，與「省時」並列的正面益處在邏輯上不合。\n【重點】末格整句語意須呼應 Used wisely「善用」帶出的正面結果。\n【句意】只要善加運用，這些聰明的工具能省下時間，讓生活更輕鬆、更有創意。"}]},{"label":"B","title_zh":"網路資安與個資保護","text":"The Internet makes our lives easier, but it can also be dangerous if we are not careful. As more of our shopping, banking, and studying moves online, the amount of private data we leave behind keeps growing. Every day, bad people try to steal others' personal [[25]], such as passwords and bank numbers. These criminals, often working from far away, design clever tricks known as \"phishing\" to fool even careful users. A message may pretend to come from your bank, urging you to act immediately before your account is closed. To stay safe, you should never share your password [[26]] strangers online. Whenever possible, you should also turn on two-step verification, which adds an extra layer of protection to your accounts. It is also a good idea to use a strong password [[27]] mixes both letters and numbers, and to change it from time to time. Reusing the same password across many websites, security experts warn, is one of the most dangerous habits of all. Moreover, connecting to free public Wi-Fi without care may allow others to watch what you are doing. Remember, once your data is stolen, getting it back is very hard. Victims of online fraud may spend months trying to recover their money and repair their damaged reputation. Given that threats keep changing, staying informed about the latest scams is just as important as using good software. As a result, many companies now train their workers regularly to recognise suspicious links and emails. If you receive a strange email asking for your private information, [[28]]. Above all, thinking twice before you click remains the simplest and strongest defence of all.","blanks":[{"n":25,"type":"詞彙","options":{"A":"belongings","B":"property","C":"information","D":"messages"},"answer":"C","explain_zh":"(C) information：竊取個人「資料、資訊」，考名詞詞彙。","note":"【正解】personal information「個人資料」，後面舉例密碼、銀行帳號，語意最合。\n【誘答】(A) belongings「隨身物品」、(B) property「財產」雖可被偷，但與後面所舉的密碼、帳號（皆為資訊）不相稱；(D) messages「訊息」也非密碼、帳號的正確上位詞，語意不合。\n【重點】名詞語意；information 為不可數名詞，不加 s。\n【句意】每天都有壞人想偷取別人的個人資料，例如密碼和銀行帳號。"},{"n":26,"type":"介系詞","options":{"A":"with","B":"to","C":"among","D":"for"},"answer":"A","explain_zh":"(A) with：share A with B「與人分享」，考介系詞。","note":"【正解】share…with sb「把某物分享給某人」，用介系詞 with。\n【誘答】(B) to、(D) for 皆非 share 表「分享給某人」的正確介系詞（學生易誤用 share to）；(C) among 雖可接複數，但不符 share something with somebody 的固定搭配，語意也偏「在…之間」。\n【重點】固定搭配 share something with somebody。\n【句意】為了安全，你絕不該把密碼分享給網路上的陌生人。"},{"n":27,"type":"語法","options":{"A":"who","B":"what","C":"whose","D":"that"},"answer":"D","explain_zh":"(D) that：先行詞為 password（物）的關係代名詞，考語法。","note":"【正解】先行詞 password 是「物」，關係代名詞在子句中當主詞，用 that（或 which）。\n【誘答】(A) who 只指人；(B) what 不可有先行詞，不能接在 password 之後；(C) whose 表所有格，皆不合先行詞為物、且在子句中缺主詞的情況。\n【重點】關係代名詞：指物且當主詞用 that/which。\n【句意】使用一組混合字母和數字的強密碼也是好主意。"},{"n":28,"type":"整句語意","options":{"A":"reply politely to confirm your account details","B":"do not click any link inside it right away","C":"open every attachment to see who really sent it","D":"forward it at once to all of your online friends"},"answer":"B","explain_zh":"(B) 呼應「保護個資、提防陌生郵件」的建議，考整句語意。","note":"【正解】面對可疑郵件，最安全的做法是「先別點裡面的連結」，呼應全文資安主旨。\n【誘答】(A) 回信「確認帳戶資料」等於交出個資，看似禮貌卻危險；(C) 打開所有附件「查看寄件者」可能觸發惡意程式，與防範原則相反；(D) 立刻轉寄給所有網友只會擴散風險，並非正確防禦。\n【重點】末格整句語意須符合前文「小心防範」的安全建議。\n【句意】如果你收到一封奇怪的、索取你私人資料的郵件，別急著點裡面的任何連結。"}]}],"vocab":["artificial","intelligence","assistant","produce","colorful","wisely","creative","personal","information","password","stranger","private","strong","imitate","artistic","convincing","reason","genuine","creativity","cooperate","enormous","gradually","criminal","phishing","verification","protection","fraud","reputation","scam","suspicious","defence"]},{"id":38,"passages":[{"label":"A","title_zh":"蜜蜂消失與生物多樣性危機","text":"Bees may look small, but they are very important to nature. As busy pollinators, they carry pollen between blossoms and quietly keep entire ecosystems alive. As they fly from flower to flower, they help plants [[21]] fruits and seeds. Without this natural service, farmers would be forced to pollinate their crops by hand, an effort that would be both slow and costly. [[22]] bees, many of the foods we love would slowly disappear from our tables. Apples, almonds, and countless vegetables, for instance, all rely heavily on the tireless labour of these insects. Sadly, the number of bees around the world is [[23]] fast because of pollution and the loss of their homes. Harmful chemicals sprayed on farms, moreover, weaken the bees and make them more likely to fall ill. Climate change, whereas it may seem unrelated, also disturbs the flowering seasons that bees depend on. Scientists warn that if we keep harming nature, [[24]]. Given how deeply connected all living things are, the loss of one species can trigger problems throughout the food chain. In fact, a large part of the food we eat every day depends on the quiet hard work of bees. Fortunately, ordinary people can help by planting flowers, avoiding poisons, and supporting local beekeepers. Some cities have even created rooftop hives, proving that wildlife and modern life can exist side by side. As a result of such efforts, a few regions have already seen their bee populations slowly recover. Protecting these tiny insects is really about protecting ourselves and our future. After all, a world without bees would be far poorer, hungrier, and less colourful than the one we know today.","blanks":[{"n":21,"type":"詞彙","options":{"A":"carry","B":"store","C":"collect","D":"produce"},"answer":"D","explain_zh":"(D) produce：幫助植物「結出」果實與種子，考動詞詞彙。","note":"【正解】produce「產生、結出」，蜜蜂授粉幫助植物結出果實與種子。\n【誘答】(A) carry「攜帶」、(B) store「儲存」、(C) collect「採集」皆是「處理」果實種子的動作，但無法表達植物「結出」果實與種子（produce）的語意。\n【重點】動詞語意；plants produce fruits and seeds「植物結果、結籽」。\n【句意】當蜜蜂在花間飛舞時，牠們幫助植物結出果實與種子。"},{"n":22,"type":"介系詞","options":{"A":"With","B":"Without","C":"Besides","D":"For"},"answer":"B","explain_zh":"(B) Without：「若沒有」蜜蜂，考介系詞語意。","note":"【正解】Without「沒有；要是沒有」，帶出假設語意，符合後句食物將消失。\n【誘答】(A) With「有了」語意相反，若有蜜蜂食物才不會消失，是對比陷阱；(C) Besides「除了…之外」、(D) For「為了」皆與「假如沒有」的假設語意不合。\n【重點】介系詞 without 可表「假如沒有…」，引導假設情境。\n【句意】要是沒有蜜蜂，許多我們喜愛的食物會慢慢從餐桌上消失。"},{"n":23,"type":"語法","options":{"A":"dropped","B":"drop","C":"dropping","D":"drops"},"answer":"C","explain_zh":"(C) dropping：is + Ving 現在進行式，考時態詞形。","note":"【正解】主詞 the number 搭配 be 動詞 is，須用現在分詞 dropping 構成現在進行式。\n【誘答】(A) dropped 為過去分詞、(B) drop 為原形、(D) drops 為第三人稱單數，皆無法與 is 連用表進行。\n【重點】現在進行式 be + V-ing，表正在發生的變化。\n【句意】遺憾的是，因為污染與棲地喪失，全世界蜜蜂的數量正快速下降。"},{"n":24,"type":"整句語意","options":{"A":"we may lose these helpful insects forever","B":"future farmers will no longer need bees at all","C":"nature will quickly repair itself without our help","D":"bees will simply move to cleaner countries instead"},"answer":"A","explain_zh":"(A) 呼應「持續破壞自然」的負面結果，考整句語意。","note":"【正解】前句 if we keep harming nature 帶出負面結果，永遠失去蜜蜂最合語意。\n【誘答】(B) 未來農夫不再需要蜜蜂，與全文「我們高度依賴蜜蜂」矛盾；(C) 大自然會自行快速修復，與「持續破壞自然」的警告相反；(D) 蜜蜂只是遷往較乾淨的國家，過度簡化且不符「永遠失去」的警訊。\n【重點】末格整句語意須呼應條件句帶出的後果。\n【句意】科學家警告，如果我們持續破壞自然，可能會永遠失去這些有益的昆蟲。"}]},{"label":"B","title_zh":"都市綠化與屋頂農園","text":"In many crowded cities, people are turning empty rooftops into small green gardens. Faced with rising food prices and shrinking open space, urban residents have begun to look upward for room to grow. On these roofs, they [[25]] vegetables, flowers, and herbs for their families. Tomatoes, lettuce, and fragrant basil thrive surprisingly well in these sunny, sheltered spots. These gardens not only provide fresh food [[26]] also cool down the buildings in summer, which helps save electricity. The soil and leaves absorb heat that would otherwise bounce off concrete, thereby lowering the temperature indoors. Moreover, the plants soak up rainwater, which eases the pressure on the city's crowded drains. Some neighbors even work together in the same garden, which [[27]] them a good chance to make new friends. Strangers who once merely nodded in the elevator gradually become companions who share seeds, tools, and advice. Children can also learn where their food comes from by helping to water the plants and pick the vegetables. Such hands-on lessons, teachers argue, are far more memorable than anything found in a textbook. Given that many young people rarely touch soil, these gardens reconnect them with the rhythms of nature. Best of all, these gardens bring a little nature back into the busy city. Butterflies and birds, drawn by the blossoms, soon return to neighbourhoods that had long felt lifeless. As a result, several governments now offer small grants to residents willing to green their rooftops. City rooftop gardens show us that [[28]]. Whereas skyscrapers once symbolised a cold and distant future, these leafy roofs promise a warmer, more human one.","blanks":[{"n":25,"type":"詞彙","options":{"A":"grow","B":"pick","C":"cook","D":"water"},"answer":"A","explain_zh":"(A) grow：在屋頂「種植」蔬菜花草，考動詞詞彙。","note":"【正解】grow「種植」，在屋頂種蔬菜、花與香草，語意最合。\n【誘答】(B) pick「採摘」、(C) cook「烹煮」、(D) water「澆水」雖與園藝相關，但都無法表達「在屋頂栽種」蔬菜花草供家人（grow）的完整語意。\n【重點】動詞語意；grow vegetables/flowers「種菜、種花」。\n【句意】在這些屋頂上，他們為家人種植蔬菜、花卉和香草。"},{"n":26,"type":"連接詞","options":{"A":"and","B":"or","C":"but","D":"so"},"answer":"C","explain_zh":"(C) but：not only… but also… 關聯連接詞，考連接詞。","note":"【正解】前有 not only，須與 but also 搭配，構成「不僅…而且…」。\n【誘答】(A) and、(B) or、(D) so 都無法與 not only 形成固定關聯用法。\n【重點】關聯連接詞 not only A but also B。\n【句意】這些花園不僅提供新鮮食物，也能在夏天為建築降溫。"},{"n":27,"type":"語法","options":{"A":"give","B":"gives","C":"giving","D":"given"},"answer":"B","explain_zh":"(B) gives：關係代名詞 which 代單數花園，動詞用 gives，考主謂一致。","note":"【正解】which 指前面的 garden（單數），關係子句動詞用第三人稱單數 gives。\n【誘答】(A) give 為原形，須複數主詞；(C) giving 為現在分詞；(D) given 為過去分詞，皆不能單獨當本動詞。\n【重點】關係子句中，動詞須與先行詞單複數一致。\n【句意】有些鄰居甚至一起經營同一座花園，這給了他們結交新朋友的好機會。"},{"n":28,"type":"整句語意","options":{"A":"huge farms in the countryside can feed the whole world","B":"growing food is best left to professional farmers only","C":"life in the city will always remain cold and lonely","D":"even a small space can bring people closer together"},"answer":"D","explain_zh":"(D) 呼應屋頂農園連結社區、綠化城市的正面主旨，考整句語意。","note":"【正解】呼應前文「鄰居一起種菜、把自然帶回城市」的正向主旨，小空間也能拉近人心最合宜。\n【誘答】(A) 鄉間大農場能養活全世界，雖屬事實卻離題，未總結「屋頂小空間連結社區」的主旨；(B) 種食物應交給專業農夫，與全文「居民自己種菜」矛盾；(C) 城市生活永遠冷漠孤單，與「把人拉得更近」的正向結論相反。\n【重點】末格整句語意須總結全篇正向訊息。\n【句意】城市屋頂農園讓我們看見，即使是小小的空間，也能把人拉得更近。"}]}],"vocab":["nature","produce","seed","disappear","pollution","insect","protect","rooftop","vegetable","herb","provide","electricity","neighbor","pollinator","pollen","ecosystem","crop","tireless","chemical","species","beekeeper","recover","urban","resident","fragrant","thrive","absorb","concrete","companion","rhythm","skyscraper"]},{"id":39,"passages":[{"label":"A","title_zh":"運動休閒風與健身熱潮","text":"In recent years, comfortable sports clothes have become a big fashion trend. What began as simple gym wear has gradually grown into a global industry worth billions. This style, often called \"athleisure,\" lets people [[21]] the same clothes for both exercise and daily life. Designers now blend soft, stretchy fabrics with fashionable cuts, so a single outfit can move easily from a workout to a lunch date. You can now see young people in sneakers and yoga pants not only at the gym [[22]] also in coffee shops and on the street. Celebrities and online influencers, moreover, have helped spread the look by wearing it in nearly every photo they post. Given that modern life is busy and fast-paced, clothing that suits many occasions naturally appeals to young shoppers. These clothes are becoming [[23]] popular than before because they look stylish and feel comfortable. Some traditional brands, which once ignored sportswear entirely, have rushed to launch their own athleisure lines. Whereas earlier generations dressed up to appear successful, many people today prefer to look relaxed and healthy. To many young shoppers, comfort and health now matter more than looking fancy. This shift reflects a deeper change in values, as wellness slowly becomes a mark of modern status. Critics argue, however, that the trend encourages people to buy far more clothes than they truly need. As a result, some companies have started making their garments from recycled materials to reduce waste. As more and more people care about their health and enjoy working out, this trend will probably [[24]]. In short, athleisure is no longer merely a passing fashion but a lasting reflection of how we choose to live.","blanks":[{"n":21,"type":"詞彙","options":{"A":"wear","B":"wash","C":"fold","D":"match"},"answer":"A","explain_zh":"(A) wear：「穿」同一套衣服，考動詞詞彙。","note":"【正解】wear「穿」，穿同一套衣服兼顧運動與日常，語意最合。\n【誘答】(B) wash「清洗」、(C) fold「摺疊」、(D) match「搭配」皆與衣物相關，但都無法表達「把同一套衣服穿去運動也穿於日常」（wear）的語意。\n【重點】動詞語意；wear clothes「穿衣服」。\n【句意】這種被稱為「運動休閒風」的風格，讓人們把同一套衣服穿去運動也穿於日常生活。"},{"n":22,"type":"連接詞","options":{"A":"and","B":"or","C":"but","D":"for"},"answer":"C","explain_zh":"(C) but：not only… but also… 關聯連接詞，考連接詞。","note":"【正解】前有 not only，須與 but also 搭配，構成「不僅…也…」。\n【誘答】(A) and、(B) or、(D) for 皆無法與 not only 形成固定關聯用法。\n【重點】關聯連接詞 not only A but also B。\n【句意】你現在不只在健身房，也能在咖啡店和街上看到穿著運動鞋和瑜伽褲的年輕人。"},{"n":23,"type":"語法","options":{"A":"most","B":"more","C":"very","D":"so"},"answer":"B","explain_zh":"(B) more：more…than 比較級，考語法。","note":"【正解】句尾有 than，前面須用比較級 more popular「更受歡迎」。\n【誘答】(A) most 為最高級，不接 than；(C) very、(D) so 為程度副詞，不能構成比較級。\n【重點】雙音節以上形容詞比較級用 more + 原級 + than。\n【句意】因為好看又舒適，這些衣服變得比以前更受歡迎。"},{"n":24,"type":"整句語意","options":{"A":"slow down as people lose interest in fitness","B":"stay exactly the same size as it is right now","C":"soon return to the plain gym wear of the past","D":"keep growing strong for many years to come"},"answer":"D","explain_zh":"(D) 呼應「越來越多人重視健康」帶出的趨勢延續，考整句語意。","note":"【正解】前句說越來越多人重視健康、愛運動，趨勢會持續成長最合語意。\n【誘答】(A) 因人們對健身失去興趣而放緩，與前提「越來越多人重視健康」矛盾；(B) 維持現狀不變，與「越來越多」帶出的成長趨勢不符；(C) 回到過去樸素的運動服，與運動休閒風持續興盛的結論相反。\n【重點】末格整句語意須呼應前文的正向趨勢。\n【句意】隨著越來越多人重視健康、享受運動，這股風潮很可能會持續興盛好多年。"}]},{"label":"B","title_zh":"蔬食與植物肉風潮","text":"More and more people around the world are trying to eat less meat. This quiet change in eating habits, once limited to a small group, has now spread across many cultures. Some do it to stay healthy, [[25]] others want to protect the earth. Raising cattle, after all, uses vast amounts of water and land while releasing gases that warm the planet. To meet this need, food companies have [[26]] a product called \"plant-based meat,\" which is made from beans but tastes surprisingly like real meat. Using clever cooking science, researchers have managed to copy the colour, smell, and juicy texture of a real burger. Such products, moreover, contain no cholesterol from animals, which appeals to health-conscious buyers. It is one of the [[27]] choices for people who love the taste of meat but also care about animals. Whereas early versions were dry and tasteless, today's plant-based options have improved dramatically. Given that prices are steadily falling, these foods are no longer seen as an expensive luxury. These days, you can even find such products in many school canteens, supermarkets, and fast-food shops around the country. Some famous restaurants have added meat-free dishes to their menus in order to attract younger customers. Not everyone is convinced, however, since a few critics worry that these foods are too heavily processed. As a result, companies keep working to make their recipes both simpler and more natural. Eating more vegetables and plant-based food shows that [[28]]. Ultimately, the choices we make at the dinner table may shape the health of both our bodies and our planet.","blanks":[{"n":25,"type":"連接詞","options":{"A":"because","B":"since","C":"as","D":"while"},"answer":"D","explain_zh":"(D) while：對比「有些人…而另一些人…」，考連接詞。","note":"【正解】while 表對比「然而、而」，前後對照兩種吃素的理由。\n【誘答】(A) because、(B) since 皆表原因；(C) as 表「因為、當」；三者文法上都能連接子句，但都無法表達前後兩種人「對比」的語意（while 表「而、然而」）。\n【重點】連接詞 while 可引導對比子句「而、然而」。\n【句意】有些人是為了健康，而另一些人則是想保護地球。"},{"n":26,"type":"詞彙","options":{"A":"discovered","B":"developed","C":"advertised","D":"imported"},"answer":"B","explain_zh":"(B) developed：食品公司「研發」植物肉，考動詞詞彙。","note":"【正解】develop「研發、開發」，食品公司開發出植物肉產品，語意最合。\n【誘答】(A) discovered「發現」、(C) advertised「宣傳」、(D) imported「進口」文法上都能接 a product，但與後文「用豆子製成、口感像真肉」所暗示的「研發」（develop）不符。\n【重點】動詞語意；develop a product「開發產品」，此處為現在完成式 have developed。\n【句意】為了滿足這種需求，食品公司研發出一種名為「植物肉」的產品。"},{"n":27,"type":"語法","options":{"A":"better","B":"good","C":"best","D":"well"},"answer":"C","explain_zh":"(C) best：one of the + 最高級 + 複數，考語法。","note":"【正解】one of the 後接最高級 best 再接複數名詞 choices，構成「最…之一」。\n【誘答】(A) better 為比較級；(B) good 為原級；(D) well 為副詞，皆不合此句型。\n【重點】句型 one of the + 最高級 + 複數名詞「最…的…之一」。\n【句意】對於愛吃肉又關心動物的人來說，它是最好的選擇之一。"},{"n":28,"type":"整句語意","options":{"A":"small daily choices can really help our planet","B":"everyone must give up eating meat immediately","C":"plant-based meat will soon replace every farm","D":"protecting the planet is only the government's job"},"answer":"A","explain_zh":"(A) 呼應「多蔬食、選植物肉能護地球」的主旨，考整句語意。","note":"【正解】呼應全篇「少吃肉、選植物肉護地球」的正向主旨，日常小選擇能幫助地球最合宜。\n【誘答】(B) 每個人都必須立刻完全戒肉，語氣過度極端，與全文「少吃肉、做選擇」的溫和主旨不符；(C) 植物肉很快會取代所有農場，過度誇大且與「並非人人買單」矛盾；(D) 保護地球只是政府的責任，與「我們在餐桌上的選擇」強調個人行動相反。\n【重點】末格整句語意須總結全篇的環保與健康訊息。\n【句意】多吃蔬菜與植物性食物讓我們明白，日常的小小選擇真的能幫助我們的地球。"}]}],"vocab":["comfortable","fashion","trend","style","exercise","stylish","healthy","protect","product","surprisingly","taste","choice","planet","industry","fabric","outfit","celebrity","influencer","occasion","generation","wellness","garment","recycled","cattle","release","texture","cholesterol","luxury","processed","recipe","ultimately","dramatically"]},{"id":40,"passages":[{"label":"A","title_zh":"台灣觀光宣傳與國際能見度","text":"In recent years, Taiwan has been working hard to attract more visitors from around the world. Competing with neighbouring destinations, the island has learned that a strong image abroad is worth a great deal. The government often [[21]] short videos online to show the island's night markets, tall mountains, and warm people. These clips, carefully filmed and widely shared, allow foreigners to glimpse local life long before they buy a ticket. Thanks to these efforts, the number of foreign tourists has been [[22]] year by year. Improved transport, English signs, and convenient payment apps have made travelling here easier than ever. Given that word of mouth spreads quickly online, a single happy traveller can inspire dozens of others. Many visitors find the island so friendly and beautiful [[23]] they promise to come back again. What impresses them most, surveys suggest, is not merely the scenery but the genuine kindness of ordinary people. Popular spots like Sun Moon Lake and Taroko now draw travelers from many different countries. Whereas some famous cities feel crowded and impersonal, Taiwan is often praised for its relaxed and welcoming atmosphere. Tourism also brings more jobs and income to many small towns. Family-run guesthouses, night-market stalls, and local guides all benefit directly from this steady stream of guests. Moreover, growing tourism encourages young people to stay in their hometowns rather than move away. As a result, traditions and crafts that were once fading are now being proudly revived. If we keep welcoming our guests with a warm smile, [[24]]. In the long run, every friendly greeting becomes a quiet form of advertising that no expensive campaign could ever buy.","blanks":[{"n":21,"type":"詞彙","options":{"A":"films","B":"watches","C":"posts","D":"downloads"},"answer":"C","explain_zh":"(C) posts：在網路上「張貼、發布」短片，考動詞詞彙。","note":"【正解】post「張貼、發布」，政府在網路上發布短片宣傳台灣，語意最合。\n【誘答】(A) films「拍攝」、(B) watches「觀看」、(D) downloads「下載」皆與影片相關，但都無法表達「在網路上發布」影片以宣傳（post）的語意，且與 online 的搭配不合。\n【重點】動詞語意；post videos online「在網路上發布影片」。\n【句意】政府常在網路上發布短片，展現台灣的夜市、高山與熱情的人們。"},{"n":22,"type":"語法","options":{"A":"growing","B":"grown","C":"grow","D":"grew"},"answer":"A","explain_zh":"(A) growing：has been + Ving 現在完成進行式，考時態詞形。","note":"【正解】has been 之後須接現在分詞 growing，構成現在完成進行式，表持續增加。\n【誘答】(B) grown 用於現在完成式 have grown；(C) grow 原形、(D) grew 過去式皆不能接在 has been 之後。\n【重點】現在完成進行式 have/has been + V-ing，強調動作持續。\n【句意】多虧這些努力，外國遊客的人數逐年持續增加。"},{"n":23,"type":"連接詞","options":{"A":"what","B":"which","C":"as","D":"that"},"answer":"D","explain_zh":"(D) that：so + 形容詞 + that… 句型，考連接詞。","note":"【正解】前有 so friendly and beautiful，須用 so…that…「如此…以致於…」的 that。\n【誘答】(A) what、(B) which 為關係詞，不能用於 so…that 句型；(C) as「so…as」為學生常見誤用，但正確固定句型是 so + 形容詞 + that。\n【重點】句型 so + 形容詞 + that + 子句「如此…以致於…」。\n【句意】許多遊客覺得這座島如此友善又美麗，以致於他們承諾會再回來。"},{"n":24,"type":"整句語意","options":{"A":"visitors will soon stop telling others about their trips","B":"Taiwan will become even better known around the world","C":"our lively night markets will have to close for good","D":"the island will end up needing far fewer local guides"},"answer":"B","explain_zh":"(B) 呼應「熱情待客、提升能見度」的正向結論，考整句語意。","note":"【正解】前句 if we keep welcoming guests with a smile 帶出正向結果，台灣國際知名度提升最合語意。\n【誘答】(A) 遊客不再向他人分享行程，與全文「口碑在網路快速傳播」的正向效果矛盾；(C) 熱鬧夜市將被迫歇業，語氣負面且與友善待客的正面前提不符；(D) 島上需要的導遊大減，與觀光帶來工作、蓬勃發展的主旨相反。\n【重點】末格整句語意須呼應條件句帶出的正面結果。\n【句意】如果我們持續以溫暖的微笑歡迎客人，台灣在國際上就會更加聞名。"}]},{"label":"B","title_zh":"向外國朋友介紹台灣文化","text":"When a foreign friend comes to Taiwan, there are many wonderful things you can share with them. Acting as a local guide, even for a single day, can turn an ordinary visit into an unforgettable experience. You might take them to a temple and explain the meaning [[25]] the colorful gods and lively festivals. Behind every statue and ritual lies a story that reflects centuries of history and belief. At a busy night market, you can [[26]] them some local snacks like bubble tea and stinky tofu. The mix of bold smells, bright lights, and cheerful noise often amazes those who have never seen such a scene. Whereas dining abroad can feel formal, sharing street food side by side quickly breaks down barriers between people. Do not worry if your English is not perfect; a friendly heart is [[27]] important than perfect grammar. Gestures, smiles, and a little patience, after all, can communicate warmth that words alone cannot. Given that first impressions last, your kindness may shape how a visitor remembers our entire country. You can even teach them a few simple Chinese words, such as \"xie xie,\" which means thank you
