. Most travellers are delighted to learn a phrase or two, and their efforts usually spark plenty of laughter. Moreover, exchanging languages this way turns a simple meal into a genuine cultural exchange. As a result, friendships formed during such visits often last for many years across great distances. By proudly sharing our culture with the world, [[28]]. In this way, each of us can become a small but powerful ambassador for the place we call home.","blanks":[{"n":25,"type":"介系詞","options":{"A":"for","B":"of","C":"about","D":"to"},"answer":"B","explain_zh":"(B) of：the meaning of…「…的意義」，考介系詞。","note":"【正解】the meaning of「…的意義」，說明神明與節慶的意義，用介系詞 of。\n【誘答】(A) for、(C) about、(D) to 皆不與 meaning 搭配表「…的意義」，正確固定用法為 the meaning of something。\n【重點】固定搭配 the meaning of something。\n【句意】你可以帶他們去廟裡，解釋那些多彩神明與熱鬧節慶的意義。"},{"n":26,"type":"詞彙","options":{"A":"describe","B":"sell","C":"cook","D":"offer"},"answer":"D","explain_zh":"(D) offer：「請、提供」在地小吃，考動詞詞彙。","note":"【正解】offer「提供、請（吃）」，在夜市請外國朋友吃在地小吃，語意最合。\n【誘答】(A) describe「描述」、(B) sell「販賣」、(C) cook「烹煮」在夜市請客的情境中都不合宜；正確是「請、提供」小吃給對方（offer someone something）。\n【重點】動詞語意；offer someone something「請某人吃某物」。\n【句意】在熱鬧的夜市，你可以請他們吃一些在地小吃，像珍珠奶茶和臭豆腐。"},{"n":27,"type":"語法","options":{"A":"more","B":"most","C":"very","D":"too"},"answer":"A","explain_zh":"(A) more：more…than 比較級，考語法。","note":"【正解】句中有 than，須用比較級 more important「更重要」。\n【誘答】(B) most 為最高級不接 than；(C) very、(D) too 為程度副詞，不能構成比較級。\n【重點】雙音節以上形容詞比較級用 more + 原級 + than。\n【句意】別擔心英文不完美；一顆友善的心比完美的文法更重要。"},{"n":28,"type":"整句語意","options":{"A":"we slowly lose our own traditions to the world","B":"foreign visitors will finally stop coming here","C":"we help more people fall in love with Taiwan","D":"our culture will slowly become just like everyone else's"},"answer":"C","explain_zh":"(C) 呼應「驕傲分享文化」的正向結論，考整句語意。","note":"【正解】呼應前文「驕傲地與世界分享文化」的正向語氣，讓更多人愛上台灣最合宜。\n【誘答】(A) 慢慢把傳統流失給世界，與「驕傲分享文化」的正向精神矛盾（分享不等於流失）；(B) 外國遊客終於不再來，語氣負面，與友善待客主旨相反；(D) 我們的文化變得和大家一樣，與「讓更多人愛上台灣」的獨特吸引力結論不符。\n【重點】末格整句語意須呼應全篇友善分享文化的主旨。\n【句意】藉由驕傲地與世界分享我們的文化，我們讓更多人愛上台灣。"}]}],"vocab":["attract","visitor","government","island","tourist","tourism","income","welcome","temple","festival","local","culture","tradition","compete","destination","glimpse","transport","convenient","scenery","genuine","atmosphere","guesthouse","revive","unforgettable","statue","ritual","belief","barrier","gesture","patience","impression","delighted","ambassador"]}];
const LETTERS = ['A','B','C','D'];
let cur = 0;                       // index into PAPERS
const state = {};                  // state[paperIndex][n] = chosenLetter
const doneRounds = new Set();

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function renderRounds(){
  const el = document.getElementById('rounds'); el.innerHTML='';
  PAPERS.forEach((p,i)=>{
    const b=document.createElement('button');
    b.textContent=p.id;
    if(i===cur) b.className='active';
    else if(doneRounds.has(i)) b.className='done';
    b.onclick=()=>{cur=i;render();};
    el.appendChild(b);
  });
}

function blanksOf(p){return p.passages.flatMap(pa=>pa.blanks);}

function updateScore(){
  const p=PAPERS[cur]; const st=state[cur]||{};
  const all=blanksOf(p); let correct=0, ans=0;
  all.forEach(b=>{ if(st[b.n]){ans++; if(st[b.n]===b.answer)correct++;} });
  document.getElementById('sc-correct').textContent=correct;
  document.getElementById('sc-total').textContent=all.length;
  document.getElementById('sc-ans').textContent=ans;
  if(ans===all.length){doneRounds.add(cur);renderRounds();}
}

function choose(n,letter,btn){
  const p=PAPERS[cur]; if(!state[cur])state[cur]={};
  if(state[cur][n])return;               // already answered
  state[cur][n]=letter;
  const blank=p.passages.flatMap(pa=>pa.blanks).find(b=>b.n===n);
  const correct=blank.answer;
  const qEl=document.getElementById('q-'+n);
  // mark options
  qEl.querySelectorAll('.opt').forEach(o=>{
    const k=o.dataset.k; o.disabled=true;
    if(k===letter){ o.classList.add(k===correct?'chosen-ok':'chosen-no'); o.querySelector('.k').classList.add(k===correct?'okmark':'nomark'); }
    if(k===correct && k!==letter){ o.classList.add('reveal-ok'); o.querySelector('.k').classList.add('okmark'); }
  });
  // reveal explanation
  qEl.querySelector('.exp').classList.add('show');
  // fill blank
  const bk=document.getElementById('bk-'+n);
  if(bk){ bk.innerHTML=esc(blank.options[letter]); bk.classList.add(letter===correct?'ok':'no'); }
  updateScore();
}

function renderText(pa){
  let h=esc(pa.text);
  h=h.replace(/\[\[(\d+)\]\]/g,(m,n)=>'<span class="blank" id="bk-'+n+'"><span class="bn">'+n+'</span></span>');
  return h;
}

function renderPassage(pa){
  let h='<div class="passage">';
  h+='<div class="ptitle">'+pa.label+'. '+esc(pa.title_zh)+'</div>';
  h+='<p class="ptext">'+renderText(pa)+'</p>';
  pa.blanks.forEach(b=>{
    h+='<div class="q" id="q-'+b.n+'">';
    h+='<div class="stem"><span class="qn">'+b.n+'.</span> 請選出最適合的答案：</div>';
    h+='<div class="opts">';
    LETTERS.forEach(k=>{
      h+='<button class="opt" data-k="'+k+'" onclick="choose('+b.n+',\''+k+'\',this)"><span class="k">('+k+')</span><span>'+esc(b.options[k])+'</span></button>';
    });
    h+='</div>';
    h+='<div class="exp"><span class="headline">✔ 正解 ('+b.answer+')　'+esc(b.explain_zh)+'</span>'+(b.note?'<div class="note-full">'+esc(b.note)+'</div>':'')+'</div>';
    h+='</div>';
  });
  h+='</div>';
  return h;
}

function render(){
  const p=PAPERS[cur];
  let h='<div class="paperhead">第 '+p.id+' 回　綜合測驗</div>';
  h+='<p class="note">兩篇短文，共 8 個空格（第 21–28 題），每題四個選項，依文意選出最適合的答案。</p>';
  p.passages.forEach(pa=>h+=renderPassage(pa));
  if(p.vocab&&p.vocab.length) h+='<div class="vocab"><b>本回必備單字：</b>'+p.vocab.map(esc).join('、')+'</div>';
  document.getElementById('content').innerHTML=h;
  // restore answered state
  const st=state[cur]||{};
  Object.keys(st).forEach(n=>{ /* re-apply */ reapply(+n,st[n]); });
  document.getElementById('prevBtn').disabled=(cur===0);
  document.getElementById('nextBtn').disabled=(cur===PAPERS.length-1);
  renderRounds(); updateScore();
  window.scrollTo({top:0,behavior:'smooth'});
}

function reapply(n,letter){
  const p=PAPERS[cur];
  const blank=p.passages.flatMap(pa=>pa.blanks).find(b=>b.n===n);
  const correct=blank.answer; const qEl=document.getElementById('q-'+n);
  qEl.querySelectorAll('.opt').forEach(o=>{
    const k=o.dataset.k; o.disabled=true;
    if(k===letter){o.classList.add(k===correct?'chosen-ok':'chosen-no');o.querySelector('.k').classList.add(k===correct?'okmark':'nomark');}
    if(k===correct&&k!==letter){o.classList.add('reveal-ok');o.querySelector('.k').classList.add('okmark');}
  });
  qEl.querySelector('.exp').classList.add('show');
  const bk=document.getElementById('bk-'+n);
  if(bk){bk.innerHTML=esc(blank.options[letter]);bk.classList.add(letter===correct?'ok':'no');}
}

document.getElementById('resetBtn').onclick=()=>{ state[cur]={}; doneRounds.delete(cur); render(); };
document.getElementById('prevBtn').onclick=()=>{ if(cur>0){cur--;render();} };
document.getElementById('nextBtn').onclick=()=>{ if(cur<PAPERS.length-1){cur++;render();} };
render();
</script>
</body>
</html>
