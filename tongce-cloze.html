<script>
const PAPERS = [{"id":1,"passages":[{"label":"A","title_zh":"台灣夜市","text":"Night markets are one of the most popular attractions in Taiwan. Every evening, thousands of people [[21]] these lively places to enjoy tasty street food and cheap shopping. Among all the snacks, stinky tofu and bubble tea are especially [[22]] with both locals and foreign visitors. Bargaining is part of the fun; shopping here feels exciting [[23]] you can often talk the vendors into a lower price. In recent years, many night markets have also started to protect the environment [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"break into","B":"crowd into","C":"run into","D":"come across"},"answer":"B","explain_zh":"(B) crowd into：人潮「湧入」夜市，考片語動詞詞彙。","note":"【正解】crowd into 意為「蜂擁湧入」，指大批人潮擠進夜市這種熱鬧場所，語意最貼切。\n【誘答】(A) break into「闖入、強行進入」；(C) run into「偶然遇到、撞上」；(D) come across「無意間發現」，三者都不能表達「大批人潮湧入熱鬧場所」，語意不合。\n【重點】片語動詞 crowd into + 地點＝「湧入某處」。crowd 也可用 crowd around（圍過來）。\n【句意】每天晚上，成千上萬的人湧入這些熱鬧的地方，享用美味小吃、逛便宜的商品。"},{"n":22,"type":"詞彙","options":{"A":"familiar","B":"friendly","C":"crowded","D":"popular"},"answer":"D","explain_zh":"(D) popular：與 with 連用「受歡迎」，考形容詞詞彙。","note":"【正解】be popular with sb 是固定用法，表「很受……歡迎」，用來形容臭豆腐和珍奶大受歡迎，語意通順。\n【誘答】(A) be familiar with 意為「熟悉」，主詞須是「知道的人」而非食物；(B) be friendly with 是「與人友好」，食物不能與人交好；(C) be crowded with 是「擠滿」，主詞應是場所而非小吃，三者都無法表達小吃「受歡迎」。\n【重點】固定搭配 be popular with sb「受某人歡迎」，介系詞用 with，不是 to。\n【句意】在所有小吃當中，臭豆腐和珍珠奶茶特別受本地人和外國遊客的喜愛。"},{"n":23,"type":"連接詞","options":{"A":"because","B":"so","C":"though","D":"once"},"answer":"A","explain_zh":"(A) because：後句說明好玩的原因，考連接詞。","note":"【正解】前句說購物很刺激，後句說明「因為常能殺價」，前後是因果關係，用 because。\n【誘答】(B) so「所以」表結果，因果方向相反；(C) though「雖然」表讓步、語氣相反；(D) once「一旦、當……之後」表時間條件，都不符「刺激是因為能殺價」的因果語意。\n【重點】because 引導原因子句。片語 talk sb into N/Ving＝「說服某人……」，這裡指殺價成功。\n【句意】在這裡購物感覺很刺激，因為你常常能說服攤販降價。"},{"n":24,"type":"整句語意","options":{"A":"by handing out free plastic bags to every customer","B":"even though they still burn all their garbage","C":"by asking shoppers to bring their own bags","D":"so that tourists will spend much more money"},"answer":"C","explain_zh":"(C) 呼應「保護環境」的具體做法，考整句語意。","note":"【正解】前面說夜市開始保護環境，(C)「請顧客自備購物袋」正是保護環境的具體做法，前後呼應。\n【誘答】(A)「發放免費塑膠袋給每位顧客」反而製造更多垃圾，與保護環境矛盾；(B)「雖然仍焚燒所有垃圾」與「開始保護環境」自相矛盾；(D)「好讓遊客花更多錢」是商業目的，與環保無關。\n【重點】整句語意題：要選和前半句主題（保護環境）一致的選項。by + Ving 表「藉由……的方式」。\n【句意】近年來，許多夜市也開始透過請顧客自備購物袋來保護環境。"}]},{"label":"B","title_zh":"電動機車","text":"Taiwan is famous for its huge number of motorcycles. However, the gas ones give off air pollution that [[25]] people's health. To deal with this problem, the government has been [[26]] people to switch to electric scooters. Electric scooters are quieter, cleaner, and cheaper to run [[27]] gas motorcycles. Experts believe that if more people choose them, the air in our cities will slowly become much [[28]].","blanks":[{"n":25,"type":"詞彙","options":{"A":"harm","B":"benefits","C":"harms","D":"protects"},"answer":"C","explain_zh":"(C) harms：空汙「危害」健康；主詞單數用 harms，考詞彙＋主謂一致。","note":"【正解】harm 意為「危害」，空氣污染危害健康語意最合；先行詞 pollution 為單數，關係子句動詞用單數 harms。\n【誘答】(A) harm 語意雖對，但先行詞 pollution 為單數，關係子句動詞須用 harms；(B) benefits「有益於」、(D) protects「保護」都是正面語意，與「污染」不合。\n【重點】詞彙＋主謂一致：關係子句動詞須與先行詞 pollution（單數）一致，用 harms。\n【句意】然而，燃油機車排放的空氣污染會危害人們的健康。"},{"n":26,"type":"詞彙/句型","options":{"A":"encouraging","B":"discouraging","C":"preventing","D":"banning"},"answer":"A","explain_zh":"(A) encouraging：encourage sb to V「鼓勵」，考詞彙＋句型。","note":"【正解】encourage sb to V「鼓勵某人做……」，政府鼓勵民眾改騎電動機車，句型與語意都成立。\n【誘答】(B) discourage、(C) prevent、(D) ban 都要用「…sb from Ving」的結構，不接 to V，且 discourage/prevent/ban 語意與「鼓勵」相反。\n【重點】句型 encourage sb to V。對照 prevent/stop/discourage sb from Ving、ban sb from Ving。\n【句意】為了解決這個問題，政府一直鼓勵民眾改騎電動機車。"},{"n":27,"type":"語法","options":{"A":"as","B":"then","C":"to","D":"than"},"answer":"D","explain_zh":"(D) than：cheaper…than 比較級，考語法。","note":"【正解】前面有比較級 quieter、cleaner、cheaper，比較的對象前要用 than，故選 than。\n【誘答】(A) as 用於 as…as 同級比較；(B) then 是副詞「然後」，與 than 拼字相近但詞性不同；(C) 只有 superior、senior 等少數字才接 to，一般比較級仍須用 than。\n【重點】比較級 + than + 比較對象。三個形容詞都是比較級，訊號詞就是 than。\n【句意】電動機車比燃油機車更安靜、更乾淨，騎起來也更省錢。"},{"n":28,"type":"詞彙","options":{"A":"quieter","B":"cleaner","C":"thinner","D":"warmer"},"answer":"B","explain_zh":"(B) cleaner：空氣變「更乾淨」，考詞彙＋文意。","note":"【正解】整段在講電動機車減少污染，所以空氣會變「更乾淨」cleaner，語意一致；much 修飾比較級也支持選比較級。\n【誘答】(A) quieter「更安靜」是承接前文電動機車較安靜的陷阱，但空氣品質與噪音無關；(C) thinner「更稀薄」指高山空氣，語意不合；(D) warmer「更溫暖」與空氣是否乾淨無關。\n【重點】詞彙＋文意連貫：由前文「更乾淨的機車」推知空氣變 cleaner。much 常用來加強比較級。\n【句意】專家相信，如果更多人選擇電動機車，城市的空氣會慢慢變得乾淨許多。"}]}],"vocab":["attraction","lively","crowd","snack","popular","bargain","vendor","protect","pollution","harm","encourage","switch"]},{"id":2,"passages":[{"label":"A","title_zh":"便利商店","text":"Convenience stores can be found on almost every street corner in Taiwan. Open twenty-four hours a day, they offer far more services than just [[21]] snacks and drinks. Customers can pay their bills, pick up online orders, and even buy train tickets there. This is [[22]] convenience stores have become such an important part of daily life. For many busy workers, dropping by a store [[23]] a quick breakfast is part of the morning routine. As competition grows, these shops keep adding new services [[24]].","blanks":[{"n":21,"type":"語法","options":{"A":"to sell","B":"sold","C":"sells","D":"selling"},"answer":"D","explain_zh":"(D) selling：than just 後接動名詞，考詞形。","note":"【正解】than just 前的 more services 是名詞，此處 than 作介系詞，後面須用動名詞 selling 當名詞，指「販售」這件事。\n【誘答】(A) to sell 不定詞、(B) sold 過去分詞、(C) sells 有主詞的限定動詞，都不能接在介系詞 than 之後當名詞，此處須用動名詞 selling。\n【重點】詞形：介系詞後接動名詞 Ving。offer more than just Ving＝「不只是做……而已」。\n【句意】便利商店提供的服務遠不只是賣零食和飲料而已。"},{"n":22,"type":"關係詞","options":{"A":"how","B":"why","C":"when","D":"where"},"answer":"B","explain_zh":"(B) why：This is why…「這就是為什麼」，考關係副詞。","note":"【正解】This is why…「這就是為什麼……」，前句列舉各種服務，後句是結果，用關係副詞 why。\n【誘答】(A) This is how 強調「方式」；(C) This is when 強調「時間點」；(D) This is where 強調「地點」，三者結構雖都成立，但此處要說明「原因」，須用 why。\n【重點】關係副詞 This is why + 結果子句；對照 This is how/when/where。\n【句意】這就是為什麼便利商店已成為日常生活中如此重要的一部分。"},{"n":23,"type":"介系詞","options":{"A":"to","B":"with","C":"for","D":"on"},"answer":"C","explain_zh":"(C) for：drop by…for「順道去買」，考介系詞。","note":"【正解】drop by…for N＝「順道去（某處）買／拿……」，for 表目的，這裡指去買早餐。\n【誘答】(A) to 後須接原形動詞才表目的，接名詞 a quick breakfast 不合；(B) with「帶著」、(D) on 都無法與 drop by 搭配表示「為了買某物」。\n【重點】介系詞 for 表目的、對象。片語 drop by「順道去、順路拜訪」。\n【句意】對許多忙碌的上班族來說，順道去商店買個快速早餐是早晨例行公事的一部分。"},{"n":24,"type":"整句語意","options":{"A":"to attract even more customers","B":"since customers no longer need any help","C":"although this keeps driving customers away","D":"so that they can raise their service fees"},"answer":"A","explain_zh":"(A) 說明不斷加服務的目的，考整句語意。","note":"【正解】前句說商店不斷增加新服務，(A)「為了吸引更多顧客」說明目的，前後呼應也合乎商業邏輯。\n【誘答】(B)「既然顧客不再需要任何協助」與「不斷增加服務」矛盾；(C)「雖然這樣一直把顧客趕走」邏輯不合；(D)「好讓他們提高服務費」不是加服務的目的，與「競爭→吸引顧客」的邏輯不符。\n【重點】整句語意題：選符合「競爭激烈→加服務」邏輯的目的子句。to V 表目的。\n【句意】隨著競爭加劇，這些商店不斷增加新服務，以吸引更多顧客。"}]},{"label":"B","title_zh":"資源回收","text":"Taiwan is often praised for its successful recycling system. Every evening, garbage trucks play music to remind people [[25]] their trash outside. Residents must carefully [[26]] their waste into different types, such as paper, plastic, and food scraps. At first, this rule was not easy to follow, [[27]] most people have now gotten used to it. Thanks to everyone's effort, Taiwan today [[28]] one of the highest recycling rates in the whole world.","blanks":[{"n":25,"type":"句型","options":{"A":"to take","B":"take","C":"taking","D":"taken"},"answer":"A","explain_zh":"(A) to take：remind sb to V，考句型。","note":"【正解】remind sb to V「提醒某人做……」，這裡提醒民眾把垃圾拿出來，用不定詞 to take。\n【誘答】(B) take 原形、(C) taking 動名詞、(D) taken 過去分詞，都不符 remind sb to V 的句型，此處須用不定詞 to take。\n【重點】句型 remind sb to V。同類還有 tell/ask/want sb to V。\n【句意】每天傍晚，垃圾車放音樂提醒民眾把垃圾拿到外面。"},{"n":26,"type":"詞彙","options":{"A":"throw","B":"mix","C":"separate","D":"collect"},"answer":"C","explain_zh":"(C) separate：把垃圾「分類」separate…into，考詞彙。","note":"【正解】separate…into…「把……分類成……」，居民須把垃圾分成不同種類，語意與搭配都合。\n【誘答】(A) throw「丟」雖可搭配 into，但「把垃圾丟成不同種類」語意不通；(B) mix「混合」與「分類」語意相反；(D) collect「收集」不能接 into different types 表分類。\n【重點】詞彙＋搭配：separate A into B「把 A 分成 B」。\n【句意】居民必須仔細地把垃圾分類成不同種類，例如紙類、塑膠和廚餘。"},{"n":27,"type":"連接詞","options":{"A":"so","B":"but","C":"because","D":"unless"},"answer":"B","explain_zh":"(B) but：前後語氣轉折（起初難→現在習慣），考連接詞。","note":"【正解】前句說這規定起初不易遵守，後句說現在大家都習慣了，前後語氣轉折，用 but。\n【誘答】(A) so 表結果、(C) because 表原因、(D) unless「除非」表條件，都不符「起初難→現在習慣」的轉折關係，須用 but。\n【重點】連接詞 but 表轉折。片語 get used to N/Ving＝「習慣於……」。\n【句意】起初這項規定不容易遵守，但現在大多數人已經習慣了。"},{"n":28,"type":"語法","options":{"A":"have","B":"had","C":"will have","D":"has"},"answer":"D","explain_zh":"(D) has：主詞 Taiwan 單數、現在式，考主謂一致。","note":"【正解】主詞 Taiwan 是單數第三人稱、時間 today 為現在式，動詞用 has，表示「擁有」。\n【誘答】(A) have 用於複數主詞；(B) had 是過去式，與 today 不合；(C) will have 是未來式，也與 today（現在）矛盾，單數主詞現在式須用 has。\n【重點】主謂一致：單數主詞＋現在式用 has。\n【句意】多虧大家的努力，今天的台灣擁有全世界最高的回收率之一。"}]}],"vocab":["convenience","service","customer","bill","order","routine","competition","attract","recycling","remind","trash","separate","waste","rate"]},{"id":3,"passages":[{"label":"A","title_zh":"運動與健康","text":"These days, more and more people are paying attention [[21]] their health. Regular exercise is one of the best ways to stay [[22]]. Doctors suggest that adults work out at least three times a week. Activities such as jogging, swimming, and cycling can make the heart stronger and [[23]] stress at the same time. However, quite a few people still find it hard to keep exercising [[24]].","blanks":[{"n":21,"type":"介系詞","options":{"A":"to","B":"on","C":"in","D":"at"},"answer":"A","explain_zh":"(A) to：pay attention to「注意」，考介系詞。","note":"【正解】pay attention to「注意、關注」是固定片語，介系詞用 to，這裡指關注健康。\n【誘答】(B) on 是 focus on「專注於」的搭配；(C) in 是 be interested in「對……有興趣」的搭配；(D) at 是 look at 的搭配，都不能與 pay attention 連用。\n【重點】固定搭配 pay attention to N。to 是介系詞，後接名詞。\n【句意】近來，越來越多人開始關注自己的健康。"},{"n":22,"type":"詞形","options":{"A":"health","B":"healthily","C":"healthy","D":"healthful"},"answer":"C","explain_zh":"(C) healthy：stay + 形容詞，考詞形。","note":"【正解】stay 是連綴動詞，後接形容詞當補語，healthy「健康的」形容主詞狀態，語意正確。\n【誘答】(A) health 是名詞；(B) healthily 是副詞，不能當 stay 的補語；(D) healthful 多用來形容「有益健康的事物」，形容人保持健康仍用 healthy。\n【重點】詞形：連綴動詞 stay/keep/remain + 形容詞。\n【句意】規律運動是保持健康的最好方法之一。"},{"n":23,"type":"詞彙","options":{"A":"increase","B":"reduce","C":"build","D":"create"},"answer":"B","explain_zh":"(B) reduce：「減輕」壓力，與 stronger 語意並列，考詞彙。","note":"【正解】reduce stress「減輕壓力」，與前面 make the heart stronger（正面好處）並列，都是運動的好處。\n【誘答】(A) increase「增加」、(C) build「累積」（build up stress）、(D) create「製造」壓力都是把壓力變多，與前面 make the heart stronger 的正面好處並列方向相反，須用 reduce。\n【重點】詞彙＋語意並列：and 連接的兩個動作語意方向要一致。reduce＝減少。\n【句意】慢跑、游泳和騎腳踏車等活動能讓心臟更強壯，同時減輕壓力。"},{"n":24,"type":"整句語意","options":{"A":"since they truly enjoy every workout","B":"so that they can stay fit and strong","C":"although exercising is quite easy for them","D":"because of their busy daily schedules"},"answer":"D","explain_zh":"(D) 說明難以持續運動的原因，考整句語意。","note":"【正解】前句說很多人難以持續運動，(D)「因為他們每天忙碌的行程」說明原因，合乎邏輯。\n【誘答】(A)「因為他們很享受每次運動」與「難以持續」矛盾；(B)「好讓自己保持健壯」把難處說成目的，邏輯不通；(C)「雖然運動對他們很容易」與「覺得很難持續」自相矛盾。\n【重點】整句語意題：選符合「難以持續運動」原因的選項。because of + 名詞（片語）。\n【句意】然而，不少人仍然覺得很難持續運動，因為他們每天的行程很忙。"}]},{"label":"B","title_zh":"志工服務","text":"Volunteering is a wonderful way to help others while learning new skills. In Taiwan, many students join [[25]] groups during their summer vacation. Some teach children in mountain areas, [[26]] others help clean up the beaches. Although volunteers are not paid, most of them agree that the experience is [[27]] than money. Through serving others, young people slowly learn to care about their community [[28]] grow into more responsible citizens.","blanks":[{"n":25,"type":"詞彙","options":{"A":"private","B":"wealthy","C":"strict","D":"volunteer"},"answer":"D","explain_zh":"(D) volunteer：volunteer groups「志工團體」，考詞彙。","note":"【正解】volunteer groups「志工團體」，volunteer 當名詞作形容詞用，與全文志工服務主題一致。\n【誘答】(A) private「私人的」、(B) wealthy「富有的」、(C) strict「嚴格的」雖都能修飾 groups，但都無法呼應「暑假參加、幫助他人」的服務主題，只有 volunteer group（志工團體）貼切。\n【重點】詞彙：volunteer 可作名詞（志工）或當形容詞（志工的）。volunteer group／work。\n【句意】在台灣，許多學生在暑假期間加入志工團體。"},{"n":26,"type":"連接詞","options":{"A":"so","B":"while","C":"if","D":"because"},"answer":"B","explain_zh":"(B) while：對比「有些人……，有些人……」，考連接詞。","note":"【正解】while 可表「而、然而」，用來對比 some…others…（有些人教書、有些人淨灘）兩種人，最恰當。\n【誘答】(A) so 表結果、(C) if 表條件、(D) because 表原因，都無法表達 some…others… 兩種人的並列對比，須用 while。\n【重點】連接詞 while 表對比。常見句型 some…, while others…。\n【句意】有些人在山區教孩子，而有些人則幫忙清理海灘。"},{"n":27,"type":"詞彙/比較","options":{"A":"more expensive","B":"more careful","C":"more valuable","D":"more famous"},"answer":"C","explain_zh":"(C) more valuable：經驗「比金錢更有價值」，考詞彙＋比較。","note":"【正解】more valuable「更有價值的」，志工雖無酬勞卻認為經驗比金錢更有價值，語意與 than 的比較結構都合。\n【誘答】(A) more expensive「更貴」雖聯想到金錢，但「經驗比金錢更貴」語意不通（金錢本身無貴賤）；(B) more careful「更小心」、(D) more famous「更有名」都無法描述「經驗與金錢的價值高低」，須用 more valuable。\n【重點】詞彙＋比較級：valuable→more valuable，後接 than 帶出比較對象。\n【句意】雖然志工沒有酬勞，但大多數人都認為這段經驗比金錢更有價值。"},{"n":28,"type":"連接詞","options":{"A":"and","B":"but","C":"or","D":"nor"},"answer":"A","explain_zh":"(A) and：care… and grow… 動作並列，考連接詞。","note":"【正解】care about… and grow into… 兩個動作語意順承並列，用 and 連接。\n【誘答】(B) but 表轉折、(C) or 表選擇，都不符兩個正面成長動作的並列；(D) nor 需搭配否定與倒裝，結構也不合，此處用 and 連接語意一致的並列動作。\n【重點】連接詞 and 連接語意一致的並列動作。\n【句意】透過服務他人，年輕人慢慢學會關心自己的社區，並成長為更負責任的公民。"}]}],"vocab":["attention","health","healthy","exercise","jog","cycle","reduce","stress","schedule","volunteer","community","valuable","responsible","citizen"]},{"id":4,"passages":[{"label":"A","title_zh":"珍珠奶茶的流行","text":"Bubble tea is one of the most famous drinks that Taiwan has [[21]] to the world. It is made of tea, milk, sugar, and the soft, chewy balls we call pearls. Over the past few years, this sweet drink has become so [[22]] that you can find bubble tea shops in almost every country. Many young people enjoy it not only [[23]] its rich taste but also because it is fun to drink. If you ever travel abroad, you may be surprised [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"returned","B":"compared","C":"introduced","D":"added"},"answer":"C","explain_zh":"(C) introduced：台灣把珍奶「引進」給世界，考動詞詞彙。","note":"【正解】introduce…to…「把……引進、介紹給……」，台灣把珍奶介紹給世界，語意與搭配都合。\n【誘答】(A) return…to「歸還給」，台灣並非把珍奶「還」給世界；(B) compare…to「把……比作」語意不合；(D) add…to「增添到」，「把飲料加到世界」語意突兀，都不如 introduce…to「介紹給」貼切。\n【重點】詞彙＋搭配：introduce A to B。現在完成式 has introduced 表至今造成的影響。\n【句意】珍珠奶茶是台灣介紹給全世界最有名的飲料之一。"},{"n":22,"type":"詞彙","options":{"A":"popular","B":"expensive","C":"sweet","D":"strange"},"answer":"A","explain_zh":"(A) popular：飲料變得如此「受歡迎」，考形容詞詞彙。","note":"【正解】so…that…句型，前面說飲料變得如此「受歡迎」，才會造成後面各國都有店，因果通順。\n【誘答】(B) expensive「昂貴」無法解釋「各國都開店」的結果；(C) sweet「甜」雖呼應前文，但甜不會造成全球開店，因果不合；(D) strange「奇怪」語意不合，只有 popular 能帶出 so…that 的因果。\n【重點】句型 so + 形容詞 + that 子句「如此……以致於……」。popular＝受歡迎。\n【句意】過去幾年，這款甜飲變得如此受歡迎，幾乎在每個國家都能找到珍奶店。"},{"n":23,"type":"連接詞","options":{"A":"because","B":"in spite of","C":"regardless of","D":"because of"},"answer":"D","explain_zh":"(D) because of：與後面 but also because 對稱，表原因，考連接詞。","note":"【正解】not only…but also… 對稱結構，後半是 because + 子句，前半接名詞 its rich taste，須用 because of（後接名詞）表原因。\n【誘答】(A) because 後須接子句，不能直接接名詞 its rich taste（此處要用 because of）；(B) in spite of「儘管」、(C) regardless of「不管」都是讓步語氣，與 not only…but also 並列「原因」不合。\n【重點】because of + 名詞 ↔ because + 子句。此題考「原因」的介系詞片語。\n【句意】許多年輕人喜歡它，不只因為它濃郁的味道，也因為喝起來很有趣。"},{"n":24,"type":"整句語意","options":{"A":"to find that nobody there has heard of it","B":"to see a Taiwanese drink loved by people there","C":"because local people there strongly dislike it","D":"so that you will stop drinking it forever"},"answer":"B","explain_zh":"(B) 呼應「到國外會驚訝地發現台灣飲料受喜愛」，考整句語意。","note":"【正解】前句說出國可能會驚訝，(B)「看到台灣飲料受當地人喜愛」正是令人驚訝的內容，也呼應全文珍奶紅遍全球。\n【誘答】(A)「發現當地沒人聽過它」與珍奶紅遍全球矛盾；(C)「因為當地人很討厭它」與全文正面語氣不合；(D)「好讓你再也不喝」不但語意突兀，be surprised 也不接 so that 子句。\n【重點】整句語意題：be surprised + to V 表「驚訝地做／發現……」，要選與全文一致的內容。\n【句意】如果你有機會出國，可能會驚訝地看到台灣的飲料在當地大受喜愛。"}]},{"label":"B","title_zh":"環保吸管與減塑","text":"Every year, people throw away millions of plastic straws after using them just once. These straws are hard to break down, so they often end up in the sea and [[25]] the ocean. To solve this problem, many shops in Taiwan now ask customers to bring their own cups or [[26]] reusable straws made of metal or glass. Some restaurants even stop offering plastic straws [[27]] the law asks them to cut down on waste. Small daily choices like these can help [[28]].","blanks":[{"n":25,"type":"詞彙","options":{"A":"cross","B":"pollute","C":"fill","D":"save"},"answer":"B","explain_zh":"(B) pollute：塑膠吸管「汙染」海洋，考動詞詞彙。","note":"【正解】pollute the ocean「汙染海洋」，塑膠吸管流入海裡並汙染海洋，語意一致。\n【誘答】(A) cross the ocean「橫渡海洋」，塑膠吸管並非橫渡；(C) fill「填滿」語意誇張且不合；(D) save「拯救」與汙染語意相反，只有 pollute「汙染」符合前後文。\n【重點】詞彙：pollute（動詞，汙染）→ pollution（名詞）。\n【句意】這些吸管很難分解，因此常常流入海中並汙染海洋。"},{"n":26,"type":"詞彙","options":{"A":"throw","B":"waste","C":"sell","D":"use"},"answer":"D","explain_zh":"(D) use：「使用」可重複利用的吸管，考動詞詞彙。","note":"【正解】use reusable straws「使用可重複使用的吸管」，與前面 bring their own cups 並列，都是環保做法。\n【誘答】(A) throw「丟棄」、(B) waste「浪費」都與「重複使用」的環保用意相反；(C) sell「販售」，顧客是被請來自備或使用吸管，不是賣吸管，都不合，須用 use。\n【重點】詞彙＋語意連貫：or 連接的兩個動作方向要一致（自備杯子／使用環保吸管）。\n【句意】許多店家現在請顧客自備杯子，或使用金屬、玻璃製的環保吸管。"},{"n":27,"type":"連接詞","options":{"A":"because","B":"so","C":"though","D":"until"},"answer":"A","explain_zh":"(A) because：後句說明停用塑膠吸管的原因，考連接詞。","note":"【正解】前句說餐廳停止提供塑膠吸管，後句說明「因為法律要求減量」，前後因果，用 because。\n【誘答】(B) so「所以」表結果，因果倒置；(C) though「雖然」表讓步，語氣相反；(D) until「直到」表時間，都不符「停止提供塑膠吸管是因為法律要求減量」的因果，須用 because。\n【重點】連接詞 because 表原因。片語 cut down on N＝「減少……」。\n【句意】有些餐廳甚至停止提供塑膠吸管，因為法律要求他們減少廢棄物。"},{"n":28,"type":"整句語意","options":{"A":"add far more plastic waste to the sea","B":"keep the oceans full of plastic straws","C":"make the earth a cleaner and greener place","D":"make plastic straws much cheaper to buy"},"answer":"C","explain_zh":"(C) 呼應「日常小選擇能讓地球更乾淨」，考整句語意。","note":"【正解】前句說日常小選擇有幫助，(C)「讓地球變得更乾淨、更環保」呼應全文減塑環保主題，語意最合。\n【誘答】(A)「把更多塑膠垃圾丟進海裡」與減塑相反；(B)「讓海洋永遠充滿塑膠吸管」與環保矛盾；(D)「讓塑膠吸管買起來更便宜」不是減塑的結論，都與全文環保主旨不符。\n【重點】整句語意題：help (to) V，選符合全文環保結論的選項。\n【句意】像這樣的日常小選擇，能幫助讓地球成為更乾淨、更環保的地方。"}]}],"vocab":["bubble tea","chewy","pearl","introduce","popular","abroad","plastic","straw","reusable","pollute","waste","greener"]},{"id":5,"passages":[{"label":"A","title_zh":"台灣高鐵","text":"The Taiwan High Speed Rail has completely changed the way people travel on the island. Before it was built, a trip from Taipei to Kaohsiung [[21]] about four and a half hours by regular train. Now the same trip takes less than two hours, which is much [[22]] than before. Many business people take the high speed rail every day [[23]] it is fast, clean, and always on time. Thanks to this modern train, living in one city and working in another [[24]].","blanks":[{"n":21,"type":"語法","options":{"A":"has taken","B":"took","C":"was taking","D":"was taken"},"answer":"B","explain_zh":"(B) took：Before it was built 為過去，用過去式 took，考時態。","note":"【正解】時間狀語 Before it was built 指過去（高鐵蓋好前），故主要子句用過去式 took，表「以前約要花四個半小時」。\n【誘答】(A) has taken 現在完成式與「Before it was built」的過去時間點衝突；(C) was taking 過去進行式，此處為一般習慣事實，非當下進行的動作；(D) was taken 被動語態，take + 時間表「花費」不用被動。\n【重點】時態一致：由 Before it was built 判斷用過去式。take + 時間＝「花費（時間）」。\n【句意】在高鐵興建之前，從台北到高雄搭一般火車大約要花四個半小時。"},{"n":22,"type":"語法","options":{"A":"more fast","B":"as fast","C":"fastest","D":"faster"},"answer":"D","explain_zh":"(D) faster：與 than 連用的比較級，考語法。","note":"【正解】後面有 than，需用比較級 faster；much 也是用來加強比較級，表示「比以前快很多」。\n【誘答】(A) more fast 比較級構詞錯誤，單音節 fast 的比較級是 faster，不加 more；(B) as fast 屬 as...as 結構，須搭配 as 而非 than；(C) fastest 為最高級，不與 than 連用。\n【重點】比較級 + than。訊號詞 than 與 much（加強比較級）。\n【句意】現在同樣的路程不到兩小時，比以前快很多。"},{"n":23,"type":"連接詞","options":{"A":"because","B":"so","C":"although","D":"if"},"answer":"A","explain_zh":"(A) because：後句說明搭高鐵的原因，考連接詞。","note":"【正解】後句列出高鐵快速、乾淨、準時，是搭高鐵的原因，用 because 引導原因子句。\n【誘答】(B) so 表結果，因果方向相反（後句是原因而非結果）；(C) although 表讓步，與正面理由矛盾；(D) if 表條件假設，無法表達既定的原因。\n【重點】連接詞 because 表原因。\n【句意】許多商務人士每天搭高鐵，因為它又快、又乾淨，而且總是準時。"},{"n":24,"type":"整句語意","options":{"A":"are now common among many young workers","B":"has become a real headache for most families","C":"has become much easier than in the past","D":"because the tickets are much cheaper now"},"answer":"C","explain_zh":"(C) 呼應高鐵讓跨城市通勤「更容易」，考整句語意。","note":"【正解】前文說高鐵大幅縮短通勤時間，(C)「住一城、在另一城工作變得比以前容易多了」正好呼應這個好處。\n【誘答】(A) are now common among many young workers：主詞 living…and working… 為動名詞單數，需單數動詞，are 主謂不一致；(B) has become a real headache for most families 文法正確但語意轉為負面，與「多虧高鐵」的正面語氣矛盾；(D) because the tickets are much cheaper now 為原因子句，無法充當主要子句的述語，結構不完整。\n【重點】整句語意題：主詞 living…and working… 為動名詞當單數主詞，接單數動詞（has become）。\n【句意】多虧這種現代化列車，住在一個城市、在另一個城市工作已經比過去容易多了。"}]},{"label":"B","title_zh":"大眾運輸通勤","text":"In big cities like Taipei, more and more people choose public transport to [[25]] to work every morning. Taking the MRT or bus is often cheaper and less stressful than [[26]] a car in heavy traffic. Riders do not have to worry about finding a parking space, [[27]] they can read or rest during the trip. Besides saving money, using public transport is also good for the environment [[28]]. That is why so many workers leave their cars at home.","blanks":[{"n":25,"type":"詞彙","options":{"A":"arrive","B":"reach","C":"commute","D":"drive"},"answer":"C","explain_zh":"(C) commute：每天「通勤」上班，考動詞詞彙。","note":"【正解】commute to work「通勤上班」，用大眾運輸每天往返上班，語意與全文通勤主題一致。\n【誘答】(A) arrive 搭配錯誤，應為 arrive at work，非 arrive to work；(B) reach 為及物動詞，直接接 reach work，不加 to；(D) drive「開車」與「選擇大眾運輸」相矛盾。\n【重點】詞彙：commute（通勤）常搭 to work／between cities。\n【句意】在台北這樣的大城市，越來越多人選擇搭大眾運輸每天早上通勤上班。"},{"n":26,"type":"語法","options":{"A":"driving","B":"to drive","C":"having driven","D":"drove"},"answer":"A","explain_zh":"(A) driving：than 後與前面對稱用動名詞，考詞形。","note":"【正解】than 前面是動名詞概念（Taking the MRT or bus），為求對稱須用動名詞 driving。\n【誘答】(B) to drive 為不定詞，與前面的動名詞 Taking 不平行；(C) having driven 為完成式動名詞，體貌不符，無法與簡單式 Taking 對稱；(D) drove 為過去式限定動詞，無法與動名詞 Taking 平行。\n【重點】詞形＋平行結構：比較兩件事時前後動詞形式要一致，這裡用 Ving。\n【句意】搭捷運或公車通常比在壅塞車陣中開車更便宜，也比較沒有壓力。"},{"n":27,"type":"連接詞","options":{"A":"yet","B":"or","C":"for","D":"and"},"answer":"D","explain_zh":"(D) and：連接兩個好處，語意順承，考連接詞。","note":"【正解】前句說不必煩惱停車，後句說可以看書或休息，兩個好處語意順承並列，用 and。\n【誘答】(A) yet 表對比轉折，前後兩個好處並非相對；(B) or 表二選一，但看書與休息是同時並存的好處，非選擇；(C) for「因為」會使後句變成前句的原因，但「能看書休息」並非「不必找車位」的原因，邏輯倒置。\n【重點】連接詞 and 連接語意一致的並列句。\n【句意】乘客不必擔心找停車位，而且可以在旅途中看書或休息。"},{"n":28,"type":"整句語意","options":{"A":"as long as everyone drives to work instead","B":"because it helps to reduce air pollution","C":"which produces far more waste each year","D":"so the streets become more crowded than ever"},"answer":"B","explain_zh":"(B) 呼應大眾運輸「對環境好」的原因，考整句語意。","note":"【正解】前句說大眾運輸對環境好，(B)「因為有助於減少空氣污染」說明對環境好的原因，前後呼應。\n【誘答】(A) as long as everyone drives to work instead 表條件，且「改開車」與環保及全文搭大眾運輸的主旨矛盾；(C) which produces far more waste each year「製造更多廢棄物」與「對環境好」相反；(D) so the streets become more crowded than ever「街道更擁擠」與大眾運輸減少擁擠的好處矛盾。\n【重點】整句語意題：選符合「對環境好」原因的 because 子句。help to V＝有助於……。\n【句意】除了省錢，使用大眾運輸也對環境有益，因為它有助於減少空氣污染。"}]}],"vocab":["high speed rail","regular","business","modern","public transport","commute","traffic","parking","reduce","pollution","stressful","environment"]},{"id":6,"passages":[{"label":"A","title_zh":"行動支付","text":"These days, many people in Taiwan pay for things with their phones instead of cash. This way of paying is [[21]] mobile payment. To use it, you only need to open an app and let the shop scan a simple code. It is quick and safe, so shoppers no longer need to [[22]] a lot of coins and bills. Older people may find it a little hard [[23]] first, but most of them soon get used to it. In the future, going out without a wallet [[24]].","blanks":[{"n":21,"type":"語法","options":{"A":"to call","B":"calls","C":"being called","D":"called"},"answer":"D","explain_zh":"(D) called：be called「被稱為」的被動用法，考語態。","note":"【正解】主詞 This way of paying 前面已有 be 動詞 is，後面要用過去分詞 called 構成被動語態 be called「被稱為」，A is called B 表示「A 被稱作 B」。\n【誘答】(X) A to call：is to call 表「將要/應該稱呼」的安排或義務，非陳述「被稱為」的事實；(X) B calls 為主動第三人稱單數，但此付款方式是「被」命名，語意需被動；(X) D being called：is being called 為進行式被動，暗示暫時進行的動作，但名稱為恆常事實，應用簡單被動 is called。\n【重點】被動語態公式 be + 過去分詞(p.p.)；固定句型 A is called B「A 被叫做 B」。例：This animal is called a panda.\n【句意】這種付款方式被稱為行動支付。"},{"n":22,"type":"詞彙","options":{"A":"count","B":"carry","C":"collect","D":"save"},"answer":"B","explain_zh":"(B) carry：不必再「攜帶」大量零錢紙鈔，考動詞詞彙。","note":"【正解】carry 是「攜帶、隨身帶」，因為有行動支付，購物者不必再帶一堆零錢和鈔票，語意最通順。\n【誘答】(X) B count「數（錢）」，與「不必攜帶現金」的重點不符；(X) C collect「收集、累積」，語意偏向蒐集而非隨身攜帶；(X) D save「儲存、存錢」，行動支付並未免去存錢，邏輯不合。carry 才是「隨身攜帶現金」之意。\n【重點】動詞辨義 carry「攜帶」；need to + 原形動詞（to 後面接原形 V）。\n【句意】它又快又安全，所以購物者不再需要攜帶大量的零錢和紙鈔。"},{"n":23,"type":"介系詞","options":{"A":"in","B":"on","C":"at","D":"of"},"answer":"C","explain_zh":"(C) at：at first「一開始」的固定用法，考介系詞。","note":"【正解】at first 是固定片語，意思是「起初、一開始」，符合「年長者一開始覺得難，但後來就習慣」的轉折。\n【誘答】(X) B in first、(X) C on first、(X) D of first 都不是正確搭配，表示「起初」時 first 前面只能用 at。\n【重點】at first「一開始」固定用法，常與後面的轉折 but 呼應；可對比 at last「最後、終於」。\n【句意】年長者一開始可能覺得有點難，但大多數人很快就習慣了。"},{"n":24,"type":"整句語意","options":{"A":"may become a very normal thing for us","B":"was quite unusual in the past","C":"will trouble people who love using cash","D":"may leave you unable to buy anything at all"},"answer":"A","explain_zh":"(A) 呼應「未來不帶錢包出門很平常」，考整句語意。","note":"【正解】(A) may become a very normal thing for us 呼應全文正面觀點：未來不帶錢包出門會變得很平常，語意與結構都合理。\n【誘答】(X) B was quite unusual in the past 用過去式，與句首「In the future」的未來時間矛盾；(X) C will trouble people who love using cash 語氣負面，與全文「大家很快習慣、正面看待」的趨勢不符；(X) D may leave you unable to buy anything at all 邏輯相反——行動支付正是讓人不帶錢包也能購物。\n【重點】整句語意判讀，要跟全文的正面態度一致；動名詞 going out 當主詞視為單數。\n【句意】未來，不帶錢包出門對我們來說可能會變成一件很平常的事。"}]},{"label":"B","title_zh":"網路購物宅配","text":"Online shopping has become a big part of daily life for many families in Taiwan. With just a few clicks, people can order almost anything and have it [[25]] right to their door. This service saves shoppers a lot of time [[26]] they do not need to go to the store themselves. However, buyers should be careful, [[27]] some products may look better in the photos than in real life. When the box finally arrives, it always feels exciting [[28]].","blanks":[{"n":25,"type":"語法","options":{"A":"delivered","B":"to deliver","C":"delivering","D":"delivery"},"answer":"A","explain_zh":"(A) delivered：have it delivered「使被送到」的被動，考語法。","note":"【正解】have + 受詞 + 過去分詞 表示「使某物被…」，商品 it 是「被」送到，所以用過去分詞 delivered，即 have it delivered「讓它被送到」。\n【誘答】(X) A to deliver 為不定詞，have + 受詞 + to V 非此處的使役被動句型；(X) B delivering 為現在分詞表主動進行，但商品是「被」送達；(X) D delivery 為名詞，have it delivery 結構不通。\n【重點】使役動詞句型 have + 受詞 + p.p.（受詞和動作是被動關係）。例：I had my hair cut.\n【句意】只要點幾下，人們幾乎什麼都能訂，並讓商品直接宅配到家門口。"},{"n":26,"type":"連接詞","options":{"A":"so that","B":"even though","C":"because","D":"as long as"},"answer":"C","explain_zh":"(C) because：後句說明省時間的原因，考連接詞。","note":"【正解】because 引導原因子句，後句「不必自己去店裡」正是「省時間」的原因，前後為因果關係。\n【誘答】(X) B so that 表目的「以便」，但後句是省時間的原因而非目的，因果性質不符；(X) C even though「即使」表讓步，語意矛盾；(X) D as long as「只要」表條件，非因果。\n【重點】because 引導表原因的副詞子句，回答「為什麼」。\n【句意】這項服務為購物者省下許多時間，因為他們不必自己去店裡。"},{"n":27,"type":"連接詞","options":{"A":"so","B":"for","C":"yet","D":"nor"},"answer":"B","explain_zh":"(B) for：引出前面「要小心」的理由，考連接詞。","note":"【正解】for 當對等連接詞時意思是「因為」，前面有逗號，用來補充說明「要小心」的理由（照片可能比實物好看）。\n【誘答】(X) A so 表結果，因果方向相反；(X) B yet 表轉折對比，但後句是「要小心」的理由而非轉折；(X) D nor 表否定並列，須搭配前面否定並倒裝，此處結構不合。\n【重點】對等連接詞 for「因為」，通常放在逗號後，引出前面句子的理由；語氣比 because 弱。\n【句意】不過買家要小心，因為有些商品在照片裡看起來比實物好。"},{"n":28,"type":"整句語意","options":{"A":"that the delivery was totally free","B":"to wait several more weeks for it","C":"for the box to get lost again","D":"to open it and see what you have bought"},"answer":"D","explain_zh":"(D) 呼應「收到包裹打開很興奮」，考整句語意。","note":"【正解】(D) to open it and see what you have bought 用不定詞說明「令人興奮」的內容，呼應收到包裹、打開來看的期待感。\n【誘答】(X) B that the delivery was totally free 文法雖通，但「免運」與「打開包裹的興奮」無關，是離題細節；(X) C to wait several more weeks for it 與前句「包裹終於送達」矛盾（已經到了）；(X) D for the box to get lost again「包裹又弄丟」語意負面，與令人興奮相反，也與已送達矛盾。\n【重點】整句語意；句型 it feels exciting to V「做某事令人興奮」，it 為虛主詞。\n【句意】當包裹終於送達，打開來看看自己買了什麼，總是令人興奮。"}]}],"vocab":["cash","mobile payment","scan","wallet","online","click","deliver","service","product","arrive","coin","bill"]},{"id":7,"passages":[{"label":"A","title_zh":"健康的早餐","text":"Many students are always in a hurry in the morning, so they often skip breakfast before going to school. However, doctors say that breakfast is the most [[21]] meal of the day. A good breakfast gives us the energy we need [[22]] we can stay awake and focus in class. Foods like eggs, milk, and fruit are much [[23]] for us than sweet cakes or chips. If you want to do well at school, you should remember [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"important","B":"delicious","C":"expensive","D":"special"},"answer":"A","explain_zh":"(A) important：早餐是最「重要」的一餐，考形容詞詞彙。","note":"【正解】important 是「重要的」，後文舉例「早餐提供能量、幫助專心」，說明它是最重要的一餐，語意最合。\n【誘答】(X) A delicious「美味的」文法可通，但後文強調「提供能量、幫助專心」是重要性，非口味；(X) C expensive「昂貴的」與能量、專注的論述無關；(X) D special「特別的」語意空泛，非醫生強調的「重要」。\n【重點】最高級 the most + 多音節形容詞；afraid 為敘述性形容詞，多作主詞補語，不放名詞前。\n【句意】醫生說早餐是一天中最重要的一餐。"},{"n":22,"type":"連接詞","options":{"A":"now that","B":"even though","C":"so that","D":"as long as"},"answer":"C","explain_zh":"(C) so that：引出「以便能專心」的目的，考連接詞。","note":"【正解】so that 引導目的副詞子句「以便、為了」，後面接助動詞 can，說明吃早餐是為了能保持清醒、專心。\n【誘答】(X) B now that「既然、由於現在」表原因，非目的；(X) C even though「即使」表讓步，語意矛盾；(X) D as long as「只要」表條件，非目的。so that + can 才表「以便能…」。\n【重點】so that + 主詞 + can/could + 原形V「以便…」表目的。\n【句意】好的早餐給我們所需的能量，好讓我們在課堂上保持清醒、專注。"},{"n":23,"type":"語法","options":{"A":"more good","B":"better","C":"well","D":"best"},"answer":"B","explain_zh":"(B) better：與 than 連用的比較級，考語法。","note":"【正解】句中有 than，表示兩者相比，形容詞要用比較級 better（good 的比較級），且 much 是用來加強比較級。\n【誘答】(X) A more good 為錯誤的雙重比較級，good 的比較級是 better，不用 more；(X) B well 為副詞（或作「健康的」解），此處 be 動詞後需形容詞當補語，且不與 than 相比；(X) D best 為最高級，用於三者以上，不與 than 兩者相比。\n【重點】比較級 + than「比…更…」；much/far/even 可加強比較級。\n【句意】像蛋、牛奶、水果這類食物，對我們來說比甜蛋糕或洋芋片好多了。"},{"n":24,"type":"整句語意","options":{"A":"eating cakes and chips every single morning","B":"to skip your meals whenever you feel busy","C":"that breakfast is not worth your time","D":"to start each day with a healthy breakfast"},"answer":"D","explain_zh":"(D) 呼應「要吃健康早餐」的建議，考整句語意。","note":"【正解】(D) to start each day with a healthy breakfast 用不定詞當 remember 的受詞，remember to V「記得要做某事」，呼應吃健康早餐的建議。\n【誘答】(X) B eating cakes and chips every single morning：remember + Ving 表「記得做過（過去）」，此處是建議未來要做，且吃蛋糕洋芋片與健康建議相反；(X) C to skip your meals whenever you feel busy 結構雖為 remember to V，但「不吃正餐」正是全文告誡的壞習慣，語意矛盾；(X) D that breakfast is not worth your time「早餐不值得花時間」與全文強調早餐重要相反。\n【重點】remember to V「記得去做（還沒做）」對比 remember Ving「記得做過（已做）」。\n【句意】如果你想在學校表現好，就應該記得每天以健康的早餐開始。"}]},{"label":"B","title_zh":"含糖飲料的問題","text":"On hot days, a cold and sweet drink sounds like a wonderful idea. Yet many people do not know how much sugar these drinks really [[25]]. Drinking too much sugar can lead to weight problems and even [[26]] our teeth over time. Some students buy a sugary drink every day [[27]] they feel tired without one. To stay healthy, doctors suggest that we drink more water and [[28]].","blanks":[{"n":25,"type":"詞彙","options":{"A":"add","B":"cost","C":"waste","D":"contain"},"answer":"D","explain_zh":"(D) contain：飲料「含有」多少糖，考動詞詞彙。","note":"【正解】contain 是「含有、內含」，指這些飲料裡面含有多少糖，語意最合。\n【誘答】(X) B add「添加」需有施加的對象（add sugar to…），以飲料當主詞說「飲料添加糖」語意不合；(X) C cost「花費」與金錢、價格搭配，非指含糖量，易受 how much 誘導誤選；(X) D waste「浪費」語意不合。contain 才是「內含」。\n【重點】動詞辨義 contain「內含」；how much + 不可數名詞 sugar「多少糖」。\n【句意】然而很多人不知道這些飲料其實含有多少糖。"},{"n":26,"type":"詞彙","options":{"A":"brush","B":"harm","C":"protect","D":"lose"},"answer":"B","explain_zh":"(B) harm：糖會「傷害」牙齒，考動詞詞彙。","note":"【正解】harm 是「傷害、危害」，攝取太多糖會傷害牙齒，符合負面後果的語意。\n【誘答】(X) A brush 雖與 teeth 搭配（brush our teeth），但主詞是糖，「糖刷牙齒」施事者不合邏輯；(X) C protect「保護」語意相反，與「太多糖」的害處矛盾；(X) D lose「失去」，人才會 lose teeth，「糖使牙齒 lose」主詞邏輯不合，須用使役結構。harm 才表「危害牙齒」。\n【重點】動詞辨義 harm「危害」；and even 連接 lead 與 harm 兩個並列動詞。\n【句意】攝取太多糖會導致體重問題，久而久之甚至會傷害牙齒。"},{"n":27,"type":"連接詞","options":{"A":"so that","B":"even though","C":"because","D":"as if"},"answer":"C","explain_zh":"(C) because：後句說明每天買含糖飲料的原因，考連接詞。","note":"【正解】because 引導原因子句，說明「每天買含糖飲料」的原因是「沒喝就覺得累」。\n【誘答】(X) B so that 表目的，但「沒喝就覺得累」是購買的原因而非目的，因果倒置；(X) C even though「即使」表讓步，語意矛盾；(X) D as if「彷彿」表比喻/假設，非陳述原因。\n【重點】because 引導表原因的副詞子句。\n【句意】有些學生每天買一杯含糖飲料，因為沒喝就覺得累。"},{"n":28,"type":"整句語意","options":{"A":"cut down on sweet drinks little by little","B":"choose sugar-free drinks instead of water","C":"keep a cold soda with us at all times","D":"add a little honey to every drink"},"answer":"A","explain_zh":"(A) 呼應「多喝水並減少甜飲」的建議，考整句語意。","note":"【正解】(A) cut down on sweet drinks little by little 與前面 drink more water 並列，同為健康建議，呼應全文主旨。\n【誘答】(X) B choose sugar-free drinks instead of water 看似健康，卻與前面「多喝水」矛盾（捨水而就其他飲料）；(X) C keep a cold soda with us at all times 與「減少含糖飲料」矛盾；(X) D add a little honey to every drink 加糖蜜與「減糖」的建議相反。\n【重點】整句語意；片語 cut down on「減少（攝取）」；建議句 suggest (that) we (should) 後接原形，drink 與 cut 並列。\n【句意】為了保持健康，醫生建議我們多喝水，並慢慢減少甜飲。"}]}],"vocab":["skip","breakfast","meal","energy","focus","healthy","sugar","contain","harm","weight","suggest","little by little"]},{"id":8,"passages":[{"label":"A","title_zh":"泡溫泉與國內旅遊","text":"When winter comes, hot springs become one of the most popular places for travel in Taiwan. Sitting in the warm water is a great way to [[21]] after a long week of work or study. Many hot spring towns, such as Beitou and Jiaoxi, welcome [[22]] of visitors during the cold season. People enjoy the springs not only for fun [[23]] also for their health. If you have never tried it, a weekend trip to a hot spring [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"exercise","B":"worry","C":"relax","D":"rush"},"answer":"C","explain_zh":"(C) relax：泡溫泉能「放鬆」，考動詞詞彙。","note":"【正解】relax 是「放鬆」，泡在溫水裡是辛苦一週後放鬆的好方法，語意最合。\n【誘答】(X) B exercise「運動」，泡在溫水裡是被動放鬆而非運動，與語境不符；(X) C worry「擔憂」語意與放鬆相反；(X) D rush「趕、衝」與辛苦一週後的放鬆相反。\n【重點】a great way to V「…的好方法」；動詞辨義 relax。\n【句意】在辛苦工作或讀書一週後，泡在溫水裡是很好的放鬆方式。"},{"n":22,"type":"詞彙","options":{"A":"thousands","B":"amounts","C":"pieces","D":"kinds"},"answer":"A","explain_zh":"(A) thousands：thousands of「成千上萬的」遊客，考名詞詞彙。","note":"【正解】thousands of 是「成千上萬的」，thousands 用複數再加 of，形容大量遊客。\n【誘答】(X) B amounts：amount(s) of 接不可數名詞，visitors 為可數，應用 numbers/thousands，不用 amounts；(X) C pieces：piece of 用於不可數（a piece of paper），visitors 可數不合；(X) D kinds：kinds of 指「種類」，語意變成「各種遊客」而非「大量遊客」，與強調數量的語境不符。\n【重點】thousands of + 複數名詞「數以千計」（沒有確切數字時，hundred/thousand 等要用複數加 of）。\n【句意】許多溫泉小鎮，如北投和礁溪，在寒冷季節迎接成千上萬的遊客。"},{"n":23,"type":"連接詞","options":{"A":"and","B":"or","C":"yet","D":"but"},"answer":"D","explain_zh":"(D) but：not only...but also 的固定搭配，考連接詞。","note":"【正解】but 與前面的 not only 構成相關連接詞 not only... but also「不只…而且…」，是固定搭配。\n【誘答】(X) B and 雖有 and also 的說法，但與 not only 搭配的固定用語是 but also，故不可用 and；(X) C or 表選擇，無法與 not only…also 組成正確關聯詞；(X) D yet 雖為轉折詞，但 not only 的固定搭配是 but also，非 yet also。\n【重點】相關連接詞 not only A but also B「不但 A 而且 B」。\n【句意】人們喜歡溫泉不只是為了樂趣，也是為了健康。"},{"n":24,"type":"整句語意","options":{"A":"are a great choice for the whole family","B":"is surely worth a try this winter","C":"might feel too hot for most people","D":"used to be popular many years ago"},"answer":"B","explain_zh":"(B) 呼應「值得一試」的建議，考整句語意。","note":"【正解】(B) is surely worth a try this winter 呼應鼓勵讀者嘗試的語氣，主詞 a weekend trip 為單數，用 is。\n【誘答】(X) B are a great choice for the whole family：主詞 a weekend trip 為單數，需用 is，are 主謂不一致；(X) C might feel too hot for most people 語氣負面勸退，與鼓勵嘗試的語氣矛盾；(X) D used to be popular many years ago 暗示現在已不流行，與全文「溫泉正夯」矛盾。\n【重點】整句語意；片語 be worth + 名詞/Ving「值得…」。\n【句意】如果你從沒試過，這個冬天來趟溫泉週末旅行絕對值得一試。"}]},{"label":"B","title_zh":"民宿住宿體驗","text":"More and more travelers in Taiwan choose to stay in a homestay instead of a big hotel. A homestay is usually a small, warm place [[25]] by a local family. Guests there often feel at home [[26]] the owners treat them like friends. The hosts are happy to share tips about the best food and views [[27]] their town. Staying in a homestay is a wonderful way [[28]].","blanks":[{"n":25,"type":"語法","options":{"A":"running","B":"run","C":"runs","D":"is run"},"answer":"B","explain_zh":"(B) run：過去分詞 run by a family「由一家人經營」修飾 place，考詞形/被動。","note":"【正解】用過去分詞 run（run 的過去分詞仍是 run）組成分詞片語 run by a local family，修飾前面的 place，表被動「由當地家庭經營的」，相當於 which is run by。\n【誘答】(X) B running 為現在分詞表主動，但民宿是「被」經營，需被動；(X) C runs 為限定動詞，place runs by… 缺關係代名詞，結構不通；(X) D is run 為完整被動子句，但句中已有 is（A homestay is…），再加 is run 會有兩個動詞，結構重複。\n【重點】過去分詞片語當形容詞後位修飾名詞（= 關係子句 which is + p.p.）。\n【句意】民宿通常是一個由當地家庭經營、又小又溫馨的地方。"},{"n":26,"type":"連接詞","options":{"A":"so that","B":"even though","C":"whether","D":"because"},"answer":"D","explain_zh":"(D) because：後句說明賓至如歸的原因，考連接詞。","note":"【正解】because 引導原因子句，說明客人賓至如歸的原因是「主人把他們當朋友」。\n【誘答】(X) B so that 表目的，但「主人待客如友」是賓至如歸的原因而非目的，因果倒置；(X) C even though「即使」表讓步，語意矛盾；(X) D whether「是否」引導名詞子句，語意不通。\n【重點】because 引導原因子句；片語 feel at home「感到自在、賓至如歸」。\n【句意】客人在那裡常有賓至如歸的感覺，因為主人把他們當朋友對待。"},{"n":27,"type":"介系詞","options":{"A":"in","B":"at","C":"on","D":"to"},"answer":"A","explain_zh":"(A) in：views in their town「鎮上的景點」，考介系詞。","note":"【正解】in 表「在…範圍之內」，views in their town 指「他們鎮上的景點」，與地方搭配最自然。\n【誘答】(X) B at 用於「點」的位置，不適合表達「在鎮內範圍」的美食與景色；(X) C on 表在表面/接觸，語意不合；(X) D to 表方向，food and views to their town 結構不通。in + 地方表「在某範圍之內」最貼切。\n【重點】in + 地方（表在某範圍內）；in their town「在他們的鎮上」。\n【句意】主人樂於分享鎮上最棒的美食與景點的資訊。"},{"n":28,"type":"整句語意","options":{"A":"to avoid meeting the local people there","B":"of making your trip more expensive","C":"to learn about the real life of a place","D":"to stay far away from any real culture"},"answer":"C","explain_zh":"(C) 呼應「認識當地真實生活」，考整句語意。","note":"【正解】(C) to learn about the real life of a place 用不定詞說明 way 的內容，呼應住民宿能認識當地真實生活的主旨。\n【誘答】(X) B to avoid meeting the local people there 與民宿「認識當地、待客如友」的主旨相反；(X) C of making your trip more expensive「讓旅行更花錢」語氣負面，與民宿溫馨實惠的優點不符；(X) D to stay far away from any real culture 與「認識當地真實生活」矛盾。\n【重點】a wonderful way to V「…的絕佳方式」；整句語意。\n【句意】住民宿是認識一個地方真實生活的絕佳方式。"}]}],"vocab":["hot spring","relax","season","visitor","health","homestay","local","host","guest","owner","view","worth"]},{"id":9,"passages":[{"label":"A","title_zh":"智慧型手機與學生","text":"Today almost every high school student in Taiwan owns a smartphone. These small machines are really [[21]]: we can look up new words, watch lessons, and talk with friends in seconds. However, some students spend too many hours playing games [[22]] they should be studying. Using a phone late at night can also make them tired and [[23]] to focus the next day. To do well in school, students need to learn [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"useful","B":"boring","C":"silent","D":"empty"},"answer":"A","explain_zh":"(A) useful：手機很「有用」，考形容詞詞彙。","note":"【正解】useful 是「有用的」，後面舉例「查單字、看課程、聊天」都在說明手機的用處，語意最合。\n【誘答】(X) B boring「無聊的」與後文好處矛盾；(X) C silent「安靜的」語意不合；(X) D empty「空的」語意不合。\n【重點】形容詞辨義 useful；really 加強語氣修飾形容詞。\n【句意】這些小機器真的很有用：我們能在幾秒內查新單字、看課程、和朋友聊天。"},{"n":22,"type":"連接詞","options":{"A":"when","B":"because","C":"so","D":"unless"},"answer":"A","explain_zh":"(A) when：「在該讀書的時候」玩遊戲，考連接詞。","note":"【正解】when 引導時間子句「當…的時候」，指學生在該讀書的時候卻花太多時間打電動，形成對比。\n【誘答】(X) B because「因為」因果不合；(X) C so「所以」語意不合；(X) D unless「除非」條件不合。\n【重點】when 引導時間副詞子句；這裡與 should be studying 形成「本該讀書卻…」的對比。\n【句意】然而有些學生在該讀書的時候花太多時間打電動。"},{"n":23,"type":"詞彙","options":{"A":"unable","B":"afraid","C":"proud","D":"sure"},"answer":"A","explain_zh":"(A) unable：be unable to「無法」專心，考形容詞詞彙。","note":"【正解】unable 與 tired 並列當補語，be unable to V「無法做…」，指熬夜用手機使他們隔天疲累又無法專心。\n【誘答】(X) B afraid「害怕的」語意不合；(X) C proud「驕傲的」不合；(X) D sure「確定的」不合。\n【重點】be unable to + 原形V「無法…」；形容詞 tired and unable 並列。\n【句意】深夜使用手機也會讓他們隔天疲累、無法專心。"},{"n":24,"type":"整句語意","options":{"A":"how to use their phones in a wise way","B":"to throw their phones away for good","C":"because phones can do all their homework","D":"so they should play games every night"},"answer":"A","explain_zh":"(A) 呼應「學會聰明用手機」，考整句語意。","note":"【正解】(A) how to use their phones in a wise way 為 learn 的受詞，learn how to V「學會如何…」，呼應聰明使用手機的建議。\n【誘答】(X) B「永遠丟掉手機」過度極端；(X) C「因為手機能做他們所有功課」與認真讀書矛盾；(X) D「所以他們該每晚打電動」與建議相反。\n【重點】learn how to V「學會如何做某事」；整句語意。\n【句意】想在學校表現好，學生需要學會如何聰明地使用手機。"}]},{"label":"B","title_zh":"社群媒體的影響","text":"Social media has become a big part of teenagers' daily lives. On these apps, young people can [[25]] photos, share good news, and keep in touch with old friends. Still, we should use them with care, [[26]] not everything we see online is true. Some users feel sad when they [[27]] their own lives with the perfect pictures of others. In the end, real friends and real talks are [[28]].","blanks":[{"n":25,"type":"詞彙","options":{"A":"post","B":"eat","C":"drive","D":"burn"},"answer":"A","explain_zh":"(A) post：在社群「發布」照片，考動詞詞彙。","note":"【正解】post 是「張貼、發布（貼文）」，在社群媒體上發布照片，語意最合。\n【誘答】(X) B eat「吃」、(X) C drive「開車」、(X) D burn「燒」都無法與 photos 合理搭配。\n【重點】動詞辨義 post「發文、上傳」；can + 原形V。\n【句意】在這些應用程式上，年輕人可以發布照片、分享好消息，並和老朋友保持聯絡。"},{"n":26,"type":"連接詞","options":{"A":"for","B":"or","C":"so","D":"nor"},"answer":"A","explain_zh":"(A) for：引出「要小心使用」的理由，考連接詞。","note":"【正解】for 當對等連接詞意思是「因為」，前面有逗號，引出「使用時要小心」的理由（網路上看到的不一定是真的）。\n【誘答】(X) B or「或者」表選擇，不合；(X) C so「所以」表結果，因果相反；(X) D nor「也不」需搭配否定並倒裝，語意不合。\n【重點】對等連接詞 for「因為」放逗號後引出理由。\n【句意】不過我們使用時要小心，因為在網路上看到的並非樣樣都是真的。"},{"n":27,"type":"詞彙","options":{"A":"compare","B":"clean","C":"spend","D":"count"},"answer":"A","explain_zh":"(A) compare：拿自己的生活與別人「比較」，考動詞詞彙。","note":"【正解】compare 是「比較」，compare A with B「拿 A 與 B 比較」，指把自己的生活和別人完美的照片相比。\n【誘答】(X) B clean「清潔」、(X) C spend「花費」、(X) D count「數」都與 with 的搭配和語意不合。\n【重點】動詞辨義 compare；搭配 compare A with/to B。\n【句意】有些使用者把自己的生活和別人完美的照片比較時，會感到難過。"},{"n":28,"type":"整句語意","options":{"A":"still more important than online likes","B":"much worse than the photos we post","C":"because everyone lies on the internet","D":"so we should stay online all day long"},"answer":"A","explain_zh":"(A) 呼應「真實友誼比按讚更重要」，考整句語意。","note":"【正解】(A) still more important than online likes 呼應全文結論：真實的友誼與交談比網路按讚更重要。\n【誘答】(X) B「比我們發的照片糟得多」與正向結論矛盾；(X) C「因為每個人都在網路上說謊」過度武斷；(X) D「所以我們該整天掛在網路上」與主旨相反。\n【重點】整句語意；比較級 more important than「比…更重要」。\n【句意】說到底，真實的朋友和真實的交談，仍比網路上的按讚更重要。"}]}],"vocab":["smartphone","useful","focus","wise","social media","teenager","post","compare","online","true","care","likes"]},{"id":10,"passages":[{"label":"A","title_zh":"養寵物的責任","text":"Many families in Taiwan love to keep a dog or a cat at home. A pet can bring us joy, but taking care of one is also a big [[21]]. Owners must feed their pets, keep them clean, and take them to see the doctor when they are [[22]]. A pet is not a toy that we can play with today and forget [[23]] tomorrow. Before you bring an animal home, you should ask yourself [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"job","B":"duty","C":"game","D":"prize"},"answer":"B","explain_zh":"(B) duty：照顧寵物是一種「責任」，考名詞詞彙。","note":"【正解】duty 是「責任、義務」，照顧寵物是一份很大的責任，語意最合。\n【誘答】(X) A job「工作、差事」偏指職業或任務，不如 duty 貼近「責任」；(X) C game「遊戲」不合；(X) D prize「獎品」不合。\n【重點】名詞辨義 duty「本分、責任」；a big duty。\n【句意】寵物能帶給我們快樂，但照顧牠也是一大責任。"},{"n":22,"type":"詞彙","options":{"A":"sick","B":"happy","C":"clean","D":"hungry"},"answer":"A","explain_zh":"(A) sick：寵物「生病」時要看醫生，考形容詞詞彙。","note":"【正解】sick 是「生病的」，寵物生病時要帶去看醫生，語意最合。\n【誘答】(X) B happy「開心的」、(X) C clean「乾淨的」、(X) D hungry「餓的」都不是看醫生的原因。\n【重點】形容詞辨義 sick；when 引導時間子句「當…時」。\n【句意】飼主必須餵食寵物、幫牠保持乾淨，並在牠生病時帶去看醫生。"},{"n":23,"type":"介系詞","options":{"A":"about","B":"into","C":"for","D":"off"},"answer":"A","explain_zh":"(A) about：forget about「忘掉」的固定用法，考介系詞。","note":"【正解】about 與 forget 組成片語動詞 forget about「忘掉、不再理會」，指寵物不是玩過就丟到一旁忘掉的玩具。\n【誘答】(X) B into、(X) C for、(X) D off 與 forget 搭配都無法構成正確語意。\n【重點】片語動詞 forget about sth「忘掉某事物」。\n【句意】寵物不是我們今天玩、明天就忘掉的玩具。"},{"n":24,"type":"整句語意","options":{"A":"if you are ready to care for it for life","B":"how quickly you can sell it for money","C":"because pets never need any food","D":"so you can leave it alone all day"},"answer":"A","explain_zh":"(A) 呼應「是否準備好一輩子照顧」，考整句語意。","note":"【正解】(A) if you are ready to care for it for life 當 ask 的受詞（名詞子句），呼應「是否準備好照顧牠一輩子」的省思。\n【誘答】(X) B「你能多快把牠賣掉賺錢」與愛護寵物矛盾；(X) C「因為寵物永遠不需要食物」與事實相反；(X) D「所以你可以整天丟牠一人」與責任矛盾。\n【重點】ask oneself if/whether...「問自己是否…」；片語 care for「照顧」。\n【句意】在把動物帶回家前，你應該問問自己是否準備好照顧牠一輩子。"}]},{"label":"B","title_zh":"認養流浪動物","text":"Every year, many dogs and cats are left on the streets without a home. These stray animals often feel cold, hungry, and [[25]]. Instead of buying a pet from a shop, more and more kind people now choose to [[26]] one from an animal shelter. By giving a stray a warm home, they save a life [[27]] make a new friend at the same time. If everyone is willing to help, our streets [[28]].","blanks":[{"n":25,"type":"詞彙","options":{"A":"afraid","B":"proud","C":"rich","D":"lazy"},"answer":"A","explain_zh":"(A) afraid：流浪動物又冷又餓又「害怕」，考形容詞詞彙。","note":"【正解】afraid 是「害怕的」，流浪動物又冷、又餓、又害怕，三個形容詞並列。\n【誘答】(X) B proud「驕傲的」、(X) C rich「富有的」、(X) D lazy「懶惰的」都與流浪動物的處境不合。\n【重點】feel + 形容詞；形容詞並列 cold, hungry, and afraid。\n【句意】這些流浪動物常常感到又冷、又餓、又害怕。"},{"n":26,"type":"詞彙","options":{"A":"adopt","B":"sell","C":"cook","D":"throw"},"answer":"A","explain_zh":"(A) adopt：從收容所「認養」一隻，考動詞詞彙。","note":"【正解】adopt 是「認養、領養」，指從動物收容所認養一隻，與前面「不去店裡買」相對。\n【誘答】(X) B sell「賣」方向相反；(X) C cook「煮」語意不合；(X) D throw「丟」語意不合。\n【重點】動詞辨義 adopt「領養」（相對於 buy「買」）；choose to V。\n【句意】越來越多善心人士選擇從動物收容所認養，而不是向店家買寵物。"},{"n":27,"type":"連接詞","options":{"A":"and","B":"but","C":"or","D":"nor"},"answer":"A","explain_zh":"(A) and：連接「救一命」與「交新朋友」，語意順承，考連接詞。","note":"【正解】and 連接 save a life 與 make a new friend 兩個並列動詞，語意順承（救一命同時交到新朋友）。\n【誘答】(X) B but「但是」表轉折，兩件都是好事不需轉折；(X) C or「或者」表選擇，不合；(X) D nor「也不」需否定與倒裝，不合。\n【重點】對等連接詞 and 連接兩個並列的動詞。\n【句意】給流浪動物一個溫暖的家，他們同時救了一條命，也交到一個新朋友。"},{"n":28,"type":"整句語意","options":{"A":"will have fewer homeless animals in the future","B":"will be full of hungry stray dogs forever","C":"because no one likes animals at all","D":"so we should leave more pets outside"},"answer":"A","explain_zh":"(A) 呼應「未來街上流浪動物會變少」，考整句語意。","note":"【正解】(A) will have fewer homeless animals in the future 呼應假設「大家願意幫忙」的正面結果：未來街上流浪動物會變少。\n【誘答】(X) B「永遠充滿飢餓的流浪狗」與正向結論矛盾；(X) C「因為沒人喜歡動物」與全文相反；(X) D「所以我們該把更多寵物丟到外面」與認養主旨相反。\n【重點】整句語意；fewer + 可數複數名詞「較少的」。\n【句意】如果每個人都願意幫忙，未來我們的街道上流浪動物會變少。"}]}],"vocab":["pet","duty","feed","sick","responsibility","stray","shelter","adopt","homeless","save","willing","care"]},{"id":11,"passages":[{"label":"A","title_zh":"自備購物袋減塑","text":"Plastic bags are cheap and handy, but they cause serious harm to our planet. Many of them end up in the ocean, where sea animals often [[21]] them for food and get sick. To fix this problem, more and more shoppers now [[22]] their own cloth bags when they go to the store. A cloth bag can be used again and again, [[23]] a plastic one is usually thrown away after a single trip. If each of us makes this small change, [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"repair","B":"collect","C":"produce","D":"mistake"},"answer":"D","explain_zh":"(D) mistake A for B：海洋動物「誤認」塑膠袋為食物，考動詞詞彙。","note":"【正解】mistake sth for sth 意為「把…誤認為…」，海洋動物把塑膠袋誤認為食物而生病，語意與文法皆通。\n【誘答】(A) repair「修理」語意不通，動物不會修理塑膠袋；(B) collect「收集」動物不會收集塑膠袋當食物，語意矛盾；(C) produce「生產」動物不可能生產塑膠袋，語意荒謬。\n【重點】固定搭配 mistake A for B（把 A 誤認為 B）。\n【句意】許多塑膠袋最後流入海洋，海洋動物常把它們誤認為食物而生病。"},{"n":22,"type":"詞彙","options":{"A":"borrow","B":"waste","C":"bring","D":"sell"},"answer":"C","explain_zh":"(C) bring：顧客「自備」布袋，考動詞詞彙與文意。","note":"【正解】bring one's own bag「自備袋子」，越來越多購物者上街時帶自己的布袋，語意自然。\n【誘答】(A) borrow「借」自己的袋子不合邏輯；(B) waste「浪費」與環保文意矛盾；(D) sell「賣」自己的布袋不合文意。\n【重點】bring「攜帶」與 own 搭配，表「自備」。\n【句意】越來越多購物者現在去商店時會自備布袋。"},{"n":23,"type":"連接詞","options":{"A":"while","B":"because","C":"since","D":"unless"},"answer":"A","explain_zh":"(A) while：前後對比布袋與塑膠袋，表「然而」，考對比連接詞。","note":"【正解】while 在此表「然而、相對地」，前後對比布袋可一再重複使用、塑膠袋卻用一次即丟。\n【誘答】(B) because 表原因，前後非因果關係；(C) since 表原因或自從，語意不合；(D) unless「除非」表條件，語意矛盾。\n【重點】while 可表對比（＝whereas）。\n【句意】布袋可以一再重複使用，然而塑膠袋通常用一次就被丟掉。"},{"n":24,"type":"整句語意","options":{"A":"the ocean will become dirtier than ever before","B":"stores will sell far more plastic bags each day","C":"we can greatly reduce the plastic waste around us","D":"sea animals will have even less food to eat"},"answer":"C","explain_zh":"(C) 呼應全文「減塑」的正面結果，考整句語意。","note":"【正解】呼應全文「減塑」主旨，若人人做這個小改變就能大幅減少身邊的塑膠垃圾，語意正面且切題。\n【誘答】(A) 海洋變得更髒與減塑相反；(B) 商店賣更多塑膠袋與主旨矛盾；(D) 海洋動物食物更少與前提無關。\n【重點】整句語意題須呼應段落主旨（此處為正面結果）。\n【句意】如果我們每個人都做這個小改變，就能大幅減少身邊的塑膠垃圾。"}]},{"label":"B","title_zh":"商品過度包裝的問題","text":"Have you ever bought a small gift that came in a huge, fancy box? Many products today are wrapped in far too much paper and plastic. This kind of over-packaging looks nice, but it is actually [[25]] to the environment. Companies use it to make their goods seem more valuable, [[26]] most of the wrapping is thrown out right away. In fact, packaging is one of the largest [[27]] of trash in our cities. If shoppers choose simple products instead, they can help stores understand that [[28]].","blanks":[{"n":25,"type":"詞彙","options":{"A":"friendly","B":"harmful","C":"useful","D":"grateful"},"answer":"B","explain_zh":"(B) harmful：過度包裝「有害」環境，考形容詞詞彙。","note":"【正解】be harmful to「對…有害」，過度包裝對環境有害，語意與搭配皆正確。\n【誘答】(A) friendly「友善的」語意相反；(C) useful「有用的」與後文「立刻被丟」矛盾；(D) grateful「感激的」只能修飾人，語意不合。\n【重點】be harmful to sth 固定搭配。\n【句意】這種過度包裝看起來漂亮，但其實對環境有害。"},{"n":26,"type":"連接詞","options":{"A":"so","B":"but","C":"or","D":"for"},"answer":"B","explain_zh":"(B) but：前後語意轉折，考轉折連接詞。","note":"【正解】前句說公司用包裝讓商品顯得更有價值，後句說包裝立刻被丟掉，語意轉折用 but。\n【誘答】(A) so 表結果，前後非因果；(C) or 表選擇，語意不合；(D) for 表原因，語意不合。\n【重點】but 表語意轉折。\n【句意】公司用包裝讓商品看起來更有價值，但大部分包裝立刻就被丟掉。"},{"n":27,"type":"詞彙","options":{"A":"answers","B":"sources","C":"prizes","D":"chances"},"answer":"B","explain_zh":"(B) sources：包裝是垃圾的主要「來源」，考名詞詞彙。","note":"【正解】source of trash「垃圾的來源」，包裝是城市垃圾的最大來源之一，語意通順。\n【誘答】(A) answers「答案」語意不合；(C) prizes「獎品」語意矛盾；(D) chances「機會」不搭配 trash。\n【重點】source of + 名詞，表「…的來源」。\n【句意】事實上，包裝是我們城市中最大的垃圾來源之一。"},{"n":28,"type":"整句語意","options":{"A":"trash should be left inside the store","B":"bigger boxes always mean better gifts","C":"customers enjoy paying much higher prices","D":"less packaging is better for everyone"},"answer":"D","explain_zh":"(D) 呼應「選簡單包裝」的主旨，考整句語意。","note":"【正解】呼應「選簡單包裝商品」的建議，顧客可讓商店了解少一點包裝對大家都好，切題。\n【誘答】(A) 垃圾留在店內語意不合；(B) 大盒子＝好禮物與主旨相反；(C) 顧客樂意付更高價與文意矛盾。\n【重點】整句語意題須呼應段落主旨。\n【句意】如果購物者改選簡單的商品，就能幫助商店了解少一點包裝對大家都更好。"}]}],"vocab":["plastic","harm","ocean","cloth","reduce","waste","package","wrap","product","source","environment","valuable"]},{"id":12,"passages":[{"label":"A","title_zh":"學校社團活動","text":"Joining a school club is one of the best ways to make new friends. After class, students with the same interests come together to [[21]] their favorite activities, from dancing to playing music. Being in a club also helps you learn skills that books alone cannot [[22]]. For example, a club leader must learn how to plan events and work well with others. Many students say that their happiest school memories [[23]] from these clubs. If you have never joined one, [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"share","B":"forget","C":"sell","D":"hide"},"answer":"A","explain_zh":"(A) share：同好一起「分享」喜歡的活動，考動詞詞彙。","note":"【正解】share「分享」，同好聚在一起分享喜歡的活動，語意自然。\n【誘答】(B) forget「忘記」語意相反；(C) sell「賣」活動不合邏輯；(D) hide「隱藏」與聚在一起矛盾。\n【重點】share + 名詞，表「分享」。\n【句意】下課後，有相同興趣的學生聚在一起分享他們喜愛的活動，從跳舞到玩音樂。"},{"n":22,"type":"詞彙","options":{"A":"waste","B":"teach","C":"close","D":"count"},"answer":"B","explain_zh":"(B) teach：有些技能光靠書本無法「教」，考動詞詞彙。","note":"【正解】books cannot teach「書本無法教」，有些技能光靠書本教不來，語意通順。\n【誘答】(A) waste「浪費」語意不合；(C) close「關閉」不搭配 skills；(D) count「計算」語意矛盾。\n【重點】teach 可接受詞（skills），表「教（技能）」。\n【句意】參加社團也能讓你學到光靠書本無法教的技能。"},{"n":23,"type":"詞彙","options":{"A":"arrive","B":"leave","C":"come","D":"return"},"answer":"C","explain_zh":"(C) come from：最快樂的回憶「來自」社團，考片語動詞。","note":"【正解】come from「來自、源自」，最快樂的校園回憶來自這些社團，片語正確。\n【誘答】(A) arrive 表來源要用 arrive at/in，不與 from 搭配；(B) leave from 語意相反；(D) return from「從…返回」語意不合。\n【重點】come from「來自、源自」。\n【句意】許多學生說他們最快樂的校園回憶來自這些社團。"},{"n":24,"type":"整句語意","options":{"A":"you should quit school right now","B":"why not give it a try this year","C":"your friends will surely dislike you","D":"clubs are a total waste of time"},"answer":"B","explain_zh":"(B) 鼓勵讀者加入社團，呼應正面文意，考整句語意。","note":"【正解】呼應鼓勵讀者加入社團的正面語氣，若從沒參加過何不今年試試看，切題。\n【誘答】(A) 立刻退學語意荒謬；(C) 朋友一定討厭你語意負面矛盾；(D) 社團浪費時間與主旨相反。\n【重點】why not + 原形動詞，用來提出建議。\n【句意】如果你從沒參加過社團，何不今年就試試看呢？"}]},{"label":"B","title_zh":"校慶運動會","text":"The school sports day is one of the most exciting events of the year. On that morning, the playground is [[25]] with cheering students and colorful flags. Each class trains hard for weeks so that they can win the relay race. During the games, classmates shout loudly to support their runners, [[26]] the teachers take photos of every happy moment. Winning is nice, but the real goal is to make everyone feel [[27]] as one big team. When the day ends, students go home tired but [[28]].","blanks":[{"n":25,"type":"詞彙","options":{"A":"empty","B":"silent","C":"filled","D":"broken"},"answer":"C","explain_zh":"(C) be filled with：操場「充滿」歡呼的學生，考片語與詞彙。","note":"【正解】be filled with「充滿」，操場充滿歡呼的學生與彩色旗幟，搭配正確。\n【誘答】(A) empty「空的」與 cheering students 矛盾；(B) silent「安靜的」與歡呼矛盾；(D) broken「破的」語意不合。\n【重點】be filled with＝be full of，表「充滿」。\n【句意】那天早上，操場上充滿歡呼的學生和色彩繽紛的旗幟。"},{"n":26,"type":"連接詞","options":{"A":"though","B":"unless","C":"before","D":"while"},"answer":"D","explain_zh":"(D) while：兩個動作同時進行，表「當…時」，考連接詞。","note":"【正解】while 表「當…同時」，同學歡呼加油的同時老師拍照，兩動作同時進行。\n【誘答】(A) though「雖然」表讓步，語意不合；(B) unless「除非」表條件，矛盾；(C) before「在…之前」時間關係不符。\n【重點】while 表兩動作同時進行。\n【句意】比賽時同學大聲為選手加油，同時老師捕捉每個歡樂的瞬間。"},{"n":27,"type":"語法","options":{"A":"unite","B":"united","C":"unites","D":"uniting"},"answer":"B","explain_zh":"(B) united：feel + 過去分詞當形容詞表「團結的」，考詞形變化。","note":"【正解】feel＋過去分詞當形容詞，united「團結的」表被動狀態，讓大家感覺團結一致。\n【誘答】(A) unite 為原形動詞，feel 後不接原形；(C) unites 為第三人稱單數動詞，語法錯；(D) uniting 現在分詞表主動，語意不合。\n【重點】feel + 形容詞／過去分詞，表主詞的感受狀態。\n【句意】獲勝雖好，但真正的目標是讓每個人感覺像一個大團隊般團結一致。"},{"n":28,"type":"整句語意","options":{"A":"afraid of meeting their classmates again","B":"angry that the sports day ever happened","C":"proud of what their class has done together","D":"sure that sports are useless for students"},"answer":"C","explain_zh":"(C) 呼應運動會團隊精神的正面結尾，考整句語意。","note":"【正解】呼應運動會團隊精神的正面結尾，學生雖累卻為班上共同成就感到驕傲，切題。\n【誘答】(A) 害怕再見同學語意矛盾；(B) 生氣有運動會與正面語氣相反；(D) 認為運動無用與主旨矛盾。\n【重點】be proud of「以…為榮」，整句須呼應正面主旨。\n【句意】當這天結束時，學生們雖然疲累，卻為班上一起完成的事感到驕傲。"}]}],"vocab":["club","interest","skill","leader","memory","sports","playground","cheer","relay","support","team","proud"]},{"id":13,"passages":[{"label":"A","title_zh":"高中職生打工","text":"Many high school students in Taiwan take a part-time job during their free time. Working at a store or a restaurant is a good way to [[21]] some money for themselves. More importantly, a part-time job teaches teenagers skills that are [[22]] in the real world, such as how to serve customers politely. However, students must be careful [[23]] their studies do not suffer because of work. If a job takes up too many hours, [[24]]. So finding the right balance between work and school is the key.","blanks":[{"n":21,"type":"詞彙","options":{"A":"earn","B":"spend","C":"lose","D":"count"},"answer":"A","explain_zh":"(A) earn：打工「賺」錢，考動詞詞彙。","note":"【正解】earn money「賺錢」，打工為自己賺一些錢，搭配正確。\n【誘答】(B) spend「花費」語意相反；(C) lose「損失」矛盾；(D) count「數」與打工賺錢的文意不合。\n【重點】earn money，指靠工作／勞力賺錢。\n【句意】在商店或餐廳打工是為自己賺一些錢的好方法。"},{"n":22,"type":"詞彙","options":{"A":"useless","B":"useful","C":"boring","D":"silent"},"answer":"B","explain_zh":"(B) useful：學到在現實世界「有用」的技能，考形容詞詞彙。","note":"【正解】useful「有用的」，打工教青少年在現實世界有用的技能，語意通順。\n【誘答】(A) useless「無用的」語意相反；(C) boring「無聊的」與後文正面語氣矛盾；(D) silent「沉默的」不能修飾 skills。\n【重點】be useful in「在…有用」。\n【句意】更重要的是，打工能教青少年在現實世界中有用的技能，例如如何禮貌地服務顧客。"},{"n":23,"type":"連接詞","options":{"A":"who","B":"what","C":"which","D":"that"},"answer":"D","explain_zh":"(D) that：be careful that... 引導子句，考連接詞。","note":"【正解】be careful that + 子句，that 引導受詞子句，提醒課業不要受影響。\n【誘答】(A) who 當關係代名詞指人，此處非修飾人；(B) what 引導名詞子句，但句中不缺主／受詞；(C) which 用於補充名詞，語法不合。\n【重點】be careful (that) + 子句，表「小心、注意…」。\n【句意】然而，學生必須小心不要讓課業因打工而受到影響。"},{"n":24,"type":"整句語意","options":{"A":"their grades may quickly drop","B":"they will get much richer overnight","C":"teachers will give them free food","D":"the store will close down at once"},"answer":"A","explain_zh":"(A) 呼應「打工太多影響課業」，考整句語意。","note":"【正解】呼應「打工時數太多會影響課業」，若工作占太多時間成績可能快速下滑，切題。\n【誘答】(B) 一夜致富與現實矛盾；(C) 老師給免費食物語意無關；(D) 商店倒閉與主題無關。\n【重點】整句語意須呼應前文的因果邏輯。\n【句意】如果一份工作占用太多時間，他們的成績可能會迅速下滑。"}]},{"label":"B","title_zh":"職場守時與禮貌","text":"When you start your first job, being on time is one of the most important habits to build. A worker who is often late makes the boss [[25]] that he cannot be trusted with important tasks. Besides being punctual, good manners also matter a lot [[26]] the workplace. A simple smile or a polite \"thank you\" can make your coworkers feel [[27]]. People enjoy working with someone who is both reliable and kind. In the end, those who are always polite and on time [[28]].","blanks":[{"n":25,"type":"詞彙","options":{"A":"wish","B":"hope","C":"feel","D":"dream"},"answer":"C","explain_zh":"(C) make sb feel：讓老闆「覺得」不可信任，考使役動詞＋詞彙。","note":"【正解】make sb feel「使某人覺得」，讓老闆覺得他無法被託付重要任務，使役動詞後接原形。\n【誘答】(A) wish「希望」後多接假設語氣，語意不合；(B) hope「希望」語意不合；(D) dream「夢想」語意矛盾。\n【重點】make + 受詞 + 原形動詞（feel），使役用法。\n【句意】經常遲到的員工會讓老闆覺得他無法被託付重要的任務。"},{"n":26,"type":"介系詞","options":{"A":"in","B":"of","C":"off","D":"up"},"answer":"A","explain_zh":"(A) in the workplace：介系詞 in 表「在職場中」，考介系詞。","note":"【正解】in the workplace「在職場中」，介系詞 in 表在某環境內。\n【誘答】(B) of 表所屬，語意不合；(C) off「離開」語意矛盾；(D) up 與 workplace 不搭配。\n【重點】in the workplace 固定搭配。\n【句意】除了守時，良好的禮貌在職場中也很重要。"},{"n":27,"type":"詞彙","options":{"A":"afraid","B":"worried","C":"tired","D":"respected"},"answer":"D","explain_zh":"(D) respected：禮貌讓同事感到「被尊重」，考形容詞詞彙。","note":"【正解】respected「被尊重的」，微笑與禮貌讓同事感到被尊重，語意正面切題。\n【誘答】(A) afraid「害怕」語意相反；(B) worried「擔心」矛盾；(C) tired「疲累」與禮貌無因果。\n【重點】feel + 過去分詞（respected），表被動的感受。\n【句意】一個簡單的微笑或禮貌的「謝謝」能讓你的同事感到被尊重。"},{"n":28,"type":"整句語意","options":{"A":"never learn anything at all","B":"are usually fired within a week","C":"often win the trust of their bosses","D":"make everyone around them upset"},"answer":"C","explain_zh":"(C) 呼應守時與禮貌帶來的正面結果，考整句語意。","note":"【正解】呼應守時與禮貌帶來的正面結果，總是有禮又守時的人常贏得老闆的信任，切題。\n【誘答】(A) 什麼都學不到語意矛盾；(B) 一週內被開除與正面語氣相反；(D) 讓周遭人不悅與主旨相反。\n【重點】win the trust of「贏得…的信任」，整句呼應正面主旨。\n【句意】最後，那些總是有禮貌又守時的人，往往能贏得老闆的信任。"}]}],"vocab":["part-time","earn","customer","polite","balance","habit","boss","trust","punctual","manners","coworker","respect"]},{"id":14,"passages":[{"label":"A","title_zh":"滷肉飯與台灣小吃","text":"Braised pork rice is one of the most loved dishes in Taiwan. It is made of small pieces of pork cooked slowly in a sweet and salty sauce, then served [[21]] a bowl of warm rice. Though it looks simple, this dish is [[22]] delicious that many people can eat it every day. You can find it almost everywhere, from small night-market stands [[23]] fancy restaurants. For many Taiwanese, a bowl of braised pork rice is not just food; [[24]].","blanks":[{"n":21,"type":"介系詞","options":{"A":"over","B":"into","C":"against","D":"without"},"answer":"A","explain_zh":"(A) over：肉汁淋「在」熱飯上，考介系詞。","note":"【正解】over「在…上方」，肉汁淋在一碗熱飯上，介系詞表覆蓋於其上。\n【誘答】(B) into「進入」語意不合；(C) against「靠著、對抗」矛盾；(D) without「沒有」語意相反。\n【重點】serve...over「淋／盛在…上面」。\n【句意】它用小塊豬肉在甜鹹醬汁中慢慢燉煮，然後淋在一碗溫熱的飯上。"},{"n":22,"type":"語法","options":{"A":"too","B":"so","C":"very","D":"much"},"answer":"B","explain_zh":"(B) so...that：如此美味「以致於」，so 引導結果句型，考語法。","note":"【正解】so...that「如此…以致於」，如此美味以致於許多人天天吃，固定句型。\n【誘答】(A) too...to 表「太…而不能」，此處無 to 且語意不合；(C) very 不與 that 構成結果句；(D) much 不修飾原級形容詞 delicious。\n【重點】so + 形容詞 + that 子句，表結果。\n【句意】雖然看起來簡單，這道菜卻如此美味，以致於許多人可以天天吃。"},{"n":23,"type":"介系詞","options":{"A":"by","B":"for","C":"to","D":"at"},"answer":"C","explain_zh":"(C) from...to...：從路邊攤「到」餐廳，考固定介系詞搭配。","note":"【正解】from...to...「從…到…」，從夜市小攤到高級餐廳，固定搭配。\n【誘答】(A) by、(B) for、(D) at 都無法與前面的 from 構成「從…到…」的固定結構。\n【重點】from A to B 固定搭配。\n【句意】你幾乎到處都能找到它，從夜市小攤到高級餐廳都有。"},{"n":24,"type":"整句語意","options":{"A":"it is a warm taste of home","B":"it is far too costly to enjoy","C":"no one really likes it at all","D":"it can only be eaten abroad"},"answer":"A","explain_zh":"(A) 呼應對台灣人的情感意義「家的味道」，考整句語意。","note":"【正解】呼應滷肉飯對台灣人的情感意義，不只是食物，更是家的溫暖味道，切題。\n【誘答】(B) 太貴無法享用與「到處都有」矛盾；(C) 沒人喜歡與全文讚美矛盾；(D) 只能在國外吃與文意相反。\n【重點】整句語意須呼應段落的情感主旨。\n【句意】對許多台灣人來說，一碗滷肉飯不只是食物；它是家的溫暖味道。"}]},{"label":"B","title_zh":"夜市遊戲攤位","text":"Besides tasty food, night markets in Taiwan are also famous for their fun game stands. As you walk around, you will see people trying to [[25]] small balls into cups or shooting balloons with toy guns. These games are cheap, so anyone can join [[26]] spending much money. Winning a prize is not easy, but the excitement [[27]] people coming back to try again. Even if you lose, [[28]]. That is why game stands are always full of laughter on busy nights.","blanks":[{"n":25,"type":"詞彙","options":{"A":"grow","B":"read","C":"wash","D":"throw"},"answer":"D","explain_zh":"(D) throw：把球「丟」進杯子，考動詞詞彙。","note":"【正解】throw...into「把…丟進」，把小球丟進杯子，動詞語意正確。\n【誘答】(A) grow「種植」語意不合；(B) read「閱讀」矛盾；(C) wash「清洗」與遊戲情境不合。\n【重點】throw sth into sth「把…投入…」。\n【句意】當你四處走動時，會看到人們試著把小球丟進杯子，或用玩具槍射氣球。"},{"n":26,"type":"介系詞","options":{"A":"with","B":"without","C":"about","D":"along"},"answer":"B","explain_zh":"(B) without spending：「不用」花大錢，介系詞＋動名詞，考介系詞。","note":"【正解】without + 動名詞「不用…」，任何人都能參加而不用花大錢，語意通順。\n【誘答】(A) with「有、帶著」語意相反；(C) about「關於」不合；(D) along「沿著」語意矛盾。\n【重點】without + Ving（動名詞），表「不…」。\n【句意】這些遊戲很便宜，所以任何人都能參加而不用花很多錢。"},{"n":27,"type":"語法","options":{"A":"keep","B":"keeps","C":"keeping","D":"kept"},"answer":"B","explain_zh":"(B) keeps：主詞 the excitement 為單數，動詞用 keeps，考主謂一致。","note":"【正解】主詞 the excitement 為單數，動詞用第三人稱單數 keeps；keep sb Ving 表「讓某人持續…」。\n【誘答】(A) keep 為原形，主謂不一致；(C) keeping 為分詞不能當主要動詞；(D) kept 為過去式，與全段現在式時態不符。\n【重點】主謂一致（單數主詞＋keeps）＋ keep sb Ving。\n【句意】要贏得獎品不容易，但那份刺激感讓人一再回來嘗試。"},{"n":28,"type":"整句語意","options":{"A":"the stand will be closed forever","B":"you must pay a huge fine","C":"the fun makes it worth the try","D":"you can never visit again"},"answer":"C","explain_zh":"(C) 呼應「即使輸了也值得」的正面語氣，考整句語意。","note":"【正解】呼應「即使輸了也值得」的正面語氣，那份樂趣讓嘗試變得值得，切題。\n【誘答】(A) 攤位永遠關閉語意矛盾；(B) 付巨額罰款與情境不合；(D) 再也不能來與正面語氣相反。\n【重點】make it worth the try「使其值得一試」，整句呼應正面主旨。\n【句意】即使你輸了，那份樂趣也讓這一試變得值得。"}]}],"vocab":["braised","pork","sauce","bowl","dish","stand","prize","excitement","balloon","laughter","delicious","worth"]},{"id":15,"passages":[{"label":"A","title_zh":"慢跑的好處","text":"Jogging is a simple sport that almost anyone can do. You do not need special tools or a gym; a pair of good shoes is [[21]] you really need. Running for just thirty minutes a day can make your heart [[22]] and help you sleep better at night. Jogging is also a great way to deal with stress, [[23]] it lets you clear your mind while you move. Best of all, if you jog with friends, [[24]].","blanks":[{"n":21,"type":"語法","options":{"A":"much","B":"every","C":"all","D":"many"},"answer":"C","explain_zh":"(C) all (that) you need：關係子句「你所需要的全部」，考關係詞用法。","note":"【正解】all (that) you need「你所需要的全部」，一雙好鞋就是你真正需要的一切，all 後接省略關係代名詞的子句。\n【誘答】(A) much 為不可數修飾詞，不能引導此子句；(B) every 須接單數名詞，語法錯；(D) many 修飾複數名詞，語法不合。\n【重點】all (that) + 主詞 + 動詞，表「所有…的（東西）」。\n【句意】你不需要特殊器材或健身房；一雙好鞋就是你真正需要的一切。"},{"n":22,"type":"詞彙","options":{"A":"weaker","B":"stronger","C":"colder","D":"shorter"},"answer":"B","explain_zh":"(B) stronger：慢跑讓心臟「更強壯」，考形容詞詞彙與文意。","note":"【正解】stronger「更強壯」，慢跑讓心臟更強壯，比較級表運動帶來的正面改變。\n【誘答】(A) weaker「更弱」語意相反；(C) colder「更冷」語意不合；(D) shorter「更短」與心臟搭配矛盾。\n【重點】make + 受詞 + 形容詞（比較級），表使役結果。\n【句意】每天只要跑三十分鐘就能讓你的心臟更強壯，也幫助你晚上睡得更好。"},{"n":23,"type":"連接詞","options":{"A":"whether","B":"although","C":"unless","D":"because"},"answer":"D","explain_zh":"(D) because：後句說明紓壓的原因，考連接詞。","note":"【正解】because 引導原因，後句說明慢跑能紓壓的原因（讓你邊動邊放空思緒）。\n【誘答】(A) whether「是否」語意不合；(B) although「雖然」表讓步，語意矛盾；(C) unless「除非」表條件，不合。\n【重點】because 引導原因子句。\n【句意】慢跑也是紓解壓力的好方法，因為它讓你在活動時能放空思緒。"},{"n":24,"type":"整句語意","options":{"A":"running turns into a boring chore","B":"you will surely get hurt at once","C":"the exercise becomes even more fun","D":"nobody will ever want to join you"},"answer":"C","explain_zh":"(C) 呼應「和朋友慢跑更好玩」的正面結尾，考整句語意。","note":"【正解】呼應「和朋友一起慢跑」的正面結尾，這項運動會變得更有趣，切題。\n【誘答】(A) 變成無聊雜務與正面語氣相反；(B) 一定受傷語意矛盾；(D) 沒人想加入與「和朋友」矛盾。\n【重點】整句語意須呼應正面主旨（even more fun 為比較級）。\n【句意】最棒的是，如果你和朋友一起慢跑，這項運動會變得更加有趣。"}]},{"label":"B","title_zh":"充足睡眠的重要","text":"Getting enough sleep is just as important as eating well. While we sleep, our body [[25]] itself and stores the things we learned during the day. Students who sleep too little often find it hard to [[26]] in class the next morning. In fact, a tired brain works much [[27]] than a well-rested one. Sadly, many teenagers stay up late playing on their phones. If you want to feel fresh and study better, [[28]].","blanks":[{"n":25,"type":"語法","options":{"A":"repair","B":"repairs","C":"repairing","D":"repaired"},"answer":"B","explain_zh":"(B) repairs：主詞 our body 為單數，動詞用 repairs，考主謂一致。","note":"【正解】主詞 our body 為單數，動詞用第三人稱單數 repairs，表身體自我修復。\n【誘答】(A) repair 為原形，主謂不一致；(C) repairing 為分詞不能當主要動詞；(D) repaired 為過去式，與全段現在式時態不符。\n【重點】主謂一致（單數主詞 our body ＋ repairs）。\n【句意】當我們睡覺時，身體會自我修復並儲存白天所學的東西。"},{"n":26,"type":"詞彙","options":{"A":"focus","B":"escape","C":"argue","D":"shout"},"answer":"A","explain_zh":"(A) focus：睡太少難以「專心」上課，考動詞詞彙。","note":"【正解】focus「專心」，睡太少的學生上課難以專心，語意通順。\n【誘答】(B) escape「逃跑」語意不合；(C) argue「爭論」矛盾；(D) shout「大叫」與上課專心無關。\n【重點】focus (in class)「（上課）專心」。\n【句意】睡太少的學生常發現隔天早上很難在課堂上專心。"},{"n":27,"type":"語法","options":{"A":"slow","B":"slower","C":"slowest","D":"slowly"},"answer":"B","explain_zh":"(B) slower：與 than 連用的比較級，考比較級。","note":"【正解】與 than 連用須用比較級 slower，疲累的大腦運作比休息充足的慢得多。\n【誘答】(A) slow 為原級，不與 than 連用；(C) slowest 為最高級，不與 than 搭配；(D) slowly 為副詞，此處 much___than 需比較級形容詞。\n【重點】比較級 + than；much 可修飾比較級表「…得多」。\n【句意】事實上，疲累的大腦運作起來比休息充足的大腦慢得多。"},{"n":28,"type":"整句語意","options":{"A":"drink coffee before you sleep","B":"keep your phone on all night long","C":"never close your eyes at all","D":"make sure you go to bed early"},"answer":"D","explain_zh":"(D) 呼應「充足睡眠」的建議，考整句語意。","note":"【正解】呼應「充足睡眠」的建議，想精神好又讀得好就要確保早睡，切題。\n【誘答】(A) 睡前喝咖啡與好眠矛盾；(B) 手機開整夜與充足睡眠相反；(C) 完全不闔眼語意荒謬。\n【重點】make sure (that) + 子句「確保…」，整句呼應建議主旨。\n【句意】如果你想感覺神清氣爽並讀得更好，就要確保早點上床睡覺。"}]}],"vocab":["jog","gym","heart","stress","exercise","sleep","repair","store","focus","brain","rested","fresh"]},{"id":16,"passages":[{"label":"A","title_zh":"圖書館與閱讀習慣","text":"The library is one of the quietest and most useful places in a school. There, students can borrow books for free and find a calm corner [[21]] to study. Reading often is a habit that brings many [[22]]. It builds a bigger word bank, opens the mind, and even helps us understand other people's feelings. A person who reads widely usually writes and speaks [[23]] than one who never opens a book. So next time you feel bored, [[24]].","blanks":[{"n":21,"type":"語法","options":{"A":"which","B":"in which","C":"who","D":"whose"},"answer":"B","explain_zh":"(B) in which：修飾 corner 的關係子句「在其中讀書」，考關係詞。","note":"【正解】in which 引導關係子句修飾 corner，等於 where，表示「在那個角落裡讀書」，介系詞 in＋which 語意與文法都成立。\n【誘答】(A) which 單用時，study 為不及物動詞、後面缺介系詞，無法表達「在角落裡」；(C) who 只能指人，不能修飾 corner；(D) whose 為所有格關係詞，後面須接名詞，此處不合。\n【重點】「介系詞＋關係代名詞」(in which＝where) 修飾地點名詞；可回想 the room in which we live。\n【句意】在那裡，學生可以免費借書，並找到一個安靜的角落在裡面讀書。"},{"n":22,"type":"詞彙","options":{"A":"mistakes","B":"problems","C":"dangers","D":"benefits"},"answer":"D","explain_zh":"(D) benefits：閱讀帶來許多「好處」，考名詞詞彙與文意。","note":"【正解】benefits 指「好處、益處」，與後句「擴充字彙、開闊心胸」等正面內容一致，故選 benefits。\n【誘答】(A) mistakes 錯誤、(B) problems 問題、(C) dangers 危險都是負面詞，與後文列舉的好處語意矛盾。\n【重點】bring benefits「帶來好處」是常見搭配；可由後文正面例證判斷空格語氣。\n【句意】常常閱讀是一種能帶來許多好處的習慣。"},{"n":23,"type":"語法","options":{"A":"good","B":"well","C":"better","D":"best"},"answer":"C","explain_zh":"(C) better：與 than 連用的比較級副詞，考比較級。","note":"【正解】句中有 than，須用比較級；better 是 well 的比較級副詞，修飾 writes 和 speaks，故選 better。\n【誘答】(A) good 是形容詞原級，不能修飾動詞；(B) well 為原級副詞，不與 than 連用；(D) best 是最高級，須配 the，也不與 than 搭配。\n【重點】比較級＋than；well-better-best 為副詞的不規則比較變化。\n【句意】廣泛閱讀的人，通常寫作和說話都比從不翻書的人更好。"},{"n":24,"type":"整句語意","options":{"A":"stay far from the library","B":"throw all your books away","C":"why not pick up a good book","D":"stop reading forever and ever"},"answer":"C","explain_zh":"(C) 呼應鼓勵閱讀的主旨，考整句語意。","note":"【正解】前文鼓勵閱讀，結尾以 why not pick up a good book「何不拿起一本好書」呼應主旨，語意正面一致。\n【誘答】(A) 遠離圖書館、(B) 把書全丟掉、(D) 永遠別再讀書，皆與鼓勵閱讀的主旨相反。\n【重點】why not＋原形動詞為提出建議的句型；克漏字結尾常須呼應全文主旨。\n【句意】所以下次你覺得無聊時，何不拿起一本好書呢？"}]},{"label":"B","title_zh":"線上課程學習","text":"Thanks to the Internet, students today can learn almost anything from home. Online courses let you study at your own [[25]], so you can watch a lesson again if you do not understand it. They are also cheaper than many classes, [[26]] you only need a computer and a good connection. However, learning online also [[27]] a lot of self-control, because no teacher is watching you. Students who cannot manage their time well may fall behind. In short, online learning is a great tool [[28]].","blanks":[{"n":25,"type":"詞彙","options":{"A":"noise","B":"pace","C":"seat","D":"price"},"answer":"B","explain_zh":"(B) at your own pace：按自己的「步調」學習，考名詞片語詞彙。","note":"【正解】at your own pace 是固定片語，意為「按自己的步調」，與後句「聽不懂可重看」一致，故選 pace。\n【誘答】(A) noise 噪音、(C) seat 座位、(D) price 價格都無法與 at your own 構成合理片語，語意也不通。\n【重點】at one's own pace「照自己的步調」為固定搭配。\n【句意】線上課程讓你按自己的步調學習，所以聽不懂時可以再看一次。"},{"n":26,"type":"連接詞","options":{"A":"since","B":"although","C":"unless","D":"whether"},"answer":"A","explain_zh":"(A) since：後句說明便宜的原因，考連接詞。","note":"【正解】後句「你只需一台電腦和好網路」是「較便宜」的原因，用 since「因為」引導原因子句，語意成立。\n【誘答】(B) although 表讓步、與因果不合；(C) unless「除非」語意矛盾；(D) whether「是否」不能引導原因。\n【重點】since 可作「因為」引導原因子句；由前後因果關係判斷連接詞。\n【句意】它們也比許多實體課程便宜，因為你只需要一台電腦和良好的網路連線。"},{"n":27,"type":"語法","options":{"A":"need","B":"needs","C":"needing","D":"needed"},"answer":"B","explain_zh":"(B) needs：主詞 learning online 為單數，動詞用 needs，考主謂一致。","note":"【正解】主詞為 learning online（動名詞當單數主詞），動詞須用第三人稱單數 needs，故選 needs。\n【誘答】(A) need 為原形，與單數主詞不一致；(C) needing 為分詞，不能單獨當主要動詞；(D) needed 為過去式，與全文現在式語境不合。\n【重點】主謂一致：動名詞主詞視為單數，動詞須加 s。\n【句意】然而，線上學習也需要很多自制力，因為沒有老師在盯著你。"},{"n":28,"type":"整句語意","options":{"A":"so you can sleep the whole day","B":"even when you never study at all","C":"because teachers do all the work","D":"if you can stay serious about it"},"answer":"D","explain_zh":"(D) 呼應「需要自律」的主旨結尾，考整句語意。","note":"【正解】前文強調需要自律，結尾用 if you can stay serious about it「只要你能認真看待」呼應「自律」主旨。\n【誘答】(A) 睡整天、(B) 完全不讀書、(C) 老師做所有事，都與「需要自律」的主旨相矛盾。\n【重點】結尾子句須呼應全文重點；if 引導條件子句。\n【句意】總之，只要你能認真對待，線上學習就是很棒的工具。"}]}],"vocab":["library","borrow","calm","habit","benefit","widely","online","course","pace","connection","self-control","manage"]},{"id":17,"passages":[{"label":"A","title_zh":"生成式 AI 與 ChatGPT 的崛起","text":"In recent years, a new kind of computer program called generative AI has become very popular. Unlike traditional software, which merely follows fixed instructions, these systems are trained on billions of sentences and can generate original text on demand. Its sudden rise has sparked lively debates in classrooms, offices, and even courtrooms around the world. Tools like ChatGPT can [[21]] to questions, write short stories, and even help students plan their reports. Given how quickly the technology has spread, it is now woven into everything from search engines to customer service. Many people were amazed [[22]] how natural the answers sounded. Moreover, the same model can switch effortlessly between explaining physics and composing a poem, a flexibility that earlier programs never possessed. Because the program keeps learning from huge amounts of text, it slowly grows smarter and [[23]] over time. Researchers, however, warn that a model trained on flawed data may quietly absorb human biases as well. Whereas a calculator always yields one correct answer, a language model sometimes invents facts that sound convincing yet prove entirely false. This tendency, known among experts as \"hallucination,\" can easily mislead readers who accept every reply without question. Still, teachers remind us that such tools can make mistakes, so we should always check the facts ourselves [[24]]. As a result, many schools now encourage students to treat AI as a helpful assistant rather than an unquestionable authority. Employers, meanwhile, increasingly value workers who can guide these tools with clear, well-crafted prompts. Used thoughtfully, generative AI can broaden our thinking; used carelessly, it may weaken the very skills it was meant to support.","blanks":[{"n":21,"type":"詞彙","options":{"A":"answer","B":"react","C":"respond","D":"correspond"},"answer":"C","explain_zh":"(C) respond to：AI「回應」問題，考動詞詞彙與搭配。","note":"【正解】respond to questions 意為「回應問題」，與後面 write stories、help students plan reports 並列，語意最貼切，故選 respond。\n【誘答】(A) answer 為及物動詞，直接接受詞（answer questions），但空格後有 to，answer to 意為「對…負責」，搭配與語意皆不合；(B) react to「（情緒上）做出反應」而非給出答案，與 write、help 並列時語意不貼切；(D) correspond to「與…相符、相對應」，並非回應問題。\n【重點】respond to sb/sth「對…作出回應」為固定搭配；由並列動詞的語意判斷詞彙。\n【句意】像 ChatGPT 這樣的工具可以回應問題、寫短篇故事，甚至幫學生規劃他們的報告。"},{"n":22,"type":"介系詞","options":{"A":"at","B":"with","C":"about","D":"over"},"answer":"A","explain_zh":"(A) amazed at：對某事「感到驚訝」，考固定介系詞搭配。","note":"【正解】be amazed at 是固定搭配，表示「對…感到驚訝」，後接 how 引導的名詞子句，故選 at。\n【誘答】(B) amazed with、(C) amazed about、(D) amazed over 看似合理，但 amaze 表「驚訝」時固定搭配 at（或 by），這些介系詞都不符慣用法。\n【重點】表情緒的形容詞常搭配特定介系詞：be amazed/surprised at、be good at；此處記 amazed at。\n【句意】許多人對這些答案聽起來如此自然而感到驚訝。"},{"n":23,"type":"語法","options":{"A":"usefuller","B":"most useful","C":"as useful","D":"more useful"},"answer":"D","explain_zh":"(D) more useful：與 smarter 並列的比較級，考比較級。","note":"【正解】前面有 grows smarter and，and 連接的兩個補語須詞性一致且都是比較級，more useful 與 smarter 並列，故選 more useful。\n【誘答】(A) usefuller 是錯誤的比較級構詞，此類形容詞須用 more useful，不加 -er；(B) most useful 為最高級，須配 the，也不與 smarter 並列；(C) as useful 為原級，須用 as…as 結構，無法與比較級 smarter 平行並列。\n【重點】and 前後結構要對稱（平行結構）；smarter 是比較級，故後接 more useful。\n【句意】因為這程式不斷從大量文字中學習，它隨時間慢慢變得更聰明也更有用。"},{"n":24,"type":"整句語意","options":{"A":"whenever its answers seem too perfect","B":"before we fully trust what it says","C":"since it has already proven totally reliable","D":"as long as we have plenty of free time"},"answer":"B","explain_zh":"(B) 呼應「AI 會犯錯、要自行查證」的主旨，考整句語意。","note":"【正解】前句說 AI 會犯錯、要自己查證事實，用 before we fully trust what it says「在完全相信它說的話之前」最能呼應，故選 (B)。\n【誘答】(A) 「只在答案看起來太完美時」才查證，與前面「always（總是）查證」矛盾，把查證限縮成偶爾；(C) 說 AI「已證明完全可靠」，與前句「會犯錯」相矛盾；(D) 「只要我們有很多空閒時間」才查證，同樣與「總是查證」的態度不符。\n【重點】克漏字結尾子句須呼應前文主旨；此處主旨為「對 AI 保持查證的態度」。\n【句意】所以在完全相信它所說的話之前，我們應該永遠自己查證事實。"}]},{"label":"B","title_zh":"台灣半導體與晶片熱潮","text":"Taiwan is well known around the world for making tiny but powerful computer chips. Often described as the island's \"silicon shield,\" this industry has quietly turned a modest economy into an indispensable link in the global supply chain. Each wafer, thinner than a human hair, may hold billions of microscopic switches etched with astonishing precision. These chips are the \"brains\" [[25]] inside phones, cars, and even game consoles. Producing them demands spotless laboratories where a single speck of dust could ruin an entire batch. Whereas ordinary factories tolerate small errors, chip plants pursue near-perfection, measuring flaws in mere millionths of a meter. One local company has grown into a global leader [[26]] it never stops improving its technology. Because the machines involved cost billions of dollars, only a handful of firms worldwide can afford to compete. Moreover, the expertise accumulated over decades cannot be copied overnight, which keeps rivals a step behind. Its huge factories work day and night to [[27]] millions of chips at once. As electric cars and smart devices multiply, the appetite for ever-faster chips continues to soar. Consequently, nations that once ignored semiconductors now compete fiercely to attract such factories within their borders. When a worldwide shortage hit, people finally understood how much they depended on this small island [[28]]. What was once a quiet technical field has thus become a matter of both national security and global politics. For a small nation, mastering this delicate craft has proved to be a source of remarkable influence.","blanks":[{"n":25,"type":"語法","options":{"A":"finding","B":"found","C":"founded","D":"to find"},"answer":"B","explain_zh":"(B) found：過去分詞當簡化關係子句（which are found），考分詞。","note":"【正解】chips 與 find 是被動關係（晶片「被裝設」在裝置裡），用過去分詞 found 作後位修飾，等於 which are found inside…，故選 found。\n【誘答】(A) finding 為現在分詞，表主動「正在尋找」，語意不合；(C) founded 雖為過去分詞形式，但原形 found 意為「創立、設立」，說晶片被「創立」在裝置裡語意不通；(D) to find 為不定詞，表主動目的「去尋找」，與被動修飾不符。\n【重點】名詞與動作為被動關係時用「過去分詞」作簡化關係子句：the chips found inside＝the chips which are found inside。\n【句意】這些晶片就是手機、汽車，甚至遊戲主機裡面所裝的「大腦」。"},{"n":26,"type":"連接詞","options":{"A":"so","B":"though","C":"unless","D":"because"},"answer":"D","explain_zh":"(D) because：後句說明成為龍頭的原因，考連接詞。","note":"【正解】「不斷改良技術」是「成為全球龍頭」的原因，用 because「因為」引導原因子句，語意成立，故選 because。\n【誘答】(A) so「所以」會使「不斷改良」變成「成為龍頭」的結果，因果順序顛倒，此處改良是原因；(B) though「雖然」表讓步，前後無轉折關係；(C) unless「除非」表條件，語意矛盾。\n【重點】由前後的因果邏輯判斷連接詞：結果在前、原因在後用 because。\n【句意】一家本地公司已成長為全球龍頭，因為它從不停止改良自己的技術。"},{"n":27,"type":"詞彙","options":{"A":"produce","B":"collect","C":"consume","D":"purchase"},"answer":"A","explain_zh":"(A) produce：工廠「生產」數百萬顆晶片，考動詞詞彙。","note":"【正解】工廠日夜運作的目的是「生產」晶片，produce millions of chips 語意最合，故選 produce。\n【誘答】(B) collect「收集」晶片是把現成的聚集起來，並非日夜運轉「製造」；(C) consume「消耗」晶片與工廠生產的目的相反；(D) purchase「購買」晶片語意不合，工廠是製造而非採購晶片。\n【重點】produce「生產、製造」為常見動詞；由主詞 factories 與受詞 chips 判斷動詞。\n【句意】它龐大的工廠日夜運轉，一次生產數百萬顆晶片。"},{"n":28,"type":"整句語意","options":{"A":"and how easily it could be replaced","B":"though its chips were nothing special","C":"for its amazing chip-making skills","D":"for the cheap toys it sold abroad"},"answer":"C","explain_zh":"(C) 呼應全文「台灣晶片技術受依賴」的主旨，考整句語意。","note":"【正解】前文說全球短缺時大家才明白多麼依賴台灣，用 for its amazing chip-making skills「因它出色的晶片製造技術」呼應主旨，故選 (C)。\n【誘答】(A) 「以及它多麼容易被取代」與「多麼依賴這座小島」的不可或缺相矛盾；(B) 「雖然它的晶片沒什麼特別」與全文推崇台灣晶片矛盾；(D) 形式上雖是 for＋名詞，但說依賴的是「便宜玩具」而非晶片，與全文主題不符。\n【重點】結尾片語須呼應主旨（台灣晶片被世界倚重）；for＋名詞表原因。\n【句意】人們終於明白，因為這座小島出色的晶片製造技術，他們是多麼依賴它。"}]}],"vocab":["generative","popular","respond","amazed","natural","useful","chip","powerful","console","leader","improve","produce","shortage","depend","instruction","generate","flexibility","absorb","bias","hallucination","convincing","authority","prompt","broaden","indispensable","precision","semiconductor","security"]},{"id":18,"passages":[{"label":"A","title_zh":"全球淨零碳排與聯合國氣候峰會","text":"Ever
