ake the earth much dirtier","D":"throw away even more useful things"},"answer":"A","explain_zh":"(A) 呼應「舊物新生、更環保」，考整句語意。","note":"【正解】前文講舊物新生，and waste much less「同時減少許多浪費」延續環保正面語意，故選之。\n【誘答】(B) 花更多錢、(C) 讓地球更髒、(D) 丟掉更多有用的東西，都與環保主旨相反。\n【重點】對等連接詞 and 連接兩個並列動作；結尾呼應環保主旨。\n【句意】如果我們都加入，就能讓舊物重獲新生，同時大幅減少浪費。"}]}],"vocab":["clothes","recycle","wear","give","resource","waste","used","price","buyer","cheap","online","earth"]},{"id":20,"passages":[{"label":"A","title_zh":"家庭出遊","text":"Going on a trip together is a wonderful way for a family to [[21]] time. On weekends, many families drive to the beach or the mountains to relax. Parents and children can talk, laugh, and [[22]] happy memories along the way. A short trip is not [[23]], but it makes everyone feel closer. No matter where they go, the best part is [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"spend","B":"cost","C":"pay","D":"sell"},"answer":"A","explain_zh":"(A) spend：spend time「共度」時光，考動詞詞彙。","note":"【正解】spend time「共度、花時間」，主詞為人(family)，故選 spend。\n【誘答】(B) cost 主詞須為物、意為「花費(金錢)」；(C) pay 付錢；(D) sell 賣，均與「花時間」不合。\n【重點】spend (time/money)「(人)花費時間或金錢」；主詞須為人。\n【句意】一起去旅行是一家人共度時光的美好方式。"},{"n":22,"type":"詞彙","options":{"A":"lose","B":"make","C":"break","D":"forget"},"answer":"B","explain_zh":"(B) make：make memories「創造」回憶，考動詞詞彙。","note":"【正解】make memories「創造回憶」是固定搭配，與「快樂回憶」語意一致，故選 make。\n【誘答】(A) lose 失去、(D) forget 忘記語意相反；(C) break 打破不與 memories 搭配。\n【重點】make memories「留下、創造回憶」。\n【句意】父母和孩子可以在途中談天、歡笑，並創造快樂的回憶。"},{"n":23,"type":"詞彙","options":{"A":"expensive","B":"famous","C":"careful","D":"afraid"},"answer":"A","explain_zh":"(A) expensive：短程出遊不「貴」，考形容詞詞彙。","note":"【正解】短程旅行「不貴」，expensive 與後句「卻讓大家更親近」形成「花費不多但收穫大」的對比。\n【誘答】(B) famous 有名、(C) careful 小心、(D) afraid 害怕都不能修飾 trip 表花費，語意不通。\n【重點】expensive「昂貴的」；可由 but 的轉折推正確語意。\n【句意】短程旅行並不昂貴，卻能讓每個人感覺更親近。"},{"n":24,"type":"整句語意","options":{"A":"being together as a happy family","B":"spending as much money as possible","C":"staying home alone all weekend","D":"worrying about the long drive home"},"answer":"A","explain_zh":"(A) 呼應「一家人親近」的主旨，考整句語意。","note":"【正解】全文主旨是家人親近，being together as a happy family「一家人在一起」正呼應此主旨。\n【誘答】(B) 盡量花錢、(C) 獨自待家、(D) 擔心開車回家，都與「家人相聚」的溫馨主旨矛盾。\n【重點】主詞補語用動名詞 being；結尾呼應全文主旨。\n【句意】無論他們去哪裡，最棒的部分就是一家人幸福地在一起。"}]},{"label":"B","title_zh":"露營風潮","text":"In recent years, camping has become more and more [[25]] in Taiwan. On holidays, many people put up tents in the mountains and enjoy the fresh air. Camping lets us get [[26]] to nature and take a break from busy city life. At night, families sit around and look up [[27]] the stars in the sky. [[28]], camping is a cheap and fun way to spend a weekend.","blanks":[{"n":25,"type":"詞彙","options":{"A":"popular","B":"boring","C":"quiet","D":"empty"},"answer":"A","explain_zh":"(A) popular：露營越來越「流行」，考形容詞詞彙。","note":"【正解】露營「越來越流行」，popular 與後文「假日很多人搭帳篷」一致，故選 popular。\n【誘答】(B) boring 無聊、(C) quiet 安靜、(D) empty 空的都與「越來越多人露營」的語意矛盾。\n【重點】more and more＋形容詞「越來越…」；be popular「受歡迎」。\n【句意】近年來，露營在台灣變得越來越流行。"},{"n":26,"type":"詞彙","options":{"A":"close","B":"far","C":"away","D":"late"},"answer":"A","explain_zh":"(A) close：get close to nature「親近」大自然，考詞彙。","note":"【正解】get close to nature「親近大自然」，close 表接近，與「遠離忙碌城市」一致，故選 close。\n【誘答】(B) far、(C) away 表遠離、方向相反；(D) late 遲到與 nature 無關。\n【重點】get/be close to「接近、親近」。\n【句意】露營讓我們親近大自然，並從忙碌的城市生活中稍作休息。"},{"n":27,"type":"介系詞","options":{"A":"at","B":"on","C":"of","D":"off"},"answer":"A","explain_zh":"(A) at：look up at「抬頭看」，考介系詞片語。","note":"【正解】look up at「抬頭看」為固定片語，故選 at。\n【誘答】(B) on、(C) of、(D) off 都不與 look up 構成「仰望」的片語。\n【重點】look up at「抬頭仰望」；注意與 look up(查閱)的差別。\n【句意】夜晚，全家人圍坐在一起，抬頭仰望天空的星星。"},{"n":28,"type":"整句語意","options":{"A":"For all these reasons","B":"Even though it is boring","C":"Because nobody likes it","D":"Before the trip begins"},"answer":"A","explain_zh":"(A) For all these reasons：總結上文優點，考轉折語＋整句語意。","note":"【正解】此句總結上文優點，For all these reasons「基於以上這些理由」引出結論，語意連貫。\n【誘答】(B) 儘管很無聊、(C) 因為沒人喜歡、(D) 在旅行開始前，都與前文讚賞露營的內容矛盾。\n【重點】For all these reasons「基於這些理由」為總結用語；結尾常作全文歸納。\n【句意】基於以上這些理由，露營是既便宜又有趣的週末休閒方式。"}]}],"vocab":["trip","spend","memory","relax","camping","tent","nature","fresh","star","holiday","popular","weekend"]},{"id":21,"passages":[{"label":"A","title_zh":"校園友善反霸凌","text":"School should be a safe and friendly place for every student. Sadly, some students are [[21]] by others because they look or act differently. Bullying can hurt a person's feelings and [[22]] them lose their confidence. If we see this happen, we should not just watch. Instead, we can help the [[23]] student and tell a teacher. Together, we can build a campus [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"praised","B":"bullied","C":"helped","D":"invited"},"answer":"B","explain_zh":"(B) bullied：被別人「霸凌」，考動詞詞彙。","note":"【正解】被動語態 are ___ by，指有些學生因為外表或行為不同而「被別人霸凌」，符合下文反霸凌的主旨。\n【誘答】(A) praised 稱讚、(C) helped 幫助、(D) invited 邀請皆為正面或不相關動作，與 because they look or act differently 帶出的負面情境矛盾。\n【重點】被動語態 be + p.p. + by；bully 當動詞為「霸凌」。\n【句意】遺憾的是，有些學生因為外表或行為與眾不同而被別人霸凌。"},{"n":22,"type":"語法","options":{"A":"make","B":"makes","C":"made","D":"making"},"answer":"A","explain_zh":"(A) make：與 hurt 並列用原形，且 make sb V，考時態與句型。","note":"【正解】與前面 hurt 用 and 並列、共用助動詞 can，故用原形 make；且 make sb + 原形 V「使某人…」。\n【誘答】(B) makes 為第三人稱單數現在式、(C) made 過去式、(D) making 現在分詞，皆不能接在助動詞 can 後，也不與 hurt 並列。\n【重點】助動詞後接原形；對等連接詞 and 連接的動詞形式須一致；make sb V。\n【句意】霸凌會傷害一個人的感受，並使他們失去自信。"},{"n":23,"type":"詞彙","options":{"A":"lucky","B":"strong","C":"hurt","D":"rich"},"answer":"C","explain_zh":"(C) hurt：幫助「受傷的」同學，考形容詞詞彙。","note":"【正解】形容詞 hurt「受傷的、受委屈的」修飾 student，指幫助「受到傷害的」同學，呼應被霸凌情境。\n【誘答】(A) lucky 幸運的、(B) strong 強壯的、(D) rich 有錢的，都與需要被幫助的受害者形象不符。\n【重點】hurt 可作形容詞表「受傷的」；形容詞置於名詞前修飾。\n【句意】我們可以幫助那位受到傷害的同學，並告訴老師。"},{"n":24,"type":"整句語意","options":{"A":"where everyone is treated with kindness and respect","B":"in which weak students are laughed at every day","C":"so that bullies can do whatever they want","D":"because being different is always a bad thing"},"answer":"A","explain_zh":"(A) 呼應「友善校園」的主旨，考整句語意。","note":"【正解】關係副詞 where 引導形容詞子句修飾 campus，內容「人人受到善意與尊重對待」正好呼應友善校園主旨。\n【誘答】(B) 說弱勢學生天天被嘲笑、(C) 說霸凌者可為所欲為、(D) 說與眾不同總是壞事，皆與反霸凌、友善的正面結論相反。\n【重點】關係副詞 where 引導地方子句；整句語意須與全文主旨一致。\n【句意】齊心協力，我們能打造一個人人以善意與尊重相待的校園。"}]},{"label":"B","title_zh":"網路留言禮儀","text":"The Internet lets us share our ideas with people all over the world. However, we must be [[25]] about what we say online. Some people leave mean words on others' posts, [[26]] can really hurt someone's heart. Before we send a comment, we should think [[27]] our words may make others feel. If we are kind and polite online, the Internet will become a much [[28]].","blanks":[{"n":25,"type":"詞彙","options":{"A":"careful","B":"careless","C":"lazy","D":"proud"},"answer":"A","explain_zh":"(A) careful：對留言要「小心」，考形容詞詞彙。","note":"【正解】be careful about「對…小心」，提醒對網路發言要謹慎，呼應下文的網路禮儀。\n【誘答】(B) careless 粗心的與提醒謹慎矛盾、(C) lazy 懶惰的、(D) proud 驕傲的皆與發言態度無關。\n【重點】be careful about + N/V-ing「對…小心」。\n【句意】然而，對於在網路上所說的話，我們必須小心謹慎。"},{"n":26,"type":"語法","options":{"A":"which","B":"who","C":"where","D":"what"},"answer":"A","explain_zh":"(A) which：關係代名詞代替前面整件事，考關係詞。","note":"【正解】which 引導非限定關係子句，代替前面「留下惡意留言」這整件事，並在子句中作主詞。\n【誘答】(B) who 只指人、(C) where 指地方、(D) what 不能引導有先行詞的關係子句，皆不合。\n【重點】關係代名詞 which 可代替前面整個句子或概念，逗號後為補述用法。\n【句意】有些人在別人的貼文下留下刻薄的話，這真的會傷了別人的心。"},{"n":27,"type":"詞彙","options":{"A":"how","B":"why","C":"when","D":"where"},"answer":"A","explain_zh":"(A) how：想想我們的話「如何」影響別人，考疑問詞語意。","note":"【正解】how 引導名詞子句作 think 的受詞，問「我們的話會讓別人有多麼／如何的感受」，語意最通順。\n【誘答】(B) why 為什麼、(C) when 何時、(D) where 何處，皆改變句意，與「感受」搭配不合理。\n【重點】疑問詞 how 引導名詞子句 how + S + V；feel 後接感受狀態。\n【句意】在送出留言前，我們應該想想自己的話會讓別人有什麼樣的感受。"},{"n":28,"type":"整句語意","options":{"A":"friendlier place for all of us","B":"meaner place full of angry words","C":"harder place to make new friends","D":"sadder place than the real world"},"answer":"A","explain_zh":"(A) 呼應「友善上網」的好結果，考整句語意。","note":"【正解】前有 much 修飾比較級，friendlier 為 friendly 的比較級，呼應「友善上網帶來更友善的網路」正面結論。\n【誘答】(B) meaner 更刻薄、(C) harder 更難交友、(D) sadder 更悲傷，皆為負面，與 If we are kind and polite 的正面條件矛盾。\n【重點】much + 比較級表「…得多」；整句語意須與正向前提一致。\n【句意】如果我們在網路上友善又有禮貌，網路將會變成對大家都更友善的地方。"}]}],"vocab":["safe","friendly","bully","confidence","respect","kindness","Internet","comment","polite","post","hurt","mean"]},{"id":22,"passages":[{"label":"A","title_zh":"冷氣節能","text":"In summer, the weather in Taiwan is really hot, so almost everyone [[21]] on the air conditioner. Air conditioners make us feel cool, but they also use a lot of [[22]]. To save energy, we can set the temperature at 26 degrees [[23]] of a lower one. Cleaning the filter often also helps the machine work better. If we all use it wisely, we can stay cool and [[24]].","blanks":[{"n":21,"type":"語法","options":{"A":"turn","B":"turns","C":"turned","D":"turning"},"answer":"B","explain_zh":"(B) turns：主詞 everyone 為單數，動詞加 s，考主謂一致。","note":"【正解】主詞 everyone 視為單數第三人稱，現在式動詞須加 s，turn on「打開（電器）」。\n【誘答】(A) turn 原形不合單數主詞、(C) turned 過去式與全文現在式語境不符、(D) turning 現在分詞不能單獨當主要動詞。\n【重點】主謂一致：everyone 為單數；片語動詞 turn on 開啟。\n【句意】夏天台灣天氣很熱，所以幾乎每個人都會打開冷氣。"},{"n":22,"type":"詞彙","options":{"A":"food","B":"water","C":"power","D":"paper"},"answer":"C","explain_zh":"(C) power：冷氣耗費很多「電力」，考名詞詞彙。","note":"【正解】power「電力」，冷氣耗電，符合下文 save energy、electric bills 的節能主旨。\n【誘答】(A) food 食物、(B) water 水、(D) paper 紙，皆非冷氣消耗的資源，語意不合。\n【重點】power 可指「電力、能源」；a lot of + 不可數名詞。\n【句意】冷氣讓我們感到涼爽，但也會耗費大量電力。"},{"n":23,"type":"介系詞","options":{"A":"instead","B":"because","C":"except","D":"besides"},"answer":"A","explain_zh":"(A) instead：instead of「而不是」較低溫度，考片語。","note":"【正解】instead of「而不是」，指設定 26 度而非更低溫度，符合省電建議。\n【誘答】(B) because of 因為、(C) except 除…之外、(D) besides 除…還有，語意皆與「取代較低溫度」不符。\n【重點】instead of + N/V-ing「而不是…」。\n【句意】為了省電，我們可以把溫度設在 26 度，而不是更低的溫度。"},{"n":24,"type":"整句語意","options":{"A":"save money on our electric bills at the same time","B":"make the weather even hotter than before","C":"use much more power than we really need","D":"let the machine break down very quickly"},"answer":"A","explain_zh":"(A) 呼應「省電又涼爽」的好處，考整句語意。","note":"【正解】呼應節能主旨，強調既涼爽又能同時省下電費，語意最連貫。\n【誘答】(B) 讓天氣更熱、(C) 用掉更多電、(D) 讓機器很快壞掉，皆與明智用冷氣的好處相反。\n【重點】整句語意須符合「省電又涼爽」的正向結論。\n【句意】如果我們都能明智地使用，就能既保持涼爽又同時省下電費。"}]},{"label":"B","title_zh":"太陽能發電","text":"The sun gives us free and clean energy every day. More and more homes in Taiwan now put solar panels on their [[25]] to make electricity. Unlike coal or oil, solar power does not [[26]] the air, so it is good for the earth. Sunlight will never run out, [[27]] it is a very safe kind of energy. In the future, solar power may become one of the most [[28]] ways to make electricity.","blanks":[{"n":25,"type":"詞彙","options":{"A":"roofs","B":"floors","C":"doors","D":"walls"},"answer":"A","explain_zh":"(A) roofs：太陽能板裝在「屋頂」上，考名詞詞彙。","note":"【正解】太陽能板通常裝在「屋頂 roofs」上以接收陽光，語意最合理。\n【誘答】(B) floors 地板、(C) doors 門、(D) walls 牆壁，皆非安裝太陽能板受光的最佳位置。\n【重點】roof 的複數為 roofs；名詞詞彙搭配。\n【句意】台灣越來越多住家在屋頂上裝太陽能板來發電。"},{"n":26,"type":"詞彙","options":{"A":"clean","B":"protect","C":"pollute","D":"cool"},"answer":"C","explain_zh":"(C) pollute：太陽能不「污染」空氣，考動詞詞彙。","note":"【正解】pollute「污染」，與 Unlike coal or oil（不像煤或油）對比，太陽能不污染空氣。\n【誘答】(A) clean 淨化、(B) protect 保護、(D) cool 使變涼，皆為正面或不相關，與 does not 及對比語氣不合。\n【重點】pollute 當及物動詞「污染」；Unlike 表對比。\n【句意】不像煤或石油，太陽能不會污染空氣，所以對地球有益。"},{"n":27,"type":"連接詞","options":{"A":"so","B":"but","C":"or","D":"though"},"answer":"A","explain_zh":"(A) so：陽光用不完「所以」很安全，考連接詞。","note":"【正解】前句「陽光用不完」是原因，後句「很安全」是結果，用 so「所以」連接因果。\n【誘答】(B) but 轉折、(C) or 選擇、(D) though 雖然，皆不符合前因後果的邏輯。\n【重點】對等連接詞 so 表結果「所以」。\n【句意】陽光永遠不會用完，所以它是一種非常安全的能源。"},{"n":28,"type":"整句語意","options":{"A":"important and popular ways in the world","B":"expensive and useless ways ever made","C":"dangerous ways of hurting the earth","D":"dirty ways that pollute our clean air"},"answer":"A","explain_zh":"(A) 呼應「太陽能前景看好」，考整句語意。","note":"【正解】one of the most + 形容詞 + 複數名詞，內容「重要又普遍」呼應太陽能前景看好的樂觀結論。\n【誘答】(B) 昂貴又沒用、(C) 危險傷害地球、(D) 骯髒污染空氣，皆為負面，與看好太陽能的語氣矛盾。\n【重點】one of the + 最高級 + 複數名詞「最…之一」。\n【句意】未來，太陽能可能成為世上最重要且最普及的發電方式之一。"}]}],"vocab":["summer","air conditioner","energy","power","temperature","filter","solar","panel","electricity","roof","pollute","sunlight"]},{"id":23,"passages":[{"label":"A","title_zh":"台灣芒果與水果","text":"Taiwan is often called a paradise of fruit, and mangoes are one of its greatest [[21]]. Every summer, the hot sun and warm rain help the sweet golden fruit grow well in the south. Many farmers are proud of their mangoes [[22]] they taste much better than the ones grown in other countries. Visitors love to buy shaved ice covered [[23]] fresh mango, which is soft, juicy, and cool. If you ever travel around the island in June, you should [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"problems","B":"treasures","C":"mistakes","D":"dangers"},"answer":"B","explain_zh":"(B) treasures：芒果是台灣的「珍寶」，考名詞詞彙。","note":"【正解】treasures「珍寶」，呼應台灣為「水果天堂」，把芒果比作最棒的珍寶，語意正面。\n【誘答】(A) problems 問題、(C) mistakes 錯誤、(D) dangers 危險，皆為負面，與 paradise、greatest 的讚美語氣矛盾。\n【重點】one of its greatest + 複數名詞「最…之一」；treasure 珍寶。\n【句意】台灣常被稱為水果天堂，而芒果是它最棒的珍寶之一。"},{"n":22,"type":"連接詞","options":{"A":"because","B":"although","C":"unless","D":"whether"},"answer":"A","explain_zh":"(A) because：後句說明農夫驕傲的原因，考連接詞。","note":"【正解】後句說明農夫感到驕傲的原因（芒果更好吃），用 because「因為」引導原因。\n【誘答】(B) although 雖然、(C) unless 除非、(D) whether 是否，皆與「原因」邏輯不符。\n【重點】because 引導原因副詞子句。\n【句意】許多農夫以自家芒果為傲，因為它們比其他國家種的好吃多了。"},{"n":23,"type":"介系詞","options":{"A":"with","B":"of","C":"at","D":"into"},"answer":"A","explain_zh":"(A) covered with「覆蓋著」為固定用法，考介系詞。","note":"【正解】be covered with「覆蓋著…」為固定用法，指剉冰上鋪滿新鮮芒果。\n【誘答】(B) of、(C) at、(D) into 皆不與 covered 搭配，屬介系詞搭配錯誤。\n【重點】be covered with「被…覆蓋」。\n【句意】遊客愛買鋪滿新鮮芒果的剉冰，它又軟又多汁又清涼。"},{"n":24,"type":"整句語意","options":{"A":"never eat any kind of local fruit","B":"try a bowl of mango shaved ice","C":"stay at home to avoid the heat","D":"sell your own fruit to farmers"},"answer":"B","explain_zh":"(B) 呼應前文芒果剉冰的美味，考整句語意。","note":"【正解】呼應前文描述芒果剉冰的美味，建議六月來玩就該嚐一碗，語意連貫。\n【誘答】(A) 絕不吃任何當地水果、(C) 待在家避暑、(D) 把自己的水果賣給農夫，皆與享用芒果的情境矛盾。\n【重點】整句語意須呼應上文推薦芒果剉冰。\n【句意】如果你六月來環島旅行，就該嚐一碗芒果剉冰。"}]},{"label":"B","title_zh":"農夫的辛勞","text":"Behind every sweet fruit on our table, there is a farmer who works very hard. Before the sun rises, farmers are already [[25]] in the fields, checking their plants and pulling out weeds. Their job is not easy, [[26]] the weather can change quickly and destroy a whole season of work. A strong typhoon [[27]] hurt the crops and take away their income in just one night. We should feel thankful and never [[28]].","blanks":[{"n":25,"type":"語法","options":{"A":"work","B":"working","C":"worked","D":"works"},"answer":"B","explain_zh":"(B) working：are 後接現在分詞構成進行式，考時態詞形。","note":"【正解】be 動詞 are 後接現在分詞 working 構成現在進行式，表農夫已在田裡工作。\n【誘答】(A) work 原形、(C) worked 過去式、(D) works 單數現在式，皆不能接在 are 後構成進行式。\n【重點】現在進行式 be + V-ing。\n【句意】太陽升起前，農夫早已在田裡工作，查看作物、拔除雜草。"},{"n":26,"type":"連接詞","options":{"A":"so","B":"or","C":"for","D":"yet"},"answer":"C","explain_zh":"(C) for：引導原因「因為」，考對等連接詞。","note":"【正解】for 作對等連接詞「因為」，引導原因，說明工作不易的理由（天氣多變）。\n【誘答】(A) so 所以、(B) or 或者、(D) yet 然而，皆與「補充原因」的邏輯不符。\n【重點】對等連接詞 for「因為」，用於補充說明理由。\n【句意】他們的工作並不輕鬆，因為天氣可能瞬間變化，毀掉一整季的心血。"},{"n":27,"type":"詞彙","options":{"A":"may","B":"should","C":"need","D":"used"},"answer":"A","explain_zh":"(A) may：颱風「可能」傷害作物，考助動詞語意。","note":"【正解】may「可能」表推測，後接原形 hurt，指強颱可能一夜間毀損作物、奪走收入。\n【誘答】(B) should 應該改變語意、(C) need 需要與 (D) used 後接法不同（need to／used to），皆語法或語意不合。\n【重點】情態助動詞 may 表可能性，後接原形動詞。\n【句意】一場強颱可能在一夜之間就傷害作物、奪走他們的收入。"},{"n":28,"type":"整句語意","options":{"A":"waste the food they grow for us","B":"buy any fruit at the market","C":"watch the weather report again","D":"plant trees in the countryside"},"answer":"A","explain_zh":"(A) 呼應感謝農夫、不該浪費食物，考整句語意。","note":"【正解】呼應前句要感謝農夫，故「絕不浪費他們為我們種的食物」語意最連貫。\n【誘答】(B) 在市場買任何水果、(C) 再看天氣預報、(D) 在鄉間種樹，皆與「感謝、不浪費」的主旨無關。\n【重點】整句語意須呼應感謝農夫、珍惜食物。\n【句意】我們應心存感激，絕不浪費他們為我們種出的食物。"}]}],"vocab":["paradise","mango","treasure","proud","juicy","field","weed","destroy","typhoon","crop","income","thankful"]},{"id":24,"passages":[{"label":"A","title_zh":"手作 DIY","text":"More and more young people in Taiwan enjoy making things with their own hands. This hobby, called DIY, allows them to be [[21]] and create something special. Instead of buying a gift from a store, they would rather make one [[22]] themselves. Making a candle or a leather wallet takes time and patience, [[23]] the result is always worth it. When friends receive such a handmade present, they can feel how much love was [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"lazy","B":"creative","C":"silent","D":"afraid"},"answer":"B","explain_zh":"(B) creative：DIY 讓人「有創意」，考形容詞詞彙。","note":"【正解】creative「有創意的」，呼應下文親手做出特別東西，語意最合。\n【誘答】(A) lazy 懶惰、(C) silent 沉默、(D) afraid 害怕，皆與 create something special 的創造情境不符。\n【重點】allow sb to be + 形容詞；creative 有創意的。\n【句意】這個稱為 DIY 的嗜好，讓他們能發揮創意，做出特別的東西。"},{"n":22,"type":"介系詞","options":{"A":"by","B":"on","C":"to","D":"of"},"answer":"A","explain_zh":"(A) by themselves「靠自己」為固定片語，考介系詞。","note":"【正解】by oneself「靠自己、親手」為固定片語，指親手做禮物。\n【誘答】(B) on、(C) to、(D) of themselves 皆非固定搭配，屬介系詞用錯。\n【重點】by oneself「獨自、親自」。\n【句意】他們寧願自己親手做一個，而不是從店裡買禮物。"},{"n":23,"type":"連接詞","options":{"A":"but","B":"so","C":"if","D":"or"},"answer":"A","explain_zh":"(A) but：前後語意轉折「雖然花時間但值得」，考連接詞。","note":"【正解】前句「花時間與耐心」與後句「成果值得」語意轉折，用 but「但是」連接。\n【誘答】(B) so 所以、(C) if 如果、(D) or 或者，皆不符合前後轉折的邏輯。\n【重點】對等連接詞 but 表語意轉折。\n【句意】做蠟燭或皮夾需要時間和耐心，但成果總是值得的。"},{"n":24,"type":"整句語意","options":{"A":"put into the little handmade gift","B":"wasted on cheap store products","C":"hidden inside the shopping bag","D":"spent on their monthly bills"},"answer":"A","explain_zh":"(A) 呼應手作禮物飽含心意，考整句語意。","note":"【正解】put love into「把愛投注於…」，呼應手作禮物飽含心意，語意連貫。\n【誘答】(B) 浪費在便宜商品、(C) 藏在購物袋、(D) 花在每月帳單，皆與手作禮物的心意無關或矛盾。\n【重點】put ... into「把（心力）投入…」；被動 was put into。\n【句意】當朋友收到這樣的手作禮物，就能感受到有多少愛被投注在這份小禮物裡。"}]},{"label":"B","title_zh":"假日創意市集","text":"On weekends, creative markets are becoming popular in many Taiwanese cities. In these markets, young artists sell handmade goods that they [[25]] design and produce. Compared with items in big shops, the products here are more [[26]], because each one is different. Shoppers walk slowly from booth to booth, [[27]] for something special to take home. If you love art and enjoy meeting friendly makers, you should [[28]].","blanks":[{"n":25,"type":"語法","options":{"A":"themselves","B":"them","C":"their","D":"they"},"answer":"A","explain_zh":"(A) themselves：加強語氣「親自」設計，考反身代名詞。","note":"【正解】反身代名詞 themselves 置於主詞後加強語氣「親自」設計製作。\n【誘答】(B) them 受格、(C) their 所有格、(D) they 主格，皆非用來加強語氣的反身代名詞，語法不合。\n【重點】反身代名詞作同位語加強語氣「親自」。\n【句意】在這些市集裡，年輕藝術家販售他們親自設計與製作的手工商品。"},{"n":26,"type":"詞彙","options":{"A":"boring","B":"common","C":"unique","D":"cheap"},"answer":"C","explain_zh":"(C) unique：每件都不同「獨特」，考形容詞詞彙。","note":"【正解】unique「獨特的」，呼應 because each one is different（每件都不同），語意最合。\n【誘答】(A) boring 無聊、(B) common 普通、(D) cheap 便宜，皆與「每件不同、獨特」的說明矛盾或不搭。\n【重點】more + 形容詞構成比較級；unique 獨特的。\n【句意】和大商店的商品相比，這裡的產品更獨特，因為每一件都不一樣。"},{"n":27,"type":"語法","options":{"A":"look","B":"looks","C":"looking","D":"looked"},"answer":"C","explain_zh":"(C) looking：分詞片語表同時動作，考詞形。","note":"【正解】現在分詞 looking 引導分詞片語，表與主要動詞 walk 同時發生的動作（一邊逛一邊找）。\n【誘答】(A) look 原形、(B) looks 單數現在式、(D) looked 過去式，皆不能構成表同時動作的分詞片語。\n【重點】分詞片語 V-ing 表伴隨、同時的動作；look for 尋找。\n【句意】購物者從一攤逛到一攤，尋找可以帶回家的特別東西。"},{"n":28,"type":"整句語意","options":{"A":"visit a creative market this weekend","B":"stay away from crowded places","C":"open a big factory of your own","D":"buy only from famous brands"},"answer":"A","explain_zh":"(A) 呼應喜歡藝術就去逛市集，考整句語意。","note":"【正解】呼應「若你愛藝術又喜歡認識友善創作者」，建議週末去逛創意市集，語意連貫。\n【誘答】(B) 遠離擁擠場所、(C) 開自己的大工廠、(D) 只買名牌，皆與逛市集、支持手作的主旨相反。\n【重點】整句語意須呼應上文喜愛藝術就去逛市集。\n【句意】如果你熱愛藝術又喜歡認識友善的創作者，這個週末就該去逛逛創意市集。"}]}],"vocab":["hobby","create","candle","leather","wallet","patience","handmade","market","artist","design","produce","unique"]},{"id":25,"passages":[{"label":"A","title_zh":"廟會與陣頭文化","text":"Temple fairs are an important part of life in many Taiwanese towns. During these lively events, groups of young performers called zhentou march through the streets to [[21]] the gods. The dancers wear colorful costumes and move their bodies [[22]] the sound of loud drums. In the past, some people looked down [[23]] these performers, but now more of them are proud of this old art. Through zhentou, young people learn discipline and [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"honor","B":"forget","C":"sell","D":"break"},"answer":"A","explain_zh":"(A) honor：陣頭遊行「敬奉」神明，考動詞詞彙。","note":"【正解】honor「敬奉、尊崇」，陣頭遊行是為了敬奉神明，符合廟會主旨。\n【誘答】(B) forget 忘記、(C) sell 賣、(D) break 打破，皆與敬神的情境不符。\n【重點】honor 當動詞「尊崇、敬奉」；不定詞 to V 表目的。\n【句意】在這些熱鬧的活動中，稱為陣頭的年輕表演者列隊走過街道來敬奉神明。"},{"n":22,"type":"介系詞","options":{"A":"to","B":"for","C":"off","D":"up"},"answer":"A","explain_zh":"(A) to the sound of「隨著…聲音」為固定用法，考介系詞。","note":"【正解】to the sound of「隨著…的聲音」為固定用法，指隨鼓聲擺動身體。\n【誘答】(B) for、(C) off、(D) up 皆不與 the sound of 搭配，屬介系詞用錯。\n【重點】to the sound of「配合／隨著…聲音」。\n【句意】舞者身穿彩色戲服，隨著響亮的鼓聲擺動身體。"},{"n":23,"type":"介系詞","options":{"A":"on","B":"in","C":"at","D":"over"},"answer":"A","explain_zh":"(A) look down on「看不起」為片語動詞，考介系詞。","note":"【正解】look down on「看不起、瞧不起」為片語動詞，指過去有人瞧不起這些表演者。\n【誘答】(B) in、(C) at、(D) over 皆不與 look down 構成「輕視」之意，屬介系詞搭配錯誤。\n【重點】片語動詞 look down on sb「輕視某人」。\n【句意】過去有些人瞧不起這些表演者，但現在有更多人以這門古老藝術為傲。"},{"n":24,"type":"整句語意","options":{"A":"keep their traditional culture alive","B":"leave their hometown forever","C":"stop believing in any gods","D":"give up all kinds of dancing"},"answer":"A","explain_zh":"(A) 呼應年輕人傳承文化，考整句語意。","note":"【正解】呼應年輕人透過陣頭學到紀律並「讓傳統文化延續」，語意正面連貫。\n【誘答】(B) 永遠離開家鄉、(C) 不再信神、(D) 放棄所有舞蹈，皆與傳承文化的主旨相反。\n【重點】keep + O + 形容詞（alive）「使…保持…」；整句語意呼應文化傳承。\n【句意】透過陣頭，年輕人學到紀律，也讓他們的傳統文化得以延續。"}]},{"label":"B","title_zh":"中秋節烤肉","text":"For many families in Taiwan, the Mid-Autumn Festival means barbecue. On that special night, families and friends gather outside, [[25]] meat and vegetables over hot fire. The smell of grilled food fills the air and makes everyone [[26]] hungry. While the meat is cooking, people look up at the moon, [[27]] is round and bright. Sharing food and laughter under the full moon is [[28]].","blanks":[{"n":25,"type":"語法","options":{"A":"cook","B":"cooked","C":"cooking","D":"cooks"},"answer":"C","explain_zh":"(C) cooking：分詞片語表同時動作，考詞形。","note":"【正解】現在分詞 cooking 引導分詞片語，表與 gather 同時發生的動作（聚在一起烤肉）。\n【誘答】(A) cook 原形、(B) cooked 過去式、(D) cooks 單數現在式，皆不能構成表同時動作的分詞片語。\n【重點】分詞片語 V-ing 表伴隨動作。\n【句意】在那個特別的夜晚，家人與朋友聚在戶外，在炭火上烤著肉和蔬菜。"},{"n":26,"type":"詞彙","options":{"A":"feel","B":"feeling","C":"felt","D":"feels"},"answer":"A","explain_zh":"(A) feel：make sb + 原形動詞，考使役動詞句型。","note":"【正解】make 為使役動詞，make sb + 原形動詞，故用 feel「使每個人感到飢餓」。\n【誘答】(B) feeling 分詞、(C) felt 過去式、(D) feels 單數現在式，皆不合使役動詞後接原形的規則。\n【重點】使役動詞 make sb + 原形 V。\n【句意】烤肉的香味瀰漫空中，讓每個人都覺得肚子餓了。"},{"n":27,"type":"語法","options":{"A":"which","B":"who","C":"what","D":"where"},"answer":"A","explain_zh":"(A) which：關係代名詞指 the moon，考關係詞。","note":"【正解】which 引導非限定關係子句，先行詞為 the moon（物），在子句中作主詞。\n【誘答】(B) who 指人、(C) what 不能有先行詞、(D) where 指地方，皆不合指「月亮」的關係詞用法。\n【重點】關係代名詞 which 指物，逗號後作補述用法。\n【句意】肉在烤的同時，人們抬頭望向那又圓又亮的月亮。"},{"n":28,"type":"整句語意","options":{"A":"the best part of the festival","B":"a boring thing to do","C":"against the old tradition","D":"harmful to our health"},"answer":"A","explain_zh":"(A) 呼應團圓賞月的美好，考整句語意。","note":"【正解】呼應中秋團圓賞月的美好，故「是這個節日最棒的部分」語意最連貫。\n【誘答】(B) 無聊的事、(C) 違反傳統、(D) 有害健康，皆為負面，與溫馨團圓的語氣矛盾。\n【重點】動名詞片語作主詞視為單數，用 is；整句語意須正向。\n【句意】在滿月下分享食物與歡笑，是這個節日最棒的部分。"}]}],"vocab":["temple","fair","performer","march","honor","costume","drum","discipline","barbecue","gather","grill","festival"]},{"id":26,"passages":[{"label":"A","title_zh":"偏鄉教學志工","text":"Every summer, many college students travel to faraway villages to become teaching [[21]]. They give free lessons to children who live in the mountains or by the sea. These young helpers do not get any money, [[22]] they gain something more valuable than pay. At first, some children are shy, but they slowly open [[23]] their hearts to the kind visitors. By the end of the summer, both the students and the children have [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"volunteers","B":"customers","C":"strangers","D":"winners"},"answer":"A","explain_zh":"(A) volunteers：偏鄉教學「志工」，考名詞詞彙。","note":"【正解】volunteers 指免費授課、不拿薪水的協助者，符合偏鄉教學的情境。\n【誘答】(B) customers 顧客、(C) strangers 陌生人、(D) winners 贏家，都與「免費教學的幫手」語意矛盾。\n【重點】名詞詞彙 volunteer「志工」，常搭配 teaching/community volunteers。\n【句意】每年夏天，許多大學生前往遙遠的村莊擔任教學志工。"},{"n":22,"type":"連接詞","options":{"A":"but","B":"so","C":"or","D":"for"},"answer":"A","explain_zh":"(A) but：沒錢卻得到更寶貴的東西，語意轉折，考連接詞。","note":"【正解】but 表語意轉折：沒拿到錢，卻得到比金錢更寶貴的東西。\n【誘答】(B) so 表結果、(C) or 表選擇、(D) for 表原因，都無法連接前後的對比。\n【重點】對等連接詞 but 表讓步、轉折。\n【句意】這些年輕的幫手沒有拿到任何錢，但他們得到比金錢更寶貴的東西。"},{"n":23,"type":"介系詞","options":{"A":"up","B":"in","C":"off","D":"of"},"answer":"A","explain_zh":"(A) open up「敞開」為片語動詞，考介系詞。","note":"【正解】open up「敞開」為片語動詞，指向他人敞開心房。\n【誘答】(B) in、(C) off、(D) of 與 open 搭配都無法構成「敞開心房」的意思。\n【重點】片語動詞 open up「打開、敞開心胸」。\n【句意】起初有些孩子很害羞，但他們慢慢向這些親切的訪客敞開心房。"},{"n":24,"type":"整句語意","options":{"A":"learned and grown a lot together","B":"forgotten each other completely","C":"returned all the free lessons","D":"given up on their studies"},"answer":"A","explain_zh":"(A) 呼應師生一起成長，考整句語意。","note":"【正解】呼應師生相處一夏後「一起學習並成長許多」，是正向收尾。\n【誘答】(B) 徹底忘記彼此、(C) 歸還所有免費課程、(D) 放棄學業，都與正面結局矛盾。\n【重點】整句語意判斷，須扣住 both the students and the children 的正向語氣。\n【句意】到了夏天結束時，大學生與孩子們都一起學到很多、成長許多。"}]},{"label":"B","title_zh":"城鄉教育差距","text":"In big cities, students can easily find good schools, libraries, and after-class programs. However, children in the countryside often have [[25]] chances to learn than city kids. Many small village schools do not have enough teachers [[26]] new computers. This gap between city and country worries a lot of people [[27]] care about fairness. To close this gap, the government and many groups are now [[28]].","blanks":[{"n":25,"type":"語法","options":{"A":"few","B":"fewer","C":"fewest","D":"little"},"answer":"B","explain_zh":"(B) fewer：與 than 連用的比較級「較少」，考比較級。","note":"【正解】fewer 修飾可數名詞 chances，且與 than 連用構成比較級「較少」。\n【誘答】(A) few 是原級非比較級；(C) fewest 是最高級不與 than 連用；(D) little 修飾不可數名詞，chances 可數。\n【重點】比較級 fewer...than，fewer 修飾可數複數名詞。\n【句意】然而，鄉下的孩子學習機會往往比城市孩子還少。"},{"n":26,"type":"連接詞","options":{"A":"or","B":"but","C":"so","D":"yet"},"answer":"A","explain_zh":"(A) or：否定句中「也沒有」用 or 連接，考連接詞。","note":"【正解】否定句中並列兩者「也沒有」用 or 連接。\n【誘答】(B) but 表轉折、(C) so 表結果、(D) yet 表轉折，都不合「兩者皆缺」的並列否定。\n【重點】否定句 not...A or B 表「A、B 兩者都沒有」。\n【句意】許多小型村校連足夠的老師或新電腦都沒有。"},{"n":27,"type":"語法","options":{"A":"who","B":"which","C":"whom","D":"whose"},"answer":"A","explain_zh":"(A) who：關係代名詞指 people 當主詞，考關係詞。","note":"【正解】who 為關係代名詞，指人 people，且在子句中當主詞。\n【誘答】(B) which 指物；(C) whom 作受詞，此處缺主詞；(D) whose 表所有格，後須接名詞。\n【重點】關係代名詞 who 指人、作主詞。\n【句意】城鄉之間的這種差距，令許多在乎公平的人感到憂心。"},{"n":28,"type":"整句語意","options":{"A":"working hard to help rural students","B":"closing all the country schools","C":"moving every family to the city","D":"ignoring the problem on purpose"},"answer":"A","explain_zh":"(A) 呼應努力縮小城鄉差距，考整句語意。","note":"【正解】呼應為縮小差距，政府與團體「正努力協助偏鄉學生」。\n【誘答】(B) 關閉所有鄉村學校、(C) 把每個家庭搬到城市、(D) 故意忽視問題，都與「縮小差距」的目的矛盾。\n【重點】整句語意，須扣住 To close this gap 的解決導向。\n【句意】為了縮小這個差距，政府和許多團體現在正努力幫助偏鄉學生。"}]}],"vocab":["village","volunteer","valuable","shy","countryside","library","program","gap","fairness","rural","chance","grow"]},{"id":27,"passages":[{"label":"A","title_zh":"多吃蔬菜的好處","text":"Eating enough vegetables every day is one of the easiest ways to stay [[21]]. Vegetables are full of vitamins and fiber, which help our bodies grow strong and work well. People who eat a lot of greens usually have [[22]] energy than those who do not. Vegetables can also protect us [[23]] many diseases, such as heart problems. So next time you sit down for a meal, remember to [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"healthy","B":"tired","C":"hungry","D":"angry"},"answer":"A","explain_zh":"(A) healthy：多吃菜保持「健康」，考形容詞詞彙。","note":"【正解】stay healthy「保持健康」，呼應多吃蔬菜的好處。\n【誘答】(B) tired 疲累、(C) hungry 飢餓、(D) angry 生氣，都與「多吃菜的益處」語意矛盾。\n【重點】連綴動詞 stay + 形容詞；healthy「健康的」。\n【句意】每天吃足夠的蔬菜是保持健康最簡單的方法之一。"},{"n":22,"type":"語法","options":{"A":"much","B":"more","C":"most","D":"many"},"answer":"B","explain_zh":"(B) more：與 than 連用的比較級，考比較級。","note":"【正解】more 修飾 energy 並與 than 連用，構成比較級「較多」。\n【誘答】(A) much 是原級；(C) most 是最高級不與 than 連用；(D) many 修飾可數名詞，energy 不可數。\n【重點】比較級 more...than，more 可修飾不可數名詞 energy。\n【句意】常吃綠色蔬菜的人通常比不吃的人精力更充沛。"},{"n":23,"type":"介系詞","options":{"A":"from","B":"for","C":"on","D":"at"},"answer":"A","explain_zh":"(A) protect A from B「保護免於」為固定用法，考介系詞。","note":"【正解】protect A from B「保護 A 免於 B」為固定搭配。\n【誘答】(B) for、(C) on、(D) at 都不是 protect 的正確介系詞搭配。\n【重點】動詞片語 protect...from...「保護免於」。\n【句意】蔬菜也能保護我們免於許多疾病，例如心臟問題。"},{"n":24,"type":"整句語意","options":{"A":"fill half of your plate with vegetables","B":"throw away all the green food","C":"eat only meat and sweet snacks","D":"skip your dinner to lose weight"},"answer":"A","explain_zh":"(A) 呼應多吃蔬菜的建議，考整句語意。","note":"【正解】呼應全文鼓勵多吃蔬菜，「把盤子一半裝滿蔬菜」。\n【誘答】(B) 丟掉所有綠色食物、(C) 只吃肉和甜點、(D) 為減肥而不吃晚餐，都與多吃蔬菜矛盾。\n【重點】整句語意，須扣住 remember to 後的正向建議。\n【句意】所以下次坐下來用餐時，記得把盤子的一半裝滿蔬菜。"}]},{"label":"B","title_zh":"速食的壞處","text":"Fast food is cheap, tasty, and easy to get, so many teenagers love it. However, eating too much fast food is [[25]] for our health. Most of these meals are full of oil, sugar, and salt, [[26]] can make people gain weight. Someone who eats burgers and fries every day may [[27]] become fat and weak. If we want to enjoy a long and healthy life, we should [[28]].","blanks":[{"n":25,"type":"詞彙","options":{"A":"helpful","B":"harmful","C":"wonderful","D":"peaceful"},"answer":"B","explain_zh":"(B) harmful：速食「有害」健康，考形容詞詞彙。","note":"【正解】harmful「有害的」，呼應吃太多速食對健康不好。\n【誘答】(A) helpful 有幫助、(C) wonderful 極好、(D) peaceful 平靜，都與「壞處」語意矛盾。\n【重點】形容詞 harmful，常搭配 be harmful to/for health。\n【句意】然而，吃太多速食對我們的健康有害。"},{"n":26,"type":"語法","options":{"A":"which","B":"who","C":"where","D":"what"},"answer":"A","explain_zh":"(A) which：關係代名詞指前面整件事，考關係詞。","note":"【正解】which 為關係代名詞，引導非限定子句指前面整件事。\n【誘答】(B) who 指人；(C) where 指地點作關係副詞；(D) what 不可引導關係子句修飾前文。\n【重點】關係代名詞 which 可指前面整句或概念（非限定用法）。\n【句意】這些餐點大多充滿油、糖和鹽，這會使人變胖。"},{"n":27,"type":"詞彙","options":{"A":"slowly","B":"hardly","C":"never","D":"seldom"},"answer":"A","explain_zh":"(A) slowly：天天吃會「慢慢」變胖，考副詞語意。","note":"【正解】slowly「慢慢地」，天天吃速食會逐漸變胖變虛弱。\n【誘答】(B) hardly 幾乎不、(C) never 從不、(D) seldom 很少，都是否定副詞，與「會變胖」矛盾。\n【重點】副詞語意判斷；注意 hardly/seldom/never 為否定含意。\n【句意】每天吃漢堡和薯條的人可能會慢慢變得又胖又虛弱。"},{"n":28,"type":"整句語意","options":{"A":"eat fast food only once in a while","B":"have burgers for every single meal","C":"stop eating any vegetables at all","D":"drink soda instead of clean water"},"answer":"A","explain_zh":"(A) 呼應偶爾吃速食才健康，考整句語意。","note":"【正解】呼應想健康長壽，「只偶爾吃速食」才合理。\n【誘答】(B) 每餐都吃漢堡、(C) 完全不吃蔬菜、(D) 用汽水取代乾淨的水，都與健康建議矛盾。\n【重點】整句語意，須扣住 healthy life 的正向建議；once in a while「偶爾」。\n【句意】若想享有長久又健康的生活，我們應該只偶爾吃速食。"}]}],"vocab":["vegetable","vitamin","fiber","energy","protect","disease","meal","sugar","salt","weight","harmful","healthy"]},{"id":28,"passages":[{"label":"A","title_zh":"電競比賽","text":"Video gaming is no longer just a hobby; it has become a real [[21]] called esports. In big tournaments, skilled players sit on a bright stage and fight against each other [[22]] a large prize. Thousands of excited fans watch the games, both in the hall and [[23]] the Internet. Good players must practice for many hours and work well as a team. To win a match, a team needs to [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"sport","B":"food","C":"song","D":"book"},"answer":"A","explain_zh":"(A) sport：電競成為一種「運動」，考名詞詞彙。","note":"【正解】sport「運動」，電競成為一種真正的運動。\n【誘答】(B) food 食物、(C) song 歌曲、(D) book 書，都與 called esports 的定義矛盾。\n【重點】名詞詞彙；esports（電子競技）被視為一種 sport。\n【句意】打電玩不再只是嗜好，它已成為一種名為電競的真正運動。"},{"n":22,"type":"介系詞","options":{"A":"for","B":"at","C":"of","D":"by"},"answer":"A","explain_zh":"(A) for：為「爭取」大獎而戰，考介系詞。","note":"【正解】for 表目的「為了爭取大獎」。\n【誘答】(B) at、(C) of、(D) by 都無法表達「為爭取獎金而戰」的目的語意。\n【重點】介系詞 for 表目的、為了（fight for a prize）。\n【句意】在大型賽事中，技術高超的選手在明亮的舞台上為爭奪大獎而對戰。"},{"n":23,"type":"介系詞","options":{"A":"on","B":"in","C":"to","D":"of"},"answer":"A","explain_zh":"(A) on the Internet「在網路上」為固定用法，考介系詞。","note":"【正解】on the Internet「在網路上」為固定用法。\n【誘答】(B) in、(C) to、(D) of 都不是與 the Internet 搭配的正確介系詞。\n【重點】固定搭配 on the Internet。\n【句意】成千上萬興奮的粉絲觀看比賽，無論是在會場內還是在網路上。"},{"n":24,"type":"整句語意","options":{"A":"plan carefully and trust each other","B":"give up before the game starts","C":"play alone without any friends","D":"turn off the computer right away"},"answer":"A","explain_zh":"(A) 呼應團隊合作才能致勝，考整句語意。","note":"【正解】呼應選手需團隊合作，「仔細規劃並彼此信任」才能致勝。\n【誘答】(B) 比賽開始前就放棄、(C) 沒有朋友獨自玩、(D) 立刻關電腦，都與致勝、團隊合作矛盾。\n【重點】整句語意，須扣住 work well as a team 的團隊精神。\n【句意】要贏得一場比賽，一支隊伍需要仔細規劃並彼此信任。"}]},{"label":"B","title_zh":"適度使用 3C 產品","text":"Smartphones and computers are useful tools, but using them too much can hurt us. Many students stare at their screens for hours, [[25]] often makes their eyes tired and dry. Sitting too long without moving is also [[26]] for the body. Doctors say we should take a short break [[27]] every thirty minutes of screen time. To stay both healthy and happy, we must learn to [[28]].","blanks":[{"n":25,"type":"語法","options":{"A":"which","B":"who","C":"what","D":"it"},"answer":"A","explain_zh":"(A) which：關係代名詞指前面整件事，考關係詞。","note":"【正解】which 引導非限定子句，指前面整件事，且子句缺主詞。\n【誘答】(B) who 指人；(C) what 不可引導此類關係子句；(D) it 為代名詞會造成兩個主詞、句構錯誤。\n【重點】關係代名詞 which 指前文整件事並在子句中作主詞。\n【句意】許多學生盯著螢幕好幾個小時，這常使他們的眼睛又累又乾。"},{"n":26,"type":"詞彙","options":{"A":"bad","B":"good","C":"safe","D":"kind"},"answer":"A","explain_zh":"(A) bad：久坐對身體「不好」，考形容詞詞彙。","note":"【正解】bad「不好的」，久坐不動對身體有害。\n【誘答】(B) good 好、(C) safe 安全、(D) kind 親切，都與「傷害身體」語意矛盾。\n【重點】形容詞 bad，常搭配 be bad for「對…有害」。\n【句意】長時間坐著不動對身體也不好。"},{"n":27,"type":"介系詞","options":{"A":"after","B":"since","C":"until","D":"during"},"answer":"A","explain_zh":"(A) after：每用 30 分鐘「之後」休息，考介系詞。","note":"【正解】after「在…之後」，每用 30 分鐘之後休息一下。\n【誘答】(B) since 表自從、(C) until 表直到、(D) during 表期間，都與「每隔一段時間後休息」語意不合。\n【重點】介系詞 after 表時間之後。\n【句意】醫生說我們每用螢幕三十分鐘後應該稍作休息。"},{"n":28,"type":"整句語意","options":{"A":"use these products in a proper way","B":"throw all our phones into the sea","C":"play games all day and all night","D":"never touch a computer again"},"answer":"A","explain_zh":"(A) 呼應標題「適度使用」3C，考整句語意。","note":"【正解】呼應標題「適度使用」，以正確方式使用 3C 產品。\n【誘答】(B) 把手機全丟進海裡、(C) 整天整夜玩遊戲、(D) 再也不碰電腦，都是極端做法，與「適度」矛盾。\n【重點】整句語意，須扣住 both healthy and happy 的平衡觀點；proper「適當的」。\n【句意】為了同時保持健康與快樂，我們必須學會以適當的方式使用這些產品。"}]}],"vocab":["gaming","esports","tournament","skilled","stage","prize","screen","stare","break","proper","team","practice"]},{"id":29,"passages":[{"label":"A","title_zh":"台鐵便當","text":"The railway lunch box is a famous food in Taiwan. For many years, travelers have [[21]] these warm boxes while riding the train. A typical lunch box comes [[22]] a piece of pork, rice, a boiled egg, and some vegetables. The taste is simple, but it is [[23]] than any fancy meal for people who miss the old days. Now the railway sells special boxes at busy stations, so hungry passengers [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"refused","B":"enjoyed","C":"wasted","D":"sold"},"answer":"B","explain_zh":"(B) enjoyed：旅客多年來「享用」火車便當，考動詞詞彙。","note":"【正解】enjoyed「享用」，旅客多年來享用這些熱便當。\n【誘答】(A) refused 拒絕、(C) wasted 浪費、(D) sold 賣出，都與「旅客享用便當」語意矛盾。\n【重點】動詞詞彙 enjoy；此處現在完成式 have enjoyed 表持續多年。\n【句意】多年來，旅客們一邊搭火車一邊享用這些熱便當。"},{"n":22,"type":"詞彙/句型","options":{"A":"from","B":"into","C":"with","D":"off"},"answer":"C","explain_zh":"(C) come with：便當「附有」豬肉、飯等，考介系詞搭配。","note":"【正解】come with「附有、隨附」，便當附有豬肉、飯等。\n【誘答】(A) from 表來源、(B) into 表進入、(D) off 表離開，都不合「附帶配菜」的搭配。\n【重點】動詞片語 come with「附有、隨附」。\n【句意】典型的便當附有一塊豬肉、白飯、一顆滷蛋和一些蔬菜。"},{"n":23,"type":"語法","options":{"A":"better","B":"good","C":"best","D":"well"},"answer":"A","explain_zh":"(A) better：與 than 連用的比較級「更好」，考比較級語法。","note":"【正解】better 為 good 的比較級，與 than 連用「比…更好」。\n【誘答】(B) good 是原級；(C) best 是最高級不與 than 連用；(D) well 是副詞，此處需形容詞。\n【重點】不規則比較級 good-better-best；better...than。\n【句意】味道雖然簡單，但對懷念舊時光的人來說，它比任何精緻大餐都更好。"},{"n":24,"type":"整句語意","options":{"A":"have to cook their own food at home","B":"are not allowed to eat on the train","C":"must throw away the boxes right away","D":"can grab a hot meal before they get on board"},"answer":"D","explain_zh":"(D) 呼應車站賣便當方便旅客「上車前買熱食」，考整句語意。","note":"【正解】呼應車站賣便當，讓飢餓旅客「上車前能買到熱食」。\n【誘答】(A) 得在家自己煮、(B) 不准在火車上吃、(C) 必須立刻丟掉便當，都與車站便利販售矛盾。\n【重點】整句語意，須扣住 sells...at busy stations 的便利性；get on board「上車」。\n【句意】如今鐵路在繁忙車站販售特色便當，讓飢餓的旅客上車前就能買到熱騰騰的一餐。"}]},{"label":"B","title_zh":"搭火車環島","text":"Traveling around the island by train is a popular way to see Taiwan. In just a few days, visitors can go [[25]] the mountains, the coast, and small country towns. The train windows offer beautiful views, [[26]] passengers can relax and take photos along the way. Because tickets are not expensive, this kind of trip is [[27]] for students with little money. If you want a slow but memorable journey, taking the train around the island [[28]].","blanks":[{"n":25,"type":"介系詞","options":{"A":"against","B":"through","C":"without","D":"off"},"answer":"B","explain_zh":"(B) through：火車「穿過」山、海岸與小鎮，考介系詞。","note":"【正解】through「穿過」，火車穿過山、海岸與小鎮。\n【誘答】(A) against 對抗、(C) without 沒有、(D) off 離開，都與「穿越各地」語意不合。\n【重點】介系詞 through「穿過、經過」。\n【句意】短短幾天內，遊客就能穿過山區、海岸和鄉間小鎮。"},{"n":26,"type":"連接詞","options":{"A":"so","B":"but","C":"unless","D":"or"},"answer":"A","explain_zh":"(A) so：美景「所以」旅客能放鬆拍照，表結果，考連接詞。","note":"【正解】so「所以」表結果，美景使旅客能放鬆拍照。\n【誘答】(B) but 表轉折、(C) unless 表除非、(D) or 表選擇，都與前後的因果關係不合。\n【重點】對等連接詞 so 表結果。\n【句意】火車車窗提供美麗的景色，所以旅客可以一路放鬆並拍照。"},{"n":27,"type":"詞彙","options":{"A":"boring","B":"dangerous","C":"perfect","D":"strange"},"answer":"C","explain_zh":"(C) perfect：便宜票價對沒錢的學生「再適合不過」，考形容詞詞彙。","note":"【正解】perfect「再適合不過」，便宜票價對沒錢的學生最合適。\n【誘答】(A) boring 無聊、(B) dangerous 危險、(D) strange 奇怪，都與「票價便宜的優點」語意矛盾。\n【重點】形容詞 perfect，常搭配 be perfect for「非常適合」。\n【句意】因為車票不貴，這種旅行對沒什麼錢的學生來說再適合不過。"},{"n":28,"type":"整句語意","options":{"A":"costs far too much for anyone","B":"is surely a great choice for you","C":"is the fastest way to travel","D":"should always be avoided by tourists"},"answer":"B","explain_zh":"(B) 呼應想要慢遊，火車環島「是很好的選擇」，考整句語意。","note":"【正解】呼應想要慢遊又難忘，火車環島「肯定是很好的選擇」。\n【誘答】(A) 對任何人都太貴、(C) 是最快的旅行方式、(D) 遊客應永遠避免，都與前文正向推薦及票價便宜、步調慢矛盾。\n【重點】整句語意，須扣住 slow but memorable 的推薦語氣。\n【句意】如果你想要一趟緩慢卻難忘的旅程，搭火車環島肯定是很棒的選擇。"}]}],"vocab":["railway","lunch box","traveler","passenger","fancy","coast","journey","memorable","relax","ticket","station","island"]},{"id":30,"passages":[{"label":"A","title_zh":"學校營養午餐","text":"School lunch plays an important role in students' daily life. Every noon, the kitchen staff [[21]] hot meals for hundreds of hungry children. A good lunch should be balanced, [[22]] rice, meat, vegetables, and soup. Doctors say that students who eat healthy meals can pay [[23]] attention than those who skip lunch. To make lunch better, some schools now ask students what they like, so the food [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"prepare","B":"throw","C":"buy","D":"forget"},"answer":"A","explain_zh":"(A) prepare：廚房員工為學生「準備」熱食；複數主詞用 prepare，考詞彙與主謂一致。","note":"【正解】prepare「準備」，廚房員工為孩子準備熱食。\n【誘答】(B) throw 丟、(C) buy 買、(D) forget 忘記，都與「供應午餐」語意矛盾。\n【重點】動詞詞彙 prepare；主詞 staff（全體員工）視為複數，動詞用原形，考主謂一致。\n【句意】每天中午，廚房員工為數百名飢餓的孩子準備熱騰騰的餐點。"},{"n":22,"type":"詞彙/句型","options":{"A":"except","B":"instead","C":"including","D":"without"},"answer":"C","explain_zh":"(C) including：均衡午餐「包括」飯、肉、菜、湯，考詞彙。","note":"【正解】including「包括」，均衡午餐包含飯、肉、菜、湯。\n【誘答】(A) except 除外、(B) instead 反而、(D) without 沒有，都與「內含這些食物」語意矛盾。\n【重點】介系詞 including「包括」，後接舉例的名詞。\n【句意】好的午餐應該均衡，包括米飯、肉、蔬菜和湯。"},{"n":23,"type":"語法","options":{"A":"much","B":"more","C":"most","D":"many"},"answer":"B","explain_zh":"(B) more：與 than 連用「更專心」，考比較級語法。","note":"【正解】more 與 than 連用構成比較級「更專心」。\n【誘答】(A) much 是原級；(C) most 是最高級不與 than 連用；(D) many 修飾可數名詞，attention 不可數。\n【重點】比較級 more...than；pay attention「專心」為固定搭配。\n【句意】醫生說吃健康餐點的學生比不吃午餐的人更能集中注意力。"},{"n":24,"type":"整句語意","options":{"A":"can better fit their taste","B":"is always thrown into the trash","C":"becomes worse every day","D":"is cooked by the students themselves"},"answer":"A","explain_zh":"(A) 呼應問學生喜好，食物「更合口味」，考整句語意。","note":"【正解】呼應詢問學生喜好，食物「更能符合他們的口味」。\n【誘答】(B) 總被丟進垃圾桶、(C) 每天變更糟、(D) 由學生自己煮，都與「改善午餐」的目的矛盾。\n【重點】整句語意，須扣住 ask students what they like 的改善導向；fit one's taste「合口味」。\n【句意】為了讓午餐更好，有些學校現在會詢問學生的喜好，好讓食物更合他們的口味。"}]},{"label":"B","title_zh":"剩食浪費","text":"Food waste has become a serious problem around the world. Every day, a huge amount of good food [[25]] thrown away, even though many people are still hungry. Some markets now [[26]] fruits and vegetables that look ugly but still taste fine. Restaurants can also give their extra meals to those in need [[27]] letting it go bad. If everyone takes small steps, we can save food and money, and together we [[28]].","blanks":[{"n":25,"type":"語法","options":{"A":"are","B":"be","C":"being","D":"is"},"answer":"D","explain_zh":"(D) is：a huge amount of food 為單數主詞，被動用 is thrown，考主謂一致與被動。","note":"【正解】is；a huge amount of good food 為單數主詞，被動語態用 is thrown away。\n【誘答】(A) are 是複數動詞，主詞為單數；(B) be 是原形不可單獨作動詞；(C) being 是分詞不能單獨當述語動詞。\n【重點】主謂一致 a huge amount of + 不可數名詞視為單數；被動語態 be + p.p.。\n【句意】每天都有大量的好食物被丟棄，即使還有許多人在挨餓。"},{"n":26,"type":"詞彙","options":{"A":"hide","B":"sell","C":"burn","D":"waste"},"answer":"B","explain_zh":"(B) sell：市場「販售」外表醜但仍好吃的蔬果，考動詞詞彙。","note":"【正解】sell「販售」，市場販售外表醜但仍好吃的蔬果以減少浪費。\n【誘答】(A) hide 藏、(C) burn 燒、(D) waste 浪費，都與「減少剩食」的做法矛盾。\n【重點】動詞詞彙 sell。\n【句意】有些市場現在會販售外表醜卻仍然好吃的蔬果。"},{"n":27,"type":"連接詞","options":{"A":"because of","B":"thanks to","C":"instead of","D":"in spite of"},"answer":"C","explain_zh":"(C) instead of：把剩餐送人「而不是」讓它壞掉，考片語連接詞。","note":"【正解】instead of「而不是」，把多的餐點送人而不是讓它壞掉。\n【誘答】(A) because of 因為、(B) thanks to 多虧、(D) in spite of 儘管，都與「取代讓食物壞掉」的對比語意不合。\n【重點】片語介系詞 instead of + V-ing「而不是…」。\n【句意】餐廳也可以把多餘的餐點送給有需要的人，而不是讓它壞掉。"},{"n":28,"type":"整句語意","options":{"A":"will waste even more than before","B":"should throw away all the food","C":"have no way to help others","D":"can make the world a better place"},"answer":"D","explain_zh":"(D) 呼應人人出點力，「能讓世界更好」，考整句語意。","note":"【正解】呼應人人出點力，「能讓世界變得更好」。\n【誘答】(A) 會浪費得比以前更多、(B) 應把所有食物丟掉、(C) 沒辦法幫助別人，都與正向結尾矛盾。\n【重點】整句語意，須扣住 takes small steps...save food 的正面收尾；make + O + OC「使…變成」。\n【句意】如果人人都踏出小小的一步，我們就能省下食物和金錢，一起讓世界變得更美好。"}]}],"vocab":["balanced","meal","prepare","attention","skip","waste","amount","market","restaurant","extra","save","step"]},{"id":31,"passages":[{"label":"A","title_zh":"登山健行","text":"Hiking in the mountains is a wonderful way to stay healthy and enjoy nature. On weekends, many families [[21]] up early to catch fresh air and beautiful views. Walking on a green trail can help people forget their worries [[22]] make them feel relaxed. However, the weather in the mountains changes fast, so hikers should always [[23]] the forecast before they leave. With good planning, a day in the mountains [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"give","B":"look","C":"get","D":"put"},"answer":"C","explain_zh":"(C) get up：家庭「早起」呼吸新鮮空氣，考片語動詞詞彙。","note":"【正解】get up 表「起床、早起」，家庭週末早起去呼吸新鮮空氣，語意通順。\n【誘答】(A) give up 是「放棄」，語意不通；(B) look up 是「查閱、抬頭看」，不能與 early 搭配表早起；(D) put up 是「搭建、張貼」，與早起無關。\n【重點】片語動詞 get up「起床」；此處考動詞與介副詞的搭配。\n【句意】週末時，許多家庭早起去呼吸新鮮空氣、欣賞美景。"},{"n":22,"type":"連接詞","options":{"A":"and","B":"but","C":"or","D":"so"},"answer":"A","explain_zh":"(A) and：忘掉煩惱「並且」感到放鬆，前後並列，考連接詞。","note":"【正解】and 連接並列動詞 forget 與 make，表「並且」，前後同方向順接。\n【誘答】(B) but 表轉折，但兩件事同方向不需轉折；(C) or 表選擇，語意不合；(D) so 表因果，前後並非因果關係。\n【重點】對等連接詞 and 連接兩個並列的動詞片語；help + 受詞 + (to) V 句型。\n【句意】走在綠色步道上能幫助人們忘卻煩惱，並讓他們感到放鬆。"},{"n":23,"type":"詞彙","options":{"A":"clean","B":"close","C":"carry","D":"check"},"answer":"D","explain_zh":"(D) check：出發前先「查看」氣象預報，考動詞詞彙。","note":"【正解】check the forecast「查看天氣預報」，出發前先確認天氣，語意合理。\n【誘答】(A) clean 是「清潔」，不能清潔預報；(B) close 是「關閉」；(C) carry 是「攜帶」，皆與查看預報搭配不合。\n【重點】動詞 check「查看、確認」與 forecast 搭配；should + 原形動詞。\n【句意】然而山區天氣變化快，健行者出發前應該總是查看天氣預報。"},{"n":24,"type":"整句語意","options":{"A":"is always full of danger","B":"can be both safe and fun","C":"must be canceled at once","D":"makes people very tired and sad"},"answer":"B","explain_zh":"(B) 呼應事先規劃，登山「既安全又有趣」，考整句語意。","note":"【正解】呼應前句「良好規劃」，山中的一天「既安全又有趣」，語意連貫。\n【誘答】(A)「總是充滿危險」與好規劃矛盾；(C)「必須立刻取消」語意相反；(D)「讓人又累又難過」與正面語氣不合。\n【重點】整句語意判斷須與 With good planning 的正面前提一致；both A and B 句型。\n【句意】只要規劃得當，山中的一天既安全又充滿樂趣。"}]},{"label":"B","title_zh":"山林安全裝備","text":"Before going into the mountains, hikers must bring the right gear to stay safe. A pair of strong shoes is one of the [[25]] important things, because they protect your feet on rough paths. You should also carry enough water [[26]] you will not feel thirsty on the way. A raincoat, a map, and a small light are useful [[27]] the weather turns bad or night falls. Remember, being well prepared [[28]].","blanks":[{"n":25,"type":"語法","options":{"A":"most","B":"more","C":"much","D":"very"},"answer":"A","explain_zh":"(A) most：one of the most + 形容詞「最…之一」，考最高級語法。","note":"【正解】one of the most + 形容詞 =「最…之一」，most 構成最高級。\n【誘答】(B) more 是比較級，不能接在 one of the 之後；(C) much 修飾不可數名詞或比較級，此處不適用；(D) very 不能與 one of the...things 構成最高級。\n【重點】最高級句型 one of the most + adj. + 複數名詞。\n【句意】一雙堅固的鞋子是最重要的東西之一，因為它們在崎嶇的路上保護你的腳。"},{"n":26,"type":"連接詞","options":{"A":"because","B":"although","C":"so that","D":"unless"},"answer":"C","explain_zh":"(C) so that：帶足夠水「以便」不會口渴，表目的，考連接詞。","note":"【正解】so that 引導目的副詞子句「以便…不口渴」，表目的。\n【誘答】(A) because 表原因，但此處是目的而非原因；(B) although 表讓步，語意矛盾；(D) unless 是「除非」，語意相反。\n【重點】so that + 子句表目的；須與表原因的 because 區分。\n【句意】你也應該帶足夠的水，以便在路上不會感到口渴。"},{"n":27,"type":"連接詞","options":{"A":"instead of","B":"in case","C":"as well as","D":"such as"},"answer":"B","explain_zh":"(B) in case：雨衣等有用，「以防」天氣變壞或天黑，考片語連接詞。","note":"【正解】in case「以防、萬一」，引導預防情況的子句，語意合理。\n【誘答】(A) instead of「而非」後接名詞或動名詞，不接子句；(C) as well as「以及」；(D) such as「例如」，皆不能引導此條件子句。\n【重點】in case + 子句「以防萬一」；與 such as、as well as 用法區別。\n【句意】雨衣、地圖和一盞小燈在天氣變壞或天黑時很有用。"},{"n":28,"type":"整句語意","options":{"A":"is the key to a safe trip","B":"is a waste of time and money","C":"makes hiking more dangerous","D":"means you should stay home"},"answer":"A","explain_zh":"(A) 呼應充分準備「是安全出遊的關鍵」，考整句語意。","note":"【正解】呼應全段「充分準備」，準備妥當「是安全出遊的關鍵」，語意連貫。\n【誘答】(B)「浪費時間和金錢」與準備的正面意義矛盾；(C)「使健行更危險」語意相反；(D)「代表你該待在家」不合邏輯。\n【重點】整句語意判斷；the key to + N「…的關鍵」，to 為介系詞。\n【句意】記住，做好充分準備是安全出遊的關鍵。"}]}],"vocab":["hike","trail","nature","forecast","relaxed","gear","protect","rough","path","thirsty","prepared","safe"]},{"id":32,"passages":[{"label":"A","title_zh":"街頭藝人表演","text":"Street performers add color and life to many cities in Taiwan. On weekends, you can often [[21]] singers, dancers, and magicians in busy squares. Their shows are free, [[22]] some people still give money to thank them. A talented performer can easily [[23]] a large crowd within a few minutes. If you ever pass by one of these shows, stopping to watch for a while [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"cook","B":"see","C":"buy","D":"become"},"answer":"B","explain_zh":"(B) see：在廣場常能「看到」歌手、舞者與魔術師，考動詞詞彙。","note":"【正解】see「看到」歌手、舞者與魔術師，語意自然。\n【誘答】(A) cook「烹煮」人不合理；(C) buy「購買」表演者語意荒謬；(D) become「成為」語意不通。\n【重點】感官動詞 see「看見」；can often + 原形動詞表經常發生。\n【句意】週末時，你常能在熱鬧的廣場看到歌手、舞者和魔術師。"},{"n":22,"type":"連接詞","options":{"A":"so","B":"for","C":"or","D":"but"},"answer":"D","explain_zh":"(D) but：表演免費「但」有人仍給錢，前後轉折，考連接詞。","note":"【正解】but 表轉折，表演免費「但」仍有人給錢，前後對比。\n【誘答】(A) so 表結果，語意不合；(B) for 表原因，不合；(C) or 表選擇，不合。\n【重點】對等連接詞 but 表轉折；副詞 still 強化對比語氣。\n【句意】他們的表演是免費的，但有些人仍會給錢來感謝他們。"},{"n":23,"type":"詞彙","options":{"A":"draw","B":"leave","C":"lose","D":"close"},"answer":"A","explain_zh":"(A) draw a crowd：厲害的藝人能「吸引」人潮，考動詞詞彙。","note":"【正解】draw a crowd「吸引人潮」為固定搭配，語意合理。\n【誘答】(B) leave「離開、留下」；(C) lose「失去」；(D) close「關閉」，皆與吸引人群矛盾。\n【重點】draw a crowd「吸引群眾」的動詞搭配。\n【句意】有才華的表演者能在幾分鐘內輕易吸引一大群人。"},{"n":24,"type":"整句語意","options":{"A":"is a complete waste of money","B":"will get you into trouble","C":"is really worth your time","D":"is not allowed in the city"},"answer":"C","explain_zh":"(C) 呼應停下欣賞街頭表演「真的值得」，考整句語意。","note":"【正解】呼應前文精彩表演，停下欣賞「真的值得花時間」，語意正面連貫。\n【誘答】(A)「完全浪費錢」與免費表演矛盾；(B)「會讓你惹上麻煩」不合理；(D)「城市不允許」與前文描述矛盾。\n【重點】整句語意；worth + N/Ving「值得…」；動名詞 stopping 當主詞。\n【句意】如果你經過這些表演，停下來看一會兒真的很值得。"}]},{"label":"B","title_zh":"城市街道美化","text":"Many cities are working hard to make their streets more beautiful. Workers plant trees and flowers [[25]] both sides of the road to bring in more green. Colorful paintings on old walls also make a gray street look [[26]] than before. When a neighborhood is clean and pretty, people feel proud [[27]] it and enjoy walking around. A beautiful street is not only nice to look at; it also [[28]].","blanks":[{"n":25,"type":"介系詞","options":{"A":"on","B":"in","C":"at","D":"of"},"answer":"A","explain_zh":"(A) on：on both sides of the road「在道路兩側」，考介系詞。","note":"【正解】on both sides of「在…兩側」為固定介系詞用法。\n【誘答】(B) in、(C) at、(D) of 皆不與 both sides 搭配表「在兩側」。\n【重點】on both sides of the road 的介系詞搭配。\n【句意】工人在道路兩側種樹和花，以帶來更多綠意。"},{"n":26,"type":"語法","options":{"A":"bright","B":"brightest","C":"brightly","D":"brighter"},"answer":"D","explain_zh":"(D) brighter：與 than 連用「更明亮」，考比較級語法。","note":"【正解】與 than 連用須用比較級 brighter「更明亮」。\n【誘答】(A) bright 原級不與 than 連用；(B) brightest 最高級不接 than；(C) brightly 是副詞，look 後應接形容詞。\n【重點】比較級 + than；連綴動詞 look 後接形容詞。\n【句意】舊牆上彩色的畫也讓灰暗的街道看起來比以前更明亮。"},{"n":27,"type":"介系詞","options":{"A":"for","B":"of","C":"with","D":"at"},"answer":"B","explain_zh":"(B) of：be proud of「以…為榮」，考介系詞搭配。","note":"【正解】be/feel proud of「以…為榮」，固定搭配用 of。\n【誘答】(A) for、(C) with、(D) at 皆非 proud 的正確介系詞搭配。\n【重點】be proud of「以…為榮」的介系詞搭配。\n【句意】當社區乾淨又漂亮時，人們會以它為榮，並享受在附近散步。"},{"n":28,"type":"整句語意","options":{"A":"costs the city nothing at all","B":"keeps visitors away from the area","C":"makes people happier every day","D":"makes the air much dirtier"},"answer":"C","explain_zh":"(C) 呼應美麗街道「讓人每天更開心」，考整句語意。","note":"【正解】呼應美麗街道的好處，「讓人們每天更開心」，語意連貫。\n【誘答】(A)「不花城市任何錢」與美化需花費不符；(B)「讓遊客遠離」語意相反；(D)「讓空氣更髒」與綠化矛盾。\n【重點】整句語意；make + 受詞 + 比較級形容詞。\n【句意】美麗的街道不僅賞心悅目，還讓人們每天更開心。"}]}],"vocab":["performer","magician","square","talented","crowd","worth","beautify","neighborhood","proud","colorful","wall","plant"]},{"id":33,"passages":[{"label":"A","title_zh":"陪伴獨居老人","text":"In Taiwan, more and more old people live alone at home. Some of them feel lonely because their children are busy or they [[21]] far away. To help them, many young volunteers visit these elders and [[22]] them company. Sometimes they just sit and listen, [[23]] a simple chat can warm an old person's heart. A little care from others [[24]].","blanks":[{"n":21,"type":"語法","options":{"A":"living","B":"lived","C":"live","D":"lives"},"answer":"C","explain_zh":"(C) live：主詞 they 為複數用現在式 live「住得遠」，考主謂一致與時態。","note":"【正解】主詞 they 為複數，敘述現在事實用原形 live，符合主謂一致。\n【誘答】(A) living 需搭配 be 動詞；(B) lived 為過去式，與現在事實時態不合；(D) lives 用於第三人稱單數，與複數 they 不一致。\n【重點】主謂一致：複數主詞配原形動詞 live。\n【句意】有些老人感到孤單，因為子女忙碌或住得很遠。"},{"n":22,"type":"詞彙","options":{"A":"keep","B":"make","C":"take","D":"give"},"answer":"A","explain_zh":"(A) keep sb company：「陪伴」某人，考片語詞彙。","note":"【正解】keep sb company「陪伴某人」為固定片語。\n【誘答】(B) make、(C) take、(D) give 均不與 company 構成「陪伴」的搭配。\n【重點】keep sb company「陪伴某人」的片語。\n【句意】為了幫助他們，許多年輕志工探訪這些長者並陪伴他們。"},{"n":23,"type":"連接詞","options":{"A":"although","B":"so","C":"or","D":"because"},"answer":"D","explain_zh":"(D) because：坐著傾聽，「因為」一次閒聊就能溫暖老人的心，考連接詞。","note":"【正解】because「因為」引導原因，說明志工只是傾聽的理由，語意合理。\n【誘答】(A) although 表讓步，語意矛盾；(B) so 表結果，前後順序不符；(C) or 表選擇，不合。\n【重點】because 引導原因子句；須與表結果的 so 區分。\n【句意】有時他們只是坐著傾聽，因為一次簡單的閒聊就能溫暖老人的心。"},{"n":24,"type":"整句語意","options":{"A":"makes them feel worse","B":"can mean a lot to them","C":"is not needed at all","D":"should be stopped soon"},"answer":"B","explain_zh":"(B) 呼應一點關心「對他們意義重大」，考整句語意。","note":"【正解】呼應關懷的價值，一點關心「對他們意義重大」，語意正面連貫。\n【誘答】(A)「讓他們更難受」語意相反；(C)「完全不需要」與主旨矛盾；(D)「應盡快停止」不合理。\n【重點】整句語意；mean a lot to sb「對某人意義重大」。\n【句意】別人一點點的關懷，對他們來說意義重大。"}]},{"label":"B","title_zh":"高齡社會","text":"Taiwan is quickly becoming an aging society. This means the number of old people is growing [[25]] than ever before. As a result, the country will need more doctors, nurses, and care workers [[26]] the future. Building more parks and hospitals that are friendly to elders is also very [[27]]. If we plan well today, our society [[28]].","blanks":[{"n":25,"type":"語法","options":{"A":"faster","B":"fast","C":"fastest","D":"more fast"},"answer":"A","explain_zh":"(A) faster：與 than 連用「成長得更快」，考比較級語法。","note":"【正解】與 than 連用須用比較級 faster「更快」。\n【誘答】(B) fast 原級不接 than；(C) fastest 最高級不接 than；(D) more fast 為錯誤形式，fast 的比較級是 faster。\n【重點】比較級 faster + than；單音節詞加 -er。\n【句意】這代表老年人口的數量成長得比以往任何時候都快。"},{"n":26,"type":"介系詞","options":{"A":"on","B":"at","C":"in","D":"to"},"answer":"C","explain_zh":"(C) in：in the future「在未來」，考介系詞。","note":"【正解】in the future「在未來」為固定介系詞用法。\n【誘答】(A) on、(B) at、(D) to 皆不與 the future 搭配表「在未來」。\n【重點】in the future「在未來」的介系詞搭配。\n【句意】因此，這個國家未來將需要更多醫生、護理師和照護人員。"},{"n":27,"type":"詞彙","options":{"A":"boring","B":"important","C":"cheap","D":"empty"},"answer":"B","explain_zh":"(B) important：興建對長者友善的設施也很「重要」，考形容詞詞彙。","note":"【正解】important「重要的」，說明興建友善設施的必要性，語意合理。\n【誘答】(A) boring「無聊的」；(C) cheap「便宜的」；(D) empty「空的」，皆與正面語意不合。\n【重點】形容詞詞彙 important；very + 形容詞。\n【句意】興建對長者友善的公園和醫院也非常重要。"},{"n":28,"type":"整句語意","options":{"A":"will fall apart very soon","B":"does not have to do anything","C":"will forget about the elderly","D":"will be ready for the change"},"answer":"D","explain_zh":"(D) 呼應及早規劃，社會「就能為改變做好準備」，考整句語意。","note":"【正解】呼應「及早規劃」，社會「將為改變做好準備」，語意連貫。\n【誘答】(A)「很快就會崩解」語意相反；(B)「什麼都不必做」與規劃矛盾；(C)「會遺忘老人」不合主旨。\n【重點】整句語意；be ready for「為…做好準備」。\n【句意】如果我們今天好好規劃，我們的社會就能為這樣的改變做好準備。"}]}],"vocab":["lonely","alone","volunteer","elder","company","chat","aging","society","nurse","friendly","plan","care"]},{"id":34,"passages":[{"label":"A","title_zh":"校園種菜園藝","text":"Growing vegetables at school has become a fun activity for many students. In a small garden, children learn how to plant seeds and [[21]] care of them every day. They water the plants and pull out weeds [[22]] the hot sun. When the vegetables are finally ready, students feel proud [[23]] they made the food themselves. Working in the garden not only teaches useful skills but also [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"take","B":"make","C":"do","D":"give"},"answer":"A","explain_zh":"(A) take care of：每天「照顧」種子，考片語詞彙。","note":"【正解】take care of「照顧」為固定片語。\n【誘答】(B) make、(C) do、(D) give 均不與 care of 構成「照顧」搭配。\n【重點】take care of「照顧」的片語。\n【句意】在小花園裡，孩子們學習如何播種並每天照顧它們。"},{"n":22,"type":"介系詞","options":{"A":"above","B":"between","C":"under","D":"along"},"answer":"C","explain_zh":"(C) under：under the hot sun「在烈日下」，考介系詞。","note":"【正解】under the hot sun「在烈日下」為固定介系詞用法。\n【誘答】(A) above「在…上方」不合；(B) between「在兩者之間」不合；(D) along「沿著」不合。\n【重點】under the sun「在陽光下」的介系詞搭配。\n【句意】他們在烈日下澆水、拔除雜草。"},{"n":23,"type":"連接詞","options":{"A":"although","B":"because","C":"unless","D":"whether"},"answer":"B","explain_zh":"(B) because：學生驕傲，「因為」食物是自己種的，考連接詞。","note":"【正解】because「因為」引導原因，說明學生驕傲的理由，語意合理。\n【誘答】(A) although 表讓步，語意矛盾；(C) unless「除非」語意不合；(D) whether「是否」不合。\n【重點】because 引導原因子句；feel proud + that 子句。\n【句意】當蔬菜終於成熟時，學生因為食物是自己種的而感到驕傲。"},{"n":24,"type":"整句語意","options":{"A":"makes students hate vegetables","B":"wastes a lot of school time","C":"keeps students away from plants","D":"brings students closer to nature"},"answer":"D","explain_zh":"(D) 呼應園藝好處，「讓學生更親近自然」，考整句語意。","note":"【正解】呼應園藝的好處，「讓學生更親近自然」，語意正面連貫。\n【誘答】(A)「讓學生討厭蔬菜」語意相反；(B)「浪費上課時間」與正面語意矛盾；(C)「讓學生遠離植物」不合理。\n【重點】整句語意；not only...but also 句型；bring sb closer to「使更親近」。\n【句意】在花園工作不僅教導實用技能，也讓學生更親近自然。"}]},{"label":"B","title_zh":"都市綠地","text":"Green spaces are very important in a busy city. Parks and gardens give people a place [[25]] they can rest after a long day of work. Trees in the city can also make the hot air feel much [[26]], which is helpful in summer. [[27]] there is more green space, people are happier and healthier. That is why many cities are trying hard [[28]].","blanks":[{"n":25,"type":"語法","options":{"A":"where","B":"which","C":"who","D":"when"},"answer":"A","explain_zh":"(A) where：先行詞 place 為地方，關係副詞用 where，考關係詞語法。","note":"【正解】先行詞 place 表地方，用關係副詞 where 引導後面的完整子句。\n【誘答】(B) which 為關係代名詞，後接不完整子句；(C) who 指人；(D) when 指時間，皆與 place 不合。\n【重點】關係副詞 where 修飾表地方的先行詞。\n【句意】公園和花園給人們一個在一天辛勞工作後可以休息的地方。"},{"n":26,"type":"語法","options":{"A":"cool","B":"coolest","C":"cooler","D":"coolly"},"answer":"C","explain_zh":"(C) cooler：樹木讓熱空氣「更涼」，比較級，考語法。","note":"【正解】比較級 cooler「更涼」，且 much 修飾比較級，語意合理。\n【誘答】(A) cool 原級無法呼應 much 的強調；(B) coolest 最高級無比較對象；(D) coolly 是副詞，feel 後應接形容詞。\n【重點】much + 比較級表「更加」；feel 後接形容詞。\n【句意】城市裡的樹木也能讓炎熱的空氣感覺涼爽許多，這在夏天很有幫助。"},{"n":27,"type":"連接詞","options":{"A":"Unless","B":"When","C":"Because of","D":"Instead"},"answer":"B","explain_zh":"(B) When：「當」綠地更多時，人們更快樂健康，考連接詞。","note":"【正解】When「當…時」引導時間副詞子句，語意合理。\n【誘答】(A) Unless「除非」語意相反；(C) Because of 後接名詞不接子句；(D) Instead「反而」為副詞，不能引導子句。\n【重點】When 引導時間子句；須與 Because of + 名詞 區別。\n【句意】當綠地更多時，人們更快樂也更健康。"},{"n":28,"type":"整句語意","options":{"A":"to cut down all the old trees","B":"to cover the parks with cement","C":"to keep people out of the gardens","D":"to build more parks for everyone"},"answer":"D","explain_zh":"(D) 呼應綠地重要，城市努力「為大家蓋更多公園」，考整句語意。","note":"【正解】呼應綠地的重要，城市努力「為大家興建更多公園」，語意連貫。\n【誘答】(A)「砍掉所有老樹」與綠化矛盾；(B)「用水泥覆蓋公園」語意相反；(C)「不讓人進花園」不合理。\n【重點】整句語意；try hard to V「努力去做…」。\n【句意】這就是為什麼許多城市努力為大家興建更多公園。"}]}],"vocab":["vegetable","garden","seed","weed","proud","skill","green space","rest","healthy","summer","park","nature"]},{"id":35,"passages":[{"label":"A","title_zh":"記帳與存錢","text":"Many students find it hard to save money because they never know where their money goes. A simple way to solve this problem is to [[21]] every dollar you spend in a small notebook or a phone app. When you write down each cost, you will be [[22]] at how much you waste on drinks and snacks. Keeping records also helps you set a clear goal, [[23]] you can watch your savings grow week by week. If you want to build a better future, you should start [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"record","B":"borrow","C":"throw","D":"lend"},"answer":"A","explain_zh":"(A) record：把每筆花費「記錄」下來，考動詞詞彙。","note":"【正解】record「記錄」每一筆花費，語意合理。\n【誘答】(B) borrow「借入」；(C) throw「丟」；(D) lend「借出」，皆與記帳語意不合。\n【重點】動詞 record「記錄」；to + 原形動詞表方法。\n【句意】一個簡單的解決方法是把你花的每一塊錢記錄在小筆記本或手機 App 裡。"},{"n":22,"type":"詞彙","options":{"A":"bored","B":"surprised","C":"polite","D":"safe"},"answer":"B","explain_zh":"(B) surprised：對浪費的金額感到「驚訝」，考形容詞詞彙。","note":"【正解】be surprised at「對…感到驚訝」，看到浪費金額而驚訝，語意合理。\n【誘答】(A) bored「無聊的」；(C) polite「有禮貌的」；(D) safe「安全的」，皆與語境不合。\n【重點】be surprised at「對…感到驚訝」的形容詞搭配。\n【句意】當你寫下每筆花費，你會對自己在飲料和零食上浪費多少感到驚訝。"},{"n":23,"type":"連接詞","options":{"A":"so that","B":"even if","C":"unless","D":"before"},"answer":"A","explain_zh":"(A) so that：引導「以便」看著存款增加的目的，考連接詞。","note":"【正解】so that 引導目的子句「以便」看著存款增加，表目的。\n【誘答】(B) even if「即使」表讓步；(C) unless「除非」語意相反；(D) before「在…之前」表時間，皆不合。\n【重點】so that + 子句表目的。\n【句意】保持記帳也幫助你設定明確目標，以便你能看著存款一週週增加。"},{"n":24,"type":"整句語意","options":{"A":"keeping a record of your money today","B":"spending all your cash on new games","C":"borrowing money from your best friends","D":"hiding your notebook from your parents"},"answer":"A","explain_zh":"(A) 呼應全篇「記帳存錢」的主旨，考整句語意。","note":"【正解】呼應全篇「記帳存錢」主旨，「今天就開始記帳」，語意連貫。\n【誘答】(B)「把現金全花在新遊戲上」與省錢矛盾；(C)「向好友借錢」不合主旨；(D)「把筆記本藏起來」不合理。\n【重點】整句語意；start + Ving「開始做…」；keep a record of「記錄」。\n【句意】如果你想建立更好的未來，你今天就該開始記錄你的錢。"}]},{"label":"B","title_zh":"聰明消費","text":"Being a smart shopper does not mean buying the cheapest thing you can find. Before you pay, you should ask yourself whether you really [[25]] the item or just want it for fun. Comparing prices in different stores is [[26]] than buying the first product you see. A wise buyer also reads the labels [[27]] to check the quality. In the end, spending less on things you do not need will leave you [[28]].","blanks":[{"n":25,"type":"詞彙","options":{"A":"need","B":"sell","C":"waste","D":"break"},"answer":"A","explain_zh":"(A) need：問自己是否真的「需要」該物品，考動詞詞彙。","note":"【正解】need「需要」該物品，語意合理。\n【誘答】(B) sell「賣」；(C) waste「浪費」；(D) break「打破」，皆與「問自己是否需要」矛盾。\n【重點】動詞 need「需要」；whether 引導名詞子句。\n【句意】付錢前，你應該問自己是否真的需要這件物品，還是只是想買來好玩。"},{"n":26,"type":"語法","options":{"A":"wise","B":"wiser","C":"wisest","D":"wisdom"},"answer":"B","explain_zh":"(B) wiser：與 than 連用的比較級「更明智」，考比較級語法。","note":"【正解】與 than 連用須用比較級 wiser「更明智」。\n【誘答】(A) wise 原級不接 than；(C) wisest 最高級不接 than；(D) wisdom 是名詞，此處需形容詞。\n【重點】比較級 wiser + than。\n【句意】在不同商店比價比買你看到的第一項產品更明智。"},{"n":27,"type":"語法","options":{"A":"care","B":"careful","C":"carefully","D":"caring"},"answer":"C","explain_zh":"(C) carefully：副詞修飾動詞 reads「仔細地」讀，考詞形變化。","note":"【正解】副詞 carefully「仔細地」修飾動詞 reads，語意合理。\n【誘答】(A) care 為名詞或動詞；(B) careful 是形容詞不能修飾動詞；(D) caring 為形容詞或動名詞，皆不能作副詞修飾 reads。\n【重點】副詞修飾動詞；careful → carefully 的詞形變化。\n【句意】明智的買家也會仔細閱讀標籤以檢查品質。"},{"n":28,"type":"整句語意","options":{"A":"with more money in your pocket","B":"without any food to eat at home","C":"as poor as you were last year","D":"in trouble with the store owner"},"answer":"A","explain_zh":"(A) 呼應「省下不需要的花費」的結果，考整句語意。","note":"【正解】呼應「省下不需要的花費」，結果是「口袋裡有更多錢」，語意連貫。\n【誘答】(B)「家裡沒東西吃」語意相反；(C)「和去年一樣窮」與省錢矛盾；(D)「和店主起衝突」不合理。\n【重點】整句語意；leave sb with「使某人處於…狀態」。\n【句意】最後，少花錢在不需要的東西上，會讓你口袋裡有更多錢。"}]}],"vocab":["record","save","cost","waste","goal","savings","compare","price","quality","label","shopper","wise"]},{"id":36,"passages":[{"label":"A","title_zh":"淨灘活動","text":"Last Saturday, our class [[21]] a beach cleaning activity near the harbor. Early in the morning, more than thirty students put on gloves and started to pick up trash along the sand. We were shocked to see so much garbage [[22]] on such a beautiful beach. Working together, we filled dozens of large bags in only two hours. Though we felt tired, everyone was [[23]] because the beach looked clean again. This meaningful event taught us that [[24]].","blanks":[{"n":21,"type":"語法","options":{"A":"holds","B":"held","C":"will hold","D":"is holding"},"answer":"B","explain_zh":"(B) held：由 Last Saturday 判斷用過去式，考時態語法。","note":"【正解】由時間副詞 Last Saturday 判斷為過去時間，動詞用過去式 held「舉辦」。\n【誘答】(A) holds 為現在式，與過去時間不合；(C) will hold 為未來式，與 Last Saturday 矛盾；(D) is holding 為現在進行式，也不表過去。\n【重點】時態判斷：時間副詞 Last Saturday 決定用過去式；hold 的過去式為不規則變化 held。\n【句意】上週六，我們班在港口附近舉辦了一場淨灘活動。"},{"n":22,"type":"詞彙","options":{"A":"left","B":"grown","C":"sold","D":"cooked"},"answer":"A","explain_zh":"(A) left：垃圾被「留」在沙灘上，考動詞詞彙。","note":"【正解】垃圾被「留置、棄置」在沙灘上，用 leave 的過去分詞 left 後位修飾 garbage。\n【誘答】(B) grown「生長」，垃圾不會生長；(C) sold「被賣」，語意不通；(D) cooked「被烹煮」，與垃圾不搭。\n【重點】過去分詞當形容詞後位修飾名詞（garbage left = 被留下的垃圾）；並考動詞語意選擇。\n【句意】看到這麼美的沙灘上留有這麼多垃圾，我們都很震驚。"},{"n":23,"type":"詞彙","options":{"A":"afraid","B":"proud","C":"angry","D":"lazy"},"answer":"B","explain_zh":"(B) proud：把沙灘變乾淨而感到「自豪」，考形容詞詞彙。","note":"【正解】沙灘恢復乾淨，大家因此感到「自豪」proud，語意正向。\n【誘答】(A) afraid「害怕」、(C) angry「生氣」、(D) lazy「懶惰」皆為負面或不合情境，與 because 後「沙灘又變乾淨」的正向原因矛盾。\n【重點】形容詞語意判斷，須配合 because 引導的原因子句；be proud「感到自豪」。\n【句意】雖然我們很累，但因為沙灘又變乾淨了，每個人都感到自豪。"},{"n":24,"type":"整句語意","options":{"A":"small actions can make a big difference","B":"the sea is too dirty to ever be saved","C":"cleaning the beach is a waste of time","D":"we should throw trash into the ocean"},"answer":"A","explain_zh":"(A) 呼應淨灘的正向意義，考整句語意。","note":"【正解】全篇講淨灘的正面意義，結論為「小小的行動能造成大改變」最貼切。\n【誘答】(B) 海太髒永遠救不了、(C) 淨灘是浪費時間、(D) 應把垃圾丟進海裡，皆與全文正向主旨相反。\n【重點】整句語意（結論句）須呼應文章主旨；make a difference「造成影響、帶來改變」。\n【句意】這場有意義的活動教會我們：小小的行動也能帶來大大的改變。"}]},{"label":"B","title_zh":"海洋塑膠垃圾","text":"Plastic waste has become one of the biggest dangers [[25]] our oceans. Every year, millions of tons of plastic flow into the sea, and sadly it does not break down [[26]]. Sea animals often mistake small pieces of plastic [[27]] food and eat them, which can make them very sick. To protect the ocean, we should use fewer plastic bags and [[28]].","blanks":[{"n":25,"type":"介系詞","options":{"A":"to","B":"of","C":"on","D":"at"},"answer":"A","explain_zh":"(A) to：danger to「對…的危害」的固定搭配，考介系詞。","note":"【正解】danger to「對…的危害」為固定搭配，故填 to。\n【誘答】(B) of、(C) on、(D) at 皆非 danger 後接的正確介系詞，屬搭配錯誤。\n【重點】名詞加介系詞固定搭配 danger to sth「對…的危害」。\n【句意】塑膠廢棄物已成為海洋最大的危害之一。"},{"n":26,"type":"語法","options":{"A":"easy","B":"easier","C":"easily","D":"ease"},"answer":"C","explain_zh":"(C) easily：副詞修飾 break down「輕易地」分解，考詞形變化。","note":"【正解】修飾動詞片語 break down 須用副詞 easily「輕易地」。\n【誘答】(A) easy 為形容詞、(B) easier 為比較級形容詞，皆不能修飾動詞；(D) ease 為名詞/動詞，詞性不合。\n【重點】副詞修飾動詞；形容詞 easy 變副詞為 easily（去 y 加 ily）。\n【句意】遺憾的是，塑膠並不會輕易地分解。"},{"n":27,"type":"介系詞","options":{"A":"for","B":"in","C":"by","D":"about"},"answer":"A","explain_zh":"(A) for：mistake A for B「把 A 誤認為 B」，考介系詞片語。","note":"【正解】mistake A for B「把 A 誤認為 B」為固定片語，故填 for。\n【誘答】(B) in、(C) by、(D) about 皆非此片語所用的介系詞，屬搭配錯誤。\n【重點】動詞片語 mistake…for…「誤把…當作…」。\n【句意】海洋動物常把塑膠小碎片誤認為食物而吃下，這會讓牠們生病。"},{"n":28,"type":"整句語意","options":{"A":"bring our own bottles when we go out","B":"throw more trash into the deep sea","C":"buy as much plastic as possible","D":"forget about this serious problem"},"answer":"A","explain_zh":"(A) 呼應「保護海洋、減塑」的做法，考整句語意。","note":"【正解】呼應「保護海洋、減塑」的做法，外出自備瓶子最合宜。\n【誘答】(B) 丟更多垃圾到深海、(C) 盡量多買塑膠、(D) 忘掉這問題，皆與減塑護海的主旨相反。\n【重點】整句語意須與 To protect the ocean 的減塑主旨一致。\n【句意】為了保護海洋，我們應少用塑膠袋，並在外出時自備瓶子。"}]}],"vocab":["beach","harbor","gloves","trash","garbage","plastic","waste","ocean","danger","protect","difference","meaningful"]},{"id":37,"passages":[{"label":"A","title_zh":"電動公車","text":"More and more cities in Taiwan are now using electric buses to [[21]] their people around. Unlike old buses that run on gas, these new buses use electricity, so they make almost no noise and [[22]] no black smoke. Riders say the trip is much smoother and more comfortable [[23]] before. Although electric buses cost more to build, they save money on fuel over time. Many drivers are happy because [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"carry","B":"cook","C":"clean","D":"close"},"answer":"A","explain_zh":"(A) carry：公車「載運」乘客，考動詞詞彙。","note":"【正解】公車「載運」人們四處移動，用 carry。\n【誘答】(B) cook「煮」、(C) clean「清潔」、(D) close「關閉」皆與載客語意不合。\n【重點】動詞語意；carry sb around「載某人四處走」。\n【句意】台灣越來越多城市開始用電動公車載送市民。"},{"n":22,"type":"詞彙","options":{"A":"give off","B":"give up","C":"give in","D":"give back"},"answer":"A","explain_zh":"(A) give off：「排放」黑煙，考片語動詞詞彙。","note":"【正解】give off「散發、排放」黑煙，符合語意。\n【誘答】(B) give up「放棄」、(C) give in「屈服」、(D) give back「歸還」，皆非「排放」之意。\n【重點】片語動詞辨義：give off「排放（氣體、光、味道）」。\n【句意】與燒油的舊公車不同，這些新公車用電，所以幾乎沒有噪音，也不排放黑煙。"},{"n":23,"type":"語法","options":{"A":"than","B":"then","C":"as","D":"so"},"answer":"A","explain_zh":"(A) than：smoother/more comfortable…than 比較級，考語法。","note":"【正解】前有比較級 smoother/more comfortable，須搭配 than 才成立。\n【誘答】(B) then「然後」為時間副詞，不用於比較；(C) as、(D) so 皆不能接在比較級之後。\n【重點】比較級加 than 的句型；注意 than 與 then 拼字易混淆。\n【句意】乘客說這趟車程比以前平穩舒適多了。"},{"n":24,"type":"整句語意","options":{"A":"the quiet ride makes their long day easier","B":"the buses break down almost every day","C":"gas is much cheaper than electricity now","D":"the noise gives them a bad headache"},"answer":"A","explain_zh":"(A) 呼應電動公車安靜舒適的優點，考整句語意。","note":"【正解】呼應電動公車安靜舒適的優點，讓司機一天更輕鬆最合宜。\n【誘答】(B) 每天故障、(C) 汽油比電便宜、(D) 噪音讓人頭痛，皆與「駕駛很開心」的原因矛盾。\n【重點】整句語意須呼應前文電動公車安靜的好處；because 引導原因。\n【句意】許多司機都很開心，因為安靜的行車讓他們漫長的一天變得更輕鬆。"}]},{"label":"B","title_zh":"改善空氣品質","text":"Air pollution is a serious problem in many big cities. When the air is dirty, people may cough more and [[25]] breathing problems. To make the air cleaner, the government is asking factories to [[26]] the amount of smoke they produce. At the same time, planting more trees in the city can also [[27]] the air quality. If everyone does a little, [[28]].","blanks":[{"n":25,"type":"詞彙","options":{"A":"enjoy","B":"develop","C":"forget","D":"answer"},"answer":"B","explain_zh":"(B) develop：「產生、發展出」呼吸問題，考動詞詞彙。","note":"【正解】develop「產生、出現（病症）」，develop breathing problems 即出現呼吸問題。\n【誘答】(A) enjoy「享受」與病症矛盾；(C) forget「忘記」、(D) answer「回答」語意不通。\n【重點】develop「（漸漸）產生（疾病、問題）」的用法。\n【句意】空氣髒時，人們可能咳得更厲害，並出現呼吸問題。"},{"n":26,"type":"詞彙","options":{"A":"raise","B":"reduce","C":"repeat","D":"return"},"answer":"B","explain_zh":"(B) reduce：要求工廠「減少」排煙量，考動詞詞彙。","note":"【正解】要求工廠「減少」排煙量，用 reduce。\n【誘答】(A) raise「提高」與減污目的相反；(C) repeat「重複」、(D) return「歸還」語意不合。\n【重點】reduce the amount of「減少…的量」的搭配。\n【句意】為了讓空氣更乾淨，政府要求工廠減少排煙量。"},{"n":27,"type":"詞彙","options":{"A":"improve","B":"pollute","C":"waste","D":"destroy"},"answer":"A","explain_zh":"(A) improve：種樹「改善」空氣品質，考動詞詞彙。","note":"【正解】種樹「改善」空氣品質，用 improve。\n【誘答】(B) pollute「污染」、(D) destroy「破壞」與正向結果相反；(C) waste「浪費」語意不通。\n【重點】improve the air quality「改善空氣品質」的搭配。\n【句意】同時，在城市裡多種樹也能改善空氣品質。"},{"n":28,"type":"整句語意","options":{"A":"the sky above our city can turn blue again","B":"the air will surely become even dirtier","C":"the factories will make much more smoke","D":"no one can ever breathe fresh air here"},"answer":"A","explain_zh":"(A) 呼應「大家一起努力改善空氣」的正向結果，考整句語意。","note":"【正解】呼應「大家一起努力改善空氣」的正向結果，天空再度變藍。\n【誘答】(B) 空氣更髒、(C) 工廠排更多煙、(D) 沒人能呼吸新鮮空氣，皆與正向主旨相反。\n【重點】整句語意（結論）須呼應改善空氣的希望；If 條件句帶出結果。\n【句意】如果每個人都盡一點力，我們城市上方的天空就能再度變藍。"}]}],"vocab":["electric","bus","electricity","smoke","fuel","pollution","cough","factory","reduce","improve","quality","breathe"]},{"id":38,"passages":[{"label":"A","title_zh":"學英文的好方法","text":"Learning English well takes time, but a few good habits can really help. First, try to practice a little English every day [[21]] studying for many hours only before a test. Watching movies with English subtitles is also a fun way [[22]] new words. When you meet a word you do not know, do not be [[23]] to look it up right away. Most important of all, remember that [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"instead of","B":"because of","C":"thanks to","D":"as for"},"answer":"A","explain_zh":"(A) instead of：每天練習「而不是」考前才苦讀，考片語詞彙。","note":"【正解】每天練習「而不是」考前才苦讀，用 instead of 表取代對比。\n【誘答】(B) because of「因為」、(C) thanks to「多虧」表原因，語意不合；(D) as for「至於」表話題轉換，也不合。\n【重點】instead of 加名詞/動名詞「而不是…」表取代。\n【句意】首先，試著每天練一點英文，而不是只在考前苦讀好幾個小時。"},{"n":22,"type":"語法","options":{"A":"learn","B":"learning","C":"to learn","D":"learned"},"answer":"C","explain_zh":"(C) to learn：a way to V「學習的方法」，考不定詞語法。","note":"【正解】a way to V「做…的方法」，故用不定詞 to learn。\n【誘答】(A) learn 原形、(B) learning 動名詞、(D) learned 過去式，皆不符 a way to V 的固定用法。\n【重點】a way / a fun way 加 to V「…的方法」。\n【句意】看有英文字幕的電影也是學新單字的有趣方法。"},{"n":23,"type":"詞彙","options":{"A":"afraid","B":"happy","C":"proud","D":"sure"},"answer":"A","explain_zh":"(A) afraid：be afraid to V「害怕去查」，考形容詞詞彙。","note":"【正解】do not be afraid to V「別害怕去做」，鼓勵馬上查生字。\n【誘答】(B) happy、(C) proud、(D) sure 與「別…去查」的鼓勵語意不合（別開心查、別自豪查皆不通）。\n【重點】be afraid to V「害怕去做某事」；否定祈使句表鼓勵。\n【句意】遇到不會的字時，別害怕立刻查清楚。"},{"n":24,"type":"整句語意","options":{"A":"making mistakes is a normal part of learning","B":"you should never speak English out loud","C":"reading books in English is totally useless","D":"only smart people can ever learn a language"},"answer":"A","explain_zh":"(A) 呼應鼓勵學習的正向主旨，考整句語意。","note":"【正解】呼應鼓勵學習的正向主旨，犯錯是學習的正常過程。\n【誘答】(B) 絕不要開口說英文、(C) 讀英文書全然無用、(D) 只有聰明人能學語言，皆與鼓勵學習的主旨相反。\n【重點】整句語意（結論）須呼應全文鼓勵、正向的態度。\n【句意】最重要的是，記得犯錯是學習中很正常的一部分。"}]},{"label":"B","title_zh":"出國旅遊溝通","text":"Traveling to a foreign country can be exciting, but talking with local people is sometimes [[25]]. Even if your English is not perfect, you can still make yourself [[26]] with simple words and a friendly smile. When you get lost, do not be shy [[27]] asking someone for directions. Body language, such as pointing or nodding, also helps a lot. In the end, you will find that [[28]].","blanks":[{"n":25,"type":"詞彙","options":{"A":"difficult","B":"delicious","C":"cheap","D":"empty"},"answer":"A","explain_zh":"(A) difficult：與當地人溝通「困難」，考形容詞詞彙。","note":"【正解】與當地人交談有時「困難」，difficult 呼應下句「即使英文不完美」。\n【誘答】(B) delicious「美味」用於食物、(C) cheap「便宜」、(D) empty「空的」皆與「交談」不搭。\n【重點】形容詞語意；由後文 Even if your English is not perfect 推知為困難。\n【句意】出國旅遊令人興奮，但和當地人交談有時很困難。"},{"n":26,"type":"詞彙","options":{"A":"understood","B":"forgotten","C":"invited","D":"surprised"},"answer":"A","explain_zh":"(A) understood：make oneself understood「讓別人聽懂」，考詞彙＋句型。","note":"【正解】make oneself understood「讓別人聽懂自己的話」為固定句型。\n【誘答】(B) forgotten「被遺忘」、(C) invited「被邀請」、(D) surprised「驚訝」皆不符此句型與語意。\n【重點】make oneself understood；受詞補語用過去分詞表被動。\n【句意】即使英文不完美，你仍能用簡單的字和友善的微笑讓別人聽懂你。"},{"n":27,"type":"介系詞","options":{"A":"about","B":"of","C":"for","D":"into"},"answer":"A","explain_zh":"(A) about：be shy about Ving「羞於做某事」，考介系詞。","note":"【正解】be shy about Ving「羞於做某事」，故填 about。\n【誘答】(B) of、(C) for、(D) into 皆非 shy 後接的正確介系詞，屬搭配錯誤。\n【重點】be shy about 加 Ving「對做…感到害羞」。\n【句意】迷路時，別羞於向人問路。"},{"n":28,"type":"整句語意","options":{"A":"most people are glad to help a polite traveler","B":"no one will ever want to talk to you","C":"speaking any language is completely useless","D":"you should stay silent during the whole trip"},"answer":"A","explain_zh":"(A) 呼應「勇敢溝通會得到幫助」的主旨，考整句語意。","note":"【正解】呼應勇敢溝通會得到幫助的主旨，多數人樂意幫助有禮的旅人。\n【誘答】(B) 沒人想跟你說話、(C) 說任何語言都沒用、(D) 全程該保持沉默，皆與正向主旨相反。\n【重點】整句語意須呼應全文「勇於溝通就會獲得幫助」。\n【句意】最後你會發現，多數人都樂意幫助有禮貌的旅人。"}]}],"vocab":["practice","habit","subtitle","mistake","foreign","local","communicate","direction","shy","language","point","smile"]},{"id":39,"passages":[{"label":"A","title_zh":"家事分工","text":"In my family, everyone [[21]] the housework so that no one feels too tired. My father usually cooks dinner, [[22]] my mother washes the dishes afterward. My younger sister and I take turns to sweep the floor and take out the trash. Doing chores together not only keeps our home clean [[23]] also brings us closer. My parents always say that a family is like a team, and [[24]].","blanks":[{"n":21,"type":"語法","options":{"A":"share","B":"shares","C":"sharing","D":"shared"},"answer":"B","explain_zh":"(B) shares：主詞 everyone 為單數，動詞用 shares，考主謂一致。","note":"【正解】主詞 everyone 視為單數，動詞用第三人稱單數 shares。\n【誘答】(A) share 原形用於複數主詞；(C) sharing 分詞不能單獨當主要動詞；(D) shared 過去式與全篇現在式不合。\n【重點】主謂一致：everyone 為單數，動詞須加 -s。\n【句意】在我家，每個人都分擔家事，這樣就沒有人會太累。"},{"n":22,"type":"連接詞","options":{"A":"while","B":"because","C":"if","D":"until"},"answer":"A","explain_zh":"(A) while：表「而、對比」父母各做各的，考連接詞。","note":"【正解】while 表「而、對比」，對照父母各自做的家事。\n【誘答】(B) because「因為」表原因、(C) if「如果」表條件、(D) until「直到」表時間，皆與對比語意不合。\n【重點】連接詞 while 表「兩件事對比」的用法。\n【句意】我爸爸通常煮晚餐，而我媽媽在飯後洗碗。"},{"n":23,"type":"連接詞","options":{"A":"but","B":"or","C":"so","D":"for"},"answer":"A","explain_zh":"(A) but：not only…but also「不但…而且」的固定用法，考連接詞。","note":"【正解】not only…but also「不但…而且」為固定關聯用法，故填 but。\n【誘答】(B) or、(C) so、(D) for 皆不能與 not only 搭配成此關聯連接詞。\n【重點】關聯連接詞 not only A but also B。\n【句意】一起做家事不但讓家裡保持乾淨，也讓我們更親近。"},{"n":24,"type":"整句語意","options":{"A":"every member should do his or her part","B":"children should never help at home","C":"only mothers need to do all the work","D":"cleaning the house is a waste of time"},"answer":"A","explain_zh":"(A) 呼應「家事分工、人人有責」的主旨，考整句語意。","note":"【正解】呼應「家如球隊、人人有責」的主旨，每位成員都應盡本分。\n【誘答】(B) 孩子絕不該幫忙、(C) 只有媽媽該做所有事、(D) 打掃是浪費時間，皆與分工合作的主旨相反。\n【重點】整句語意須呼應 a family is like a team 的分工精神；do one's part「盡本分」。\n【句意】我父母總說家庭就像一支球隊，每位成員都該盡自己的一份心力。"}]},{"label":"B","title_zh":"培養責任感","text":"Doing chores at home is a great way for children to [[25]] a sense of responsibility. When kids are given simple jobs, they slowly learn that their actions [[26]] the whole family. A child who feeds the dog every day, for example, becomes more [[27]] and caring. Parents should be patient, because good habits take time to grow. In the long run, a responsible child will [[28]].","blanks":[{"n":25,"type":"詞彙","options":{"A":"build","B":"break","C":"buy","D":"borrow"},"answer":"A","explain_zh":"(A) build：「培養」責任感，考動詞詞彙。","note":"【正解】build「建立、培養」責任感，build a sense of responsibility。\n【誘答】(B) break「打破」、(C) buy「買」、(D) borrow「借」皆不能與「責任感」搭配。\n【重點】build a sense of responsibility「培養責任感」的搭配。\n【句意】在家做家事是讓孩子培養責任感的好方法。"},{"n":26,"type":"詞彙","options":{"A":"affect","B":"forget","C":"watch","D":"return"},"answer":"A","explain_zh":"(A) affect：他們的行為會「影響」全家，考動詞詞彙。","note":"【正解】affect「影響」全家，他們的行為會影響家人。\n【誘答】(B) forget「忘記」、(C) watch「觀看」、(D) return「歸還」皆與「影響」語意不合。\n【重點】動詞 affect「影響」為及物動詞，直接接受詞。\n【句意】當孩子被交付簡單的工作，他們會慢慢明白自己的行為會影響全家。"},{"n":27,"type":"詞彙","options":{"A":"reliable","B":"lazy","C":"selfish","D":"careless"},"answer":"A","explain_zh":"(A) reliable：養成「可靠」的性格，考形容詞詞彙。","note":"【正解】每天餵狗的孩子變得更「可靠」reliable，與 caring 並列，皆為正向。\n【誘答】(B) lazy「懶惰」、(C) selfish「自私」、(D) careless「粗心」皆為負面，與 caring 及正向語境矛盾。\n【重點】形容詞語意；連接詞 and caring 提示須選正向形容詞。\n【句意】例如，每天餵狗的孩子會變得更可靠、更有愛心。"},{"n":28,"type":"整句語意","options":{"A":"grow into a trusted and mature adult","B":"never care about other people at all","C":"always leave every job to others","D":"forget how to help around the house"},"answer":"A","explain_zh":"(A) 呼應「責任感帶來成熟」的正向結果，考整句語意。","note":"【正解】呼應「責任感帶來成熟」的正向結果，長成受信任的成人。\n【誘答】(B) 從不關心別人、(C) 總把工作留給別人、(D) 忘記如何幫忙，皆與培養責任感的正向主旨相反。\n【重點】整句語意（結論）須呼應全文正向主旨；grow into「長大成為」。\n【句意】長遠來看，一個有責任感的孩子會長成受信任又成熟的大人。"}]}],"vocab":["housework","chore","share","sweep","dishes","responsibility","action","reliable","patient","habit","responsible","team"]},{"id":40,"passages":[{"label":"A","title_zh":"台灣觀光推廣","text":"In recent years, Taiwan has worked hard to [[21]] more tourists from around the world. The government makes colorful videos to show the island's tall mountains, warm hot springs, and busy night markets. These beautiful scenes have [[22]] many foreign travelers to visit. Because Taiwan is small, visitors can easily go from a big city to a quiet beach [[23]] one short trip. With its friendly people and tasty food, Taiwan is truly [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"attract","B":"refuse","C":"lose","D":"hurt"},"answer":"A","explain_zh":"(A) attract：「吸引」更多觀光客，考動詞詞彙。","note":"【正解】attract「吸引」更多觀光客，符合推廣主旨。\n【誘答】(B) refuse「拒絕」、(C) lose「失去」、(D) hurt「傷害」皆與吸引觀光客的目的相反。\n【重點】attract tourists「吸引觀光客」的搭配。\n【句意】近年來，台灣努力吸引世界各地更多的觀光客。"},{"n":22,"type":"語法","options":{"A":"encourage","B":"encouraged","C":"encouraging","D":"to encourage"},"answer":"B","explain_zh":"(B) encouraged：現在完成式 have + 過去分詞，考時態語法。","note":"【正解】前有助動詞 have，須用過去分詞 encouraged 構成現在完成式。\n【誘答】(A) encourage 原形、(C) encouraging 現在分詞、(D) to encourage 不定詞，皆不能與 have 構成完成式。\n【重點】現在完成式 have 加過去分詞；並含 encourage sb to V「鼓勵某人做…」的句型。\n【句意】這些美景已吸引許多外國旅客前來造訪。"},{"n":23,"type":"介系詞","options":{"A":"in","B":"of","C":"to","D":"by"},"answer":"A","explain_zh":"(A) in：in one short trip「在一趟短程中」，考介系詞。","note":"【正解】in one short trip「在一趟短程中」，用 in 表在某段時間/範圍內。\n【誘答】(B) of、(C) to、(D) by 皆不符「在一趟行程之內」的介系詞用法。\n【重點】介系詞 in 表「在（某段時間或範圍）之內」。\n【句意】因為台灣不大，遊客能在一趟短程中輕鬆從大城市到達安靜的海灘。"},{"n":24,"type":"整句語意","options":{"A":"a wonderful place worth visiting","B":"too dangerous for any traveler","C":"a country with nothing to see","D":"an island no one has heard of"},"answer":"A","explain_zh":"(A) 呼應全篇推廣台灣之美的主旨，考整句語意。","note":"【正解】呼應全篇推廣台灣之美，台灣是值得一遊的好地方最貼切。\n【誘答】(B) 太危險、(C) 沒什麼可看、(D) 沒人聽過的島，皆與讚美台灣的主旨相反。\n【重點】整句語意須呼應全文正向主旨；worth 加 Ving「值得…」。\n【句意】有著友善的人民和美味的食物，台灣真的是個值得一遊的好地方。"}]},{"label":"B","title_zh":"向外國朋友介紹台灣","text":"When my pen pal from Canada visited last summer, I was excited to [[25]] her my country. On the first day, I took her to a famous temple, [[26]] she was amazed by the beautiful roofs and the smell of incense. We also tried bubble tea, and she said it was the most delicious drink she had [[27]] tasted. Before she left, she told me that thanks to me, [[28]].","blanks":[{"n":25,"type":"詞彙","options":{"A":"show","B":"sell","C":"hide","D":"leave"},"answer":"A","explain_zh":"(A) show：「介紹、展示」我的國家給她，考動詞詞彙。","note":"【正解】show sb sth「展示、介紹」我的國家給她。\n【誘答】(B) sell「賣」、(C) hide「隱藏」、(D) leave「留下」皆與熱情介紹的語意不合。\n【重點】show sb sth「把某物介紹/展示給某人」的雙受詞用法。\n【句意】去年夏天我的加拿大筆友來訪時，我很興奮能向她介紹我的國家。"},{"n":26,"type":"語法","options":{"A":"where","B":"who","C":"what","D":"which"},"answer":"A","explain_zh":"(A) where：關係副詞，表在寺廟「那裡」，考關係詞語法。","note":"【正解】先行詞為地點 temple，其後子句結構完整，用關係副詞 where。\n【誘答】(B) who 指人、(C) what 不引導關係子句、(D) which 為關係代名詞須在子句中當主/受詞，但此子句已完整，故不合。\n【重點】關係副詞 where 修飾表地點的先行詞，引導結構完整的子句。\n【句意】第一天，我帶她去一座著名的寺廟，她在那裡對美麗的屋頂和香火味驚嘆不已。"},{"n":27,"type":"語法","options":{"A":"never","B":"ever","C":"yet","D":"already"},"answer":"B","explain_zh":"(B) ever：the most…she had ever tasted「所嚐過最…」，考最高級用法。","note":"【正解】「(某人)嚐過最…的」用最高級加 have ever 過去分詞，故填 ever。\n【誘答】(A) never 為否定，與最高級的肯定語氣矛盾；(C) yet 用於否定/疑問句；(D) already 與此句型不合。\n【重點】最高級加所有格/that 加主詞加 have ever 過去分詞「有史以來最…」。\n【句意】我們也喝了珍珠奶茶，她說那是她喝過最好喝的飲料。"},{"n":28,"type":"整句語意","options":{"A":"she had fallen in love with Taiwan","B":"she would never come back again","C":"she hated ever
