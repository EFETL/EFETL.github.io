<script>
const PAPERS = [{"id":1,"passages":[{"label":"A","title_zh":"台灣夜市","text":"Night markets are one of the most popular attractions in Taiwan. Every evening, thousands of people [[21]] these lively places to enjoy tasty street food and cheap shopping. Among all the snacks, stinky tofu and bubble tea are especially [[22]] with both locals and foreign visitors. Bargaining is part of the fun; shopping here feels exciting [[23]] you can often talk the vendors into a lower price. In recent years, many night markets have also started to protect the environment [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"crowd into","B":"look after","C":"give up","D":"put off"},"answer":"A","explain_zh":"(A) crowd into：人潮「湧入」夜市，考片語動詞詞彙。"},{"n":22,"type":"詞彙","options":{"A":"boring","B":"careful","C":"popular","D":"private"},"answer":"C","explain_zh":"(C) popular：與 with 連用「受歡迎」，考形容詞詞彙。"},{"n":23,"type":"連接詞","options":{"A":"because","B":"although","C":"unless","D":"whether"},"answer":"A","explain_zh":"(A) because：後句說明好玩的原因，考連接詞。"},{"n":24,"type":"整句語意","options":{"A":"by asking shoppers to bring their own bags","B":"because the food there is far too expensive","C":"so that visitors are able to eat more snacks","D":"while the vendors keep raising their prices"},"answer":"A","explain_zh":"(A) 呼應「保護環境」的具體做法，考整句語意。"}]},{"label":"B","title_zh":"電動機車","text":"Taiwan is famous for its huge number of motorcycles. However, the gas ones give off air pollution that [[25]] people's health. To deal with this problem, the government has been [[26]] people to switch to electric scooters. Electric scooters are quieter, cleaner, and cheaper to run [[27]] gas motorcycles. Experts believe that if more people choose them, the air in our cities will slowly become much [[28]].","blanks":[{"n":25,"type":"詞彙","options":{"A":"improves","B":"harms","C":"protects","D":"supports"},"answer":"B","explain_zh":"(B) harms：空汙「危害」健康；主詞單數用 harms，考詞彙＋主謂一致。"},{"n":26,"type":"詞彙/句型","options":{"A":"refusing","B":"preventing","C":"forbidding","D":"encouraging"},"answer":"D","explain_zh":"(D) encouraging：encourage sb to V「鼓勵」，考詞彙＋句型。"},{"n":27,"type":"語法","options":{"A":"than","B":"as","C":"then","D":"from"},"answer":"A","explain_zh":"(A) than：cheaper…than 比較級，考語法。"},{"n":28,"type":"詞彙","options":{"A":"cleaner","B":"dirtier","C":"heavier","D":"louder"},"answer":"A","explain_zh":"(A) cleaner：空氣變「更乾淨」，考詞彙＋文意。"}]}],"vocab":["attraction","lively","crowd","snack","popular","bargain","vendor","protect","pollution","harm","encourage","switch"]},{"id":2,"passages":[{"label":"A","title_zh":"便利商店","text":"Convenience stores can be found on almost every street corner in Taiwan. Open twenty-four hours a day, they offer far more services than just [[21]] snacks and drinks. Customers can pay their bills, pick up online orders, and even buy train tickets there. This is [[22]] convenience stores have become such an important part of daily life. For many busy workers, dropping by a store [[23]] a quick breakfast is part of the morning routine. As competition grows, these shops keep adding new services [[24]].","blanks":[{"n":21,"type":"語法","options":{"A":"sell","B":"selling","C":"sold","D":"to sell"},"answer":"B","explain_zh":"(B) selling：than just 後接動名詞，考詞形。"},{"n":22,"type":"關係詞","options":{"A":"how","B":"why","C":"what","D":"because"},"answer":"B","explain_zh":"(B) why：This is why…「這就是為什麼」，考關係副詞。"},{"n":23,"type":"介系詞","options":{"A":"for","B":"of","C":"with","D":"about"},"answer":"A","explain_zh":"(A) for：drop by…for「順道去買」，考介系詞。"},{"n":24,"type":"整句語意","options":{"A":"to attract even more customers","B":"because almost nobody visits them","C":"although they are losing money fast","D":"so that the prices can keep going up"},"answer":"A","explain_zh":"(A) 說明不斷加服務的目的，考整句語意。"}]},{"label":"B","title_zh":"資源回收","text":"Taiwan is often praised for its successful recycling system. Every evening, garbage trucks play music to remind people [[25]] their trash outside. Residents must carefully [[26]] their waste into different types, such as paper, plastic, and food scraps. At first, this rule was not easy to follow, [[27]] most people have now gotten used to it. Thanks to everyone's effort, Taiwan today [[28]] one of the highest recycling rates in the whole world.","blanks":[{"n":25,"type":"句型","options":{"A":"take","B":"taking","C":"to take","D":"took"},"answer":"C","explain_zh":"(C) to take：remind sb to V，考句型。"},{"n":26,"type":"詞彙","options":{"A":"collect","B":"waste","C":"separate","D":"produce"},"answer":"C","explain_zh":"(C) separate：把垃圾「分類」separate…into，考詞彙。"},{"n":27,"type":"連接詞","options":{"A":"but","B":"so","C":"or","D":"for"},"answer":"A","explain_zh":"(A) but：前後語氣轉折（起初難→現在習慣），考連接詞。"},{"n":28,"type":"語法","options":{"A":"has","B":"have","C":"had","D":"having"},"answer":"A","explain_zh":"(A) has：主詞 Taiwan 單數、現在式，考主謂一致。"}]}],"vocab":["convenience","service","customer","bill","order","routine","competition","attract","recycling","remind","trash","separate","waste","rate"]},{"id":3,"passages":[{"label":"A","title_zh":"運動與健康","text":"These days, more and more people are paying attention [[21]] their health. Regular exercise is one of the best ways to stay [[22]]. Doctors suggest that adults work out at least three times a week. Activities such as jogging, swimming, and cycling can make the heart stronger and [[23]] stress at the same time. However, quite a few people still find it hard to keep exercising [[24]].","blanks":[{"n":21,"type":"介系詞","options":{"A":"to","B":"for","C":"on","D":"at"},"answer":"A","explain_zh":"(A) to：pay attention to「注意」，考介系詞。"},{"n":22,"type":"詞形","options":{"A":"health","B":"healthy","C":"healthily","D":"healthful"},"answer":"B","explain_zh":"(B) healthy：stay + 形容詞，考詞形。"},{"n":23,"type":"詞彙","options":{"A":"increase","B":"reduce","C":"cause","D":"raise"},"answer":"B","explain_zh":"(B) reduce：「減輕」壓力，與 stronger 語意並列，考詞彙。"},{"n":24,"type":"整句語意","options":{"A":"because of their busy daily schedules","B":"since they really love playing sports","C":"so that they can feel tired all day","D":"although they have plenty of free time"},"answer":"A","explain_zh":"(A) 說明難以持續運動的原因，考整句語意。"}]},{"label":"B","title_zh":"志工服務","text":"Volunteering is a wonderful way to help others while learning new skills. In Taiwan, many students join [[25]] groups during their summer vacation. Some teach children in mountain areas, [[26]] others help clean up the beaches. Although volunteers are not paid, most of them agree that the experience is [[27]] than money. Through serving others, young people slowly learn to care about their community [[28]] grow into more responsible citizens.","blanks":[{"n":25,"type":"詞彙","options":{"A":"volunteer","B":"private","C":"selfish","D":"lazy"},"answer":"A","explain_zh":"(A) volunteer：volunteer groups「志工團體」，考詞彙。"},{"n":26,"type":"連接詞","options":{"A":"while","B":"unless","C":"because","D":"since"},"answer":"A","explain_zh":"(A) while：對比「有些人……，有些人……」，考連接詞。"},{"n":27,"type":"詞彙/比較","options":{"A":"more careful","B":"more valuable","C":"more possible","D":"more similar"},"answer":"B","explain_zh":"(B) more valuable：經驗「比金錢更有價值」，考詞彙＋比較。"},{"n":28,"type":"連接詞","options":{"A":"and","B":"but","C":"or","D":"so"},"answer":"A","explain_zh":"(A) and：care… and grow… 動作並列，考連接詞。"}]}],"vocab":["attention","health","healthy","exercise","jog","cycle","reduce","stress","schedule","volunteer","community","valuable","responsible","citizen"]},{"id":4,"passages":[{"label":"A","title_zh":"珍珠奶茶的流行","text":"Bubble tea is one of the most famous drinks that Taiwan has [[21]] to the world. It is made of tea, milk, sugar, and the soft, chewy balls we call pearls. Over the past few years, this sweet drink has become so [[22]] that you can find bubble tea shops in almost every country. Many young people enjoy it not only [[23]] its rich taste but also because it is fun to drink. If you ever travel abroad, you may be surprised [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"introduced","B":"borrowed","C":"removed","D":"hidden"},"answer":"A","explain_zh":"(A) introduced：台灣把珍奶「引進」給世界，考動詞詞彙。"},{"n":22,"type":"詞彙","options":{"A":"empty","B":"popular","C":"silent","D":"afraid"},"answer":"B","explain_zh":"(B) popular：飲料變得如此「受歡迎」，考形容詞詞彙。"},{"n":23,"type":"連接詞","options":{"A":"because of","B":"instead of","C":"in case of","D":"ahead of"},"answer":"A","explain_zh":"(A) because of：與後面 but also because 對稱，表原因，考連接詞。"},{"n":24,"type":"整句語意","options":{"A":"to see a Taiwanese drink loved by people there","B":"that no one has ever heard of milk tea","C":"because bubble tea tastes very bitter to you","D":"so that you will never drink it again"},"answer":"A","explain_zh":"(A) 呼應「到國外會驚訝地發現台灣飲料受喜愛」，考整句語意。"}]},{"label":"B","title_zh":"環保吸管與減塑","text":"Every year, people throw away millions of plastic straws after using them just once. These straws are hard to break down, so they often end up in the sea and [[25]] the ocean. To solve this problem, many shops in Taiwan now ask customers to bring their own cups or [[26]] reusable straws made of metal or glass. Some restaurants even stop offering plastic straws [[27]] the law asks them to cut down on waste. Small daily choices like these can help [[28]].","blanks":[{"n":25,"type":"詞彙","options":{"A":"clean","B":"pollute","C":"protect","D":"water"},"answer":"B","explain_zh":"(B) pollute：塑膠吸管「汙染」海洋，考動詞詞彙。"},{"n":26,"type":"詞彙","options":{"A":"throw","B":"break","C":"use","D":"burn"},"answer":"C","explain_zh":"(C) use：「使用」可重複利用的吸管，考動詞詞彙。"},{"n":27,"type":"連接詞","options":{"A":"because","B":"although","C":"unless","D":"whether"},"answer":"A","explain_zh":"(A) because：後句說明停用塑膠吸管的原因，考連接詞。"},{"n":28,"type":"整句語意","options":{"A":"make the earth a cleaner and greener place","B":"produce even more trash than before","C":"because plastic is very cheap to buy","D":"so we should use more straws every day"},"answer":"A","explain_zh":"(A) 呼應「日常小選擇能讓地球更乾淨」，考整句語意。"}]}],"vocab":["bubble tea","chewy","pearl","introduce","popular","abroad","plastic","straw","reusable","pollute","waste","greener"]},{"id":5,"passages":[{"label":"A","title_zh":"台灣高鐵","text":"The Taiwan High Speed Rail has completely changed the way people travel on the island. Before it was built, a trip from Taipei to Kaohsiung [[21]] about four and a half hours by regular train. Now the same trip takes less than two hours, which is much [[22]] than before. Many business people take the high speed rail every day [[23]] it is fast, clean, and always on time. Thanks to this modern train, living in one city and working in another [[24]].","blanks":[{"n":21,"type":"語法","options":{"A":"takes","B":"took","C":"taking","D":"is taken"},"answer":"B","explain_zh":"(B) took：Before it was built 為過去，用過去式 took，考時態。"},{"n":22,"type":"語法","options":{"A":"fast","B":"faster","C":"fastest","D":"fastly"},"answer":"B","explain_zh":"(B) faster：與 than 連用的比較級，考語法。"},{"n":23,"type":"連接詞","options":{"A":"because","B":"though","C":"before","D":"unless"},"answer":"A","explain_zh":"(A) because：後句說明搭高鐵的原因，考連接詞。"},{"n":24,"type":"整句語意","options":{"A":"has become much easier than in the past","B":"is no longer possible for anyone today","C":"because the tickets are far too cheap","D":"so the trains are always empty and slow"},"answer":"A","explain_zh":"(A) 呼應高鐵讓跨城市通勤「更容易」，考整句語意。"}]},{"label":"B","title_zh":"大眾運輸通勤","text":"In big cities like Taipei, more and more people choose public transport to [[25]] to work every morning. Taking the MRT or bus is often cheaper and less stressful than [[26]] a car in heavy traffic. Riders do not have to worry about finding a parking space, [[27]] they can read or rest during the trip. Besides saving money, using public transport is also good for the environment [[28]]. That is why so many workers leave their cars at home.","blanks":[{"n":25,"type":"詞彙","options":{"A":"commute","B":"cook","C":"sleep","D":"grow"},"answer":"A","explain_zh":"(A) commute：每天「通勤」上班，考動詞詞彙。"},{"n":26,"type":"語法","options":{"A":"drive","B":"drove","C":"driving","D":"driven"},"answer":"C","explain_zh":"(C) driving：than 後與前面對稱用動名詞，考詞形。"},{"n":27,"type":"連接詞","options":{"A":"and","B":"but","C":"or","D":"nor"},"answer":"A","explain_zh":"(A) and：連接兩個好處，語意順承，考連接詞。"},{"n":28,"type":"整句語意","options":{"A":"because it helps to reduce air pollution","B":"although it makes the city much dirtier","C":"so everyone should buy a bigger car","D":"unless people stop riding the bus at all"},"answer":"A","explain_zh":"(A) 呼應大眾運輸「對環境好」的原因，考整句語意。"}]}],"vocab":["high speed rail","regular","business","modern","public transport","commute","traffic","parking","reduce","pollution","stressful","environment"]},{"id":6,"passages":[{"label":"A","title_zh":"行動支付","text":"These days, many people in Taiwan pay for things with their phones instead of cash. This way of paying is [[21]] mobile payment. To use it, you only need to open an app and let the shop scan a simple code. It is quick and safe, so shoppers no longer need to [[22]] a lot of coins and bills. Older people may find it a little hard [[23]] first, but most of them soon get used to it. In the future, going out without a wallet [[24]].","blanks":[{"n":21,"type":"語法","options":{"A":"call","B":"calls","C":"called","D":"calling"},"answer":"C","explain_zh":"(C) called：be called「被稱為」的被動用法，考語態。"},{"n":22,"type":"詞彙","options":{"A":"carry","B":"waste","C":"hide","D":"count"},"answer":"A","explain_zh":"(A) carry：不必再「攜帶」大量零錢紙鈔，考動詞詞彙。"},{"n":23,"type":"介系詞","options":{"A":"at","B":"in","C":"on","D":"of"},"answer":"A","explain_zh":"(A) at：at first「一開始」的固定用法，考介系詞。"},{"n":24,"type":"整句語意","options":{"A":"may become a very normal thing for us","B":"will make everyone lose all their money","C":"because phones can never be trusted","D":"so we must always pay with paper bills"},"answer":"A","explain_zh":"(A) 呼應「未來不帶錢包出門很平常」，考整句語意。"}]},{"label":"B","title_zh":"網路購物宅配","text":"Online shopping has become a big part of daily life for many families in Taiwan. With just a few clicks, people can order almost anything and have it [[25]] right to their door. This service saves shoppers a lot of time [[26]] they do not need to go to the store themselves. However, buyers should be careful, [[27]] some products may look better in the photos than in real life. When the box finally arrives, it always feels exciting [[28]].","blanks":[{"n":25,"type":"語法","options":{"A":"deliver","B":"delivers","C":"delivered","D":"delivering"},"answer":"C","explain_zh":"(C) delivered：have it delivered「使被送到」的被動，考語法。"},{"n":26,"type":"連接詞","options":{"A":"because","B":"although","C":"unless","D":"whether"},"answer":"A","explain_zh":"(A) because：後句說明省時間的原因，考連接詞。"},{"n":27,"type":"連接詞","options":{"A":"so","B":"but","C":"for","D":"or"},"answer":"C","explain_zh":"(C) for：引出前面「要小心」的理由，考連接詞。"},{"n":28,"type":"整句語意","options":{"A":"to open it and see what you have bought","B":"that the store is always closed at night","C":"because the mail carrier is very tired","D":"so nobody wants to shop online anymore"},"answer":"A","explain_zh":"(A) 呼應「收到包裹打開很興奮」，考整句語意。"}]}],"vocab":["cash","mobile payment","scan","wallet","online","click","deliver","service","product","arrive","coin","bill"]},{"id":7,"passages":[{"label":"A","title_zh":"健康的早餐","text":"Many students are always in a hurry in the morning, so they often skip breakfast before going to school. However, doctors say that breakfast is the most [[21]] meal of the day. A good breakfast gives us the energy we need [[22]] we can stay awake and focus in class. Foods like eggs, milk, and fruit are much [[23]] for us than sweet cakes or chips. If you want to do well at school, you should remember [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"boring","B":"important","C":"empty","D":"afraid"},"answer":"B","explain_zh":"(B) important：早餐是最「重要」的一餐，考形容詞詞彙。"},{"n":22,"type":"連接詞","options":{"A":"so that","B":"even if","C":"as if","D":"in case"},"answer":"A","explain_zh":"(A) so that：引出「以便能專心」的目的，考連接詞。"},{"n":23,"type":"語法","options":{"A":"good","B":"well","C":"better","D":"best"},"answer":"C","explain_zh":"(C) better：與 than 連用的比較級，考語法。"},{"n":24,"type":"整句語意","options":{"A":"to start each day with a healthy breakfast","B":"that eating breakfast will make you sick","C":"because school food is always too sweet","D":"so you should never eat in the morning"},"answer":"A","explain_zh":"(A) 呼應「要吃健康早餐」的建議，考整句語意。"}]},{"label":"B","title_zh":"含糖飲料的問題","text":"On hot days, a cold and sweet drink sounds like a wonderful idea. Yet many people do not know how much sugar these drinks really [[25]]. Drinking too much sugar can lead to weight problems and even [[26]] our teeth over time. Some students buy a sugary drink every day [[27]] they feel tired without one. To stay healthy, doctors suggest that we drink more water and [[28]].","blanks":[{"n":25,"type":"詞彙","options":{"A":"contain","B":"clean","C":"spend","D":"borrow"},"answer":"A","explain_zh":"(A) contain：飲料「含有」多少糖，考動詞詞彙。"},{"n":26,"type":"詞彙","options":{"A":"protect","B":"harm","C":"wash","D":"count"},"answer":"B","explain_zh":"(B) harm：糖會「傷害」牙齒，考動詞詞彙。"},{"n":27,"type":"連接詞","options":{"A":"because","B":"although","C":"unless","D":"before"},"answer":"A","explain_zh":"(A) because：後句說明每天買含糖飲料的原因，考連接詞。"},{"n":28,"type":"整句語意","options":{"A":"cut down on sweet drinks little by little","B":"add more sugar to everything we eat","C":"because water tastes worse than soda","D":"so we should drink soda all day long"},"answer":"A","explain_zh":"(A) 呼應「多喝水並減少甜飲」的建議，考整句語意。"}]}],"vocab":["skip","breakfast","meal","energy","focus","healthy","sugar","contain","harm","weight","suggest","little by little"]},{"id":8,"passages":[{"label":"A","title_zh":"泡溫泉與國內旅遊","text":"When winter comes, hot springs become one of the most popular places for travel in Taiwan. Sitting in the warm water is a great way to [[21]] after a long week of work or study. Many hot spring towns, such as Beitou and Jiaoxi, welcome [[22]] of visitors during the cold season. People enjoy the springs not only for fun [[23]] also for their health. If you have never tried it, a weekend trip to a hot spring [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"relax","B":"hurry","C":"argue","D":"shout"},"answer":"A","explain_zh":"(A) relax：泡溫泉能「放鬆」，考動詞詞彙。"},{"n":22,"type":"詞彙","options":{"A":"thousands","B":"pieces","C":"bottles","D":"corners"},"answer":"A","explain_zh":"(A) thousands：thousands of「成千上萬的」遊客，考名詞詞彙。"},{"n":23,"type":"連接詞","options":{"A":"but","B":"or","C":"so","D":"for"},"answer":"A","explain_zh":"(A) but：not only...but also 的固定搭配，考連接詞。"},{"n":24,"type":"整句語意","options":{"A":"is surely worth a try this winter","B":"will make you feel colder than before","C":"because the water there is always dirty","D":"so you should stay home all season"},"answer":"A","explain_zh":"(A) 呼應「值得一試」的建議，考整句語意。"}]},{"label":"B","title_zh":"民宿住宿體驗","text":"More and more travelers in Taiwan choose to stay in a homestay instead of a big hotel. A homestay is usually a small, warm place [[25]] by a local family. Guests there often feel at home [[26]] the owners treat them like friends. The hosts are happy to share tips about the best food and views [[27]] their town. Staying in a homestay is a wonderful way [[28]].","blanks":[{"n":25,"type":"語法","options":{"A":"run","B":"runs","C":"to run","D":"runs by"},"answer":"A","explain_zh":"(A) run：過去分詞 run by a family「由一家人經營」修飾 place，考詞形/被動。"},{"n":26,"type":"連接詞","options":{"A":"because","B":"although","C":"unless","D":"whether"},"answer":"A","explain_zh":"(A) because：後句說明賓至如歸的原因，考連接詞。"},{"n":27,"type":"介系詞","options":{"A":"in","B":"of","C":"at","D":"on"},"answer":"A","explain_zh":"(A) in：views in their town「鎮上的景點」，考介系詞。"},{"n":28,"type":"整句語意","options":{"A":"to learn about the real life of a place","B":"to spend as much money as possible","C":"because hotels are always much better","D":"so you will never meet any local people"},"answer":"A","explain_zh":"(A) 呼應「認識當地真實生活」，考整句語意。"}]}],"vocab":["hot spring","relax","season","visitor","health","homestay","local","host","guest","owner","view","worth"]},{"id":9,"passages":[{"label":"A","title_zh":"智慧型手機與學生","text":"Today almost every high school student in Taiwan owns a smartphone. These small machines are really [[21]]: we can look up new words, watch lessons, and talk with friends in seconds. However, some students spend too many hours playing games [[22]] they should be studying. Using a phone late at night can also make them tired and [[23]] to focus the next day. To do well in school, students need to learn [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"useful","B":"boring","C":"silent","D":"empty"},"answer":"A","explain_zh":"(A) useful：手機很「有用」，考形容詞詞彙。"},{"n":22,"type":"連接詞","options":{"A":"when","B":"because","C":"so","D":"unless"},"answer":"A","explain_zh":"(A) when：「在該讀書的時候」玩遊戲，考連接詞。"},{"n":23,"type":"詞彙","options":{"A":"unable","B":"afraid","C":"proud","D":"sure"},"answer":"A","explain_zh":"(A) unable：be unable to「無法」專心，考形容詞詞彙。"},{"n":24,"type":"整句語意","options":{"A":"how to use their phones in a wise way","B":"to throw their phones away for good","C":"because phones can do all their homework","D":"so they should play games every night"},"answer":"A","explain_zh":"(A) 呼應「學會聰明用手機」，考整句語意。"}]},{"label":"B","title_zh":"社群媒體的影響","text":"Social media has become a big part of teenagers' daily lives. On these apps, young people can [[25]] photos, share good news, and keep in touch with old friends. Still, we should use them with care, [[26]] not everything we see online is true. Some users feel sad when they [[27]] their own lives with the perfect pictures of others. In the end, real friends and real talks are [[28]].","blanks":[{"n":25,"type":"詞彙","options":{"A":"post","B":"eat","C":"drive","D":"burn"},"answer":"A","explain_zh":"(A) post：在社群「發布」照片，考動詞詞彙。"},{"n":26,"type":"連接詞","options":{"A":"for","B":"or","C":"so","D":"nor"},"answer":"A","explain_zh":"(A) for：引出「要小心使用」的理由，考連接詞。"},{"n":27,"type":"詞彙","options":{"A":"compare","B":"clean","C":"spend","D":"count"},"answer":"A","explain_zh":"(A) compare：拿自己的生活與別人「比較」，考動詞詞彙。"},{"n":28,"type":"整句語意","options":{"A":"still more important than online likes","B":"much worse than the photos we post","C":"because everyone lies on the internet","D":"so we should stay online all day long"},"answer":"A","explain_zh":"(A) 呼應「真實友誼比按讚更重要」，考整句語意。"}]}],"vocab":["smartphone","useful","focus","wise","social media","teenager","post","compare","online","true","care","likes"]},{"id":10,"passages":[{"label":"A","title_zh":"養寵物的責任","text":"Many families in Taiwan love to keep a dog or a cat at home. A pet can bring us joy, but taking care of one is also a big [[21]]. Owners must feed their pets, keep them clean, and take them to see the doctor when they are [[22]]. A pet is not a toy that we can play with today and forget [[23]] tomorrow. Before you bring an animal home, you should ask yourself [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"job","B":"duty","C":"game","D":"prize"},"answer":"B","explain_zh":"(B) duty：照顧寵物是一種「責任」，考名詞詞彙。"},{"n":22,"type":"詞彙","options":{"A":"sick","B":"happy","C":"clean","D":"hungry"},"answer":"A","explain_zh":"(A) sick：寵物「生病」時要看醫生，考形容詞詞彙。"},{"n":23,"type":"介系詞","options":{"A":"about","B":"into","C":"for","D":"off"},"answer":"A","explain_zh":"(A) about：forget about「忘掉」的固定用法，考介系詞。"},{"n":24,"type":"整句語意","options":{"A":"if you are ready to care for it for life","B":"how quickly you can sell it for money","C":"because pets never need any food","D":"so you can leave it alone all day"},"answer":"A","explain_zh":"(A) 呼應「是否準備好一輩子照顧」，考整句語意。"}]},{"label":"B","title_zh":"認養流浪動物","text":"Every year, many dogs and cats are left on the streets without a home. These stray animals often feel cold, hungry, and [[25]]. Instead of buying a pet from a shop, more and more kind people now choose to [[26]] one from an animal shelter. By giving a stray a warm home, they save a life [[27]] make a new friend at the same time. If everyone is willing to help, our streets [[28]].","blanks":[{"n":25,"type":"詞彙","options":{"A":"afraid","B":"proud","C":"rich","D":"lazy"},"answer":"A","explain_zh":"(A) afraid：流浪動物又冷又餓又「害怕」，考形容詞詞彙。"},{"n":26,"type":"詞彙","options":{"A":"adopt","B":"sell","C":"cook","D":"throw"},"answer":"A","explain_zh":"(A) adopt：從收容所「認養」一隻，考動詞詞彙。"},{"n":27,"type":"連接詞","options":{"A":"and","B":"but","C":"or","D":"nor"},"answer":"A","explain_zh":"(A) and：連接「救一命」與「交新朋友」，語意順承，考連接詞。"},{"n":28,"type":"整句語意","options":{"A":"will have fewer homeless animals in the future","B":"will be full of hungry stray dogs forever","C":"because no one likes animals at all","D":"so we should leave more pets outside"},"answer":"A","explain_zh":"(A) 呼應「未來街上流浪動物會變少」，考整句語意。"}]}],"vocab":["pet","duty","feed","sick","responsibility","stray","shelter","adopt","homeless","save","willing","care"]},{"id":11,"passages":[{"label":"A","title_zh":"自備購物袋減塑","text":"Plastic bags are cheap and handy, but they cause serious harm to our planet. Many of them end up in the ocean, where sea animals often [[21]] them for food and get sick. To fix this problem, more and more shoppers now [[22]] their own cloth bags when they go to the store. A cloth bag can be used again and again, [[23]] a plastic one is usually thrown away after a single trip. If each of us makes this small change, [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"repair","B":"collect","C":"produce","D":"mistake"},"answer":"D","explain_zh":"(D) mistake A for B：海洋動物「誤認」塑膠袋為食物，考動詞詞彙。"},{"n":22,"type":"詞彙","options":{"A":"borrow","B":"waste","C":"bring","D":"sell"},"answer":"C","explain_zh":"(C) bring：顧客「自備」布袋，考動詞詞彙與文意。"},{"n":23,"type":"連接詞","options":{"A":"while","B":"because","C":"since","D":"unless"},"answer":"A","explain_zh":"(A) while：前後對比布袋與塑膠袋，表「然而」，考對比連接詞。"},{"n":24,"type":"整句語意","options":{"A":"the ocean will become dirtier than ever before","B":"stores will sell far more plastic bags each day","C":"we can greatly reduce the plastic waste around us","D":"sea animals will have even less food to eat"},"answer":"C","explain_zh":"(C) 呼應全文「減塑」的正面結果，考整句語意。"}]},{"label":"B","title_zh":"商品過度包裝的問題","text":"Have you ever bought a small gift that came in a huge, fancy box? Many products today are wrapped in far too much paper and plastic. This kind of over-packaging looks nice, but it is actually [[25]] to the environment. Companies use it to make their goods seem more valuable, [[26]] most of the wrapping is thrown out right away. In fact, packaging is one of the largest [[27]] of trash in our cities. If shoppers choose simple products instead, they can help stores understand that [[28]].","blanks":[{"n":25,"type":"詞彙","options":{"A":"friendly","B":"harmful","C":"useful","D":"grateful"},"answer":"B","explain_zh":"(B) harmful：過度包裝「有害」環境，考形容詞詞彙。"},{"n":26,"type":"連接詞","options":{"A":"so","B":"but","C":"or","D":"for"},"answer":"B","explain_zh":"(B) but：前後語意轉折，考轉折連接詞。"},{"n":27,"type":"詞彙","options":{"A":"answers","B":"sources","C":"prizes","D":"chances"},"answer":"B","explain_zh":"(B) sources：包裝是垃圾的主要「來源」，考名詞詞彙。"},{"n":28,"type":"整句語意","options":{"A":"trash should be left inside the store","B":"bigger boxes always mean better gifts","C":"customers enjoy paying much higher prices","D":"less packaging is better for everyone"},"answer":"D","explain_zh":"(D) 呼應「選簡單包裝」的主旨，考整句語意。"}]}],"vocab":["plastic","harm","ocean","cloth","reduce","waste","package","wrap","product","source","environment","valuable"]},{"id":12,"passages":[{"label":"A","title_zh":"學校社團活動","text":"Joining a school club is one of the best ways to make new friends. After class, students with the same interests come together to [[21]] their favorite activities, from dancing to playing music. Being in a club also helps you learn skills that books alone cannot [[22]]. For example, a club leader must learn how to plan events and work well with others. Many students say that their happiest school memories [[23]] from these clubs. If you have never joined one, [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"share","B":"forget","C":"sell","D":"hide"},"answer":"A","explain_zh":"(A) share：同好一起「分享」喜歡的活動，考動詞詞彙。"},{"n":22,"type":"詞彙","options":{"A":"waste","B":"teach","C":"close","D":"count"},"answer":"B","explain_zh":"(B) teach：有些技能光靠書本無法「教」，考動詞詞彙。"},{"n":23,"type":"詞彙","options":{"A":"arrive","B":"leave","C":"come","D":"return"},"answer":"C","explain_zh":"(C) come from：最快樂的回憶「來自」社團，考片語動詞。"},{"n":24,"type":"整句語意","options":{"A":"you should quit school right now","B":"why not give it a try this year","C":"your friends will surely dislike you","D":"clubs are a total waste of time"},"answer":"B","explain_zh":"(B) 鼓勵讀者加入社團，呼應正面文意，考整句語意。"}]},{"label":"B","title_zh":"校慶運動會","text":"The school sports day is one of the most exciting events of the year. On that morning, the playground is [[25]] with cheering students and colorful flags. Each class trains hard for weeks so that they can win the relay race. During the games, classmates shout loudly to support their runners, [[26]] the teachers take photos of every happy moment. Winning is nice, but the real goal is to make everyone feel [[27]] as one big team. When the day ends, students go home tired but [[28]].","blanks":[{"n":25,"type":"詞彙","options":{"A":"empty","B":"silent","C":"filled","D":"broken"},"answer":"C","explain_zh":"(C) be filled with：操場「充滿」歡呼的學生，考片語與詞彙。"},{"n":26,"type":"連接詞","options":{"A":"though","B":"unless","C":"before","D":"while"},"answer":"D","explain_zh":"(D) while：兩個動作同時進行，表「當…時」，考連接詞。"},{"n":27,"type":"語法","options":{"A":"unite","B":"united","C":"unites","D":"uniting"},"answer":"B","explain_zh":"(B) united：feel + 過去分詞當形容詞表「團結的」，考詞形變化。"},{"n":28,"type":"整句語意","options":{"A":"afraid of meeting their classmates again","B":"angry that the sports day ever happened","C":"proud of what their class has done together","D":"sure that sports are useless for students"},"answer":"C","explain_zh":"(C) 呼應運動會團隊精神的正面結尾，考整句語意。"}]}],"vocab":["club","interest","skill","leader","memory","sports","playground","cheer","relay","support","team","proud"]},{"id":13,"passages":[{"label":"A","title_zh":"高中職生打工","text":"Many high school students in Taiwan take a part-time job during their free time. Working at a store or a restaurant is a good way to [[21]] some money for themselves. More importantly, a part-time job teaches teenagers skills that are [[22]] in the real world, such as how to serve customers politely. However, students must be careful [[23]] their studies do not suffer because of work. If a job takes up too many hours, [[24]]. So finding the right balance between work and school is the key.","blanks":[{"n":21,"type":"詞彙","options":{"A":"earn","B":"spend","C":"lose","D":"count"},"answer":"A","explain_zh":"(A) earn：打工「賺」錢，考動詞詞彙。"},{"n":22,"type":"詞彙","options":{"A":"useless","B":"useful","C":"boring","D":"silent"},"answer":"B","explain_zh":"(B) useful：學到在現實世界「有用」的技能，考形容詞詞彙。"},{"n":23,"type":"連接詞","options":{"A":"who","B":"what","C":"which","D":"that"},"answer":"D","explain_zh":"(D) that：be careful that... 引導子句，考連接詞。"},{"n":24,"type":"整句語意","options":{"A":"their grades may quickly drop","B":"they will get much richer overnight","C":"teachers will give them free food","D":"the store will close down at once"},"answer":"A","explain_zh":"(A) 呼應「打工太多影響課業」，考整句語意。"}]},{"label":"B","title_zh":"職場守時與禮貌","text":"When you start your first job, being on time is one of the most important habits to build. A worker who is often late makes the boss [[25]] that he cannot be trusted with important tasks. Besides being punctual, good manners also matter a lot [[26]] the workplace. A simple smile or a polite \"thank you\" can make your coworkers feel [[27]]. People enjoy working with someone who is both reliable and kind. In the end, those who are always polite and on time [[28]].","blanks":[{"n":25,"type":"詞彙","options":{"A":"wish","B":"hope","C":"feel","D":"dream"},"answer":"C","explain_zh":"(C) make sb feel：讓老闆「覺得」不可信任，考使役動詞＋詞彙。"},{"n":26,"type":"介系詞","options":{"A":"in","B":"of","C":"off","D":"up"},"answer":"A","explain_zh":"(A) in the workplace：介系詞 in 表「在職場中」，考介系詞。"},{"n":27,"type":"詞彙","options":{"A":"afraid","B":"worried","C":"tired","D":"respected"},"answer":"D","explain_zh":"(D) respected：禮貌讓同事感到「被尊重」，考形容詞詞彙。"},{"n":28,"type":"整句語意","options":{"A":"never learn anything at all","B":"are usually fired within a week","C":"often win the trust of their bosses","D":"make everyone around them upset"},"answer":"C","explain_zh":"(C) 呼應守時與禮貌帶來的正面結果，考整句語意。"}]}],"vocab":["part-time","earn","customer","polite","balance","habit","boss","trust","punctual","manners","coworker","respect"]},{"id":14,"passages":[{"label":"A","title_zh":"滷肉飯與台灣小吃","text":"Braised pork rice is one of the most loved dishes in Taiwan. It is made of small pieces of pork cooked slowly in a sweet and salty sauce, then served [[21]] a bowl of warm rice. Though it looks simple, this dish is [[22]] delicious that many people can eat it every day. You can find it almost everywhere, from small night-market stands [[23]] fancy restaurants. For many Taiwanese, a bowl of braised pork rice is not just food; [[24]].","blanks":[{"n":21,"type":"介系詞","options":{"A":"over","B":"into","C":"against","D":"without"},"answer":"A","explain_zh":"(A) over：肉汁淋「在」熱飯上，考介系詞。"},{"n":22,"type":"語法","options":{"A":"too","B":"so","C":"very","D":"much"},"answer":"B","explain_zh":"(B) so...that：如此美味「以致於」，so 引導結果句型，考語法。"},{"n":23,"type":"介系詞","options":{"A":"by","B":"for","C":"to","D":"at"},"answer":"C","explain_zh":"(C) from...to...：從路邊攤「到」餐廳，考固定介系詞搭配。"},{"n":24,"type":"整句語意","options":{"A":"it is a warm taste of home","B":"it is far too costly to enjoy","C":"no one really likes it at all","D":"it can only be eaten abroad"},"answer":"A","explain_zh":"(A) 呼應對台灣人的情感意義「家的味道」，考整句語意。"}]},{"label":"B","title_zh":"夜市遊戲攤位","text":"Besides tasty food, night markets in Taiwan are also famous for their fun game stands. As you walk around, you will see people trying to [[25]] small balls into cups or shooting balloons with toy guns. These games are cheap, so anyone can join [[26]] spending much money. Winning a prize is not easy, but the excitement [[27]] people coming back to try again. Even if you lose, [[28]]. That is why game stands are always full of laughter on busy nights.","blanks":[{"n":25,"type":"詞彙","options":{"A":"grow","B":"read","C":"wash","D":"throw"},"answer":"D","explain_zh":"(D) throw：把球「丟」進杯子，考動詞詞彙。"},{"n":26,"type":"介系詞","options":{"A":"with","B":"without","C":"about","D":"along"},"answer":"B","explain_zh":"(B) without spending：「不用」花大錢，介系詞＋動名詞，考介系詞。"},{"n":27,"type":"語法","options":{"A":"keep","B":"keeps","C":"keeping","D":"kept"},"answer":"B","explain_zh":"(B) keeps：主詞 the excitement 為單數，動詞用 keeps，考主謂一致。"},{"n":28,"type":"整句語意","options":{"A":"the stand will be closed forever","B":"you must pay a huge fine","C":"the fun makes it worth the try","D":"you can never visit again"},"answer":"C","explain_zh":"(C) 呼應「即使輸了也值得」的正面語氣，考整句語意。"}]}],"vocab":["braised","pork","sauce","bowl","dish","stand","prize","excitement","balloon","laughter","delicious","worth"]},{"id":15,"passages":[{"label":"A","title_zh":"慢跑的好處","text":"Jogging is a simple sport that almost anyone can do. You do not need special tools or a gym; a pair of good shoes is [[21]] you really need. Running for just thirty minutes a day can make your heart [[22]] and help you sleep better at night. Jogging is also a great way to deal with stress, [[23]] it lets you clear your mind while you move. Best of all, if you jog with friends, [[24]].","blanks":[{"n":21,"type":"語法","options":{"A":"much","B":"every","C":"all","D":"many"},"answer":"C","explain_zh":"(C) all (that) you need：關係子句「你所需要的全部」，考關係詞用法。"},{"n":22,"type":"詞彙","options":{"A":"weaker","B":"stronger","C":"colder","D":"shorter"},"answer":"B","explain_zh":"(B) stronger：慢跑讓心臟「更強壯」，考形容詞詞彙與文意。"},{"n":23,"type":"連接詞","options":{"A":"whether","B":"although","C":"unless","D":"because"},"answer":"D","explain_zh":"(D) because：後句說明紓壓的原因，考連接詞。"},{"n":24,"type":"整句語意","options":{"A":"running turns into a boring chore","B":"you will surely get hurt at once","C":"the exercise becomes even more fun","D":"nobody will ever want to join you"},"answer":"C","explain_zh":"(C) 呼應「和朋友慢跑更好玩」的正面結尾，考整句語意。"}]},{"label":"B","title_zh":"充足睡眠的重要","text":"Getting enough sleep is just as important as eating well. While we sleep, our body [[25]] itself and stores the things we learned during the day. Students who sleep too little often find it hard to [[26]] in class the next morning. In fact, a tired brain works much [[27]] than a well-rested one. Sadly, many teenagers stay up late playing on their phones. If you want to feel fresh and study better, [[28]].","blanks":[{"n":25,"type":"語法","options":{"A":"repair","B":"repairs","C":"repairing","D":"repaired"},"answer":"B","explain_zh":"(B) repairs：主詞 our body 為單數，動詞用 repairs，考主謂一致。"},{"n":26,"type":"詞彙","options":{"A":"focus","B":"escape","C":"argue","D":"shout"},"answer":"A","explain_zh":"(A) focus：睡太少難以「專心」上課，考動詞詞彙。"},{"n":27,"type":"語法","options":{"A":"slow","B":"slower","C":"slowest","D":"slowly"},"answer":"B","explain_zh":"(B) slower：與 than 連用的比較級，考比較級。"},{"n":28,"type":"整句語意","options":{"A":"drink coffee before you sleep","B":"keep your phone on all night long","C":"never close your eyes at all","D":"make sure you go to bed early"},"answer":"D","explain_zh":"(D) 呼應「充足睡眠」的建議，考整句語意。"}]}],"vocab":["jog","gym","heart","stress","exercise","sleep","repair","store","focus","brain","rested","fresh"]},{"id":16,"passages":[{"label":"A","title_zh":"圖書館與閱讀習慣","text":"The library is one of the quietest and most useful places in a school. There, students can borrow books for free and find a calm corner [[21]] to study. Reading often is a habit that brings many [[22]]. It builds a bigger word bank, opens the mind, and even helps us understand other people's feelings. A person who reads widely usually writes and speaks [[23]] than one who never opens a book. So next time you feel bored, [[24]].","blanks":[{"n":21,"type":"語法","options":{"A":"which","B":"in which","C":"who","D":"whose"},"answer":"B","explain_zh":"(B) in which：修飾 corner 的關係子句「在其中讀書」，考關係詞。"},{"n":22,"type":"詞彙","options":{"A":"mistakes","B":"problems","C":"dangers","D":"benefits"},"answer":"D","explain_zh":"(D) benefits：閱讀帶來許多「好處」，考名詞詞彙與文意。"},{"n":23,"type":"語法","options":{"A":"good","B":"well","C":"better","D":"best"},"answer":"C","explain_zh":"(C) better：與 than 連用的比較級副詞，考比較級。"},{"n":24,"type":"整句語意","options":{"A":"stay far from the library","B":"throw all your books away","C":"why not pick up a good book","D":"stop reading forever and ever"},"answer":"C","explain_zh":"(C) 呼應鼓勵閱讀的主旨，考整句語意。"}]},{"label":"B","title_zh":"線上課程學習","text":"Thanks to the Internet, students today can learn almost anything from home. Online courses let you study at your own [[25]], so you can watch a lesson again if you do not understand it. They are also cheaper than many classes, [[26]] you only need a computer and a good connection. However, learning online also [[27]] a lot of self-control, because no teacher is watching you. Students who cannot manage their time well may fall behind. In short, online learning is a great tool [[28]].","blanks":[{"n":25,"type":"詞彙","options":{"A":"noise","B":"pace","C":"seat","D":"price"},"answer":"B","explain_zh":"(B) at your own pace：按自己的「步調」學習，考名詞片語詞彙。"},{"n":26,"type":"連接詞","options":{"A":"since","B":"although","C":"unless","D":"whether"},"answer":"A","explain_zh":"(A) since：後句說明便宜的原因，考連接詞。"},{"n":27,"type":"語法","options":{"A":"need","B":"needs","C":"needing","D":"needed"},"answer":"B","explain_zh":"(B) needs：主詞 learning online 為單數，動詞用 needs，考主謂一致。"},{"n":28,"type":"整句語意","options":{"A":"so you can sleep the whole day","B":"even when you never study at all","C":"because teachers do all the work","D":"if you can stay serious about it"},"answer":"D","explain_zh":"(D) 呼應「需要自律」的主旨結尾，考整句語意。"}]}],"vocab":["library","borrow","calm","habit","benefit","widely","online","course","pace","connection","self-control","manage"]},{"id":17,"passages":[{"label":"A","title_zh":"YouBike 共享單車","text":"YouBike has become a common sight in many cities in Taiwan. People can easily [[21]] a bike at one station and return it at another. This service is very [[22]] for short trips, and it also helps reduce air pollution. Riding a YouBike is cheaper [[23]] taking a taxi, so students and workers love it. To make the city greener, the government keeps building more stations [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"rent","B":"waste","C":"repair","D":"throw"},"answer":"A","explain_zh":"(A) rent：在站點「租借」單車，考動詞詞彙。"},{"n":22,"type":"詞彙","options":{"A":"boring","B":"dangerous","C":"convenient","D":"expensive"},"answer":"C","explain_zh":"(C) convenient：短程用很「方便」，考形容詞詞彙。"},{"n":23,"type":"語法","options":{"A":"than","B":"then","C":"as","D":"from"},"answer":"A","explain_zh":"(A) than：cheaper…than 比較級，考語法。"},{"n":24,"type":"整句語意","options":{"A":"so that more people will ride bikes instead of driving","B":"because riding a bike is too tiring for everyone","C":"although the stations are always broken and dirty","D":"while fewer people want to use this useful service"},"answer":"A","explain_zh":"(A) 呼應「讓城市更綠」的目的，考整句語意。"}]},{"label":"B","title_zh":"城市塞車問題","text":"In big cities, traffic jams are a serious problem every day. During rush hour, cars move slowly and drivers often [[25]] a lot of time waiting on the road. Too many private cars also [[26]] more air pollution to the city. [[27]] we want cleaner air, we should take buses or the MRT more often. If more people use public transport, the streets will surely become much [[28]].","blanks":[{"n":25,"type":"詞彙","options":{"A":"save","B":"waste","C":"earn","D":"borrow"},"answer":"B","explain_zh":"(B) waste：塞車「浪費」時間，考動詞詞彙。"},{"n":26,"type":"詞彙","options":{"A":"bring","B":"protect","C":"reduce","D":"clean"},"answer":"A","explain_zh":"(A) bring：私家車「帶來」更多空汙，考動詞詞彙。"},{"n":27,"type":"連接詞","options":{"A":"If","B":"Though","C":"Unless","D":"Before"},"answer":"A","explain_zh":"(A) If：表示條件「如果」想要乾淨空氣，考連接詞。"},{"n":28,"type":"整句語意","options":{"A":"smoother and less crowded than before","B":"dirtier because of all the heavy traffic","C":"noisier since everyone drives their own car","D":"harder for buses to move around the city"},"answer":"A","explain_zh":"(A) 呼應「大家搭大眾運輸」的好結果，考整句語意。"}]}],"vocab":["rent","station","convenient","pollution","traffic","jam","rush hour","waste","public","transport","smooth","crowded"]},{"id":18,"passages":[{"label":"A","title_zh":"咖啡與提神","text":"Many students and workers drink coffee to stay [[21]] during a long day. Coffee has caffeine, which helps people feel less tired and think more [[22]]. A warm cup in the morning can also put us in a good mood. However, we should not drink [[23]] much coffee, or we may not be able to sleep at night. Doctors say that one or two cups a day is enough [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"awake","B":"asleep","C":"hungry","D":"quiet"},"answer":"A","explain_zh":"(A) awake：喝咖啡保持「清醒」，考形容詞詞彙。"},{"n":22,"type":"語法","options":{"A":"clear","B":"clearly","C":"clearer","D":"clearness"},"answer":"B","explain_zh":"(B) clearly：修飾動詞 think 用副詞，考詞形變化。"},{"n":23,"type":"詞彙","options":{"A":"too","B":"very","C":"so","D":"quite"},"answer":"A","explain_zh":"(A) too：too much「太多」表過量，考用字。"},{"n":24,"type":"整句語意","options":{"A":"to keep us awake without hurting our health","B":"because coffee tastes really bad in the morning","C":"so that we can stay up all night long","D":"although coffee never makes anyone feel tired"},"answer":"A","explain_zh":"(A) 呼應「適量咖啡」的建議，考整句語意。"}]},{"label":"B","title_zh":"熬夜的壞處","text":"Some students like to stay up late playing games or watching videos. They think staying up is fun, but it is really [[25]] for their health. When we do not get enough sleep, we feel tired and cannot [[26]] well in class the next day. Staying up late also makes our skin worse and our minds slow. [[27]] you want to study better, you should go to bed early. A good night's sleep will make you feel [[28]] in the morning.","blanks":[{"n":25,"type":"詞彙","options":{"A":"good","B":"bad","C":"safe","D":"easy"},"answer":"B","explain_zh":"(B) bad：熬夜對健康「不好」，考形容詞詞彙。"},{"n":26,"type":"詞彙","options":{"A":"focus","B":"sleep","C":"dream","D":"rest"},"answer":"A","explain_zh":"(A) focus：上課無法「專心」，考動詞詞彙。"},{"n":27,"type":"連接詞","options":{"A":"If","B":"But","C":"So","D":"Or"},"answer":"A","explain_zh":"(A) If：表示條件「如果」想讀好書，考連接詞。"},{"n":28,"type":"整句語意","options":{"A":"fresh and full of energy for the whole day","B":"sleepy and weak because you slept too much","C":"sad that the night was much too short","D":"angry about going to bed so very early"},"answer":"A","explain_zh":"(A) 呼應「好好睡」帶來的好處，考整句語意。"}]}],"vocab":["coffee","caffeine","awake","tired","mood","health","focus","energy","skin","fresh","sleep","video"]},{"id":19,"passages":[{"label":"A","title_zh":"舊衣回收再利用","text":"Every year, people throw away a huge amount of old clothes. In fact, many of these clothes are still good enough to [[21]] again. Instead of throwing them away, we can [[22]] them to people in need. Some old clothes can also be made [[23]] bags or cleaning cloths. Recycling clothes is a simple way to help the earth [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"wear","B":"cook","C":"read","D":"drive"},"answer":"A","explain_zh":"(A) wear：衣服還能再「穿」，考動詞詞彙。"},{"n":22,"type":"詞彙","options":{"A":"sell","B":"give","C":"buy","D":"hide"},"answer":"B","explain_zh":"(B) give：把衣服「送給」有需要的人，考動詞詞彙。"},{"n":23,"type":"介系詞","options":{"A":"into","B":"of","C":"off","D":"up"},"answer":"A","explain_zh":"(A) into：be made into「做成」某物，考介系詞片語。"},{"n":24,"type":"整句語意","options":{"A":"by cutting down on waste and saving resources","B":"because new clothes are always better than old ones","C":"so that stores can sell many more new clothes","D":"although recycling clothes takes too much money"},"answer":"A","explain_zh":"(A) 呼應「回收舊衣幫助地球」的做法，考整句語意。"}]},{"label":"B","title_zh":"二手物品拍賣","text":"These days, more and more people enjoy [[25]] used things onlin , such as heart problems. So next time you sit down for a meal, remember to [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"healthy","B":"tired","C":"hungry","D":"angry"},"answer":"A","explain_zh":"(A) healthy：多吃菜保持「健康」，考形容詞詞彙。"},{"n":22,"type":"語法","options":{"A":"much","B":"more","C":"most","D":"many"},"answer":"B","explain_zh":"(B) more：與 than 連用的比較級，考比較級。"},{"n":23,"type":"介系詞","options":{"A":"from","B":"for","C":"on","D":"at"},"answer":"A","explain_zh":"(A) protect A from B「保護免於」為固定用法，考介系詞。"},{"n":24,"type":"整句語意","options":{"A":"fill half of your plate with vegetables","B":"throw away all the green food","C":"eat only meat and sweet snacks","D":"skip your dinner to lose weight"},"answer":"A","explain_zh":"(A) 呼應多吃蔬菜的建議，考整句語意。"}]},{"label":"B","title_zh":"速食的壞處","text":"Fast food is cheap, tasty, and easy to get, so many teenagers love it. However, eating too much fast food is [[25]] for our health. Most of these meals are full of oil, sugar, and salt, [[26]] can make people gain weight. Someone who eats burgers and fries every day may [[27]] become fat and weak. If we want to enjoy a long and healthy life, we should [[28]].","blanks":[{"n":25,"type":"詞彙","options":{"A":"helpful","B":"harmful","C":"wonderful","D":"peaceful"},"answer":"B","explain_zh":"(B) harmful：速食「有害」健康，考形容詞詞彙。"},{"n":26,"type":"語法","options":{"A":"which","B":"who","C":"where","D":"what"},"answer":"A","explain_zh":"(A) which：關係代名詞指前面整件事，考關係詞。"},{"n":27,"type":"詞彙","options":{"A":"slowly","B":"hardly","C":"never","D":"seldom"},"answer":"A","explain_zh":"(A) slowly：天天吃會「慢慢」變胖，考副詞語意。"},{"n":28,"type":"整句語意","options":{"A":"eat fast food only once in a while","B":"have burgers for every single meal","C":"stop eating any vegetables at all","D":"drink soda instead of clean water"},"answer":"A","explain_zh":"(A) 呼應偶爾吃速食才健康，考整句語意。"}]}],"vocab":["vegetable","vitamin","fiber","energy","protect","disease","meal","sugar","salt","weight","harmful","healthy"]},{"id":28,"passages":[{"label":"A","titl ,"C":"play games all day and all night","D":"never touch a computer again"},"answer":"A","explain_zh":"(A) 呼應標題「適度使用」3C，考整句語意。"}]}],"vocab":["gaming","esports","tournament","skilled","stage","prize","screen","stare","break","proper","team","practice"]},{"id":29,"passages":[{"label":"A","title_zh":"台鐵便當","text":"The railway lunch box is a famous food in Taiwan. For many years, travelers have [[21]] these warm boxes while riding the train. A typical lunch box comes [[22]] a piece of pork, rice, a boiled egg, and some vegetables. The taste is simple, but it is [[23]] than any fancy meal for people who miss the old days. Now the railway sells special boxes at busy stations, so hungry passengers [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"refused","B":"enjoyed","C":"wasted","D":"sold"},"answer":"B","explain_zh":"(B) enjoyed：旅客多年來「享用」火車便當，考動詞詞彙。"},{"n":22,"type":"詞彙/句型","options":{"A":"from","B":"into","C":"with","D":"off"},"answer":"C","explain_zh":"(C) come with：便當「附有」豬肉、飯等，考介系詞搭配。"},{"n":23,"type":"語法","options":{"A":"better","B":"good","C":"best","D":"well"},"answer":"A","explain_zh":"(A) better：與 than 連用的比較級「更好」，考比較級語法。"},{"n":24,"type":"整句語意","options":{"A":"have to cook their own food at home","B":"are not allowed to eat on the train","C":"must throw away the boxes right away","D":"can grab a hot meal before they get on board"},"answer":"D","explain_zh":"(D) 呼應車站賣便當方便旅客「上車前買熱食」，考整句語意。"}]},{"label":"B","title_zh":"搭火車環島","text":"Traveling around the island by train is a popular way to see Taiwan. In just a few days, visitors can go [[25]] the mountains, the coast, and small country towns. The train windows offer beautiful views, [[26]] passengers can relax and take photos along the way. Because tickets are not expensive, this kind of trip is [[27]] for students with little money. If you want a slow but memorable journey, taking the train around the island [[28]].","blanks":[{"n":25,"type":"介系詞","options":{"A":"against","B":"through","C":"without","D":"off ery day, a huge amount of good food [[25]] thrown away, even though many people are still hungry. Some markets now [[26]] fruits and vegetables that look ugly but still taste fine. Restaurants can also give their extra meals to those in need [[27]] letting it go bad. If everyone takes small steps, we can save food and money, and together we [[28]].","blanks":[{"n":25,"type":"語法","options":{"A":"are","B":"be","C":"being","D":"is"},"answer":"D","explain_zh":"(D) is：a huge amount of food 為單數主詞，被動用 is thrown，考主謂一致與被動。"},{"n":26,"type":"詞彙","options":{"A":"hide","B":"sell","C":"burn","D":"waste"},"answer":"B","explain_zh":"(B) sell：市場「販售」外表醜但仍好吃的蔬果，考動詞詞彙。"},{"n":27,"type":"連接詞","options":{"A":"because of","B":"thanks to","C":"instead of","D":"in spite of"},"answer":"C","explain_zh":"(C) instead of：把剩餐送人「而不是」讓它壞掉，考片語連接詞。"},{"n":28,"type":"整句語意","options":{"A":"will waste even more than before","B":"should throw away all the food","C":"have no way to help others","D":"can make the world a better place"},"answer":"D","explain_zh":"(D) 呼應人人出點力，「能讓世界更好」，考整句語意。"}]}],"vocab":["balanced","meal","prepare","attention","skip","waste","amount","market","restaurant","extra","save","step"]},{"id":31,"passages":[{"label":"A","title_zh":"登山健行","text":"Hiking in the mountains is a wonderful way to stay healthy and enjoy nature. On weekends, many families [[21]] up early to catch fresh air and beautiful views. Walking on a green trail can help people forget their worries [[22]] make them feel relaxed. However, the weather in the mountains changes fast, so hikers should always [[23]] the forecast before they leave. With good planning, a day in the mountains [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"give","B":"look","C":"get","D":"put"},"answer":"C","explain_zh":"(C) get up：家庭「早起」呼吸新鮮空氣，考片語動詞詞彙。"},{"n":22,"type":"連接詞","options":{"A":"and","B":"but","C":"or","D":"so"},"answer":"A","explain_zh":"(A) and：忘掉煩惱「並且」感到放鬆，前後並列，考連接詞。"},{"n":23,"type":"詞彙","options":{"A":"clean","B":"clo answer":"A","explain_zh":"(A) build：「培養」責任感，考動詞詞彙。"},{"n":26,"type":"詞彙","options":{"A":"affect","B":"forget","C":"watch","D":"return"},"answer":"A","explain_zh":"(A) affect：他們的行為會「影響」全家，考動詞詞彙。"},{"n":27,"type":"詞彙","options":{"A":"reliable","B":"lazy","C":"selfish","D":"careless"},"answer":"A","explain_zh":"(A) reliable：養成「可靠」的性格，考形容詞詞彙。"},{"n":28,"type":"整句語意","options":{"A":"grow into a trusted and mature adult","B":"never care about other people at all","C":"always leave every job to others","D":"forget how to help around the house"},"answer":"A","explain_zh":"(A) 呼應「責任感帶來成熟」的正向結果，考整句語意。"}]}],"vocab":["housework","chore","share","sweep","dishes","responsibility","action","reliable","patient","habit","responsible","team"]},{"id":40,"passages":[{"label":"A","title_zh":"台灣觀光推廣","text":"In recent years, Taiwan has worked hard to [[21]] more tourists from around the world. The government makes colorful videos to show the island's tall mountains, warm hot springs, and busy night markets. These beautiful scenes have [[22]] many foreign travelers to visit. Because Taiwan is small, visitors can easily go from a big city to a quiet beach [[23]] one short trip. With its friendly people and tasty food, Taiwan is truly [[24]].","blanks":[{"n":21,"type":"詞彙","options":{"A":"attract","B":"refuse","C":"lose","D":"hurt"},"answer":"A","explain_zh":"(A) attract：「吸引」更多觀光客，考動詞詞彙。"},{"n":22,"type":"語法","options":{"A":"encourage","B":"encouraged","C":"encouraging","D":"to encourage"},"answer":"B","explain_zh":"(B) encouraged：現在完成式 have + 過去分詞，考時態語法。"},{"n":23,"type":"介系詞","options":{"A":"in","B":"of","C":"to","D":"by"},"answer":"A","explain_zh":"(A) in：in one short trip「在一趟短程中」，考介系詞。"},{"n":24,"type":"整句語意","options":{"A":"a wonderful place worth visiting","B":"too dangerous for any traveler","C":"a country with nothing to see","D":"an island no one has heard of"},"answer":"A","explain_zh":"(A) 呼應全篇推廣台灣之美的主旨，考整句語意。"}]},{"label":"B","title_zh":"向外國朋友介紹台灣","text":"When my pen pal from Canada visited last summer, I was excited to [[25]] her my country. On the first day, I took her to a famous temple, [[26]] she was amazed by the beautiful roofs and the smell of incense. We also tried bubble tea, and she said it was the most delicious drink she had [[27]] tasted. Before she left, she told me that thanks to me, [[28]].","blanks":[{"n":25,"type":"詞彙","options":{"A":"show","B":"sell","C":"hide","D":"leave"},"answer":"A","explain_zh":"(A) show：「介紹、展示」我的國家給她，考動詞詞彙。"},{"n":26,"type":"語法","options":{"A":"where","B":"who","C":"what","D":"which"},"answer":"A","explain_zh":"(A) where：關係副詞，表在寺廟「那裡」，考關係詞語法。"},{"n":27,"type":"語法","options":{"A":"never","B":"ever","C":"yet","D":"already"},"answer":"B","explain_zh":"(B) ever：the most…she had ever tasted「所嚐過最…」，考最高級用法。"},{"n":28,"type":"整句語意","options":{"A":"she had fallen in love with Taiwan","B":"she would never come back again","C":"she hated everything about the trip","D":"she learned nothing during her stay"},"answer":"A","explain_zh":"(A) 呼應「介紹台灣、朋友愛上台灣」的正向結尾，考整句語意。"}]}],"vocab":["tourist","island","hot spring","scene","attract","temple","incense","amazed","delicious","visit","worth","introduce"]}];
const LETTERS = ['A','B','C','D'];
let cur = 0;                       // index into PAPERS
const state = {};                  // state[paperIndex][n] = chosenLetter
const doneRounds = new Set();

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function renderRounds(){
  const el = document.getElementById('rounds'); el.innerHTML='';
  PAPERS.forEach((p,i)=>{
    const b=document.createElement('button');
    b.textContent=p.id;
    if(i===cur) b.className='active';
    else if(doneRounds.has(i)) b.className='done';
    b.onclick=()=>{cur=i;render();};
    el.appendChild(b);
  });
}

function blanksOf(p){return p.passages.flatMap(pa=>pa.blanks);}

function updateScore(){
  const p=PAPERS[cur]; const st=state[cur]||{};
  const all=blanksOf(p); let correct=0, ans=0;
  all.forEach(b=>{ if(st[b.n]){ans++; if(st[b.n]===b.answer)correct++;} });
  document.getElementById('sc-correct').textContent=correct;
  document.getElementById('sc-total').textContent=all.length;
  document.getElementById('sc-ans').textContent=ans;
  if(ans===all.length){doneRounds.add(cur);renderRounds();}
}

function choose(n,letter,btn){
  const p=PAPERS[cur]; if(!state[cur])state[cur]={};
  if(state[cur][n])return;               // already answered
  state[cur][n]=letter;
  const blank=p.passages.flatMap(pa=>pa.blanks).find(b=>b.n===n);
  const correct=blank.answer;
  const qEl=document.getElementById('q-'+n);
  // mark options
  qEl.querySelectorAll('.opt').forEach(o=>{
    const k=o.dataset.k; o.disabled=true;
    if(k===letter){ o.classList.add(k===correct?'chosen-ok':'chosen-no'); o.querySelector('.k').classList.add(k===correct?'okmark':'nomark'); }
    if(k===correct && k!==letter){ o.classList.add('reveal-ok'); o.querySelector('.k').classList.add('okmark'); }
  });
  // reveal explanation
  qEl.querySelector('.exp').classList.add('show');
  // fill blank
  const bk=document.getElementById('bk-'+n);
  if(bk){ bk.innerHTML=esc(blank.options[letter]); bk.classList.add(letter===correct?'ok':'no'); }
  updateScore();
}

function renderText(pa){
  let h=esc(pa.text);
  h=h.replace(/\[\[(\d+)\]\]/g,(m,n)=>'<span class="blank" id="bk-'+n+'"><span class="bn">'+n+'</span></span>');
  return h;
}

function renderPassage(pa){
  let h='<div class="passage">';
  h+='<div class="ptitle">'+pa.label+'. '+esc(pa.title_zh)+'</div>';
  h+='<p class="ptext">'+renderText(pa)+'</p>';
  pa.blanks.forEach(b=>{
    h+='<div class="q" id="q-'+b.n+'">';
    h+='<div class="stem"><span class="qn">'+b.n+'.</span> 請選出最適合的答案：</div>';
    h+='<div class="opts">';
    LETTERS.forEach(k=>{
      h+='<button class="opt" data-k="'+k+'" onclick="choose('+b.n+',\''+k+'\',this)"><span class="k">('+k+')</span><span>'+esc(b.options[k])+'</span></button>';
    });
    h+='</div>';
    h+='<div class="exp">✔ 正解 ('+b.answer+')　'+esc(b.explain_zh)+'</div>';
    h+='</div>';
  });
  h+='</div>';
  return h;
}

function render(){
  const p=PAPERS[cur];
  let h='<div class="paperhead">第 '+p.id+' 回　綜合測驗</div>';
  h+='<p class="note">兩篇短文，共 8 個空格（第 21–28 題），每題四個選項，依文意選出最適合的答案。</p>';
  p.passages.forEach(pa=>h+=renderPassage(pa));
  if(p.vocab&&p.vocab.length) h+='<div class="vocab"><b>本回必備單字：</b>'+p.vocab.map(esc).join('、')+'</div>';
  document.getElementById('content').innerHTML=h;
  // restore answered state
  const st=state[cur]||{};
  Object.keys(st).forEach(n=>{ /* re-apply */ reapply(+n,st[n]); });
  document.getElementById('prevBtn').disabled=(cur===0);
  document.getElementById('nextBtn').disabled=(cur===PAPERS.length-1);
  renderRounds(); updateScore();
  window.scrollTo({top:0,behavior:'smooth'});
}

function reapply(n,letter){
  const p=PAPERS[cur];
  const blank=p.passages.flatMap(pa=>pa.blanks).find(b=>b.n===n);
  const correct=blank.answer; const qEl=document.getElementById('q-'+n);
  qEl.querySelectorAll('.opt').forEach(o=>{
    const k=o.dataset.k; o.disabled=true;
    if(k===letter){o.classList.add(k===correct?'chosen-ok':'chosen-no');o.querySelector('.k').classList.add(k===correct?'okmark':'nomark');}
    if(k===correct&&k!==letter){o.classList.add('reveal-ok');o.querySelector('.k').classList.add('okmark');}
  });
  qEl.querySelector('.exp').classList.add('show');
  const bk=document.getElementById('bk-'+n);
  if(bk){bk.innerHTML=esc(blank.options[letter]);bk.classList.add(letter===correct?'ok':'no');}
}

document.getElementById('resetBtn').onclick=()=>{ state[cur]={}; doneRounds.delete(cur); render(); };
document.getElementById('prevBtn').onclick=()=>{ if(cur>0){cur--;render();} };
document.getElementById('nextBtn').onclick=()=>{ if(cur<PAPERS.length-1){cur++;render();} };
render();
</script>
</body>
</html>
