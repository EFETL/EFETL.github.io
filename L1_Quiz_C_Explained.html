<script>

const sections = [
  {

      { q: 'The factory _______ nearly a thousand workers from the local town.',

        exp: '<span class="exp-key">employs（雇用）</span>──工廠雇用近千名當地工人。<br>❌ confines = 限制；hesitates = 猶豫；frightens = 使害怕，均不符語境。' },

      { q: 'The volunteers tried to _______ the lonely elderly residents at the nursing home.',
        opts: ['confine','cheer up','pass away','turn down'],
        ans: 'B',
        exp: '<span class="exp-key">cheer up（使振作；使高興）</span>──志工試著讓孤單的長者振作起來。<br>❌ confine = 限制；pass away = 去世；turn down = 拒絕，均不符語境。' },
      { q: 'Doctors say the disease is _______ and cannot be cured.',
        opts: ['drowsy','corporate','terminal','frail'],
        ans: 'C',
        exp: '<span class="exp-key">terminal（末期的；致命的）</span>──terminal disease = 末期疾病，無法治癒。<br>❌ drowsy = 昏昏欲睡；corporate = 企業的；frail = 虛弱的，均不符。' },
      { q: 'The medicine made her feel _______, so she went to bed early.',
        opts: ['drowsy','tremendous','frail','corporate'],
        ans: 'A',
        exp: '<span class="exp-key">drowsy（昏昏欲睡的）</span>──藥物讓她昏昏欲睡，提早上床。<br>❌ tremendous = 巨大的；frail = 虛弱的；corporate = 企業的，均不符語境。' },
      { q: 'The audience burst into _______ when the comedian told his joke.',
        opts: ['fright','laughter','refusal','germ'],
        ans: 'B',
        exp: '<span class="exp-key">laughter（笑聲）</span>──burst into laughter = 突然大笑。<br>❌ fright = 驚恐；refusal = 拒絕；germ = 細菌，均不符。' },
      { q: 'Touching shared doorknobs can _______ germs to other people.',
        opts: ['cheer up','turn down','pass on','make a difference'],
        ans: 'C',
        exp: '<span class="exp-key">pass on...to...（傳遞…給…）</span>──pass on germs to sb. = 把病菌傳給別人，課文原句用法。<br>❌ cheer up = 使振作；turn down = 拒絕；make a difference = 有影響，均不搭配 germs。' },
      { q: 'After the long hike, the warmth of the campfire gave everyone a sense of _______.',

        ans: 'C',
        exp: '<span class="exp-key">warmth（溫暖）</span>──營火的溫暖帶給大家溫暖的感受。<br>❌ fright = 驚恐；refusal = 拒絕；hesitation = 猶豫，均不符。' },
      { q: 'The toddler _______ his arms toward his mother, wanting to be picked up.',
        opts: ['confined','frightened','stretched','sparkled'],
        ans: 'C',
        exp: '<span class="exp-key">stretched（伸展；伸出）</span>──stretch out one\'s arms = 伸出手臂，課文原句 Billy stretched out his tiny arms。<br>❌ confined = 限制；frightened = 驚嚇；sparkled = 閃耀，均不搭配。' },
      { q: 'The injured bird looked so _______ that the children were afraid to touch it.',
        opts: ['tremendous','frail','corporate','drowsy'],
        ans: 'B',
        exp: '<span class="exp-key">frail（虛弱的；脆弱的）</span>──受傷的鳥看起來如此虛弱，孩子們不敢碰牠。<br>❌ tremendous = 巨大的；corporate = 企業的；drowsy = 昏昏欲睡，均不符。' },
      { q: 'A loud crash from the kitchen _______ everyone to run and check what happened.',
        opts: ['confined','refused','prompted','hesitated'],
        ans: 'C',
        exp: '<span class="exp-key">prompted（促使）</span>──prompt sb. to do = 促使某人做某事，廚房巨響促使大家跑去查看。<br>❌ confined = 限制；refused = 拒絕；hesitated = 猶豫，均不符句型。' },
      { q: 'The little girl gave her tired father a warm _______ when he came home.',
        opts: ['hug','germ','fright','refusal'],
        ans: 'A',
        exp: '<span class="exp-key">hug（擁抱）</span>──小女孩給疲憊的爸爸一個溫暖的擁抱，與課文主題呼應。<br>❌ germ = 細菌；fright = 驚恐；refusal = 拒絕，均不符語境。' },
      { q: 'Because of his illness, the old man was _______ to his bed for several months.',
        opts: ['employed','confined','prompted','stretched'],
        ans: 'B',
        exp: '<span class="exp-key">confined（被限制；被困）</span>──be confined to = 被限制於某處，課文原句用法 confined to a hospital bed。<br>❌ employed = 雇用；prompted = 促使；stretched = 伸展，均不符。' },
      { q: 'We should never _______ to ask for help when we really need it.',
        opts: ['refuse','hesitate','confine','frighten'],
        ans: 'B',
        exp: '<span class="exp-key">hesitate（猶豫）</span>──never hesitate to do = 絕不猶豫去做，課文原句：told them not to hesitate to call me。<br>❌ refuse = 拒絕；confine = 限制；frighten = 驚嚇，均不搭配此句型。' },
      { q: 'A _______ of joy appeared in the child\'s eyes when she opened her present.',
        opts: ['sparkle','hesitation','refusal','warmth'],
        ans: 'A',
        exp: '<span class="exp-key">sparkle（閃光；閃耀）</span>──a sparkle of joy = 喜悅的光芒，課文原句：A sparkle soon came to his eyes。<br>❌ hesitation = 猶豫；refusal = 拒絕；warmth = 溫暖，均不符語境。' },
    ]
  },
  {
    title: '第二大題：文法選擇',
    pts: '15 題 × 2 分 = 30 分',
    questions: [
      { q: 'This charity program is run _______ a group of dedicated volunteers.',
        opts: ['for','by','with','from'],
        ans: 'B',
        exp: '<span class="exp-key">by</span>──被動語態用 by 引出施事者，be run by = 由⋯經營。<br>❌ for/with/from 均不與被動句的施事搭配。' },
      { q: '_______ the bus was pulling away, she suddenly remembered her bag.',
        opts: ['Before','Although','As','Unless'],
        ans: 'C',
        exp: '<span class="exp-key">As（正當⋯的時候）</span>──as 引導時間副詞子句，表示兩個動作同時發生，課文原句結構：As I was leaving the hospital, I heard a voice。<br>❌ Before = 之前；Although = 雖然；Unless = 除非，均改變語義。' },
      { q: 'Visitors are not permitted _______ food into the museum.',
        opts: ['bring','bringing','to bring','brought'],
        ans: 'C',
        exp: '<span class="exp-key">to bring</span>──be permitted to do = 被允許做某事，permit 後接不定詞 to V。<br>❌ bring（原形）、bringing（動名詞）、brought（過去式）均不符合此搭配句型。' },
      { q: 'Every Halloween, the children dress up _______ their favorite superheroes.',
        opts: ['for','as','like','into'],
        ans: 'B',
        exp: '<span class="exp-key">as（打扮成）</span>──dress up as = 打扮成（某角色），固定片語，課文原句：dress up as Ronald McDonald。<br>❌ for = 為了；like = 像；into = 進入，均不搭配 dress up。' },
      { q: 'The teacher\'s encouraging words _______ the shy student to raise his hand.',
        opts: ['prompted','was prompting','had prompted','would prompt'],
        ans: 'A',
        exp: '<span class="exp-key">prompted（過去式）</span>──敘述過去發生的事，prompt sb. to do = 促使某人做某事。<br>❌ was prompting（強調持續）不必要；had prompted（過去完成）不符時序；would prompt 為假設語氣。' },
      { q: 'Although he was exhausted, he _______ that finishing the race was worth it.',
        opts: ['also feeling','also felt','also feel','was also feeling'],
        ans: 'B',
        exp: '<span class="exp-key">also felt（過去式）</span>──主要子句需要完整謂語動詞，與前句 was exhausted 時態一致，用過去式 felt。<br>❌ also feeling 缺助動詞；also feel 時態不一致；was also feeling 為不必要的進行式。' },
      { q: 'It _______ that the old dog recognized its owner immediately.',

        ans: 'A',
        exp: '<span class="exp-key">seemed（過去式主動）</span>──It seemed that... 為固定句型，seem 不用被動語態。<br>❌ seems = 現在式；is seemed / was seemed 均為錯誤的被動形式。' },
      { q: 'The villagers thanked the firefighters _______ saving their homes.',
        opts: ['about','with','of','for'],
        ans: 'D',
        exp: '<span class="exp-key">for</span>──thank sb. for doing = 感謝某人做了某事，固定介係詞搭配。<br>❌ about/with/of 均不與 thank 搭配。' },
      { q: 'She _______ leave the meeting early when her boss suddenly called her back.',
        opts: ['was about to','was used to','used to','am about to'],
        ans: 'A',
        exp: '<span class="exp-key">was about to（過去的「即將」）</span>──be about to + V = 即將要做，was about to 表示「過去那一刻正要但尚未行動」，課文原句：I was about to refuse again, but then...。<br>❌ was used to / used to = 過去習慣；am about to = 現在即將（時態錯誤）。' },
      { q: 'The boy finally confided his fears _______ his older sister late at night.',
        opts: ['with','about','to','for'],
        ans: 'C',
        exp: '<span class="exp-key">to</span>──confide...to sb. = 向某人傾訴/吐露，固定介係詞為 to，課文原句：He confided his worries to me。<br>❌ with/about/for 均不與 confide 搭配。' },
      { q: 'The manager announced _______ the office would be closed for renovation.',
        opts: ['what','that','which','whether'],
        ans: 'B',
        exp: '<span class="exp-key">that</span>──announced that... = 宣布（某件事），that 引導名詞子句作受詞。<br>❌ what 引導子句需有不完整結構；which = 哪一個；whether = 是否（含疑問），均不符。' },
      { q: 'The trip was tiring and expensive, but _______ all, it was unforgettable.',
        opts: ['for','with','after','at'],
        ans: 'C',
        exp: '<span class="exp-key">after（after all = 畢竟；終究）</span>──固定片語，表示「說到底，歸根結柢」，課文原句：Some things in life, after all, were more important。<br>❌ for all / with all / at all 均非正確用法。' },
      { q: 'The coach told the players not _______ during the final minutes of the game.',
        opts: ['panic','panicking','panicked','to panic'],
        ans: 'D',
        exp: '<span class="exp-key">to panic</span>──tell sb. not to do = 告訴某人不要做某事，not 後接不定詞 to V，課文原句：told them not to hesitate to call me。<br>❌ panic（原形）、panicking（動名詞）、panicked（過去式）均不符此句型。' },
      { q: 'When we arrived, the cat _______ on the windowsill, soaking up the sun.',

    questions: [
      { q: 'For several years, I was _______ as a volunteer clown at a children\'s hospital.',
        opts: ['hired','frightened','confined','refused'],

        exp: '<span class="exp-key">hired（被聘用）</span>──be hired as = 被聘用為（某職位），與課文 be employed by 概念相呼應。<br>❌ frightened = 被嚇到；confined = 被限制；refused = 被拒絕，語境均不符。' },
      { q: 'Every weekend, I would put on a colorful costume and _______ the young patients on the ward.',

// ── RENDER ────────────────────────────────────────────────
let globalQNum = 0;
const qMap = {}; // qNum → { ans, revealed }
const userAnswers = {};
let submitted = false;

const container = document.getElementById('quiz-container');

sections.forEach((sec, si) => {
  const secDiv = document.createElement('div');
  secDiv.className = 'section';
  let html = `<div class="section-header">${sec.title} <span class="pts">（${sec.pts}）</span></div>`;
  if (sec.passage) {
    html += `<div class="passage"><div class="passage-label">📖 閱讀文章</div>${sec.passage}</div>`;
  }
  sec.questions.forEach((q, qi) => {
    globalQNum++;
    const n = globalQNum;
    qMap[n] = { ans: q.ans, exp: q.exp };
    const labels = ['A','B','C','D'];
    let optHtml = '';
    q.opts.forEach((o, i) => {
      optHtml += `<div class="option" id="opt-${n}-${labels[i]}" onclick="choose(${n},'${labels[i]}')">`
        + `<span class="option-label">(${labels[i]})</span>${o}</div>`;
    });
    html += `<div class="question" id="q${n}">
      <div class="q-text"><span class="q-num">${n}.</span> ${q.q}</div>
      <div class="options">${optHtml}</div>
      <div class="explanation" id="exp${n}">
        <div class="exp-header">💡 解析</div>
        <div class="exp-body">${q.exp}</div>
      </div>
    </div>`;
  });
  secDiv.innerHTML = html;
  container.appendChild(secDiv);
});

// ── LOGIC ─────────────────────────────────────────────────
function choose(n, chosen) {
  if (submitted) return;
  userAnswers[n] = chosen;
  const ans = qMap[n].ans;
  const labels = ['A','B','C','D'];

  labels.forEach(l => {
    const el = document.getElementById(`opt-${n}-${l}`);
    el.classList.remove('selected','correct','wrong','reveal-correct');
    if (l === chosen) {
      if (chosen === ans) el.classList.add('correct');
      else el.classList.add('wrong');
    } else if (l === ans && chosen !== ans) {
      el.classList.add('reveal-correct');
    }
  });

  document.getElementById(`exp${n}`).classList.add('show');
  updateTopBar();
}

function updateTopBar() {
  const count = Object.keys(userAnswers).length;
  document.getElementById('answered-count').textContent = count;
  document.getElementById('progress-fill').style.width = (count / 50 * 100) + '%';
  let score = 0;
  for (let q in userAnswers) { if (userAnswers[q] === qMap[q].ans) score += 2; }
  document.getElementById('live-score').textContent = score;
}

function revealAll() {
  for (let n = 1; n <= 50; n++) {
    const ans = qMap[n].ans;
    const labels = ['A','B','C','D'];
    labels.forEach(l => {
      const el = document.getElementById(`opt-${n}-${l}`);
      el.classList.remove('selected','correct','wrong','reveal-correct');
      if (l === ans) el.classList.add('reveal-correct');
      else if (userAnswers[n] === l && l !== ans) el.classList.add('wrong');
    });
    document.getElementById(`exp${n}`).classList.add('show');
  }
  updateTopBar();
}

function submitAll() {
  submitted = true;
  revealAll();
  let score = 0;
  for (let n = 1; n <= 50; n++) {
    if (userAnswers[n] === qMap[n].ans) score += 2;
  }
  const rb = document.getElementById('result-box');
  rb.classList.add('show');
  document.getElementById('result-score').textContent = score;
  const gr = document.getElementById('result-grade');
  const det = document.getElementById('result-detail');
  if (score >= 90) { gr.textContent = '🏆 優秀！'; gr.className = 'result-grade grade-a'; det.textContent = '表現卓越，繼續保持！'; }
  else if (score >= 70) { gr.textContent = '👍 良好'; gr.className = 'result-grade grade-b'; det.textContent = '表現不錯，再複習錯誤的題目吧！'; }
  else { gr.textContent = '📚 需加強'; gr.className = 'result-grade grade-c'; det.textContent = '多複習解析說明，你可以做到的！'; }
  document.getElementById('answered-count').textContent = 50;
  document.getElementById('live-score').textContent = score;
  document.getElementById('progress-fill').style.width = '100%';
  rb.scrollIntoView({ behavior: 'smooth' });
}

function resetAll() {
  submitted = false;
  for (let key in userAnswers) delete userAnswers[key];
  for (let n = 1; n <= 50; n++) {
    const labels = ['A','B','C','D'];
    labels.forEach(l => {
      document.getElementById(`opt-${n}-${l}`).classList.remove('selected','correct','wrong','reveal-correct');
    });
    document.getElementById(`exp${n}`).classList.remove('show');
  }
  document.getElementById('result-box').classList.remove('show');
  document.getElementById('answered-count').textContent = '0';
  document.getElementById('live-score').textContent = '0';
  document.getElementById('progress-fill').style.width = '0%';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
