<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/favicon.svg">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英檢初級 GEPT 初級聽力練習</title>
<style>
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Helvetica Neue","PingFang TC","Microsoft JhengHei",sans-serif;
    color:#22303f;line-height:1.6;background:linear-gradient(180deg,#fff5ec,#fff4f7 70%);min-height:100vh;}
  .wrap{max-width:1000px;margin:0 auto;padding:18px 16px 50px;}
  .home{display:inline-block;margin-bottom:14px;color:#ff6f91;font-weight:800;text-decoration:none;
    background:#fff;padding:7px 16px;border-radius:20px;box-shadow:0 3px 10px rgba(255,111,145,.14);font-size:.9rem;}
  header.hero{background:linear-gradient(135deg,#f6d365,#fda085 60%,#ff7a9c);color:#fff;
    border-radius:22px;padding:30px 26px;margin-bottom:22px;box-shadow:0 10px 26px rgba(253,160,133,.32);}
  header.hero h1{margin:0 0 8px;font-size:1.8rem;text-shadow:0 1px 2px rgba(0,0,0,.12);}
  header.hero p{margin:0;opacity:.96;font-size:.98rem;}
  header.hero .badge{display:inline-block;margin-top:14px;background:rgba(255,255,255,.24);
    padding:8px 14px;border-radius:12px;font-size:.85rem;}
  .notice{background:#fffbeb;border:1.5px solid #f59e0b;border-radius:12px;padding:11px 16px;margin-bottom:18px;
    font-size:.88rem;color:#78350f;display:flex;gap:9px;line-height:1.55;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px;}
  .card{background:#fff;border-radius:18px;overflow:hidden;text-decoration:none;color:inherit;
    box-shadow:0 5px 16px rgba(253,160,133,.14);transition:transform .15s,box-shadow .15s;border:1px solid #f6e6da;}
  .card:hover{transform:translateY(-4px);box-shadow:0 12px 26px rgba(253,160,133,.24);}
  .thumb{position:relative;line-height:0;}
  .thumb svg{width:100%;height:auto;display:block;}
  .cap{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;}
  .hui{font-weight:800;font-size:1.05rem;}
  .go{color:#ff6f91;font-weight:800;font-size:.9rem;}
  footer{text-align:center;color:#9a8577;font-size:.82rem;margin-top:34px;}
</style>
</head>
<body>
<div class="wrap">
  <a class="home" href="gept-hub.html">← 回英檢初級</a>
  <header class="hero">
    <h1>🎧 英檢初級　聽力測驗</h1>
    <p>仿真四大題聽力：看圖辨義 ‧ 問答 ‧ 簡短對話 ‧ 短文聽解，每回 30 題，附語音朗讀，作答後顯示聽力原文與中英解析。</p>
    <span class="badge">目前開放第 1～4 回，更多回次陸續推出</span>
  </header>
  <div class="notice">
    <span>🎧</span>
    <span>每題皆附<strong>語音朗讀音檔</strong>，iPhone、Android 各廠牌手機與電腦瀏覽器皆可播放（請開啟媒體音量）。</span>
  </div>
  <div class="grid" id="grid"></div>
  <footer>EFETL © 2025　‧　GEPT 初級英檢練習</footer>
</div>
<script>
const ROUNDS=[1,2,3,4];
const COLORS=[["#ff9a6c","#ff6f91"],["#4dd0e1","#2b8cff"],["#9b8bff","#b06bff"],["#43cea2","#3ab0d6"],["#f6d365","#fda085"]];
const g=document.getElementById('grid');
ROUNDS.forEach((r,i)=>{
  const c=COLORS[(r-1)%COLORS.length];
  g.insertAdjacentHTML('beforeend',`
  <a class="card" href="gept-listening-${r}.html">
    <div class="thumb"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" width="400" height="260" role="img" aria-label="第${r}回">
      <defs>
        <linearGradient id="lg${r}" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="${c[0]}"/><stop offset="1" stop-color="${c[1]}"/></linearGradient>
        <filter id="ls${r}" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.18"/></filter>
      </defs>
      <rect width="400" height="260" rx="24" fill="url(#lg${r})"/>
      <circle cx="336" cy="52" r="76" fill="#fff" opacity="0.13"/><circle cx="60" cy="220" r="50" fill="#fff" opacity="0.11"/>
      <path d="M118,150 Q118,74 200,74 Q282,74 282,150" fill="none" stroke="#fff" stroke-width="16" stroke-linecap="round" opacity="0.95" filter="url(#ls${r})"/>
      <rect x="92" y="146" width="42" height="66" rx="20" fill="#fff" opacity="0.95" filter="url(#ls${r})"/>
      <rect x="266" y="146" width="42" height="66" rx="20" fill="#fff" opacity="0.95" filter="url(#ls${r})"/>
      <text x="30" y="244" font-family="Helvetica,Arial,'PingFang TC',sans-serif" font-size="34" font-weight="900" fill="#fff" filter="url(#ls${r})">第 ${r} 回</text>
      <text x="252" y="244" font-family="Helvetica,Arial,sans-serif" font-size="18" font-weight="700" fill="#fff" opacity="0.9">Listening</text>
    </svg></div>
    <div class="cap"><div><div class="hui">第 ${r} 回</div><div style="font-size:.82rem;color:#9a8577">4 大題 · 30 題</div></div><span class="go">開始練習 ›</span></div>
  </a>`);
});
</script>
</body>
</html>
