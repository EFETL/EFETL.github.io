<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEPT 初級口說測驗 第十五回</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f9fafb;min-height:100vh}
header{background:#fff;border-bottom:1px solid #e5e7eb;padding:13px 18px;display:flex;align-items:center;gap:10px}
.logo{font-weight:700;font-size:15px;color:#2563eb}
.wrap{max-width:640px;margin:0 auto;padding:28px 16px 60px}
.hero{background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;border-radius:16px;padding:28px 24px;margin-bottom:28px}
.hero h1{font-size:1.5rem;font-weight:800;margin-bottom:6px}
.hero p{font-size:.88rem;opacity:.9}
.set-badge{display:inline-block;background:rgba(255,255,255,.22);font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;margin-bottom:8px}
.grid{display:grid;gap:14px}
.card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 4px 16px rgba(0,0,0,.07);display:flex;align-items:center;gap:16px;text-decoration:none;color:inherit;border:2px solid transparent;transition:all .2s}
.card:hover{border-color:#2563eb;transform:translateY(-2px)}
.card.disabled{opacity:.45;pointer-events:none}
.card-icon{width:54px;height:54px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0}
.card-body h3{font-size:1rem;font-weight:700;margin-bottom:3px}
.card-body p{font-size:.82rem;color:#6b7280}
.arrow{margin-left:auto;color:#9ca3af;font-size:1.2rem}
a{color:inherit}
.back{display:inline-block;margin-bottom:16px;font-size:13px;color:#6b7280;text-decoration:none}
.back:hover{color:#2563eb}
</style>
</head>
<body>
<header><div class="logo">🎙️ GEPT 初級口說</div></header>
<div class="wrap">
  <a class="back" href="speaking.html">← 返回口說測驗</a>
  <div class="hero">
    <div class="set-badge">第 15 回</div>
    <h1>口說測驗</h1>
    <p>Speaking Test — 請依序完成三大題，每題皆可獨立練習。</p>
  </div>
  <div class="grid">
    <a class="card" href="speaking15-p1.html">
      <div class="card-icon" style="background:#dbeafe">🔊</div>
      <div class="card-body">
        <h3>第一大題　複誦</h3>
        <p>共 5 題 · 聽兩次後複誦 · 每題 15 秒</p>
      </div>
      <div class="arrow">›</div>
    </a>
    <div class="card disabled">
      <div class="card-icon" style="background:#ede9fe">📖</div>
      <div class="card-body">
        <h3>第二大題　朗讀句子與短文</h3>
        <p>即將推出</p>
      </div>
      <div class="arrow">›</div>
    </div>
    <div class="card disabled">
      <div class="card-icon" style="background:#dcfce7">💬</div>
      <div class="card-body">
        <h3>第三大題　回答問題</h3>
        <p>即將推出</p>
      </div>
      <div class="arrow">›</div>
    </div>
  </div>
</div>
</body>
</html>
