<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEPT 初級 閱讀測驗　第2回</title>
<style>
  :root{
    --blue:#2b8cff; --blue-dark:#1f6fe0;
    --coral:#ff7a59; --amber:#ffb02e; --pink:#ff5d8f;
    --bg:#f3f9ff; --card:#ffffff; --line:#e3edf9;
    --green:#22b573; --green-bg:#e4f8ef;
    --red:#ff5a5a; --red-bg:#ffecec;
    --gray:#6b7785;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Helvetica Neue","PingFang TC","Microsoft JhengHei",sans-serif;
    background:linear-gradient(180deg,#f0f7ff,#fff7f2 70%);color:#22303f;line-height:1.6;
    -webkit-text-size-adjust:100%;}
  .wrap{max-width:760px;margin:0 auto;padding:16px;}
  header.top{background:linear-gradient(135deg,#5ec6ff,#7d8bff 55%,#b88bff);color:#fff;
    border-radius:18px;padding:24px 22px;margin-bottom:16px;box-shadow:0 8px 22px rgba(93,141,255,.3);}
  header.top h1{margin:0 0 6px;font-size:1.5rem;text-shadow:0 1px 2px rgba(0,0,0,.12);}
  header.top p{margin:0;font-size:.92rem;opacity:.95;}
  .meta{margin-top:14px;font-size:.86rem;background:rgba(255,255,255,.22);
    padding:9px 13px;border-radius:10px;}
  .sticky{position:sticky;top:0;z-index:20;padding:10px 0;
    background:linear-gradient(180deg,#f0f7ff 70%,rgba(240,247,255,0));}
  .bar{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:11px 16px;display:flex;align-items:center;gap:12px;font-size:.9rem;
    box-shadow:0 4px 12px rgba(43,140,255,.1);}
  .bar .track{flex:1;height:9px;background:#e9f1fb;border-radius:6px;overflow:hidden;}
  .bar .fill{height:100%;width:0;border-radius:6px;
    background:linear-gradient(90deg,#3ad1c6,#2b8cff);transition:width .35s;}
  .bar #count{font-weight:700;color:var(--blue-dark);}
  .section-title{color:#fff;font-weight:800;border-radius:12px;
    padding:10px 16px;margin:24px 0 6px;font-size:1.05rem;
    box-shadow:0 4px 12px rgba(0,0,0,.08);}
  .section-title.s0{background:linear-gradient(135deg,#ff9a6c,#ff6f91);}
  .section-title.s1{background:linear-gradient(135deg,#4dd0e1,#2b8cff);}
  .section-title.s2{background:linear-gradient(135deg,#9b8bff,#b06bff);}
  .section-desc{font-size:.86rem;color:var(--gray);margin:0 4px 10px;}
  .passage{background:#fffdf4;border:1px solid #ffe9c9;border-left:5px solid var(--amber);
    border-radius:12px;padding:15px 17px;margin:14px 0;font-size:.95rem;
    box-shadow:0 3px 10px rgba(255,176,46,.08);}
  .passage h3{margin:0 0 8px;color:#e0820a;font-size:1rem;}
  .passage table{border-collapse:collapse;width:100%;margin:8px 0;font-size:.88rem;}
  .passage th,.passage td{border:1px solid #ffe0b0;padding:5px 8px;text-align:left;}
  .passage th{background:#fff2dc;}
  .email-h{font-size:.85rem;color:var(--gray);border-bottom:1px dashed #ffd9a8;
    padding-bottom:6px;margin-bottom:8px;}
  .q{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:15px 17px;margin:12px 0;box-shadow:0 3px 10px rgba(43,140,255,.07);}
  .q .stem{font-weight:600;margin-bottom:10px;}
  .q .stem .num{display:inline-block;color:#fff;background:var(--blue);font-weight:700;
    border-radius:8px;padding:1px 9px;margin-right:8px;font-size:.92rem;}
  .opt{display:flex;align-items:flex-start;gap:10px;border:2px solid var(--line);
    border-radius:11px;padding:10px 13px;margin:8px 0;cursor:pointer;transition:.15s;
    font-size:.95rem;background:#fbfdff;}
  .opt:hover{border-color:var(--blue);background:#eef6ff;}
  .opt input{margin-top:3px;accent-color:var(--blue);}
  .opt .lab{font-weight:800;color:var(--blue);min-width:18px;}
  .opt.sel{border-color:var(--blue);background:#e7f2ff;}
  .opt.correct{border-color:var(--green);background:var(--green-bg);}
  .opt.wrong{border-color:var(--red);background:var(--red-bg);}
  .opt.lock{cursor:default;}
  .exp{display:none;margin-top:11px;border-top:2px dashed #ffe1c2;padding-top:11px;font-size:.9rem;}
  .exp.show{display:block;}
  .exp .tag{display:inline-block;font-weight:800;color:#fff;background:var(--green);
    border-radius:7px;padding:2px 10px;font-size:.8rem;margin-bottom:7px;}
  .exp .tag.miss{background:var(--red);}
  .exp .en{color:#1c4f7a;background:#eef7ff;border-radius:8px;padding:6px 10px;margin:5px 0;}
  .exp .zh{color:#7a4a12;background:#fff7ea;border-radius:8px;padding:6px 10px;margin:5px 0;}
  .actions{position:sticky;bottom:0;padding:14px 0 6px;margin-top:18px;
    background:linear-gradient(transparent,#fff7f2 35%);}
  button.submit{width:100%;color:#fff;border:0;border-radius:14px;padding:16px;
    font-size:1.08rem;font-weight:800;cursor:pointer;
    background:linear-gradient(135deg,#ff8a5b,#ff5d8f);
    box-shadow:0 6px 16px rgba(255,93,143,.35);}
  button.submit:active{transform:translateY(1px);}
  button.reset{width:100%;background:#fff;color:var(--blue);border:2px solid var(--blue);
    border-radius:14px;padding:14px;font-size:1rem;font-weight:800;cursor:pointer;margin-top:10px;display:none;}
  .result{display:none;background:var(--card);border:3px solid transparent;border-radius:16px;
    padding:22px;margin:16px 0;text-align:center;
    background-image:linear-gradient(#fff,#fff),linear-gradient(135deg,#3ad1c6,#2b8cff,#b06bff);
    background-origin:border-box;background-clip:padding-box,border-box;
    box-shadow:0 8px 22px rgba(43,140,255,.15);}
  .result.show{display:block;}
  .result .score{font-size:2.8rem;font-weight:900;
    background:linear-gradient(135deg,#2b8cff,#b06bff);-webkit-background-clip:text;
    background-clip:text;-webkit-text-fill-color:transparent;}
  .result .sub{color:var(--gray);font-size:.95rem;}
  .result .bd{display:flex;justify-content:center;gap:18px;margin-top:12px;flex-wrap:wrap;font-size:.95rem;}
  .result .bd span{font-weight:800;}
  .hint{text-align:center;font-size:.85rem;color:var(--gray);margin-top:9px;min-height:1.2em;}
  footer{text-align:center;color:var(--gray);font-size:.8rem;margin:24px 0;}
</style>
</head>
<body>
<a href="gept.html" style="position:fixed;top:12px;left:12px;background:rgba(255,255,255,.92);color:#2b8cff;padding:7px 15px;border-radius:20px;text-decoration:none;font-size:.85rem;font-weight:800;z-index:999;box-shadow:0 3px 10px rgba(0,0,0,.15);">&#8592; 回題庫</a>
<div class="wrap">
  <header class="top">
    <h1>GEPT 初級　閱讀測驗　<span style="opacity:.9">第2回</span></h1>
    <p>仿真練習卷　&middot;　依官方題型與難度命題</p>
    <div class="meta">共 3 部分、30 題　|　建議作答時間 35 分鐘　|　送出後顯示完整中英文解析與分數</div>
  </header>

  <div class="sticky">
    <div class="bar">
      <span>作答進度</span>
      <div class="track"><div class="fill" id="fill"></div></div>
      <span id="count">0 / 30</span>
    </div>
  </div>

  <form id="quiz"></form>

  <div class="result" id="result">
    <div class="score" id="scoreNum">0</div>
    <div class="sub" id="scoreTxt">分</div>
    <div class="bd">
      <span style="color:var(--green)">答對 <b id="rOk">0</b></span>
      <span style="color:var(--red)">答錯 <b id="rNo">0</b></span>
      <span style="color:var(--gray)">未作答 <b id="rBlank">0</b></span>
    </div>
  </div>

  <div class="actions">
    <button type="button" class="submit" id="submitBtn">送出並查看解析</button>
    <div class="hint" id="hint">尚未作答任何題目</div>
    <button type="button" class="reset" id="resetBtn">重新作答</button>
  </div>

  <footer>GEPT 初級閱讀　仿真練習　&middot;　第二顆腦 / GEPT初級</footer>
</div>

<script>
/* ====== 題庫資料 ====== */
const PARTS = [{"title": "第一部分　詞彙", "desc": "共 10 題，每題有一個空格，請從四個選項中選出最適合題意的字或詞。"}, {"title": "第二部分　段落填空", "desc": "共 8 題，包含二個段落，每格四個選項，請依文意選出最適合的答案。"}, {"title": "第三部分　閱讀理解", "desc": "共 12 題，包含 4 個題組，請依短文內容選出最適合的答案。"}];

const PASSAGES = {"11": "<div class=\"passage\"><h3>Questions 11-14</h3>Water is very important to our health. Doctors say we should drink __(11)__ six to eight glasses of water a day. __(12)__ many students drink soda or juice instead. These drinks have too much sugar, which is __(13)__ for our teeth and body. If you feel tired in class, try drinking a glass of water. It can help you __(14)__ awake and pay attention.</div>", "15": "<div class=\"passage\"><h3>Questions 15-18</h3>Lin Yu-ting started swimming when she was only five years old. At first, she was afraid of the water, __(15)__ her coach helped her step by step. After years of hard practice, she became one of the best swimmers in her school. Last year, she __(16)__ a gold medal in a national contest. Many people think she has a special talent, __(17)__ she always says that practice is more important than talent. She hopes to join the Olympic Games __(18)__ the future.</div>", "19": "<div class=\"passage\"><h3>Questions 19-21</h3><b>Sunshine Library &mdash; Hours &amp; Rules</b><br><b>Open:</b> Tuesday&ndash;Sunday, 9 AM&ndash;8 PM (Closed on Mondays)<br><b>Borrowing:</b> Each person may borrow up to 5 books for 2 weeks.<br><b>Late return:</b> NT$5 per book each day.<br>Please keep quiet and turn your phone to silent mode.</div>", "22": "<div class=\"passage\"><h3>Questions 22-24</h3><b>Happy Kids Summer Camp!</b><br>Fun activities for children aged 7&ndash;12.<br>&bull; July 1&ndash;5, 9 AM&ndash;4 PM<br>&bull; NT$3,000 for five days (lunch included)<br>&bull; Activities: swimming, drawing, science games, and more!<br>&bull; Sign up before June 20 and get a NT$500 discount.<br>&bull; Call 03-888-1234 to join.</div>", "25": "<div class=\"passage\"><h3>Questions 25-27</h3><div class=\"email-h\">From: tomwang@mail.com　|　To: service@bluehotel.com　|　Subject: A lost camera</div>Dear Sir or Madam,<br><br>I stayed in Room 305 of your hotel last weekend. After I got home, I found that I had left my camera in the room. It is black and has my name on the back. The camera is very important to me because it has photos of my family trip. Could you please check if it is still there? If you find it, please call me at 0912-345-678. Thank you very much.<br><br>Best regards,<br>Tom Wang</div>", "28": "<div class=\"passage\"><h3>Questions 28-30</h3>Many animals sleep through the winter. This long sleep is called hibernation. Before winter comes, these animals eat a lot of food to store energy in their bodies. When the weather becomes very cold, they find a warm and safe place to sleep, such as a cave or a hole under the ground. During hibernation, their hearts beat slowly and they do not need to eat. Bears, frogs, and some snakes hibernate in this way. When spring comes and the weather gets warmer, they wake up and look for food again.</div>"};

const Q = [{"n": 1, "p": 0, "stem": "The teacher asked us to __________ the new words ten times for homework.", "o": ["copy", "cut", "throw", "drop"], "a": 0, "en": "\"copy\" = write something again. Writing the words ten times is copying.", "zh": "copy 是「抄寫」。把新單字抄十遍。cut 剪、throw 丟、drop 落下，皆不合。"}, {"n": 2, "p": 0, "stem": "I'm really __________. Could you give me something to eat?", "o": ["thirsty", "sleepy", "hungry", "angry"], "a": 2, "en": "\"hungry\" = wanting food. He asks for something to eat.", "zh": "hungry 是「飢餓的」。想吃東西。thirsty 口渴、sleepy 想睡、angry 生氣，皆不合。"}, {"n": 3, "p": 0, "stem": "Please be __________ when you cross the street. There are many cars.", "o": ["careful", "careless", "lazy", "famous"], "a": 0, "en": "\"careful\" = paying attention to stay safe. Many cars means you must be careful.", "zh": "careful 是「小心的」。過馬路車多要小心。careless 粗心、lazy 懶、famous 有名，皆不合。"}, {"n": 4, "p": 0, "stem": "The movie was so __________ that I fell asleep in the theater.", "o": ["exciting", "boring", "scary", "funny"], "a": 1, "en": "\"boring\" = not interesting. Falling asleep shows the movie was boring.", "zh": "boring 是「無聊的」。電影太無聊讓人睡著。exciting 刺激、scary 恐怖、funny 好笑，與睡著不合。"}, {"n": 5, "p": 0, "stem": "My father __________ a taxi to work because his car broke down.", "o": ["took", "made", "did", "went"], "a": 0, "en": "\"take a taxi\" is a fixed phrase meaning to ride a taxi.", "zh": "take a taxi（搭計程車）為固定搭配，過去式 took。車壞了改搭計程車。make/do/go 不能搭配 taxi。"}, {"n": 6, "p": 0, "stem": "We should __________ off the TV when no one is watching it.", "o": ["turn", "take", "put", "get"], "a": 0, "en": "\"turn off\" = switch off a machine. Turn off the TV to save power.", "zh": "turn off 是「關掉（電器）」。沒人看就把電視關掉。take/put/get off 語意不合。"}, {"n": 7, "p": 0, "stem": "Linda is good __________ math. She always gets high scores.", "o": ["in", "at", "on", "for"], "a": 1, "en": "\"be good at + subject/skill\" = to do something well.", "zh": "be good at + 科目／技能（擅長）。她數學很好。介系詞用 at，不用 in/on/for。"}, {"n": 8, "p": 0, "stem": "The weather is getting __________, so remember to wear a coat.", "o": ["warmer", "colder", "hotter", "brighter"], "a": 1, "en": "You wear a coat when it is cold, so the weather is getting \"colder.\"", "zh": "要穿外套表示天氣「變冷」，用 colder。warmer/hotter 變暖變熱、brighter 變亮，與穿外套不合。"}, {"n": 9, "p": 0, "stem": "I can't find my keys __________. I've looked in every room.", "o": ["somewhere", "anywhere", "everywhere", "nowhere"], "a": 1, "en": "In a negative sentence, use \"anywhere\": can't find them anywhere.", "zh": "否定句用 anywhere：找不到鑰匙。can't ... anywhere（哪裡都找不到）。somewhere 用於肯定句、nowhere 本身即否定不可再加 can't。"}, {"n": 10, "p": 0, "stem": "Don't __________ up! You can finish the race if you keep trying.", "o": ["give", "get", "grow", "go"], "a": 0, "en": "\"give up\" = to stop trying. The speaker encourages not stopping.", "zh": "give up 是「放棄」。別放棄，繼續努力就能完成比賽。get/grow/go up 語意不合。"}, {"n": 11, "p": 1, "stem": "(11)", "o": ["about", "on", "of", "by"], "a": 0, "en": "\"about six to eight glasses\" = approximately that number.", "zh": "about 在這裡是「大約」。大約六到八杯水。on/of/by 不合。"}, {"n": 12, "p": 1, "stem": "(12)", "o": ["So", "However", "Because", "Therefore"], "a": 1, "en": "Doctors advise water, BUT many students drink soda. \"However\" shows contrast.", "zh": "醫生建議喝水，「然而」許多學生卻喝汽水，前後相反用 However。So/Therefore 表結果、Because 表原因。"}, {"n": 13, "p": 1, "stem": "(13)", "o": ["good", "helpful", "bad", "useful"], "a": 2, "en": "Too much sugar is \"bad\" for teeth and body.", "zh": "糖太多對牙齒和身體「不好」，用 bad。good/helpful/useful 皆為正面，與糖過量不合。"}, {"n": 14, "p": 1, "stem": "(14)", "o": ["stay", "stays", "staying", "to staying"], "a": 0, "en": "\"help you + base verb\": help you stay awake.", "zh": "help you 後接原形動詞：help you stay awake（幫你保持清醒）。"}, {"n": 15, "p": 1, "stem": "(15)", "o": ["so", "but", "or", "because"], "a": 1, "en": "She was afraid, BUT the coach helped her. \"but\" shows contrast.", "zh": "她原本怕水「但」教練幫助她，前後相反用 but。so 表結果、or 選擇、because 原因。"}, {"n": 16, "p": 1, "stem": "(16)", "o": ["win", "won", "wins", "winning"], "a": 1, "en": "\"Last year\" signals past tense: won.", "zh": "Last year（去年）為過去時間，動詞用過去式 won。"}, {"n": 17, "p": 1, "stem": "(17)", "o": ["so", "and", "but", "or"], "a": 2, "en": "People think she has talent, BUT she says practice matters more. Contrast = but.", "zh": "人們認為她有天分，「但」她說練習更重要，前後對比用 but。"}, {"n": 18, "p": 1, "stem": "(18)", "o": ["on", "at", "in", "to"], "a": 2, "en": "\"in the future\" is a fixed phrase.", "zh": "in the future（在未來）為固定片語，介系詞用 in。"}, {"n": 19, "p": 2, "stem": "When is the library closed?", "o": ["On Sundays.", "On Mondays.", "At 8 AM.", "On weekends."], "a": 1, "en": "The notice says \"Closed on Mondays.\"", "zh": "公告寫「週一休館」。週二到週日 9 AM–8 PM 有開。"}, {"n": 20, "p": 2, "stem": "How many books can one person borrow?", "o": ["2", "5", "8", "10"], "a": 1, "en": "\"borrow up to 5 books\" — the most is 5.", "zh": "公告寫每人最多可借 5 本書，故為 5。"}, {"n": 21, "p": 2, "stem": "What happens if you return a book late?", "o": ["Nothing happens.", "You pay NT$5 per book each day.", "You cannot borrow again.", "You lose the book."], "a": 1, "en": "\"Late return: NT$5 per book each day.\"", "zh": "逾期歸還每本每天罰 NT$5。其餘選項公告未提及。"}, {"n": 22, "p": 2, "stem": "Who is this camp for?", "o": ["Teachers.", "Parents.", "Children aged 7 to 12.", "Babies."], "a": 2, "en": "\"Fun activities for children aged 7-12.\"", "zh": "夏令營是給 7 到 12 歲的兒童。並非老師、家長或嬰兒。"}, {"n": 23, "p": 2, "stem": "What do you get if you sign up before June 20?", "o": ["Free lunch.", "A free T-shirt.", "A NT$500 discount.", "An extra day."], "a": 2, "en": "\"Sign up before June 20 and get a NT$500 discount.\"", "zh": "6 月 20 日前報名可享 NT$500 折扣。午餐本來就含在費用內。"}, {"n": 24, "p": 2, "stem": "Which is NOT mentioned as an activity?", "o": ["Swimming.", "Drawing.", "Singing.", "Science games."], "a": 2, "en": "Activities listed: swimming, drawing, science games. Singing is not mentioned.", "zh": "廣告列出游泳、繪畫、科學遊戲，未提到唱歌（singing），故選 C。"}, {"n": 25, "p": 2, "stem": "Why did Tom write this email?", "o": ["To book a room.", "To ask about a lost camera.", "To complain about the service.", "To cancel a trip."], "a": 1, "en": "Tom left his camera in the room and asks the hotel to check for it.", "zh": "湯姆把相機忘在房間，寫信請飯店幫忙找。並非訂房、抱怨或取消行程。"}, {"n": 26, "p": 2, "stem": "What does the camera look like?", "o": ["White and new.", "Black with his name on it.", "Small and red.", "Old and broken."], "a": 1, "en": "\"It is black and has my name on the back.\"", "zh": "相機是黑色、背面有他的名字。"}, {"n": 27, "p": 2, "stem": "How can the hotel reach Tom?", "o": ["By email.", "By phone.", "In person.", "By letter."], "a": 1, "en": "\"please call me at 0912-345-678\" — by phone.", "zh": "信中留電話 0912-345-678，請飯店「打電話」聯絡他。"}, {"n": 28, "p": 2, "stem": "What is hibernation?", "o": ["A kind of food.", "A long sleep in winter.", "A warm cave.", "A spring activity."], "a": 1, "en": "\"This long sleep is called hibernation.\"", "zh": "hibernation（冬眠）是動物在冬天的長時間睡眠。"}, {"n": 29, "p": 2, "stem": "Why do these animals eat a lot before winter?", "o": ["To grow bigger.", "To store energy for the long sleep.", "To share with others.", "To stay awake."], "a": 1, "en": "\"they eat a lot of food to store energy in their bodies.\"", "zh": "冬眠前大量進食是為了在體內「儲存能量」以度過長眠。"}, {"n": 30, "p": 2, "stem": "Which animal is NOT mentioned in the passage?", "o": ["Bears.", "Frogs.", "Snakes.", "Rabbits."], "a": 3, "en": "The passage mentions bears, frogs, and snakes — not rabbits.", "zh": "文章提到熊、青蛙、蛇會冬眠，未提到兔子（rabbits），故選 D。"}];
/* ====== 產生畫面 ====== */
const form = document.getElementById('quiz');
let lastPart = -1;
Q.forEach(q=>{
  if(q.p!==lastPart){
    const st=document.createElement('div'); st.className='section-title s'+q.p; st.textContent=PARTS[q.p].title;
    const sd=document.createElement('div'); sd.className='section-desc'; sd.textContent=PARTS[q.p].desc;
    form.appendChild(st); form.appendChild(sd); lastPart=q.p;
  }
  if(PASSAGES[q.n]){ const d=document.createElement('div'); d.innerHTML=PASSAGES[q.n]; form.appendChild(d.firstChild); }
  const card=document.createElement('div'); card.className='q'; card.id='q'+q.n;
  const isBlank=/^\(\d+\)$/.test(q.stem);
  const stemHtml = isBlank ? `第 ${q.n} 格` : q.stem;
  card.innerHTML=`<div class="stem"><span class="num">${q.n}</span>${stemHtml}</div>`;
  q.o.forEach((opt,i)=>{
    const lab=document.createElement('label'); lab.className='opt'; lab.dataset.i=i;
    lab.innerHTML=`<input type="radio" name="q${q.n}" value="${i}"><span class="lab">${'ABCD'[i]}</span><span>${opt}</span>`;
    lab.querySelector('input').addEventListener('change',()=>{
      card.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
      lab.classList.add('sel'); updateProgress();
    });
    card.appendChild(lab);
  });
  const exp=document.createElement('div'); exp.className='exp'; exp.id='exp'+q.n;
  card.appendChild(exp);
  form.appendChild(card);
});

const submitBtn=document.getElementById('submitBtn');
const resetBtn=document.getElementById('resetBtn');
const hint=document.getElementById('hint');

function answeredCount(){ let c=0; Q.forEach(q=>{ if(form.querySelector(`input[name="q${q.n}"]:checked`)) c++; }); return c; }
function updateProgress(){
  const c=answeredCount();
  document.getElementById('count').textContent=`${c} / 30`;
  document.getElementById('fill').style.width=(c/30*100)+'%';
  hint.textContent = c===30 ? '已完成全部 30 題' : (c===0 ? '尚未作答任何題目（仍可送出查看解析）' : `已作答 ${c} 題，未作答 ${30-c} 題（仍可送出）`);
}

submitBtn.addEventListener('click',()=>{
  let ok=0, blank=0;
  Q.forEach(q=>{
    const sel=form.querySelector(`input[name="q${q.n}"]:checked`);
    const pick = sel ? parseInt(sel.value) : null;
    if(pick===null) blank++;
    const card=document.getElementById('q'+q.n);
    card.querySelectorAll('.opt').forEach(o=>{
      o.classList.add('lock');
      o.querySelector('input').disabled=true;
      const i=parseInt(o.dataset.i);
      if(i===q.a) o.classList.add('correct');
      if(pick!==null && i===pick && pick!==q.a) o.classList.add('wrong');
    });
    const correct = pick===q.a; if(correct) ok++;
    const exp=document.getElementById('exp'+q.n);
    const tag = correct ? '答對' : (pick===null ? '未作答' : '答錯');
    exp.innerHTML=`<span class="tag ${correct?'':'miss'}">${tag}　正解：${'ABCD'[q.a]}</span>
      <div class="en"><b>EN</b>&nbsp;${q.en}</div><div class="zh"><b>中</b>&nbsp;${q.zh}</div>`;
    exp.classList.add('show');
  });
  const res=document.getElementById('result');
  document.getElementById('scoreNum').textContent=Math.round(ok/30*100);
  document.getElementById('scoreTxt').textContent=`分（答對 ${ok} / 30 題）`;
  document.getElementById('rOk').textContent=ok;
  document.getElementById('rNo').textContent=30-ok-blank;
  document.getElementById('rBlank').textContent=blank;
  res.classList.add('show');
  submitBtn.style.display='none'; hint.style.display='none'; resetBtn.style.display='block';
  res.scrollIntoView({behavior:'smooth'});
});

resetBtn.addEventListener('click',()=>{
  form.reset();
  Q.forEach(q=>{
    const card=document.getElementById('q'+q.n);
    card.querySelectorAll('.opt').forEach(o=>{o.classList.remove('sel','correct','wrong','lock');o.querySelector('input').disabled=false;});
    document.getElementById('exp'+q.n).classList.remove('show');
  });
  document.getElementById('result').classList.remove('show');
  submitBtn.style.display='block'; hint.style.display='block'; resetBtn.style.display='none';
  updateProgress();
  window.scrollTo({top:0,behavior:'smooth'});
});

updateProgress();
</script>
</body>
</html>
