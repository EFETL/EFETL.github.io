<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>國中 2000 單字 · 記憶闖關 | 2000 Word Quest</title>
<style>
:root{
  --bg:#f6f4ef; --ink:#2b2b33; --muted:#7a7a86; --line:#e7e3da;
  --primary:#2f6f6b; --primary-d:#265a57; --primary-l:#e3efee;
  --accent:#e0803a; --accent-l:#fbeede; --gold:#e6b422;
  --green:#3f9d5a; --green-l:#e6f4ea; --red:#d1544a; --red-l:#fbe7e5;
  --card:#ffffff; --shadow:0 2px 10px rgba(40,40,50,.06),0 6px 24px rgba(40,40,50,.05);
  --radius:18px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
  background:var(--bg); color:var(--ink); line-height:1.55; -webkit-font-smoothing:antialiased;
}
.wrap{max-width:920px;margin:0 auto;padding:18px 16px 90px}
a{color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.hidden{display:none!important}

/* header */
header.top{display:flex;align-items:center;gap:12px;padding:8px 2px 16px}
.brand{display:flex;flex-direction:column}
.brand .en{font-weight:800;font-size:1.28rem;letter-spacing:-.02em;color:var(--primary-d)}
.brand .zh{font-size:.82rem;color:var(--muted);margin-top:-2px}
.spacer{flex:1}
.pill{font-size:.72rem;background:var(--primary-l);color:var(--primary-d);padding:5px 11px;border-radius:999px;font-weight:700}

/* hero intro */
.hero{background:linear-gradient(135deg,#2f6f6b,#3f8f7c);color:#fff;border-radius:var(--radius);padding:22px 22px;box-shadow:var(--shadow);margin-bottom:18px}
.hero h1{margin:0 0 4px;font-size:1.35rem;letter-spacing:-.01em}
.hero p{margin:0;opacity:.92;font-size:.9rem}
.methods{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:16px}
.method{background:rgba(255,255,255,.14);border-radius:12px;padding:10px 8px;text-align:center;font-size:.72rem}
.method b{display:block;font-size:1.25rem;margin-bottom:3px}
@media(max-width:560px){.methods{grid-template-columns:repeat(2,1fr)}}

/* round grid */
.section-title{display:flex;align-items:baseline;gap:8px;margin:6px 2px 12px}
.section-title h2{font-size:1.05rem;margin:0}
.section-title span{font-size:.78rem;color:var(--muted)}
.rounds{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:640px){.rounds{grid-template-columns:repeat(2,1fr)}}
.rc{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 13px;box-shadow:var(--shadow);text-align:left;transition:transform .12s,box-shadow .12s;position:relative;overflow:hidden}
.rc:active{transform:scale(.97)}
.rc .no{font-size:.72rem;color:var(--accent);font-weight:800;letter-spacing:.04em}
.rc .rng{font-size:18px;font-weight:700;margin:3px 0 2px;color:var(--primary-d);word-break:break-all}
.rc .cnt{font-size:.72rem;color:var(--muted)}
.bar{height:6px;background:#eee7db;border-radius:6px;margin-top:10px;overflow:hidden}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--green),#5fbf7d);width:0;transition:width .4s}
.rc .pct{position:absolute;top:11px;right:12px;font-size:.68rem;font-weight:800;color:var(--green)}
.star-badge{position:absolute;bottom:12px;right:12px;font-size:.72rem;color:var(--gold)}

/* round view */
.subhead{display:flex;align-items:center;gap:10px;margin:2px 2px 14px}
.back{font-size:.9rem;font-weight:700;color:var(--primary-d);display:flex;align-items:center;gap:5px;padding:6px 4px}
.subhead h2{font-size:1.1rem;margin:0}
.modes{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:6px}
@media(max-width:560px){.modes{grid-template-columns:repeat(2,1fr)}}
.mode{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 10px;text-align:center;box-shadow:var(--shadow);transition:transform .12s}
.mode:active{transform:scale(.96)}
.mode .ic{font-size:1.7rem}
.mode .t{font-weight:800;font-size:.92rem;margin-top:5px;color:var(--primary-d)}
.mode .d{font-size:.7rem;color:var(--muted);margin-top:2px}
.mode .tag{display:inline-block;margin-top:7px;font-size:.63rem;background:var(--accent-l);color:var(--accent);padding:2px 8px;border-radius:999px;font-weight:700}

/* generic panel */
.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-top:14px}
.rowbtns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn{background:var(--primary);color:#fff;font-weight:700;padding:11px 20px;border-radius:12px;font-size:.92rem;box-shadow:var(--shadow)}
.btn.ghost{background:#fff;color:var(--primary-d);border:1.5px solid var(--primary)}
.btn.sm{padding:8px 14px;font-size:.82rem}
.btn:active{transform:translateY(1px)}

/* flashcard */
.progress-line{text-align:center;font-size:.78rem;color:var(--muted);margin-bottom:8px}
.flash{perspective:1200px;margin:6px auto 16px;max-width:460px}
.flash-inner{position:relative;width:100%;min-height:240px;transition:transform .5s;transform-style:preserve-3d;cursor:pointer}
.flash.flipped .flash-inner{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;border:1px solid var(--line)}
.face.front{background:linear-gradient(160deg,#ffffff,#f3f7f6)}
.face.back{background:linear-gradient(160deg,#fff8ef,#fdeede);transform:rotateY(180deg)}
.word-en{font-size:2.4rem;font-weight:800;letter-spacing:-.02em;color:var(--primary-d);word-break:break-word}
.pos{font-size:.85rem;color:var(--accent);font-weight:700;margin-top:4px;font-style:italic}
.word-zh{font-size:1.9rem;font-weight:800;color:var(--accent)}
.hintflip{font-size:.72rem;color:var(--muted);margin-top:14px}
.speak{margin-top:12px;background:var(--primary-l);color:var(--primary-d);border-radius:999px;width:52px;height:52px;font-size:1.4rem;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow)}
.speak:active{transform:scale(.9)}
.fc-controls{display:flex;align-items:center;justify-content:space-between;gap:10px;max-width:460px;margin:0 auto}
.nav-btn{background:#fff;border:1.5px solid var(--line);border-radius:12px;width:48px;height:48px;font-size:1.3rem;color:var(--primary-d);box-shadow:var(--shadow)}
.mark-row{display:flex;gap:10px;justify-content:center;margin-top:14px}
.mark{border-radius:12px;padding:9px 16px;font-weight:700;font-size:.85rem;border:1.5px solid var(--line);background:#fff}
.mark.know.on{background:var(--green-l);border-color:var(--green);color:var(--green)}
.mark.star.on{background:#fdf6df;border-color:var(--gold);color:#b8860b}

/* quiz */
.q-word{text-align:center;font-size:2rem;font-weight:800;color:var(--primary-d);margin:6px 0 2px;word-break:break-word}
.q-sub{text-align:center;font-size:.8rem;color:var(--muted);margin-bottom:16px}
.opts{display:grid;gap:10px}
.opt{background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:13px 16px;font-size:18px;text-align:left;font-weight:600;transition:.12s}
.opt:active{transform:scale(.99)}
.opt.correct{background:var(--green-l);border-color:var(--green);color:#1f7a3d}
.opt.wrong{background:var(--red-l);border-color:var(--red);color:#b23b32}
.opt.dim{opacity:.5}
.scoreline{display:flex;justify-content:space-between;font-size:.8rem;color:var(--muted);margin-bottom:6px}

/* spell */
.spell-audio{text-align:center;margin:10px 0 18px}
.big-speak{background:var(--primary);color:#fff;border-radius:999px;width:76px;height:76px;font-size:2rem;box-shadow:var(--shadow)}
.big-speak:active{transform:scale(.92)}
.play-btn{display:inline-flex;align-items:center;gap:8px;background:var(--primary);color:#fff;font-weight:800;font-size:1.05rem;padding:13px 26px;border-radius:999px;box-shadow:var(--shadow);letter-spacing:.02em}
.play-btn:active{transform:scale(.95)}
.play-btn .ic{font-size:1.35rem}
.spell-input{width:100%;max-width:360px;display:block;margin:0 auto;font-size:1.3rem;text-align:center;padding:12px;border:2px solid var(--line);border-radius:12px;letter-spacing:.05em;font-weight:700;color:var(--primary-d)}
.spell-input:focus{outline:none;border-color:var(--primary)}
.spell-hint{text-align:center;font-size:1.1rem;letter-spacing:.35em;color:var(--muted);margin:12px 0;font-family:ui-monospace,monospace;min-height:1.4em}
.feedback{text-align:center;font-weight:700;min-height:1.6em;margin-top:10px}
.feedback.ok{color:var(--green)}
.feedback.no{color:var(--red)}

/* match */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mcell{background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:14px 10px;text-align:center;font-weight:700;font-size:18px;min-height:54px;display:flex;align-items:center;justify-content:center;transition:.12s;word-break:break-word}
.mcell.sel{background:var(--primary-l);border-color:var(--primary);color:var(--primary-d)}
.mcell.done{background:var(--green-l);border-color:var(--green);color:var(--green);opacity:.65}
.mcell.err{background:var(--red-l);border-color:var(--red)}
.mcell .en{font-weight:800}

/* result */
.result{text-align:center;padding:20px}
.result .big{font-size:3rem;font-weight:900;color:var(--primary-d)}
.result .emoji{font-size:3.2rem}
.result p{color:var(--muted)}

/* toast */
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#2b2b33;color:#fff;padding:10px 18px;border-radius:999px;font-size:.85rem;opacity:0;transition:.3s;z-index:50;pointer-events:none}
.toast.show{opacity:.95}

footer{text-align:center;color:var(--muted);font-size:.72rem;padding:26px 0 10px}
.count-chip{font-size:.7rem;color:var(--muted);text-align:center;margin-top:4px}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <span class="en">2000 Word Quest</span>
      <span class="zh">國中 2000 單字 · 記憶闖關</span>
    </div>
    <div class="spacer"></div>
    <button class="pill" id="resetBtn" title="清除進度">↺ 重設進度</button>
  </header>

  <!-- HOME -->
  <div id="home">
    <div class="hero">
      <h1>用「記憶科學」背單字 🧠</h1>
      <p>把 <b id="totalWords"></b> 個必考單字切成 <b id="totalRounds"></b> 回，每回用四種遊戲反覆訓練。<br>Learn smarter with spaced repetition, active recall &amp; sound.</p>
      <div class="methods">
        <div class="method"><b>🔁</b>間隔重複<br><small>Spaced</small></div>
        <div class="method"><b>🧩</b>主動回想<br><small>Recall</small></div>
        <div class="method"><b>🔊</b>聽覺記憶<br><small>Audio</small></div>
        <div class="method"><b>🎮</b>遊戲闖關<br><small>Games</small></div>
      </div>
    </div>

    <div class="section-title">
      <h2>選擇回數 Choose a Round</h2>
      <span>綠色進度＝已標記「學會」的比例</span>
    </div>
    <div class="rounds" id="roundGrid"></div>
    <footer>提示：點單字卡上的 🔊 可聽美式發音。所有進度自動存在本機瀏覽器。</footer>
  </div>

  <!-- ROUND MENU -->
  <div id="roundView" class="hidden">
    <div class="subhead">
      <button class="back" onclick="goHome()">‹ 回首頁</button>
      <h2 id="roundTitle"></h2>
    </div>
    <div class="count-chip" id="roundRange"></div>
    <div class="modes" style="margin-top:14px">
      <button class="mode" onclick="startFlash()"><div class="ic">📖</div><div class="t">單字卡</div><div class="d">Flashcards</div><div class="tag">看＋聽＋翻</div></button>
      <button class="mode" onclick="startQuiz()"><div class="ic">🎯</div><div class="t">選擇題</div><div class="d">Quiz</div><div class="tag">中英互測</div></button>
      <button class="mode" onclick="startSpell()"><div class="ic">✍️</div><div class="t">聽寫拼字</div><div class="d">Spelling</div><div class="tag">聽音拼字</div></button>
      <button class="mode" onclick="startMatch()"><div class="ic">🔗</div><div class="t">配對遊戲</div><div class="d">Matching</div><div class="tag">限時連連看</div></button>
      <button class="mode" onclick="startReview()"><div class="ic">⭐</div><div class="t">重點複習</div><div class="d">Review</div><div class="tag">只練星號</div></button>
    </div>
    <div class="panel" style="text-align:center">
      <div style="font-size:.85rem;color:var(--muted)">本回學習進度</div>
      <div class="bar" style="max-width:320px;margin:10px auto"><i id="roundBarFill"></i></div>
      <div id="roundStat" style="font-size:.82rem;color:var(--primary-d);font-weight:700"></div>
    </div>
  </div>

  <!-- GAME AREA -->
  <div id="gameView" class="hidden">
    <div class="subhead">
      <button class="back" onclick="backToRound()">‹ 返回</button>
      <h2 id="gameTitle"></h2>
    </div>
    <div id="gameBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

/* ---------- speech ---------- */
let VOICE=null;
function pickVoice(){
  const vs=speechSynthesis.getVoices();
  VOICE = vs.find(v=>/en-US/i.test(v.lang)&&/female|Samantha|Google US/i.test(v.name))
       || vs.find(v=>/en-US/i.test(v.lang))
       || vs.find(v=>/^en/i.test(v.lang)) || null;
}
if('speechSynthesis' in window){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }
/* iOS/Safari 需要在使用者手勢中先「解鎖」語音，之後 setTimeout 內的朗讀才會有聲音 */
let __voiceUnlocked=false;
function unlockVoice(){
  if(__voiceUnlocked || !('speechSynthesis' in window)) return;
  __voiceUnlocked=true;
  try{ if(!VOICE)pickVoice(); const u=new SpeechSynthesisUtterance(' '); u.volume=0; speechSynthesis.speak(u); }catch(e){}
}
document.addEventListener('pointerdown', unlockVoice, true);
document.addEventListener('touchstart', unlockVoice, {capture:true, passive:true});
document.addEventListener('click', unlockVoice, true);
function speak(text){
  if(!('speechSynthesis' in window))return;
  try{ if(speechSynthesis.paused)speechSynthesis.resume(); }catch(e){}
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-US'; u.rate=.9; if(VOICE)u.voice=VOICE;
  speechSynthesis.speak(u);
}

/* ---------- helpers ---------- */
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1400);}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function roundWords(ri){const r=ROUNDS[ri];const out=[];for(let i=r.s;i<r.e;i++)out.push(i);return out;}
function knowCount(ri){return roundWords(ri).filter(i=>LS.know[i]).length;}
function starCount(ri){return roundWords(ri).filter(i=>LS.star[i]).length;}
const POSZH={n:'名詞',v:'動詞',adj:'形容詞',adv:'副詞',prep:'介系詞',conj:'連接詞',pron:'代名詞',aux:'助動詞',int:'感嘆詞',art:'冠詞'};

let curRound=0;
const $home=document.getElementById('home'),$round=document.getElementById('roundView'),$game=document.getElementById('gameView');
function show(el){[$home,$round,$game].forEach(e=>e.classList.add('hidden'));el.classList.remove('hidden');window.scrollTo(0,0);}

function backToRound(){speechSynthesis&&speechSynthesis.cancel();openRound(curRound);}

function renderHome(){
  const g=document.getElementById('roundGrid');g.innerHTML='';
  ROUNDS.forEach((r,ri)=>{
    const total=r.e-r.s, kn=knowCount(ri), pct=Math.round(kn/total*100), st=starCount(ri);
    const first=WORDS[r.s].w, last=WORDS[r.e-1].w;
    const el=document.createElement('button');el.className='rc';
    el.onclick=()=>openRound(ri);
    el.innerHTML=`<div class="no">回 ${String(ri+1).padStart(2,'0')} · ROUND</div>
      <div class="rng">${first} — ${last}</div>
      <div class="cnt">${total} 字</div>

      ${st>0?`<div class="star-badge">⭐${st}</div>`:''}
      <div class="bar"><i style="width:${pct}%"></i></div>`;
    g.appendChild(el);
  });
}

function openRound(ri){
  curRound=ri;const r=ROUNDS[ri];
  document.getElementById('roundTitle').textContent=`第 ${ri+1} 回 · Round ${ri+1}`;
  document.getElementById('roundRange').textContent=`${WORDS[r.s].w} … ${WORDS[r.e-1].w}　共 ${r.e-r.s} 字`;
  const total=r.e-r.s,kn=knowCount(ri),pct=Math.round(kn/total*100);
  document.getElementById('roundBarFill').style.width=pct+'%';
  document.getElementById('roundStat').textContent=`已學會 ${kn} / ${total} 字（${pct}%）　⭐複習清單 ${starCount(ri)} 字`;
  show($round);
}

function toggleKnow(wi){LS.know[wi]=!LS.know[wi];if(LS.know[wi]){LS.star[wi]=false;}save();document.getElementById('mkKnow').classList.toggle('on',!!LS.know[wi]);document.getElementById('mkStar').classList.toggle('on',!!LS.star[wi]);toast(LS.know[wi]?'已標記學會 ✓':'取消標記');}

/* ================= QUIZ ================= */
let qList=[],qPos=0,qScore=0,qDir=0;
function startQuiz(){
  qList=shuffle(roundWords(curRound));qPos=0;qScore=0;
  document.getElementById('gameTitle').textContent='🎯 選擇題 Quiz';show($game);renderQuiz();
}
function renderQuiz(){
  if(qPos>=qList.length){return quizDone();}
  const wi=qList[qPos],w=WORDS[wi];
  qDir=Math.random()<0.5?0:1; // 0: EN->ZH, 1: ZH->EN
  const poolIdx=shuffle(WORDS.map((_,i)=>i).filter(i=>i!==wi)).slice(0,3);
  const options=shuffle([wi,...poolIdx]);
  const body=document.getElementById('gameBody');
  const promptTxt=qDir===0?w.w:w.zh;
  const sub=qDir===0?`(${w.pos}.) 這個字是什麼意思？`:'下列哪個英文字是這個意思？';
  body.innerHTML=`
    <div class="panel">
      <div class="scoreline"><span>第 ${qPos+1} / ${qList.length} 題</span><span>得分 ${qScore}</span></div>
      <div class="q-word">${promptTxt} ${qDir===0?`<button class="speak" style="width:38px;height:38px;font-size:1rem;display:inline-flex;vertical-align:middle" onclick="speak('${w.w.replace(/'/g,"\\'")}')">🔊</button>`:''}</div>
      <div class="q-sub">${sub}</div>
      <div class="opts" id="opts"></div>
    </div>`;
  const opts=document.getElementById('opts');
  options.forEach(oi=>{
    const b=document.createElement('button');b.className='opt';
    b.textContent=qDir===0?WORDS[oi].zh:WORDS[oi].w;
    b.onclick=()=>answerQuiz(b,oi,wi,w);
    opts.appendChild(b);
  });
  if(qDir===0)setTimeout(()=>speak(w.w),150);
}
function answerQuiz(btn,chosen,correct,w){
  const all=[...document.querySelectorAll('.opt')];all.forEach(o=>o.onclick=null);
  if(chosen===correct){btn.classList.add('correct');qScore++;LS.know[correct]=true;save();speak(w.w);}
  else{
    btn.classList.add('wrong');LS.star[correct]=true;save();
    all.forEach(o=>{if((qDir===0?o.textContent===WORDS[correct].zh:o.textContent===WORDS[correct].w))o.classList.add('correct');});
    all.forEach(o=>{if(!o.classList.contains('correct')&&o!==btn)o.classList.add('dim');});
  }
  setTimeout(()=>{qPos++;renderQuiz();},chosen===correct?750:1500);
}
function quizDone(){
  const pct=Math.round(qScore/qList.length*100);
  const emo=pct>=90?'🏆':pct>=70?'😃':pct>=50?'💪':'📚';
  document.getElementById('gameBody').innerHTML=`<div class="panel result">
    <div class="emoji">${emo}</div>
    <div class="big">${qScore}<span style="font-size:1.2rem;color:var(--muted)"> / ${qList.length}</span></div>
    <p>答對率 ${pct}%${pct>=90?'，超強！':pct>=50?'，繼續加油！':'，多練幾次一定進步！'}</p>
    <div class="rowbtns"><button class="btn" onclick="startQuiz()">再測一次</button>
    <button class="btn ghost" onclick="backToRound()">返回本回</button></div></div>`;
}

let spList=[],spPos=0,spScore=0,spReveal=0;
function startSpell(){
  spList=shuffle(roundWords(curRound));spPos=0;spScore=0;
  document.getElementById('gameTitle').textContent='✍️ 聽寫拼字 Spelling';show($game);renderSpell();
}
function renderSpell(){
  if(spPos>=spList.length)return spellDone();
  const wi=spList[spPos],w=WORDS[wi];spReveal=0;
  document.getElementById('gameBody').innerHTML=`
   <div class="panel">
    <div class="scoreline"><span>第 ${spPos+1} / ${spList.length} 題</span><span>得分 ${spScore}</span></div>
    <div class="q-sub">聽發音，拼出這個英文單字（提示：${w.zh}）</div>
    <div class="spell-audio"><button class="play-btn" onclick="speak('${w.w.replace(/'/g,"\\'")}')"><span class="ic">🔊</span>播放發音 Play</button>
    <div style="font-size:.72rem;color:var(--muted);margin-top:8px">點按鈕即可聽發音，可重複點</div></div>
    <input class="spell-input" id="spIn" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="type here…">
    <div class="spell-hint" id="spHint"></div>
    <div class="feedback" id="spFb"></div>
    <div class="rowbtns">
      <button class="btn ghost sm" onclick="spellHint()">💡 提示（頭尾）</button>
      <button class="btn sm" onclick="checkSpell()">確認 Check</button>
      <button class="btn ghost sm" onclick="skipSpell()">跳過 ▸</button>
    </div>
   </div>`;
  const inp=document.getElementById('spIn');
  const isTouch=('ontouchstart' in window)||navigator.maxTouchPoints>0;
  if(!isTouch)inp.focus(); // 手機不自動搶 focus，避免鍵盤彈出干擾播放
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')checkSpell();});
  speak(w.w);                       // 同步在手勢內朗讀（iOS 解鎖後每題都能自動出聲）
}
function spellHint(){
  const w=WORDS[spList[spPos]].w;spReveal=1; // 只給頭尾，中間留空；再按也一樣，拿不到完整答案
  let s='';for(let i=0;i<w.length;i++)s+=(i===0||i===w.length-1)?w[i]:'_';
  document.getElementById('spHint').textContent=s.split('').join(' ');
}
function checkSpell(){
  const wi=spList[spPos],w=WORDS[wi];
  const val=(document.getElementById('spIn').value||'').trim().toLowerCase();
  const fb=document.getElementById('spFb');
  if(val===w.w.toLowerCase()){
    fb.textContent='✓ 正確！ '+w.w;fb.className='feedback ok';
    if(spReveal===0)spScore++;LS.know[wi]=true;save();speak(w.w);
    setTimeout(()=>{spPos++;renderSpell();},900);
  }else{
    fb.textContent='✗ 正確答案：'+w.w;fb.className='feedback no';
    LS.star[wi]=true;save();speak(w.w);
    setTimeout(()=>{spPos++;renderSpell();},1600);
  }
}
function skipSpell(){const wi=spList[spPos];LS.star[wi]=true;save();spPos++;renderSpell();}
function spellDone(){
  document.getElementById('gameBody').innerHTML=`<div class="panel result">
    <div class="emoji">✍️🎉</div>
    <div class="big">${spScore}<span style="font-size:1.2rem;color:var(--muted)"> / ${spList.length}</span></div>
    <p>一次就拼對 ${spScore} 個！拼字是最扎實的記憶。</p>
    <div class="rowbtns"><button class="btn" onclick="startSpell()">再練一次</button>
    <button class="btn ghost" onclick="backToRound()">返回本回</button></div></div>`;
}

/* ================= MATCHING ================= */
let mPairs=[],mSel=null,mDone=0,mStart=0,mTimer=null,mQueue=[],mRound=0;
function startMatch(){
  mQueue=shuffle(roundWords(curRound));mRound=0;mStart=Date.now();
  document.getElementById('gameTitle').textContent='🔗 配對遊戲 Matching';show($game);
  clearInterval(mTimer);mTimer=setInterval(updateMTimer,500);
  renderMatch();
}
function renderMatch(){
  const batch=mQueue.slice(mRound*6,mRound*6+6);
  if(batch.length===0)return matchDone();
  const leftEmpty=false;
  const lefts=batch.map(i=>({i,txt:WORDS[i].w,type:'en'}));
  const rights=shuffle(batch.map(i=>({i,txt:WORDS[i].zh,type:'zh'})));
  mSel=null;mDone=0;
  const body=document.getElementById('gameBody');
  body.innerHTML=`<div class="panel">
    <div class="scoreline"><span>第 ${mRound+1} 組 / ${Math.ceil(mQueue.length/6)}　配對英文↔中文</span><span id="mTime">0s</span></div>
    <div class="match-grid" id="mgrid"></div>
   </div>`;
  const grid=document.getElementById('mgrid');
  // interleave columns: build combined rows
  const rows=Math.max(lefts.length,rights.length);
  for(let r=0;r<rows;r++){
    if(lefts[r]){grid.appendChild(mkCell(lefts[r]));}else{const e=document.createElement('div');grid.appendChild(e);}
    if(rights[r]){grid.appendChild(mkCell(rights[r]));}else{const e=document.createElement('div');grid.appendChild(e);}
  }
}
function mkCell(item){
  const c=document.createElement('button');c.className='mcell';
  c.innerHTML=item.type==='en'?`<span class="en">${item.txt}</span>`:item.txt;
  c.dataset.i=item.i;c.dataset.type=item.type;
  c.onclick=()=>clickCell(c);
  return c;
}
function clickCell(c){
  if(c.classList.contains('done'))return;
  if(c.dataset.type==='en')speak(WORDS[+c.dataset.i].w);
  if(!mSel){mSel=c;c.classList.add('sel');return;}
  if(mSel===c){c.classList.remove('sel');mSel=null;return;}
  if(mSel.dataset.type===c.dataset.type){mSel.classList.remove('sel');mSel=c;c.classList.add('sel');return;}
  // check match
  if(mSel.dataset.i===c.dataset.i){
    mSel.classList.remove('sel');mSel.classList.add('done');c.classList.add('done');
    LS.know[+c.dataset.i]=true;save();mSel=null;mDone++;
    if(mDone*2>=document.querySelectorAll('#mgrid .mcell').length){
      setTimeout(()=>{mRound++;renderMatch();},500);
    }
  }else{
    const a=mSel,b=c;a.classList.add('err');b.classList.add('err');a.classList.remove('sel');
    LS.star[+a.dataset.i]=true;LS.star[+b.dataset.i]=true;save();
    setTimeout(()=>{a.classList.remove('err');b.classList.remove('err');},500);
    mSel=null;
  }
}
function updateMTimer(){const el=document.getElementById('mTime');if(el)el.textContent=Math.floor((Date.now()-mStart)/1000)+'s';}
function matchDone(){
  clearInterval(mTimer);const secs=Math.floor((Date.now()-mStart)/1000);
  document.getElementById('gameBody').innerHTML=`<div class="panel result">
    <div class="emoji">🔗🏁</div><h3>全部配對完成！</h3>
    <p>總共花了 <b>${secs}</b> 秒，挑戰更快一次吧！</p>
    <div class="rowbtns"><button class="btn" onclick="startMatch()">再玩一次</button>
    <button class="btn ghost" onclick="backToRound()">返回本回</button></div></div>`;
}

/* ---------- reset ---------- */
document.getElementById('resetBtn').onclick=()=>{
  if(confirm('確定要清除所有學習進度嗎？此動作無法復原。')){
    LS.know={};LS.star={};save();renderHome();toast('已清除所有進度');
  }
};

/* init */
renderHome();
</script>
