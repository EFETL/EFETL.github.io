<script>
// ── DATA ──────────────────────────────────────────────────
const sections = [
  {
    title: '第一大題：字彙選擇',
    pts: '15 題 × 2 分 = 30 分',
    questions: [
      { q: 'The hotel chain _______ thousands of staff members across the country.',
        opts: ['hesitates','employs','confines','refuses'],
        ans: 'B',
        exp: '<span class="exp-key">employs（雇用）</span>──連鎖飯店在全國雇用數千名員工。<br>❌ hesitates = 猶豫；confines = 限制；refuses = 拒絕，均不符語境。' },
      { q: 'The startup quickly grew into a massive _______ with branches worldwide.',
        opts: ['corporation','employment','hesitation','refusal'],
        ans: 'A',
        exp: '<span class="exp-key">corporation（企業；股份有限公司）</span>──新創公司迅速成長為在全球設有分支的大型企業。<br>❌ employment = 就業；hesitation = 猶豫；refusal = 拒絕，均不適用。' },
      { q: 'The nurse worked hard to _______ the frightened children before their surgery.',
        opts: ['turn down','pass away','cheer up','confine'],
        ans: 'C',
        exp: '<span class="exp-key">cheer up（使振作；使高興）</span>──護士努力讓害怕的孩子們在手術前振作起來。<br>❌ turn down = 拒絕；pass away = 去世；confine = 限制，均不符語境。' },
      { q: 'The patient\'s condition was described as _______, meaning recovery was unlikely.',
        opts: ['drowsy','terminal','corporate','frail'],
        ans: 'B',
        exp: '<span class="exp-key">terminal（末期的；致命的）</span>──terminal condition = 末期病況，意味著康復機會不大，課文核心詞彙。<br>❌ drowsy = 昏昏欲睡；corporate = 企業的；frail = 虛弱的，均不符。' },
      { q: 'After staying up all night, he felt _______ during his morning class.',
        opts: ['tremendous','corporate','drowsy','frail'],
        ans: 'C',
        exp: '<span class="exp-key">drowsy（昏昏欲睡的）</span>──熬夜後在早上的課堂上感到昏昏欲睡，語境吻合。<br>❌ tremendous = 巨大的；corporate = 企業的；frail = 虛弱的，均不符。' },
      { q: 'The children\'s _______ echoed through the playground on the sunny afternoon.',
        opts: ['refusal','laughter','fright','germ'],
        ans: 'B',
        exp: '<span class="exp-key">laughter（笑聲）</span>──孩子們的笑聲在操場上迴盪，呼應課文 laughter 一詞。<br>❌ refusal = 拒絕；fright = 驚恐；germ = 細菌，均不符。' },
      { q: 'Sharing cups and utensils can easily _______ germs from one person to another.',
        opts: ['cheer up','turn down','pass on','make a difference'],
        ans: 'C',
        exp: '<span class="exp-key">pass on...to...（傳遞…給…）</span>──共用餐具容易把病菌從一人傳給另一人，課文原句用法。<br>❌ cheer up = 使振作；turn down = 拒絕；make a difference = 有影響，均不搭配 germs。' },
      { q: 'The grandmother\'s gentle _______ made everyone in the room feel safe and loved.',
        opts: ['warmth','fright','refusal','hesitation'],
        ans: 'A',
        exp: '<span class="exp-key">warmth（溫暖）</span>──奶奶溫柔的溫暖讓房裡的人都感到安全與被愛，呼應課文 warmth 一詞。<br>❌ fright = 驚恐；refusal = 拒絕；hesitation = 猶豫，均不符。' },
      { q: 'The puppy _______ its legs and yawned before falling back asleep.',
        opts: ['confined','frightened','stretched','sparkled'],
        ans: 'C',
        exp: '<span class="exp-key">stretched（伸展；伸出）</span>──小狗伸展四肢、打哈欠，stretch 為「伸展」之意，課文原句 stretched out his tiny arms。<br>❌ confined = 限制；frightened = 驚嚇；sparkled = 閃耀，均不符。' },
      { q: 'After weeks in the hospital, the patient looked pale and _______.',
        opts: ['tremendous','frail','corporate','drowsy'],
        ans: 'B',
        exp: '<span class="exp-key">frail（虛弱的；脆弱的）</span>──住院數週後病人看起來蒼白虛弱，課文原句：looking extremely weak and pale。<br>❌ tremendous = 巨大的；corporate = 企業的；drowsy = 昏昏欲睡，均不符。' },
      { q: 'The fire alarm _______ everyone in the building to leave immediately.',
        opts: ['confined','refused','prompted','hesitated'],
        ans: 'C',
        exp: '<span class="exp-key">prompted（促使）</span>──prompt sb. to do = 促使某人做某事，火災警報促使大家立刻離開大樓。<br>❌ confined = 限制；refused = 拒絕；hesitated = 猶豫，均不符句型。' },
      { q: 'The child ran to her father and gave him a tight _______ at the airport.',
        opts: ['hug','germ','fright','refusal'],
        ans: 'A',
        exp: '<span class="exp-key">hug（擁抱）</span>──小孩跑向爸爸並給他一個緊緊的擁抱，與課文主題呼應。<br>❌ germ = 細菌；fright = 驚恐；refusal = 拒絕，均不符語境。' },
      { q: 'The elderly man was _______ to a wheelchair after his accident.',
        opts: ['employed','confined','prompted','stretched'],
        ans: 'B',
        exp: '<span class="exp-key">confined（被限制；被困）</span>──be confined to = 被限制於某處（輪椅），課文原句用法 confined to a hospital bed。<br>❌ employed = 雇用；prompted = 促使；stretched = 伸展，均不符。' },
      { q: 'If you have any questions, please don\'t _______ to contact our office.',
        opts: ['refuse','hesitate','confine','frighten'],
        ans: 'B',
        exp: '<span class="exp-key">hesitate（猶豫）</span>──don\'t hesitate to do = 別猶豫去做，課文原句：told them not to hesitate to call me。<br>❌ refuse = 拒絕；confine = 限制；frighten = 驚嚇，均不搭配此句型。' },
      { q: 'There was a _______ of mischief in the boy\'s eyes as he planned his prank.',
        opts: ['sparkle','hesitation','refusal','warmth'],
        ans: 'A',
        exp: '<span class="exp-key">sparkle（閃光；閃耀）</span>──a sparkle of mischief = 調皮的光芒，課文原句：A sparkle soon came to his eyes。<br>❌ hesitation = 猶豫；refusal = 拒絕；warmth = 溫暖，均不符語境。' },
    ]
  },
  {
    title: '第二大題：文法選擇',
    pts: '15 題 × 2 分 = 30 分',
    questions: [
      { q: 'The new community center was built _______ donations from local residents.',
        opts: ['for','with','by','from'],
        ans: 'B',
        exp: '<span class="exp-key">with</span>──built with donations = 用捐款建造，with 表示「藉由、使用」的方式。<br>❌ by 用於引出動作的施事者；for/from 均不搭配此語境。' },
      { q: '_______ the storm was approaching, the fishermen hurried back to shore.',
        opts: ['Before','After','As','Although'],
        ans: 'C',
        exp: '<span class="exp-key">As（正當⋯的時候）</span>──as 引導時間副詞子句，表示兩個動作同時發生，課文原句結構：As I was leaving the hospital, I heard a voice。<br>❌ Before = 之前；After = 之後；Although = 雖然，均改變語義。' },
      { q: 'Employees are not permitted _______ personal calls during work hours.',
        opts: ['make','making','to make','made'],
        ans: 'C',
        exp: '<span class="exp-key">to make</span>──be permitted to do = 被允許做某事，permit 後接不定詞 to V，課文原句：I wasn\'t permitted to have any physical contact。<br>❌ make（原形）、making（動名詞）、made（過去式）均不符合此搭配句型。' },
      { q: 'For the costume party, my brother dressed up _______ a pirate.',
        opts: ['for','like','as','into'],
        ans: 'C',
        exp: '<span class="exp-key">as（打扮成）</span>──dress up as = 打扮成（某角色），固定片語，課文原句：dress up as Ronald McDonald。<br>❌ for = 為了；like = 像；into = 進入，均不搭配 dress up。' },
      { q: 'The sudden silence _______ the audience to look toward the stage.',
        opts: ['prompted','was prompting','had prompted','would prompt'],
        ans: 'A',
        exp: '<span class="exp-key">prompted（過去式）</span>──敘述過去發生的事，prompt sb. to do = 促使某人做某事，課文原句：The voice...prompted me to push open the door。<br>❌ was prompting（強調持續）不必要；had prompted（過去完成）不符時序；would prompt 為假設語氣。' },
      { q: 'Even though she was nervous, she _______ that she had to give the speech.',
        opts: ['also feeling','also felt','also feel','was also feeling'],
        ans: 'B',
        exp: '<span class="exp-key">also felt（過去式）</span>──主要子句需要完整謂語動詞，與前句 was nervous 時態一致，用過去式 felt，課文原句：Though I understood..., I also felt that...。<br>❌ also feeling 缺助動詞；also feel 時態不一致；was also feeling 為不必要的進行式。' },
      { q: 'It _______ that the lost dog remembered the way back home.',
        opts: ['seemed','seems','is seemed','was seemed'],
        ans: 'A',
        exp: '<span class="exp-key">seemed（過去式主動）</span>──It seemed that... 為固定句型，seem 不用被動語態，課文原句：It seemed that Billy knew he would never be going home。<br>❌ seems = 現在式；is seemed / was seemed 均為錯誤的被動形式。' },
      { q: 'The villagers thanked the firefighters _______ saving their homes.',

        ans: 'D',
        exp: '<span class="exp-key">for</span>──thank sb. for doing = 感謝某人做了某事，固定介係詞搭配，課文原句：thank me for making a difference。<br>❌ about/with/of 均不與 thank 搭配。' },
      { q: 'He _______ close the shop when a group of customers rushed in.',

        ans: 'A',
        exp: '<span class="exp-key">was about to（過去的「即將」）</span>──be about to + V = 即將要做，was about to 表示「過去那一刻正要但尚未行動」，課文原句：I was about to refuse again, but then...。<br>❌ was used to / used to = 過去習慣；am about to = 現在即將（時態錯誤）。' },
      { q: 'The frightened boy finally confided everything _______ the police officer.',
        opts: ['with','about','to','for'],
        ans: 'C',
        exp: '<span class="exp-key">to</span>──confide...to sb. = 向某人傾訴/吐露，固定介係詞為 to，課文原句：He confided his worries to me。<br>❌ with/about/for 均不與 confide 搭配。' },
      { q: 'The pilot announced _______ the flight would be delayed by two hours.',
        opts: ['what','that','which','whether'],
        ans: 'B',
        exp: '<span class="exp-key">that</span>──announced that... = 宣布（某件事），that 引導名詞子句作受詞，課文原句結構：He told his mom that he had hugged Ronald。<br>❌ what 引導子句需有不完整結構；which = 哪一個；whether = 是否（含疑問），均不符。' },
      { q: 'The journey was long and difficult, but _______ all, it changed his life.',
        opts: ['for','with','after','at'],
        ans: 'C',
        exp: '<span class="exp-key">after（after all = 畢竟；終究）</span>──固定片語，表示「說到底，歸根結柢」，課文原句：Some things in life, after all, were more important。<br>❌ for all / with all / at all 均非正確用法。' },
      { q: 'The teacher told the students not _______ during the fire drill.',

        ans: 'D',
        exp: '<span class="exp-key">to run</span>──tell sb. not to do = 告訴某人不要做某事，not 後接不定詞 to V，課文原句：told them not to hesitate to call me。<br>❌ run（原形）、running（動名詞）、ran（過去式）均不符此句型。' },
      { q: 'When the rescue team arrived, the climber _______ on the narrow ledge, too scared to move.',

  {

    pts: '10 題 × 2 分 = 20 分',
    passage: 'When I was in college, I was <strong>(31)</strong> part-time at a local animal shelter. Every Saturday, I would put on my volunteer shirt and <strong>(32)</strong> the dogs and cats waiting for new homes. Many of the animals were suffering <strong>(33)</strong> injuries or illnesses, so the staff and I tried our best to make them comfortable. I found it <strong>(34)</strong> rewarding to watch a frightened animal slowly learn to trust people again.<br><br>One of the shelter\'s rules was that volunteers should limit physical <strong>(35)</strong> with newly arrived animals until they had been checked by a vet. However, I always believed that nothing could <strong>(36)</strong> safety and comfort like a calm, gentle touch.<br><br>One evening, I heard a <strong>(37)</strong> whimper coming from the back of the shelter. I found a small dog <strong>(38)</strong> to a corner of its cage, shaking and refusing to eat. I sat quietly nearby and spoke softly to it. After a while, the dog slowly came closer. I almost <strong>(39)</strong> down the urge to reach out, remembering the rule. But when the dog gently rested its head on my hand, I <strong>(40)</strong> that sometimes comfort matters more than caution.',
    questions: [
      { q: 'When I was in college, I was _______ part-time at a local animal shelter.',

// ── RENDER ────────────────────────────────────────────────
let globalQNum = 0;
const qMap = {}; // qNum → { ans, revealed }
const userAnswers = {};
let submitted = false;

const container = document.getElementById('quiz-container');

sections.forEach((sec, si) => {
  const secDiv = document.createElement('div');
  secDiv.className = 'section';
  let html = `<div class="section-header">${sec.title} <span class="pts">（${sec.pts}）</span></div>`;
  if (sec.passage) {
    html += `<div class="passage"><div class="passage-label">📖 閱讀文章</div>${sec.passage}</div>`;
  }
  sec.questions.forEach((q, qi) => {
    globalQNum++;
    const n = globalQNum;
    qMap[n] = { ans: q.ans, exp: q.exp };
    const labels = ['A','B','C','D'];
    let optHtml = '';
    q.opts.forEach((o, i) => {
      optHtml += `<div class="option" id="opt-${n}-${labels[i]}" onclick="choose(${n},'${labels[i]}')">`
        + `<span class="option-label">(${labels[i]})</span>${o}</div>`;
    });
    html += `<div class="question" id="q${n}">
      <div class="q-text"><span class="q-num">${n}.</span> ${q.q}</div>
      <div class="options">${optHtml}</div>
      <div class="explanation" id="exp${n}">
        <div class="exp-header">💡 解析</div>
        <div class="exp-body">${q.exp}</div>
      </div>
    </div>`;
  });
  secDiv.innerHTML = html;
  container.appendChild(secDiv);
});

// ── LOGIC ─────────────────────────────────────────────────
function choose(n, chosen) {
  if (submitted) return;
  userAnswers[n] = chosen;
  const ans = qMap[n].ans;
  const labels = ['A','B','C','D'];

  labels.forEach(l => {
    const el = document.getElementById(`opt-${n}-${l}`);
    el.classList.remove('selected','correct','wrong','reveal-correct');
    if (l === chosen) {
      if (chosen === ans) el.classList.add('correct');
      else el.classList.add('wrong');
    } else if (l === ans && chosen !== ans) {
      el.classList.add('reveal-correct');
    }
  });

  document.getElementById(`exp${n}`).classList.add('show');
  updateTopBar();
}

function updateTopBar() {
  const count = Object.keys(userAnswers).length;
  document.getElementById('answered-count').textContent = count;
  document.getElementById('progress-fill').style.width = (count / 50 * 100) + '%';
  let score = 0;
  for (let q in userAnswers) { if (userAnswers[q] === qMap[q].ans) score += 2; }
  document.getElementById('live-score').textContent = score;
}

function revealAll() {
  for (let n = 1; n <= 50; n++) {
    const ans = qMap[n].ans;
    const labels = ['A','B','C','D'];
    labels.forEach(l => {
      const el = document.getElementById(`opt-${n}-${l}`);
      el.classList.remove('selected','correct','wrong','reveal-correct');
      if (l === ans) el.classList.add('reveal-correct');
      else if (userAnswers[n] === l && l !== ans) el.classList.add('wrong');
    });
    document.getElementById(`exp${n}`).classList.add('show');
  }
  updateTopBar();
}

function submitAll() {
  submitted = true;
  revealAll();
  let score = 0;
  for (let n = 1; n <= 50; n++) {
    if (userAnswers[n] === qMap[n].ans) score += 2;
  }
  const rb = document.getElementById('result-box');
  rb.classList.add('show');
  document.getElementById('result-score').textContent = score;
  const gr = document.getElementById('result-grade');
  const det = document.getElementById('result-detail');
  if (score >= 90) { gr.textContent = '🏆 優秀！'; gr.className = 'result-grade grade-a'; det.textContent = '表現卓越，繼續保持！'; }
  else if (score >= 70) { gr.textContent = '👍 良好'; gr.className = 'result-grade grade-b'; det.textContent = '表現不錯，再複習錯誤的題目吧！'; }
  else { gr.textContent = '📚 需加強'; gr.className = 'result-grade grade-c'; det.textContent = '多複習解析說明，你可以做到的！'; }
  document.getElementById('answered-count').textContent = 50;
  document.getElementById('live-score').textContent = score;
  document.getElementById('progress-fill').style.width = '100%';
  rb.scrollIntoView({ behavior: 'smooth' });
}

function resetAll() {
  submitted = false;
  for (let key in userAnswers) delete userAnswers[key];
  for (let n = 1; n <= 50; n++) {
    const labels = ['A','B','C','D'];
    labels.forEach(l => {
      document.getElementById(`opt-${n}-${l}`).classList.remove('selected','correct','wrong','reveal-correct');
    });
    document.getElementById(`exp${n}`).classList.remove('show');
  }
  document.getElementById('result-box').classList.remove('show');
  document.getElementById('answered-count').textContent = '0';
  document.getElementById('live-score').textContent = '0';
  document.getElementById('progress-fill').style.width = '0%';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
