<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>統測英文 模擬考卷練習</title>
<style>
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Helvetica Neue","PingFang TC","Microsoft JhengHei",sans-serif;
    color:#22303f;line-height:1.6;background:linear-gradient(180deg,#eef6ff,#fff4f7 70%);min-height:100vh;font-size:16px;}
  .wrap{max-width:1000px;margin:0 auto;padding:18px 16px 50px;}
  .home{display:inline-block;margin-bottom:14px;color:#2b8cff;font-weight:800;text-decoration:none;
    background:#fff;padding:7px 16px;border-radius:20px;box-shadow:0 3px 10px rgba(43,140,255,.12);font-size:.9rem;}
  header.hero{background:linear-gradient(135deg,#5ec6ff,#7d8bff 55%,#b06bff);color:#fff;
    border-radius:22px;padding:30px 26px;margin-bottom:22px;box-shadow:0 10px 26px rgba(125,139,255,.32);}
  header.hero h1{margin:0 0 8px;font-size:1.8rem;text-shadow:0 1px 2px rgba(0,0,0,.12);}
  header.hero p{margin:0;opacity:.95;font-size:.98rem;}
  header.hero .badge{display:inline-block;margin-top:14px;background:rgba(255,255,255,.22);
    padding:8px 14px;border-radius:12px;font-size:.85rem;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px;}
  .card{background:#fff;border-radius:18px;overflow:hidden;text-decoration:none;color:inherit;
    box-shadow:0 5px 16px rgba(43,140,255,.12);transition:transform .15s,box-shadow .15s;border:1px solid #eaf1fb;}
  .card:hover{transform:translateY(-4px);box-shadow:0 12px 26px rgba(43,140,255,.2);}
  .thumb{position:relative;line-height:0;}
  .thumb svg{width:100%;height:auto;display:block;}
  .mask{position:absolute;inset:0;background:rgba(40,50,70,.5);color:#fff;display:flex;
    align-items:center;justify-content:center;font-size:1.5rem;font-weight:900;letter-spacing:2px;}
  .card.soon{opacity:.96;cursor:default;}
  .cap{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;}
  .hui{font-weight:800;font-size:1.05rem;}
  .go{color:#2b8cff;font-weight:800;font-size:.9rem;}
  .soon-go{color:#9aa7b6;font-weight:700;}
  footer{text-align:center;color:#7a8694;font-size:.82rem;margin-top:34px;}
</style>
</head>

  <a class="home" href="index.html">&larr; 回首頁</a>
