<style>

}

<script>
// ── DATA ──────────────────────────────────────────────────
const sections = [
  {
    title: '第一大題：字彙選擇',
    pts: '15 題 × 2 分 = 30 分',
    questions: [
      { q: 'In many societies, the wage _______ between men and women remains a serious issue that needs to be addressed.',
        opts: ['gap','path','council','certificate'],
        ans: 'A',
        exp: '<span class="exp-key">gap（差距；缺口）</span>──句意為「在許多社會中，男女間的薪資差距仍是需要解決的嚴重問題」，wage gap = 薪資差距。<br>❌ path = 道路；council = 委員會；certificate = 證書，皆不符語境。' },
      { q: 'Iceland\'s _______ to gender equality began with a massive strike in 1975.',
        opts: ['path','majority','chaos','anniversary'],
        ans: 'A',
        exp: '<span class="exp-key">path（道路；途徑）</span>──句意為「冰島通往性別平等的道路始於1975年的一場大規模罷工」，path to + N = 通往…的道路。<br>❌ majority = 多數；chaos = 混亂；anniversary = 週年紀念日，皆不符語境。' },
      { q: 'With fewer than 400,000 people, Iceland has a very small _______ compared with most other countries.',
        opts: ['population','protest','discrimination','revolution'],
        ans: 'A',
        exp: '<span class="exp-key">population（人口）</span>──句意為「冰島人口不到四十萬，與大多數其他國家相比非常少」。<br>❌ protest = 抗議；discrimination = 歧視；revolution = 革命，皆不符語境。' },
      { q: 'Thousands of women organized a nationwide _______ to demand equal pay and equal rights.',
        opts: ['protest','nursery','certificate','anniversary'],
        ans: 'A',
        exp: '<span class="exp-key">protest（抗議；示威）</span>──句意為「數千名女性組織了一場全國性的抗議，要求平等薪資與平等權利」。<br>❌ nursery = 托兒所；certificate = 證書；anniversary = 週年紀念日，皆不符語境。' },
      { q: 'After a long day at work, she still had to do all the _______ chores like cooking and cleaning.',
        opts: ['domestic','democratic','revolutionary','additional'],
        ans: 'A',
        exp: '<span class="exp-key">domestic（家務的；國內的）</span>──domestic chores = 家務雜事，句意為「工作一整天後，她仍須做所有家務，像是煮飯和打掃」。<br>❌ democratic = 民主的；revolutionary = 革命性的；additional = 額外的，皆不符語境。' },
      { q: 'Taking out the trash and washing the dishes are just two of the daily _______ that nobody enjoys.',
        opts: ['chores','councils','certificates','anniversaries'],
        ans: 'A',
        exp: '<span class="exp-key">chores（雜務；瑣事）</span>──句意為「倒垃圾和洗碗只是每天沒人喜歡做的兩項家務雜事」。<br>❌ councils = 委員會；certificates = 證書；anniversaries = 週年紀念日，皆不符語境。' },
      { q: 'When the _______ of employees went on strike, the entire factory had to shut down.',
        opts: ['majority','population','certificate','anniversary'],
        ans: 'A',
        exp: '<span class="exp-key">majority（多數；大多數）</span>──句意為「當大多數員工罷工時，整個工廠必須關閉」，the majority of + N = …的大多數。<br>❌ population = 人口；certificate = 證書；anniversary = 週年紀念日，皆不符語境。' },
      { q: 'Without any teachers showing up, the school descended into complete _______.',
        opts: ['chaos','council','certificate','revolution'],
        ans: 'A',
        exp: '<span class="exp-key">chaos（混亂；混沌）</span>──句意為「沒有任何老師出現，學校陷入完全的混亂」，descend into chaos = 陷入混亂。<br>❌ council = 委員會；certificate = 證書；revolution = 革命，皆不符語境。' },
      { q: '_______, the new policy will also provide free childcare for working parents.',
        opts: ['Additionally','Democratically','Marvelously','Strictly'],
        ans: 'A',
        exp: '<span class="exp-key">Additionally（此外；另外，副詞，置於句首）</span>──句意為「此外，這項新政策還將為工作中的父母提供免費托兒服務」。<br>❌ Democratically = 民主地；Marvelously = 令人驚嘆地；Strictly = 嚴格地，皆不符語境。' },
      { q: 'Working parents often rely on a _______ to take care of their young children during the day.',
        opts: ['nursery','council','certificate','population'],
        ans: 'A',
        exp: '<span class="exp-key">nursery（托兒所；育嬰室）</span>──句意為「工作中的父母通常依賴托兒所在白天照顧年幼的孩子」。<br>❌ council = 委員會；certificate = 證書；population = 人口，皆不符語境。' },
      { q: 'The citywide strike completely _______ public transportation, leaving thousands of commuters stranded.',
        opts: ['paralyzed','eliminated','discriminated','marveled'],
        ans: 'A',
        exp: '<span class="exp-key">paralyzed（使麻痺；使癱瘓，過去式）</span>──句意為「全市的罷工使大眾運輸完全癱瘓，導致數千名通勤者受困」。<br>❌ eliminated = 消除；discriminated = 歧視；marveled = 感到驚奇，皆不符語境。' },
      { q: 'The government set up a special _______ to investigate ways to promote gender equality.',
        opts: ['council','gap','chore','anniversary'],
        ans: 'A',
        exp: '<span class="exp-key">council（委員會；議會）</span>──句意為「政府成立了一個特別委員會，以研究促進性別平等的方法」。<br>❌ gap = 差距；chore = 雜務；anniversary = 週年紀念日，皆不符語境。' },
      { q: 'The new law will _______ all forms of discrimination based on gender in the workplace.',
        opts: ['ban','marvel','eliminate','tough'],
        ans: 'A',
        exp: '<span class="exp-key">ban（禁止）</span>──句意為「這項新法律將禁止職場上一切基於性別的歧視」，ban 為動詞「禁止」。<br>❌ marvel = 感到驚奇（為動詞但語意不符）；eliminate = 消除（句中已有受詞 all forms，eliminate 也可，但 ban 更貼合法律「禁止」之語境）；tough 為形容詞「嚴厲的」，不能作動詞。' },
      { q: 'Many women still face _______ when applying for jobs traditionally held by men.',
        opts: ['discrimination','democracy','revolution','anniversary'],
        ans: 'A',
        exp: '<span class="exp-key">discrimination（歧視）</span>──句意為「許多女性在申請傳統上由男性擔任的工作時，仍面臨歧視」。<br>❌ democracy = 民主；revolution = 革命；anniversary = 週年紀念日，皆不符語境。' },
      { q: 'Iceland was the first _______ country to elect a female president.',
        opts: ['democratic','domestic','additional','marvelous'],
        ans: 'A',
        exp: '<span class="exp-key">democratic（民主的）</span>──句意為「冰島是第一個選出女性總統的民主國家」，democratic country = 民主國家。<br>❌ domestic = 國內的；additional = 額外的；marvelous = 了不起的，皆不符語境。' },
    ]
  },
  {
    title: '第二大題：文法選擇',
    pts: '15 題 × 2 分 = 30 分',
    questions: [
      { q: 'Iceland, _______ has fewer than 400,000 people, has ranked number one on the Global Gender Gap Index for over a decade.',
        opts: ['who','which','whom','what'],
        ans: 'B',
        exp: '<span class="exp-key">which（關係代名詞，引導非限定子句，代替先行詞 Iceland 作主詞）</span>──which 補充說明 Iceland 的人口狀況，並在子句中作主詞，先行詞為事物（國家）。<br>❌ who 用於指人；whom 作受詞；what 不能有先行詞。' },
      { q: 'If it _______ for the 1975 protest, support for gender equality would not have grown so quickly.',
        opts: ['were not','had not been','has not been','would not be'],
        ans: 'B',
        exp: '<span class="exp-key">had not been（if it had not been for = 若不是因為，與過去事實相反的假設）</span>──固定句型 if it had not been for + N，表「若不是因為……」，是對過去事實的假設。<br>❌ were not 用於與現在事實相反；has not been 為現在完成式；would not be 用於與現在事實相反的主要子句，皆不符此固定句型。' },
      { q: '_______ to protest against wage inequality, thousands of Icelandic women left their jobs for a day.',
        opts: ['Hope','Hoping','Having hoped','Hoped'],
        ans: 'B',
        exp: '<span class="exp-key">Hoping（現在分詞，表主動的分詞構句）</span>──women（主詞）是「希望」的一方，主動關係用現在分詞，相當於 As they hoped to protest against wage inequality。<br>❌ Hope（原形動詞不可單獨作分詞構句）；Having hoped（完成式分詞，強調動作先發生，此處不需要）；Hoped（過去分詞，表被動，不符主動語意）。' },
      { q: 'The strike, _______ paralyzed the whole country, was later seen as a turning point in Iceland\'s history.',
        opts: ['that','which','what','who'],
        ans: 'B',
        exp: '<span class="exp-key">which（關係代名詞，引導非限定子句，代替 the strike）</span>──逗號後的非限定關係子句只能用 which，代替先行詞 the strike 作主詞。<br>❌ that 不可用於非限定子句；what 不能有先行詞；who 用於指人，strike 為事物。' },
      { q: 'Schools and nurseries, most of _______ were run mainly by women, were closed during the strike.',
        opts: ['them','which','that','what'],
        ans: 'B',
        exp: '<span class="exp-key">which（介系詞 + 關係代名詞，most of which = 其中大部分）</span>──most of which 代替 most of the schools and nurseries，which 代替先行詞作 of 的受詞。<br>❌ them 不能直接接在介系詞後形成關係子句；that 不可接在介系詞之後；what 不能有先行詞。' },
      { q: 'Many fathers, _______ left to take care of their children, had to bring them to work.',
        opts: ['suddenly','suddenly being','having been suddenly','being suddenly'],
        ans: 'B',
        exp: '<span class="exp-key">suddenly being（現在分詞 being + 副詞，表被動的分詞構句）</span>──fathers 是「被留下」照顧孩子的一方，being left = 被留下，分詞構句的被動形式，suddenly 修飾整個分詞構句。<br>❌ suddenly（單獨副詞無法構成分詞構句）；having been suddenly（完成式被動分詞，強調動作先於主要動作完成，語意不符）；being suddenly（語序錯誤，副詞應在分詞之後修飾整體動作較自然）。' },
      { q: 'The Gender Equality Act, _______ in 1976, banned discrimination in workplaces and schools.',
        opts: ['pass','passing','passed','to pass'],
        ans: 'C',
        exp: '<span class="exp-key">passed（過去分詞，表被動，修飾 the Gender Equality Act）</span>──法案是「被通過」的，過去分詞作形容詞用法，相當於 which was passed in 1976。<br>❌ pass（原形）、passing（現在分詞，表主動）、to pass（不定詞）皆不符被動修飾語意。' },
      { q: 'In 1980, Iceland elected Vigdís Finnbogadóttir, _______ became the world\'s first female president of a democratic country.',
        opts: ['who','whom','whose','which'],
        ans: 'A',
        exp: '<span class="exp-key">who（關係代名詞，作主詞，代替先行詞 Vigdís Finnbogadóttir）</span>──who 引導非限定關係子句，補充說明她成為世界第一位女總統，並在子句中作主詞。<br>❌ whom 作受詞；whose 為所有格；which 用於指事物。' },
      { q: 'Not until 2018 _______ Iceland become the first country to legally demand equal pay for men and women.',
        opts: ['did','does','had','has'],
        ans: 'A',
        exp: '<span class="exp-key">did（Not until + 時間, + did + S + 原形動詞，倒裝句型）</span>──Not until 2018 放句首，主要子句須倒裝，過去式用 did + 主詞 + 原形動詞，表「直到2018年冰島才……」。<br>❌ does 為現在式倒裝；had/has 為完成式倒裝，皆與全句過去時態語境不符。' },
      { q: 'Companies with at least twenty-five employees are required to obtain a certificate _______ that they follow equal pay policies.',
        opts: ['prove','proving','proved','to proving'],
        ans: 'B',
        exp: '<span class="exp-key">proving（現在分詞，表主動，修飾 certificate）</span>──a certificate proving that... = 證明……的證書，proving 為現在分詞作形容詞，相當於 which proves that...（certificate 主動「證明」某事）。<br>❌ prove（原形）、proved（過去分詞，表被動，但 certificate 是主動「證明」而非「被證明」）、to proving（無此用法）。' },
      { q: 'Otherwise, companies that fail to obtain the certificate _______ heavy fines.',
        opts: ['face','faced','will face','facing'],
        ans: 'C',
        exp: '<span class="exp-key">will face（未來式，表示法律規定的後果）</span>──句意為「否則，未取得證書的公司將面臨重罰」，描述法律條文中對未來行為的後果，須用 will + 原形動詞。<br>❌ face（現在式，未強調未來後果）；faced（過去式，與語境的「未來後果」不符）；facing（現在分詞，非完整動詞，不能單獨作主要動詞）。' },
      { q: '_______ how far Iceland has come, the fight for full gender equality is still not over.',
        opts: ['Despite','Although','Because of','Since'],
        ans: 'A',
        exp: '<span class="exp-key">Despite（儘管，後接名詞 / 名詞片語）</span>──despite + how far Iceland has come（名詞子句作受詞），表示讓步：儘管冰島已經走了這麼遠，性別平等之戰仍未結束。<br>❌ Although 為連接詞須接「主詞+動詞」的子句（雖然 how far... 本身可作名詞子句，但用法上 despite 更自然搭配此處的名詞化結構）；Because of 表原因，語意矛盾；Since 表原因或時間，皆不符。' },
      { q: 'It was the women of Iceland _______ took to the streets in 1975 and changed the course of history.',
        opts: ['who','whom','which','what'],
        ans: 'A',

// ── RENDER ────────────────────────────────────────────────
let globalQNum = 0;
const qMap = {}; // qNum → { ans, exp }
const userAnswers = {};
let submitted = false;

const container = document.getElementById('quiz-container');

sections.forEach((sec, si) => {
  const secDiv = document.createElement('div');
  secDiv.className = 'section';
  let html = `<div class="section-header">${sec.title} <span class="pts">（${sec.pts}）</span></div>`;
  if (sec.passage) {
    html += `<div class="passage"><div class="passage-label">📖 閱讀文章</div>${sec.passage}</div>`;
  }
  sec.questions.forEach((q, qi) => {
    globalQNum++;
    const n = globalQNum;
    qMap[n] = { ans: q.ans, exp: q.exp };
    const labels = ['A','B','C','D'];
    let optHtml = '';
    q.opts.forEach((o, i) => {
      optHtml += `<div class="option" id="opt-${n}-${labels[i]}" onclick="choose(${n},'${labels[i]}')">`
        + `<span class="option-label">(${labels[i]})</span>${o}</div>`;
    });
    let qLabel = n;
    if (si === 2) qLabel = `(${n})`;
    if (si === 3) qLabel = `(${n})`;
    html += `<div class="question" id="q${n}">
      <div class="q-text"><span class="q-num">${qLabel}.</span> ${q.q}</div>
      <div class="options">${optHtml}</div>
      <div class="explanation" id="exp${n}">
        <div class="exp-header">💡 解析</div>
        <div class="exp-body">${q.exp}</div>
      </div>
    </div>`;
  });
  secDiv.innerHTML = html;
  container.appendChild(secDiv);
});

// ── LOGIC ─────────────────────────────────────────────────
function choose(n, chosen) {
  if (submitted) return;
  userAnswers[n] = chosen;
  const ans = qMap[n].ans;
  const labels = ['A','B','C','D'];

  labels.forEach(l => {
    const el = document.getElementById(`opt-${n}-${l}`);
    el.classList.remove('selected','correct','wrong','reveal-correct');
    if (l === chosen) {
      if (chosen === ans) el.classList.add('correct');
      else el.classList.add('wrong');
    } else if (l === ans && chosen !== ans) {
      el.classList.add('reveal-correct');
    }
  });

  document.getElementById(`exp${n}`).classList.add('show');
  updateTopBar();
}

function updateTopBar() {
  const count = Object.keys(userAnswers).length;
  document.getElementById('answered-count').textContent = count;
  document.getElementById('progress-fill').style.width = (count / 50 * 100) + '%';
  let score = 0;
  for (let q in userAnswers) { if (userAnswers[q] === qMap[q].ans) score += 2; }
  document.getElementById('live-score').textContent = score;
}

function revealAll() {
  for (let n = 1; n <= 50; n++) {
    const ans = qMap[n].ans;
    const labels = ['A','B','C','D'];
    labels.forEach(l => {
      const el = document.getElementById(`opt-${n}-${l}`);
      el.classList.remove('selected','correct','wrong','reveal-correct');
      if (l === ans) el.classList.add('reveal-correct');
      else if (userAnswers[n] === l && l !== ans) el.classList.add('wrong');
    });
    document.getElementById(`exp${n}`).classList.add('show');
  }
  updateTopBar();
}

function submitAll() {
  submitted = true;
  revealAll();
  let score = 0;
  for (let n = 1; n <= 50; n++) {
    if (userAnswers[n] === qMap[n].ans) score += 2;
  }
  const rb = document.getElementById('result-box');
  rb.classList.add('show');
  document.getElementById('result-score').textContent = score;
  const gr = document.getElementById('result-grade');
  const det = document.getElementById('result-detail');
  if (score >= 90) { gr.textContent = '🏆 優秀！'; gr.className = 'result-grade grade-a'; det.textContent = '表現卓越，繼續保持！'; }
  else if (score >= 70) { gr.textContent = '👍 良好'; gr.className = 'result-grade grade-b'; det.textContent = '表現不錯，再複習錯誤的題目吧！'; }
  else { gr.textContent = '📚 需加強'; gr.className = 'result-grade grade-c'; det.textContent = '多複習解析說明，你可以做到的！'; }
  document.getElementById('answered-count').textContent = 50;
  document.getElementById('live-score').textContent = score;
  document.getElementById('progress-fill').style.width = '100%';
  rb.scrollIntoView({ behavior: 'smooth' });
}

function resetAll() {
  submitted = false;
  for (let key in userAnswers) delete userAnswers[key];
  for (let n = 1; n <= 50; n++) {
    const labels = ['A','B','C','D'];
    labels.forEach(l => {
      document.getElementById(`opt-${n}-${l}`).classList.remove('selected','correct','wrong','reveal-correct');
    });
    document.getElementById(`exp${n}`).classList.remove('show');
  }
  document.getElementById('result-box').classList.remove('show');
  document.getElementById('answered-count').textContent = '0';
  document.getElementById('live-score').textContent = '0';
  document.getElementById('progress-fill').style.width = '0%';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
