.option-label { font-weight: bold; color: #ff5e62; min-width: 22px; flex-shrink: 0; }
.option.correct .option-label, .option.reveal-correct .option-label { color: #34c759; }
.option.wrong .option-label { color: #ff3b30; }

/* Explanation panel */
.explanation {
  display: none; margin-top: 10px;

  border: 1px solid #ffd9cc; overflow: hidden;
}

.exp-header {
  display: flex; align-items: center; gap: 6px;

}
.exp-body { padding: 10px 13px; font-size: 15px; line-height: 1.7; color: #333; }

/* Passage */
.passage {
  background: #fff8f5; border-left: 4px solid #ff5e62;
  padding: 13px 15px; margin: 0 16px 10px;
  border-radius: 0 8px 8px 0; font-size: 15px; line-height: 1.75;
}
.passage-label { font-weight: bold; color: #ff5e62; margin-bottom: 7px; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }

.grade-a { background: #f0fff4; color: #1a7a3c; }
.grade-b { background: #fff9e6; color: #b7791f; }

}

<script>
// ── DATA ──────────────────────────────────────────────────
const sections = [
  {
    title: '第一大題：字彙選擇',
    pts: '15 題 × 2 分 = 30 分',
    questions: [
      { q: 'Thousands of people gathered to _______ through the city center to demand equal rights.',
        opts: ['march','outline','wither','exile'],
        ans: 'A',
        exp: '<span class="exp-key">march（行進；遊行）</span>──march through... 表示「遊行穿過某地」，課文開頭：King marched to the Lincoln Memorial。<br>❌ outline = 概述；wither = 凋謝；exile = 流放，均不符語境。' },
      { q: 'The mayor gave a speech in front of the war _______ to honor the fallen soldiers.',
        opts: ['memorial','captivity','symphony','rhetoric'],
        ans: 'A',
        exp: '<span class="exp-key">memorial（紀念碑）</span>──war memorial = 戰爭紀念碑，課文中提到 the Lincoln Memorial。<br>❌ captivity = 囚禁；symphony = 交響樂；rhetoric = 修辭學，均不符語境。' },
      { q: 'In his report, the manager _______ the main goals of the new project for the team.',
        opts: ['outlined','withered','segregated','oppressed'],
        ans: 'A',
        exp: '<span class="exp-key">outlined（概述）</span>──outline = 概述、勾勒大綱，課文原句：King outlined his hopes for the future。<br>❌ withered = 枯萎；segregated = 隔離；oppressed = 壓迫，均不符語境。' },
      { q: '_______ is the unfair belief that some races are superior to others.',
        opts: ['Racism','Captivity','Dignity','Mobility'],
        ans: 'A',
        exp: '<span class="exp-key">Racism（種族主義）</span>──指認為某些種族優於其他種族的不公平信念，課文核心議題之一。<br>❌ Captivity = 囚禁；Dignity = 尊嚴；Mobility = 流動性，均與字義不符。' },
      { q: 'It was a _______ moment in the company\'s history when it decided to go fully digital.',
        opts: ['decisive','vicious','eloquent','frail'],
        ans: 'A',
        exp: '<span class="exp-key">decisive（決定性的）</span>──a decisive moment = 決定性的時刻，課文原句：a decisive moment in the civil rights movement。<br>❌ vicious = 兇惡的；eloquent = 雄辯的；frail = 虛弱的，均不符語境。' },
      { q: 'Every adult citizen has the right to take part in _______ activities such as voting.',
        opts: ['civil','rhetorical','mobile','shameful'],
        ans: 'A',
        exp: '<span class="exp-key">civil（公民的）</span>──civil rights = 公民權利，課文反覆提及 civil rights movement。<br>❌ rhetorical = 修辭的；mobile = 可移動的；shameful = 可恥的，均不符語境。' },
      { q: 'The government decided to _______ extra funding to schools in poor rural areas.',
        opts: ['grant','wither','cripple','exile'],
        ans: 'A',
        exp: '<span class="exp-key">grant（授予；給予）</span>──grant funding to... = 撥款給…，課文原句：a series of laws to grant new rights to African Americans。<br>❌ wither = 枯萎；cripple = 使殘廢；exile = 流放，均不符語境。' },
      { q: 'The dry summer caused many crops in the field to _______ before harvest.',
        opts: ['wither','grant','outline','convey'],
        ans: 'A',
        exp: '<span class="exp-key">wither（凋謝；枯萎）</span>──乾旱使農作物在收成前枯萎，課文原句：seared in the flames of withering injustice。<br>❌ grant = 授予；outline = 概述；convey = 傳達，均不符語境。' },
      { q: 'After years in _______, the prisoner of war was finally released and reunited with his family.',
        opts: ['captivity','dignity','mobility','rhetoric'],
        ans: 'A',
        exp: '<span class="exp-key">captivity（囚禁；拘留）</span>──in captivity = 被囚禁中，課文原句：to end the long night of their captivity。<br>❌ dignity = 尊嚴；mobility = 流動性；rhetoric = 修辭學，均不符語境。' },
      { q: 'The accident left him permanently _______, unable to walk without assistance.',
        opts: ['crippled','granted','outlined','exiled'],
        ans: 'A',
        exp: '<span class="exp-key">crippled（殘廢的；嚴重受損的）</span>──be crippled = 致殘，課文原句：the life of the Negro is still sadly crippled。<br>❌ granted = 被授予；outlined = 被概述；exiled = 被流放，均不符語境。' },
      { q: 'During that era, racial _______ meant that black and white students attended different schools.',
        opts: ['segregation','captivity','symphony','eloquence'],
        ans: 'A',
        exp: '<span class="exp-key">segregation（隔離；種族隔離）</span>──racial segregation = 種族隔離，課文原句：the manacles of segregation and the chains of discrimination。<br>❌ captivity = 囚禁；symphony = 交響樂；eloquence = 口才，均不符語境。' },
      { q: 'He felt like an outsider, an _______ in his own hometown after so many years away.',
        opts: ['exile','outline','warrior','memorial'],
        ans: 'A',
        exp: '<span class="exp-key">exile（流亡者）</span>──an exile in... = 在…的流亡者，課文原句：finds himself an exile in his own land。<br>❌ outline = 輪廓；warrior = 戰士；memorial = 紀念碑，均不符語境。' },
      { q: 'It was _______ that the company fired the employee just days before her retirement.',
        opts: ['shameful','decisive','mobile','vicious'],
        ans: 'A',
        exp: '<span class="exp-key">shameful（可恥的）</span>──令人感到羞愧的行為，課文原句：to dramatize a shameful condition。<br>❌ decisive = 決定性的；mobile = 可移動的；vicious = 兇惡的，均不符語境。' },
      { q: 'After the long flight, the travelers were too tired with _______ to enjoy the sightseeing.',
        opts: ['fatigue','dignity','rhetoric','symphony'],
        ans: 'A',
        exp: '<span class="exp-key">fatigue（疲勞）</span>──heavy with fatigue = 疲憊不堪，課文原句：our bodies, heavy with the fatigue of travel。<br>❌ dignity = 尊嚴；rhetoric = 修辭學；symphony = 交響樂，均不符語境。' },
      { q: 'The new subway system greatly improved _______ for people living in the suburbs.',
        opts: ['mobility','captivity','segregation','oppression'],
        ans: 'A',
        exp: '<span class="exp-key">mobility（流動性；移動性）</span>──指人或物移動的便利程度，課文原句：the Negro\'s basic mobility is from a smaller ghetto to a larger one。<br>❌ captivity = 囚禁；segregation = 隔離；oppression = 壓迫，均不符語境。' },
    ]
  },
  {
    title: '第二大題：文法選擇',
    pts: '15 題 × 2 分 = 30 分',
    questions: [
      { q: '_______ Dr. King not delivered his famous speech, history might have unfolded very differently.',
        opts: ['Had','If','Unless','Should'],
        ans: 'A',
        exp: '<span class="exp-key">Had（Had + S + p.p. = 與過去事實相反的假設）</span>──省略 if 並將 had 提前的倒裝句型，課文原句：Had Dr. King not made the speech, the United States might not have introduced...。<br>❌ If 需搭配 Dr. King had not delivered（未倒裝形式）；Unless = 除非（語意不同）；Should 用於條件句倒裝但語意不符。' },
      { q: 'The new policy will _______ down in history as one of the most important reforms ever made.',
        opts: ['go','take','run','fall'],
        ans: 'A',
        exp: '<span class="exp-key">go down in history（名留青史；載入史冊）</span>──固定片語，課文原句：what will go down in history as the greatest demonstration for freedom。<br>❌ take/run/fall down in history 均非正確搭配。' },
      { q: 'A hundred years _______, the descendants of the immigrants still face many of the same challenges.',
        opts: ['later','ago','before','soon'],
        ans: 'A',
        exp: '<span class="exp-key">later（之後）</span>──表示從某一過去時間點起算的「之後」，課文反覆使用 One hundred years later, ...。<br>❌ ago = 從現在算起的「以前」；before 需有特定參照點；soon 不搭配「一百年」這種長時間。' },
      { q: 'We will never give up _______ there is still hope for a better future.',
        opts: ['as long as','as soon as','even though','in spite of'],
        ans: 'A',
        exp: '<span class="exp-key">as long as（只要）</span>──表示條件，課文反覆出現：We can never be satisfied as long as...。<br>❌ as soon as = 一…就…；even though = 雖然；in spite of = 儘管（介系詞片語），均不符句意或文法。' },
      { q: 'The students were stripped _______ their right to speak freely during the protest.',
        opts: ['of','from','with','for'],
        ans: 'A',
        exp: '<span class="exp-key">of（strip sb. of sth. = 剝奪某人某物）</span>──固定搭配，課文原句：our children are stripped of their self-hood。<br>❌ from/with/for 均不與 strip 搭配。' },
      { q: 'No matter how hard the journey is, we _______ free one day if we keep working together.',
        opts: ['will be','are','were','had been'],
        ans: 'A',
        exp: '<span class="exp-key">will be（未來式，表示對未來的承諾／預測）</span>──課文原句：knowing that we will be free one day。<br>❌ are = 現在式不符語境；were = 過去式；had been = 過去完成式，均不符「對未來的期盼」語意。' },
      { q: 'The volunteers worked together _______ build a new playground for the children in the village.',
        opts: ['to','for','of','with'],
        ans: 'A',
        exp: '<span class="exp-key">to（不定詞表目的）</span>──work together to V = 一起合作做某事，課文原句：we will be able to work together, to pray together, to struggle together...。<br>❌ for/of/with 均不能直接接原形動詞表目的。' },
      { q: 'This nation must _______ up and live out the true meaning of its founding principles.',
        opts: ['rise','raise','arise','arouse'],
        ans: 'A',
        exp: '<span class="exp-key">rise（崛起；站起來，不及物動詞）</span>──rise up = 奮起，課文原句：this nation will rise up and live out the true meaning of its creed。<br>❌ raise 是及物動詞，需接受詞；arise 多指「（問題、機會）發生」；arouse = 喚起（情感），均不符此句構。' },
      { q: 'The charity hopes that one day every child, _______ of their background, will have access to education.',
        opts: ['regardless','despite','without','except'],
        ans: 'A',
        exp: '<span class="exp-key">regardless of（不論；不管）</span>──regardless of... = 不論…，呼應課文「不分膚色／背景」的平等精神。<br>❌ despite = 儘管（後接名詞但語意稍異）；without = 沒有；except = 除了，均不符句意。' },
      { q: 'The professor\'s _______ skills allowed him to persuade even the most skeptical audience.',
        opts: ['rhetorical','vicious','frail','withering'],
        ans: 'A',
        exp: '<span class="exp-key">rhetorical（修辭的；演說的）</span>──rhetorical skills = 演說技巧，課文原句：his rhetorical skills awoke the consciences of many Americans。<br>❌ vicious = 兇惡的；frail = 虛弱的；withering = 枯萎的，均不符語境。' },
      { q: 'Many citizens who had previously _______ the issue began to take action after watching the documentary.',
        opts: ['ignored','ignoring','to ignore','being ignored'],
        ans: 'A',
        exp: '<span class="exp-key">ignored（過去分詞，與 had 搭配構成過去完成式）</span>──had + p.p. 表示「在過去某時間點之前已經…」，課文原句：many Americans who had ignored or condoned racial oppression。<br>❌ ignoring/to ignore/being ignored 均不能與 had 構成正確的過去完成式。' },
      { q: 'The speech _______ to inspire activists around the world to this very day.',
        opts: ['continues','continuing','continued to','is continue'],
        ans: 'A',
        exp: '<span class="exp-key">continues（現在式，主詞為單數 the speech）</span>──continue to V = 持續做某事，課文原句：The speech continues to inspire people to this day。<br>❌ continuing 缺主要動詞；continued to 為過去式但語境是「至今」；is continue 文法錯誤。' },
      { q: 'The singer\'s performance was _______ to a battle cry, stirring up the crowd\'s emotions instantly.',
        opts: ['compared','comparing','compare','to compare'],
        ans: 'A',
        exp: '<span class="exp-key">compared（過去分詞，構成被動 was compared to）</span>──be compared to = 被比擬為…，課文原句："I Have a Dream" was to civil rights supporters what a battle cry is to a warrior 為類似的比喻句構。<br>❌ comparing/compare/to compare 均無法與 was 構成正確的被動語態。' },
      { q: 'The charity worker said the problem of poverty will likely persist _______ inequality continues to exist.',
        opts: ['as long as','unless','although','because of'],
        ans: 'A',
        exp: '<span class="exp-key">as long as（只要）</span>──表條件，與課文 as long as inequality exists 結構相同。<br>❌ unless = 除非（語意相反）；although = 雖然；because of 為介系詞片語，後接名詞，均不符句構。' },
      { q: 'The committee members joined _______ in celebrating the success of the charity event.',
        opts: ['hands','hand','handing','to hand'],
        ans: 'A',
        exp: '<span class="exp-key">hands（join hands = 攜手合作，固定片語用複數 hands）</span>──課文原句：little black boys and black girls will be able to join hands with little white boys and white girls。<br>❌ hand（單數）、handing、to hand 均不符固定片語形式。' },
    ]
  },
  {
    title: '第三大題：克漏字填充',
    pts: '10 題 × 2 分 = 20 分',
    passage: 'On a hot summer day in 1963, a huge crowd gathered near the Lincoln Memorial to listen to a speech that would later <strong>(31)</strong> down in history. The speaker, Dr. Martin Luther King, Jr., wanted to <strong>(32)</strong> his vision of a future free from racial injustice. He reminded the crowd that, one hundred years after the Emancipation Proclamation, African Americans were still <strong>(33)</strong> by segregation and discrimination.<br><br>Dr. King declared that the nation could never be satisfied <strong>(34)</strong> people were judged by the color of their skin rather than the content of their character. He believed that all citizens, <strong>(35)</strong> of their race, deserved equal rights and dignity. With great <strong>(36)</strong>, he described a dream in which children of former slaves and former slave owners could sit down together at the table of brotherhood.<br><br>Dr. King\'s words had a <strong>(37)</strong> impact on the civil rights movement. His speech inspired millions of Americans who had previously <strong>(38)</strong> the problem of racial inequality to finally take action. Although his dream has <strong>(39)</strong> to be fully realized, his rhetorical skills awoke the conscience of the nation. Decades later, the speech continues <strong>(40)</strong> people to fight for equality and justice.',
    questions: [
      { q: 'On a hot summer day in 1963, a huge crowd gathered near the Lincoln Memorial to listen to a speech that would later _______ down in history.',
        opts: ['go','run','take','fall'],
        ans: 'A',

// ── RENDER ────────────────────────────────────────────────
let globalQNum = 0;
const qMap = {}; // qNum → { ans, exp }
const userAnswers = {};
let submitted = false;

const container = document.getElementById('quiz-container');

sections.forEach((sec, si) => {
  const secDiv = document.createElement('div');
  secDiv.className = 'section';
  let html = `<div class="section-header">${sec.title} <span class="pts">（${sec.pts}）</span></div>`;
  if (sec.passage) {
    html += `<div class="passage"><div class="passage-label">📖 閱讀文章</div>${sec.passage}</div>`;
  }
  sec.questions.forEach((q, qi) => {
    globalQNum++;
    const n = globalQNum;
    qMap[n] = { ans: q.ans, exp: q.exp };
    const labels = ['A','B','C','D'];
    let optHtml = '';
    q.opts.forEach((o, i) => {
      optHtml += `<div class="option" id="opt-${n}-${labels[i]}" onclick="choose(${n},'${labels[i]}')">`
        + `<span class="option-label">(${labels[i]})</span>${o}</div>`;
    });
    html += `<div class="question" id="q${n}">
      <div class="q-text"><span class="q-num">${n}.</span> ${q.q}</div>
      <div class="options">${optHtml}</div>
      <div class="explanation" id="exp${n}">
        <div class="exp-header">💡 解析</div>
        <div class="exp-body">${q.exp}</div>
      </div>
    </div>`;
  });
  secDiv.innerHTML = html;
  container.appendChild(secDiv);
});

// ── LOGIC ─────────────────────────────────────────────────
function choose(n, chosen) {
  if (submitted) return;
  userAnswers[n] = chosen;
  const ans = qMap[n].ans;
  const labels = ['A','B','C','D'];

  labels.forEach(l => {
    const el = document.getElementById(`opt-${n}-${l}`);
    el.classList.remove('selected','correct','wrong','reveal-correct');
    if (l === chosen) {
      if (chosen === ans) el.classList.add('correct');
      else el.classList.add('wrong');
    } else if (l === ans && chosen !== ans) {
      el.classList.add('reveal-correct');
    }
  });

  document.getElementById(`exp${n}`).classList.add('show');
  updateTopBar();
}

function updateTopBar() {
  const count = Object.keys(userAnswers).length;
  document.getElementById('answered-count').textContent = count;
  document.getElementById('progress-fill').style.width = (count / 50 * 100) + '%';
  let score = 0;
  for (let q in userAnswers) { if (userAnswers[q] === qMap[q].ans) score += 2; }
  document.getElementById('live-score').textContent = score;
}

function revealAll() {
  for (let n = 1; n <= 50; n++) {
    const ans = qMap[n].ans;
    const labels = ['A','B','C','D'];
    labels.forEach(l => {
      const el = document.getElementById(`opt-${n}-${l}`);
      el.classList.remove('selected','correct','wrong','reveal-correct');
      if (l === ans) el.classList.add('reveal-correct');
      else if (userAnswers[n] === l && l !== ans) el.classList.add('wrong');
    });
    document.getElementById(`exp${n}`).classList.add('show');
  }
  updateTopBar();
}

function submitAll() {
  submitted = true;
  revealAll();
  let score = 0;
  for (let n = 1; n <= 50; n++) {
    if (userAnswers[n] === qMap[n].ans) score += 2;
  }
  const rb = document.getElementById('result-box');
  rb.classList.add('show');
  document.getElementById('result-score').textContent = score;
  const gr = document.getElementById('result-grade');
  const det = document.getElementById('result-detail');
  if (score >= 90) { gr.textContent = '🏆 優秀！'; gr.className = 'result-grade grade-a'; det.textContent = '表現卓越，繼續保持！'; }
  else if (score >= 70) { gr.textContent = '👍 良好'; gr.className = 'result-grade grade-b'; det.textContent = '表現不錯，再複習錯誤的題目吧！'; }
  else { gr.textContent = '📚 需加強'; gr.className = 'result-grade grade-c'; det.textContent = '多複習解析說明，你可以做到的！'; }
  document.getElementById('answered-count').textContent = 50;
  document.getElementById('live-score').textContent = score;
  document.getElementById('progress-fill').style.width = '100%';
  rb.scrollIntoView({ behavior: 'smooth' });
}

function resetAll() {
  submitted = false;
  for (let key in userAnswers) delete userAnswers[key];
  for (let n = 1; n <= 50; n++) {
    const labels = ['A','B','C','D'];
    labels.forEach(l => {
      document.getElementById(`opt-${n}-${l}`).classList.remove('selected','correct','wrong','reveal-correct');
    });
    document.getElementById(`exp${n}`).classList.remove('show');
  }
  document.getElementById('result-box').classList.remove('show');
  document.getElementById('answered-count').textContent = '0';
  document.getElementById('live-score').textContent = '0';
  document.getElementById('progress-fill').style.width = '0%';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
