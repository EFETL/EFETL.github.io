<script>
// ── DATA ──────────────────────────────────────────────────
const sections = [
  {
    title: '第一大題：單字選擇',
    pts: '15 題 × 2 分 = 30 分',
    questions: [
      { q: 'A small bakery is a tiny _______ compared to a multinational corporation with thousands of employees.',
        opts: ['enterprise','transaction','accuracy','tactic'],
        ans: 0,
        exp: '<span class="exp-key">enterprise（企業；事業）</span>──句意為「相較於擁有數千名員工的跨國企業，小麵包店只是一個小企業」。<br>❌ transaction = 交易；accuracy = 準確性；tactic = 策略，皆不符語境。' },
      { q: 'The bank processes millions of financial _______ every day, ranging from deposits to wire transfers.',
        opts: ['suburbs','transactions','tactics','schemes'],
        ans: 1,
        exp: '<span class="exp-key">transactions（交易；業務，transaction 的複數）</span>──句意為「銀行每天處理數百萬筆金融交易，從存款到電匯」。<br>❌ suburbs = 郊區；tactics = 策略；schemes = 計畫，皆不符語境。' },
      { q: 'The factory maintains an extremely low defect _______ , with fewer than one faulty product per million.',
        opts: ['flaw','rate','code','network'],
        ans: 1,
        exp: '<span class="exp-key">rate（率；比率）</span>──句意為「這家工廠維持極低的瑕疵率，每百萬件產品中故障件數少於一件」，defect rate = 瑕疵率。<br>❌ flaw = 缺陷（名詞，但不接「率」概念）；code = 代碼；network = 網絡，皆不符語境。' },
      { q: 'The new intern made a few mistakes, but they were _______ minor issues that could be fixed quickly.',
        opts: ['merely','massively','roughly','swiftly'],
        ans: 0,
        exp: '<span class="exp-key">merely（僅僅；只不過，副詞）</span>──句意為「新來的實習生犯了一些錯，但那些僅僅是可以很快修正的小問題」。<br>❌ massively = 大規模地；roughly = 大致上；swiftly = 迅速地，皆不符語境。' },
      { q: 'Winning the lottery was, for him, a _______ stroke of luck that changed his life forever.',
        opts: ['mere','massive','particular','classic'],
        ans: 0,
        exp: '<span class="exp-key">mere（僅僅的；純粹的，形容詞）</span>──句意為「對他而言，贏得樂透只是純粹的幸運，卻徹底改變了他的人生」，a mere stroke of luck = 純粹的幸運。<br>❌ massive = 巨大的（語意上與「純屬偶然」的「mere」不符）；particular = 特定的；classic = 經典的，皆不符語境。' },
      { q: 'The new GPS navigation system has greatly improved the _______ of delivery time estimates.',
        opts: ['accuracy','suburb','tactic','flaw'],
        ans: 0,
        exp: '<span class="exp-key">accuracy（準確性；精確度）</span>──句意為「新的 GPS 導航系統大幅提升了送貨時間預估的準確性」。<br>❌ suburb = 郊區；tactic = 策略；flaw = 缺陷，皆不符語境。' },
      { q: 'Many families choose to live in a quiet _______ rather than in the crowded city center.',
        opts: ['suburb','network','scheme','transaction'],
        ans: 0,
        exp: '<span class="exp-key">suburb（郊區）</span>──句意為「許多家庭選擇住在安靜的郊區，而非擁擠的市中心」。<br>❌ network = 網絡；scheme = 計畫；transaction = 交易，皆不符語境。' },
      { q: 'Every weekday, she has to _______ for nearly two hours to reach her office in the city.',
        opts: ['commute','retrace','sort','load'],
        ans: 0,
        exp: '<span class="exp-key">commute（通勤，動詞）</span>──句意為「每個工作日，她必須通勤將近兩小時才能抵達市區的辦公室」。<br>❌ retrace = 沿原路返回；sort = 分類；load = 裝載，皆不符語境。' },
      { q: 'As a daily _______ , he spends almost three hours on trains traveling between his home and workplace.',
        opts: ['commuter','tactic','enterprise','scheme'],
        ans: 0,
        exp: '<span class="exp-key">commuter（通勤者）</span>──句意為「作為每天的通勤者，他花將近三小時在往返家與工作地點的火車上」。<br>❌ tactic = 策略；enterprise = 企業；scheme = 計畫，皆不符語境。' },
      { q: 'The company built a vast _______ of suppliers and distributors to support its global operations.',
        opts: ['network','rate','flaw','code'],
        ans: 0,
        exp: '<span class="exp-key">network（網絡；網路）</span>──句意為「該公司建立了龐大的供應商與經銷商網絡，以支撐其全球業務」。<br>❌ rate = 率；flaw = 缺陷；code = 代碼，皆不符語境。' },
      { q: 'By automating repetitive tasks, the factory increased production _______ without hiring more workers.',
        opts: ['efficiency','suburb','transaction','tactic'],
        ans: 0,
        exp: '<span class="exp-key">efficiency（效率）</span>──句意為「透過自動化重複性的工作，工廠在不增加員工的情況下提高了生產效率」。<br>❌ suburb = 郊區；transaction = 交易；tactic = 策略，皆不符語境。' },
      { q: 'The new assembly line is far more _______ than the old one, producing twice as many units per hour.',
        opts: ['efficient','massive','rough','classical'],
        ans: 0,
        exp: '<span class="exp-key">efficient（有效率的，形容詞）</span>──句意為「新的生產線比舊的更有效率，每小時可生產兩倍的產量」。<br>❌ massive = 巨大的；rough = 粗略的；classical = 古典的，皆不符語境。' },
      { q: 'The journey takes _______ two hours, though it can be longer during rush hour.',
        opts: ['roughly','swiftly','merely','particularly'],
        ans: 0,
        exp: '<span class="exp-key">roughly（大致上；粗略地，副詞）</span>──句意為「這段路程大約需要兩小時，但在尖峰時間可能更久」，roughly two hours = 大約兩小時。<br>❌ swiftly = 迅速地；merely = 僅僅；particularly = 特別地，皆不符語境。' },
      { q: 'Without checking the exact figures, he gave a _______ estimate of the total cost.',
        opts: ['rough','swift','flawless','classic'],
        ans: 0,
        exp: '<span class="exp-key">rough（粗略的；粗糙的，形容詞）</span>──句意為「他沒有核對確切數字，就給出了一個粗略的總成本估算」，a rough estimate = 粗略的估計。<br>❌ swift = 迅速的；flawless = 完美無瑕的；classic = 經典的，皆不符語境。' },
      { q: 'The rescue team responded with _______ action, saving the trapped hikers within minutes.',
        opts: ['swift','rough','particular','classical'],
        ans: 0,
        exp: '<span class="exp-key">swift（迅速的，形容詞）</span>──句意為「救援隊迅速採取行動，在幾分鐘內救出受困的登山客」，swift action = 迅速的行動。<br>❌ rough = 粗略的；particular = 特定的；classical = 古典的，皆不符語境。' },
    ]
  },
  {
    title: '第二大題：文法選擇',
    pts: '15 題 × 2 分 = 30 分',
    questions: [
      { q: 'The dabbawala _______ delivers lunchboxes every day rarely makes a mistake in sorting them.',
        opts: ['who','whom','which','whose'],
        ans: 0,
        exp: '<span class="exp-key">who（關係代名詞，代替先行詞 the dabbawala 作主詞）</span>──who 引導限定關係子句，在子句中作主詞，修飾 the dabbawala。<br>❌ whom 作受詞；which 用於指事物；whose 為所有格，皆不符子句缺主詞的需求。' },
      { q: 'The tiffin boxes, _______ are color-coded for easy identification, travel by train to their destinations.',
        opts: ['that','which','what','who'],
        ans: 1,
        exp: '<span class="exp-key">which（關係代名詞，引導非限定子句，代替 the tiffin boxes）</span>──非限定關係子句前須有逗號分隔，只能用 which，不可用 that。<br>❌ that 不可用於非限定子句；what 不能有先行詞；who 用於指人，tiffin boxes 為物。' },
      { q: '_______ sorted at the train station, the lunchboxes are loaded onto the correct trains for delivery.',
        opts: ['Sort','Sorting','Having sorted','Sorted'],
        ans: 3,
        exp: '<span class="exp-key">Sorted（過去分詞，表被動的分詞構句）</span>──the lunchboxes 是「被分類」的一方，分詞構句須用過去分詞表被動，等於 After they are sorted at the train station。<br>❌ Sort（原形）、Sorting（現在分詞，表主動）、Having sorted（完成式主動分詞）均不符被動語意。' },
      { q: 'The system, _______ relies on simple codes and colors, manages to deliver 200,000 lunches accurately every day.',
        opts: ['that','which','who','it'],
        ans: 1,
        exp: '<span class="exp-key">which（關係代名詞，引導非限定子句，代替 the system）</span>──非限定關係子句前須有逗號，只能用 which，不可用 that；the system 為事物，不可用 who 或 it。<br>❌ that 不可用於非限定子句；who 指人；it 不能引導關係子句。' },
      { q: 'The numbers and letters written on each box, _______ indicate its destination, help dabbawalas avoid mistakes.',
        opts: ['that','which','who','it'],
        ans: 1,
        exp: '<span class="exp-key">which（關係代名詞，引導非限定子句，代替 the numbers and letters）</span>──逗號後的非限定關係子句須用 which，不可用 that；先行詞為事物，不可用 who。<br>❌ that 不可用於逗號後的非限定子句；who 指人；it 不能引導關係子句。' },
      { q: 'Each dabbawala\'s bicycle, _______ in a busy accident years earlier, was eventually replaced with a new one.',
        opts: ['damage','damaging','damaged','to damage'],
        ans: 2,
        exp: '<span class="exp-key">damaged（過去分詞，表被動，修飾 bicycle）</span>──腳踏車是「被損壞的」，過去分詞作形容詞用法，相當於 which had been damaged in a busy accident years earlier。<br>❌ damage（原形）、damaging（現在分詞，表主動）、to damage（不定詞）皆不符被動修飾語意。' },
      { q: '_______ the immense scale of the operation, the dabbawala system makes remarkably few errors.',
        opts: ['Because of','Despite','Although','Since'],
        ans: 1,
        exp: '<span class="exp-key">Despite（儘管，後接名詞）</span>──despite + N，表示讓步：儘管營運規模龐大，dabbawala 系統的失誤率仍極低。<br>❌ Because of 表原因，語意矛盾；Although 為連接詞須接子句（主詞+動詞），而非單純名詞；Since 表原因或時間，皆不符。' },
      { q: 'The supervisor pointed out that the delivery records _______ accurate for over a century.',
        opts: ['was','have been','being','to be'],
        ans: 1,
        exp: '<span class="exp-key">have been（現在完成式，與複數主詞 records 一致，表延續至今的狀態）</span>──主詞 records 為複數，且句意強調「持續超過一世紀」，須用現在完成式 have been。<br>❌ was 為單數過去式；being/to be 非完整動詞，不能作主要動詞。' },
      { q: 'Researchers concluded that the low error rate _______ achieved through teamwork rather than technology.',
        opts: ['be','have been','must have been','being'],
        ans: 2,
        exp: '<span class="exp-key">must have been（must have been + p.p. 表對過去事實的推測）</span>──must have been achieved = 一定是被達成的（對過去事實的肯定推測），句意為「這麼低的錯誤率一定是靠團隊合作而非科技達成的」。<br>❌ be（表對現在的推測，時態不符）；have been 缺乏推測語氣的 must；being 非完整動詞形式。' },
      { q: 'Harvard Business School, _______ studied the dabbawala system closely, was deeply impressed by its efficiency.',
        opts: ['who','whom','which','that'],
        ans: 2,
        exp: '<span class="exp-key">which（關係代名詞，引導非限定子句，代替 Harvard Business School）</span>──逗號後的非限定關係子句須用 which，先行詞 Harvard Business School 為機構（事物），不可用 who/whom。<br>❌ who/whom 用於指人；that 不可用於逗號後的非限定子句。' },
      { q: 'The dabbawalas decided to deliver the boxes by bicycle, _______ revealed how flexible their system truly was.',
        opts: ['what','that','which','who'],
        ans: 2,
        exp: '<span class="exp-key">which（關係代名詞，代替前面整句話作主詞）</span>──which 代替「dabbawalas 決定用腳踏車送貨」這件事，引導補充說明的子句，相當於 and this revealed。<br>❌ what 不能有先行詞；that 不可用於逗號後的非限定子句；who 用於指人。' },
      { q: 'FedEx executives admired the dabbawala system, _______ of the fact that it relies on no advanced technology.',
        opts: ['regard','regarding','regardless','regarded'],
        ans: 2,
        exp: '<span class="exp-key">regardless（regardless of = 不顧；不論，固定片語）</span>──regardless of sth. = 不論…如何，句意為「不論該系統完全不依賴先進科技這一事實」。<br>❌ regard（動詞「視為」）、regarding（介系詞「關於」）、regarded（過去分詞）均無法與 of 構成此固定搭配表「不論」之意。' },
      { q: 'If the dabbawalas had not developed such a precise coding system, mistakes _______ far more common.',
        opts: ['would not be','would not have been','will not be','had not been'],
        ans: 1,
        exp: '<span class="exp-key">would not have been（與過去事實相反的假設語氣，主要子句用 would + have + p.p.）</span>──If 子句用過去完成式（had not developed），主要子句須用 would not have been，表「若當初沒有……，就不會……」。<br>❌ would not be（與現在事實相反）；will not be（直述句）；had not been（與 if 子句重複過去完成式）。' },
      { q: 'It was the dabbawalas\' teamwork _______ enabled the system to function with such remarkable accuracy.',
        opts: ['who','whom','which','what'],

// ── RENDER ────────────────────────────────────────────────
let globalQNum = 0;
const qMap = {}; // qNum → { ans, exp }
const userAnswers = {};
let submitted = false;

const container = document.getElementById('quiz-container');

function render() {
  container.innerHTML = '';
  globalQNum = 0;
  sections.forEach((sec, si) => {
    const secDiv = document.createElement('div');
    secDiv.className = 'section';
    let html = `<div class="section-header">${sec.title} <span class="pts">（${sec.pts}）</span></div>`;
    if (sec.passage) {
      html += `<div class="passage"><div class="passage-label">📖 閱讀文章</div>${sec.passage}</div>`;
    }
    sec.questions.forEach((q, qi) => {
      globalQNum++;
      const n = globalQNum;
      qMap[n] = { ans: q.ans, exp: q.exp };
      const labels = ['A','B','C','D'];
      let optHtml = '';
      q.opts.forEach((o, i) => {
        optHtml += `<div class="option" id="opt-${n}-${labels[i]}" onclick="choose(${n},${i})">`
          + `<span class="option-label">(${labels[i]})</span>${o}</div>`;
      });
      let qLabel = n;
      if (si === 2 || si === 3) qLabel = `(${n})`;
      html += `<div class="question" id="q${n}">
        <div class="q-text"><span class="q-num">${qLabel}.</span> ${q.q}</div>
        <div class="options">${optHtml}</div>
        <div class="explanation" id="exp${n}">
          <div class="exp-header">💡 解析</div>
          <div class="exp-body">${q.exp}</div>
        </div>
      </div>`;
    });
    secDiv.innerHTML = html;
    container.appendChild(secDiv);
  });
}

render();

// ── LOGIC ─────────────────────────────────────────────────
function choose(n, chosenIdx) {
  if (submitted) return;
  const labels = ['A','B','C','D'];
  const chosen = labels[chosenIdx];
  userAnswers[n] = chosenIdx;
  const ans = qMap[n].ans;

  labels.forEach((l, i) => {
    const el = document.getElementById(`opt-${n}-${l}`);
    el.classList.remove('selected','correct','wrong','reveal-correct');
    if (i === chosenIdx) {
      if (chosenIdx === ans) el.classList.add('correct');
      else el.classList.add('wrong');
    } else if (i === ans && chosenIdx !== ans) {
      el.classList.add('reveal-correct');
    }
  });

  document.getElementById(`exp${n}`).classList.add('show');
  updateTopBar();
}

function updateTopBar() {
  const count = Object.keys(userAnswers).length;
  document.getElementById('answered-count').textContent = count;
  document.getElementById('progress-fill').style.width = (count / 50 * 100) + '%';
  let score = 0;
  for (let q in userAnswers) { if (userAnswers[q] === qMap[q].ans) score += 2; }
  document.getElementById('live-score').textContent = score;
}

function revealAll() {
  const labels = ['A','B','C','D'];
  for (let n = 1; n <= 50; n++) {
    const ans = qMap[n].ans;
    labels.forEach((l, i) => {
      const el = document.getElementById(`opt-${n}-${l}`);
      el.classList.remove('selected','correct','wrong','reveal-correct');
      if (i === ans) el.classList.add('reveal-correct');
      else if (userAnswers[n] === i && i !== ans) el.classList.add('wrong');
    });
    document.getElementById(`exp${n}`).classList.add('show');
  }
  updateTopBar();
}

function submitAll() {
  submitted = true;
  revealAll();
  let score = 0;
  for (let n = 1; n <= 50; n++) {
    if (userAnswers[n] === qMap[n].ans) score += 2;
  }
  const rb = document.getElementById('result-box');
  rb.classList.add('show');
  document.getElementById('result-score').textContent = score;
  const gr = document.getElementById('result-grade');
  const det = document.getElementById('result-detail');
  if (score >= 90) { gr.textContent = '🏆 優秀！'; gr.className = 'result-grade grade-a'; det.textContent = '表現卓越，繼續保持！'; }
  else if (score >= 70) { gr.textContent = '👍 良好'; gr.className = 'result-grade grade-b'; det.textContent = '表現不錯，再複習錯誤的題目吧！'; }
  else { gr.textContent = '📚 需加強'; gr.className = 'result-grade grade-c'; det.textContent = '多複習解析說明，你可以做到的！'; }
  document.getElementById('answered-count').textContent = 50;
  document.getElementById('live-score').textContent = score;
  document.getElementById('progress-fill').style.width = '100%';
  rb.scrollIntoView({ behavior: 'smooth' });
}

function resetAll() {
  submitted = false;
  for (let key in userAnswers) delete userAnswers[key];
  const labels = ['A','B','C','D'];
  for (let n = 1; n <= 50; n++) {
    labels.forEach(l => {
      document.getElementById(`opt-${n}-${l}`).classList.remove('selected','correct','wrong','reveal-correct');
    });
    document.getElementById(`exp${n}`).classList.remove('show');
  }
  document.getElementById('result-box').classList.remove('show');
  document.getElementById('answered-count').textContent = '0';
  document.getElementById('live-score').textContent = '0';
  document.getElementById('progress-fill').style.width = '0%';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
