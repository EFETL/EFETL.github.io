<!DOCTYPE html>
<html lang="zh-TW">
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/favicon.svg">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第一大題 複誦 ｜ GEPT 初級口說 第三回</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f9fafb;min-height:100vh;color:#1f2937}
header{background:#fff;border-bottom:1px solid #e5e7eb;padding:13px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.logo{font-weight:700;font-size:15px;color:#2563eb;flex-shrink:0}
.badge{font-size:11px;background:#2563eb;color:#fff;padding:3px 10px;border-radius:99px;font-weight:700}
.prog-wrap{flex:1;background:#e5e7eb;border-radius:99px;height:5px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#2563eb,#7c3aed);border-radius:99px;transition:width .5s}
.wrap{max-width:640px;margin:0 auto;padding:24px 16px 60px}
.ph{background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;border-radius:14px;padding:18px 20px;margin-bottom:18px}
.ph h2{font-size:1.1rem;font-weight:800;margin-bottom:4px}
.ph p{font-size:.82rem;opacity:.9}
.card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 4px 16px rgba(0,0,0,.07)}
.qnum{font-size:11px;color:#9ca3af;font-weight:700;letter-spacing:1px;margin-bottom:16px}

/* TTS 播音區 */
.speak-box{text-align:center;padding:28px 0 20px}
.speak-box .icon{font-size:3rem;margin-bottom:10px}
.speak-box .lbl{font-size:14px;font-weight:700;color:#2563eb;margin-bottom:6px}
.speak-box .sub{font-size:13px;color:#9ca3af;margin-bottom:10px}
.speak-box .cd{font-size:1.5rem;font-weight:900;color:#2563eb}

/* 錄音區 */
.timer-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.timer-lbl{font-size:13px;color:#4b5563}
.timer-val{font-size:2rem;font-weight:900;font-variant-numeric:tabular-nums;color:#2563eb}
.timer-val.warn{color:#f59e0b}
.timer-val.danger{color:#ef4444}
.rec-indicator{display:flex;align-items:center;gap:7px;font-size:13px;color:#ef4444;font-weight:600;margin-bottom:10px}
.rec-dot{width:9px;height:9px;background:#ef4444;border-radius:50%;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.transcript{background:#f9fafb;border:2px solid #e5e7eb;border-radius:10px;padding:11px 14px;min-height:56px;font-size:.9rem;color:#4b5563;line-height:1.65;margin-bottom:12px}

/* 按鈕 */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:all .2s}
.btn-p{background:#2563eb;color:#fff}.btn-p:hover{background:#1d4ed8}
.btn-r{background:#ef4444;color:#fff}.btn-r:hover{background:#dc2626}
.btn-o{background:#fff;color:#2563eb;border:2px solid #2563eb}.btn-o:hover{background:#eff6ff}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}

/* 關鍵字 */
.kw-label{font-size:12px;color:#9ca3af;margin-bottom:6px}
.kw-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.kw{font-size:12px;padding:3px 10px;border-radius:99px;font-weight:600;border:1.5px solid #e5e7eb;background:#f3f4f6;color:#4b5563}
.kw.hit{background:#d1fae5;color:#065f46;border-color:#6ee7b7}
.kw.miss{background:#fee2e2;color:#991b1b;border-color:#fca5a5}
.chip{display:inline-block;padding:4px 14px;border-radius:99px;font-size:13px;font-weight:700;margin-bottom:10px}
.chip.A{background:#d1fae5;color:#065f46}
.chip.B{background:#dbeafe;color:#1e40af}
.chip.C{background:#fef3c7;color:#92400e}
.chip.D{background:#fee2e2;color:#991b1b}

/* 答案框 */
.answer-box{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:13px 15px;margin-bottom:12px}
.answer-box .answer-lbl{font-size:11px;color:#166534;font-weight:700;letter-spacing:.5px;margin-bottom:7px}
.answer-box .answer-text{font-size:1.05rem;font-weight:700;color:#166534;line-height:1.65;margin-bottom:8px}

/* 成績 */
.result-card{background:#fff;border-radius:14px;padding:28px;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.07);margin-bottom:14px}
.score-big{font-size:3.5rem;font-weight:900;color:#2563eb;line-height:1}
.score-den{font-size:1rem;color:#9ca3af}
.score-grade{font-size:1rem;font-weight:700;margin-top:10px}

.back{display:inline-block;margin-bottom:14px;font-size:13px;color:#6b7280;text-decoration:none}
.back:hover{color:#2563eb}
</style>
</head>
<body>
<header>
  <div class="logo">🎙️ GEPT 初級口說</div>
  <div class="badge">第一大題</div>
  <div class="prog-wrap"><div class="prog-fill" id="prog" style="width:0%"></div></div>
</header>

<div class="wrap">
  <a class="back" href="speaking3.html">← 返回口說測驗</a>
  <div class="ph">
    <h2>第一大題　複誦 Repetition</h2>
    <p>系統播出句子兩次，播音結束後立即複誦。每題 15 秒。</p>
  </div>

  <!-- 測驗中 -->
  <div id="quiz-area">
    <div class="card">
      <div class="qnum" id="qnum">題 1 / 5</div>

      <!-- 播音區 -->
      <div class="speak-box" id="speak-box">
        <div id="speak-ready">
          <div class="icon">🎧</div>
          <div class="lbl" style="color:#1f2937;margin-bottom:14px">準備好了嗎？</div>
          <button class="btn btn-p" onclick="startPlay()">▶ 播放題目</button>
        </div>
        <div id="speak-playing" style="display:none">
          <div class="icon">🔊</div>
          <div class="lbl">正在播放題目</div>
          <div class="sub">第 <span id="play-count">1</span> 次 ／ 共 2 次</div>
          <div class="cd" id="speak-cd">播放中…</div>
        </div>
      </div>

      <!-- 錄音區 -->
      <div id="rec-area" style="display:none">
        <div class="timer-row">
          <div class="timer-lbl">複誦時間</div>
          <div class="timer-val danger" id="rec-timer">0:15</div>
        </div>
        <div class="rec-indicator"><span class="rec-dot"></span>錄音中 Recording...</div>
        <div class="transcript" id="transcript"><span style="color:#9ca3af;font-style:italic">正在聆聽您的聲音…</span></div>
        <div class="btn-row">
          <button class="btn btn-r" onclick="stopManual()">⏹ 停止錄音</button>
        </div>
      </div>

      <!-- 結果區 -->
      <div id="result-area" style="display:none">
        <div class="kw-label">關鍵字命中 Keywords:</div>
        <div class="kw-row" id="kw-row"></div>
        <div id="score-chip"></div>
        <div class="answer-box">
          <div class="answer-lbl">✦ 正確句子 Correct Sentence</div>
          <div class="answer-text" id="answer-text"></div>
          <button class="btn btn-o" style="font-size:12px;padding:6px 14px" onclick="playAnswer()">🔊 再聽一次</button>
        </div>
        <div class="btn-row">
          <button class="btn btn-p" id="next-btn" onclick="nextQ()">下一題 →</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 完成畫面 -->
  <div id="done-area" style="display:none">
    <div class="result-card">
      <div style="font-size:13px;color:#9ca3af;margin-bottom:8px">第一大題得分</div>
      <div><span class="score-big" id="final-score">0</span><span class="score-den"> / 30</span></div>
      <div class="score-grade" id="final-grade"></div>
    </div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
      <button class="btn btn-o" onclick="restart()">↩ 重新練習</button>
      <a class="btn btn-p" href="speaking3-p2.html">進入第二大題 →</a>
    </div>
  </div>
</div>

<script>
const QS = [
  {t:"The bakery sells delicious bread and sweet cookies.", kw:["bakery","sells","delicious","bread","cookies"]},
  {t:"She bought fresh carrots and corn at the market.", kw:["bought","fresh","carrots","corn","market"]},
  {t:"My dad loves to cook barbecue on the weekend.", kw:["dad","loves","cook","barbecue","weekend"]},
  {t:"The chocolate cake at this cafe looks very beautiful.", kw:["chocolate","cake","cafe","beautiful"]},
  {t:"We need to buy some butter and cream for the recipe.", kw:["buy","butter","cream","recipe"]}
];

let qi=0, scores=[], recog=null, recording=false, recTimer=null, curFinal='', bestVoice=null;

// ── 語音 ──
const VOICE_PREF=['Google US English','Ava (Enhanced)','Allison (Enhanced)','Samantha (Enhanced)','Ava','Allison','Samantha','Karen','Moira'];
function loadVoices(){
  const vs=window.speechSynthesis.getVoices().filter(v=>/^en/.test(v.lang));
  for(const name of VOICE_PREF){ const v=vs.find(v=>v.name===name); if(v){bestVoice=v;return;} }
  bestVoice=vs.find(v=>v.lang==='en-US')||vs[0]||null;
}
window.speechSynthesis.onvoiceschanged=loadVoices;
loadVoices();

function tts(text, rate=0.85){
  window.speechSynthesis.cancel();
  setTimeout(()=>{
    const u=new SpeechSynthesisUtterance(text);
    u.lang='en-US'; u.rate=rate;
    if(bestVoice) u.voice=bestVoice;
    window.speechSynthesis.speak(u);
  },200);
}

function speakTwice(text, onDone){
  window.speechSynthesis.cancel();
  let cnt=0;
  const go=()=>{
    cnt++;
    document.getElementById('play-count').textContent=String(cnt);
    document.getElementById('speak-cd').textContent='播放中…';
    const u=new SpeechSynthesisUtterance(text);
    u.lang='en-US'; u.rate=0.85;
    if(bestVoice) u.voice=bestVoice;
    if(cnt<2){
      u.onend=()=>{ document.getElementById('speak-cd').textContent='準備第 2 次…'; setTimeout(go,1500); };
    } else {
      u.onend=()=>onDone();
    }
    window.speechSynthesis.speak(u);
  };
  setTimeout(go,300);
}

// ── 題目 ──
function loadQ(i){
  const q=QS[i];
  document.getElementById('prog').style.width=(i/QS.length*100)+'%';
  document.getElementById('qnum').textContent=`題 ${i+1} / ${QS.length}`;
  document.getElementById('speak-box').style.display='block';
  document.getElementById('rec-area').style.display='none';
  document.getElementById('result-area').style.display='none';
  document.getElementById('play-count').textContent='1';
  document.getElementById('speak-ready').style.display='block';
  document.getElementById('speak-playing').style.display='none';
  curFinal='';
}

function startPlay(){
  document.getElementById('speak-ready').style.display='none';
  document.getElementById('speak-playing').style.display='block';
  speakTwice(QS[qi].t, ()=>startRec(QS[qi]));
}

// ── 錄音 ──
function startRec(q){
  document.getElementById('speak-box').style.display='none';
  document.getElementById('rec-area').style.display='block';
  document.getElementById('transcript').innerHTML='<span style="color:#9ca3af;font-style:italic">正在聆聽您的聲音…</span>';
  curFinal=''; recording=true;

  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(SR){
    recog=new SR();
    recog.lang='en-US'; recog.continuous=true; recog.interimResults=true;
    recog.onresult=e=>{
      let fin='',intr='';
      for(let i=e.resultIndex;i<e.results.length;i++){
        if(e.results[i].isFinal) fin+=e.results[i][0].transcript+' ';
        else intr+=e.results[i][0].transcript;
      }
      curFinal+=fin;
      document.getElementById('transcript').innerHTML=
        (curFinal?`<span>${curFinal}</span>`:'')+
        (intr?`<span style="color:#9ca3af">${intr}</span>`:'<span style="color:#9ca3af;font-style:italic">正在聆聽…</span>');
    };
    recog.onerror=()=>{};
    recog.onend=()=>{ if(recording){ try{recog.start();}catch(e){} } };
    try{ recog.start(); }catch(e){}
  }

  let rem=15;
  setTimer(rem);
  clearInterval(recTimer);
  recTimer=setInterval(()=>{
    rem--;
    setTimer(rem);
    if(rem<=0){ clearInterval(recTimer); if(recording) scoreQ(q); }
  },1000);
}

function setTimer(rem){
  const el=document.getElementById('rec-timer');
  el.textContent='0:'+String(rem).padStart(2,'0');
  el.className='timer-val'+(rem<=5?' danger':rem<=10?' warn':'');
}

function stopManual(){ if(recording) scoreQ(QS[qi]); }

// ── 評分 ──
function scoreQ(q){
  clearInterval(recTimer);
  recording=false;
  if(recog){ try{recog.stop();}catch(e){} recog=null; }
  window.speechSynthesis.cancel();

  const words=curFinal.toLowerCase().split(/\s+/).map(w=>w.replace(/[^a-z']/g,'')).filter(Boolean);
  const res=q.kw.map(k=>({k,hit:words.some(w=>w===k||w.startsWith(k)||k.startsWith(w))}));
  const pct=Math.round(res.filter(r=>r.hit).length/q.kw.length*100);
  scores.push(pct);

  document.getElementById('rec-area').style.display='none';
  document.getElementById('result-area').style.display='block';
  document.getElementById('kw-row').innerHTML=res.map(r=>`<span class="kw ${r.hit?'hit':'miss'}">${r.k}</span>`).join('');

  let cls,lbl;
  if(pct>=80){cls='A';lbl='優秀 Excellent';}
  else if(pct>=60){cls='B';lbl='良好 Good';}
  else if(pct>=40){cls='C';lbl='尚可 Fair';}
  else{cls='D';lbl='需加強 Practice More';}
  document.getElementById('score-chip').innerHTML=`<span class="chip ${cls}">${pct}% · ${lbl}</span>`;
  document.getElementById('answer-text').textContent=q.t;
  document.getElementById('next-btn').textContent=qi===QS.length-1?'查看成績 →':'下一題 →';
  tts(q.t);
}

function playAnswer(){ tts(QS[qi].t); }

function nextQ(){
  qi++;
  if(qi<QS.length){ loadQ(qi); }
  else{ showDone(); }
}

function showDone(){
  document.getElementById('quiz-area').style.display='none';
  document.getElementById('done-area').style.display='block';
  document.getElementById('prog').style.width='100%';
  const avg=Math.round(scores.reduce((a,b)=>a+b,0)/scores.length);
  const pts=Math.round(avg*0.3);
  document.getElementById('final-score').textContent=pts;
  let g;
  if(avg>=80) g='🏆 優等';
  else if(avg>=60) g='👍 良好';
  else if(avg>=40) g='📚 尚可';
  else g='💪 需加強';
  document.getElementById('final-grade').textContent=g;
  sessionStorage.setItem('p1score',pts);
}

function restart(){
  qi=0; scores=[];
  document.getElementById('done-area').style.display='none';
  document.getElementById('quiz-area').style.display='block';
  loadQ(0);
}

// 啟動
loadQ(0);
</script>
</body>
</html>
