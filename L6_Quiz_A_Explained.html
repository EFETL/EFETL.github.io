<script>
// ── DATA ──────────────────────────────────────────────────
const sections = [
  {
    title: '第一大題：字彙選擇',
    pts: '15 題 × 2 分 = 30 分',
    questions: [
      { q: 'Thousands of protesters _______ through the city center to demand equal rights.',
        opts: ['marched','outlined','withered','exiled'],
        ans: 'A',
        exp: '<span class="exp-key">marched（行進；遊行）</span>──數千名抗議者「遊行」穿過市中心要求平等權利，march 為動詞。<br>❌ outlined = 概述；withered = 凋謝；exiled = 流放，語境均不符。' },
      { q: 'The Lincoln _______ in Washington, DC, attracts millions of visitors every year.',
        opts: ['Captivity','Memorial','Segregation','Mobility'],
        ans: 'B',
        exp: '<span class="exp-key">Memorial（紀念碑）</span>──Lincoln Memorial（林肯紀念堂）為專有名詞，每年吸引大量遊客。<br>❌ Captivity = 囚禁；Segregation = 隔離；Mobility = 流動性，皆非地標名稱。' },
      { q: 'In his speech, the mayor _______ his plans for improving public transportation.',
        opts: ['outlined','cripple','grant','rob'],
        ans: 'A',
        exp: '<span class="exp-key">outlined（概述）</span>──市長在演說中「概述」其改善大眾運輸的計畫，outline 常接 plans/hopes 等受詞。<br>❌ cripple = 使殘廢；grant = 授予；rob = 搶劫，均不能搭配 plans。' },
      { q: '_______ is a serious social problem that still affects many countries today.',
        opts: ['Racism','Dignity','Fatigue','Eloquence'],
        ans: 'A',
        exp: '<span class="exp-key">Racism（種族主義）</span>──種族主義至今仍是許多國家嚴重的社會問題，符合課文主題。<br>❌ Dignity = 尊嚴；Fatigue = 疲勞；Eloquence = 口才，均與「社會問題」無關。' },
      { q: 'The new policy will _______ equal pay to all employees regardless of gender.',
        opts: ['grant','wither','exile','segregate'],
        ans: 'A',
        exp: '<span class="exp-key">grant（授予；准予）</span>──grant equal pay to sb. = 給予某人同等薪資，課文用法 grant new rights to African Americans。<br>❌ wither = 凋謝；exile = 流放；segregate = 隔離，語意均不合。' },
      { q: 'The candle\'s _______ flickered weakly before finally going out.',
        opts: ['flame','warrior','symphony','conscience'],
        ans: 'A',
        exp: '<span class="exp-key">flame（火焰）</span>──蠟燭的「火焰」微弱地閃爍後熄滅，符合語境。<br>❌ warrior = 戰士；symphony = 交響曲；conscience = 良心，均與蠟燭無關。' },
      { q: 'Without water, the plants in the garden began to _______ within days.',
        opts: ['wither','march','outline','rob'],
        ans: 'A',
        exp: '<span class="exp-key">wither（凋謝；枯萎）</span>──沒有水分，花園裡的植物幾天內便開始「枯萎」。<br>❌ march = 行進；outline = 概述；rob = 搶劫，均不符植物的狀態。' },
      { q: 'After years in _______, the prisoner was finally released and reunited with his family.',
        opts: ['captivity','memorial','symphony','mobility'],
        ans: 'A',
        exp: '<span class="exp-key">captivity（囚禁）</span>──in captivity = 被囚禁中，囚犯多年被囚後終於獲釋與家人團聚。<br>❌ memorial = 紀念碑；symphony = 交響曲；mobility = 流動性，均與囚禁無關。' },
      { q: 'The car accident left him permanently _______ and unable to walk.',
        opts: ['crippled','exiled','granted','outlined'],
        ans: 'A',
        exp: '<span class="exp-key">crippled（使殘廢的）</span>──車禍使他永久殘廢、無法行走，cripple 作過去分詞當形容詞。<br>❌ exiled = 被流放；granted = 被授予；outlined = 被概述，語意均不符。' },
      { q: 'During apartheid, racial _______ kept black and white South Africans apart in daily life.',
        opts: ['segregation','captivity','dignity','rhetoric'],
        ans: 'A',
        exp: '<span class="exp-key">segregation（隔離；種族隔離）</span>──種族隔離制度將南非黑人與白人在日常生活中分開，racial segregation 為課文核心詞彙。<br>❌ captivity = 囚禁；dignity = 尊嚴；rhetoric = 修辭，語意均不符。' },
      { q: 'After losing everything in the war, the family found themselves alone in the _______ of a strange city.',
        opts: ['midst','flame','warrior','symphony'],
        ans: 'A',
        exp: '<span class="exp-key">midst（中間；之中）</span>──in the midst of = 在…之中，課文原句 a lonely island ... in the midst of a vast ocean。<br>❌ flame = 火焰；warrior = 戰士；symphony = 交響曲，均不搭配 of a city。' },
      { q: 'Many refugees live in _______, far from their homeland, hoping to return one day.',
        opts: ['exile','captivity','dignity','fatigue'],
        ans: 'A',
        exp: '<span class="exp-key">exile（流亡；放逐）</span>──live in exile = 流亡在外，許多難民流亡他鄉，盼有朝一日返鄉。<br>❌ captivity = 囚禁；dignity = 尊嚴；fatigue = 疲勞，語意均不符。' },
      { q: 'It was _______ of the company to fire workers just before the holidays.',
        opts: ['shameful','eloquent','vicious','rhetorical'],
        ans: 'A',
        exp: '<span class="exp-key">shameful（可恥的；丟臉的）</span>──公司在假期前解雇員工的行為「可恥」，符合語境。<br>❌ eloquent = 雄辯的；vicious = 兇惡的；rhetorical = 修辭的，均不符道德評價語境。' },
      { q: 'After the long flight, she felt extreme _______ and went straight to bed.',
        opts: ['fatigue','dignity','oppression','mobility'],
        ans: 'A',
        exp: '<span class="exp-key">fatigue（疲勞；疲倦）</span>──長途飛行後感到極度疲勞，直接上床睡覺，課文原句 heavy with the fatigue of travel。<br>❌ dignity = 尊嚴；oppression = 壓迫；mobility = 流動性，語意均不符。' },
      { q: 'The thief tried to _______ the old woman of her purse on the crowded train.',
        opts: ['rob','wither','exile','segregate'],
        ans: 'A',
        exp: '<span class="exp-key">rob（搶劫；剝奪）</span>──rob sb. of sth. = 搶奪某人的某物，小偷企圖在擁擠的火車上搶老婦人的錢包。<br>❌ wither = 凋謝；exile = 流放；segregate = 隔離，均不接 sb. of sth. 結構。' },
      { q: 'Every human being deserves to be treated with respect and _______, regardless of background.',
        opts: ['dignity','captivity','fatigue','segregation'],
        ans: 'A',
        exp: '<span class="exp-key">dignity（尊嚴）</span>──每個人都應該被尊重且有尊嚴地對待，treated with dignity 為固定搭配，課文核心詞彙。<br>❌ captivity = 囚禁；fatigue = 疲勞；segregation = 隔離，語意均不符。' },
    ]
  },
  {
    title: '第二大題：文法選擇',
    pts: '15 題 × 2 分 = 30 分',
    questions: [
      { q: '_______ Dr. King not made the speech, the civil rights movement might have progressed much more slowly.',
        opts: ['Had','If','Should','Unless'],
        ans: 'A',
        exp: '<span class="exp-key">Had（與過去事實相反假設句的倒裝）</span>──Had + S + 過去分詞 = If + S + had + p.p. 的倒裝形式，課文原句：Had Dr. King not made the speech, the United States might not have introduced...。<br>❌ If 需搭配 had（If Dr. King had not made…）才完整；Should 用於條件句倒裝表「萬一」；Unless = 除非，均不符此倒裝結構。' },
      { q: 'The crowd of over 250,000 people gathered _______ the Lincoln Memorial to hear the speech.',
        opts: ['before','among','between','beneath'],
        ans: 'A',
        exp: '<span class="exp-key">before（在…前面）</span>──25萬人聚集在林肯紀念堂「前」聆聽演說，before 表示位置在…之前。<br>❌ among = 在（三者以上）之中；between = 在（兩者）之間；beneath = 在…正下方，均不符空間關係。' },
      { q: 'The speech turned out _______ a turning point in American history.',
        opts: ['to be','being','be','been'],
        ans: 'A',
        exp: '<span class="exp-key">to be</span>──turn out to be + N/adj. = 結果證明是…，固定句型，課文原句：That speech turned out to be a decisive moment。<br>❌ being（動名詞）、be（原形）、been（過去分詞）均不符合 turn out 的固定搭配。' },
      { q: 'King hoped for a future in _______ people would be judged by their character, not their skin color.',
        opts: ['which','that','where','what'],
        ans: 'A',
        exp: '<span class="exp-key">which（介係詞 + 關係代名詞）</span>──in which 引導形容詞子句修飾 a future，相當於 in that future。<br>❌ that 不可緊接在介係詞後；where 雖可表地方，但 future 為時間概念，搭配 in which 較正確；what 不能引導形容詞子句。' },
      { q: '_______ rooted in the American dream, King\'s vision inspired generations of activists.',
        opts: ['Deeply','Deep','Deepen','Deepness'],
        ans: 'A',
        exp: '<span class="exp-key">Deeply（深深地，副詞）</span>──副詞修飾過去分詞 rooted，deeply rooted in = 深植於，課文原句：It is a dream deeply rooted in the American dream。<br>❌ Deep（形容詞/副詞但較少修飾rooted）、Deepen（動詞）、Deepness（名詞），文法上均不適合修飾分詞。' },
      { q: 'We will never be satisfied _______ injustice continues to exist in our society.',
        opts: ['as long as','as soon as','even though','as if'],
        ans: 'A',
        exp: '<span class="exp-key">as long as（只要）</span>──表示條件持續存在，課文重複句型：We can never be satisfied as long as...。<br>❌ as soon as = 一…就…；even though = 雖然；as if = 彷彿，均不符「條件持續」的語意。' },
      { q: 'King\'s speech _______ the consciences of millions of Americans who had ignored racial injustice.',
        opts: ['awoke','awoken','awaking','awake'],
        ans: 'A',
        exp: '<span class="exp-key">awoke（awake 的過去式）</span>──全文以過去式敘述歷史事件，課文原句：his rhetorical skills awoke the consciences of many Americans。<br>❌ awoken（過去分詞，需搭配助動詞）、awaking（現在分詞）、awake（原形/形容詞），時態或詞性均不符。' },
      { q: 'Although King\'s dream _______ yet to be fully realized, his words continue to inspire people today.',
        opts: ['has','have','had','having'],
        ans: 'A',
        exp: '<span class="exp-key">has（現在完成式，主詞為 dream，第三人稱單數）</span>──have yet to V = 尚未…，課文原句：Although Dr. King\'s dream has yet to be fully realized。<br>❌ have 用於複數主詞或 I/you；had 為過去完成式，與「至今仍未實現」的現在完成語境不符；having 為動名詞，不能作句子主要動詞。' },
      { q: '"I Have a Dream" was to civil rights supporters _______ a battle cry is to a warrior.',
        opts: ['what','that','which','how'],
        ans: 'A',
        exp: '<span class="exp-key">what（A is to B what C is to D 句型）</span>──A be to B what C is to D = A對B而言，就如同C對D一樣，課文原句直接呈現此固定句型。<br>❌ that/which/how 均無法構成此「比喻關係」的固定句型。' },
      { q: 'The speech will likely continue to inspire people _______ inequality exists in the world.',
        opts: ['as long as','unless','although','in case'],
        ans: 'A',
        exp: '<span class="exp-key">as long as（只要）</span>──只要不平等仍然存在，這篇演說就會持續激勵世人，課文最後一句的同義改寫。<br>❌ unless = 除非；although = 雖然；in case = 以防萬一，語意邏輯均不符。' },
      { q: 'A great American, _______ symbolic shadow the crowd stood, had signed the Emancipation Proclamation a century earlier.',
        opts: ['in whose','in which','whose','who'],
        ans: 'A',
        exp: '<span class="exp-key">in whose（介係詞 + whose + 名詞）</span>──in whose symbolic shadow we stand = 我們站在他象徵性的身影之下，whose 表所有格，符合課文原句結構。<br>❌ in which 後不能直接接名詞 symbolic shadow（因 which 不具所有格功能）；whose 單獨使用前面缺介係詞；who 為主格，文法不合。' },
      { q: 'It is essential that every citizen _______ treated equally under the law.',
        opts: ['be','is','was','being'],
        ans: 'A',
        exp: '<span class="exp-key">be（虛擬語氣原形動詞）</span>──It is essential/important that + S + (should) + 原形動詞，表示「應該」之意，為虛擬語氣的固定句型。<br>❌ is/was 為直陳語氣的時態變化，不符虛擬語氣；being 為動名詞，不能作子句的主要動詞。' },
      { q: 'Not until the law was passed _______ African Americans gain full voting rights.',
        opts: ['did','had','have','were'],
        ans: 'A',
        exp: '<span class="exp-key">did（Not until 句首倒裝，借助動詞 did）</span>──Not until... + 助動詞 + S + 原形V，為否定副詞片語置於句首引發的倒裝句。<br>❌ had/have 為完成式助動詞，與此句時態不搭；were 為be動詞過去式，不能搭配原形 gain。' },
      { q: 'The protesters, _______ numbers had grown to thousands, marched peacefully through the streets.',
        opts: ['whose','who','which','that'],
        ans: 'A',
        exp: '<span class="exp-key">whose（所有格關係代名詞）</span>──whose numbers had grown = 其人數已增長到…，whose 修飾 protesters 並表示其所有關係。<br>❌ who/which/that 均為主格或受格關係代名詞，無法表達「人數的所有關係」。' },
      { q: 'King urged his followers _______ give up hope, no matter how difficult the road ahead might be.',
        opts: ['not to','to not','not','no to'],
        ans: 'A',

// ── RENDER ────────────────────────────────────────────────
let globalQNum = 0;
const qMap = {}; // qNum → { ans, exp }
const userAnswers = {};
let submitted = false;

const container = document.getElementById('quiz-container');

sections.forEach((sec, si) => {
  const secDiv = document.createElement('div');
  secDiv.className = 'section';
  let html = `<div class="section-header">${sec.title} <span class="pts">（${sec.pts}）</span></div>`;
  if (sec.passage) {
    html += `<div class="passage"><div class="passage-label">📖 閱讀文章</div>${sec.passage}</div>`;
  }
  sec.questions.forEach((q, qi) => {
    globalQNum++;
    const n = globalQNum;
    qMap[n] = { ans: q.ans, exp: q.exp };
    const labels = ['A','B','C','D'];
    let optHtml = '';
    q.opts.forEach((o, i) => {
      optHtml += `<div class="option" id="opt-${n}-${labels[i]}" onclick="choose(${n},'${labels[i]}')">`
        + `<span class="option-label">(${labels[i]})</span>${o}</div>`;
    });
    html += `<div class="question" id="q${n}">
      <div class="q-text"><span class="q-num">${n}.</span> ${q.q}</div>
      <div class="options">${optHtml}</div>
      <div class="explanation" id="exp${n}">
        <div class="exp-header">💡 解析</div>
        <div class="exp-body">${q.exp}</div>
      </div>
    </div>`;
  });
  secDiv.innerHTML = html;
  container.appendChild(secDiv);
});

// ── LOGIC ─────────────────────────────────────────────────
function choose(n, chosen) {
  if (submitted) return;
  userAnswers[n] = chosen;
  const ans = qMap[n].ans;
  const labels = ['A','B','C','D'];

  labels.forEach(l => {
    const el = document.getElementById(`opt-${n}-${l}`);
    el.classList.remove('selected','correct','wrong','reveal-correct');
    if (l === chosen) {
      if (chosen === ans) el.classList.add('correct');
      else el.classList.add('wrong');
    } else if (l === ans && chosen !== ans) {
      el.classList.add('reveal-correct');
    }
  });

  document.getElementById(`exp${n}`).classList.add('show');
  updateTopBar();
}

function updateTopBar() {
  const count = Object.keys(userAnswers).length;
  document.getElementById('answered-count').textContent = count;
  document.getElementById('progress-fill').style.width = (count / 50 * 100) + '%';
  let score = 0;
  for (let q in userAnswers) { if (userAnswers[q] === qMap[q].ans) score += 2; }
  document.getElementById('live-score').textContent = score;
}

function revealAll() {
  for (let n = 1; n <= 50; n++) {
    const ans = qMap[n].ans;
    const labels = ['A','B','C','D'];
    labels.forEach(l => {
      const el = document.getElementById(`opt-${n}-${l}`);
      el.classList.remove('selected','correct','wrong','reveal-correct');
      if (l === ans) el.classList.add('reveal-correct');
      else if (userAnswers[n] === l && l !== ans) el.classList.add('wrong');
    });
    document.getElementById(`exp${n}`).classList.add('show');
  }
  updateTopBar();
}

function submitAll() {
  submitted = true;
  revealAll();
  let score = 0;
  for (let n = 1; n <= 50; n++) {
    if (userAnswers[n] === qMap[n].ans) score += 2;
  }
  const rb = document.getElementById('result-box');
  rb.classList.add('show');
  document.getElementById('result-score').textContent = score;
  const gr = document.getElementById('result-grade');
  const det = document.getElementById('result-detail');
  if (score >= 90) { gr.textContent = '🏆 優秀！'; gr.className = 'result-grade grade-a'; det.textContent = '表現卓越，繼續保持！'; }
  else if (score >= 70) { gr.textContent = '👍 良好'; gr.className = 'result-grade grade-b'; det.textContent = '表現不錯，再複習錯誤的題目吧！'; }
  else { gr.textContent = '📚 需加強'; gr.className = 'result-grade grade-c'; det.textContent = '多複習解析說明，你可以做到的！'; }
  document.getElementById('answered-count').textContent = 50;
  document.getElementById('live-score').textContent = score;
  document.getElementById('progress-fill').style.width = '100%';
  rb.scrollIntoView({ behavior: 'smooth' });
}

function resetAll() {
  submitted = false;
  for (let key in userAnswers) delete userAnswers[key];
  for (let n = 1; n <= 50; n++) {
    const labels = ['A','B','C','D'];
    labels.forEach(l => {
      document.getElementById(`opt-${n}-${l}`).classList.remove('selected','correct','wrong','reveal-correct');
    });
    document.getElementById(`exp${n}`).classList.remove('show');
  }
  document.getElementById('result-box').classList.remove('show');
  document.getElementById('answered-count').textContent = '0';
  document.getElementById('live-score').textContent = '0';
  document.getElementById('progress-fill').style.width = '0%';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
