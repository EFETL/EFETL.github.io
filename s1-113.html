    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {

      font-size: 0.9rem;
      color: #718096;

    }

      margin: 0 auto 8px;
      background: #cbd5e0;
      border-radius: 999px;
      height: 10px;
      overflow: hidden;
    }

      transition: width 0.4s ease;

      text-align: center;
      font-size: 0.82rem;
      color: #718096;
      margin-top: 6px;
      margin-bottom: 28px;
    }

      background: #fff;
      border-radius: 14px;

      padding: 28px 28px 24px;

      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 14px;

      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.95rem;
    }

    .q-text {
      font-size: 1rem;
      line-height: 1.75;
      color: #2d3748;
    }

    .q-text em {
      font-style: normal;
      color: #718096;
      font-size: 0.9rem;
    }

    .options {
      list-style: none;
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .option-btn {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      cursor: pointer;
      background: #f7fafc;
      text-align: left;
      font-size: 0.95rem;
      line-height: 1.6;
      color: #2d3748;
      transition: background 0.18s, border-color 0.18s;
      width: 100%;
    }

    .option-btn:hover:not(:disabled) {
      background: #ecfdf5;
      border-color: #6ee7b7;
    }

    .option-btn:disabled { cursor: default; }

    .option-btn.selected-correct {
      background: #dcfce7;
      border-color: #22c55e;
      color: #166534;
      font-weight: 600;
    }

    .option-btn.selected-wrong {
      background: #fee2e2;
      border-color: #ef4444;
      color: #991b1b;
    }

    .option-btn.reveal-correct {
      background: #dcfce7;
      border-color: #22c55e;
      color: #166534;
    }

    .option-tag { font-weight: 700; min-width: 22px; }

    .result-icon { display: inline-block; margin-left: 8px; font-size: 1.1rem; }

    /* 解析 */
    .analysis-box {
      margin-top: 18px;
      background: #ecfdf5;
      border: 1px solid #a7f3d0;
      border-radius: 10px;
      padding: 16px 18px;
      display: none;
    }

    .analysis-box.visible { display: block; }

    .analysis-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: #065f46;
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }

    .analysis-text {
      font-size: 0.95rem;
      line-height: 1.8;
      color: #064e3b;
    }

    /* 查看更多補充 */
    .more-btn {
      margin-top: 14px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      background: #d1fae5;
      color: #065f46;
      border: none;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.18s;
    }

    .more-btn:hover { background: #a7f3d0; }

    .supplement-box {
      margin-top: 12px;
      background: #faf5ff;
      border: 1px solid #ddd6fe;
      border-radius: 10px;
      padding: 16px 18px;
      display: none;
    }

    .supplement-box.visible { display: block; }

    .supplement-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: #7c3aed;
      letter-spacing: 0.04em;
      margin-bottom: 10px;
    }

    .vocab-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .vocab-list li {
      font-size: 0.88rem;
      line-height: 1.7;
      color: #3b2f6e;
      padding-left: 16px;
      position: relative;
    }

    .vocab-list li::before {
      content: "●";
      position: absolute;
      left: 0;
      color: #7c3aed;
      font-size: 0.65rem;
      top: 5px;
    }

    /* Summary */
    #summary {
      display: none;
      max-width: 720px;
      margin: 0 auto;
      text-align: center;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.1);
      padding: 40px 32px;
    }

    #summary h2 { font-size: 1.6rem; color: #065f46; margin-bottom: 12px; }
    #summary .score-big { font-size: 3rem; font-weight: 800; color: #10b981; margin-bottom: 8px; }
    #summary p { color: #4a5568; font-size: 1rem; margin-bottom: 24px; }

    .reset-btn {
      padding: 12px 32px;
      background: linear-gradient(135deg, #10b981, #059669);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .reset-btn:hover { opacity: 0.88; }

    @media (max-width: 600px) {
      .card { padding: 20px 16px 18px; }
    }
  </style>
</head>

    analysis: `前半句提到他「無法自己選擇 (could not choose)」，代表分組方式是不挑人的、看運氣的，因此是「隨機地 (randomly)」。`,
    vocab: [
      `disappoint V 使失望；disappointed adj 感到失望的（修飾人）；disappointing adj 令人失望的（修飾物）`,
      `find out 發現/查明`,
      `place V 放置/分派`,
      `eligible adj 具備資格的；be eligible for + N / to V 有資格...`,
      `random adj 隨機的；randomly adv 隨機地；at random 隨機地`,
      `apparent adj 明顯的；apparently adv 顯然地（= obviously）`,
      `consequence N 後果/結果；consequently adv 因此（= as a result / therefore）`
    ]
  }
];

let answered = 0;
let correct  = 0;
const total  = questions.length;

function buildQuiz() {
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';

  questions.forEach((q, idx) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.id = `card-${idx}`;

    const optionsHTML = q.options.map(opt => `
      <li>
        <button class="option-btn" id="btn-${idx}-${opt.label}"
          onclick="selectAnswer(${idx}, '${opt.label}')">
          <span class="option-tag">(${opt.label})</span>
          <span><strong>${opt.text}</strong>　${opt.hint}</span>
        </button>
      </li>
    `).join('');

    card.innerHTML = `
      <div class="q-header">
        <div class="q-num">${q.id}</div>
        <div class="q-text">
          ${q.stem}<br>
          <em>${q.stem_zh}</em>
        </div>
      </div>
      <ul class="options">${optionsHTML}</ul>
      <div class="analysis-box" id="analysis-${idx}">
        <div class="analysis-label">📖 解析</div>
        <div class="analysis-text">${q.analysis}</div>
        <button class="more-btn" id="morebtn-${idx}" onclick="toggleSupp(${idx})">
          查看更多補充 <span class="arrow">▼</span>
        </button>
        <div class="supplement-box" id="supp-${idx}">
          <div class="supplement-label">📚 單字補充</div>
          <ul class="vocab-list">
            ${q.vocab.map(v => `<li>${v}</li>`).join('')}
          </ul>
        </div>
      </div>
    `;

    container.appendChild(card);
  });

  updateProgress();
}

function selectAnswer(idx, chosen) {
  const q = questions[idx];
  const card = document.getElementById(`card-${idx}`);
  const analysis = document.getElementById(`analysis-${idx}`);

  q.options.forEach(opt => {
    document.getElementById(`btn-${idx}-${opt.label}`).disabled = true;
  });

  const chosenBtn = document.getElementById(`btn-${idx}-${chosen}`);
  const isCorrect = chosen === q.answer;

  if (isCorrect) {
    chosenBtn.classList.add('selected-correct');
    chosenBtn.innerHTML += `<span class="result-icon">✅</span>`;
    card.classList.add('correct');
    correct++;
  } else {
    chosenBtn.classList.add('selected-wrong');
    chosenBtn.innerHTML += `<span class="result-icon">❌</span>`;
    card.classList.add('wrong');
    const correctBtn = document.getElementById(`btn-${idx}-${q.answer}`);
    correctBtn.classList.add('reveal-correct');
    correctBtn.innerHTML += `<span class="result-icon">✅</span>`;
  }

  analysis.classList.add('visible');
  answered++;
  updateProgress();

  if (answered === total) {
    setTimeout(showSummary, 600);
  }
}

function toggleSupp(idx) {
  const supp = document.getElementById(`supp-${idx}`);
  const btn  = document.getElementById(`morebtn-${idx}`);
  const isOpen = supp.classList.contains('visible');
  supp.classList.toggle('visible', !isOpen);
  btn.innerHTML = isOpen
    ? `查看更多補充 <span class="arrow">▼</span>`
    : `收起補充 <span class="arrow">▲</span>`;
  btn.setAttribute('onclick', `toggleSupp(${idx})`);
}

function updateProgress() {
  document.getElementById('progressBar').style.width = (answered / total * 100) + '%';
  document.getElementById('progressText').textContent = `已作答 ${answered} / ${total} 題`;
}

function showSummary() {
  document.getElementById('summary').style.display = 'block';
  document.getElementById('scoreDisplay').textContent = `${correct} / ${total}`;
  const pct = Math.round(correct / total * 100);
  document.getElementById('scoreMsg').textContent =
    pct === 100 ? `正確率 ${pct}%　太厲害了！全部答對！🏆`
    : pct >= 70  ? `正確率 ${pct}%　表現不錯！繼續保持！💪`
    :              `正確率 ${pct}%　多複習解析和補充，下次一定更好！📖`;
  document.getElementById('summary').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
  answered = 0;
  correct  = 0;
  document.getElementById('summary').style.display = 'none';
  buildQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
