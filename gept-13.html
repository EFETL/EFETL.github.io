<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/favicon.svg">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEPT 初級 閱讀測驗　第13回</title>
<style>
  :root{
    --blue:#2b8cff; --blue-dark:#1f6fe0;
    --coral:#ff7a59; --amber:#ffb02e; --pink:#ff5d8f;
    --bg:#f3f9ff; --card:#ffffff; --line:#e3edf9;
    --green:#22b573; --green-bg:#e4f8ef;
    --red:#ff5a5a; --red-bg:#ffecec;
    --gray:#6b7785;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Helvetica Neue","PingFang TC","Microsoft JhengHei",sans-serif;
    background:linear-gradient(180deg,#f0f7ff,#fff7f2 70%);color:#22303f;line-height:1.6;
    -webkit-text-size-adjust:100%;}
  .wrap{max-width:760px;margin:0 auto;padding:16px;}
  header.top{background:linear-gradient(135deg,#5ec6ff,#7d8bff 55%,#b88bff);color:#fff;
    border-radius:18px;padding:24px 22px;margin-bottom:16px;box-shadow:0 8px 22px rgba(93,141,255,.3);}
  header.top h1{margin:0 0 6px;font-size:1.5rem;text-shadow:0 1px 2px rgba(0,0,0,.12);}
  header.top p{margin:0;font-size:.92rem;opacity:.95;}
  .meta{margin-top:14px;font-size:.86rem;background:rgba(255,255,255,.22);
    padding:9px 13px;border-radius:10px;}
  .sticky{position:sticky;top:0;z-index:20;padding:10px 0;
    background:linear-gradient(180deg,#f0f7ff 70%,rgba(240,247,255,0));}
  .bar{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:11px 16px;display:flex;align-items:center;gap:12px;font-size:.9rem;
    box-shadow:0 4px 12px rgba(43,140,255,.1);}
  .bar .track{flex:1;height:9px;background:#e9f1fb;border-radius:6px;overflow:hidden;}
  .bar .fill{height:100%;width:0;border-radius:6px;
    background:linear-gradient(90deg,#3ad1c6,#2b8cff);transition:width .35s;}
  .bar #count{font-weight:700;color:var(--blue-dark);}
  .section-title{color:#fff;font-weight:800;border-radius:12px;
    padding:10px 16px;margin:24px 0 6px;font-size:1.05rem;
    box-shadow:0 4px 12px rgba(0,0,0,.08);}
  .section-title.s0{background:linear-gradient(135deg,#ff9a6c,#ff6f91);}
  .section-title.s1{background:linear-gradient(135deg,#4dd0e1,#2b8cff);}
  .section-title.s2{background:linear-gradient(135deg,#9b8bff,#b06bff);}
  .section-desc{font-size:.86rem;color:var(--gray);margin:0 4px 10px;}
  .passage{background:#fffdf4;border:1px solid #ffe9c9;border-left:5px solid var(--amber);
    border-radius:12px;padding:15px 17px;margin:14px 0;font-size:.95rem;
    box-shadow:0 3px 10px rgba(255,176,46,.08);}
  .passage h3{margin:0 0 8px;color:#e0820a;font-size:1rem;}
  .passage table{border-collapse:collapse;width:100%;margin:8px 0;font-size:.88rem;}
  .passage th,.passage td{border:1px solid #ffe0b0;padding:5px 8px;text-align:left;}
  .passage th{background:#fff2dc;}
  .email-h{font-size:.85rem;color:var(--gray);border-bottom:1px dashed #ffd9a8;
    padding-bottom:6px;margin-bottom:8px;}
  .q{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:15px 17px;margin:12px 0;box-shadow:0 3px 10px rgba(43,140,255,.07);}
  .q .stem{font-weight:600;margin-bottom:10px;}
  .q .stem .num{display:inline-block;color:#fff;background:var(--blue);font-weight:700;
    border-radius:8px;padding:1px 9px;margin-right:8px;font-size:.92rem;}
  .opt{display:flex;align-items:flex-start;gap:10px;border:2px solid var(--line);
    border-radius:11px;padding:10px 13px;margin:8px 0;cursor:pointer;transition:.15s;
    font-size:.95rem;background:#fbfdff;}
  .opt:hover{border-color:var(--blue);background:#eef6ff;}
  .opt input{margin-top:3px;accent-color:var(--blue);}
  .opt .lab{font-weight:800;color:var(--blue);min-width:18px;}
  .opt.sel{border-color:var(--blue);background:#e7f2ff;}
  .opt.correct{border-color:var(--green);background:var(--green-bg);}
  .opt.wrong{border-color:var(--red);background:var(--red-bg);}
  .opt.lock{cursor:default;}
  .exp{display:none;margin-top:11px;border-top:2px dashed #ffe1c2;padding-top:11px;font-size:.9rem;}
  .exp.show{display:block;}
  .exp .tag{display:inline-block;font-weight:800;color:#fff;background:var(--green);
    border-radius:7px;padding:2px 10px;font-size:.8rem;margin-bottom:7px;}
  .exp .tag.miss{background:var(--red);}
  .exp .en{color:#1c4f7a;background:#eef7ff;border-radius:8px;padding:6px 10px;margin:5px 0;}
  .exp .zh{color:#7a4a12;background:#fff7ea;border-radius:8px;padding:6px 10px;margin:5px 0;}
  .actions{position:sticky;bottom:0;padding:14px 0 6px;margin-top:18px;
    background:linear-gradient(transparent,#fff7f2 35%);}
  button.submit{width:100%;color:#fff;border:0;border-radius:14px;padding:16px;
    font-size:1.08rem;font-weight:800;cursor:pointer;
    background:linear-gradient(135deg,#ff8a5b,#ff5d8f);
    box-shadow:0 6px 16px rgba(255,93,143,.35);}
  button.submit:active{transform:translateY(1px);}
  button.reset{width:100%;background:#fff;color:var(--blue);border:2px solid var(--blue);
    border-radius:14px;padding:14px;font-size:1rem;font-weight:800;cursor:pointer;margin-top:10px;display:none;}
  .result{display:none;background:var(--card);border:3px solid transparent;border-radius:16px;
    padding:22px;margin:16px 0;text-align:center;
    background-image:linear-gradient(#fff,#fff),linear-gradient(135deg,#3ad1c6,#2b8cff,#b06bff);
    background-origin:border-box;background-clip:padding-box,border-box;
    box-shadow:0 8px 22px rgba(43,140,255,.15);}
  .result.show{display:block;}
  .result .score{font-size:2.8rem;font-weight:900;
    background:linear-gradient(135deg,#2b8cff,#b06bff);-webkit-background-clip:text;
    background-clip:text;-webkit-text-fill-color:transparent;}
  .result .sub{color:var(--gray);font-size:.95rem;}
  .result .bd{display:flex;justify-content:center;gap:18px;margin-top:12px;flex-wrap:wrap;font-size:.95rem;}
  .result .bd span{font-weight:800;}
  .hint{text-align:center;font-size:.85rem;color:var(--gray);margin-top:9px;min-height:1.2em;}
  footer{text-align:center;color:var(--gray);font-size:.8rem;margin:24px 0;}
</style>
</head>
<body>
<a href="gept.html" style="position:fixed;top:12px;left:12px;background:rgba(255,255,255,.92);color:#2b8cff;padding:7px 15px;border-radius:20px;text-decoration:none;font-size:.85rem;font-weight:800;z-index:999;box-shadow:0 3px 10px rgba(0,0,0,.15);">&#8592; 回題庫</a>
<div class="wrap">
  <header class="top">
    <h1>GEPT 初級　閱讀測驗　<span style="opacity:.9">第13回</span></h1>
    <p>仿真練習卷　&middot;　依官方題型與難度命題</p>
    <div class="meta">共 3 部分、30 題　|　建議作答時間 35 分鐘　|　送出後顯示完整中英文解析與分數</div>
  </header>

  <div class="sticky">
    <div class="bar">
      <span>作答進度</span>
      <div class="track"><div class="fill" id="fill"></div></div>
      <span id="count">0 / 30</span>
    </div>
  </div>

  <form id="quiz"></form>

  <div class="result" id="result">
    <div class="score" id="scoreNum">0</div>
    <div class="sub" id="scoreTxt">分</div>
    <div class="bd">
      <span style="color:var(--green)">答對 <b id="rOk">0</b></span>
      <span style="color:var(--red)">答錯 <b id="rNo">0</b></span>
      <span style="color:var(--gray)">未作答 <b id="rBlank">0</b></span>
    </div>
  </div>

  <div class="actions">
    <button type="button" class="submit" id="submitBtn">送出並查看解析</button>
    <div class="hint" id="hint">尚未作答任何題目</div>
    <button type="button" class="reset" id="resetBtn">重新作答</button>
  </div>

  <footer>GEPT 初級閱讀　仿真練習　&middot;　第二顆腦 / GEPT初級</footer>
</div>

<script>
/* ====== 題庫資料 ====== */
const PARTS = [{"title": "第一部分　詞彙", "desc": "共 10 題，每題有一個空格，請從四個選項中選出最適合題意的字或詞。"}, {"title": "第二部分　段落填空", "desc": "共 8 題，包含二個段落，每格四個選項，請依文意選出最適合的答案。"}, {"title": "第三部分　閱讀理解", "desc": "共 12 題，包含 4 個題組，請依短文內容選出最適合的答案。"}];

const PASSAGES = {"11": "<div class=\"passage\"><h3>Questions 11-14</h3>Our daily lives are full of habits. A habit is something we do so often that we no longer have to think about it, __(11)__ brushing our teeth. Good habits, like exercising and reading, can make our lives better. Bad habits, however, can be __(12)__ to break. Scientists say it takes about two months to form a new habit. The key is to start small and repeat the action every day. __(13)__ you keep doing something regularly, it slowly becomes natural. So if you want to change your life, build one good habit __(14)__ a time.</div>", "15": "<div class=\"passage\"><h3>Questions 15-18</h3>Ludwig van Beethoven was one of the greatest composers in history. He wrote beautiful music that people still love today. __(15)__, what makes his story truly amazing is that he slowly became deaf during his life. For a musician, losing the ability to hear seemed like the end. Many people would have given up, __(16)__ Beethoven did not. He continued to write music by feeling the vibrations of the piano. Some of his most famous pieces were created __(17)__ he could no longer hear at all. His life reminds us that we can create something beautiful, even __(18)__ we face great difficulties.</div>", "19": "<div class=\"passage\"><h3>Questions 19-21</h3><b>Star Dome Planetarium</b><br>Shows: \"Journey to the Stars\" at 10 AM, 1 PM, and 4 PM (Wed&ndash;Sun)<br>Tickets: Adult NT$320 | Child NT$180 | Under 3 Free<br>&bull; Each show lasts about 45 minutes.<br>&bull; Please arrive 10 minutes early; latecomers cannot enter.<br>&bull; The planetarium is closed on Monday and Tuesday.</div>", "22": "<div class=\"passage\"><h3>Questions 22-24</h3><b>Run for Hope &mdash; Charity 5K</b><br>Join us to raise money for children in need!<br>&bull; Date: Sunday, October 5, starting at 7 AM.<br>&bull; Entry fee: NT$500 (all money goes to charity).<br>&bull; Every runner gets a free T-shirt and a medal.<br>&bull; Walkers are welcome too &mdash; it's not a race!<br>&bull; Sign up before September 20 at www.runforhope.tw.</div>", "25": "<div class=\"passage\"><h3>Questions 25-27</h3><div class=\"email-h\">From: david@mail.com　|　To: info@sunnyhotel.tw　|　Subject: Question about my stay</div>Dear Sunny Hotel,<br><br>I am planning to stay at your hotel for three nights next month with my family. Before I book, I have a few questions. First, do your rooms have a refrigerator and free WiFi? Second, is breakfast included in the price? Third, is there a swimming pool that children can use? We are also bringing our small dog, so I would like to know if pets are allowed. Thank you for your help.<br><br>Best regards, David Lin</div>", "28": "<div class=\"passage\"><h3>Questions 28-30</h3>The butterfly is famous for one of the most amazing changes in nature. It begins life as a tiny egg on a leaf. From the egg comes a caterpillar, which spends most of its time eating leaves and growing bigger. When it is ready, the caterpillar builds a hard case around itself called a chrysalis. Inside, something incredible happens: over a few weeks, the caterpillar slowly turns into a beautiful butterfly. When it comes out, it can fly away on colorful wings. This change from a caterpillar to a butterfly is called metamorphosis.</div>"};

const Q = [{"n": 1, "p": 0, "stem": "He always keeps his __________; if he says he'll help, he will.", "o": ["head", "word", "mouth", "hand"], "a": 1, "en": "\"keep one's word\" = keep a promise.", "zh": "keep one's word（守信、信守承諾）。他總是說到做到。mouth/hand/head 不合此片語。"}, {"n": 2, "p": 0, "stem": "The bad weather __________ us from going hiking.", "o": ["allowed", "helped", "invited", "prevented"], "a": 3, "en": "\"prevent someone from\" = stop them.", "zh": "prevent ... from（阻止）。壞天氣使我們無法去健行。allow 允許、help 幫助、invite 邀請，語意相反或不合。"}, {"n": 3, "p": 0, "stem": "I can't afford this watch; it's __________ my budget.", "o": ["under", "inside", "behind", "beyond"], "a": 3, "en": "\"beyond my budget\" = more than I can pay.", "zh": "beyond my budget（超出我的預算）。買不起這支錶。under/inside/behind 不合。"}, {"n": 4, "p": 0, "stem": "She finally __________ her fear of speaking in public.", "o": ["missed", "dropped", "overcame", "lost"], "a": 2, "en": "\"overcome a fear\" = beat it.", "zh": "overcome（克服）。她終於克服了當眾說話的恐懼。lose/miss/drop 不合。"}, {"n": 5, "p": 0, "stem": "Let's __________ a break and have some coffee.", "o": ["take", "make", "do", "give"], "a": 0, "en": "\"take a break\" = rest.", "zh": "take a break（休息一下）。make/do/give a break 不合。"}, {"n": 6, "p": 0, "stem": "The instructions were clear, __________ everyone finished quickly.", "o": ["so", "but", "or", "although"], "a": 0, "en": "Clear, SO everyone finished fast. Result.", "zh": "說明很清楚，「所以」大家都很快完成，表結果用 so。"}, {"n": 7, "p": 0, "stem": "__________ being tired, she finished the race.", "o": ["Despite", "Because", "So", "If"], "a": 0, "en": "\"Despite + V-ing\" = even though.", "zh": "Despite（儘管）後接名詞或動名詞。儘管疲累，她仍完成比賽。"}, {"n": 8, "p": 0, "stem": "Honesty is the most important __________ of a good friend.", "o": ["amount", "number", "quality", "price"], "a": 2, "en": "\"quality\" = a feature of character.", "zh": "quality（特質）。誠實是好朋友最重要的特質。price 價格、amount/number 數量，不合。"}, {"n": 9, "p": 0, "stem": "Could you __________ an eye on my bag while I'm away?", "o": ["put", "take", "give", "keep"], "a": 3, "en": "\"keep an eye on\" = watch.", "zh": "keep an eye on（留意、看顧）。我離開時幫我看一下包包。"}, {"n": 10, "p": 0, "stem": "The new restaurant has become very __________ since it opened.", "o": ["closed", "popular", "empty", "quiet"], "a": 1, "en": "\"popular\" = liked by many.", "zh": "popular（受歡迎的）。新餐廳開幕後很受歡迎。empty 空、quiet 安靜、closed 關閉，不合。"}, {"n": 11, "p": 1, "stem": "(11)", "o": ["so that", "as if", "even though", "such as"], "a": 3, "en": "\"such as brushing our teeth\" = for example.", "zh": "such as（例如）。習慣是常做到不必思考的事，例如刷牙。"}, {"n": 12, "p": 1, "stem": "(12)", "o": ["easy", "hard", "simple", "fun"], "a": 1, "en": "Bad habits are \"hard\" to break.", "zh": "壞習慣「很難」hard 戒除。easy/simple 簡單、fun 有趣，不合。"}, {"n": 13, "p": 1, "stem": "(13)", "o": ["Unless", "So", "If", "Although"], "a": 2, "en": "\"If you keep doing it\" = condition.", "zh": "If（如果）。如果規律地持續做，就會慢慢變得自然。"}, {"n": 14, "p": 1, "stem": "(14)", "o": ["on", "for", "at", "in"], "a": 2, "en": "\"one at a time\" = one by one.", "zh": "one at a time（一次一個）為固定片語。一次建立一個好習慣。"}, {"n": 15, "p": 1, "stem": "(15)", "o": ["Because", "So", "However", "Therefore"], "a": 2, "en": "Contrast lead-in: However, what makes his story amazing...", "zh": "轉折開頭用 However：然而，他故事真正驚人之處是他逐漸失聰。"}, {"n": 16, "p": 1, "stem": "(16)", "o": ["and", "so", "but", "because"], "a": 2, "en": "Others would give up, BUT Beethoven did not. Contrast.", "zh": "許多人會放棄，「但」貝多芬沒有，前後對比用 but。"}, {"n": 17, "p": 1, "stem": "(17)", "o": ["when", "until", "before", "after"], "a": 3, "en": "Created \"after he could no longer hear\" = following.", "zh": "after（在…之後）。一些名作是在他完全失聰「之後」創作的。"}, {"n": 18, "p": 1, "stem": "(18)", "o": ["so that", "as if", "when", "unless"], "a": 2, "en": "\"even when we face difficulties\" = at the time when.", "zh": "even when（即使在…時）。即使面對巨大困難，我們仍能創造美好。"}, {"n": 19, "p": 2, "stem": "How long does each show last?", "o": ["10 minutes", "45 minutes", "1 hour", "4 hours"], "a": 1, "en": "\"Each show lasts about 45 minutes.\"", "zh": "每場約 45 分鐘。"}, {"n": 20, "p": 2, "stem": "A family of two adults and one 5-year-old child watch a show. How much in total?", "o": ["NT$640", "NT$820", "NT$1,000", "NT$680"], "a": 1, "en": "Adults 320×2=640 + child 180 = 820 (child is 5, not under 3).", "zh": "成人 320×2＝640，5 歲兒童 180（非 3 歲以下免費），合計 820。"}, {"n": 21, "p": 2, "stem": "What happens if you arrive late?", "o": ["You cannot enter", "You sit at the back", "You get a discount", "You wait for the next show"], "a": 0, "en": "\"latecomers cannot enter.\"", "zh": "遲到者「不能進場」。請提早 10 分鐘到。"}, {"n": 22, "p": 2, "stem": "What is the main goal of this event?", "o": ["To sell T-shirts", "To raise money for children in need", "To find the fastest runner", "To open a new park"], "a": 1, "en": "\"raise money for children in need.\"", "zh": "活動目的是「為需要幫助的孩子募款」。"}, {"n": 23, "p": 2, "stem": "What does every runner receive?", "o": ["A free T-shirt and a medal", "A free meal", "A bike", "Money"], "a": 0, "en": "\"a free T-shirt and a medal.\"", "zh": "每位跑者都能拿到「免費 T 恤和獎牌」。"}, {"n": 24, "p": 2, "stem": "Which is true about the event?", "o": ["Walkers are welcome", "The fee is NT$50", "It is held in the evening", "Only fast runners can join"], "a": 0, "en": "\"Walkers are welcome too — it's not a race!\"", "zh": "「步行者也歡迎」，不是競速比賽。費用 500、早上 7 點開始。"}, {"n": 25, "p": 2, "stem": "Why did David write this email?", "o": ["To cancel a booking", "To ask questions before booking", "To complain about a room", "To thank the hotel"], "a": 1, "en": "He asks several questions before he books.", "zh": "大衛在訂房前「詢問幾個問題」。"}, {"n": 26, "p": 2, "stem": "Which of these did David NOT ask about?", "o": ["The price of dinner", "Whether pets are allowed", "Free WiFi", "Breakfast"], "a": 0, "en": "He asked about WiFi, breakfast, pool, pets — not dinner price.", "zh": "他問了 WiFi、早餐、泳池、寵物，唯獨沒問「晚餐價格」。"}, {"n": 27, "p": 2, "stem": "What is David bringing with his family?", "o": ["A bicycle", "A small dog", "A refrigerator", "A swimming pool"], "a": 1, "en": "\"We are also bringing our small dog.\"", "zh": "他們會帶「一隻小狗」，所以想知道是否能帶寵物。"}, {"n": 28, "p": 2, "stem": "What comes out of the butterfly's egg first?", "o": ["A chrysalis", "A leaf", "A butterfly", "A caterpillar"], "a": 3, "en": "\"From the egg comes a caterpillar.\"", "zh": "卵孵出的是「毛毛蟲（caterpillar）」。"}, {"n": 29, "p": 2, "stem": "What does the caterpillar build around itself?", "o": ["A chrysalis", "A web", "A shell house", "A nest"], "a": 0, "en": "\"a hard case around itself called a chrysalis.\"", "zh": "毛毛蟲在自己周圍結成硬殼，叫做 chrysalis（蛹）。"}, {"n": 30, "p": 2, "stem": "What is the whole change called?", "o": ["Hibernation", "Migration", "Evolution", "Metamorphosis"], "a": 3, "en": "\"This change ... is called metamorphosis.\"", "zh": "這整個變化稱為 metamorphosis（變態）。hibernation 冬眠、migration 遷徙，不同。"}];
/* ====== 產生畫面 ====== */
const form = document.getElementById('quiz');
let lastPart = -1;
Q.forEach(q=>{
  if(q.p!==lastPart){
    const st=document.createElement('div'); st.className='section-title s'+q.p; st.textContent=PARTS[q.p].title;
    const sd=document.createElement('div'); sd.className='section-desc'; sd.textContent=PARTS[q.p].desc;
    form.appendChild(st); form.appendChild(sd); lastPart=q.p;
  }
  if(PASSAGES[q.n]){ const d=document.createElement('div'); d.innerHTML=PASSAGES[q.n]; form.appendChild(d.firstChild); }
  const card=document.createElement('div'); card.className='q'; card.id='q'+q.n;
  const isBlank=/^\(\d+\)$/.test(q.stem);
  const stemHtml = isBlank ? `第 ${q.n} 格` : q.stem;
  card.innerHTML=`<div class="stem"><span class="num">${q.n}</span>${stemHtml}</div>`;
  q.o.forEach((opt,i)=>{
    const lab=document.createElement('label'); lab.className='opt'; lab.dataset.i=i;
    lab.innerHTML=`<input type="radio" name="q${q.n}" value="${i}"><span class="lab">${'ABCD'[i]}</span><span>${opt}</span>`;
    lab.querySelector('input').addEventListener('change',()=>{
      card.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
      lab.classList.add('sel'); updateProgress();
    });
    card.appendChild(lab);
  });
  const exp=document.createElement('div'); exp.className='exp'; exp.id='exp'+q.n;
  card.appendChild(exp);
  form.appendChild(card);
});

const submitBtn=document.getElementById('submitBtn');
const resetBtn=document.getElementById('resetBtn');
const hint=document.getElementById('hint');

function answeredCount(){ let c=0; Q.forEach(q=>{ if(form.querySelector(`input[name="q${q.n}"]:checked`)) c++; }); return c; }
function updateProgress(){
  const c=answeredCount();
  document.getElementById('count').textContent=`${c} / 30`;
  document.getElementById('fill').style.width=(c/30*100)+'%';
  hint.textContent = c===30 ? '已完成全部 30 題' : (c===0 ? '尚未作答任何題目（仍可送出查看解析）' : `已作答 ${c} 題，未作答 ${30-c} 題（仍可送出）`);
}

submitBtn.addEventListener('click',()=>{
  let ok=0, blank=0;
  Q.forEach(q=>{
    const sel=form.querySelector(`input[name="q${q.n}"]:checked`);
    const pick = sel ? parseInt(sel.value) : null;
    if(pick===null) blank++;
    const card=document.getElementById('q'+q.n);
    card.querySelectorAll('.opt').forEach(o=>{
      o.classList.add('lock');
      o.querySelector('input').disabled=true;
      const i=parseInt(o.dataset.i);
      if(i===q.a) o.classList.add('correct');
      if(pick!==null && i===pick && pick!==q.a) o.classList.add('wrong');
    });
    const correct = pick===q.a; if(correct) ok++;
    const exp=document.getElementById('exp'+q.n);
    const tag = correct ? '答對' : (pick===null ? '未作答' : '答錯');
    exp.innerHTML=`<span class="tag ${correct?'':'miss'}">${tag}　正解：${'ABCD'[q.a]}</span>
      <div class="en"><b>EN</b>&nbsp;${q.en}</div><div class="zh"><b>中</b>&nbsp;${q.zh}</div>`;
    exp.classList.add('show');
  });
  const res=document.getElementById('result');
  document.getElementById('scoreNum').textContent=Math.round(ok/30*100);
  document.getElementById('scoreTxt').textContent=`分（答對 ${ok} / 30 題）`;
  document.getElementById('rOk').textContent=ok;
  document.getElementById('rNo').textContent=30-ok-blank;
  document.getElementById('rBlank').textContent=blank;
  res.classList.add('show');
  submitBtn.style.display='none'; hint.style.display='none'; resetBtn.style.display='block';
  res.scrollIntoView({behavior:'smooth'});
});

resetBtn.addEventListener('click',()=>{
  form.reset();
  Q.forEach(q=>{
    const card=document.getElementById('q'+q.n);
    card.querySelectorAll('.opt').forEach(o=>{o.classList.remove('sel','correct','wrong','lock');o.querySelector('input').disabled=false;});
    document.getElementById('exp'+q.n).classList.remove('show');
  });
  document.getElementById('result').classList.remove('show');
  submitBtn.style.display='block'; hint.style.display='block'; resetBtn.style.display='none';
  updateProgress();
  window.scrollTo({top:0,behavior:'smooth'});
});

updateProgress();
</script>
</body>
</html>
