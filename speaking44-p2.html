<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第二大題 朗讀 ｜ GEPT 初級口說 第44回</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f9fafb;min-height:100vh;color:#1f2937}
header{background:#fff;border-bottom:1px solid #e5e7eb;padding:13px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.logo{font-weight:700;font-size:15px;color:#7c3aed;flex-shrink:0}
.badge{font-size:11px;background:#7c3aed;color:#fff;padding:3px 10px;border-radius:99px;font-weight:700}
.prog-wrap{flex:1;background:#e5e7eb;border-radius:99px;height:5px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#7c3aed,#2563eb);border-radius:99px;transition:width .5s}
.wrap{max-width:640px;margin:0 auto;padding:24px 16px 60px}
.ph{background:linear-gradient(135deg,#7c3aed,#2563eb);color:#fff;border-radius:14px;padding:18px 20px;margin-bottom:18px}
.ph h2{font-size:1.1rem;font-weight:800;margin-bottom:4px}
.ph p{font-size:.82rem;opacity:.9}
.card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 4px 16px rgba(0,0,0,.07);margin-bottom:14px}

/* 題目列表 */
.sent-list{margin-bottom:18px}
.sent-item{display:flex;gap:10px;margin-bottom:10px;align-items:baseline}
.sent-num{font-size:11px;color:#9ca3af;font-weight:700;flex-shrink:0;min-width:20px}
.sent-text{font-size:1rem;font-weight:600;line-height:1.7;color:#1f2937}
.passage-block{margin-bottom:14px}
.passage-lbl{font-size:11px;color:#9ca3af;font-weight:700;letter-spacing:.5px;margin-bottom:7px}
.passage-text{background:#f8fafc;border:1px solid #e5e7eb;border-radius:10px;padding:14px;font-size:.95rem;line-height:2;color:#1f2937}

/* 計時 */
.phase-lbl{font-size:12px;font-weight:700;letter-spacing:.5px;color:#7c3aed;margin-bottom:10px;text-transform:uppercase}
.timer-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.timer-lbl{font-size:13px;color:#4b5563}
.timer-val{font-size:2rem;font-weight:900;font-variant-numeric:tabular-nums;color:#7c3aed}
.timer-val.warn{color:#f59e0b}
.timer-val.danger{color:#ef4444}
.notice{display:flex;gap:9px;align-items:flex-start;background:#f5f3ff;border:1px solid #ddd6fe;border-radius:9px;padding:11px 13px;font-size:13px;color:#5b21b6;margin-bottom:12px}
.rec-indicator{display:flex;align-items:center;gap:7px;font-size:13px;color:#ef4444;font-weight:600;margin-bottom:10px}
.rec-dot{width:9px;height:9px;background:#ef4444;border-radius:50%;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.transcript{background:#f9fafb;border:2px solid #e5e7eb;border-radius:10px;padding:11px 14px;min-height:56px;font-size:.9rem;color:#4b5563;line-height:1.65;margin-bottom:12px}

/* 按鈕 */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:all .2s;text-decoration:none}
.btn-p{background:#7c3aed;color:#fff}.btn-p:hover{background:#6d28d9}
.btn-r{background:#ef4444;color:#fff}.btn-r:hover{background:#dc2626}
.btn-o{background:#fff;color:#7c3aed;border:2px solid #7c3aed}.btn-o:hover{background:#f5f3ff}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}

/* 關鍵字 */
.kw-label{font-size:12px;color:#9ca3af;margin-bottom:6px}
.kw-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.kw{font-size:12px;padding:3px 10px;border-radius:99px;font-weight:600;border:1.5px solid #e5e7eb;background:#f3f4f6;color:#4b5563}
.kw.hit{background:#d1fae5;color:#065f46;border-color:#6ee7b7}
.kw.miss{background:#fee2e2;color:#991b1b;border-color:#fca5a5}
.chip{display:inline-block;padding:4px 14px;border-radius:99px;font-size:13px;font-weight:700;margin-bottom:10px}
.chip.A{background:#d1fae5;color:#065f46}
.chip.B{background:#dbeafe;color:#1e40af}
.chip.C{background:#fef3c7;color:#92400e}
.chip.D{background:#fee2e2;color:#991b1b}

.result-card{background:#fff;border-radius:14px;padding:28px;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.07);margin-bottom:14px}
.score-big{font-size:3.5rem;font-weight:900;color:#7c3aed;line-height:1}
.score-den{font-size:1rem;color:#9ca3af}
.score-grade{font-size:1rem;font-weight:700;margin-top:10px}
.back{display:inline-block;margin-bottom:14px;font-size:13px;color:#6b7280;text-decoration:none}
.back:hover{color:#7c3aed}
</style>
</head>
<body>
<header>
  <div class="logo">📖 GEPT 初級口說</div>
  <div class="badge">第二大題</div>
  <div class="prog-wrap"><div class="prog-fill" id="prog" style="width:0%"></div></div>
</header>

<div class="wrap">
  <a class="back" href="speaking44.html">← 返回口說測驗</a>
  <div class="ph">
    <h2>第二大題　朗讀句子與短文 Read Aloud</h2>
    <p>請先閱讀所有句子與短文，1 分鐘後自動開始錄音，共 1 分鐘。</p>
  </div>

  <!-- 測驗中 -->
  <div id="quiz-area">
    <div class="card">
      <!-- 題目（全部顯示） -->
      <div class="sent-list" id="sent-list"></div>

      <!-- 閱讀階段 -->
      <div id="prep-area">
        <div class="phase-lbl">📖 閱讀準備</div>
        <div class="timer-row">
          <div class="timer-lbl">剩餘閱讀時間</div>
          <div class="timer-val" id="prep-timer">1:00</div>
        </div>
        <div class="notice">請仔細閱讀以上所有句子與短文，1 分鐘後自動開始錄音。</div>
      </div>

      <!-- 錄音階段 -->
      <div id="rec-area" style="display:none">
        <div class="phase-lbl">🎤 朗讀錄音中</div>
        <div class="timer-row">
          <div class="timer-lbl">剩餘朗讀時間</div>
          <div class="timer-val" id="rec-timer">1:00</div>
        </div>
        <div class="rec-indicator"><span class="rec-dot"></span>錄音中 Recording...</div>
        <div class="transcript" id="transcript"><span style="color:#9ca3af;font-style:italic">正在聆聽…</span></div>
        <div class="btn-row">
          <button class="btn btn-r" onclick="stopManual()">⏹ 停止錄音</button>
        </div>
      </div>

      <!-- 結果 -->
      <div id="result-area" style="display:none">
        <div class="kw-label">關鍵字命中 Keywords:</div>
        <div class="kw-row" id="kw-row"></div>
        <div id="score-chip"></div>
        <div class="btn-row">
          <button class="btn btn-p" onclick="showDone()">查看成績 →</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 完成 -->
  <div id="done-area" style="display:none">
    <div class="result-card">
      <div style="font-size:13px;color:#9ca3af;margin-bottom:8px">第二大題得分</div>
      <div><span class="score-big" id="final-score">0</span><span class="score-den"> / 40</span></div>
      <div class="score-grade" id="final-grade"></div>
    </div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
      <button class="btn btn-o" onclick="restart()">↩ 重新練習</button>
      <a class="btn btn-p" href="speaking44-p3.html">進入第三大題 →</a>
    </div>
  </div>
</div>

<script>
const SENTENCES = [
  {t:"My sister wants to teach young children at a school.",                 kw:["teach","young","children","school"]},
  {t:"A soldier is brave and helps people in danger.",                 kw:["soldier","brave","helps","danger"]},
  {t:"To reach your goal, you must never give up.",                 kw:["reach","goal","never","give","up"]},
  {t:"He draws every day because he wants to be an artist.",                 kw:["draws","wants","artist"]},
  {t:"Working hard now will help you build a bright future.",                 kw:["working","hard","build","bright","future"]}
];
const PASSAGE = {
  t:"When I grow up, I want to become a scientist. I love asking questions about the world and finding new answers. Every day after class, I read books about stars, plants, and animals. My teacher says I am curious and never afraid to try. I know this dream will take many years of study and hard work. But if I keep trying, I believe I can reach my goal one day.",
  kw:["grow","scientist","questions","world","answers","books","stars","plants","animals","teacher","curious","dream","study","goal"]
};
const ALL_KW = [...SENTENCES.flatMap(s=>s.kw), ...PASSAGE.kw];

let recog=null, recording=false, prepTimer=null, recTimer=null, curFinal='', score=null;

// 建立題目列表
function buildList(){
  const el=document.getElementById('sent-list');
  let html='';
  SENTENCES.forEach((s,i)=>{
    html+=`<div class="sent-item"><span class="sent-num">${i+1}.</span><span class="sent-text">${s.t}</span></div>`;
  });
  html+=`<div class="passage-block">
    <div class="passage-lbl">短文（第 6 題）</div>
    <div class="passage-text">${PASSAGE.t}</div>
  </div>`;
  el.innerHTML=html;
}

// 閱讀倒數
function startPrep(){
  let rem=60;
  setVal('prep-timer',rem,'');
  clearInterval(prepTimer);
  prepTimer=setInterval(()=>{
    rem--;
    setVal('prep-timer',rem,'prep-timer');
    if(rem<=0){ clearInterval(prepTimer); startRec(); }
  },1000);
}

function setVal(id,rem,cls){
  const el=document.getElementById(id);
  el.textContent=Math.floor(rem/60)+':'+String(rem%60).padStart(2,'0');
  el.className='timer-val'+(rem<=10?' danger':rem<=20?' warn':'');
}

// 錄音
function startRec(){
  document.getElementById('prep-area').style.display='none';
  document.getElementById('rec-area').style.display='block';
  document.getElementById('transcript').innerHTML='<span style="color:#9ca3af;font-style:italic">正在聆聽…</span>';
  curFinal=''; recording=true;
  document.getElementById('prog').style.width='50%';

  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(SR){
    recog=new SR();
    recog.lang='en-US'; recog.continuous=true; recog.interimResults=true;
    recog.onresult=e=>{
      let fin='',intr='';
      for(let i=e.resultIndex;i<e.results.length;i++){
        if(e.results[i].isFinal) fin+=e.results[i][0].transcript+' ';
        else intr+=e.results[i][0].transcript;
      }
      curFinal+=fin;
      document.getElementById('transcript').innerHTML=
        (curFinal?`<span>${curFinal}</span>`:'')+
        (intr?`<span style="color:#9ca3af">${intr}</span>`:'<span style="color:#9ca3af;font-style:italic">正在聆聽…</span>');
    };
    recog.onerror=handleRecogError;
    recog.onend=()=>{ if(recording){ try{recog.start();}catch(e){} } };
    try{ recog.start(); }catch(e){}
  }

  let rem=60;
  setVal('rec-timer',rem,'');
  clearInterval(recTimer);
  recTimer=setInterval(()=>{
    rem--;
    setVal('rec-timer',rem,'');
    if(rem<=0){ clearInterval(recTimer); if(recording) scoreIt(); }
  },1000);
}

function stopManual(){ if(recording) scoreIt(); }

function scoreIt(){
  clearInterval(recTimer);
  recording=false;
  if(recog){ try{recog.stop();}catch(e){} recog=null; }

  const words=curFinal.toLowerCase().split(/\s+/).map(w=>w.replace(/[^a-z']/g,'')).filter(Boolean);
  const res=ALL_KW.map(k=>({k,hit:words.some(w=>w===k||w.startsWith(k)||k.startsWith(w))}));
  const pct=Math.round(res.filter(r=>r.hit).length/ALL_KW.length*100);
  score=pct;

  document.getElementById('rec-area').style.display='none';
  document.getElementById('result-area').style.display='block';
  document.getElementById('prog').style.width='100%';
  document.getElementById('kw-row').innerHTML=res.map(r=>`<span class="kw ${r.hit?'hit':'miss'}">${r.k}</span>`).join('');

  let cls,lbl;
  if(pct>=80){cls='A';lbl='優秀 Excellent';}
  else if(pct>=60){cls='B';lbl='良好 Good';}
  else if(pct>=40){cls='C';lbl='尚可 Fair';}
  else{cls='D';lbl='需加強 Practice More';}
  document.getElementById('score-chip').innerHTML=`<span class="chip ${cls}">${pct}% · ${lbl}</span>`;
}

function showDone(){
  document.getElementById('quiz-area').style.display='none';
  document.getElementById('done-area').style.display='block';
  const pts=Math.round((score||0)*0.4);
  document.getElementById('final-score').textContent=pts;
  let g;
  if((score||0)>=80) g='🏆 優等';
  else if((score||0)>=60) g='👍 良好';
  else if((score||0)>=40) g='📚 尚可';
  else g='💪 需加強';
  document.getElementById('final-grade').textContent=g;
  sessionStorage.setItem('p2score',pts);
}

function restart(){
  clearInterval(prepTimer); clearInterval(recTimer);
  recording=false; curFinal=''; score=null;
  if(recog){ try{recog.stop();}catch(e){} recog=null; }
  document.getElementById('done-area').style.display='none';
  document.getElementById('quiz-area').style.display='block';
  document.getElementById('prep-area').style.display='block';
  document.getElementById('rec-area').style.display='none';
  document.getElementById('result-area').style.display='none';
  document.getElementById('prog').style.width='0%';
  startPrep();
}

// 啟動
buildList();
startPrep();

/* ===== 麥克風 / 瀏覽器相容性提示（自動注入） ===== */
function __micBanner(html, kind){
  var el=document.getElementById('__micWarn');
  if(!el){
    el=document.createElement('div'); el.id='__micWarn';
    el.style.cssText='position:fixed;left:0;right:0;top:0;z-index:99999;padding:11px 40px 11px 16px;font-size:14px;line-height:1.55;font-family:-apple-system,"PingFang TC","Noto Sans TC",sans-serif;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.15)';
    document.body.appendChild(el);
  }
  el.style.background = kind==='err' ? '#fee2e2' : '#fffbeb';
  el.style.color = kind==='err' ? '#991b1b' : '#78350f';
  el.innerHTML = html + ' <span onclick="var b=document.getElementById(\'__micWarn\');if(b)b.remove();" style="position:absolute;right:14px;top:9px;cursor:pointer;font-weight:700">✕</span>';
}
(function(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){
    __micBanner('⚠️ 這個瀏覽器不支援語音辨識，無法錄音計分。請改用<b>電腦版 Chrome</b>（iPhone／iPad 目前不支援）。','err');
  }
})();
function handleRecogError(e){
  var c=e&&e.error;
  if(c==='not-allowed'||c==='service-not-allowed'){
    __micBanner('🎤 麥克風權限被拒。請點網址列的<b>鎖頭圖示 → 允許麥克風</b>，再重新整理頁面。','err');
  } else if(c==='audio-capture'){
    __micBanner('🎤 找不到麥克風。請確認裝置有麥克風且未靜音，並在系統設定允許瀏覽器使用麥克風。','err');
  }
  /* no-speech / aborted 屬正常情況，不提示 */
}

</script>
</body>
</html>
