      gap: 10px;
    }

      align-items: flex-start;
      gap: 10px;

      border-radius: 10px;
      cursor: pointer;
      background: #f7fafc;
      text-align: left;
      font-size: 0.95rem;
      line-height: 1.6;
      color: #2d3748;
      transition: background 0.18s, border-color 0.18s;
      width: 100%;

      background: #ebf4ff;
      border-color: #93c5fd;
    }

    .option-btn:disabled { cursor: default; }

      background: #dcfce7;
      border-color: #22c55e;
      color: #166534;
      font-weight: 600;

      color: #166534;
    }

      font-weight: 600;

      border: 1px solid #ddd6fe;
      border-radius: 10px;
      padding: 16px 18px;

let answered = 0;
let correct = 0;

function buildQuiz() {
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';

  questions.forEach((q, idx) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.id = `card-${idx}`;

    const optionsHTML = q.options.map(opt => `
      <li>
        <button class="option-btn" id="btn-${idx}-${opt.label}"
          onclick="selectAnswer(${idx}, '${opt.label}')">
          <span class="option-tag">(${opt.label})</span>
          <span><strong>${opt.text}</strong>　${opt.hint}</span>
        </button>
      </li>
    `).join('');

    card.innerHTML = `
      <div class="q-header">
        <div class="q-num">${q.id}</div>
        <div class="q-text">
          ${q.stem}<br>
          <em>${q.stem_zh}</em>
        </div>
      </div>
      <ul class="options">${optionsHTML}</ul>

      <div class="analysis-box" id="analysis-${idx}">
        <div class="analysis-label">📖 解析</div>
        <div class="analysis-text">${q.analysis}</div>
        <button class="more-btn" id="morebtn-${idx}" onclick="toggleSupp(${idx})">
          查看更多補充 <span class="arrow">▼</span>
        </button>
        <div class="supplement-box" id="supp-${idx}">
          <div class="supplement-label">📚 單字補充</div>
          <ul class="vocab-list">
            ${q.vocab.map(v => `<li>${v}</li>`).join('')}
          </ul>
        </div>
      </div>
    `;

    container.appendChild(card);
  });

  updateProgress();
}

function selectAnswer(idx, chosen) {
  const q = questions[idx];
  const card = document.getElementById(`card-${idx}`);
  const analysis = document.getElementById(`analysis-${idx}`);

  // Disable all buttons for this question
  q.options.forEach(opt => {
    const btn = document.getElementById(`btn-${idx}-${opt.label}`);
    btn.disabled = true;
  });

  const chosenBtn = document.getElementById(`btn-${idx}-${chosen}`);
  const isCorrect = chosen === q.answer;

  if (isCorrect) {
    chosenBtn.classList.add('selected-correct');
    chosenBtn.innerHTML += `<span class="result-icon">✅</span>`;
    card.classList.add('correct');
    correct++;
  } else {
    chosenBtn.classList.add('selected-wrong');
    chosenBtn.innerHTML += `<span class="result-icon">❌</span>`;
    card.classList.add('wrong');
    // Reveal correct answer
    const correctBtn = document.getElementById(`btn-${idx}-${q.answer}`);
    correctBtn.classList.add('reveal-correct');
    correctBtn.innerHTML += `<span class="result-icon">✅</span>`;
  }

  // Always show analysis
  analysis.classList.add('visible');
  answered++;
  updateProgress();

  if (answered === questions.length) {
    setTimeout(showSummary, 600);
  }
}

function toggleSupp(idx) {
  const supp = document.getElementById(`supp-${idx}`);
  const btn  = document.getElementById(`morebtn-${idx}`);
  const isOpen = supp.classList.contains('visible');
  supp.classList.toggle('visible', !isOpen);
  btn.classList.toggle('open', !isOpen);
  btn.querySelector('.arrow').textContent = isOpen ? '▼' : '▲';
  btn.childNodes[0].textContent = isOpen ? '查看更多補充 ' : '收起補充 ';
}

function updateProgress() {
  const pct = (answered / questions.length) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent =
    `已作答 ${answered} / ${questions.length} 題`;
}

function showSummary() {
  document.getElementById('summary').style.display = 'block';
  document.getElementById('scoreDisplay').textContent = `${correct} / ${questions.length}`;
  const pct = Math.round(correct / questions.length * 100);
  let msg = '';
  if (pct === 100) msg = '太厲害了！全部答對！🏆';
  else if (pct >= 70) msg = '表現不錯！繼續保持！💪';
  else msg = '多複習解析和補充，下次一定更好！📖';
  document.getElementById('scoreMsg').textContent = `正確率 ${pct}%　${msg}`;
  document.getElementById('summary').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
  answered = 0;
  correct  = 0;
  document.getElementById('summary').style.display = 'none';
  buildQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
