<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第三大題 回答問題 ｜ GEPT 初級口說 第四回</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f9fafb;min-height:100vh;color:#1f2937}
header{background:#fff;border-bottom:1px solid #e5e7eb;padding:13px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.logo{font-weight:700;font-size:15px;color:#10b981;flex-shrink:0}
.badge{font-size:11px;background:#10b981;color:#fff;padding:3px 10px;border-radius:99px;font-weight:700}
.prog-wrap{flex:1;background:#e5e7eb;border-radius:99px;height:5px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#10b981,#2563eb);border-radius:99px;transition:width .5s}
.wrap{max-width:640px;margin:0 auto;padding:24px 16px 60px}
.ph{background:linear-gradient(135deg,#10b981,#2563eb);color:#fff;border-radius:14px;padding:18px 20px;margin-bottom:18px}
.ph h2{font-size:1.1rem;font-weight:800;margin-bottom:4px}
.ph p{font-size:.82rem;opacity:.9}
.card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 4px 16px rgba(0,0,0,.07)}
.qnum{font-size:11px;color:#9ca3af;font-weight:700;letter-spacing:1px;margin-bottom:14px}
.qtext{font-size:1.2rem;font-weight:700;line-height:1.55;margin-bottom:5px}
.qzh{font-size:.85rem;color:#6b7280;margin-bottom:18px}

/* 倒數 */
.cd-box{text-align:center;padding:20px 0 14px}
.cd-lbl{font-size:13px;color:#6b7280;margin-bottom:6px}
.cd-num{font-size:4rem;font-weight:900;color:#10b981;line-height:1}

/* 計時 */
.timer-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.timer-lbl{font-size:13px;color:#4b5563}
.timer-val{font-size:2rem;font-weight:900;font-variant-numeric:tabular-nums;color:#10b981}
.timer-val.warn{color:#f59e0b}
.timer-val.danger{color:#ef4444}
.rec-indicator{display:flex;align-items:center;gap:7px;font-size:13px;color:#ef4444;font-weight:600;margin-bottom:10px}
.rec-dot{width:9px;height:9px;background:#ef4444;border-radius:50%;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.transcript{background:#f9fafb;border:2px solid #e5e7eb;border-radius:10px;padding:11px 14px;min-height:52px;font-size:.9rem;color:#4b5563;line-height:1.65;margin-bottom:12px}

/* 按鈕 */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:all .2s;text-decoration:none}
.btn-p{background:#10b981;color:#fff}.btn-p:hover{background:#059669}
.btn-r{background:#ef4444;color:#fff}.btn-r:hover{background:#dc2626}
.btn-o{background:#fff;color:#10b981;border:2px solid #10b981}.btn-o:hover{background:#f0fdf4}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}

/* 關鍵字 */
.kw-label{font-size:12px;color:#9ca3af;margin-bottom:6px}
.kw-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.kw{font-size:12px;padding:3px 10px;border-radius:99px;font-weight:600;border:1.5px solid #e5e7eb;background:#f3f4f6;color:#4b5563}
.kw.hit{background:#d1fae5;color:#065f46;border-color:#6ee7b7}
.kw.miss{background:#fee2e2;color:#991b1b;border-color:#fca5a5}
.chip{display:inline-block;padding:4px 14px;border-radius:99px;font-size:13px;font-weight:700;margin-bottom:10px}
.chip.A{background:#d1fae5;color:#065f46}
.chip.B{background:#dbeafe;color:#1e40af}
.chip.C{background:#fef3c7;color:#92400e}
.chip.D{background:#fee2e2;color:#991b1b}

/* 參考答案 */
.model-box{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:12px 14px;margin-bottom:12px}
.model-lbl{font-size:11px;color:#166534;font-weight:700;letter-spacing:.5px;margin-bottom:6px}
.model-text{font-size:.92rem;color:#166534;line-height:1.7}

/* 成績 */
.result-card{background:#fff;border-radius:14px;padding:28px;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.07);margin-bottom:14px}
.score-big{font-size:3.5rem;font-weight:900;color:#10b981;line-height:1}
.score-den{font-size:1rem;color:#9ca3af}
.score-grade{font-size:1rem;font-weight:700;margin-top:10px}
.total-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.total-cell{background:#fff;border-radius:12px;padding:14px 8px;text-align:center;box-shadow:0 3px 10px rgba(0,0,0,.06)}
.total-cell-lbl{font-size:10px;color:#9ca3af;font-weight:700;margin-bottom:4px}
.total-cell-val{font-size:1.8rem;font-weight:800;color:#10b981}
.total-cell-den{font-size:11px;color:#9ca3af}
.back{display:inline-block;margin-bottom:14px;font-size:13px;color:#6b7280;text-decoration:none}
.back:hover{color:#10b981}
</style>
</head>
<body>
<header>
  <div class="logo">💬 GEPT 初級口說</div>
  <div class="badge">第三大題</div>
  <div class="prog-wrap"><div class="prog-fill" id="prog" style="width:0%"></div></div>
</header>

<div class="wrap">
  <a class="back" href="speaking4.html">← 返回口說測驗</a>
  <div class="ph">
    <h2>第三大題　回答問題 Respond to Questions</h2>
    <p>題目將以語音播出，播完後自動開始錄音，每題 15 秒，作答後才會顯示題目文字。</p>
  </div>

  <!-- 測驗中 -->
  <div id="quiz-area">
    <div class="card">
      <div class="qnum" id="qnum">題 1 / 7</div>
      <div class="qtext" id="qtext"></div>
      <div class="qzh" id="qzh"></div>

      <!-- 倒數 -->
      <div class="cd-box" id="cd-box">
        <div style="font-size:2rem;margin-bottom:8px">🔊</div>
        <div class="cd-lbl" id="cd-lbl">正在播放題目...</div>
      </div>

      <!-- 錄音 -->
      <div id="rec-area" style="display:none">
        <div class="timer-row">
          <div class="timer-lbl">作答時間</div>
          <div class="timer-val danger" id="rec-timer">0:15</div>
        </div>
        <div class="rec-indicator"><span class="rec-dot"></span>回答中 Recording...</div>
        <div class="transcript" id="transcript"><span style="color:#9ca3af;font-style:italic">正在聆聽…</span></div>
        <div class="btn-row">
          <button class="btn btn-r" onclick="stopManual()">⏹ 停止錄音</button>
        </div>
      </div>

      <!-- 結果 -->
      <div id="result-area" style="display:none">
        <div class="kw-label">你說到的關鍵字:</div>
        <div class="kw-row" id="kw-row"></div>
        <div id="score-chip"></div>
        <div class="model-box">
          <div class="model-lbl">✦ 參考答案 Model Answer</div>
          <div class="model-text" id="model-text"></div>
        </div>
        <div class="btn-row">
          <button class="btn btn-p" id="next-btn" onclick="nextQ()">下一題 →</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 完成 -->
  <div id="done-area" style="display:none">
    <div class="result-card">
      <div style="font-size:13px;color:#9ca3af;margin-bottom:8px">第三大題得分</div>
      <div><span class="score-big" id="final-score">0</span><span class="score-den"> / 30</span></div>
      <div class="score-grade" id="final-grade"></div>
    </div>
    <div class="total-row" id="total-row" style="display:none">
      <div class="total-cell">
        <div class="total-cell-lbl">第一大題</div>
        <div><span class="total-cell-val" id="t1">—</span><span class="total-cell-den">/30</span></div>
      </div>
      <div class="total-cell">
        <div class="total-cell-lbl">第二大題</div>
        <div><span class="total-cell-val" id="t2">—</span><span class="total-cell-den">/40</span></div>
      </div>
      <div class="total-cell">
        <div class="total-cell-lbl">第三大題</div>
        <div><span class="total-cell-val" id="t3">—</span><span class="total-cell-den">/30</span></div>
      </div>
    </div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
      <button class="btn btn-o" onclick="restart()">↩ 重新練習</button>
      <a class="btn btn-p" href="speaking4.html">回口說首頁</a>
    </div>
  </div>
</div>

<script>
const QS = [
  {t:"How do you keep yourself healthy?",
   zh:"你如何保持健康？",
   kw:["exercise","vegetables","water","sleep","healthy","eat"],
   model:"I exercise every day, eat vegetables, and drink lots of water to keep myself healthy."},
  {t:"What do you do when you feel sick?",
   zh:"當你生病時你會怎麼做？",
   kw:["sick","doctor","medicine","rest","sleep","stay"],
   model:"When I feel sick, I go to see the doctor and take medicine to get better."},
  {t:"How can we protect the environment?",
   zh:"我們如何保護環境？",
   kw:["protect","environment","waste","energy","trees","recycle","save"],
   model:"We can protect the environment by reducing waste, saving energy, and planting more trees."},
  {t:"Is it important to exercise regularly? Why?",
   zh:"定期運動重要嗎？為什麼？",
   kw:["exercise","body","healthy","happy","important","because","strong"],
   model:"Yes, regular exercise keeps our body healthy and makes us feel happy and full of energy."},
  {t:"What sports do you enjoy playing?",
   zh:"你喜歡打什麼運動？",
   kw:["basketball","badminton","swimming","tennis","fun","health","enjoy"],
   model:"I enjoy playing basketball and badminton because they are fun and good for my health."},
  {t:"How can we save water and electricity at home?",
   zh:"我們在家如何節約水和電？",
   kw:["lights","water","save","electricity","turn","off","brush","teeth"],
   model:"We can turn off the lights when we leave a room and not waste water when we brush our teeth."},
  {t:"What is the biggest environmental problem in your city?",
   zh:"你城市裡最大的環境問題是什麼？",
   kw:["pollution","air","water","plastic","waste","problem","city"],
   model:"I think air pollution and plastic waste are the biggest problems in my city."}
];

let qi=0, scores=[], recog=null, recording=false, ttsTimer=null, recTimer=null, curFinal='';

const VOICE_PREF=['Google US English','Ava (Enhanced)','Allison (Enhanced)','Samantha (Enhanced)','Ava','Allison','Samantha','Karen','Moira'];
let ttsVoice=null;
function initVoice(){
  const all=speechSynthesis.getVoices();
  for(const name of VOICE_PREF){const v=all.find(v=>v.name===name);if(v){ttsVoice=v;break;}}
  if(!ttsVoice&&all.length) ttsVoice=all.find(v=>v.lang&&v.lang.startsWith('en'))||all[0];
}
if(speechSynthesis.onvoiceschanged!==undefined) speechSynthesis.onvoiceschanged=initVoice;
initVoice();

function speakOnce(text){
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-US'; u.rate=0.9;
  if(ttsVoice) u.voice=ttsVoice;
  speechSynthesis.speak(u);
}

function loadQ(i){
  const q=QS[i];
  clearTimeout(ttsTimer); clearInterval(recTimer);
  speechSynthesis.cancel();

  document.getElementById('prog').style.width=(i/QS.length*80)+'%';
  document.getElementById('qnum').textContent=`題 ${i+1} / ${QS.length}`;

  document.getElementById('qtext').textContent=q.t;
  document.getElementById('qzh').textContent=q.zh;
  document.getElementById('qtext').style.display='none';
  document.getElementById('qzh').style.display='none';

  document.getElementById('cd-box').style.display='block';
  document.getElementById('cd-lbl').textContent='🔊 正在播放題目...';
  document.getElementById('rec-area').style.display='none';
  document.getElementById('result-area').style.display='none';
  curFinal='';

  // 播放兩次，用 timer 估算播完時間
  speakOnce(q.t);
  const onceMs=(q.t.split(' ').length*480)+500;
  setTimeout(()=>speakOnce(q.t), onceMs+600);
  ttsTimer=setTimeout(()=>startRec(q), onceMs*2+1400);
}

function startRec(q){
  document.getElementById('cd-box').style.display='none';
  document.getElementById('rec-area').style.display='block';
  document.getElementById('transcript').innerHTML='<span style="color:#9ca3af;font-style:italic">正在聆聽…</span>';
  curFinal=''; recording=true;

  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(SR){
    recog=new SR();
    recog.lang='en-US'; recog.continuous=true; recog.interimResults=true;
    recog.onresult=e=>{
      let fin='',intr='';
      for(let i=e.resultIndex;i<e.results.length;i++){
        if(e.results[i].isFinal) fin+=e.results[i][0].transcript+' ';
        else intr+=e.results[i][0].transcript;
      }
      curFinal+=fin;
      document.getElementById('transcript').innerHTML=
        (curFinal?`<span>${curFinal}</span>`:'')+
        (intr?`<span style="color:#9ca3af">${intr}</span>`:'<span style="color:#9ca3af;font-style:italic">正在聆聽…</span>');
    };
    recog.onerror=()=>{};
    recog.onend=()=>{ if(recording){ try{recog.start();}catch(e){} } };
    try{ recog.start(); }catch(e){}
  }

  let rem=15;
  setTimer(rem);
  clearInterval(recTimer);
  recTimer=setInterval(()=>{
    rem--;
    setTimer(rem);
    if(rem<=0){ clearInterval(recTimer); if(recording) scoreQ(q); }
  },1000);
}

function setTimer(rem){
  const el=document.getElementById('rec-timer');
  el.textContent='0:'+String(rem).padStart(2,'0');
  el.className='timer-val'+(rem<=5?' danger':rem<=10?' warn':'');
}

function stopManual(){ if(recording) scoreQ(QS[qi]); }

function scoreQ(q){
  clearInterval(recTimer);
  recording=false;
  if(recog){ try{recog.stop();}catch(e){} recog=null; }

  // 揭示題目
  document.getElementById('qtext').style.display='block';
  document.getElementById('qzh').style.display='block';

  const words=curFinal.toLowerCase().split(/\s+/).map(w=>w.replace(/[^a-z']/g,'')).filter(Boolean);
  const res=q.kw.map(k=>({k,hit:words.some(w=>w===k||w.startsWith(k)||k.startsWith(w))}));
  const pct=Math.round(res.filter(r=>r.hit).length/q.kw.length*100);
  scores.push(pct);

  document.getElementById('rec-area').style.display='none';
  document.getElementById('result-area').style.display='block';
  document.getElementById('kw-row').innerHTML=res.map(r=>`<span class="kw ${r.hit?'hit':'miss'}">${r.k}</span>`).join('');

  let cls,lbl;
  if(pct>=80){cls='A';lbl='優秀';}
  else if(pct>=60){cls='B';lbl='良好';}
  else if(pct>=40){cls='C';lbl='尚可';}
  else{cls='D';lbl='需加強';}
  document.getElementById('score-chip').innerHTML=`<span class="chip ${cls}">${pct}% · ${lbl}</span>`;
  document.getElementById('model-text').textContent=q.model;
  document.getElementById('next-btn').textContent=qi===QS.length-1?'查看成績 →':'下一題 →';
}

function nextQ(){
  qi++;
  if(qi<QS.length){ loadQ(qi); }
  else{ showDone(); }
}

function showDone(){
  document.getElementById('quiz-area').style.display='none';
  document.getElementById('done-area').style.display='block';
  document.getElementById('prog').style.width='100%';

  const avg=Math.round(scores.reduce((a,b)=>a+b,0)/scores.length);
  const pts=Math.round(avg*0.3);
  document.getElementById('final-score').textContent=pts;
  sessionStorage.setItem('p3score',pts);

  let g;
  if(avg>=80) g='🏆 優等';
  else if(avg>=60) g='👍 良好';
  else if(avg>=40) g='📚 尚可';
  else g='💪 需加強';
  document.getElementById('final-grade').textContent=g;

  const p1=sessionStorage.getItem('p1score');
  const p2=sessionStorage.getItem('p2score');
  if(p1||p2){
    document.getElementById('total-row').style.display='grid';
    document.getElementById('t1').textContent=p1||'—';
    document.getElementById('t2').textContent=p2||'—';
    document.getElementById('t3').textContent=pts;
  }
}

function restart(){
  clearTimeout(ttsTimer); clearInterval(recTimer);
  speechSynthesis.cancel();
  recording=false; curFinal=''; qi=0; scores=[];
  if(recog){ try{recog.stop();}catch(e){} recog=null; }
  document.getElementById('done-area').style.display='none';
  document.getElementById('quiz-area').style.display='block';
  loadQ(0);
}

loadQ(0);

</script>
</body>
</html>
