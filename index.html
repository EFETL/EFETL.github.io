font-weight: 700;
padding: 3px 8px;
border-radius: 20px;
letter-spacing: 0.5px;

footer {

@media (max-width: 760px) {

@media (max-width: 460px) {

.btn-card { flex: 0 0 100%; padding: 36px 40px; }
