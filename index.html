<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EFETL 英文練習</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
font-family: 'Noto Sans TC', '微軟正黑體', sans-serif;
min-height: 100vh;
background: linear-gradient(135deg, #0f2357 0%, #1a3a7a 50%, #0e5a45 100%);
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 20px;
}
h1 {
color: #fff;
font-size: 2.2rem;
margin-bottom: 0.4em;
letter-spacing: 3px;
text-shadow: 0 2px 12px rgba(0,0,0,0.4);
}
.subtitle {
color: rgba(255,255,255,0.65);
font-size: 1rem;
margin-bottom: 3.5rem;
letter-spacing: 2px;
}
.btn-grid {
display: flex;
gap: 28px;
flex-wrap: wrap;
justify-content: center;
}
.btn-card {
background: rgba(255,255,255,0.1);
border: 2px solid rgba(255,255,255,0.25);
border-radius: 20px;
padding: 44px 52px;
text-decoration: none;
color: #fff;
text-align: center;
transition: all 0.28s cubic-bezier(.4,0,.2,1);
backdrop-filter: blur(12px);
min-width: 190px;
position: relative;
overflow: hidden;
}
.btn-card:hover {
background: rgba(255,255,255,0.22);
border-color: rgba(255,255,255,0.6);
transform: translateY(-6px);
box-shadow: 0 16px 40px rgba(0,0,0,0.3);
}
.btn-card .icon { font-size: 3rem; margin-bottom: 14px; display: block; }
.btn-card .label { font-size: 1.6rem; font-weight: 700; letter-spacing: 3px; display: block; }
.btn-card .desc { font-size: 0.82rem; color: rgba(255,255,255,0.55); margin-top: 8px; display: block; letter-spacing: 1px; }
.btn-card.disabled {
opacity: 0.45;
cursor: default;
pointer-events: none;
}
.coming-badge {
position: absolute;
top: 14px; right: 14px;
background: rgba(255,200,0,0.85);
color: #333;
font-size: 0.65rem;
font-weight: 700;
padding: 3px 8px;
border-radius: 20px;
letter-spacing: 0.5px;
}
footer {
margin-top: 4.5rem;
color: rgba(255,255,255,0.3);
font-size: 0.78rem;
letter-spacing: 1px;
}
@media (max-width: 600px) {
.btn-grid { flex-direction: column; align-items: center; }
.btn-card { min-width: 240px; padding: 36px 48px; }
}
</style>
</head>
<body>
<h1>&#128218; EFETL 英文練習</h1>
<p class="subtitle">選擇你想練習的題型</p>
<div class="btn-grid">
<a href="gsat.html" class="btn-card">
  <span class="icon">&#127891;</span>
  <span class="label">學測</span>
  <span class="desc">大學學科能力測驗</span>
</a>
<a href="longteng.html" class="btn-card">
  <span class="icon">&#128214;</span>
  <span class="label">龍騰</span>
  <span class="desc">龍騰各冊互動測驗</span>
</a>
<div class="btn-card disabled">
  <span class="coming-badge">將來推出</span>
  <span class="icon">&#128221;</span>
  <span class="label">統測</span>
  <span class="desc">技術學院聯合入學測驗</span>
</div>
<div class="btn-card disabled">
  <span class="coming-badge">將來推出</span>
  <span class="icon">&#127758;</span>
  <span class="label">英檢初級</span>
  <span class="desc">GEPT 初級英檢</span>
</div>
</div>
<footer>EFETL &copy; 2025</footer>
</body>
</html>
