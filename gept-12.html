<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEPT 初級 閱讀測驗　第12回</title>
<style>
  :root{
    --blue:#2b8cff; --blue-dark:#1f6fe0;
    --coral:#ff7a59; --amber:#ffb02e; --pink:#ff5d8f;
    --bg:#f3f9ff; --card:#ffffff; --line:#e3edf9;
    --green:#22b573; --green-bg:#e4f8ef;
    --red:#ff5a5a; --red-bg:#ffecec;
    --gray:#6b7785;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Helvetica Neue","PingFang TC","Microsoft JhengHei",sans-serif;
    background:linear-gradient(180deg,#f0f7ff,#fff7f2 70%);color:#22303f;line-height:1.6;
    -webkit-text-size-adjust:100%;}
  .wrap{max-width:760px;margin:0 auto;padding:16px;}
  header.top{background:linear-gradient(135deg,#5ec6ff,#7d8bff 55%,#b88bff);color:#fff;
    border-radius:18px;padding:24px 22px;margin-bottom:16px;box-shadow:0 8px 22px rgba(93,141,255,.3);}
  header.top h1{margin:0 0 6px;font-size:1.5rem;text-shadow:0 1px 2px rgba(0,0,0,.12);}
  header.top p{margin:0;font-size:.92rem;opacity:.95;}
  .meta{margin-top:14px;font-size:.86rem;background:rgba(255,255,255,.22);
    padding:9px 13px;border-radius:10px;}
  .sticky{position:sticky;top:0;z-index:20;padding:10px 0;
    background:linear-gradient(180deg,#f0f7ff 70%,rgba(240,247,255,0));}
  .bar{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:11px 16px;display:flex;align-items:center;gap:12px;font-size:.9rem;
    box-shadow:0 4px 12px rgba(43,140,255,.1);}
  .bar .track{flex:1;height:9px;background:#e9f1fb;border-radius:6px;overflow:hidden;}
  .bar .fill{height:100%;width:0;border-radius:6px;
    background:linear-gradient(90deg,#3ad1c6,#2b8cff);transition:width .35s;}
  .bar #count{font-weight:700;color:var(--blue-dark);}
  .section-title{color:#fff;font-weight:800;border-radius:12px;
    padding:10px 16px;margin:24px 0 6px;font-size:1.05rem;
    box-shadow:0 4px 12px rgba(0,0,0,.08);}
  .section-title.s0{background:linear-gradient(135deg,#ff9a6c,#ff6f91);}
  .section-title.s1{background:linear-gradient(135deg,#4dd0e1,#2b8cff);}
  .section-title.s2{background:linear-gradient(135deg,#9b8bff,#b06bff);}
  .section-desc{font-size:.86rem;color:var(--gray);margin:0 4px 10px;}
  .passage{background:#fffdf4;border:1px solid #ffe9c9;border-left:5px solid var(--amber);
    border-radius:12px;padding:15px 17px;margin:14px 0;font-size:.95rem;
    box-shadow:0 3px 10px rgba(255,176,46,.08);}
  .passage h3{margin:0 0 8px;color:#e0820a;font-size:1rem;}
  .passage table{border-collapse:collapse;width:100%;margin:8px 0;font-size:.88rem;}
  .passage th,.passage td{border:1px solid #ffe0b0;padding:5px 8px;text-align:left;}
  .passage th{background:#fff2dc;}
  .email-h{font-size:.85rem;color:var(--gray);border-bottom:1px dashed #ffd9a8;
    padding-bottom:6px;margin-bottom:8px;}
  .q{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:15px 17px;margin:12px 0;box-shadow:0 3px 10px rgba(43,140,255,.07);}
  .q .stem{font-weight:600;margin-bottom:10px;}
  .q .stem .num{display:inline-block;color:#fff;background:var(--blue);font-weight:700;
    border-radius:8px;padding:1px 9px;margin-right:8px;font-size:.92rem;}
  .opt{display:flex;align-items:flex-start;gap:10px;border:2px solid var(--line);
    border-radius:11px;padding:10px 13px;margin:8px 0;cursor:pointer;transition:.15s;
    font-size:.95rem;background:#fbfdff;}
  .opt:hover{border-color:var(--blue);background:#eef6ff;}
  .opt input{margin-top:3px;accent-color:var(--blue);}
  .opt .lab{font-weight:800;color:var(--blue);min-width:18px;}
  .opt.sel{border-color:var(--blue);background:#e7f2ff;}
  .opt.correct{border-color:var(--green);background:var(--green-bg);}
  .opt.wrong{border-color:var(--red);background:var(--red-bg);}
  .opt.lock{cursor:default;}
  .exp{display:none;margin-top:11px;border-top:2px dashed #ffe1c2;padding-top:11px;font-size:.9rem;}
  .exp.show{display:block;}
  .exp .tag{display:inline-block;font-weight:800;color:#fff;background:var(--green);
    border-radius:7px;padding:2px 10px;font-size:.8rem;margin-bottom:7px;}
  .exp .tag.miss{background:var(--red);}
  .exp .en{color:#1c4f7a;background:#eef7ff;border-radius:8px;padding:6px 10px;margin:5px 0;}
  .exp .zh{color:#7a4a12;background:#fff7ea;border-radius:8px;padding:6px 10px;margin:5px 0;}
  .actions{position:sticky;bottom:0;padding:14px 0 6px;margin-top:18px;
    background:linear-gradient(transparent,#fff7f2 35%);}
  button.submit{width:100%;color:#fff;border:0;border-radius:14px;padding:16px;
    font-size:1.08rem;font-weight:800;cursor:pointer;
    background:linear-gradient(135deg,#ff8a5b,#ff5d8f);
    box-shadow:0 6px 16px rgba(255,93,143,.35);}
  button.submit:active{transform:translateY(1px);}
  button.reset{width:100%;background:#fff;color:var(--blue);border:2px solid var(--blue);
    border-radius:14px;padding:14px;font-size:1rem;font-weight:800;cursor:pointer;margin-top:10px;display:none;}
  .result{display:none;background:var(--card);border:3px solid transparent;border-radius:16px;
    padding:22px;margin:16px 0;text-align:center;
    background-image:linear-gradient(#fff,#fff),linear-gradient(135deg,#3ad1c6,#2b8cff,#b06bff);
    background-origin:border-box;background-clip:padding-box,border-box;
    box-shadow:0 8px 22px rgba(43,140,255,.15);}
  .result.show{display:block;}
  .result .score{font-size:2.8rem;font-weight:900;
    background:linear-gradient(135deg,#2b8cff,#b06bff);-webkit-background-clip:text;
    background-clip:text;-webkit-text-fill-color:transparent;}
  .result .sub{color:var(--gray);font-size:.95rem;}
  .result .bd{display:flex;justify-content:center;gap:18px;margin-top:12px;flex-wrap:wrap;font-size:.95rem;}
  .result .bd span{font-weight:800;}
  .hint{text-align:center;font-size:.85rem;color:var(--gray);margin-top:9px;min-height:1.2em;}
  footer{text-align:center;color:var(--gray);font-size:.8rem;margin:24px 0;}
</style>
</head>
<body>
<a href="gept.html" style="position:fixed;top:12px;left:12px;background:rgba(255,255,255,.92);color:#2b8cff;padding:7px 15px;border-radius:20px;text-decoration:none;font-size:.85rem;font-weight:800;z-index:999;box-shadow:0 3px 10px rgba(0,0,0,.15);">&#8592; 回題庫</a>
<div class="wrap">
  <header class="top">
    <h1>GEPT 初級　閱讀測驗　<span style="opacity:.9">第12回</span></h1>
    <p>仿真練習卷　&middot;　依官方題型與難度命題</p>
    <div class="meta">共 3 部分、30 題　|　建議作答時間 35 分鐘　|　送出後顯示完整中英文解析與分數</div>
  </header>

  <div class="sticky">
    <div class="bar">
      <span>作答進度</span>
      <div class="track"><div class="fill" id="fill"></div></div>
      <span id="count">0 / 30</span>
    </div>
  </div>

  <form id="quiz"></form>

  <div class="result" id="result">
    <div class="score" id="scoreNum">0</div>
    <div class="sub" id="scoreTxt">分</div>
    <div class="bd">
      <span style="color:var(--green)">答對 <b id="rOk">0</b></span>
      <span style="color:var(--red)">答錯 <b id="rNo">0</b></span>
      <span style="color:var(--gray)">未作答 <b id="rBlank">0</b></span>
    </div>
  </div>

  <div class="actions">
    <button type="button" class="submit" id="submitBtn">送出並查看解析</button>
    <div class="hint" id="hint">尚未作答任何題目</div>
    <button type="button" class="reset" id="resetBtn">重新作答</button>
  </div>

  <footer>GEPT 初級閱讀　仿真練習　&middot;　第二顆腦 / GEPT初級</footer>
</div>

<script>
/* ====== 題庫資料 ====== */
const PARTS = [{"title": "第一部分　詞彙", "desc": "共 10 題，每題有一個空格，請從四個選項中選出最適合題意的字或詞。"}, {"title": "第二部分　段落填空", "desc": "共 8 題，包含二個段落，每格四個選項，請依文意選出最適合的答案。"}, {"title": "第三部分　閱讀理解", "desc": "共 12 題，包含 4 個題組，請依短文內容選出最適合的答案。"}];

const PASSAGES = {"11": "<div class=\"passage\"><h3>Questions 11-14</h3>Learning to save money is an important skill, even for young people. When you save, you put aside some of your money instead of spending it all. A good way to start is to set a goal, __(11)__ saving for a new bicycle. Each week, try to save a small amount. It may seem slow, __(12)__ the money will grow over time. Saving also helps you prepare for things you don't expect, like a broken phone. People who save money usually worry __(13)__ about the future. The earlier you start, the __(14)__ it becomes a good habit.</div>", "15": "<div class=\"passage\"><h3>Questions 15-18</h3>Long ago, people believed that humans could never fly. Two brothers, Orville and Wilbur Wright, did not agree. They owned a small shop that fixed bicycles, __(15)__ they spent their free time dreaming about flying machines. They read many books and did test after test. Many of their early machines failed, __(16)__ they learned something new each time. Finally, in 1903, they built a plane that flew for twelve seconds. It does not sound like much, __(17)__ it changed the world forever. Thanks to the Wright Brothers, we can now travel __(18)__ the world by airplane.</div>", "19": "<div class=\"passage\"><h3>Questions 19-21</h3><b>Spring Food Festival</b><br>Date: April 12&ndash;14 | 11 AM &ndash; 9 PM at Central Park<br>&bull; Try food from over 50 countries!<br>&bull; Entry is free. Most dishes cost NT$50&ndash;150.<br>&bull; Cooking shows by famous chefs at 2 PM and 5 PM.<br>&bull; Bring your own cup and get a 10% discount on drinks.<br>&bull; Free parking is not available; please use public transport.</div>", "22": "<div class=\"passage\"><h3>Questions 22-24</h3><b>Capture the Moment &mdash; Photography Class</b><br>&bull; Learn to take amazing photos with any camera or phone.<br>&bull; For beginners; no experience needed.<br>&bull; 6 lessons, every Saturday morning.<br>&bull; NT$2,400 for the whole course.<br>&bull; Each student goes on one outdoor photo trip.<br>&bull; Limited to 8 students per class. Sign up early!</div>", "25": "<div class=\"passage\"><h3>Questions 25-27</h3><div class=\"email-h\">From: emily@mail.com　|　To: grandma@mail.com　|　Subject: Thank you!</div>Dear Grandma,<br><br>Thank you so much for the warm sweater you sent me for my birthday. I love the color, and it fits me perfectly. I wore it to school today, and all my friends said it looked great. It was very kind of you to make it yourself. I know knitting takes a lot of time and patience. I hope we can visit you during the summer holiday so I can thank you in person.<br><br>Love, Emily</div>", "28": "<div class=\"passage\"><h3>Questions 28-30</h3>Ants are small, but they are amazing workers. They live together in large groups called colonies, where every ant has a job. Some ants look for food, some take care of the babies, and others protect the nest. Ants are very strong for their size and can carry objects much heavier than their own bodies. They also work as a team. When one ant finds food, it leaves a special smell on the ground so other ants can follow the path. By working together, this tiny insect can do great things.</div>"};

const Q = [{"n": 1, "p": 0, "stem": "Remember to __________ your hands before eating.", "o": ["drop", "wash", "drive", "sing"], "a": 1, "en": "\"wash your hands\" = clean them.", "zh": "wash your hands（洗手）。吃飯前要洗手。drive/sing/drop 不合。"}, {"n": 2, "p": 0, "stem": "The store is having a big __________ this weekend; everything is cheaper.", "o": ["cost", "money", "sale", "price"], "a": 2, "en": "\"sale\" = goods sold at lower prices.", "zh": "sale（特賣、拍賣）。週末大特賣，東西更便宜。price 價格、cost 成本、money 錢，不合。"}, {"n": 3, "p": 0, "stem": "I'm not sure, but I __________ he will come to the party.", "o": ["know", "say", "tell", "think"], "a": 3, "en": "\"I think\" = my opinion (not certain).", "zh": "I think（我認為）表不確定的看法。know 是確知、say/tell 是說，不合。"}, {"n": 4, "p": 0, "stem": "We planted a tree and watched it __________ taller each year.", "o": ["rise", "lift", "grow", "raise"], "a": 2, "en": "\"grow taller\" = become bigger.", "zh": "grow（生長、長高）。看著樹一年年長高。raise 舉起、rise 上升、lift 抬，不合。"}, {"n": 5, "p": 0, "stem": "Could you __________ me where the train station is?", "o": ["talk", "tell", "say", "speak"], "a": 1, "en": "\"tell me where\" = give information.", "zh": "tell me where（告訴我…在哪）。tell 後可接人＋疑問子句。say/speak/talk 不行。"}, {"n": 6, "p": 0, "stem": "He works hard __________ he can buy a house someday.", "o": ["because", "although", "but", "so that"], "a": 3, "en": "\"so that he can\" = in order to.", "zh": "so that（以便、為了）。他努力工作「以便」將來買房。"}, {"n": 7, "p": 0, "stem": "__________ the cold weather, we still went swimming.", "o": ["Instead of", "Thanks to", "In spite of", "Because of"], "a": 2, "en": "\"In spite of + noun\" = despite.", "zh": "In spite of（儘管）後接名詞。儘管天冷仍去游泳。"}, {"n": 8, "p": 0, "stem": "The two friends had an __________ and didn't talk for a week.", "o": ["idea", "argument", "agreement", "answer"], "a": 1, "en": "\"argument\" = a fight with words.", "zh": "argument（爭吵）。兩個朋友吵架，一週沒講話。agreement 同意、answer 答案、idea 想法，不合。"}, {"n": 9, "p": 0, "stem": "Please __________ quiet while the baby is sleeping.", "o": ["keep", "take", "do", "get"], "a": 0, "en": "\"keep quiet\" = stay silent.", "zh": "keep quiet（保持安靜）。寶寶睡覺時請安靜。"}, {"n": 10, "p": 0, "stem": "I __________ my old toys to the children's home last week.", "o": ["gave", "took", "borrowed", "bought"], "a": 0, "en": "\"gave ... to\" = donated.", "zh": "gave ... to（把…給／捐給）。上週把舊玩具捐給育幼院。took 拿、borrowed 借入、bought 買，不合。"}, {"n": 11, "p": 1, "stem": "(11)", "o": ["such as", "so as", "as well", "as if"], "a": 0, "en": "\"such as saving for a bicycle\" = for example.", "zh": "such as（例如）。設定目標，例如存錢買腳踏車。"}, {"n": 12, "p": 1, "stem": "(12)", "o": ["but", "because", "or", "so"], "a": 0, "en": "Seems slow, BUT money grows. Contrast.", "zh": "看似緩慢，「但」錢會慢慢變多，前後對比用 but。"}, {"n": 13, "p": 1, "stem": "(13)", "o": ["less", "least", "little", "fewer"], "a": 0, "en": "\"worry less\" = worry not as much.", "zh": "worry less（比較不擔心）。會存錢的人對未來比較不憂慮，用比較級 less。"}, {"n": 14, "p": 1, "stem": "(14)", "o": ["easily", "easy", "easier", "easiest"], "a": 2, "en": "\"the earlier ... the easier\" — the + comparative.", "zh": "the + 比較級, the + 比較級：越早開始，越容易養成好習慣，用 easier。"}, {"n": 15, "p": 1, "stem": "(15)", "o": ["because", "or", "but", "so"], "a": 2, "en": "Bicycle-shop owners, BUT they dreamed of flying. Contrast.", "zh": "他們開的是腳踏車店，「但」空閒時夢想飛行機器，用 but 形成對比。"}, {"n": 16, "p": 1, "stem": "(16)", "o": ["but", "and", "or", "so"], "a": 0, "en": "Machines failed, BUT they learned each time. Contrast.", "zh": "早期機器失敗，「但」每次都學到新東西，用 but。"}, {"n": 17, "p": 1, "stem": "(17)", "o": ["and", "so", "but", "because"], "a": 2, "en": "Sounds small, BUT changed the world. Contrast.", "zh": "聽起來沒什麼，「但」卻永遠改變了世界，用 but。"}, {"n": 18, "p": 1, "stem": "(18)", "o": ["into", "around", "between", "among"], "a": 1, "en": "\"travel around the world\" = everywhere.", "zh": "travel around the world（環遊世界）。"}, {"n": 19, "p": 2, "stem": "How much does it cost to enter the festival?", "o": ["NT$50", "Free", "NT$150", "NT$100"], "a": 1, "en": "\"Entry is free.\"", "zh": "入場免費；餐點每份 50–150 元。"}, {"n": 20, "p": 2, "stem": "How can you get a discount on drinks?", "o": ["Bring your own cup", "Buy 50 dishes", "Park nearby", "Come early"], "a": 0, "en": "\"Bring your own cup and get a 10% discount on drinks.\"", "zh": "自備杯子可享飲料 9 折。"}, {"n": 21, "p": 2, "stem": "What does the notice suggest about getting there?", "o": ["Drive and park for free", "Use public transport", "Walk only", "Take a taxi"], "a": 1, "en": "\"Free parking is not available; please use public transport.\"", "zh": "沒有免費停車，建議「搭乘大眾運輸」。"}, {"n": 22, "p": 2, "stem": "Who is this class for?", "o": ["Professional photographers", "Beginners", "Children under 5", "Teachers only"], "a": 1, "en": "\"For beginners; no experience needed.\"", "zh": "課程是給「初學者」，不需經驗。"}, {"n": 23, "p": 2, "stem": "What is included in the course?", "o": ["A free phone", "Lunch every day", "A free camera", "An outdoor photo trip"], "a": 3, "en": "\"Each student goes on one outdoor photo trip.\"", "zh": "課程包含一次「戶外拍照行程」。相機/手機自備。"}, {"n": 24, "p": 2, "stem": "Why should you sign up early?", "o": ["Only 8 students are allowed", "It starts tomorrow", "Cameras are limited", "The price will rise"], "a": 0, "en": "\"Limited to 8 students per class.\"", "zh": "每班「限 8 人」，所以要早點報名。"}, {"n": 25, "p": 2, "stem": "Why did Emily write this email?", "o": ["To ask for a gift", "To thank her grandma for a sweater", "To invite grandma to school", "To say sorry"], "a": 1, "en": "She thanks Grandma for the birthday sweater.", "zh": "艾蜜莉寫信「感謝奶奶」送的生日毛衣。"}, {"n": 26, "p": 2, "stem": "What did Grandma do that was special?", "o": ["She sent money", "She bought an expensive gift", "She made the sweater herself", "She visited the school"], "a": 2, "en": "\"It was very kind of you to make it yourself.\"", "zh": "奶奶「親手織了」這件毛衣，特別有心意。"}, {"n": 27, "p": 2, "stem": "What does Emily hope to do in the summer?", "o": ["Learn knitting", "Go to a new school", "Buy a new sweater", "Visit her grandma"], "a": 3, "en": "\"I hope we can visit you during the summer holiday.\"", "zh": "她希望暑假能「去探望奶奶」，當面道謝。"}, {"n": 28, "p": 2, "stem": "What is a group of ants called?", "o": ["A herd", "A flock", "A pod", "A colony"], "a": 3, "en": "\"large groups called colonies.\"", "zh": "一大群螞蟻稱為 colony（群落）。"}, {"n": 29, "p": 2, "stem": "What makes ants special workers?", "o": ["They live alone", "They cannot carry things", "They are very large", "They are strong and work together"], "a": 3, "en": "Strong for their size and work as a team.", "zh": "螞蟻雖小卻很有力，又會團隊合作，是了不起的工作者。"}, {"n": 30, "p": 2, "stem": "How do other ants find food?", "o": ["They listen for sounds", "They wait at the nest", "They use their eyes", "They follow a special smell"], "a": 3, "en": "\"it leaves a special smell on the ground so other ants can follow.\"", "zh": "找到食物的螞蟻會在地上留下特殊氣味，其他螞蟻便循著走。"}];
/* ====== 產生畫面 ====== */
const form = document.getElementById('quiz');
let lastPart = -1;
Q.forEach(q=>{
  if(q.p!==lastPart){
    const st=document.createElement('div'); st.className='section-title s'+q.p; st.textContent=PARTS[q.p].title;
    const sd=document.createElement('div'); sd.className='section-desc'; sd.textContent=PARTS[q.p].desc;
    form.appendChild(st); form.appendChild(sd); lastPart=q.p;
  }
  if(PASSAGES[q.n]){ const d=document.createElement('div'); d.innerHTML=PASSAGES[q.n]; form.appendChild(d.firstChild); }
  const card=document.createElement('div'); card.className='q'; card.id='q'+q.n;
  const isBlank=/^\(\d+\)$/.test(q.stem);
  const stemHtml = isBlank ? `第 ${q.n} 格` : q.stem;
  card.innerHTML=`<div class="stem"><span class="num">${q.n}</span>${stemHtml}</div>`;
  q.o.forEach((opt,i)=>{
    const lab=document.createElement('label'); lab.className='opt'; lab.dataset.i=i;
    lab.innerHTML=`<input type="radio" name="q${q.n}" value="${i}"><span class="lab">${'ABCD'[i]}</span><span>${opt}</span>`;
    lab.querySelector('input').addEventListener('change',()=>{
      card.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
      lab.classList.add('sel'); updateProgress();
    });
    card.appendChild(lab);
  });
  const exp=document.createElement('div'); exp.className='exp'; exp.id='exp'+q.n;
  card.appendChild(exp);
  form.appendChild(card);
});

const submitBtn=document.getElementById('submitBtn');
const resetBtn=document.getElementById('resetBtn');
const hint=document.getElementById('hint');

function answeredCount(){ let c=0; Q.forEach(q=>{ if(form.querySelector(`input[name="q${q.n}"]:checked`)) c++; }); return c; }
function updateProgress(){
  const c=answeredCount();
  document.getElementById('count').textContent=`${c} / 30`;
  document.getElementById('fill').style.width=(c/30*100)+'%';
  hint.textContent = c===30 ? '已完成全部 30 題' : (c===0 ? '尚未作答任何題目（仍可送出查看解析）' : `已作答 ${c} 題，未作答 ${30-c} 題（仍可送出）`);
}

submitBtn.addEventListener('click',()=>{
  let ok=0, blank=0;
  Q.forEach(q=>{
    const sel=form.querySelector(`input[name="q${q.n}"]:checked`);
    const pick = sel ? parseInt(sel.value) : null;
    if(pick===null) blank++;
    const card=document.getElementById('q'+q.n);
    card.querySelectorAll('.opt').forEach(o=>{
      o.classList.add('lock');
      o.querySelector('input').disabled=true;
      const i=parseInt(o.dataset.i);
      if(i===q.a) o.classList.add('correct');
      if(pick!==null && i===pick && pick!==q.a) o.classList.add('wrong');
    });
    const correct = pick===q.a; if(correct) ok++;
    const exp=document.getElementById('exp'+q.n);
    const tag = correct ? '答對' : (pick===null ? '未作答' : '答錯');
    exp.innerHTML=`<span class="tag ${correct?'':'miss'}">${tag}　正解：${'ABCD'[q.a]}</span>
      <div class="en"><b>EN</b>&nbsp;${q.en}</div><div class="zh"><b>中</b>&nbsp;${q.zh}</div>`;
    exp.classList.add('show');
  });
  const res=document.getElementById('result');
  document.getElementById('scoreNum').textContent=Math.round(ok/30*100);
  document.getElementById('scoreTxt').textContent=`分（答對 ${ok} / 30 題）`;
  document.getElementById('rOk').textContent=ok;
  document.getElementById('rNo').textContent=30-ok-blank;
  document.getElementById('rBlank').textContent=blank;
  res.classList.add('show');
  submitBtn.style.display='none'; hint.style.display='none'; resetBtn.style.display='block';
  res.scrollIntoView({behavior:'smooth'});
});

resetBtn.addEventListener('click',()=>{
  form.reset();
  Q.forEach(q=>{
    const card=document.getElementById('q'+q.n);
    card.querySelectorAll('.opt').forEach(o=>{o.classList.remove('sel','correct','wrong','lock');o.querySelector('input').disabled=false;});
    document.getElementById('exp'+q.n).classList.remove('show');
  });
  document.getElementById('result').classList.remove('show');
  submitBtn.style.display='block'; hint.style.display='block'; resetBtn.style.display='none';
  updateProgress();
  window.scrollTo({top:0,behavior:'smooth'});
});

updateProgress();
</script>
</body>
</html>
