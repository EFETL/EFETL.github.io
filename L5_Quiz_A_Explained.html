<script>
// ── DATA ──────────────────────────────────────────────────
const sections = [
  {
    title: '第一大題：字彙選擇',
    pts: '15 題 × 2 分 = 30 分',
    questions: [
      { q: 'The professor was once a _______ figure in the field of marine biology, well-known to scholars worldwide.',
        opts: ['prominent','tranquil','vast','grim'],
        ans: 'A',
        exp: '<span class="exp-key">prominent（顯著的；卓越的）</span>──句意為「在海洋生物學界曾是著名人物」，prominent 形容人物地位顯赫。<br>❌ tranquil = 寧靜的；vast = 廣大的；grim = 嚴峻的，皆不符語境。' },
      { q: 'International _______ between the two countries has grown rapidly since the new trade agreement was signed.',
        opts: ['commerce','elevation','incidence','acceleration'],
        ans: 'A',
        exp: '<span class="exp-key">commerce（商業；貿易）</span>──句意為「兩國間的國際貿易」，commerce 指商業活動。<br>❌ elevation = 高度；incidence = 發生率；acceleration = 加速，皆與貿易無關。' },
      { q: 'After a long day at work, she enjoyed sitting by the _______ lake, listening to nothing but the wind.',
        opts: ['excessive','tranquil','solid','joint'],
        ans: 'B',
        exp: '<span class="exp-key">tranquil（寧靜的；平靜的）</span>──描述湖邊只有風聲，氣氛寧靜，符合句意。<br>❌ excessive = 過度的；solid = 堅固的；joint = 聯合的，皆不符語境。' },
      { q: 'The desert covers a _______ area of land, stretching for thousands of kilometers in every direction.',
        opts: ['vast','frail','grim','polar'],
        ans: 'A',
        exp: '<span class="exp-key">vast（廣大的；巨大的）</span>──沙漠覆蓋廣大土地，綿延數千公里，vast 形容範圍極大。<br>❌ frail = 虛弱的；grim = 嚴峻的；polar = 極地的，皆不符語境。' },
      { q: 'The injured hiker was _______ unable to walk, so the rescue team had to carry him down the mountain.',
        opts: ['literally','overall','jointly','excessively'],
        ans: 'A',
        exp: '<span class="exp-key">literally（照字面地；確實地）</span>──強調登山客「真的」（字面意義上）無法行走，需被抬下山。<br>❌ overall = 整體而言；jointly = 共同地；excessively = 過度地，皆不符語境。' },
      { q: 'Ocean _______ are influenced mainly by the gravitational pull of the moon and the sun.',
        opts: ['tides','poles','curbs','generations'],
        ans: 'A',
        exp: '<span class="exp-key">tides（潮汐）</span>──潮汐主要受月球與太陽引力影響，為自然地理常識。<br>❌ poles = 地極；curbs = 約束；generations = 世代，皆不符語境。' },
      { q: 'A sudden _______ in oil prices caused panic among investors around the world.',
        opts: ['surge','elevation','outlook','generation'],
        ans: 'A',
        exp: '<span class="exp-key">surge（激增；湧現）</span>──油價突然激增，造成投資人恐慌，surge 指數量急遽上升。<br>❌ elevation = 高度；outlook = 展望；generation = 世代，皆不符語境。' },
      { q: 'Doctors say there is a strong _______ that the patient will fully recover within a month.',
        opts: ['likelihood','volume','curb','acceleration'],
        ans: 'A',
        exp: '<span class="exp-key">likelihood（可能性）</span>──醫生表示病人一個月內完全康復的可能性很高。<br>❌ volume = 量；curb = 約束；acceleration = 加速，皆不符語境。' },
      { q: 'The bridge was built on a _______ foundation of rock, so it has remained stable for over a century.',
        opts: ['solid','grim','tranquil','joint'],
        ans: 'A',
        exp: '<span class="exp-key">solid（堅固的；固體的）</span>──橋樑建於堅固的岩石地基上，因此能穩固超過一世紀。<br>❌ grim = 嚴峻的；tranquil = 寧靜的；joint = 聯合的，皆不符語境。' },
      { q: 'There has been a major _______ in public attitudes toward renewable energy over the past decade.',
        opts: ['shift','outlook','pole','elevation'],
        ans: 'A',
        exp: '<span class="exp-key">shift（轉變；移動）</span>──過去十年大眾對再生能源的態度發生重大轉變。<br>❌ outlook = 展望；pole = 柱子；elevation = 高度，皆不符語境。' },
      { q: 'The hospital can only _______ a limited number of patients during a major emergency.',
        opts: ['sustain','curb','cease','confirm'],
        ans: 'A',
        exp: '<span class="exp-key">sustain（維持；承受）</span>──醫院在重大緊急事件中只能承受有限數量的病患。<br>❌ curb = 抑制；cease = 停止；confirm = 確認，皆不符語境。' },
      { q: 'New technology has helped to _______ the production process, cutting the time needed by half.',
        opts: ['accelerate','cease','curb','acknowledge'],
        ans: 'A',
        exp: '<span class="exp-key">accelerate（加速）</span>──新科技加速了生產流程，使所需時間減半。<br>❌ cease = 停止；curb = 抑制；acknowledge = 承認，皆不符語境。' },
      { q: 'The company had to _______ with rising costs and a shrinking market at the same time.',
        opts: ['contend','cease','sustain','confirm'],
        ans: 'A',
        exp: '<span class="exp-key">contend（主張；競爭；應付）</span>──contend with = 應付，公司必須同時應付成本上升與市場萎縮。<br>❌ cease = 停止；sustain = 維持；confirm = 確認，皆不符此搭配。' },
      { q: 'Scientists warn that the polar ice caps are _______ at an alarming rate due to global warming.',
        opts: ['melting','curbing','ceasing','confirming'],
        ans: 'A',
        exp: '<span class="exp-key">melting（融化）</span>──科學家警告極地冰帽正以驚人速度融化，因全球暖化所致。<br>❌ curbing = 抑制；ceasing = 停止；confirming = 確認，皆不符語境。' },
      { q: 'The committee released a _______ report, predicting that the species could disappear within fifty years.',
        opts: ['grim','tranquil','solid','joint'],
        ans: 'A',
        exp: '<span class="exp-key">grim（嚴峻的；令人擔憂的）</span>──委員會發布令人擔憂的報告，預測該物種五十年內可能消失。<br>❌ tranquil = 寧靜的；solid = 堅固的；joint = 聯合的，皆不符語境。' },
      { q: 'The two nations agreed to launch a _______ effort to fight climate change together.',
        opts: ['joint','grim','vast','frail'],
        ans: 'A',
        exp: '<span class="exp-key">joint（聯合的；共同的）</span>──兩國同意展開聯合行動，共同對抗氣候變遷，joint effort = 共同努力。<br>❌ grim = 嚴峻的；vast = 廣大的；frail = 虛弱的，皆不符語境。' },
    ]
  },
  {
    title: '第二大題：文法選擇',
    pts: '15 題 × 2 分 = 30 分',
    questions: [
      { q: 'Venice has long been admired _______ its magnificence by travelers from all over the world.',
        opts: ['for','with','about','at'],
        ans: 'A',
        exp: '<span class="exp-key">for</span>──be admired for = 因…而受讚賞，固定介係詞搭配。課文原句：has long been admired for its magnificence。<br>❌ with/about/at 均不與 admired 搭配表示原因。' },
      { q: '_______ on the sea more than a thousand years ago, Venice has long been admired for its magnificence.',
        opts: ['Build','Building','Built','To build'],
        ans: 'C',
        exp: '<span class="exp-key">Built（過去分詞，表被動）</span>──Venice 是「被建造」的，分詞構句須用過去分詞表被動，等於 Because it was built on the sea。<br>❌ Build（原形動詞）、Building（現在分詞，表主動）、To build（不定詞）均不符被動語意。' },
      { q: 'This subsidence _______ also caused by a shift in the Apennine Plate, on which Venice sits.',
        opts: ['is','are','was','were'],
        ans: 'A',
        exp: '<span class="exp-key">is（單數現在式被動）</span>──主詞 This subsidence 為單數，全文以現在式描述地理事實，故用 is caused。<br>❌ are（複數）、was/were（過去式，與全文現在式不一致）。' },
      { q: 'Venice was built on a foundation of weak, soft marshland _______ cannot fully support the weight of the city.',
        opts: ['who','which','whom','whose'],
        ans: 'B',
        exp: '<span class="exp-key">which（關係代名詞，代替 marshland 作主詞）</span>──which 引導形容詞子句修飾 marshland，並在子句中作主詞。<br>❌ who/whom 用於指人；whose 為所有格，句中不需要所有格。' },
      { q: 'In the 1930s, large amounts of groundwater _______ from beneath the city for industrial use.',
        opts: ['pumped out','were pumped out','have pumped out','pump out'],
        ans: 'B',
        exp: '<span class="exp-key">were pumped out（過去式被動）</span>──地下水「被」抽出，且描述1930年代的歷史事件，須用過去式被動語態。<br>❌ pumped out（主動）；have pumped out（現在完成式）；pump out（現在式），皆不符。' },
      { q: '_______ this practice was banned in the 1970s, the damage had already been done.',
        opts: ['Because','Although','Since','As'],
        ans: 'B',
        exp: '<span class="exp-key">Although（雖然）</span>──表示讓步：雖然此作法在1970年代被禁止，但傷害已造成，前後語意為對比。<br>❌ Because/Since = 因為（表原因）；As = 由於／當…時，均不符讓步語意。' },
      { q: 'The burning of fossil fuels has released excessive amounts of carbon dioxide, _______ global temperatures to rise.',
        opts: ['cause','caused','causing','to causing'],
        ans: 'C',
        exp: '<span class="exp-key">causing（現在分詞，表結果）</span>──分詞構句表示「結果」，相當於 which causes，主詞與主要子句一致。<br>❌ cause（原形動詞，不能單獨作分詞構句）；caused（過去分詞，表被動，語意不符）；to causing（文法錯誤）。' },
      { q: 'Scientists confirm that sea levels _______ by as much as 53 centimeters by the year 2100.',
        opts: ['rise','rose','could rise','have risen'],
        ans: 'C',
        exp: '<span class="exp-key">could rise（情態助動詞表可能性）</span>──描述對未來（2100年）的科學預測，須用情態助動詞表「可能會」，課文原句即為 could rise。<br>❌ rise（現在式）、rose（過去式）皆不符未來語境；have risen（現在完成式）表已發生的事，不符。' },
      { q: 'A flood that swept through the city in November 1966 _______ a record height of 194 centimeters.',
        opts: ['reaches','reached','had reached','reaching'],
        ans: 'B',
        exp: '<span class="exp-key">reached（過去式）</span>──描述1966年11月發生的歷史事件，須用過去式動詞。<br>❌ reaches（現在式）；had reached（過去完成式，無更早的時間參照點）；reaching（分詞，非完整動詞）。' },
      { q: 'In 2019, a flood reached 187 centimeters—the first of five extraordinary floods _______ over 140 centimeters that year.',
        opts: ['of','in','at','with'],
        ans: 'A',
        exp: '<span class="exp-key">of</span>──floods of over 140 centimeters = 超過140公分的洪水，of 表示「具有…程度／特性」。<br>❌ in/at/with 均不符此用法。' },
      { q: 'Some scientists predict that, _______ nothing changes, Venice may cease to exist by the 22nd century.',
        opts: ['if','unless','though','while'],
        ans: 'A',
        exp: '<span class="exp-key">if（如果）</span>──if nothing changes = 如果情況沒有改變，為條件句，課文原句即為 if nothing changes。<br>❌ unless = 除非（語意重複矛盾）；though = 雖然；while = 當…的時候，均不符。' },
      { q: 'Venice has therefore become a test case for humanity, _______ what can happen when nations fail to curb climate change.',
        opts: ['shows','showed','showing','to show'],
        ans: 'C',
        exp: '<span class="exp-key">showing（現在分詞，表附帶說明）</span>──分詞構句修飾主要子句，相當於 which shows，主詞 Venice 為動作的執行者（展示者）。<br>❌ shows/showed 為完整動詞，不能直接接在逗號後形成分詞構句；to show 為不定詞，語意上不如分詞構句自然連貫。' },
      { q: 'Saving Venice cannot be achieved by one country _______ alone.',
        opts: ['act','acts','acting','acted'],
        ans: 'C',
        exp: '<span class="exp-key">acting（動名詞，作介係詞 by 的受詞補語）</span>──by one country acting alone = 由一個國家單獨行動，acting 為動名詞修飾 country 的動作。<br>❌ act（原形）、acts（現在式）不能接在介係詞後；acted（過去分詞，表被動）語意不符。' },
      { q: 'Instead, it requires all humans _______ what is happening and to work toward a common goal.',
        opts: ['acknowledge','acknowledging','to acknowledge','acknowledged'],
        ans: 'C',
        exp: '<span class="exp-key">to acknowledge（不定詞）</span>──require sb. to do = 要求某人做某事，後接不定詞 to V，並與 and to work 並列。<br>❌ acknowledge（原形）、acknowledging（動名詞）、acknowledged（過去分詞）均不符 require + 受詞 + 不定詞的句型。' },
      { q: 'The flooding can be _______ to two natural factors: acqua alta and natural subsidence.',
        opts: ['attributed','attribute','attributing','attributes'],
        ans: 'A',
        exp: '<span class="exp-key">attributed（過去分詞，與 be 連用構成被動）</span>──be attributed to = 被歸因於，固定被動句型，課文原句：This flooding can be attributed to two natural factors。<br>❌ attribute（原形）、attributing（現在分詞）、attributes（現在式動詞）均不能直接接在 be 之後構成此被動結構。' },
    ]
  },
  {

// ── RENDER ────────────────────────────────────────────────
let globalQNum = 0;
const qMap = {}; // qNum → { ans, exp }
const userAnswers = {};
let submitted = false;

const container = document.getElementById('quiz-container');

sections.forEach((sec, si) => {
  const secDiv = document.createElement('div');
  secDiv.className = 'section';
  let html = `<div class="section-header">${sec.title} <span class="pts">（${sec.pts}）</span></div>`;
  if (sec.passage) {
    html += `<div class="passage"><div class="passage-label">📖 閱讀文章</div>${sec.passage}</div>`;
  }
  sec.questions.forEach((q, qi) => {
    globalQNum++;
    const n = globalQNum;
    qMap[n] = { ans: q.ans, exp: q.exp };
    const labels = ['A','B','C','D'];
    let optHtml = '';
    q.opts.forEach((o, i) => {
      optHtml += `<div class="option" id="opt-${n}-${labels[i]}" onclick="choose(${n},'${labels[i]}')">`
        + `<span class="option-label">(${labels[i]})</span>${o}</div>`;
    });
    html += `<div class="question" id="q${n}">
      <div class="q-text"><span class="q-num">${n}.</span> ${q.q}</div>
      <div class="options">${optHtml}</div>
      <div class="explanation" id="exp${n}">
        <div class="exp-header">💡 解析</div>
        <div class="exp-body">${q.exp}</div>
      </div>
    </div>`;
  });
  secDiv.innerHTML = html;
  container.appendChild(secDiv);
});

// ── LOGIC ─────────────────────────────────────────────────
function choose(n, chosen) {
  if (submitted) return;
  userAnswers[n] = chosen;
  const ans = qMap[n].ans;
  const labels = ['A','B','C','D'];

  labels.forEach(l => {
    const el = document.getElementById(`opt-${n}-${l}`);
    el.classList.remove('selected','correct','wrong','reveal-correct');
    if (l === chosen) {
      if (chosen === ans) el.classList.add('correct');
      else el.classList.add('wrong');
    } else if (l === ans && chosen !== ans) {
      el.classList.add('reveal-correct');
    }
  });

  document.getElementById(`exp${n}`).classList.add('show');
  updateTopBar();
}

function updateTopBar() {
  const count = Object.keys(userAnswers).length;
  document.getElementById('answered-count').textContent = count;
  document.getElementById('progress-fill').style.width = (count / 50 * 100) + '%';
  let score = 0;
  for (let q in userAnswers) { if (userAnswers[q] === qMap[q].ans) score += 2; }
  document.getElementById('live-score').textContent = score;
}

function revealAll() {
  for (let n = 1; n <= 50; n++) {
    const ans = qMap[n].ans;
    const labels = ['A','B','C','D'];
    labels.forEach(l => {
      const el = document.getElementById(`opt-${n}-${l}`);
      el.classList.remove('selected','correct','wrong','reveal-correct');
      if (l === ans) el.classList.add('reveal-correct');
      else if (userAnswers[n] === l && l !== ans) el.classList.add('wrong');
    });
    document.getElementById(`exp${n}`).classList.add('show');
  }
  updateTopBar();
}

function submitAll() {
  submitted = true;
  revealAll();
  let score = 0;
  for (let n = 1; n <= 50; n++) {
    if (userAnswers[n] === qMap[n].ans) score += 2;
  }
  const rb = document.getElementById('result-box');
  rb.classList.add('show');
  document.getElementById('result-score').textContent = score;
  const gr = document.getElementById('result-grade');
  const det = document.getElementById('result-detail');
  if (score >= 90) { gr.textContent = '🏆 優秀！'; gr.className = 'result-grade grade-a'; det.textContent = '表現卓越，繼續保持！'; }
  else if (score >= 70) { gr.textContent = '👍 良好'; gr.className = 'result-grade grade-b'; det.textContent = '表現不錯，再複習錯誤的題目吧！'; }
  else { gr.textContent = '📚 需加強'; gr.className = 'result-grade grade-c'; det.textContent = '多複習解析說明，你可以做到的！'; }
  document.getElementById('answered-count').textContent = 50;
  document.getElementById('live-score').textContent = score;
  document.getElementById('progress-fill').style.width = '100%';
  rb.scrollIntoView({ behavior: 'smooth' });
}

function resetAll() {
  submitted = false;
  for (let key in userAnswers) delete userAnswers[key];
  for (let n = 1; n <= 50; n++) {
    const labels = ['A','B','C','D'];
    labels.forEach(l => {
      document.getElementById(`opt-${n}-${l}`).classList.remove('selected','correct','wrong','reveal-correct');
    });
    document.getElementById(`exp${n}`).classList.remove('show');
  }
  document.getElementById('result-box').classList.remove('show');
  document.getElementById('answered-count').textContent = '0';
  document.getElementById('live-score').textContent = '0';
  document.getElementById('progress-fill').style.width = '0%';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
